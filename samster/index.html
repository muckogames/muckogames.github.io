'use strict';
/* ===================================================================
   SAMSTER DIEBS FROM THE DIEBS
   =================================================================== */
const W=800,H=560;
const MAX_RENDER_DPR=1.5;
const LOW_FPS_PHASES=new Set(['title','diff','cutscene','victory','highscores']);
const DIALOG_DATA=window.SAMSTER_DIALOG;
const stage=document.getElementById('stage');
const bgCanvas=document.getElementById('bgc');
const canvas=document.getElementById('gc');
const bgCtx=bgCanvas.getContext('2d');
const ctx=canvas.getContext('2d');
let canvasScale=1;
const backdropCache=new Map();
let activeBackdropKey=null;

function configureCanvasContext(c){c.lineJoin='round';c.lineCap='round';c.imageSmoothingEnabled=true;}
function renderDpr(){return Math.min(MAX_RENDER_DPR,Math.max(1,window.devicePixelRatio||1));}
function clearBackdropCache(){backdropCache.clear();clearBackdropLayer();}
function clearBackdropLayer(){bgCtx.clearRect(0,0,W,H);activeBackdropKey=null;}
function snapshotBackdrop(){
  const c=document.createElement('canvas');c.width=canvas.width;c.height=canvas.height;
  const cx=c.getContext('2d');cx.imageSmoothingEnabled=true;cx.drawImage(canvas,0,0);return c;
}
function presentBackdrop(c){bgCtx.clearRect(0,0,W,H);bgCtx.drawImage(c,0,0,c.width,c.height,0,0,W,H);}
function drawCachedBackdrop(key,fn){
  let c=backdropCache.get(key);
  if(!c){fn();c=snapshotBackdrop();backdropCache.set(key,c);ctx.clearRect(0,0,W,H);}
  if(activeBackdropKey!==key){presentBackdrop(c);activeBackdropKey=key;}
}
function safeViewH(){
  // visualViewport.height is most reliable on iOS (excludes browser chrome)
  const vv=window.visualViewport;
  return vv?vv.height:window.innerHeight;
}
function safeViewW(){
  const vv=window.visualViewport;
  return vv?vv.width:window.innerWidth;
}
function resize(){
  const vw=safeViewW(),vh=safeViewH();
  const dpr=renderDpr();
  const s=Math.min(vw/(W+6),(vh-6)/(H+6));
  canvasScale=s;
  const sw=Math.max(1,Math.round(W*s)),sh=Math.max(1,Math.round(H*s));
  stage.style.width=sw+'px';
  stage.style.height=sh+'px';
  // center stage absolutely within visible viewport
  stage.style.left=Math.round((vw-sw)/2)+'px';
  stage.style.top=Math.round((vh-sh)/2)+'px';
  bgCanvas.width=Math.max(1,Math.round(W*dpr));bgCanvas.height=Math.max(1,Math.round(H*dpr));
  canvas.width=Math.max(1,Math.round(W*dpr));canvas.height=Math.max(1,Math.round(H*dpr));
  bgCtx.setTransform(dpr,0,0,dpr,0,0);ctx.setTransform(dpr,0,0,dpr,0,0);
  configureCanvasContext(bgCtx);configureCanvasContext(ctx);clearBackdropCache();
}
window.addEventListener('resize',resize);
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
resize();

/* --- INPUT --- */
const K={},JP={};
document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true;K[e.code]=true;});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function eat(c){if(JP[c]){JP[c]=false;return true;}return false;}
let mx=W/2,my=H/2,mclk=false;
const TOUCH_UI=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0||(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
const touchState={dirs:new Set(),buttons:new Set()};
let touchSuppressUntil=0;
canvas.addEventListener('click',e=>{
  if(performance.now()<touchSuppressUntil)return;
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);mclk=true;
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);
});
function mobileControlsOn(){
  return TOUCH_UI&&(phase==='stealth'||phase==='hideout'||phase==='cart'||phase==='brake'||phase==='victory');
}
function mobileLayout(){
  const buttons=[];
  if(phase==='stealth'||phase==='hideout'||phase==='victory'){
    if(phase==='hideout')buttons.push({id:'action',cx:W-88,cy:H-90,r:32,label:'A',sub:'Search'});
    return{dpad:{cx:100,cy:H-100,r:46},buttons};
  }
  if(phase==='cart'){
    buttons.push({id:'pumpL',cx:80,cy:H-80,r:44,label:'L',sub:'Pump'});
    buttons.push({id:'pumpR',cx:W-80,cy:H-80,r:44,label:'R',sub:'Pump'});
    buttons.push({id:'duck',cx:W/2,cy:H-60,r:28,label:'D',sub:'Duck'});
    return{dpad:null,buttons};
  }
  if(phase==='brake'){
    if(brk&&brk.phase==='qte'&&brk.qteIdx<brk.qtePrompts.length){
      // Show tappable letter button for current QTE key
      const key=brk.qteKey;
      const label=QTE_LABELS[key]||'?';
      buttons.push({id:'qte_'+key,cx:W/2,cy:H-80,r:48,label:label,sub:'SHUSH!'});
    } else {
      buttons.push({id:'brake',cx:W/2-80,cy:H-80,r:36,label:'B',sub:'Brake'});
      buttons.push({id:'blanket',cx:W/2+80,cy:H-80,r:36,label:'O',sub:'Cover'});
    }
    return{dpad:null,buttons};
  }
  return{dpad:null,buttons:[]};
}
function getMobileDpadDir(tx,ty,dpad){
  const dx=tx-dpad.cx,dy=ty-dpad.cy;
  if(Math.hypot(dx,dy)>dpad.r*2.4)return null;
  if(Math.abs(dx)>=Math.abs(dy))return dx<0?'left':'right';
  return dy<0?'up':'down';
}
function hitMobileControl(tx,ty){
  if(!mobileControlsOn())return null;
  const layout=mobileLayout();
  for(const btn of layout.buttons){
    if(Math.hypot(tx-btn.cx,ty-btn.cy)<=btn.r)return{kind:'button',id:btn.id};
  }
  if(layout.dpad){
    const dir=getMobileDpadDir(tx,ty,layout.dpad);
    if(dir)return{kind:'dpad',dir};
  }
  return null;
}
function applyTouchDirs(dirs){
  touchState.dirs=dirs;
  K.ArrowLeft=dirs.has('left');K.ArrowRight=dirs.has('right');
  K.ArrowUp=dirs.has('up');K.ArrowDown=dirs.has('down');
}
function fireMobileButton(id){
  if(id==='action'){JP.Space=true;JP.Enter=true;JP.KeyE=true;}
  else if(id==='pumpL'){JP.ArrowLeft=true;JP.KeyA=true;}
  else if(id==='pumpR'){JP.ArrowRight=true;JP.KeyD=true;}
  else if(id==='duck'){JP.ArrowDown=true;JP.KeyS=true;}
  else if(id==='brake'){JP.KeyB=true;}
  else if(id==='blanket'){JP.KeyO=true;}
  else if(id.startsWith('qte_')){JP[id.substring(4)]=true;}
}
function syncTouchControls(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  const dirs=new Set(),buttons=new Set();
  Array.from(e.touches).forEach(tch=>{
    const tx=(tch.clientX-rect.left)*sx,ty=(tch.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(!hit)return;
    if(hit.kind==='dpad')dirs.add(hit.dir);
    else buttons.add(hit.id);
  });
  buttons.forEach(id=>{if(!touchState.buttons.has(id))fireMobileButton(id);});
  touchState.buttons=buttons;applyTouchDirs(dirs);
}
canvas.addEventListener('touchstart',e=>{
  touchSuppressUntil=performance.now()+500;
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  Array.from(e.changedTouches).forEach(tch=>{
    const tx=(tch.clientX-rect.left)*sx,ty=(tch.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(!hit&&!mclk){mx=tx;my=ty;mclk=true;}
  });
  syncTouchControls(e);e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  syncTouchControls(e);
  // keep mx/my updated on touch devices for hover-like detection
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  if(e.touches.length>0){
    mx=(e.touches[0].clientX-rect.left)*sx;
    my=(e.touches[0].clientY-rect.top)*sy;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{syncTouchControls(e);e.preventDefault();},{passive:false});
canvas.addEventListener('touchcancel',e=>{syncTouchControls(e);e.preventDefault();},{passive:false});
window.addEventListener('blur',()=>{touchState.buttons.clear();applyTouchDirs(new Set());});

/* --- DRAW UTILITIES --- */
const TAU=Math.PI*2;
function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function circ(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();}
function ellipse(x,y,rx,ry,c,rot){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,TAU);ctx.fill();}
function line(x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function strokeCirc(x,y,r,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.stroke();}
function strokeEllipse(x,y,rx,ry,c,w,rot){ctx.strokeStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,TAU);ctx.stroke();}
function poly(pts,fill,stroke,sw){
  if(!pts.length)return;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function txt(s,x,y,c,sz,align,font){
  ctx.fillStyle=c;ctx.font=`${sz||16}px ${font||'Georgia'}`;
  ctx.textAlign=align||'left';ctx.textBaseline='alphabetic';ctx.fillText(s,x,y);
}
function txtW(s,sz,font){ctx.font=`${sz||16}px ${font||'Georgia'}`;return ctx.measureText(s).width;}
function rnd(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();
  if(typeof ctx.roundRect==='function')ctx.roundRect(x,y,w,h,r||0);
  else{const rr=Math.min(r||0,w/2,h/2);ctx.moveTo(x+rr,y);ctx.lineTo(x+w-rr,y);ctx.arcTo(x+w,y,x+w,y+rr,rr);ctx.lineTo(x+w,y+h-rr);ctx.arcTo(x+w,y+h,x+w-rr,y+h,rr);ctx.lineTo(x+rr,y+h);ctx.arcTo(x,y+h,x,y+h-rr,rr);ctx.lineTo(x,y+rr);ctx.arcTo(x,y,x+rr,y,rr);ctx.closePath();}
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}

/* --- COLORS --- */
const C={
  gold:'#f6d57a',cream:'#fcf6eb',dimTxt:'#af8d63',
  dialogBg:'rgba(30,22,44,0.94)',dialogBdr:'#c8a060',
  ink:'#4b3a4f',
  hamBrown:'#b5783a',hamLight:'#e8c88a',hamDark:'#8a5a28',hamBelly:'#f5e6d0',
  sewerGreen:'#3a5a3a',sewerDark:'#1a2e1a',sewerBrick:'#6b5244',
  bedroomFloor:'#c8b898',bedroomWall:'#5a6a8a',bedroomDark:'#2a3448',

  cartRust:'#8b6543',cartMetal:'#a0a0a8',
};

const DIFFS=[
  {id:'easy',  label:'Fluffy Friend',   col:'#88cc88',noiseRate:0.6,laserSpd:0.5,contrabandCount:8, cartObstFreq:0.4,qteSpeed:2.0, desc:'A gentle burgle for beginners.'},
  {id:'medium',label:'Rascally Rodent', col:'#e8b820',noiseRate:1.0,laserSpd:1.0,contrabandCount:14,cartObstFreq:0.7,qteSpeed:1.4, desc:'A fair challenge for any hamster.'},
  {id:'hard',  label:'Burgling Boss',   col:'#dd4444',noiseRate:1.5,laserSpd:1.5,contrabandCount:20,cartObstFreq:1.0,qteSpeed:0.9, desc:'Only the bravest rodents survive.'},
];
let diff=DIFFS[1];

/* --- GLOBAL STATE --- */
let phase='title';
let t=0;
let score=0;
let cage=null;   // cage escape state
let stl=null;    // stealth state
let dlg=null;    // dialog state
let hideout=null;// hideout state
let cart=null;   // mine cart state

function getHS(key){try{return JSON.parse(localStorage.getItem(key)||'[]');}catch{return[];}}
function saveHS(key,entry,limit=10){
  const sc=getHS(key);sc.push(entry);sc.sort((a,b)=>b.score-a.score);
  const trimmed=sc.slice(0,limit);localStorage.setItem(key,JSON.stringify(trimmed));
  return trimmed.findIndex(e=>e.score===entry.score&&e.date===entry.date)+1;
}

function resetRun(){
  score=0;cage=null;stl=null;dlg=null;hideout=null;cart=null;brk=null;vic=null;scoreSaved=false;
}
function startPhase(p){
  if(p==='cage')initCage();
  else if(p==='stealth')initStealth();
  else if(p==='cutscene_sewer')initCutscene('sewer_meeting','hideout');
  else if(p==='hideout')initHideout();
  else if(p==='cart')initCart();
  else if(p==='brake')initBrake();
  else if(p==='cutscene_police')initCutscene('police_drive','victory');
  else if(p==='victory')initVictory();
  phase=p;
  clearBackdropCache();
}

/* --- TILE SYSTEM (shared by stealth + hideout + victory) --- */
const TILE=32;
const COLS=20,ROWS=15;
const MAP_W=COLS*TILE,MAP_H=ROWS*TILE;
const UI_X=640,UI_W=160;
const TT={FLOOR:0,WALL:1,FURNITURE:2,CREAK:3,EXIT:4,BED:5,VENT:6,DOOR:7,LASER_FLOOR:8};

function canMoveTo(nx,ny,map,hw,hh){
  hw=hw||10;hh=hh||8;
  const corners=[[nx-hw,ny-hh],[nx+hw,ny-hh],[nx-hw,ny+hh],[nx+hw,ny+hh]];
  for(const[cx,cy] of corners){
    const tx=Math.floor(cx/TILE),ty=Math.floor(cy/TILE);
    if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return false;
    const tile=map[ty][tx];
    if(tile===TT.WALL||tile===TT.FURNITURE||tile===TT.BED)return false;
  }
  return true;
}
function tileAt(px,py,map){
  const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);
  if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return TT.WALL;
  return map[ty][tx];
}

function drawSamster(x,y,sc,anim,dir){
  sc=sc||1;anim=anim||0;dir=dir||0;
  const bob=Math.sin(anim*0.18)*1.5;
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  // shadow
  ellipse(0,18,14,4,'rgba(0,0,0,0.18)');
  // body
  ellipse(0,4+bob,16,13,C.hamBrown);strokeEllipse(0,4+bob,16,13,C.ink,2);
  // belly
  ellipse(0,8+bob,10,8,C.hamBelly);
  // head
  circ(0,-12+bob,11,C.hamBrown);strokeCirc(0,-12+bob,11,C.ink,2);
  // ears
  ellipse(-8,-20+bob,4,5,C.hamLight,-0.3);strokeEllipse(-8,-20+bob,4,5,C.ink,1.5,-0.3);
  ellipse(8,-20+bob,4,5,C.hamLight,0.3);strokeEllipse(8,-20+bob,4,5,C.ink,1.5,0.3);
  ellipse(-8,-20+bob,2.5,3,C.hamBrown,-0.3);
  ellipse(8,-20+bob,2.5,3,C.hamBrown,0.3);
  // cheeks
  ellipse(-8,-8+bob,5,4,'#f0d0a0');ellipse(8,-8+bob,5,4,'#f0d0a0');
  // eyes
  circ(-4,-13+bob,2,C.ink);circ(4,-13+bob,2,C.ink);
  circ(-3.4,-13.6+bob,0.6,'#fff');circ(4.6,-13.6+bob,0.6,'#fff');
  // nose
  ellipse(0,-9+bob,2,1.5,'#ffaaaa');
  // whiskers
  line(-7,-9+bob,-16,-11+bob,'#c0a080',0.8);line(-7,-8+bob,-16,-7+bob,'#c0a080',0.8);
  line(7,-9+bob,16,-11+bob,'#c0a080',0.8);line(7,-8+bob,16,-7+bob,'#c0a080',0.8);
  // burglar mask
  ctx.save();ctx.globalAlpha=0.7;
  rnd(-8,-16+bob,16,6,3,'#222');
  ctx.restore();
  // tiny paws
  ellipse(-7,16+bob,4,2.5,C.hamLight);ellipse(7,16+bob,4,2.5,C.hamLight);
  // bag on back
  ctx.save();ctx.translate(10,2+bob);ctx.rotate(0.2);
  rnd(-5,-6,10,12,3,'#555','#888',1);
  line(0,-6,0,-10,'#888',1.5);
  ctx.restore();
  ctx.restore();
}

  ellipse(0,1.5,12.8,8.5,white);strokeEllipse(0,1.5,12.8,8.5,C.ink,2);

  ellipse(0,4.5,7.8,2.8,white);
  ellipse(0,-11.2,6.4,6,black);strokeEllipse(0,-11.2,6.4,6,C.ink,2);

  ellipse(-1.5,-8.5,1.35,2,tan);ellipse(1.5,-8.5,1.35,2,tan);
  ellipse(0,-5.5,2.1,1.6,'#f0e6db');

  line(0,0,5.4,-4.1,black,2.2);line(5.4,-4.1,7.8,-6.2,white,1.9);
  ctx.restore();
  if(chasing)txt('!',4,-24,'#ff6600',14,'center','Georgia');
  ctx.restore();
}

function drawPfluegerSleeping(x,y){
  ctx.save();ctx.translate(x,y);
  // blanket
  rnd(-30,-8,60,22,6,'#5f86d9',C.ink,2);
  // head on pillow
  rnd(-38,-12,18,14,4,'#e8e0d0',C.ink,1);

  // hair

/* ================================================================
   CAGE ESCAPE — INTERACTIVE PUZZLE
   ================================================================ */
function initCage(){
  cage={step:0,hint:'',hintTimer:0,anim:0,wheelSpin:0,lidY:0,escaped:false,escTimer:0};
}
function updateCage(dt){
  if(!cage)return;
  cage.anim++;
  if(cage.hintTimer>0)cage.hintTimer--;
  if(cage.step<2)cage.wheelSpin+=0.08;
  if(cage.escaped){
    cage.escTimer+=dt;
    if(cage.escTimer>2.5)startPhase('stealth');
  }
}
function drawCage(){
  if(!cage)return;
  // dark bedroom background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,C.bedroomDark);g.addColorStop(1,'#1a2030');
  fillRect(0,0,W,H,g);
  // window with moonlight
  rnd(580,40,120,100,4,'#1a2848','#5a6a8a',2);
  fillRect(590,50,100,80,'#2a3a5a');
  circ(640,75,18,'rgba(255,248,220,0.3)');
  // cage
  const cx=W/2,cy=H/2+20,cw=260,ch=200;
  // cage base
  rnd(cx-cw/2,cy-ch/2+cage.lidY,cw,ch,8,'rgba(200,180,140,0.1)','#b0a080',2);
  // cage bars
  for(let i=1;i<10;i++){
    const bx=cx-cw/2+i*(cw/10);
    line(bx,cy-ch/2+cage.lidY,bx,cy+ch/2,'#c0b090',2);
  }
  // cage lid (slides up when escaped)
  const lidOff=cage.step>=4?Math.min(cage.escTimer*80,120):0;
  rnd(cx-cw/2-4,cy-ch/2-8-lidOff,cw+8,14,4,'#d0c0a0','#a09070',2);
  for(let i=0;i<12;i++)line(cx-cw/2+i*22,cy-ch/2-8-lidOff,cx-cw/2+i*22,cy-ch/2+6-lidOff,'#b0a080',1.5);

  // exercise wheel
  const wheelX=cx+50,wheelY=cy+30,wheelR=40;
  strokeCirc(wheelX,wheelY,wheelR,'#a09070',3);
  // spokes
  for(let i=0;i<6;i++){
    const ang=cage.wheelSpin+i*(TAU/6);
    line(wheelX,wheelY,wheelX+Math.cos(ang)*wheelR,wheelY+Math.sin(ang)*wheelR,'#a09070',1.5);
  }
  // helper: enlarged hit test for touch-friendly taps (pad = extra pixels each side)
  const PAD=TOUCH_UI?20:5;
  function cageHit(x,y,w,h){return mx>=x-PAD&&mx<=x+w+PAD&&my>=y-PAD&&my<=y+h+PAD;}
  function cageHitCirc(cx2,cy2,r){return Math.hypot(mx-cx2,my-cy2)<r+(TOUCH_UI?25:5);}

  // wood piece
  if(cage.step===0){
    // wood on cage floor — clickable
    const wx=cx-80,wy=cy+60;
    rnd(wx-4,wy-4,38,18,4,'#b08040','#806030',1.5);
    txt('🪵',wx+5,wy+2,'',14);
    // pulsing highlight to make it obvious
    const pulse=0.4+Math.sin(cage.anim*0.08)*0.3;
    ctx.save();ctx.globalAlpha=pulse;rnd(wx-8,wy-8,46,26,6,null,'#ffcc44',2);ctx.restore();
    txt('↑ TAP',wx+2,wy+30,'#ffcc44',11,'center','Georgia');
    if(cageHit(wx-4,wy-4,38,18)){
      canvas.style.cursor='pointer';
      if(mclk){mclk=false;cage.step=1;cage.hint='Now tap the wheel to jam the wood in!';cage.hintTimer=220;}
    }
  }
  if(cage.step===1){
    // wood follows near wheel — tap wheel to jam it
    rnd(wheelX-45,wheelY+wheelR-5,30,10,2,'#b08040','#806030',1.5);
    // highlight wheel
    const pulse=0.4+Math.sin(cage.anim*0.08)*0.3;
    ctx.save();ctx.globalAlpha=pulse;strokeCirc(wheelX,wheelY,wheelR+6,'#ffcc44',3);ctx.restore();
    if(cageHitCirc(wheelX,wheelY,wheelR+15)){
      canvas.style.cursor='pointer';
      if(mclk){mclk=false;cage.step=2;cage.wheelSpin=0;cage.hint='Tap the top of the wheel to climb!';cage.hintTimer=220;}
    }
  }
  if(cage.step>=2){
    // wood jammed in wheel (draw between spokes)
    const ang=0.5;
    const wx1=wheelX+Math.cos(ang)*(wheelR-8),wy1=wheelY+Math.sin(ang)*(wheelR-8);
    rnd(wx1-4,wy1-12,8,24,2,'#b08040','#806030',1.5);
  }
  if(cage.step===2){
    // tap top of wheel to climb
    const climbX=wheelX,climbY=wheelY-wheelR;
    const pulse=0.4+Math.sin(cage.anim*0.08)*0.3;
    ctx.save();ctx.globalAlpha=pulse;circ(climbX,climbY,18,'rgba(255,204,68,0.3)');strokeCirc(climbX,climbY,18,'#ffcc44',2);ctx.restore();
    if(cageHitCirc(climbX,climbY,25)){
      canvas.style.cursor='pointer';
      if(mclk){mclk=false;cage.step=3;cage.hint='Tap the lid to push it off!';cage.hintTimer=220;}
    }
  }
  // samster position depends on step
  let sx=cx-40,sy=cy+50;
  if(cage.step===3){sx=wheelX;sy=wheelY-wheelR-20;}
  if(cage.step>=4){sx=wheelX;sy=wheelY-wheelR-20-cage.escTimer*30;}
  if(!cage.escaped)drawSamster(sx,sy,1.2,cage.anim,0);

  if(cage.step===3){
    // tap lid to push it off — large hit zone
    const lx=cx-cw/2,ly=cy-ch/2-8;
    const pulse=0.4+Math.sin(cage.anim*0.08)*0.3;
    ctx.save();ctx.globalAlpha=pulse;rnd(lx-4,ly-12,cw+8,30,4,null,'#ffcc44',3);ctx.restore();
    if(cageHit(lx,ly-12,cw,30)){
      canvas.style.cursor='pointer';
      if(mclk){mclk=false;cage.step=4;cage.escaped=true;cage.escTimer=0;cage.hint='Freedom!';cage.hintTimer=120;}
    }
  }

  // wrong click hints
  if(mclk&&cage.step===0){cage.hint='Find the piece of wood first...';cage.hintTimer=120;mclk=false;}

  // UI overlay
  rnd(W/2-180,16,360,36,8,'rgba(0,0,0,0.7)',C.dialogBdr,1.5);
  const stepLabels=['Find the wood piece','Jam it in the wheel','Climb the wheel','Push off the lid!','ESCAPED!'];
  txt(stepLabels[cage.step],W/2,40,C.gold,15,'center','Georgia');

  if(cage.hintTimer>0&&cage.hint){
    const alpha=Math.min(1,cage.hintTimer/30);
    ctx.save();ctx.globalAlpha=alpha;
    rnd(W/2-200,H-70,400,40,8,'rgba(0,0,0,0.85)',C.dialogBdr,1);
    txt(cage.hint,W/2,H-44,C.cream,14,'center','Georgia');
    ctx.restore();
  }
}

function initStealth(){
  stl={
    player:{x:3*TILE,y:12*TILE,dir:0,anim:0},
    noise:0,caught:false,won:false,caughtTimer:0,
    hint:true,hintTimer:180,moving:false,
  };
}
function updateStealth(dt){
  const s=stl;if(!s||s.won)return;
  if(s.caught){s.caughtTimer-=dt;if(s.caughtTimer<=0){s.caught=false;s.noise=0;s.player.x=3*TILE;s.player.y=12*TILE;}return;}
  const spd=2.0;
  let vx=0,vy=0;
  if(K.ArrowLeft||K.KeyA){vx=-spd;s.player.dir=2;}
  if(K.ArrowRight||K.KeyD){vx=spd;s.player.dir=3;}
  if(K.ArrowUp||K.KeyW){vy=-spd;s.player.dir=0;}
  if(K.ArrowDown||K.KeyS){vy=spd;s.player.dir=1;}
  if(vx&&vy){vx*=0.707;vy*=0.707;}
  s.moving=vx!==0||vy!==0;
  const nx=s.player.x+vx,ny=s.player.y+vy;
  if(canMoveTo(nx,s.player.y,BED_MAP))s.player.x=nx;
  if(canMoveTo(s.player.x,ny,BED_MAP))s.player.y=ny;
  if(s.moving){
    s.player.anim++;
    const tile=tileAt(s.player.x,s.player.y,BED_MAP);
    if(tile===TT.CREAK)s.noise+=diff.noiseRate*0.8;
    else s.noise+=diff.noiseRate*0.12;
  } else {
    s.noise=Math.max(0,s.noise-0.35);
  }
  if(s.noise>=100){s.caught=true;s.caughtTimer=2.5;s.noise=100;}
  if(tileAt(s.player.x,s.player.y,BED_MAP)===TT.VENT){s.won=true;score+=50;}
  if(mclk||eat('Space'))s.hint=false;
}
function drawBedroomTile(tile,r,c){
  const x=c*TILE,y=r*TILE;
  if(tile===TT.WALL){fillRect(x,y,TILE,TILE,C.bedroomWall);fillRect(x,y+TILE-4,TILE,4,'#4a5a7a');return;}
  fillRect(x,y,TILE,TILE,(r+c)%2===0?'#b0a888':'#a89878');
  if(tile===TT.CREAK){fillRect(x+2,y+2,TILE-4,TILE-4,'#c0a868');for(let i=4;i<TILE;i+=8)line(x+i,y+2,x+i,y+TILE-2,'rgba(0,0,0,0.08)',1);}
  if(tile===TT.FURNITURE){rnd(x+3,y+3,TILE-6,TILE-6,3,'#6a5040',C.ink,1.5);}
  if(tile===TT.BED){fillRect(x,y,TILE,TILE,'#4a5a8a');rnd(x+2,y+2,TILE-4,TILE-4,2,'#5a6a9a','#3a4a6a',1);}
  if(tile===TT.VENT){fillRect(x,y,TILE,TILE,'#3a3a3a');for(let i=4;i<TILE;i+=6)line(x+4,y+i,x+TILE-4,y+i,'#555',2);txt('→',x+10,y+22,'#8f8',12);}
}

function lineCircHit(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1;
  const fx=x1-cx,fy=y1-cy;
  const a=dx*dx+dy*dy,b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c;
  if(disc<0)return false;
  disc=Math.sqrt(disc);
  const t1=(-b-disc)/(2*a),t2=(-b+disc)/(2*a);
  return(t1>=0&&t1<=1)||(t2>=0&&t2<=1)||(t1<0&&t2>1);
}

function updateDiebs(h,dt){
  if(!h.diebsHome)return;
  if(h.diebAlertTimer>0){h.diebAlertTimer-=dt;return;} // freeze during alert
  const diebSpd=diff.id==='easy'?1.0:diff.id==='medium'?1.5:2.0;
  h.diebs.forEach(d=>{
    d.anim++;
    if(d.room!==h.room){
      // patrol in their own room — simple bounce
      d.patrolY+=diebSpd*(d.dir===1?1:-1);
      if(d.patrolY>120){d.dir=0;d.patrolY=120;}
      if(d.patrolY<-120){d.dir=1;d.patrolY=-120;}
      // occasionally move toward player's room via doors
      if(d.anim%180===0){
        if(d.room<h.room&&d.room<2){d.room++;d.x=9.5*TILE;d.y=1.5*TILE;}
        else if(d.room>h.room&&d.room>0){d.room--;d.x=9.5*TILE;d.y=13*TILE;}
      }
      return;
    }
    // chase player when in same room
    const dx=h.player.x-d.x,dy=h.player.y-d.y;
    const dist=Math.hypot(dx,dy);
    if(dist>8){
      const mx=dx/dist*diebSpd*1.3,my=dy/dist*diebSpd*1.3;
      const map=HIDEOUT_ROOMS[d.room].map;
      if(canMoveTo(d.x+mx,d.y,map,8,8))d.x+=mx;
      if(canMoveTo(d.x,d.y+my,map,8,8))d.y+=my;
      d.dir=Math.abs(dx)>Math.abs(dy)?(dx<0?2:3):(dy<0?0:1);
    }
    // catch player
    if(dist<22){
      h.alarm=true;h.alarmTimer=2;score=Math.max(0,score-15);
      showHideoutMsg('🚨 CAUGHT by a Dieb! -15pts');
      // reset dieb position away from player
      d.x=9.5*TILE;d.y=1.5*TILE;
    }
  });
}
function updateHideout(dt){
  const h=hideout;if(!h)return;
  if(h.alarm){h.alarmTimer-=dt;if(h.alarmTimer<=0){h.alarm=false;h.player.x=9.5*TILE;h.player.y=12*TILE;}return;}
  // movement
  const spd=2.2;let vx=0,vy=0;
  const map=HIDEOUT_ROOMS[h.room].map;
  const moveLeft=K.ArrowLeft||K.KeyA;
  const moveRight=K.ArrowRight||K.KeyD;
  const moveUp=K.ArrowUp||K.KeyW;
  const moveDown=K.ArrowDown||K.KeyS;
  if(moveLeft){vx=-spd;h.player.dir=2;}
  if(moveRight){vx=spd;h.player.dir=3;}
  if(moveUp){vy=-spd;h.player.dir=0;}
  if(moveDown){vy=spd;h.player.dir=1;}
  if(vx&&vy){vx*=0.707;vy*=0.707;}
  const nx=h.player.x+vx,ny=h.player.y+vy;
  if(canMoveTo(nx,h.player.y,map))h.player.x=nx;
  if(canMoveTo(h.player.x,ny,map))h.player.y=ny;
  if(vx||vy)h.player.anim++;
  // door transitions
  const tile=tileAt(h.player.x,h.player.y,map);
  if(tile===TT.DOOR){
    const py=Math.floor(h.player.y/TILE);
    if(py<=1&&moveUp){
      if(h.room>0){h.room--;h.player.y=13*TILE;showHideoutMsg(HIDEOUT_ROOMS[h.room].name);clearBackdropCache();}
      else if(h.foundCount>=h.totalCount){startPhase('cart');return;}
    } else if(py>=13&&moveDown&&h.room<HIDEOUT_ROOMS.length-1){
      h.room++;h.player.y=1.5*TILE;showHideoutMsg(HIDEOUT_ROOMS[h.room].name);clearBackdropCache();
    }
  }
  // raccoon power-cut logic
  const powerDur=diff.id==='easy'?10:diff.id==='medium'?7:5;
  const cooldownDur=diff.id==='easy'?12:diff.id==='medium'?18:25;
  h.raccoons.forEach(rc=>{
    if(rc.powerOff>0)rc.powerOff-=dt;
    if(rc.cooldown>0)rc.cooldown-=dt;
    if(rc.chatAnim>0)rc.chatAnim-=dt;
  });
  // item pickup
  const action=eat('Space')||eat('Enter')||eat('KeyE');
  // raccoon interaction
  if(action){
    h.raccoons.forEach(rc=>{
      if(rc.room!==h.room)return;
      if(Math.hypot(h.player.x-rc.x,h.player.y-rc.y)<50&&rc.cooldown<=0){
        rc.powerOff=powerDur;rc.cooldown=cooldownDur;rc.chatAnim=2.5;
        showHideoutMsg('🦝 *chews cable* Lasers offline!');
      }
    });
  }
  h.items.forEach(it=>{
    if(it.found||it.room!==h.room)return;
    const ix=it.x*TILE+16,iy=it.y*TILE+16;
    const near=Math.hypot(h.player.x-ix,h.player.y-iy)<40;
    if(near&&(!it.hidden||action)){
      if(!it.hidden){it.found=true;h.foundCount++;score+=it.pts;showHideoutMsg(`Found: ${it.name} (+${it.pts})`);if(h.foundCount>=h.totalCount&&!h.diebsHome){triggerDiebsHome(h);}}
      else if(action){it.found=true;h.foundCount++;score+=it.pts;showHideoutMsg(`Found hidden: ${it.name} (+${it.pts})`);if(h.foundCount>=h.totalCount&&!h.diebsHome){triggerDiebsHome(h);}}
    }
  });
  // laser collision (skip if raccoon cut power for this room)
  const roomPowerOff=h.raccoons.some(rc=>rc.room===h.room&&rc.powerOff>0);
  h.lasers.forEach(l=>{
    if(l.room!==h.room)return;
    l.angle+=l.speed*dt;
    if(roomPowerOff)return; // lasers disabled!
    const ex=l.cx+Math.cos(l.angle)*l.len/2,ey=l.cy+Math.sin(l.angle)*l.len/2;
    const sx=l.cx-Math.cos(l.angle)*l.len/2,sy=l.cy-Math.sin(l.angle)*l.len/2;
    if(lineCircHit(sx,sy,ex,ey,h.player.x,h.player.y,10)){
      h.alarm=true;h.alarmTimer=2;score=Math.max(0,score-10);
      showHideoutMsg('ALARM! Laser triggered! -10pts');
    }
  });
  updateDiebs(h,dt);
  if(h.msg.timer>0)h.msg.timer--;
}
function drawHideoutTile(tile,r,c){
  const x=c*TILE,y=r*TILE;
  if(tile===TT.WALL){fillRect(x,y,TILE,TILE,'#3a3040');fillRect(x,y+TILE-3,TILE,3,'#2a2030');return;}
  fillRect(x,y,TILE,TILE,(r+c)%2===0?'#4a4050':'#444048');
  if(tile===TT.FURNITURE){rnd(x+2,y+2,TILE-4,TILE-4,3,'#5a4a3a',C.ink,1.5);fillRect(x+6,y+4,TILE-12,3,'#7a6a5a');}
  if(tile===TT.DOOR){fillRect(x,y,TILE,TILE,'#5a8a5a');txt('↕',x+10,y+22,'#fff',14);}
}

function initCart(){
  const obstacles=[];
  const dist=1500+diff.cartObstFreq*500;
  for(let d=300;d<dist;d+=120+Math.random()*80){
    obstacles.push({x:d,type:Math.random()<0.5?'pipe':'rat',y:0,hit:false});
  }
  cart={
    speed:0,scrollX:0,distance:0,targetDist:dist,
    lastPump:'',pumpTimer:0,ducking:false,duckTimer:0,
    obstacles:obstacles,
    cartY:H-160,done:false,
    samsterAnim:0,pumpAnim:0,
  };
}
function updateCart(dt){
  const c=cart;if(!c||c.done)return;
  c.samsterAnim++;
  // pump mechanic
  const pumpL=eat('ArrowLeft')||eat('KeyA');
  const pumpR=eat('ArrowRight')||eat('KeyD');
  if(pumpL&&c.lastPump!=='L'){c.lastPump='L';c.speed=Math.min(c.speed+1.2,10);c.pumpAnim=10;}
  else if(pumpR&&c.lastPump!=='R'){c.lastPump='R';c.speed=Math.min(c.speed+1.2,10);c.pumpAnim=10;}
  c.speed=Math.max(0,c.speed-0.02);
  c.pumpTimer+=dt;
  if(c.pumpAnim>0)c.pumpAnim--;
  // duck
  if(K.ArrowDown||K.KeyS){c.ducking=true;c.duckTimer=10;}
  else if(c.duckTimer>0)c.duckTimer--;
  else c.ducking=false;
  // scroll
  c.scrollX+=c.speed*2;
  c.distance+=c.speed*2;
  // obstacle collision
  c.obstacles.forEach(o=>{
    if(o.hit)return;
    const ox=o.x-c.scrollX;
    if(ox>-20&&ox<60){
      if(o.type==='pipe'&&!c.ducking){o.hit=true;c.speed=Math.max(0,c.speed-3);score=Math.max(0,score-5);}
      if(o.type==='rat'&&c.speed<4){o.hit=true;c.speed=Math.max(0,c.speed-2);score=Math.max(0,score-3);}
    }
  });
  if(c.distance>=c.targetDist){c.done=true;score+=30;}
}

  const pct=Math.min(100,Math.round(c.distance/c.targetDist*100));

  txt(TOUCH_UI?'Tap L/R to pump | D to duck':'← → Alternate to pump | ↓ Duck',W/2,H-16,C.cream,11,'center',"'Courier New',monospace");
}

/* ================================================================
   BRAKE + SHUSH DIGORY QTE
   ================================================================ */
const QTE_KEYS=['KeyZ','KeyX','KeyC','KeyV','KeyB','KeyN','KeyM'];
const QTE_LABELS={KeyZ:'Z',KeyX:'X',KeyC:'C',KeyV:'V',KeyB:'B',KeyN:'N',KeyM:'M'};
function initBrake(){
  brk={
    phase:'brake', // 'brake','blanket','qte','done'
    cartX:0,brakeTarget:500,braked:false,
    blanketed:false,
    qtePrompts:[],qteIdx:0,qteTimer:0,qteKey:'',qteFails:0,qteSuccesses:0,
    policeX:W+100,policePassed:false,
    barkMeter:0,
  };
  // generate QTE prompts (3-5 based on difficulty)
  const count=diff.id==='easy'?3:diff.id==='medium'?4:5;
  for(let i=0;i<count;i++){
    brk.qtePrompts.push(QTE_KEYS[Math.floor(Math.random()*QTE_KEYS.length)]);
  }
}
function updateBrake(dt){
  const b=brk;if(!b)return;
  if(b.phase==='brake'){
    b.cartX+=3;
    const brakeWindow=diff.id==='easy'?100:diff.id==='medium'?75:60;
    if(eat('KeyB')){
      const dist=Math.abs(b.cartX-b.brakeTarget);
      if(dist<brakeWindow){b.braked=true;b.phase='blanket';score+=Math.max(0,30-Math.floor(dist/2));}
      else{b.cartX=Math.max(0,b.cartX-100);} // overshot, push back
    }
    // auto-advance if cart goes way past target (no stuck state)
    if(b.cartX>b.brakeTarget+200){
      b.braked=true;b.phase='blanket';score=Math.max(0,score-15);
    }
  }
  if(b.phase==='blanket'){
    if(eat('KeyO')){b.blanketed=true;b.phase='qte';b.qteTimer=diff.qteSpeed;}
  }
  if(b.phase==='qte'){
    if(b.qteIdx>=b.qtePrompts.length){
      b.phase='done';
      score+=b.qteSuccesses*15;
      return;
    }
    b.qteKey=b.qtePrompts[b.qteIdx];
    b.qteTimer-=dt;
    b.barkMeter+=dt*30;
    // check input
    if(eat(b.qteKey)){b.qteSuccesses++;b.qteIdx++;b.qteTimer=diff.qteSpeed;b.barkMeter=0;}
    // wrong key check
    QTE_KEYS.forEach(k=>{if(k!==b.qteKey&&eat(k)){b.barkMeter+=20;}});
    if(b.qteTimer<=0||b.barkMeter>=100){
      b.qteFails++;b.qteIdx++;b.qteTimer=diff.qteSpeed;b.barkMeter=0;
      score=Math.max(0,score-10);
    }
    // police walking
    b.policeX=W-((b.qteIdx/b.qtePrompts.length)*W*0.8);
  }
  if(b.phase==='done'){
    b.policeX-=2;
    if(b.policeX<-100&&!b.policePassed){b.policePassed=true;}
  }
}
function drawBrake(){
  const b=brk;if(!b)return;
  // sewer background
  fillRect(0,0,W,H,C.sewerDark);
  fillRect(0,0,W,60,'#4a3a2a');fillRect(0,H-50,W,50,'#4a3a2a');
  fillRect(0,H-110,W,8,'#666');
  // hiding alcove
  rnd(470,H-200,100,100,8,'#1a1a1a','#3a3a3a',2);
  txt('🕳️',510,H-140,'',24);
  if(b.phase==='brake'){
    // cart moving
    const cx=Math.min(b.cartX,700);
    rnd(cx-30,H-160,60,30,4,C.cartRust,C.ink,2);
    circ(cx-15,H-128,6,'#444');circ(cx+15,H-128,6,'#444');
    ctx.save();ctx.translate(cx,H-175);drawSamster(0,0,0.5,t,3);ctx.restore();
    // target zone
    rnd(b.brakeTarget-30,H-120,60,15,3,null,'#88ff88',2);
    txt('BRAKE HERE!',b.brakeTarget,H-130,'#88ff88',12,'center','Georgia');
    // instruction
    rnd(W/2-100,30,200,36,6,'rgba(0,0,0,0.8)',C.dialogBdr,1.5);
    txt(TOUCH_UI?'Tap BRAKE!':'Press B to brake!',W/2,54,C.gold,15,'center','Georgia');
  }
  if(b.phase==='blanket'){
    // cart in alcove
    rnd(490,H-160,60,30,4,C.cartRust,'#333',2);
    ctx.save();ctx.translate(510,H-175);drawSamster(0,0,0.5,t,0);ctx.restore();
    rnd(W/2-120,30,240,36,6,'rgba(0,0,0,0.8)',C.dialogBdr,1.5);
    txt(TOUCH_UI?'Tap COVER!':'Press O to lower blanket!',W/2,54,C.gold,15,'center','Georgia');
  }
  if(b.phase==='qte'||b.phase==='done'){
    // cart hidden with blanket
    rnd(485,H-165,70,50,4,'#6a5a4a','#4a3a2a',2);
    if(b.blanketed){rnd(480,H-168,80,55,6,'#8a7a6a','#5a4a3a',1.5);txt('🧣',510,H-140,'',16);}
    // Dieb Police walking past
    const px=b.phase==='done'?b.policeX:W-((b.qteIdx/b.qtePrompts.length)*W*0.6)-50;
    ctx.save();ctx.translate(px,H-170);
    // police figure
    rnd(-10,-20,20,35,4,'#2a2a4a',C.ink,2);
    circ(0,-28,8,'#4a4a6a');strokeCirc(0,-28,8,C.ink,1.5);
    txt('👮',0,-10,'',14,'center');
    ctx.restore();
    if(b.phase==='qte'&&b.qteIdx<b.qtePrompts.length){
      // QTE prompt
      const key=QTE_LABELS[b.qteKey]||'?';
      rnd(W/2-60,60,120,70,10,'rgba(0,0,0,0.9)',b.qteTimer<0.5?'#ff4444':C.dialogBdr,3);
      txt('SHUSH!',W/2,85,'#ffaaaa',13,'center','Georgia');
      txt(key,W/2,118,C.gold,32,'center','Georgia');
      // bark meter
      rnd(W/2-80,145,160,16,4,'rgba(0,0,0,0.6)',null);
      fillRect(W/2-78,147,156*(b.barkMeter/100),12,b.barkMeter>60?'#dd4444':'#ddaa44');
      txt('Bark meter',W/2,175,C.dimTxt,10,'center',"'Courier New',monospace");
      // Digory trying to bark
      const digShake=Math.sin(t*0.5)*3;
      ctx.save();ctx.translate(510+digShake,H-195);drawDigoryTD(0,0,true,t);ctx.restore();
    }
    if(b.phase==='done'){
      if(b.policePassed){
        rnd(W/2-160,H/2-40,320,80,10,'rgba(0,0,0,0.9)',C.dialogBdr,2);
        txt('The Dieb Police passed!',W/2,H/2-10,C.gold,20,'center','Georgia');
        txt(`Shushed: ${b.qteSuccesses}/${b.qtePrompts.length}`,W/2,H/2+20,C.cream,14,'center','Georgia');
        const bx=W/2-100,by=H-70,bw=200,bh=44;
        const bh2=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
        rnd(bx,by,bw,bh,8,bh2?'#3a3a5a':'#2a2a3a',C.dialogBdr,2);
        txt('To the Police! →',W/2,by+28,C.gold,16,'center','Georgia');
        if(bh2)canvas.style.cursor='pointer';
        if((bh2&&mclk)||eat('Space')){mclk=false;startPhase('cutscene_police');}
      }
    }
  }
}
/* ================================================================
   VICTORY SCREEN — DONUT CELEBRATION
   ================================================================ */
function initVictory(){
  const donuts=[];
  for(let i=0;i<12;i++){
    donuts.push({x:100+Math.random()*600,y:200+Math.random()*250,eaten:false});
  }
  vic={
    player:{x:W/2,y:H/2+50,dir:0,anim:0},
    donuts:donuts,donutsEaten:0,
    digory:{x:W/2+60,y:H/2+60,anim:0},
    rankShown:false,rank:0,
  };
  if(!scoreSaved){
    scoreSaved=true;
    vic.rank=saveHS('mucko_hs_samster',{score:score,diff:diff.label,date:Date.now()});
  }
}
function updateVictory(dt){
  const v=vic;if(!v)return;
  const spd=2.5;let vx=0,vy=0;
  if(K.ArrowLeft||K.KeyA){vx=-spd;v.player.dir=2;}
  if(K.ArrowRight||K.KeyD){vx=spd;v.player.dir=3;}
  if(K.ArrowUp||K.KeyW){vy=-spd;v.player.dir=0;}
  if(K.ArrowDown||K.KeyS){vy=spd;v.player.dir=1;}
  if(vx&&vy){vx*=0.707;vy*=0.707;}
  v.player.x=Math.max(30,Math.min(W-30,v.player.x+vx));
  v.player.y=Math.max(160,Math.min(H-50,v.player.y+vy));
  if(vx||vy)v.player.anim++;
  // digory follows loosely
  const ddx=v.player.x+40-v.digory.x,ddy=v.player.y-v.digory.y;
  const dd=Math.hypot(ddx,ddy);
  if(dd>50){v.digory.x+=ddx/dd*1.5;v.digory.y+=ddy/dd*1.5;}
  v.digory.anim++;
  // eat donuts
  v.donuts.forEach(d=>{
    if(d.eaten)return;
    if(Math.hypot(v.player.x-d.x,v.player.y-d.y)<25){
      d.eaten=true;v.donutsEaten++;score+=5;
    }
  });
}
function drawVictory(){
  const v=vic;if(!v)return;
  // police station exterior
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3a4a6a');g.addColorStop(1,'#2a3a4a');
  fillRect(0,0,W,H,g);
  // building
  rnd(W/2-200,40,400,130,6,'#5a6a8a','#7a8aaa',2);
  txt('🏛️ POLICE STATION',W/2,100,'#ccddef',16,'center','Georgia');
  // ground
  fillRect(0,170,W,H-170,'#4a5a4a');
  for(let i=0;i<20;i++){const gx=i*45;fillRect(gx,170,40,H-170,(gx/45|0)%2?'#4a5a4a':'#465646');}
  // donuts
  v.donuts.forEach(d=>{
    if(d.eaten)return;
    txt('🍩',d.x-10,d.y+8,'',22);
  });
  // digory
  ctx.save();ctx.translate(v.digory.x,v.digory.y);drawDigoryTD(0,0,false,v.digory.anim);ctx.restore();
  // samster
  drawSamster(v.player.x,v.player.y,1,v.player.anim,v.player.dir);
  // score banner
  rnd(W/2-180,4,360,56,10,'rgba(0,0,0,0.8)',C.dialogBdr,2);
  txt('🎉 MISSION COMPLETE! 🎉',W/2,28,C.gold,18,'center','Georgia');
  txt(`Final Score: ${score}  |  🍩 ${v.donutsEaten}/12`,W/2,50,C.cream,13,'center','Georgia');
  if(v.rank>0&&v.rank<=3){
    const medals=['🥇','🥈','🥉'];
    txt(`${medals[v.rank-1]} High Score #${v.rank}!`,W/2,H-120,C.gold,16,'center','Georgia');
  }
  // instructions
  rnd(W/2-130,H-40,260,32,6,'rgba(0,0,0,0.6)',null);
  txt('Walk around & eat donuts! 🍩',W/2,H-18,C.cream,12,'center','Georgia');
  // play again button
  const bx=10,by=H-42,bw=120,bh=32;
  const bh2=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
  rnd(bx,by,bw,bh,6,bh2?'#3a2060':'#2a1040',C.dialogBdr,1.5);
  txt('Play Again',bx+bw/2,by+21,C.gold,12,'center','Georgia');
  if(bh2)canvas.style.cursor='pointer';
  if(bh2&&mclk){mclk=false;resetRun();phase='title';}
  // back button
  const b2x=W-130,b2y=H-42,b2w=120,b2h=32;
  const b2h2=mx>=b2x&&mx<=b2x+b2w&&my>=b2y&&my<=b2y+b2h;
  rnd(b2x,b2y,b2w,b2h,6,b2h2?'#3a2060':'#2a1040',C.dialogBdr,1.5);
  txt('← Games',b2x+b2w/2,b2y+21,C.gold,12,'center','Georgia');
  if(b2h2)canvas.style.cursor='pointer';
  if(b2h2&&mclk){mclk=false;window.location.href='../index.html';}
}

/* --- MOBILE CONTROLS DRAWING --- */
function drawMobileControls(){
  if(!mobileControlsOn())return;
  const layout=mobileLayout();
  ctx.save();ctx.globalAlpha=0.96;
  if(layout.dpad){
    const d=layout.dpad;
    circ(d.cx,d.cy,d.r*0.78,'rgba(20,12,30,0.58)');
    strokeCirc(d.cx,d.cy,d.r*0.78,'rgba(200,160,96,0.5)',2);
    [{id:'up',x:d.cx,y:d.cy-d.r-6,g:'▲'},{id:'down',x:d.cx,y:d.cy+d.r+6,g:'▼'},
     {id:'left',x:d.cx-d.r-6,y:d.cy,g:'◀'},{id:'right',x:d.cx+d.r+6,y:d.cy,g:'▶'}].forEach(p=>{
      const a=touchState.dirs.has(p.id);
      circ(p.x,p.y,30,a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.66)');
      strokeCirc(p.x,p.y,30,a?C.gold:'rgba(200,160,96,0.45)',2);
      txt(p.g,p.x,p.y+7,a?'#fff6d8':'#efe2c2',20,'center',"'Courier New',monospace");
    });
  }
  layout.buttons.forEach(btn=>{
    const a=touchState.buttons.has(btn.id);
    circ(btn.cx,btn.cy,btn.r,a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.7)');
    strokeCirc(btn.cx,btn.cy,btn.r,a?C.gold:'rgba(200,160,96,0.55)',2.2);
    txt(btn.label,btn.cx,btn.cy+6,'#fff7e7',18,'center',"'Courier New',monospace");
    if(btn.sub)txt(btn.sub,btn.cx,btn.cy+btn.r+15,C.cream,10,'center',"'Courier New',monospace");
  });
  ctx.restore();
}

/* ================================================================
   MAIN GAME LOOP
   ================================================================ */
let lastTs=0,lastRenderTs=0,simDebt=0;
const SIM_STEP=1/60,MAX_SIM_CATCHUP=SIM_STEP*6;
function targetFps(){return LOW_FPS_PHASES.has(phase)?30:60;}

function stepSimulation(dt){
  t++;
  switch(phase){
    case 'cage':updateCage(dt);break;
    case 'stealth':updateStealth(dt);break;
    case 'cutscene_sewer':case 'cutscene_police':updateCutscene(dt);break;
    case 'hideout':updateHideout(dt);break;
    case 'cart':updateCart(dt);break;
    case 'brake':updateBrake(dt);break;
    case 'victory':updateVictory(dt);break;
  }
}
function renderPhase(){
  switch(phase){
    case 'title':drawTitle();break;
    case 'highscores':drawHighScores();break;
    case 'diff':drawDiff();break;
    case 'cage':drawCage();break;
    case 'stealth':drawStealth();break;
    case 'cutscene_sewer':case 'cutscene_police':drawCutscene();break;
    case 'hideout':drawHideout();break;
    case 'cart':drawCart();break;
    case 'brake':drawBrake();break;
    case 'victory':drawVictory();break;
  }
}
function loop(ts){
  const elapsed=lastTs?Math.min((ts-lastTs)/1000,MAX_SIM_CATCHUP):0;
  lastTs=ts;simDebt=Math.min(simDebt+elapsed,MAX_SIM_CATCHUP);
  while(simDebt>=SIM_STEP){stepSimulation(SIM_STEP);simDebt-=SIM_STEP;}
  const fps=targetFps();
  if(fps<60){const min=1000/fps;if(lastRenderTs&&ts-lastRenderTs<min){requestAnimationFrame(loop);return;}}
  lastRenderTs=ts;
  if(activeBackdropKey!==null&&phase==='title')clearBackdropLayer();
  ctx.clearRect(0,0,W,H);canvas.style.cursor='default';
  renderPhase();
  drawMobileControls();
  mclk=false;Object.keys(JP).forEach(k=>JP[k]=false);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
