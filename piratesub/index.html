<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Pirate Sub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050a0a; }
#stage { position: absolute; }
canvas { display: block; touch-action: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="stage"><canvas id="gc"></canvas></div>
<script>
// Pirate Sub — side-scrolling platformer stage

var W = 800, H = 500, MAX_DPR = 1.5;

var stage = document.getElementById('stage');
var gc    = document.getElementById('gc');
var ctx   = gc.getContext('2d');
var dpr   = Math.min(window.devicePixelRatio || 1, MAX_DPR);
gc.width  = Math.round(W * dpr);
gc.height = Math.round(H * dpr);
ctx.scale(dpr, dpr);

function vw() { var v = window.visualViewport; return v ? v.width  : window.innerWidth;  }
function vh() { var v = window.visualViewport; return v ? v.height : window.innerHeight; }
function onResize() {
  var sw = vw(), sh = vh(), s = Math.min(sw / W, sh / H);
  var pw = Math.round(W * s), ph = Math.round(H * s);
  stage.style.width = pw + 'px'; stage.style.height = ph + 'px';
  stage.style.left  = Math.round((sw - pw) / 2) + 'px';
  stage.style.top   = Math.round((sh - ph) / 2) + 'px';
  gc.style.width = pw + 'px'; gc.style.height = ph + 'px';
}
window.addEventListener('resize', onResize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
onResize();

// ── input ─────────────────────────────────────────────────────────────────────
var K = {}, JP = {};
document.addEventListener('keydown', function(e) {
  unlockAC();
  if (!K[e.code]) JP[e.code] = true;
  K[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ShiftLeft','ShiftRight'].indexOf(e.code) >= 0)
    e.preventDefault();
});
document.addEventListener('keyup', function(e) { K[e.code] = false; });

var _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function unlockAC() { var a = getAC(); if (a.state !== 'running') a.resume(); }
function playTone(freq, vol, dur, type) {
  var a = getAC(); if (a.state !== 'running') return;
  var o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime + dur);
}
function playNoise(vol, dur) {
  var a = getAC(); if (a.state !== 'running') return;
  var buf = a.createBuffer(1, Math.ceil(a.sampleRate * dur), a.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  var src = a.createBufferSource(), g = a.createGain();
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  src.buffer = buf; src.connect(g); g.connect(a.destination);
  src.start();
}
function playChime() {
  var a = getAC(); if (a.state !== 'running') return;
  var freqs = [523, 659, 784];
  for (var ci = 0; ci < freqs.length; ci++) {
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'sine'; o.frequency.value = freqs[ci];
    var t0 = a.currentTime + ci * 0.15;
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.35);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0 + 0.35);
  }
}

// ── layout constants ───────────────────────────────────────────────────────────
// Hull outer bounds
var HULL_TOP = 28;
var HULL_BOT = 478;

// 3 deck levels — floor y of each level (player stands here)
var DECK = [168, 308, 448];
// Ceiling y of each room (top of corridor; also bottom of deck above)
var CEIL = [48, 180, 320];

// Platforms are solid; holes appear at ladder x positions
var LADDER_SPACING = 520;
var LADDER_W = 14;         // half-width of passable hole
var LADDER_RUNG = 18;      // rung spacing

// ── player ────────────────────────────────────────────────────────────────────
var P_W = 10, P_H = 30;
var P_WALK   = 135;
var P_SPRINT = 220;
var P_JUMP   = -300;
var GRAVITY  = 580;
var P_CLIMB  = 90;

var shakeX = 0, shakeY = 0, shakeMag = 0;
var score = 0, scorePopT = 0;
var landSqT = 0;
var footT   = 0;
var caughtT = 0;
var CAUGHT_DUR = 1.6;

var GUARDS = [
  { wx: 300,  deck: 0, face:  1, state: 'patrol', alertT: 0, patrolDir:  1, homeWx:  300 },
  { wx: -400, deck: 1, face: -1, state: 'patrol', alertT: 0, patrolDir: -1, homeWx: -400 },
  { wx: 900,  deck: 2, face:  1, state: 'patrol', alertT: 0, patrolDir:  1, homeWx:  900 }
];
var GUARD_WALK  = 62;
var GUARD_CHASE = 118;
var GUARD_SIGHT = 240;
var GUARD_CATCH = 22;
var GUARD_PATROL_RANGE = 290;

var player = {
  x: 0, y: DECK[1] - P_H,
  vx: 0, vy: 0,
  face: 1,
  onGround: false,
  onLadder: false,
  ladderX: 0,
  ladderEntryY: 0,
  ladderEntryDeck: -1   // deck index we came from — don't snap back to it
};

var camX = player.x - W / 2;
var gt   = 0;  // game time

// ── Mr. Snood's office ────────────────────────────────────────────────────────
var DOORS = [
  { wx: -1280, deck: 1 },
  { wx:  -980, deck: 0 },
  { wx:  -640, deck: 2 },
  { wx:  -480, deck: 1 },
  { wx:  -160, deck: 0 },
  { wx:   160, deck: 2 },
  { wx:   480, deck: 1 },
  { wx:   640, deck: 0 },
  { wx:   900, deck: 2 },
  { wx:   980, deck: 1 },
  { wx:  1280, deck: 2 },   // Snood's door (index 10)
  { wx:  1620, deck: 0 }
];
var SNOOD_IDX   = 10;
var snoodFound  = false;
var snoodMsg    = '';   // brief wrong-door message
var snoodMsgT   = 0;

function snoodScent() {
  var d = DOORS[SNOOD_IDX];
  var playerDeck = -1;
  for (var i = 0; i < DECK.length; i++) {
    if (Math.abs(player.y + P_H - DECK[i]) < 40) { playerDeck = i; break; }
  }
  var hDist = Math.abs(player.x - d.wx);
  var deckMult = (playerDeck === d.deck) ? 1.0 : 0.06;
  return Math.max(0, (1 - hDist / 1400)) * deckMult;
}

// ── porthole fish ─────────────────────────────────────────────────────────────
var PFISH = [];
(function() {
  var rs = 0xabcd5678;
  function rnd() { rs = ((rs >>> 0) * 1664525 + 1013904223) >>> 0; return rs / 0xffffffff; }
  var cols = ['#3a7aaa','#4a9aaa','#226688','#aa5522','#44aa88','#2255aa','#997733'];
  for (var i = 0; i < 40; i++) {
    PFISH.push({
      wx:  (rnd() * 2 - 1) * 12000,
      y:   HULL_TOP + 20 + rnd() * (HULL_BOT - HULL_TOP - 40),
      vx:  (28 + rnd() * 55) * (rnd() > 0.5 ? 1 : -1),
      col: cols[i % cols.length],
      r:   8 + rnd() * 9
    });
  }
}());

// ── touch buttons ─────────────────────────────────────────────────────────────
var BTNS = [], btnTouch = {};
(function() {
  var by = H - 58;
  BTNS = [
    { id: 'left',  cx: 58,    cy: by,    r: 36, key: 'ArrowLeft'  },
    { id: 'right', cx: 152,   cy: by,    r: 36, key: 'ArrowRight' },
    { id: 'up',    cx: W-62,  cy: by-40, r: 32, key: 'ArrowUp'    },
    { id: 'dn',    cx: W-62,  cy: by+14, r: 28, key: 'ArrowDown'  },
    { id: 'run',   cx: W-130, cy: by,    r: 30, key: 'ShiftLeft'  }
  ];
}());

function touchCoord(touch) {
  var r = gc.getBoundingClientRect();
  return { x: (touch.clientX - r.left) * (W / r.width),
           y: (touch.clientY - r.top)  * (H / r.height) };
}
gc.addEventListener('touchstart', function(e) {
  e.preventDefault();
  unlockAC();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i], c = touchCoord(t);
    for (var j = 0; j < BTNS.length; j++) {
      var b = BTNS[j];
      if (Math.hypot(c.x - b.cx, c.y - b.cy) < b.r + 10) { btnTouch[b.id] = t.identifier; K[b.key] = true; }
    }
  }
}, { passive: false });
gc.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var tid = e.changedTouches[i].identifier;
    for (var j = 0; j < BTNS.length; j++) {
      var b = BTNS[j];
      if (btnTouch[b.id] === tid) { delete btnTouch[b.id]; K[b.key] = false; }
    }
  }
}, { passive: false });
gc.addEventListener('touchcancel', function() {
  for (var i = 0; i < BTNS.length; i++) K[BTNS[i].key] = false;
  btnTouch = {};
}, { passive: false });
gc.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
function isTouch() { return navigator.maxTouchPoints > 0 || 'ontouchstart' in window; }

// ── helpers ───────────────────────────────────────────────────────────────────
function rRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);         ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Return nearest ladder world-x if player is close enough
function nearestLadder(px) {
  var idx = Math.round(px / LADDER_SPACING);
  var lx  = idx * LADDER_SPACING;
  if (Math.abs(px - lx) < LADDER_W + P_W + 4) return lx;
  return null;
}

// True if player x is in the ladder hole of a deck (so no collision)
function inLadderHole(px) {
  var lx = nearestLadder(px);
  return lx !== null && Math.abs(px - lx) < LADDER_W + 2;
}

// ── update ────────────────────────────────────────────────────────────────────
function update(dt) {
  gt += dt;

  if (caughtT > 0) { caughtT -= dt; return; }

  // Shake decay
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag = Math.max(0, shakeMag - 90 * dt);
  } else { shakeX = 0; shakeY = 0; }
  if (scorePopT > 0) scorePopT = Math.max(0, scorePopT - dt * 2.5);
  if (landSqT  > 0) landSqT   = Math.max(0, landSqT  - dt * 5);

  var left  = K['ArrowLeft'];
  var right = K['ArrowRight'];
  var upKey = K['ArrowUp']  || K['Space'];
  var dnKey = K['ArrowDown'];
  var jumpP = JP['ArrowUp'] || JP['Space'];

  var lx = nearestLadder(player.x);

  // Which deck is the player on (for door checks)?
  var playerDeckIdx = -1;
  for (var pdi = 0; pdi < DECK.length; pdi++) {
    if (Math.abs(player.y + P_H - DECK[pdi]) < 40) { playerDeckIdx = pdi; break; }
  }

  // Door interaction: check proximity on ground
  var nearDoor = -1;
  if (player.onGround && playerDeckIdx >= 0) {
    for (var ddi = 0; ddi < DOORS.length; ddi++) {
      if (DOORS[ddi].deck === playerDeckIdx && Math.abs(player.x - DOORS[ddi].wx) < 30) {
        nearDoor = ddi; break;
      }
    }
  }

  if (player.onLadder) {
    // ── ladder mode ──
    if (upKey) player.y -= P_CLIMB * dt;
    if (dnKey) player.y += P_CLIMB * dt;

    // Step off left/right
    if (left)  { player.face = -1; player.onLadder = false; }
    if (right) { player.face =  1; player.onLadder = false; }

    // Snap x to ladder center
    player.x += (player.ladderX - player.x) * Math.min(1, 14 * dt);

    // Snap to any deck we're not coming from
    for (var di = 0; di < DECK.length; di++) {
      if (di === player.ladderEntryDeck) continue;
      if (Math.abs(player.y + P_H - DECK[di]) < 22) {
        player.y = DECK[di] - P_H;
        player.onLadder = false;
        player.onGround = true;
        break;
      }
    }

    // Hard clamp to ladder extent (top deck ceiling, bottom deck floor)
    if (player.y + P_H < DECK[0]) {
      player.y = DECK[0] - P_H; player.onLadder = false; player.onGround = true;
    }
    if (player.y + P_H > DECK[DECK.length - 1]) {
      player.y = DECK[DECK.length - 1] - P_H; player.onLadder = false; player.onGround = true;
    }

  } else {
    // ── normal movement ──
    player.vx = 0;
    var curSpd = (K['ShiftLeft'] || K['ShiftRight']) ? P_SPRINT : P_WALK;
    if (left)  { player.vx = -curSpd; player.face = -1; }
    if (right) { player.vx =  curSpd; player.face =  1; }

    // Footstep sound
    if (player.onGround && Math.abs(player.vx) > 5) {
      footT -= dt;
      if (footT <= 0) {
        footT = curSpd > P_WALK ? 0.16 : 0.22;
        playTone(65, 0.05, 0.055, 'square');
      }
    } else { footT = 0; }

    // Door interact (Up when in front of a door) — takes priority over jump
    if (jumpP && player.onGround && nearDoor >= 0) {
      if (nearDoor === SNOOD_IDX) {
        if (!snoodFound) {
          snoodFound = true;
          score += Math.max(100, 300 - Math.floor(gt * 0.8));
          scorePopT = 1.0;
          playChime();
        }
      } else {
        snoodMsg = 'Not this one...'; snoodMsgT = 1.8;
        score = Math.max(0, score - 15); scorePopT = 0.35;
        playTone(160, 0.28, 0.22, 'square');
      }
    } else if (jumpP && player.onGround) {
      // Jump
      player.vy = P_JUMP;
      player.onGround = false;
      playTone(320, 0.18, 0.12, 'square');
    }

    // Grab / enter ladder
    if (lx !== null) {
      if (dnKey && player.onGround) {
        var atBot = (Math.abs(player.y + P_H - DECK[DECK.length - 1]) < 8);
        if (!atBot) {
          player.onLadder = true; player.ladderX = lx;
          player.ladderEntryY = player.y; player.ladderEntryDeck = playerDeckIdx;
          player.onGround = false; player.vx = 0; player.vy = 0;
          player.y += 12;
        }
      } else if (upKey && player.onGround && nearDoor < 0) {
        var atTop = (Math.abs(player.y + P_H - DECK[0]) < 8);
        if (!atTop) {
          player.onLadder = true; player.ladderX = lx;
          player.ladderEntryY = player.y; player.ladderEntryDeck = playerDeckIdx;
          player.onGround = false; player.vx = 0; player.vy = 0;
        }
      } else if (!player.onGround && (upKey || dnKey)) {
        player.onLadder = true; player.ladderX = lx;
        player.ladderEntryY = player.y; player.ladderEntryDeck = -1;
        player.vx = 0; player.vy = 0;
      }
    }

    // Gravity
    if (!player.onGround) player.vy += GRAVITY * dt;
    else player.vy = 0;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // ── collision ──
    var wasOnGround = player.onGround;
    var preVy = player.vy;
    player.onGround = false;

    // Deck floors (solid from both sides unless in ladder hole)
    for (var fi = 0; fi < DECK.length; fi++) {
      var dy = DECK[fi];
      if (inLadderHole(player.x)) continue;
      // Land on top
      if (player.vy >= 0 && player.y + P_H >= dy && player.y + P_H <= dy + 24) {
        player.y = dy - P_H; player.vy = 0; player.onGround = true; break;
      }
      // Ceiling bounce (hit deck from below)
      if (player.vy < 0 && player.y <= dy && player.y >= dy - 24) {
        player.y = dy; player.vy = 0; break;
      }
    }

    // Corridor ceilings (tops of rooms — defined by CEIL)
    for (var ci = 0; ci < CEIL.length; ci++) {
      if (player.y < CEIL[ci]) { player.y = CEIL[ci]; if (player.vy < 0) player.vy = 0; }
    }

    // Bottom hull floor
    if (player.y + P_H > HULL_BOT - 4) {
      player.y = HULL_BOT - P_H - 4; player.vy = 0; player.onGround = true;
    }

    // Landing feedback
    if (player.onGround && !wasOnGround && preVy > 100) {
      landSqT = 0.14;
      playTone(185, 0.15, 0.1, 'square');
      if (preVy > 240) shakeMag = Math.max(shakeMag, 7);
    }
  }

  updateGuards(dt);

  if (snoodMsgT > 0) snoodMsgT -= dt;

  // Camera follow
  camX += (player.x - W / 2 - camX) * Math.min(1, 6 * dt);

  // Fish wander
  for (var fi2 = 0; fi2 < PFISH.length; fi2++) {
    var f = PFISH[fi2];
    f.wx += f.vx * dt;
    if (f.vx > 0 && f.wx > camX + W + 500) f.wx = camX - 500;
    if (f.vx < 0 && f.wx < camX - 500)     f.wx = camX + W + 500;
  }
}

// ── guards ────────────────────────────────────────────────────────────────────
function updateGuards(dt) {
  if (caughtT > 0) return;
  for (var gi = 0; gi < GUARDS.length; gi++) {
    var g = GUARDS[gi];
    var pdx = player.x - g.wx;
    var sameDeck = (Math.abs(player.y + P_H - DECK[g.deck]) < 44);
    var inSight  = sameDeck && (Math.abs(pdx) < GUARD_SIGHT);

    if (g.state === 'patrol') {
      g.wx += g.patrolDir * GUARD_WALK * dt;
      g.face = g.patrolDir;
      if (g.wx > g.homeWx + GUARD_PATROL_RANGE) { g.patrolDir = -1; g.face = -1; }
      if (g.wx < g.homeWx - GUARD_PATROL_RANGE) { g.patrolDir =  1; g.face =  1; }
      if (inSight) { g.state = 'chase'; g.alertT = 1.4; }
    } else {
      // chase
      if (inSight) {
        g.alertT = 1.4;
        var dir = pdx > 0 ? 1 : -1;
        g.wx += dir * GUARD_CHASE * dt;
        g.face = dir;
      } else {
        g.alertT -= dt;
        if (g.alertT <= 0) { g.state = 'patrol'; }
      }
      // catch
      if (sameDeck && Math.abs(pdx) < GUARD_CATCH) {
        caughtT = CAUGHT_DUR;
        player.x = 0; player.y = DECK[1] - P_H;
        player.vx = 0; player.vy = 0;
        player.onGround = true; player.onLadder = false;
        playNoise(0.5, 0.35); shakeMag = Math.max(shakeMag, 22);
        score = Math.max(0, score - 20); scorePopT = 0.4;
        g.state = 'patrol'; g.wx = g.homeWx;
      }
    }
  }
}

function drawGuards() {
  var GW = 11, GH = 30;
  for (var gi = 0; gi < GUARDS.length; gi++) {
    var g = GUARDS[gi];
    var sx = g.wx - camX;
    var sy = DECK[g.deck];
    if (sx < -60 || sx > W + 60) continue;

    ctx.save();
    ctx.translate(sx, sy);
    // Body
    ctx.fillStyle = g.state === 'chase' ? '#cc2020' : '#8a1515';
    ctx.fillRect(-GW, -GH, GW * 2, GH);
    // Uniform stripe
    ctx.fillStyle = '#c88000';
    ctx.fillRect(-GW, -GH + 4, GW * 2, 3);
    // Head
    ctx.fillStyle = '#f0c888';
    ctx.beginPath(); ctx.arc(0, -GH - 6, 7, 0, Math.PI * 2); ctx.fill();
    // Hat
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(-8, -GH - 14, 16, 7);
    ctx.fillRect(-5, -GH - 8,  10, 2);
    // Eye
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(4 * g.face, -GH - 6, 2, 0, Math.PI * 2); ctx.fill();
    // Alert bubble
    if (g.alertT > 0 && g.state === 'chase') {
      ctx.save();
      ctx.globalAlpha = Math.min(1, g.alertT);
      ctx.fillStyle = '#ffe600';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('!', 0, -GH - 16);
      ctx.restore();
    }
    ctx.restore();
  }
}

// ── drawing ───────────────────────────────────────────────────────────────────

function drawBackground() {
  // Outer ocean (visible through hull)
  ctx.fillStyle = '#040c10';
  ctx.fillRect(0, 0, W, H);
}

function drawHull() {
  // Interior cavity
  ctx.fillStyle = '#111218';
  ctx.fillRect(0, HULL_TOP + 18, W, HULL_BOT - HULL_TOP - 36);

  // Top hull band
  ctx.fillStyle = '#1e1e26';
  ctx.fillRect(0, HULL_TOP, W, 22);
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(0, HULL_TOP, W, 8);
  // top inner rim
  ctx.fillStyle = '#181820';
  ctx.fillRect(0, HULL_TOP + 22, W, 4);

  // Bottom hull band
  ctx.fillStyle = '#1e1e26';
  ctx.fillRect(0, HULL_BOT - 22, W, 22);
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(0, HULL_BOT - 8, W, 8);
  ctx.fillStyle = '#181820';
  ctx.fillRect(0, HULL_BOT - 26, W, 4);

  // Rivets
  ctx.fillStyle = '#404055';
  var off = (((-Math.floor(camX)) % 44) + 44) % 44;
  for (var rx = off; rx < W; rx += 44) {
    ctx.beginPath(); ctx.arc(rx, HULL_TOP + 14, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx, HULL_BOT - 14, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // Vertical panel seams
  ctx.strokeStyle = '#1a1a24'; ctx.lineWidth = 1;
  var panW = 130;
  var poff = (((-Math.floor(camX)) % panW) + panW) % panW;
  for (var px2 = poff; px2 < W; px2 += panW) {
    ctx.beginPath(); ctx.moveTo(px2, HULL_TOP); ctx.lineTo(px2, HULL_BOT); ctx.stroke();
  }
}

function drawDecks() {
  for (var di = 0; di < DECK.length; di++) {
    var dy = DECK[di];
    var lx = Math.round(camX / LADDER_SPACING) * LADDER_SPACING;
    // Find all visible ladder x positions for hole drawing
    var ladXs = [];
    var minLi = Math.floor((camX - 40) / LADDER_SPACING);
    var maxLi = Math.ceil((camX + W + 40) / LADDER_SPACING);
    for (var li = minLi; li <= maxLi; li++) ladXs.push(li * LADDER_SPACING - camX);

    // Draw deck in segments, skipping ladder holes
    ctx.fillStyle = '#3a2e1e';
    for (var sx = 0; sx < W; ) {
      // find next hole
      var holeStart = W + 1, holeEnd = W + 1;
      for (var hi = 0; hi < ladXs.length; hi++) {
        var hx = ladXs[hi];
        if (hx - LADDER_W > sx && hx - LADDER_W < holeStart) {
          holeStart = hx - LADDER_W;
          holeEnd   = hx + LADDER_W;
        }
      }
      if (holeStart > sx) {
        var segEnd = Math.min(holeStart, W);
        ctx.fillRect(sx, dy, segEnd - sx, 12);
        sx = (holeStart < W) ? holeEnd : W;
      } else {
        sx = Math.max(sx + 1, holeEnd);
      }
    }

    // Deck surface highlight
    ctx.fillStyle = '#4a3c28';
    for (var sx2 = 0; sx2 < W; sx2++) {
      // simplified: just draw a highlight line segment-by-segment is too complex
      // draw full then we'll just let the hole be dark
    }
    ctx.fillStyle = '#4a3c28';
    ctx.fillRect(0, dy, W, 4);

    // Plank lines
    ctx.strokeStyle = '#2a1e10'; ctx.lineWidth = 1;
    var plankW = 62;
    var ploff = (((-Math.floor(camX) + di * 31) % plankW) + plankW) % plankW;
    for (var ppx = ploff; ppx < W; ppx += plankW) {
      ctx.beginPath(); ctx.moveTo(ppx, dy); ctx.lineTo(ppx, dy + 12); ctx.stroke();
    }

    // Edge trim
    ctx.strokeStyle = '#6a5038'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();
  }
}

function drawLadderSegment(lsx, topY, botY) {
  ctx.strokeStyle = '#7a6048'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(lsx - 9, topY); ctx.lineTo(lsx - 9, botY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lsx + 9, topY); ctx.lineTo(lsx + 9, botY); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.strokeStyle = '#a08860'; ctx.lineWidth = 2;
  for (var ry = topY + LADDER_RUNG; ry < botY; ry += LADDER_RUNG) {
    ctx.beginPath(); ctx.moveTo(lsx - 9, ry); ctx.lineTo(lsx + 9, ry); ctx.stroke();
  }
}

function drawLadders() {
  var minL = Math.floor((camX - 40) / LADDER_SPACING);
  var maxL = Math.ceil((camX + W + 40) / LADDER_SPACING);
  for (var li = minL; li <= maxL; li++) {
    var lsx = li * LADDER_SPACING - camX;
    // One segment per adjacent deck pair
    for (var di = 0; di < DECK.length - 1; di++) {
      drawLadderSegment(lsx, DECK[di], DECK[di + 1]);
    }
  }
}

function drawPortholes() {
  var portSpacing = 240;
  var minP = Math.floor((camX - 80) / portSpacing);
  var maxP = Math.ceil((camX + W + 80) / portSpacing);
  for (var pi = minP; pi <= maxP; pi++) {
    var pwx = pi * portSpacing + (Math.abs(pi % 3) === 1 ? 60 : 0);
    var psx = pwx - camX;
    // Top porthole (in top hull)
    drawPorthole(psx, HULL_TOP + 38, 20, pwx, true);
    // Bottom porthole (in bottom hull)
    drawPorthole(psx, HULL_BOT - 38, 20, pwx, false);
  }
}

function drawPorthole(sx, sy, r, wx, isTop) {
  ctx.save();
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.clip();

  // Water fill
  var og = ctx.createLinearGradient(sx, sy - r, sx, sy + r);
  if (isTop) {
    og.addColorStop(0, '#1a6080'); og.addColorStop(1, '#0a3450');
  } else {
    og.addColorStop(0, '#0a2840'); og.addColorStop(1, '#040e1c');
  }
  ctx.fillStyle = og; ctx.fillRect(sx - r, sy - r, r * 2, r * 2);

  // Fish visible through porthole
  for (var fi = 0; fi < PFISH.length; fi++) {
    var f = PFISH[fi];
    var fdx = f.wx - wx;
    var fdy = f.y - sy;
    if (Math.abs(fdx) < r * 2.5 && Math.abs(fdy) < r * 1.2) {
      var fsx = sx + fdx * 0.8;
      var fsy = sy + fdy * 0.4;
      if (fsx > sx - r - f.r && fsx < sx + r + f.r) {
        drawSmallFish(fsx, fsy, f.r * 0.75, f.col, f.vx > 0 ? 1 : -1);
      }
    }
  }

  // Shimmer
  ctx.fillStyle = 'rgba(120,200,240,0.07)';
  ctx.beginPath(); ctx.ellipse(sx - r * 0.2, sy - r * 0.38, r * 0.45, r * 0.22, -0.4, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  // Rim
  ctx.strokeStyle = '#604a38'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = '#907060'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(sx, sy, r - 2, 0, Math.PI * 2); ctx.stroke();

  // Bolts
  ctx.fillStyle = '#786050';
  for (var ba = 0; ba < 4; ba++) {
    var bang = ba * Math.PI / 2 + Math.PI / 4;
    ctx.beginPath(); ctx.arc(sx + Math.cos(bang) * (r + 3), sy + Math.sin(bang) * (r + 3), 2.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawSmallFish(sx, sy, r, col, face) {
  ctx.save();
  ctx.translate(sx, sy); ctx.scale(face, 1);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.42, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(-r - r * 0.55, -r * 0.38); ctx.lineTo(-r - r * 0.55, r * 0.38); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(r * 0.38, -r * 0.09, r * 0.19, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawProps() {
  var secW = 600;
  var minS = Math.floor((camX - 220) / secW);
  var maxS = Math.ceil((camX + W + 220) / secW);
  for (var si = minS; si <= maxS; si++) {
    var ssx = si * secW - camX;
    var st = ((si % 4) + 4) % 4;
    drawSection(ssx, DECK[0], DECK[1], DECK[2], st);
  }
}

function drawSection(ox, d0, d1, d2, type) {
  if (type === 0) {
    drawConsole(ox + 80,  d0);
    drawConsole(ox + 400, d2);
    drawPipe(ox + 200, HULL_TOP + 26, ox + 200, d0 - 4);
  } else if (type === 1) {
    drawBunk(ox + 55,  d0);
    drawBunk(ox + 140, d0);
    drawLocker(ox + 300, d1);
    drawBarrel(ox + 80,  d2);
    drawBarrel(ox + 120, d2);
  } else if (type === 2) {
    drawGaugeProp(ox + 170, d1 - 40);
    drawPipe(ox + 280, d1 - 4, ox + 280, d2 - 4);
    drawCrate(ox + 420, d2);
    drawLocker(ox + 60, d0);
  } else {
    drawCrate(ox + 80,  d1);
    drawCrate(ox + 130, d1);
    drawConsole(ox + 320, d0);
    drawBarrel(ox + 220, d2);
    drawPipe(ox + 460, HULL_TOP + 26, ox + 460, d0 - 4);
  }
}

function drawConsole(sx, dy) {
  ctx.fillStyle = '#222040'; rRect(sx - 30, dy - 42, 60, 42, 4); ctx.fill();
  ctx.strokeStyle = '#504878'; ctx.lineWidth = 1; rRect(sx - 30, dy - 42, 60, 42, 4); ctx.stroke();
  var scr = Math.floor(gt * 0.8) % 2 === 0;
  ctx.fillStyle = scr ? '#002a18' : '#003820';
  rRect(sx - 24, dy - 36, 48, 26, 2); ctx.fill();
  // scan line
  ctx.strokeStyle = 'rgba(0,200,80,0.3)'; ctx.lineWidth = 1;
  var scanY = dy - 36 + ((gt * 18) % 26);
  ctx.beginPath(); ctx.moveTo(sx - 24, scanY); ctx.lineTo(sx + 24, scanY); ctx.stroke();
  // buttons
  var btnCols = ['#ff2020', '#20ff40', '#2060ff', '#ffaa00'];
  for (var bi = 0; bi < 4; bi++) {
    ctx.fillStyle = btnCols[bi];
    ctx.beginPath(); ctx.arc(sx - 18 + bi * 12, dy - 7, 3, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBunk(sx, dy) {
  ctx.fillStyle = '#3a2818'; ctx.fillRect(sx - 26, dy - 36, 52, 9);
  ctx.fillStyle = '#4e3820'; ctx.fillRect(sx - 24, dy - 34, 48, 5);
  ctx.fillStyle = '#cbbaa8'; rRect(sx - 22, dy - 38, 20, 9, 2); ctx.fill();
  ctx.fillStyle = '#8a7860'; rRect(sx - 2, dy - 38, 26, 9, 2); ctx.fill();
  ctx.fillStyle = '#2a1e10';
  ctx.fillRect(sx - 24, dy - 27, 4, 27); ctx.fillRect(sx + 20, dy - 27, 4, 27);
}

function drawLocker(sx, dy) {
  ctx.fillStyle = '#263438'; rRect(sx - 15, dy - 52, 30, 52, 3); ctx.fill();
  ctx.strokeStyle = '#405860'; ctx.lineWidth = 1; rRect(sx - 15, dy - 52, 30, 52, 3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx, dy - 52); ctx.lineTo(sx, dy); ctx.stroke();
  ctx.fillStyle = '#806858';
  ctx.beginPath(); ctx.arc(sx - 6, dy - 26, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx + 6, dy - 26, 2.5, 0, Math.PI * 2); ctx.fill();
}

function drawBarrel(sx, dy) {
  ctx.fillStyle = '#5a3818'; rRect(sx - 11, dy - 30, 22, 30, 4); ctx.fill();
  ctx.strokeStyle = '#8a6030'; ctx.lineWidth = 1.5; rRect(sx - 11, dy - 30, 22, 30, 4); ctx.stroke();
  ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx - 12, dy - 20); ctx.lineTo(sx + 12, dy - 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx - 12, dy - 10); ctx.lineTo(sx + 12, dy - 10); ctx.stroke();
}

function drawCrate(sx, dy) {
  ctx.fillStyle = '#6a5030'; rRect(sx - 20, dy - 30, 40, 30, 3); ctx.fill();
  ctx.strokeStyle = '#8a7040'; ctx.lineWidth = 1.5; rRect(sx - 20, dy - 30, 40, 30, 3); ctx.stroke();
  ctx.strokeStyle = '#4a3820'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx - 20, dy - 15); ctx.lineTo(sx + 20, dy - 15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx, dy - 30); ctx.lineTo(sx, dy); ctx.stroke();
}

function drawPipe(sx1, sy1, sx2, sy2) {
  ctx.strokeStyle = '#505860'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
  ctx.strokeStyle = '#6a7888'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
  ctx.lineCap = 'butt';
}

function drawGaugeProp(sx, sy) {
  ctx.fillStyle = '#2a2838'; rRect(sx - 18, sy - 18, 36, 36, 5); ctx.fill();
  ctx.strokeStyle = '#4a4860'; ctx.lineWidth = 1; rRect(sx - 18, sy - 18, 36, 36, 5); ctx.stroke();
  ctx.fillStyle = '#16141e'; ctx.beginPath(); ctx.arc(sx, sy, 13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#6080a0'; ctx.lineWidth = 1.5; ctx.stroke();
  var ang = -2.1 + ((gt * 0.35) % (Math.PI * 1.4));
  ctx.strokeStyle = '#ff5040'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.cos(ang) * 10, sy + Math.sin(ang) * 10); ctx.stroke();
  ctx.fillStyle = '#808090'; ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
}

function drawPlayer() {
  var sx = player.x - camX;
  var sy = player.y;
  var f  = player.face;

  var sqY = 1, sqX = 1;
  if (landSqT > 0) {
    sqY = 1 - landSqT * 1.4;
    sqX = Math.min(1.5, 1 / Math.max(0.4, sqY));
  } else if ((K['ShiftLeft'] || K['ShiftRight']) && player.onGround && Math.abs(player.vx) > 5) {
    sqX = 1.14; sqY = 0.9;
  }

  ctx.save();
  ctx.translate(sx + P_W * 0.5 * f, sy + P_H);
  ctx.scale(f * sqX, sqY);

  // Walk cycle
  var walking = player.onGround && Math.abs(player.vx) > 5;
  var wc = walking ? Math.sin(gt * 9) : 0;

  // Legs
  ctx.fillStyle = '#1a3a5a';
  ctx.fillRect(-5, -14 + wc * 4, 4, 14);
  ctx.fillRect(1,  -14 - wc * 4, 4, 14);
  // Boots
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(-6, -2, 5, 4);
  ctx.fillRect(1,  -2, 5, 4);

  // Body / wetsuit
  ctx.fillStyle = '#1a4a6a';
  ctx.fillRect(-6, -P_H, 12, 16);
  // Stripe
  ctx.fillStyle = '#2288cc';
  ctx.fillRect(-5, -P_H + 5, 10, 4);
  // Belt
  ctx.fillStyle = '#3a2a10';
  ctx.fillRect(-6, -P_H + 16, 12, 3);

  // Arm (forward)
  ctx.fillStyle = '#1a4a6a';
  if (player.onLadder) {
    ctx.fillRect(5, -P_H + 2 + wc * 4, 7, 3);
    ctx.fillRect(5, -P_H + 8 - wc * 4, 7, 3);
  } else {
    ctx.fillRect(5, -P_H + 4 + wc * 3, 7, 3);
  }

  // Head
  ctx.fillStyle = '#f0c888';
  ctx.beginPath(); ctx.arc(0, -P_H - 3, 7, 0, Math.PI * 2); ctx.fill();
  // Bandana (pirate!)
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-7, -P_H - 8, 14, 5);
  ctx.fillStyle = '#aa0000';
  ctx.fillRect(5, -P_H - 9, 4, 3); // knot
  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(4, -P_H - 3, 1.8, 0, Math.PI * 2); ctx.fill();
  // Eyepatch on other side
  ctx.fillStyle = '#111';
  ctx.fillRect(-6, -P_H - 6, 5, 3);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-6, -P_H - 4); ctx.lineTo(-1, -P_H - 4); ctx.stroke();

  ctx.restore();
}

function drawTouchControls() {
  if (!isTouch()) return;
  var labels = { left: '<', right: '>', up: '^', dn: 'v', run: 'RUN' };
  for (var i = 0; i < BTNS.length; i++) {
    var b = BTNS[i];
    var on = !!K[b.key];
    ctx.save();
    ctx.globalAlpha = on ? 0.88 : 0.42;
    ctx.fillStyle   = on ? 'rgba(255,255,255,0.9)' : 'rgba(40,60,90,0.7)';
    ctx.strokeStyle = 'rgba(130,180,220,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = on ? '#0a2030' : '#80b0d0';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(labels[b.id], b.cx, b.cy);
    ctx.restore();
  }
}

function drawDoor(sx, dy, isNear) {
  // Frame
  ctx.fillStyle = '#4a3424'; rRect(sx - 16, dy - 54, 32, 54, 2); ctx.fill();
  ctx.strokeStyle = isNear ? '#d0a050' : '#6a5040'; ctx.lineWidth = 1.5;
  rRect(sx - 16, dy - 54, 32, 54, 2); ctx.stroke();
  // Panel
  ctx.fillStyle = '#3a2818'; rRect(sx - 12, dy - 50, 24, 44, 1); ctx.fill();
  ctx.strokeStyle = '#4a3820'; ctx.lineWidth = 0.8;
  rRect(sx - 12, dy - 50, 24, 44, 1); ctx.stroke();
  // Knob
  ctx.fillStyle = '#b09050';
  ctx.beginPath(); ctx.arc(sx + 7, dy - 28, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#806030';
  ctx.beginPath(); ctx.arc(sx + 7, dy - 28, 1.5, 0, Math.PI * 2); ctx.fill();
  // "Enter" hint when near
  if (isNear) {
    ctx.save(); ctx.globalAlpha = 0.75 + 0.25 * Math.sin(gt * 5);
    ctx.fillStyle = '#d0a050'; ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('UP to enter', sx, dy - 60);
    ctx.restore();
  }
}

function drawDoors() {
  for (var di = 0; di < DOORS.length; di++) {
    var d = DOORS[di];
    var sx = d.wx - camX;
    if (sx < -60 || sx > W + 60) continue;
    var dy = DECK[d.deck];
    var isNear = (Math.abs(player.x - d.wx) < 30 && Math.abs(player.y + P_H - dy) < 40);
    drawDoor(sx, dy, isNear);
  }
}

function drawSnoodOverlay() {
  if (!snoodFound) return;
  ctx.save();
  ctx.fillStyle = 'rgba(10,5,20,0.88)';
  rRect(W/2 - 200, H/2 - 72, 400, 144, 10); ctx.fill();
  ctx.strokeStyle = '#c0a040'; ctx.lineWidth = 2;
  rRect(W/2 - 200, H/2 - 72, 400, 144, 10); ctx.stroke();
  ctx.fillStyle = '#ffe090'; ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText("You found Mr. Snood's office!", W/2, H/2 - 32);
  ctx.fillStyle = '#c8a860'; ctx.font = '12px monospace';
  ctx.fillText('The popcorn smell is overwhelming.', W/2, H/2 - 6);
  ctx.fillStyle = '#806840'; ctx.font = '10px monospace';
  ctx.fillText('More to come here...', W/2, H/2 + 22);
  ctx.restore();
}

function drawWrongDoorMsg() {
  if (snoodMsgT <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, snoodMsgT);
  ctx.fillStyle = 'rgba(20,10,5,0.80)';
  rRect(W/2 - 90, H/2 - 18, 180, 36, 6); ctx.fill();
  ctx.fillStyle = '#c08040'; ctx.font = '12px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Not this one...', W/2, H/2);
  ctx.restore();
}

function drawHUD() {
  // Stage title
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  rRect(W / 2 - 70, 8, 140, 22, 4); ctx.fill();
  ctx.fillStyle = '#c0a040';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PIRATE SUB', W / 2, 20);

  // Controls hint (desktop)
  if (!isTouch()) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    rRect(8, 8, 260, 20, 3); ctx.fill();
    ctx.fillStyle = 'rgba(130,180,200,0.7)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('ARROWS move/climb  SPACE jump  UP/DN on ladder', 14, 18);
  }

  // Deck indicator
  var curDeck = '?';
  for (var di = 0; di < DECK.length; di++) {
    if (Math.abs(player.y + P_H - DECK[di]) < 30) { curDeck = di + 1; break; }
  }
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rRect(W - 88, 8, 80, 20, 3); ctx.fill();
  ctx.fillStyle = '#88aacc';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText('DECK ' + curDeck + '/3', W - 12, 18);

  // Score
  var scPop = scorePopT > 0;
  var scScale = scPop ? (1 + scorePopT * 0.3) : 1;
  ctx.save();
  ctx.translate(W - 12, 38);
  ctx.scale(scScale, scScale);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rRect(-88, -10, 88, 20, 3); ctx.fill();
  ctx.fillStyle = scPop ? '#ffe066' : '#c0a040';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText('SCORE ' + score, -4, 0);
  ctx.restore();

  // Popcorn scent meter
  var scent = snoodScent();
  var mw = 110, mh = 14, mx = W/2 - mw/2, my = H - 28;
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  rRect(mx - 2, my - 2, mw + 4 + 60, mh + 4, 3); ctx.fill();
  // Bar fill — yellow-orange like popcorn
  var barW = Math.round(scent * mw);
  if (barW > 0) {
    var sc = scent;
    var barCol = sc > 0.7 ? '#ffcc22' : sc > 0.35 ? '#e08820' : '#885510';
    ctx.fillStyle = barCol;
    rRect(mx, my, barW, mh, 2); ctx.fill();
  }
  // Bar outline
  ctx.strokeStyle = 'rgba(180,140,60,0.6)'; ctx.lineWidth = 1;
  rRect(mx, my, mw, mh, 2); ctx.stroke();
  // Label
  ctx.fillStyle = scent > 0.05 ? '#e0b840' : '#706040';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('POPCORN SCENT', mx + mw + 6, my + mh/2);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(Math.round(shakeX), Math.round(shakeY));
  drawBackground();
  drawHull();
  drawProps();
  drawPortholes();
  drawDecks();
  drawLadders();
  drawDoors();
  drawGuards();
  drawPlayer();
  ctx.restore();
  drawTouchControls();
  drawHUD();
  drawWrongDoorMsg();
  drawSnoodOverlay();
  // Caught banner
  if (caughtT > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, caughtT * 3);
    ctx.fillStyle = 'rgba(160,15,15,0.78)';
    ctx.fillRect(0, H / 2 - 46, W, 92);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('CAUGHT!', W / 2, H / 2);
    ctx.restore();
  }
}

// ── game loop ─────────────────────────────────────────────────────────────────
var SIM = 1 / 60, debt = 0, lastTs = 0;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  var el = Math.min((ts - lastTs) / 1000, SIM * 6);
  lastTs = ts;
  debt += el;
  while (debt >= SIM) { update(SIM); debt -= SIM; }
  render();
  var ks = Object.keys(JP);
  for (var i = 0; i < ks.length; i++) JP[ks[i]] = false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
