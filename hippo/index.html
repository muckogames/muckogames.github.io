<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pflueger and the Hippo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%F0%9F%A6%9B%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:
    radial-gradient(circle at top,#f2f4ff 0,#c8d0ed 20%,#7e6294 58%,#23101f 100%);
  display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;
  position:relative;
}
body::before{
  content:'';
  position:fixed;top:0;right:0;bottom:0;left:0;pointer-events:none;opacity:.3;
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),transparent 30%),
    repeating-linear-gradient(135deg,rgba(255,255,255,.07) 0 12px,rgba(0,0,0,.03) 12px 24px);
}
#stage{
  position:relative;display:block;border:4px solid #f3d59d;border-radius:18px;overflow:hidden;background:#fcf7ef;
  box-shadow:
    0 30px 90px rgba(18,8,28,.45),
    0 0 0 10px rgba(255,244,220,.12),
    inset 0 0 0 3px rgba(124,74,35,.35);
}
#bgc,#gc{
  display:block;position:absolute;top:0;right:0;bottom:0;left:0;width:100%;height:100%;
}
#bgc{pointer-events:none}
#gc{cursor:default;background:transparent;touch-action:none}

<body>
<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="gc"></canvas>
</div>
<script src="dialog-data.js"></script>
<script>
'use strict';
/* ===================================================================
   PFLUEGER AND THE HIPPO  —  a web game
   =================================================================== */
const W=800,H=560;
const MAX_RENDER_DPR=1.5;
const PLAYER_SPEED_SCALE=1.15;
const LOW_FPS_PHASES=new Set(['title','diff','story','dialog_harness','credits']);
const DIALOG_DATA=window.HIPPO_DIALOG;
const urlParams=new URLSearchParams(window.location.search);
const DEBUG_HARNESS=urlParams.get('harness');
const stage=document.getElementById('stage');
const bgCanvas=document.getElementById('bgc');
const canvas=document.getElementById('gc');
const bgCtx=bgCanvas.getContext('2d');
const ctx=canvas.getContext('2d');
let canvasScale=1;
const backdropCache=new Map();
let activeBackdropKey=null;

function configureCanvasContext(targetCtx){
  targetCtx.lineJoin='round';
  targetCtx.lineCap='round';
  targetCtx.imageSmoothingEnabled=true;
}

function renderDpr(){
  return Math.min(MAX_RENDER_DPR,Math.max(1,window.devicePixelRatio||1));
}
function clearBackdropCache(){
  backdropCache.clear();
  clearBackdropLayer();
}
function clearBackdropLayer(){
  bgCtx.clearRect(0,0,W,H);
  activeBackdropKey=null;
}
function snapshotBackdrop(){
  const cached=document.createElement('canvas');
  cached.width=canvas.width;
  cached.height=canvas.height;
  const cachedCtx=cached.getContext('2d');
  cachedCtx.imageSmoothingEnabled=true;
  cachedCtx.drawImage(canvas,0,0);
  return cached;
}
function presentBackdrop(cached){
  bgCtx.clearRect(0,0,W,H);
  bgCtx.drawImage(cached,0,0,cached.width,cached.height,0,0,W,H);
}
function drawCachedBackdrop(key,drawFn){
  let cached=backdropCache.get(key);
  if(!cached){
    drawFn();
    cached=snapshotBackdrop();
    backdropCache.set(key,cached);
    ctx.clearRect(0,0,W,H);
  }
  if(activeBackdropKey!==key){
    presentBackdrop(cached);
    activeBackdropKey=key;
  }
}

function resize(){
  const dpr=renderDpr();
  const s=Math.min(window.innerWidth/(W+6),(window.innerHeight-6)/(H+6));
  canvasScale=s;
  stage.style.width=Math.max(1,Math.round(W*s))+'px';
  stage.style.height=Math.max(1,Math.round(H*s))+'px';
  bgCanvas.width=Math.max(1,Math.round(W*dpr));
  bgCanvas.height=Math.max(1,Math.round(H*dpr));
  canvas.width=Math.max(1,Math.round(W*dpr));
  canvas.height=Math.max(1,Math.round(H*dpr));
  bgCtx.setTransform(dpr,0,0,dpr,0,0);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  configureCanvasContext(bgCtx);
  configureCanvasContext(ctx);
  clearBackdropCache();
}
window.addEventListener('resize',resize); resize();

/* ─── INPUT ─── */
const K={},JP={};
document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true; K[e.code]=true; cheatKey(e.key);});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function eat(c){if(JP[c]){JP[c]=false;return true;}return false;}
let mx=W/2,my=H/2,mclk=false;
const TOUCH_UI=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0||(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
const touchState={dirs:new Set(),buttons:new Set()};
let touchSuppressUntil=0;
canvas.addEventListener('click',e=>{
  if(performance.now()<touchSuppressUntil)return;
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);
  my=(e.clientY-r.top)*(H/r.height);
  mclk=true;
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);
  my=(e.clientY-r.top)*(H/r.height);
});
function mobileControlsOn(){
  return TOUCH_UI&&(phase==='escape'||phase==='stealth'||phase==='closet_game');
}
function mobileLayout(){
  const buttons=[];
  if(phase==='escape'||phase==='stealth'){
    buttons.push({id:'action',cx:W-88,cy:H-90,r:32,label:'A',sub:phase==='escape'?'Talk':'Go'});
    if(phase==='escape'){
      buttons.push({id:'nik',cx:W-150,cy:H-142,r:26,label:'N',sub:'Nik',
        disabled:!(esc&&esc.nikReady&&!esc.nikActive)});
    }
  } else if(phase==='closet_game'){
    buttons.push({id:'rotate',cx:W-92,cy:H-92,r:34,label:'R',sub:'Rotate'});
  }
  return {
    dpad:(phase==='escape'||phase==='stealth')?{cx:92,cy:H-92,r:34}:null,
    buttons,
  };
}
function getMobileDpadDir(tx,ty,dpad){
  const dx=tx-dpad.cx,dy=ty-dpad.cy;
  if(Math.hypot(dx,dy)>dpad.r*2.15)return null;
  if(Math.abs(dx)>=Math.abs(dy))return dx<0?'left':'right';
  return dy<0?'up':'down';
}
function hitMobileControl(tx,ty){
  if(!mobileControlsOn())return null;
  const layout=mobileLayout();
  for(const btn of layout.buttons){
    if(Math.hypot(tx-btn.cx,ty-btn.cy)<=btn.r)return{kind:'button',id:btn.id};
  }
  if(layout.dpad){
    const dir=getMobileDpadDir(tx,ty,layout.dpad);
    if(dir)return{kind:'dpad',dir};
  }
  return null;
}
function applyTouchDirs(dirs){
  touchState.dirs=dirs;
  K.ArrowLeft=dirs.has('left');
  K.ArrowRight=dirs.has('right');
  K.ArrowUp=dirs.has('up');
  K.ArrowDown=dirs.has('down');
}
function fireMobileButton(id){
  if(id==='action'){
    JP.Space=true;
    JP.Enter=true;
    JP.KeyE=true;
    sfx.click();
  } else if(id==='nik'){
    if(esc&&esc.nikReady&&!esc.nikActive){JP.KeyN=true; sfx.click();}
    else sfx.deny();
  } else if(id==='rotate'){
    JP.KeyR=true;
    sfx.click();
  }
}
function syncTouchControls(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  const dirs=new Set(),buttons=new Set();
  Array.from(e.touches).forEach(tch=>{
    const tx=(tch.clientX-rect.left)*sx,ty=(tch.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(!hit)return;
    if(hit.kind==='dpad')dirs.add(hit.dir);
    else buttons.add(hit.id);
  });
  buttons.forEach(id=>{if(!touchState.buttons.has(id))fireMobileButton(id);});
  touchState.buttons=buttons;
  applyTouchDirs(dirs);
}
canvas.addEventListener('touchstart',e=>{
  touchSuppressUntil=performance.now()+500;
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  Array.from(e.changedTouches).forEach(tch=>{
    const tx=(tch.clientX-rect.left)*sx,ty=(tch.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(!hit&&!mclk){mx=tx;my=ty;mclk=true;}
  });
  syncTouchControls(e);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  syncTouchControls(e);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  syncTouchControls(e);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchcancel',e=>{
  syncTouchControls(e);
  e.preventDefault();
},{passive:false});
window.addEventListener('blur',()=>{
  touchState.buttons.clear();
  applyTouchDirs(new Set());
});

/* ─── CHEAT CODES ─── */
let cbuf='';
let activatedCheats=new Set();
let cheatScrollShown=false;
let cheatScrollPhase=null; // phase to return to after dismissing scroll
const CHEAT_LORE={
  LEKAN:        'The Panda Mastermind himself. Planner. Visionary. Surprisingly chill once you meet him.',
  NIKNIK:       'Nik the Seal. Loudest creature in the zoo by a factor of eleven. Use wisely.',
  BASIL:        'Basil the zookeeper. Would rather be reading. Not really cut out for this.',
  PRASTHEKOALA: 'Pras the Koala. Currently in hour 19 of a 22-hour nap. He\u2019s fine.',
  MARGARITAVILLE:'Unlocked by someone who knows what\u2019s up.',
  SKREEEEM:     'The sound Nik makes. Phonetically accurate. Scientifically terrifying.',
  CLOSETLIFE:   'The closet sees all. The closet knows all. The closet judges no one.',
  PBANDJ:       'Pflueger\u2019s post-school ritual. Creamy, not crunchy. This is not negotiable.',
  SAMSTER:      'Samster the hamster. Master of cage locks and sneaky shortcuts. He says hi.',
  DUCKDIEB:     'Duck Dieb, the masked mallard thief. He is watching. He is always watching.',
  SATURNV:      'Saturn V, honorary crew of the R.M.A.S. Mucko. Somewhere, Houston is smiling.',
};
const CHEATS={
  MARGARITAVILLE:()=>startPhase('epilogue'),
  LEKAN:()=>startPhase('escape'),
  NIKNIK:()=>{if(esc)esc.cheatFrozen=true;},
  BASIL:()=>{if(esc)esc.cheatInvis=true;},
  PRASTHEKOALA:()=>{if(esc)esc.cheatSlow=0.2;},
  SKREEEEM:()=>{if(esc&&esc.nikReady&&!esc.nikActive)activateNik(true);},
  CLOSETLIFE:()=>startPhase('closet_game'),
  PBANDJ:()=>startPhase('stealth'),
  SAMSTER:()=>triggerSamsterEgg(),
  DUCKDIEB:()=>triggerDuckDiebEgg(),
  SATURNV:()=>triggerSaturnVEgg(),
};
function cheatKey(k){
  if(k.length!==1)return;
  cbuf=(cbuf+k.toUpperCase()).slice(-20);
  for(const code of Object.keys(CHEATS)){
    if(cbuf.endsWith(code)){
      activatedCheats.add(code);
      CHEATS[code]();
      cbuf='';
      if(activatedCheats.size>=3&&!cheatScrollShown){
        cheatScrollShown=true;
        setTimeout(()=>showCheatScroll(),400);
      }
      return;
    }
  }
}
function showCheatScroll(){
  cheatScrollPhase=phase;
  phase='cheatscroll';
}
function updateCheatScroll(){
  if(eat('Space')||eat('Enter')||eat('Escape')||mclk){
    mclk=false;
    phase=cheatScrollPhase||'title';
  }
}
function drawCheatScroll(){
  // Dim overlay
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.fillRect(0,0,W,H);

  // Parchment background
  const px=60,py=30,pw=W-120,ph=H-60;
  ctx.fillStyle='#f5e6c8';
  roundRect(ctx,px,py,pw,ph,14);
  ctx.fill();
  ctx.strokeStyle='#b8964a';
  ctx.lineWidth=3;
  ctx.stroke();

  // Inner border
  ctx.strokeStyle='rgba(160,120,50,0.4)';
  ctx.lineWidth=1.5;
  roundRect(ctx,px+8,py+8,pw-16,ph-16,10);
  ctx.stroke();

  // Header
  ctx.fillStyle='#5c3a0a';
  ctx.font='bold 20px Georgia,serif';
  ctx.textAlign='center';
  ctx.fillText('\uD83D\uDCDC  THE KEEPER\u2019S LEDGER  \uD83D\uDCDC',W/2,py+38);

  ctx.font='italic 11px Georgia,serif';
  ctx.fillStyle='#8a6030';
  ctx.fillText('Secrets unlocked this session: '+activatedCheats.size+' of '+Object.keys(CHEAT_LORE).length,W/2,py+56);

  // Divider
  ctx.strokeStyle='#c8a050';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+20,py+66); ctx.lineTo(px+pw-20,py+66); ctx.stroke();

  // Entries
  const codes=Object.keys(CHEAT_LORE);
  const entryH=Math.floor((ph-90)/codes.length);
  codes.forEach((code,i)=>{
    const ex=px+24, ey=py+76+i*entryH;
    const known=activatedCheats.has(code);
    if(known){
      ctx.font='bold 12px monospace';
      ctx.fillStyle='#7a3800';
      ctx.textAlign='left';
      ctx.fillText(code,ex,ey+14);
      ctx.font='italic 11px Georgia,serif';
      ctx.fillStyle='#5c3a0a';
      const lore=CHEAT_LORE[code];
      // word-wrap if needed
      wrapText(ctx,lore,ex+120,ey+14,pw-160,14,'#5c3a0a','11px Georgia,serif');
    } else {
      ctx.font='bold 12px monospace';
      ctx.fillStyle='#bba070';
      ctx.textAlign='left';
      ctx.fillText('\u2014\u2014\u2014\u2014\u2014\u2014\u2014',ex,ey+14);
      ctx.font='italic 11px Georgia,serif';
      ctx.fillStyle='#bba070';
      ctx.fillText('(not yet discovered)',ex+120,ey+14);
    }
  });

  // Footer
  ctx.font='bold 12px monospace';
  ctx.fillStyle='#7a5020';
  ctx.textAlign='center';
  ctx.fillText('[ SPACE / ENTER to close ]',W/2,py+ph-14);
  ctx.restore();
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}
function wrapText(c,text,x,y,maxW,lineH,col,font){
  c.font=font; c.fillStyle=col; c.textAlign='left';
  const words=text.split(' ');
  let line='';
  let cy=y;
  for(let i=0;i<words.length;i++){
    const test=line+(line?' ':'')+words[i];
    if(c.measureText(test).width>maxW&&line){
      c.fillText(line,x,cy); line=words[i]; cy+=lineH;
    } else { line=test; }
  }
  if(line) c.fillText(line,x,cy);
}

/* ─── DIFFICULTY ─── */
const DIFFS=[
  {id:'easy',  label:'Jimmy Buffett',      col:'#66cc66', spd:0.65, vis:75,  nikDur:7,   desc:'Keepers are slow and near-sighted.'},
  {id:'medium',label:'Mischievous Fellow', col:'#e8b820', spd:1.2,  vis:110, nikDur:5,   desc:'A fair challenge for any adventurer.'},
  {id:'hard',  label:'Panda Mastermind',   col:'#dd4444', spd:1.9,  vis:155, nikDur:3.5, desc:'Lekan did not plan for easy mode.'},
];
let diff=DIFFS[1];

/* ─── GLOBAL STATE ─── */
let phase='title';
let t=0;       // tick counter
let sceneIdx=0;
let esc=null;  // escape game state
let cln=null;  // cleanup game state
let fade={a:0,dir:0,cb:null}; // screen fade
const SUSP_MAX=100;
let suspicion=0;
let suspNotice={timer:0,text:'',good:false};

function startPhase(p){
  if(p==='escape'){initEscape();}
  else if(p==='stealth'){initStealth();}
  else if(p==='cleanup'){initCleanup();}
  else if(p==='closet_game'){initCloset();}
  else if(p==='dialog_harness'){initDialogHarness();}
  else if(p==='epilogue'){sceneIdx=findScene('epilogue_start');}
  phase=p;
}
// ── Local high-score helpers ──────────────────────────────────────────────
function getHS(key){try{return JSON.parse(localStorage.getItem(key)||'[]');}catch{return[];}}
function saveHS(key,entry,limit=10){
  const sc=getHS(key);
  sc.push(entry);
  sc.sort((a,b)=>b.score-a.score);
  const trimmed=sc.slice(0,limit);
  localStorage.setItem(key,JSON.stringify(trimmed));
  return trimmed.findIndex(e=>e.score===entry.score&&e.date===entry.date)+1;
}
let hippoScoreSaved=false;

function resetRun(){
  sceneIdx=0;
  suspicion=0;
  suspNotice={timer:0,text:'',good:false};
  esc=null;
  stl=null;
  cln=null;
  cls=null;
  hippoScoreSaved=false;
}
function findScene(id){
  const idx=SCENES.findIndex(s=>s.id===id);
  return idx>=0?idx:0;
}

/* ─── DRAW UTILITIES ─── */
const TAU=Math.PI*2;
function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function circ(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();}
function ellipse(x,y,rx,ry,c,rot){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,TAU);ctx.fill();}
function line(x1,y1,x2,y2,c,w){
  ctx.strokeStyle=c;ctx.lineWidth=w||2;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}
function strokeCirc(x,y,r,c,w){
  ctx.strokeStyle=c;ctx.lineWidth=w||2;
  ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.stroke();
}
function strokeEllipse(x,y,rx,ry,c,w,rot){
  ctx.strokeStyle=c;ctx.lineWidth=w||2;
  ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,TAU);ctx.stroke();
}
function poly(pts,fill,stroke,sw){
  if(!pts.length)return;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function txt(s,x,y,c,sz,align,font){
  ctx.fillStyle=c; ctx.font=`${sz||16}px ${font||'Georgia'}`;
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  ctx.fillText(s,x,y);
}
function txtW(s,sz,font){
  ctx.font=`${sz||16}px ${font||'Georgia'}`;
  return ctx.measureText(s).width;
}
function roundedRectPath(x,y,w,h,r){
  const rr=Math.max(0,Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2));
  const x2=x+w,y2=y+h;
  ctx.beginPath();
  if(!rr){
    ctx.rect(x,y,w,h);
    return;
  }
  ctx.moveTo(x+rr,y);
  ctx.lineTo(x2-rr,y);
  ctx.arcTo(x2,y,x2,y+rr,rr);
  ctx.lineTo(x2,y2-rr);
  ctx.arcTo(x2,y2,x2-rr,y2,rr);
  ctx.lineTo(x+rr,y2);
  ctx.arcTo(x,y2,x,y2-rr,rr);
  ctx.lineTo(x,y+rr);
  ctx.arcTo(x,y,x+rr,y,rr);
  ctx.closePath();
}
function rnd(x,y,w,h,r,fill,stroke,sw){
  if(typeof ctx.roundRect==='function'){
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,r||0);
  } else roundedRectPath(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function cloneWith(base,extras){
  const out={};
  let k;
  for(k in base){
    if(Object.prototype.hasOwnProperty.call(base,k))out[k]=base[k];
  }
  for(k in extras){
    if(Object.prototype.hasOwnProperty.call(extras,k))out[k]=extras[k];
  }
  return out;
}

/* ─── roundRect polyfill (iOS 12 Safari lacks CanvasRenderingContext2D.roundRect) ─── */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

/* ─── EXTRA DRAW HELPERS ─── */
function softShadow(x,y,rx,ry,alpha){
  ctx.save();
  ctx.globalAlpha=alpha==null?0.22:alpha;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU); ctx.fill();
  ctx.restore();
}
function glowText(s,x,y,col,sz,align,font,glowCol,glowSz){
  ctx.save();
  ctx.shadowColor=glowCol||'rgba(0,0,0,0.55)';
  ctx.shadowBlur=glowSz||12;
  ctx.fillStyle=col;
  ctx.font=(sz||16)+'px '+(font||'Georgia');
  ctx.textAlign=align||'left';
  ctx.textBaseline='alphabetic';
  ctx.fillText(s,x,y);
  ctx.restore();
}
function gradFill(x,y,w,h,stops,horizontal){
  const g=horizontal
    ? ctx.createLinearGradient(x,y,x+w,y)
    : ctx.createLinearGradient(x,y,x,y+h);
  for(let i=0;i<stops.length;i++)g.addColorStop(stops[i][0],stops[i][1]);
  ctx.fillStyle=g;
  ctx.fillRect(x,y,w,h);
}
function radialGlow(x,y,r,innerCol,outerCol){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,innerCol);
  g.addColorStop(1,outerCol);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill();
}
function pulse(tick,min,max,speed){
  const s=(Math.sin((tick||0)*(speed||0.08))+1)/2;
  return (min||0)+s*((max||1)-(min||0));
}
// Screen transition helper: startFade(toBlack, ms, cb)
function startFade(toBlack,ms,cb){
  fade.a=toBlack?0:1;
  fade.dir=toBlack?1:-1;
  fade.speed=1/(Math.max(60,ms||360)/1000);
  fade.cb=cb||null;
}
function updateFade(dt){
  if(!fade.dir)return;
  fade.a+=fade.dir*(fade.speed||3)*dt;
  if((fade.dir>0&&fade.a>=1)||(fade.dir<0&&fade.a<=0)){
    fade.a=Math.max(0,Math.min(1,fade.a));
    const cb=fade.cb; fade.cb=null; fade.dir=0;
    if(cb)cb();
  }
}
function drawFade(){
  if(!fade.a)return;
  ctx.save();
  ctx.fillStyle='rgba(8,4,16,'+fade.a.toFixed(3)+')';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

/* ─── AUDIO SYSTEM (all synthesized, no samples) ─── */
const sfx=(function(){
  let actx=null, master=null, muted=false, lastType=0;
  try{ muted=(window.localStorage&&localStorage.getItem('hippo_mute')==='1'); }catch(e){}
  function ensure(){
    if(actx)return actx;
    try{
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return null;
      actx=new AC();
      master=actx.createGain();
      master.gain.value=0.55;
      master.connect(actx.destination);
    }catch(e){actx=null;}
    return actx;
  }
  function unlock(){
    const a=ensure();
    if(a&&a.state!=='running'){try{a.resume();}catch(e){}}
  }
  function tone(opts){
    const a=ensure(); if(!a||muted)return;
    const now=a.currentTime;
    const osc=a.createOscillator();
    const g=a.createGain();
    osc.type=opts.type||'sine';
    osc.frequency.setValueAtTime(opts.freq||440,now);
    if(opts.freq2){
      osc.frequency.exponentialRampToValueAtTime(Math.max(20,opts.freq2),now+(opts.dur||0.1));
    }
    const vol=Math.max(0.0001,opts.vol==null?0.18:opts.vol);
    const dur=opts.dur||0.18;
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(vol,now+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now+dur+0.03);
  }
  function noiseBurst(opts){
    const a=ensure(); if(!a||muted)return;
    const now=a.currentTime;
    const dur=opts.dur||0.25;
    const buf=a.createBuffer(1,Math.max(1,Math.floor(a.sampleRate*dur)),a.sampleRate);
    const ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1);
    const src=a.createBufferSource(); src.buffer=buf;
    const bi=a.createBiquadFilter();
    bi.type=opts.filter||'lowpass';
    bi.frequency.value=opts.cut||800;
    const g=a.createGain();
    const vol=Math.max(0.0001,opts.vol==null?0.12:opts.vol);
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(vol,now+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    src.connect(bi); bi.connect(g); g.connect(master);
    src.start(now); src.stop(now+dur+0.03);
  }
  return {
    unlock:unlock,
    setMute:function(m){muted=!!m;try{if(window.localStorage)localStorage.setItem('hippo_mute',muted?'1':'0');}catch(e){}},
    isMuted:function(){return muted;},
    toggleMute:function(){this.setMute(!muted);return muted;},
    ctx:function(){return ensure();},
    click:function(){tone({type:'square',freq:720,freq2:540,dur:0.06,vol:0.07});},
    confirm:function(){tone({type:'triangle',freq:523,dur:0.09,vol:0.13});setTimeout(function(){tone({type:'triangle',freq:784,dur:0.13,vol:0.11});},70);},
    deny:function(){tone({type:'sawtooth',freq:220,freq2:120,dur:0.18,vol:0.09});},
    typewriter:function(){
      // throttle so it's not abrasive
      const now=performance.now();
      if(now-lastType<18)return;
      lastType=now;
      tone({type:'square',freq:1350+Math.random()*420,dur:0.013,vol:0.032});
    },
    step:function(){noiseBurst({dur:0.05,vol:0.05,cut:520});},
    caught:function(){tone({type:'sawtooth',freq:440,freq2:110,dur:0.4,vol:0.2});noiseBurst({dur:0.28,vol:0.12,cut:700});},
    win:function(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone({type:'triangle',freq:f,dur:0.2,vol:0.15});},i*95);});},
    chime:function(){[659,988].forEach(function(f,i){setTimeout(function(){tone({type:'sine',freq:f,dur:0.25,vol:0.11});},i*80);});},
    pack:function(){tone({type:'square',freq:380,freq2:160,dur:0.08,vol:0.1});},
    unpack:function(){tone({type:'square',freq:240,freq2:420,dur:0.08,vol:0.07});},
    nikScreech:function(){noiseBurst({dur:0.9,vol:0.22,cut:3200,filter:'bandpass'});tone({type:'sawtooth',freq:2200,freq2:900,dur:0.9,vol:0.12});},
    freeze:function(){[880,1320,1760].forEach(function(f,i){setTimeout(function(){tone({type:'sine',freq:f,dur:0.28,vol:0.08});},i*60);});},
    heartbeat:function(intensity){
      const v=0.1+(intensity||0)*0.08;
      tone({type:'sine',freq:62,dur:0.18,vol:v});
      setTimeout(function(){tone({type:'sine',freq:58,dur:0.15,vol:v*0.85});},150);
    },
    openDoor:function(){tone({type:'square',freq:80,freq2:260,dur:0.25,vol:0.08});},
    squeak:function(){tone({type:'square',freq:2100,freq2:2800,dur:0.05,vol:0.07});setTimeout(function(){tone({type:'square',freq:2450,freq2:1750,dur:0.055,vol:0.055});},55);},
    rocketWoosh:function(){noiseBurst({dur:0.75,vol:0.14,cut:1800,filter:'bandpass'});tone({type:'sawtooth',freq:260,freq2:90,dur:0.75,vol:0.07});},
    boom:function(){noiseBurst({dur:0.5,vol:0.22,cut:320});tone({type:'sawtooth',freq:130,freq2:50,dur:0.45,vol:0.14});},
  };
})();

document.addEventListener('keydown',function(){sfx.unlock();},false);

function adjustSuspicion(delta,reason){
  const prev=suspicion;
  suspicion=Math.max(0,Math.min(SUSP_MAX,suspicion+delta));
  const amt=suspicion-prev;
  if(!amt)return;
  suspNotice={
    timer:150,
    text:`${amt>0?'+':''}${amt} Suspicion${reason?` - ${reason}`:''}`,
    good:amt<0,
  };
}
function suspicionRatio(){return suspicion/SUSP_MAX;}
function suspicionLabel(){
  if(suspicion<15)return'Hidden';
  if(suspicion<35)return'Whispers';
  if(suspicion<55)return'Side-Eye';
  if(suspicion<75)return'Danger';
  return'Almost Busted';
}
function drawSuspicionMeter(x,y,w,compact){
  const h=compact?36:42;
  rnd(x,y,w,h,10,'rgba(26,18,34,0.86)',C.dialogBdr,1.5);
  txt('SUSPICION',x+10,y+13,C.dimTxt,10,'left',"'Courier New',monospace");
  fillRect(x+10,y+18,w-20,10,'rgba(255,255,255,0.08)');
  const grad=ctx.createLinearGradient(x+10,y,x+w-10,y);
  grad.addColorStop(0,'#79d46a');
  grad.addColorStop(0.5,'#f2c34e');
  grad.addColorStop(1,'#e5624f');
  fillRect(x+10,y+18,(w-20)*suspicionRatio(),10,grad);
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.strokeRect(x+10,y+18,w-20,10);
  txt(`${Math.round(suspicion)}/${SUSP_MAX}`,x+w-10,y+13,C.cream,10,'right',"'Courier New',monospace");
  if(compact)txt(suspicionLabel(),x+w-10,y+31,C.cream,10,'right',"'Courier New',monospace");
  else txt(`Status: ${suspicionLabel()}`,x+10,y+37,C.cream,10,'left',"'Courier New',monospace");
}
function drawSuspicionNotice(){
  if(suspNotice.timer<=0)return;
  const alpha=Math.min(1,suspNotice.timer/20);
  ctx.save();
  ctx.globalAlpha=alpha;
  const w=Math.min(360,txtW(suspNotice.text,12,"'Courier New',monospace")+30);

  txt(suspNotice.text,W/2,y+19,'#fff7ea',12,'center',"'Courier New',monospace");
  ctx.restore();
}

function drawMobileControls(){
  if(!mobileControlsOn())return;
  const layout=mobileLayout();
  ctx.save();
  ctx.globalAlpha=0.96;
  if(layout.dpad){
    const d=layout.dpad;
    // Base plate with inset shadow
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)'; ctx.shadowBlur=10; ctx.shadowOffsetY=3;
    circ(d.cx,d.cy,d.r*0.88,'rgba(20,12,30,0.68)');
    ctx.restore();
    strokeCirc(d.cx,d.cy,d.r*0.88,'rgba(246,213,122,0.55)',2.2);
    // Inner bevel
    strokeCirc(d.cx,d.cy,d.r*0.72,'rgba(255,240,190,0.2)',1);
    const pads=[
      {id:'up',x:d.cx,y:d.cy-d.r-4,glyph:'▲'},
      {id:'down',x:d.cx,y:d.cy+d.r+4,glyph:'▼'},
      {id:'left',x:d.cx-d.r-4,y:d.cy,glyph:'◀'},
      {id:'right',x:d.cx+d.r+4,y:d.cy,glyph:'▶'},
    ];
    pads.forEach(function(p){
      const active=touchState.dirs.has(p.id);
      // shadow
      ctx.save();
      if(!active){ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;}
      const pg=ctx.createRadialGradient(p.x,p.y-6,2,p.x,p.y,24);
      if(active){pg.addColorStop(0,'#ffe48a'); pg.addColorStop(1,'#a07020');}
      else{pg.addColorStop(0,'#463458'); pg.addColorStop(1,'#140a1c');}
      ctx.fillStyle=pg;
      ctx.beginPath(); ctx.arc(p.x,p.y,22,0,TAU); ctx.fill();
      ctx.restore();
      strokeCirc(p.x,p.y,22,active?'#fff7e0':'rgba(246,213,122,0.7)',2);
      strokeCirc(p.x,p.y,18,active?'rgba(255,240,190,0.6)':'rgba(255,240,190,0.2)',1);
      txt(p.glyph,p.x,p.y+6,active?'#2a1a38':'#efe2c2',16,'center',"'Courier New',monospace");
    });
  }
  layout.buttons.forEach(function(btn){
    const active=touchState.buttons.has(btn.id);
    ctx.save();
    if(!active&&!btn.disabled){ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=10; ctx.shadowOffsetY=3;}
    const bg=ctx.createRadialGradient(btn.cx,btn.cy-btn.r*0.4,2,btn.cx,btn.cy,btn.r);
    if(btn.disabled){bg.addColorStop(0,'#524048');bg.addColorStop(1,'#1a1418');}
    else if(active){bg.addColorStop(0,'#ffe48a');bg.addColorStop(1,'#a07020');}
    else{
      if(btn.id==='nik'){bg.addColorStop(0,'#ffae58');bg.addColorStop(1,'#7a2c10');}
      else{bg.addColorStop(0,'#5a4278');bg.addColorStop(1,'#180c24');}
    }
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(btn.cx,btn.cy,btn.r,0,TAU); ctx.fill();
    ctx.restore();
    strokeCirc(btn.cx,btn.cy,btn.r,btn.disabled?'rgba(170,145,118,0.4)':active?'#fff7e0':'rgba(246,213,122,0.75)',2.4);
    strokeCirc(btn.cx,btn.cy,btn.r-6,active?'rgba(255,240,190,0.7)':'rgba(255,240,190,0.25)',1.2);
    txt(btn.label,btn.cx,btn.cy+6,btn.disabled?'#b19d84':active?'#2a1a38':'#fff7e7',18,'center',"bold 'Courier New',monospace");
    if(btn.sub)txt(btn.sub,btn.cx,btn.cy+btn.r+15,btn.disabled?C.dimTxt:C.cream,10,'center',"'Courier New',monospace");
  });
  ctx.restore();
}

function isBlinking(anim,off){
  const a=(((anim|0)+(off||0))%220+220)%220;
  return a<6;
}
function drawInkEye(x,y,r,blink){
  if(blink){
    ctx.strokeStyle=C.ink; ctx.lineWidth=Math.max(1.4,r*1.1);
    ctx.beginPath(); ctx.moveTo(x-r*1.2,y); ctx.lineTo(x+r*1.2,y); ctx.stroke();
  } else {
    circ(x,y,r,C.ink);
  }
}
// Top-left volume highlight (sits inside a body ellipse to imply a light source).
function topLeftLight(x,y,rx,ry,alpha){
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,'+(alpha==null?0.16:alpha)+')';
  ctx.beginPath();
  ctx.ellipse(x-rx*0.28,y-ry*0.38,rx*0.55,ry*0.45,-0.35,0,TAU);
  ctx.fill();
  ctx.restore();
}
// Rim-light arc traces the bottom-right edge of a body ellipse for separation from dark bg.
function rimArc(x,y,rx,ry,col,w){
  ctx.save();
  ctx.strokeStyle=col||C.rim;
  ctx.lineWidth=w||1.6;
  ctx.beginPath();
  ctx.ellipse(x,y,rx,ry,0,0.2,2.0);
  ctx.stroke();
  ctx.restore();
}
// Mood-aware mouth. mood: 'neutral' | 'happy' | 'worried' | 'surprised' | 'sad'.
function drawMouth(x,y,w,mood,col){
  col=col||'#a35d42';
  ctx.save();
  ctx.strokeStyle=col;
  ctx.lineWidth=1.8;
  ctx.lineCap='round';
  ctx.beginPath();
  if(mood==='happy'){
    ctx.arc(x,y,Math.max(2,w*0.5),0.3,Math.PI-0.3);
    ctx.stroke();
  } else if(mood==='worried'||mood==='sad'){
    ctx.arc(x,y+Math.max(2,w*0.35),Math.max(2,w*0.45),Math.PI+0.3,TAU-0.3);
    ctx.stroke();
  } else if(mood==='surprised'){
    ctx.fillStyle=col;
    ctx.ellipse(x,y+1,Math.max(1.2,w*0.18),Math.max(1.7,w*0.26),0,0,TAU);
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.moveTo(x-w*0.32,y); ctx.lineTo(x+w*0.32,y);
    ctx.stroke();
  }
  ctx.restore();
}
// Discrete 4-phase walk stride: returns [leftLift, rightLift, bodyBob] in pixels.
// Pass speed ~0.12 for normal walk, ~0.18 for run. Static pose when moving===false.
function walkStride4(anim,speed,moving){
  if(!moving)return [0,0,0];
  var ph=Math.floor(((anim*(speed||0.12))%4+4)%4);
  var lift=[0,0,2.4,0.7];
  return [lift[ph], lift[(ph+2)%4], [0.2,1.1,0.2,1.1][ph]];
}

function drawHippoSide(cx,cy,sc,flip,anim){
  sc=sc||1; anim=anim||0;
  const bob=Math.sin(anim*0.05)*2;
  // ear flick — rare twitch about every 3 seconds
  const flickWindow=((anim|0)%180);
  const earFlick=(flickWindow<10)?Math.sin(flickWindow*0.9)*0.55:0;
  // tail wag — slow sway (tail sits behind the body)
  const tailWag=Math.sin(anim*0.08)*3;
  ctx.save(); ctx.translate(cx,cy);
  if(flip)ctx.scale(-1,1); ctx.scale(sc,sc);
  ellipse(0,47+bob,30,7,'rgba(0,0,0,0.14)');
  // tail behind hind leg
  ctx.save();
  ctx.strokeStyle=C.hippoDk;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-21,16+bob);
  ctx.quadraticCurveTo(-27+tailWag*0.6,14+bob,-28+tailWag,8+bob);
  ctx.stroke();
  ctx.restore();
  fillRect(-22,20+bob,14,24,C.hippoDk);
  fillRect(5,22+bob,14,22,C.hippoDk);
  ellipse(-15,45+bob,10,5,'#8f93a4');
  ellipse(12,46+bob,10,5,'#8f93a4');
  ellipse(-3,8+bob,36,28,C.hippo);
  strokeEllipse(-3,8+bob,36,28,C.ink,2);
  topLeftLight(-3,8+bob,36,28,0.14);
  rimArc(-3,8+bob,36,28,C.rim,1.4);
  ellipse(10,11+bob,19,18,'rgba(255,255,255,0.12)');
  ellipse(12,-18+bob,5.5,7,'#aeb4be',-0.55+earFlick);
  strokeEllipse(12,-18+bob,5.5,7,C.ink,2,-0.55+earFlick);
  ellipse(13,-18+bob,2.2,3.4,'#d5d9e1',-0.55+earFlick);
  ellipse(31,-1+bob,22,18,C.hippo);
  strokeEllipse(31,-1+bob,22,18,C.ink,2);
  ellipse(43,5+bob,12,8,'#d6d9e1');
  strokeEllipse(43,5+bob,12,8,C.ink,2);
  circ(41,4.5+bob,1.5,C.hippoDk);
  circ(46.5,4.5+bob,1.5,C.hippoDk);
  const hsBlink=isBlinking(anim,0);
  drawInkEye(28,-9.5+bob,2.5,hsBlink);
  if(!hsBlink){
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(29,-10.4+bob,0.9,0,TAU);ctx.fill();
  }
  ctx.strokeStyle=C.hippoMouth;ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(33,12+bob);
  ctx.quadraticCurveTo(39.5,15.5+bob,45,11.5+bob);
  ctx.stroke();
  // satchel and strap from the book art
  line(1,-8+bob,-8,18+bob,C.woodDk,2);
  rnd(-18,18+bob,16,15,4,'#d2a86b',C.woodDk,2);
  line(-10,22+bob,-5,25+bob,'#f5e8c8',1.5);
  ctx.restore();
}

  poly([

  ],'#171622','#7784a1',1.45);

function drawEggLayer(scene){
  if(!scene)return;
  // SAMSTER — scurry across the bottom of any story scene
  if(eggs.samster.active){
    eggs.samster.t++;
    const tt=eggs.samster.t;
    const dur=200;
    const prog=tt/dur;
    if(prog>=1){eggs.samster.active=false;}
    else {
      const sx=W+20-prog*(W+60);
      const sy=H-32+Math.sin(tt*0.4)*2;
      drawTinySamster(sx,sy,tt);
      if(!eggs.samster.squeaked&&tt>60){eggs.samster.squeaked=true;sfx.squeak();}
    }
  }
  // DUCKDIEB — peek from behind right-edge cover in neighborhood + backyard
  if(eggs.duckdieb.active&&(scene.bg===bgNeighborhood||scene.bg===bgBackyard)){
    const bob=Math.sin(t*0.05)*0.6;
    let px,py;
    if(scene.bg===bgNeighborhood){ px=742; py=H*0.56-78+bob; }
    else { px=702; py=H-198+bob; } // backyard (behind rightmost bush)
    // brief sideways duck-scoot
    const peekAmt=Math.max(0,Math.min(1,(Math.sin(t*0.018)+1)*0.5));
    drawDuckPeek(px-2+peekAmt*6,py);
  }
  // SATURN V — streaks across neighborhood sky
  if(eggs.saturnv.active&&scene.bg===bgNeighborhood){
    eggs.saturnv.t++;
    const tt=eggs.saturnv.t;
    const dur=140;
    const prog=tt/dur;
    const rx=-30+prog*(W+60);
    const ry=70+prog*28-Math.sin(prog*Math.PI)*14;
    // trail
    eggs.saturnv.trail.push({x:rx-10,y:ry+3,life:30});
    if(eggs.saturnv.trail.length>40)eggs.saturnv.trail.shift();
    eggs.saturnv.trail.forEach(function(p){
      p.life--;
      const a=Math.max(0,p.life/30)*0.6;
      circ(p.x,p.y,2+((30-p.life)/8),'rgba(255,220,160,'+a.toFixed(3)+')');
    });
    // rocket body
    ctx.save();ctx.translate(rx,ry);ctx.rotate(0.4);
    fillRect(-8,-2,16,4,'#f4ecd8');
    fillRect(-8,-2,16,2,'#d8c9a0');
    fillRect(4,-3,4,6,'#c8b78e');
    // nose
    ctx.fillStyle='#b0431f';
    ctx.beginPath();ctx.moveTo(8,-2);ctx.lineTo(12,0);ctx.lineTo(8,2);ctx.closePath();ctx.fill();
    // flame
    ctx.fillStyle='#ffb040';
    ctx.beginPath();ctx.moveTo(-8,-1.5);ctx.lineTo(-14-Math.random()*3,0);ctx.lineTo(-8,1.5);ctx.closePath();ctx.fill();
    ctx.restore();
    if(!eggs.saturnv.boomed&&prog>0.95){eggs.saturnv.boomed=true;sfx.boom();}
    if(prog>=1){eggs.saturnv.active=false;eggs.saturnv.trail=[];}
  }
}

/* ================================================================
   DIALOG BOX
   ================================================================ */

let dlgState={active:false,lines:[],lineIdx:0,charIdx:0,charTimer:0,portrait:null,speaker:'',cb:null};
let dlgHarness=null;

function startDialog(lines,portrait,speaker,cb){
  dlgState={active:true,lines:lines.map(l=>l||''),lineIdx:0,charIdx:0,charTimer:0,portrait:portrait||null,speaker:speaker||'',cb:cb||null};
}

function updateDialog(dt){
  if(!dlgState.active)return;
  dlgState.charTimer+=dt;
  if(dlgState.charTimer>0.025){
    dlgState.charTimer=0;
    const line=dlgState.lines[dlgState.lineIdx]||'';
    if(dlgState.charIdx<line.length){
      dlgState.charIdx++;
      const ch=line.charAt(dlgState.charIdx-1);
      if(ch&&ch!==' '&&ch!=='\n')sfx.typewriter();
    }
  }
  if(eat('Space')||eat('Enter')||mclk){
    mclk=false;
    const line=dlgState.lines[dlgState.lineIdx]||'';
    if(dlgState.charIdx<line.length){
      dlgState.charIdx=line.length; // show full line
      sfx.click();
    } else {
      dlgState.lineIdx++;
      dlgState.charIdx=0;
      sfx.click();
      if(dlgState.lineIdx>=dlgState.lines.length){
        dlgState.active=false;
        if(dlgState.cb)dlgState.cb();
      }
    }
  }
}

function drawDialogText(text,x,y,maxW,fontSize,lineH,col,font){
  ctx.save();
  ctx.fillStyle=col;
  ctx.font=`${fontSize}px ${font||'Georgia'}`;
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  let lx=x,ly=y;
  text.split('\n').forEach((para,pi,arr)=>{
    para.split(' ').forEach(w=>{
      const ww=ctx.measureText(w+' ').width;
      if(lx>x&&lx+ww>x+maxW){lx=x;ly+=lineH;}
      ctx.fillText(w+' ',lx,ly);
      lx+=ww;
    });
    if(pi<arr.length-1){lx=x;ly+=lineH;}
  });
  ctx.restore();
}

function drawDialogBox(opts){
  const bx=opts.x,by=opts.y,bw=opts.w,bh=opts.h;
  // drop shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.55)';
  ctx.shadowBlur=18;
  ctx.shadowOffsetY=4;
  rnd(bx,by,bw,bh,10,'rgba(26,16,40,0.94)',null,0);
  ctx.restore();
  // outer dark bevel
  rnd(bx,by,bw,bh,10,null,'rgba(40,22,62,0.9)',3);
  // inner gold chrome frame (double border)
  ctx.save();
  const g=ctx.createLinearGradient(bx,by,bx,by+bh);
  g.addColorStop(0,'#fde8a7');
  g.addColorStop(0.5,'#e3bf79');
  g.addColorStop(1,'#b48030');
  ctx.strokeStyle=g; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(bx+3,by+3,bw-6,bh-6,8); ctx.stroke();
  ctx.strokeStyle='rgba(255,240,190,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(bx+6,by+6,bw-12,bh-12,6); ctx.stroke();
  ctx.restore();
  // portrait
  const hasPortrait=!!opts.portrait;
  const textX=bx+(hasPortrait?100:22);
  const textW=bw-(hasPortrait?120:44);
  if(hasPortrait){
    const px=bx+12,py=by+12,ps=76;
    // bevel: outer dark, gold frame, inner dark inset
    rnd(px-1,py-1,ps+2,ps+2,6,'rgba(0,0,0,0.55)',null,0);
    const pg=ctx.createLinearGradient(px,py,px,py+ps);
    pg.addColorStop(0,'#fde8a7'); pg.addColorStop(1,'#b48030');
    ctx.save(); ctx.strokeStyle=pg; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(px,py,ps,ps,6); ctx.stroke(); ctx.restore();
    rnd(px+3,py+3,ps-6,ps-6,4,'rgba(12,6,20,0.85)',null,0);
    // subtle inner glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    radialGlow(px+ps/2,py+ps/2+6,ps*0.55,'rgba(255,220,150,0.10)','rgba(255,220,150,0)');
    ctx.restore();
    ctx.save();
    // clip portrait into the framed square
    ctx.beginPath(); ctx.roundRect(px+4,py+4,ps-8,ps-8,3); ctx.clip();
    ctx.translate(px+ps/2, py+ps-8);
    if(opts.portrait==='hippo')drawHippoSide(0,0,0.6,false,t);
    else if(opts.portrait==='pflueger')drawPflueger(0,0,0.6,false,t);
    else if(opts.portrait==='lisa')drawLisa(0,0,0.6,false,t);
    else if(opts.portrait==='mom')drawMom(0,0,0.6,t);
    ctx.restore();
  }
  if(opts.speaker){
    // speaker pill
    const sp=opts.speaker;
    ctx.save();
    ctx.font='bold 13px "Courier New",monospace';
    const sw=ctx.measureText(sp).width+16;
    rnd(textX-6,by+8,sw,22,6,'rgba(80,50,18,0.55)','rgba(255,220,150,0.6)',1);
    ctx.restore();
    glowText(opts.speaker,textX+2,by+24,C.gold,13,'left',"bold 'Courier New',monospace",'rgba(0,0,0,0.6)',4);
  }
  drawDialogText(opts.visibleText,textX,by+(opts.speaker?50:30),textW,16,22,C.cream,'Georgia');
  // advance indicator with bounce
  if(opts.showAdvance){
    const bob=Math.sin(t*0.18)*2;
    const blk=Math.floor(t/14)%2===0;
    ctx.save();
    ctx.globalAlpha=blk?1:0.5;
    glowText('▼',bx+bw-22,by+bh-14+bob,C.gold,14,'center','Georgia','rgba(246,213,122,0.8)',6);
    ctx.restore();
  }
  // line counter pill
  if(opts.lineCount>1){
    const lbl=(opts.lineIndex+1)+'/'+opts.lineCount;
    ctx.save();
    ctx.font='11px "Courier New",monospace';
    const lw=ctx.measureText(lbl).width+12;
    rnd(bx+bw-lw-10,by+10,lw,18,5,'rgba(60,38,16,0.55)','rgba(255,220,150,0.4)',1);
    txt(lbl,bx+bw-lw/2-10,by+23,C.dimTxt,11,'center',"'Courier New',monospace");
    ctx.restore();
  }
}

function drawDialog(){
  if(!dlgState.active)return;
  // In game phases, stay within the map area (left of right panel)
  const inGame=(phase==='escape'||phase==='stealth'||phase==='closet_game'||(phase==='dialog_harness'&&dlgHarness&&dlgHarness.caseDef&&dlgHarness.caseDef.inGame));
  const bx=10,by=H-130,bw=inGame?630:W-40,bh=115;
  const line=(dlgState.lines[dlgState.lineIdx]||'').substring(0,dlgState.charIdx);
  const line2=dlgState.lines[dlgState.lineIdx]||'';
  drawDialogBox({
    x:bx,y:by,w:bw,h:bh,
    portrait:dlgState.portrait,
    speaker:dlgState.speaker,
    visibleText:line,
    lineIndex:dlgState.lineIdx,
    lineCount:dlgState.lines.length,
    showAdvance:dlgState.charIdx>=line2.length,
  });
}

function resolveSceneText(scene){
  if(scene.id==='epilogue_2'){
    if(suspicion<25)return scene.text;
    if(suspicion<55)return DIALOG_DATA.variants.epilogue_2.medium_suspicion;
    return DIALOG_DATA.variants.epilogue_2.high_suspicion;
  }
  return scene.text||'';
}

function drawScene(scene){

function getChapterLabel(idx){
  const scene=SCENES[idx];
  const id=scene&&scene.id?scene.id:'';
  if(id==='ch1_1'||id==='stealth_intro')return 'PB&J Trouble';
  if(id==='ch2_4'||id==='escape_intro')return 'Zoo Flashback';
  if(id.startsWith('decision')||id.startsWith('cleanup'))return 'Hide The Hippo';
  if(id.startsWith('closet'))return 'Closet Plan';
  if(id.startsWith('epilogue'))return 'Epilogue';
  return '';
}

function drawBubble(text,bx,by){
  const lines=text.split('\n');
  const maxW=lines.reduce((m,l)=>Math.max(m,txtW(l,14,"'Courier New',monospace")),0);
  const bw=maxW+24,bh=lines.length*18+16;
  rnd(bx-bw/2,by-bh,bw,bh,8,'white','#404040',1.5);
  // tail
  ctx.fillStyle='white'; ctx.strokeStyle='#404040'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx-8,by); ctx.lineTo(bx+8,by); ctx.lineTo(bx,by+18); ctx.closePath();
  ctx.fill(); ctx.stroke();
  lines.forEach((l,i)=>txt(l,bx,by-bh+22+i*18,'#202028',14,'center',"'Courier New',monospace"));
}

function wrapText(text,x,y,maxW,lineH,col,align,font){
  ctx.fillStyle=col; ctx.font=`${lineH}px ${font||'Georgia'}`;
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  let lx=x,ly=y;
  text.split('\n').forEach((para,pi,arr)=>{
    para.split(' ').forEach(w=>{
      const ww=ctx.measureText(w+' ').width;
      if(lx>x&&lx+ww>x+maxW){lx=x;ly+=lineH+4;}
      ctx.fillText(w+' ',lx,ly); lx+=ww;
    });
    if(pi<arr.length-1){lx=x;ly+=lineH+4;}
  });
}

function handleStory(){
  canvas.style.cursor='default';
  if(sceneIdx>=SCENES.length){phase='credits';return;}
  const scene=SCENES[sceneIdx];
  drawScene(scene);
  // Advance on click/space
  if(mclk||eat('Space')){
    mclk=false;
    const act=scene.action;
    if(act==='stealth'){sfx.confirm();startFade(true,320,function(){initStealth();phase='stealth';startFade(false,360,null);});return;}
    if(act==='cleanup'){sfx.confirm();startFade(true,320,function(){initCleanup();phase='cleanup';startFade(false,360,null);});return;}
    if(act==='closet_game'){sfx.confirm();startFade(true,320,function(){initCloset();phase='closet_game';startFade(false,360,null);});return;}
    if(act==='escape'){sfx.confirm();startFade(true,360,function(){initEscape();phase='escape';startFade(false,420,null);});return;}
    if(act==='epilogue_story'){sceneIdx=findScene('epilogue_start');return;}
    if(act==='credits'){sfx.confirm();startFade(true,420,function(){phase='credits';startFade(false,500,null);});return;}
    sceneIdx++;
    if(sceneIdx>=SCENES.length)phase='credits';
  }
}

function showStlMsg(text){if(stl)stl.zoneMsg={text,timer:180};}

function momSees(px,py){
  const m=stl.mom;
  const dx=px-m.x,dy=py-m.y;
  const dist=Math.hypot(dx,dy);
  const vis=diff.vis*(diff.id==='easy'?0.65:1)+suspicion*0.35;
  if(dist>vis)return false;
  const toPlayer=Math.atan2(dy,dx);
  let ad=toPlayer-m.angle;
  while(ad>Math.PI)ad-=TAU;
  while(ad<-Math.PI)ad+=TAU;
  return Math.abs(ad)<Math.PI/2.5;
}

function updateStealth(dt){
  const s=stl;
  if(s.caught||s.sandwichEaten){
    s.caughtTimer-=dt;
    if(s.caughtTimer<=0)restartStealthZone();
    return;
  }
  if(s.won)return;
  const zd=STL_ZONE_DATA[s.zone];
  const map=zd.map;
  // Player movement
  const spd=(diff.id==='easy'?2.2:diff.id==='medium'?2:1.8)*PLAYER_SPEED_SCALE;
  let vx=0,vy=0;
  if(K['ArrowLeft']||K['KeyA']){vx=-spd;s.player.dir=2;}
  if(K['ArrowRight']||K['KeyD']){vx=spd;s.player.dir=3;}
  if(K['ArrowUp']||K['KeyW']){vy=-spd;s.player.dir=0;}
  if(K['ArrowDown']||K['KeyS']){vy=spd;s.player.dir=1;}
  if(vx!==0&&vy!==0){vx*=0.707;vy*=0.707;}
  const nx=s.player.x+vx,ny=s.player.y+vy;
  if(canMoveTo(nx,s.player.y,map))s.player.x=nx;
  if(canMoveTo(s.player.x,ny,map))s.player.y=ny;
  const moving=(vx!==0||vy!==0);
  s.player.moving=moving;
  if(moving)s.player.anim++;
  s.player.stepCd-=dt;
  if(moving&&s.player.stepCd<=0){
    sfx.step();
    s.player.stepCd=0.28;
  } else if(!moving){
    s.player.stepCd=0;
  }
  s.mom.flicker=0.82+Math.sin(t*0.23)*0.08+Math.random()*0.1;
  // Mom patrol AI
  const mspd=diff.spd;
  const mtgt=s.mom.patrol[s.mom.pidx];
  const mdx=mtgt.x-s.mom.x,mdy=mtgt.y-s.mom.y;
  const mdist=Math.hypot(mdx,mdy);
  if(mdist<3){s.mom.pidx=(s.mom.pidx+1)%s.mom.patrol.length;}
  else{s.mom.x+=mdx/mdist*mspd;s.mom.y+=mdy/mdist*mspd;s.mom.angle=Math.atan2(mdy,mdx);}
  // Digory AI (zone 0 only)
  if(zd.hasDigory){
    const d=s.digory;
    const dsep=Math.hypot(s.player.x-d.x,s.player.y-d.y);
    d.chasing=dsep<70;
    if(d.chasing){
      const dx2=s.player.x-d.x,dy2=s.player.y-d.y;
      const dd=Math.hypot(dx2,dy2);
      const dspd=1.8;
      if(canMoveTo(d.x+dx2/dd*dspd,d.y,map))d.x+=dx2/dd*dspd;
      if(canMoveTo(d.x,d.y+dy2/dd*dspd,map))d.y+=dy2/dd*dspd;
      d.angle=Math.atan2(dy2,dx2);
      if(dsep<22&&s.hasSandwich){
        s.sandwichEaten=true;s.caughtTimer=2.5;
        sfx.deny();
        sfx.boom();
        s.flash=20;
        adjustSuspicion(8,'Digory stole the sandwich');
        return;
      }
      d.barkCd-=dt;
      if(d.barkCd<=0){
        sfx.step();
        d.barkCd=0.45;
      }
    } else {
      d.wanderTimer-=dt*60;
      if(d.wanderTimer<=0){d.wanderTimer=90+Math.random()*120;d.angle=Math.random()*TAU;}
      const wx=Math.cos(d.angle)*0.8,wy=Math.sin(d.angle)*0.8;
      if(canMoveTo(d.x+wx,d.y,map))d.x+=wx;
      if(canMoveTo(d.x,d.y+wy,map))d.y+=wy;
    }
    d.anim++;
  }
  // Mom spotted check
  if(momSees(s.player.x,s.player.y)){
    s.caught=true;s.caughtTimer=2.5;
    sfx.caught();
    s.flash=24;
    adjustSuspicion(10,'Mom heard late-night sneaking');
    return;
  }
  if(s.flash>0)s.flash-=dt*60;
  // Exit check
  if(isOnExit(s.player.x,s.player.y,map)){
    s.zone++;
    if(s.zone>=STL_ZONE_DATA.length){s.won=true;if(!s.wonFired){sfx.win();s.wonFired=true;}}
    else{
      sfx.chime();
      const nzd=STL_ZONE_DATA[s.zone];
      s.player.x=nzd.playerStart.x;s.player.y=nzd.playerStart.y;s.player.dir=0;
      s.mom.x=STL_MOM_PATROLS[s.zone][0].x;s.mom.y=STL_MOM_PATROLS[s.zone][0].y;
      s.mom.patrol=deepClone(STL_MOM_PATROLS[s.zone]);s.mom.pidx=0;
      showStlMsg(nzd.name);
    }
  }
  if(s.zoneMsg.timer>0)s.zoneMsg.timer--;
  if(mclk||eat('Space'))s.showHint=false;
}

function restartStealthZone(){
  const s=stl;
  const zd=STL_ZONE_DATA[s.zone];
  s.player.x=zd.playerStart.x;s.player.y=zd.playerStart.y;s.player.dir=0;
  s.mom.x=STL_MOM_PATROLS[s.zone][0].x;s.mom.y=STL_MOM_PATROLS[s.zone][0].y;
  s.mom.patrol=deepClone(STL_MOM_PATROLS[s.zone]);s.mom.pidx=0;
  if(s.zone===0){
    s.digory.x=STL_DIGORY_START.x;s.digory.y=STL_DIGORY_START.y;
    s.digory.chasing=false;s.digory.wanderTimer=0;
  }
  s.hasSandwich=true;
  s.caught=false;s.sandwichEaten=false;s.caughtTimer=0;
  s.showHint=true;
  showStlMsg(zd.name);
}

function drawStealthTile(tile,row,col,zone){
  const x=col*TILE,y=row*TILE;
  const downstairs=zone===0;
  if(tile===T.WALL){
    fillRect(x,y,TILE,TILE,downstairs?'#7d6244':'#80638f');
    fillRect(x,y,TILE,8,downstairs?'#e7cc96':'#dcc0f0');
    fillRect(x,y+8,TILE,TILE-8,downstairs?'#6e553c':'#70557e');
    line(x+4,y+12,x+TILE-4,y+12,'rgba(0,0,0,0.16)',2);
    return;
  }
  const baseA=downstairs?'#c8a878':'#d9c8ec';
  const baseB=downstairs?'#b99568':'#ccb8e4';
  fillRect(x,y,TILE,TILE,(row+col)%2===0?baseA:baseB);
  if(downstairs){
    for(let px=4;px<TILE;px+=8)line(x+px,y+1,x+px,y+TILE-2,'rgba(255,255,255,0.08)',1);
  } else {
    strokeEllipse(x+16,y+16,9,9,'rgba(255,255,255,0.07)',1);
  }
  if(tile===T.BUSH){
    const variant=(row*5+col)%4;
    if(variant===0){
      rnd(x+5,y+7,22,16,4,'#956238',C.ink,2);
      fillRect(x+8,y+4,16,5,'#b47b49');
      line(x+11,y+23,x+11,y+28,'#6d4727',3);
      line(x+21,y+23,x+21,y+28,'#6d4727',3);
    } else if(variant===1){
      fillRect(x+8,y+6,16,18,'#a6794f');
      rnd(x+5,y+7,22,7,3,'#cb9a62',C.ink,2);
      line(x+10,y+24,x+8,y+29,'#755133',3);
      line(x+22,y+24,x+24,y+29,'#755133',3);
    } else if(variant===2){
      fillRect(x+11,y+6,10,18,'#7e9b62');
      ellipse(x+16,y+8,8,6,'#95c57e');
      strokeEllipse(x+16,y+8,8,6,C.ink,2);
      rnd(x+8,y+20,16,8,2,'#b98054',C.ink,2);
    } else {
      rnd(x+6,y+8,20,16,4,'#d0b18e',C.ink,2);
      line(x+16,y+8,x+16,y+24,'rgba(90,70,60,.35)',1.5);
    }
  } else if(tile===T.EXIT){
    fillRect(x,y,TILE,TILE,'#dcecd8');
    for(let i=0;i<4;i++)fillRect(x+4,y+6+i*6,TILE-8,3,['#efe8db','#cdb9a0','#a7c995','#7fac67'][i]);
    txt('▲',x+16,y+23,'#ffffff',14,'center');

    fillRect(x,y,TILE,TILE,'#dacfb0');

function drawZooTile(tile,row,col){
  const x=col*TILE,y=row*TILE;
  if(tile===T.WALL){
    fillRect(x,y,TILE,TILE,'#6f8c64');
    fillRect(x,y+10,TILE,TILE-10,'#57714d');
    for(let px=4;px<TILE;px+=8)fillRect(x+px,y+4,4,TILE-6,'#dbe6cf');
    fillRect(x,y+8,TILE,4,'#eef6dd');
    return;
  }
  if(tile===T.GRASS){
    fillRect(x,y,TILE,TILE,(row+col)%2===0?'#9fcf68':'#8fc15c');
    for(let i=0;i<3;i++){
      const gx=x+7+i*8+((row+col)%2?2:0);
      const gy=y+24-(i%2)*5;
      line(gx,gy,gx+2,gy-8,'rgba(226,248,173,.45)',1.4);
      line(gx+2,gy,gx+4,gy-6,'rgba(80,140,60,.4)',1.4);
    }
    return;
  }
  if(tile===T.DIRT){
    fillRect(x,y,TILE,TILE,(row+col)%2===0?'#d7c49b':'#cdb587');
    for(let i=0;i<3;i++)circ(x+8+i*7,y+10+(i%2)*9,1.7,'rgba(150,120,80,.4)');
    return;
  }
  if(tile===T.WATER){
    fillRect(x,y,TILE,TILE,(row+col)%2===0?C.water:C.waterDk);
    strokeEllipse(x+16,y+18,10,4,'rgba(255,255,255,0.25)',1.5);
    strokeEllipse(x+12,y+10,6,3,'rgba(255,255,255,0.18)',1.2);
    return;
  }
  if(tile===T.BUSH){
    fillRect(x,y,TILE,TILE,(row+col)%2===0?'#93c85d':'#89bc56');
    circ(x+16,y+18,11,C.bushDk);
    circ(x+10,y+13,7,C.bush);
    circ(x+20,y+12,7,C.bush);
    strokeEllipse(x+16,y+18,11,11,C.ink,1.6);
    return;
  }
  if(tile===T.EXIT||tile===T.ENTER){
    fillRect(x,y,TILE,TILE,tile===T.EXIT?'#bfe7a7':'#d5cf9a');
    fillRect(x+4,y+4,TILE-8,TILE-8,tile===T.EXIT?'#7ec46d':'#bea86a');
    fillRect(x+7,y+8,TILE-14,TILE-16,tile===T.EXIT?'#d7f5c7':'#efe5bf');
    if(tile===T.EXIT)txt('▲',x+16,y+22,'#4a7d47',13,'center');
  }
}

function drawPfluegerTD(x,y,dir,anim,hasSandwich,moving){
  ctx.save();ctx.translate(x,y);
  const stride=walkStride4(anim,0.16,moving!==false);
  const leftLeg=-stride[0], rightLeg=-stride[1], bounce=stride[2];
  ellipse(0,10,13,5,'rgba(0,0,0,0.18)');
  // torso with top-left highlight
  rnd(-10,-3+bounce,20,17,7,C.pflShirt,C.ink,2);
  fillRect(-10,1+bounce,20,3,C.pflOrange);
  fillRect(-10,6+bounce,20,3,C.pflOrange);
  topLeftLight(0,5+bounce,10,8,0.16);
  // tiny scarf tail
  ctx.save();
  ctx.fillStyle=C.scarf;
  ctx.beginPath();
  ctx.moveTo(-4,-2+bounce);
  ctx.quadraticCurveTo(-9,3+bounce,-6,9+bounce);
  ctx.quadraticCurveTo(-3,4+bounce,-1,-1+bounce);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle=C.ink;ctx.lineWidth=1.2;ctx.stroke();
  ctx.restore();
  // legs — 4-phase discrete stride (left/right alternate)
  line(-5,10+bounce,-5,18+bounce+leftLeg,C.pflBlue,4);
  line(5,10+bounce,5,18+bounce+rightLeg,C.pflBlue,4);
  ellipse(-5,18+bounce+leftLeg,5,2.5,'#8b653f');
  ellipse(5,18+bounce+rightLeg,5,2.5,'#8b653f');
  const ha=[[0,-14],[0,13],[-14,0],[14,0]];
  const[hx,hy]=ha[dir]||ha[0];
  circ(hx,hy,8,C.skinMd);strokeCirc(hx,hy,8,C.ink,2);
  topLeftLight(hx,hy,8,8,0.16);
  ellipse(hx,hy-4,8,5,C.pflHair);
  strokeEllipse(hx,hy-4,8,5,C.ink,2);
  if(dir===1){circ(hx-2,hy+1,1.2,C.ink);circ(hx+2,hy+1,1.2,C.ink);}
  else if(dir===2||dir===3){circ(hx+(dir===2?-1:1),hy,1.2,C.ink);}
  if(hasSandwich){
    const soff=[[0,-24],[0,20],[-22,0],[22,0]];

    fillRect(sx-8,sy-2,16,4,'#7ab34f');
  }
  ctx.restore();
}

function cleanupTimeLimit(){
  return Math.max(28,46-suspicion*0.25);
}
function ptInBox(px,py,b){
  return px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h;
}
function initCleanup(){
  const limit=cleanupTimeLimit()*60;
  cln={
    time:limit,
    startTime:limit,
    items:CLEANUP_ITEMS_DEF.map(it=>cloneWith(it,{done:false})),
    decoys:CLEANUP_DECOYS_DEF.map(it=>cloneWith(it,{})),
    hover:null,
    wrongTimer:0,
    won:false,
    wonFired:false,
    failed:false,
    failTimer:0,
    showHint:true,
    particles:[],
    hbCd:0,
    momTeased:false,
  };
}

function spawnPoof(cx,cy){
  if(!cln)return;
  for(let i=0;i<10;i++){
    const a=Math.random()*TAU;
    const spd=1.6+Math.random()*2.2;
    cln.particles.push({
      x:cx,y:cy,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-0.8,
      r:3+Math.random()*3.5,
      life:1,
      col:i%2?'#f6e7cc':'#e3c48a',
    });
  }
  for(let i=0;i<4;i++){
    cln.particles.push({
      x:cx+(Math.random()-0.5)*20,y:cy,
      vx:(Math.random()-0.5)*0.8,vy:-1.4-Math.random()*0.9,
      r:4+Math.random()*2,
      life:1,
      col:'rgba(255,245,220,0.7)',
      star:true,
    });
  }
}
function cleanupRemaining(){
  return cln.items.filter(it=>!it.done).length;
}
function getCleanupHover(){
  if(!cln)return null;
  for(const item of cln.items)if(!item.done&&ptInBox(mx,my,item))return{kind:'item',item};
  for(const item of cln.decoys)if(ptInBox(mx,my,item))return{kind:'decoy',item};
  return null;
}
function updateCleanup(dt){
  const s=cln;
  if(!s)return;
  // advance particles always (win screen still shows the last burst)
  for(let i=s.particles.length-1;i>=0;i--){
    const p=s.particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.18;
    p.vx*=0.94;
    p.life-=0.035;
    if(p.life<=0)s.particles.splice(i,1);
  }
  if(s.won){
    if(mclk||eat('Space')||eat('Enter')){
      mclk=false;
      sfx.confirm();
      startFade(true,340,function(){
        sceneIdx=findScene('closet_intro');phase='story';
        startFade(false,360,null);
      });
    }
    return;
  }
  if(s.failed){
    s.failTimer-=dt*60;
    if(s.failTimer<=0)initCleanup();
    return;
  }
  if(s.wrongTimer>0)s.wrongTimer-=dt*60;
  s.time=Math.max(0,s.time-dt*60);
  s.hover=getCleanupHover();
  const secLeft=s.time/60;
  // heartbeat at <=10s, accelerating as time ticks down
  if(secLeft<=10&&secLeft>0){
    s.hbCd-=dt;
    if(s.hbCd<=0){
      const intensity=Math.max(0,(10-secLeft)/10);
      sfx.heartbeat(intensity);
      s.hbCd=Math.max(0.42,0.9-intensity*0.5);
    }
  }
  // Mom footstep tease at ~5s
  if(!s.momTeased&&secLeft<=5&&secLeft>0){
    s.momTeased=true;
    sfx.step();
    setTimeout(function(){sfx.step();},320);
    setTimeout(function(){sfx.step();},620);
  }
  if(s.time<=0){
    s.failed=true;
    s.failTimer=120;
    sfx.deny();
    sfx.boom();
    adjustSuspicion(12,'Mom reached the front steps');
    return;
  }
  if(mclk||eat('Space'))s.showHint=false;
  if(!mclk)return;
  mclk=false;
  const menu={x:16,y:H-48,w:96,h:32};
  if(ptInBox(mx,my,menu)){sfx.click();phase='title';return;}
  const hover=s.hover;
  if(!hover)return;
  if(hover.kind==='item'){
    hover.item.done=true;
    sfx.pack();
    spawnPoof(hover.item.x+hover.item.w/2,hover.item.y+hover.item.h/2);
    if(cleanupRemaining()===0){
      s.won=true;
      if(!s.wonFired){sfx.win();s.wonFired=true;}
      adjustSuspicion(s.time>s.startTime*0.45?-6:-3,'Evidence cleaned up');
    }
  } else {
    s.wrongTimer=16;
    sfx.deny();
    adjustSuspicion(3,'That was not hippo evidence');
  }
}

/* ================================================================
   CLOSET PACKING PUZZLE — MOVING DAY
   ================================================================ */

let cls=null;

// Grid: 5 cols × 4 rows, 60px per cell
const CL_COLS=5,CL_ROWS=4,CL_CELL=60;
const CL_X=250,CL_Y=82; // grid top-left on canvas
const CL_W=CL_COLS*CL_CELL,CL_H=CL_ROWS*CL_CELL; // 300×240

// Piece definitions. cells = [row,col] offsets from top-left anchor
const CL_PIECES=[
  {id:'hippo',    name:'Mr. Hippo', col:'#9898b8', cells:[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]]},
  {id:'clothes',  name:'Clothes',   col:'#c050a0', cells:[[0,0],[0,1],[1,0],[1,1]]},
  {id:'suitcase', name:'Suitcase',  col:'#c08828', cells:[[0,0],[0,1],[1,0],[1,1]]},
  {id:'books',    name:'Books',     col:'#3860b8', cells:[[0,0],[1,0]]},
  {id:'umbrella', name:'Umbrella',  col:'#308830', cells:[[0,0],[1,0]]},
  {id:'hat',      name:'Hat',       col:'#c83020', cells:[[0,0]]},
  {id:'sock',     name:'Sock',      col:'#b89040', cells:[[0,0]]},
];

function clRotateCells(cells){
  const r=cells.map(([row,col])=>[col,-row]);
  const minR=Math.min(...r.map(([x])=>x));
  const minC=Math.min(...r.map(([,x])=>x));
  return r.map(([row,col])=>[row-minR,col-minC]);
}
function clGetRots(cells){
  const rots=[cells];
  for(let i=0;i<3;i++)rots.push(clRotateCells(rots[rots.length-1]));
  const seen=new Set();
  return rots.filter(r=>{
    const k=r.map(([a,b])=>a+','+b).sort().join('|');
    if(seen.has(k))return false;seen.add(k);return true;
  });
}

function initCloset(){
  cls={
    grid:Array.from({length:CL_ROWS},()=>Array(CL_COLS).fill(-1)),
    pieces:CL_PIECES.map(p=>cloneWith(p,{rot:0,placed:false,gr:0,gc:0,rots:clGetRots(p.cells)})),
    sel:-1,
    hoverR:-1,hoverC:-1,
    won:false,
    wonFired:false,
    winSweep:0,
    errTimer:0,
    particles:[],
  };
}

function spawnClosetSnap(cx,cy,col){
  if(!cls)return;
  for(let i=0;i<8;i++){
    const a=Math.random()*TAU;
    const spd=1.4+Math.random()*1.6;
    cls.particles.push({
      x:cx,y:cy,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-0.6,
      r:2.5+Math.random()*2.5,
      life:1,col:i%2?'#fff3c0':col,
    });
  }
}

function clTrayPos(i){
  const perRow=4;
  const row=Math.floor(i/perRow),col=i%perRow;
  const rowLen=(row===0)?4:3;
  const slotW=72;
  const startX=CL_X+(CL_W-rowLen*slotW)/2;
  return {tx:startX+col*slotW,ty:344+row*82};
}

function clCanPlace(pidx,gr,gc){
  const p=cls.pieces[pidx];
  return p.rots[p.rot].every(([dr,dc])=>{
    const r=gr+dr,c=gc+dc;
    return r>=0&&r<CL_ROWS&&c>=0&&c<CL_COLS&&cls.grid[r][c]===-1;
  });
}
function clPlace(pidx,gr,gc){
  const p=cls.pieces[pidx];
  p.rots[p.rot].forEach(([dr,dc])=>{cls.grid[gr+dr][gc+dc]=pidx;});
  p.placed=true;p.gr=gr;p.gc=gc;
}
function clUnplace(pidx){
  for(let r=0;r<CL_ROWS;r++)
    for(let c=0;c<CL_COLS;c++)
      if(cls.grid[r][c]===pidx)cls.grid[r][c]=-1;
  cls.pieces[pidx].placed=false;
}
function clPieceAt(gr,gc){
  const row=cls.grid[gr];
  const v=row?row[gc]:undefined;
  return(v!==undefined&&v!==-1)?v:-1;
}

function updateCloset(dt){
  const s=cls;
  // advance particles
  for(let i=s.particles.length-1;i>=0;i--){
    const p=s.particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.2;
    p.vx*=0.94;
    p.life-=0.035;
    if(p.life<=0)s.particles.splice(i,1);
  }
  if(s.winSweep>0)s.winSweep-=dt*60;
  if(s.won)return;
  if(s.errTimer>0)s.errTimer-=dt*60;
  s.hoverR=Math.floor((my-CL_Y)/CL_CELL);
  s.hoverC=Math.floor((mx-CL_X)/CL_CELL);
  if(eat('KeyR')&&s.sel!==-1){
    const p=s.pieces[s.sel];
    p.rot=(p.rot+1)%p.rots.length;
    sfx.click();
  }
  if(!mclk)return;
  mclk=false;
  if(mx>=CL_X&&mx<CL_X+CL_W&&my>=CL_Y&&my<CL_Y+CL_H){
    const gr=Math.floor((my-CL_Y)/CL_CELL);
    const gc=Math.floor((mx-CL_X)/CL_CELL);
    if(s.sel!==-1){
      if(clCanPlace(s.sel,gr,gc)){
        const p=s.pieces[s.sel];
        clPlace(s.sel,gr,gc);
        const cells=p.rots[p.rot];
        const maxR=Math.max.apply(null,cells.map(function(x){return x[0];}));
        const maxC=Math.max.apply(null,cells.map(function(x){return x[1];}));
        spawnClosetSnap(CL_X+(gc+maxC/2+0.5)*CL_CELL,CL_Y+(gr+maxR/2+0.5)*CL_CELL,p.col);
        sfx.pack();
        s.sel=-1;
        if(s.pieces.every(function(pp){return pp.placed;})){
          s.won=true;
          s.winSweep=70;
          if(!s.wonFired){sfx.win();s.wonFired=true;}
          adjustSuspicion(-4,'Hippo tucked into the closet');
        }
      } else { s.errTimer=25; sfx.deny(); }
    } else {
      const pidx=clPieceAt(gr,gc);
      if(pidx!==-1){clUnplace(pidx);s.sel=pidx;sfx.unpack();}
    }
  } else {
    let hit=false;
    s.pieces.forEach(function(p,i){
      if(p.placed)return;
      const tp=clTrayPos(i);
      if(mx>=tp.tx&&mx<tp.tx+70&&my>=tp.ty&&my<tp.ty+70){s.sel=(s.sel===i)?-1:i;hit=true;sfx.click();}
    });
    if(!hit&&mx<CL_X+CL_W)s.sel=-1;
  }
}

/* ── Closet Rendering ── */
function drawCloset(){
  const s=cls;
  if(s.won){drawClosetWin();return;}
  drawCachedBackdrop('room:bedroom',()=>{bgBedroom();});

  // Closet frame (wood grain + brass corners)
  const fx=CL_X-20,fy=CL_Y-40,fw=CL_W+40,fh=CL_H+60;
  fillRect(fx-10,fy-10,fw+20,fh+20,'#3a1f08');
  const wg=ctx.createLinearGradient(fx,fy,fx+fw,fy);
  wg.addColorStop(0,'#6a4210');wg.addColorStop(0.5,'#86591a');wg.addColorStop(1,'#6a4210');
  fillRect(fx,fy,fw,fh,wg);
  for(let i=0;i<fh;i+=6){
    ctx.strokeStyle='rgba(40,22,6,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx+2,fy+i+((i*13)%4));ctx.lineTo(fx+fw-2,fy+i+((i*7)%4));ctx.stroke();
  }
  const ig=ctx.createLinearGradient(0,fy+38,0,fy+fh-10);
  ig.addColorStop(0,'#b58848');ig.addColorStop(1,'#8f6328');
  fillRect(fx+10,fy+38,fw-20,fh-48,ig);
  // Hanging rod with brass caps
  fillRect(fx+12,fy+38,fw-24,7,'#563006');
  circ(fx+20,fy+42,5.5,'#d8b25a');strokeCirc(fx+20,fy+42,5.5,'#6a4208',1.4);
  circ(fx+fw-20,fy+42,5.5,'#d8b25a');strokeCirc(fx+fw-20,fy+42,5.5,'#6a4208',1.4);
  // Brass corner plates
  [[fx+4,fy+4],[fx+fw-22,fy+4],[fx+4,fy+fh-22],[fx+fw-22,fy+fh-22]].forEach(function(p){
    rnd(p[0],p[1],18,18,3,'#d9b262','#7a4e12',1.4);
    circ(p[0]+4,p[1]+4,1.4,'#3a1f08');
    circ(p[0]+14,p[1]+4,1.4,'#3a1f08');
    circ(p[0]+4,p[1]+14,1.4,'#3a1f08');
    circ(p[0]+14,p[1]+14,1.4,'#3a1f08');
  });
  // Engraved title plate
  rnd(CL_X+CL_W/2-90,CL_Y-26,180,18,4,'#a07a2a','#6a4410',1.4);
  txt("PFLUEGER'S CLOSET",CL_X+CL_W/2,CL_Y-13,'#3a1f08',12,'center',"'Courier New',monospace");

  // Draw filled / empty cells
  for(let r=0;r<CL_ROWS;r++){
    for(let c=0;c<CL_COLS;c++){
      const x=CL_X+c*CL_CELL,y=CL_Y+r*CL_CELL;
      const pidx=s.grid[r][c];
      if(pidx!==-1){
        const p=s.pieces[pidx];
        rnd(x+3,y+3,CL_CELL-6,CL_CELL-6,5,p.col,null);
        if((r+c)%2===1){ctx.globalAlpha=0.12;fillRect(x+3,y+3,CL_CELL-6,CL_CELL-6,'#000');ctx.globalAlpha=1;}
      } else {
        fillRect(x+3,y+3,CL_CELL-6,CL_CELL-6,'rgba(70,45,10,0.4)');
      }
      ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.5;ctx.strokeRect(x,y,CL_CELL,CL_CELL);
    }
  }

  // Draw piece icons centered on each placed piece
  s.pieces.forEach(p=>{
    if(!p.placed)return;
    const cells=p.rots[p.rot];
    const maxR=Math.max(...cells.map(([r])=>r));
    const maxC=Math.max(...cells.map(([,c])=>c));
    const cx=CL_X+(p.gc+maxC/2+0.5)*CL_CELL;
    const cy=CL_Y+(p.gr+maxR/2+0.5)*CL_CELL;
    ctx.save();ctx.translate(cx,cy);
    drawClosetPieceIcon(p.id);
    ctx.restore();
    // Label in anchor cell
    txt(p.name,cx,cy+maxR*CL_CELL/2+8,'rgba(255,255,255,0.75)',9,'center',"'Courier New',monospace");
  });

  // Ghost preview
  if(s.sel!==-1&&s.hoverR>=0&&s.hoverR<CL_ROWS&&s.hoverC>=0&&s.hoverC<CL_COLS){
    const p=s.pieces[s.sel];
    const ok=clCanPlace(s.sel,s.hoverR,s.hoverC);
    ctx.globalAlpha=ok?0.55:0.35;
    p.rots[p.rot].forEach(([dr,dc])=>{
      const r=s.hoverR+dr,c=s.hoverC+dc;
      if(r>=0&&r<CL_ROWS&&c>=0&&c<CL_COLS)
        fillRect(CL_X+c*CL_CELL+3,CL_Y+r*CL_CELL+3,CL_CELL-6,CL_CELL-6,ok?p.col:'#ff4444');
    });
    ctx.globalAlpha=1;
  }

  // Error flash
  if(s.errTimer>0){
    ctx.globalAlpha=s.errTimer/25*0.3;
    fillRect(CL_X,CL_Y,CL_W,CL_H,'#ff2200');
    ctx.globalAlpha=1;
  }

  // Snap particles
  if(s.particles&&s.particles.length){
    ctx.save();
    s.particles.forEach(function(p){
      ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
      circ(p.x,p.y,p.r*Math.max(0.2,p.life),p.col);
    });
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // Victory sweep flash
  if(s.winSweep>0){

function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
// Stamp deterministic skin/hair variants on keeper array so each keeper looks distinct.
function stampKeeperVariants(keepers,zone){
  if(!keepers)return keepers;
  keepers.forEach(function(k,i){
    var seed=(zone||0)*7+i;
    k.variant=seed%3;          // 0,1,2 → three skin tones
    k.hairVariant=(seed>>1)%3; // 0,1,2 → three hair shades
    k.uniVariant=seed%2;       // 0,1   → two uniform shades
  });
  return keepers;
}

function showZoneMsg(text){
  if(esc)esc.zoneMsg={text,timer:180};
}

function activateNik(force){
  if(!esc)return;
  if(!esc.nikReady&&!force)return;
  if(esc.nikActive&&!force)return;
  esc.nikActive=true;
  esc.nikTimer=diff.nikDur*60;
  esc.nikScreenAnim=0;
  esc.shake=26;
  esc.nikFlash=28;
  sfx.nikScreech();
  setTimeout(function(){sfx.freeze();},280);
  // Freeze all keepers
  esc.keepers.forEach(function(k){k.frozen=true; k.ft=diff.nikDur*60;});
  if(!force)esc.nikReady=false; // used up for this zone
}

function canMoveTo(nx,ny,map){
  const hw=12,hh=10;
  const corners=[[nx-hw,ny-hh],[nx+hw,ny-hh],[nx-hw,ny+hh],[nx+hw,ny+hh]];
  for(const[cx,cy] of corners){
    const tx=Math.floor(cx/TILE),ty=Math.floor(cy/TILE);
    if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return false;
    const tile=map[ty][tx];
    if(tile===T.WALL||tile===T.WATER||tile===T.BUSH)return false;
  }
  return true;
}

function isOnExit(px,py,map){
  const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);
  if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return false;
  return map[ty][tx]===T.EXIT;
}

function keeperSees(k,px,py){
  if(k.frozen||esc.cheatInvis)return false;
  const dx=px-k.x,dy=py-k.y;
  const dist=Math.hypot(dx,dy);
  const vr=diff.vis*(esc.cheatSlow<1?0.6:1);
  if(dist>vr)return false;
  // Vision cone check
  const toPlayer=Math.atan2(dy,dx);
  let ad=toPlayer-k.angle;
  while(ad>Math.PI)ad-=TAU;
  while(ad<-Math.PI)ad+=TAU;
  return Math.abs(ad)<Math.PI/3;
}

function updateEscape(dt){
  const e=esc;
  if(e.caught){
    e.caughtTimer-=dt;
    if(e.caughtTimer<=0){
      // Restart zone
      restartZone();
    }
    return;
  }
  if(e.won)return;
  if(e.npcDialog){updateDialog(dt);return;}
  // Zone 1 is a cutscene
  if(e.zone===1){
    updateZ1Cutscene(dt);
    return;
  }
  const zd=ZONE_DATA[e.zone];
  const map=zd.map;
  // Player movement
  const spd=(diff.id==='easy'?2.2:diff.id==='medium'?2:1.8)*PLAYER_SPEED_SCALE;
  let vx=0,vy=0;
  if(K['ArrowLeft']||K['KeyA']){vx=-spd; e.player.dir=2;}
  if(K['ArrowRight']||K['KeyD']){vx=spd; e.player.dir=3;}
  if(K['ArrowUp']||K['KeyW']){vy=-spd; e.player.dir=0;}
  if(K['ArrowDown']||K['KeyS']){vy=spd; e.player.dir=1;}
  if(vx!==0&&vy!==0){vx*=0.707; vy*=0.707;}
  const nx=e.player.x+vx,ny=e.player.y+vy;
  if(canMoveTo(nx,e.player.y,map))e.player.x=nx;
  if(canMoveTo(e.player.x,ny,map))e.player.y=ny;
  const moving=(vx!==0||vy!==0);
  e.player.moving=moving;
  if(moving)e.player.anim++;
  e.player.stepCd-=dt;
  if(moving&&e.player.stepCd<=0){
    sfx.step();
    e.player.stepCd=0.32;
  } else if(!moving){
    e.player.stepCd=0;
  }
  if(e.shake>0)e.shake-=dt*60;
  if(e.nikFlash>0)e.nikFlash-=dt*60;
  if(e.flash>0)e.flash-=dt*60;
  // Nik button
  if(eat('KeyN')&&e.nikReady&&!e.nikActive)activateNik(false);
  if(e.nikActive){
    e.nikTimer-=dt*60;
    e.nikScreenAnim++;
    if(e.nikTimer<=0){
      e.nikActive=false;
      e.keepers.forEach(function(k){k.frozen=false;});
    }
  }
  // Update keepers
  e.keepers.forEach(function(k){updateKeeper(k,dt);});
  // Check caught
  e.keepers.forEach(function(k){
    if(!e.cheatFrozen&&keeperSees(k,e.player.x,e.player.y)){
      if(!e.caught){
        e.caught=true;
        e.caughtTimer=2.5;
        e.flash=24;
        if(!e.caughtFired){sfx.caught();e.caughtFired=true;}
      }
    }
  });
  // Nik frozen override
  if(e.cheatFrozen)e.keepers.forEach(k=>{k.frozen=true;});
  // Check NPC interaction
  if(eat('KeyE')||eat('Space')){
    const nearNpc=zd.npcs.find(n=>!n.talked&&Math.hypot(n.x-e.player.x,n.y-e.player.y)<50);
    if(nearNpc){
      nearNpc.talked=true;
      e.npcDialog=true;
      startDialog([nearNpc.msg],null,'',()=>{e.npcDialog=null;});
    }
  }
  // Highlight nearby NPC
  e.nearNpc=zd.npcs.find(n=>!n.talked&&Math.hypot(n.x-e.player.x,n.y-e.player.y)<50);
  // Check exit
  if(isOnExit(e.player.x,e.player.y,map)){
    advanceZone();
  }
  // Zone message timer
  if(e.zoneMsg.timer>0)e.zoneMsg.timer--;
  // Hint dismiss
  if(mclk||eat('Space'))e.showHint=false;
}

function updateKeeper(k,dt){
  if(k.frozen||esc.cheatFrozen)return;
  const spd=(diff.spd*(esc.cheatSlow||1));
  const target=k.patrol[k.pidx];
  const dx=target.x-k.x,dy=target.y-k.y;
  const dist=Math.hypot(dx,dy);
  if(dist<3){
    k.pidx=(k.pidx+1)%k.patrol.length;
  } else {
    k.x+=dx/dist*spd;
    k.y+=dy/dist*spd;
    k.angle=Math.atan2(dy,dx);
  }
}

function updateZ1Cutscene(dt){
  if(esc.z1Done)return;
  if(!dlgState.active&&!esc.z1DialogStarted){
    esc.z1DialogStarted=true;
    startDialog(Z1_DIALOG,null,'',()=>{
      esc.z1Done=true;
      esc.nikReady=true;
      advanceZone();
    });
  }
  updateDialog(dt);
}

function advanceZone(){
  const e=esc;
  e.zone++;
  if(e.zone>=ZONE_DATA.length){
    e.won=true;
    if(!e.wonFired){sfx.win();e.wonFired=true;}
    return;
  }
  sfx.chime();
  const zd=ZONE_DATA[e.zone];
  e.player.x=zd.playerStart.x;
  e.player.y=zd.playerStart.y;
  e.player.dir=0;
  e.keepers=stampKeeperVariants(deepClone(zd.keepers),e.zone);
  e.npcs=deepClone(zd.npcs);
  e.nikActive=false;
  e.nikTimer=0;
  if(e.zone>1)e.nikReady=true; // unlock after zone 1 cutscene
  e.z1DialogStarted=false;
  e.z1Done=false;
  showZoneMsg(zd.name);
  dlgState.active=false;
}

function restartZone(){
  const e=esc;
  const zd=ZONE_DATA[e.zone];
  e.player.x=zd.playerStart.x;
  e.player.y=zd.playerStart.y;
  e.player.dir=0;
  e.keepers=stampKeeperVariants(deepClone(zd.keepers),e.zone);
  e.npcs=deepClone(zd.npcs);
  e.nikActive=false;
  e.nikTimer=0;
  if(e.zone>1)e.nikReady=true;
  e.caught=false;
  e.caughtFired=false;
  e.caughtTimer=0;
  e.showHint=true;
  showZoneMsg(zd.name);
}

function drawKeeperTD(x,y,angle,anim,frozen,k){
  ctx.save(); ctx.translate(x,y);
  if(!frozen&&!esc.cheatInvis){
    ctx.save();
    const fl=0.85+Math.sin((t||0)*0.19+x*0.01)*0.1+Math.random()*0.05;
    const vr=diff.vis;
    const vg=ctx.createRadialGradient(0,0,6,0,0,vr);
    vg.addColorStop(0,'rgba(255,120,80,'+(0.32*fl).toFixed(3)+')');
    vg.addColorStop(0.6,'rgba(255,106,84,'+(0.17*fl).toFixed(3)+')');
    vg.addColorStop(1,'rgba(255,80,60,0)');
    ctx.fillStyle=vg;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.arc(0,0,vr,-Math.PI/3+angle,Math.PI/3+angle);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,200,160,'+(0.45*fl).toFixed(3)+')';ctx.lineWidth=1.1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(-Math.PI/3+angle)*vr,Math.sin(-Math.PI/3+angle)*vr);
    ctx.lineTo(0,0);
    ctx.lineTo(Math.cos(Math.PI/3+angle)*vr,Math.sin(Math.PI/3+angle)*vr);
    ctx.stroke();
    ctx.restore();
  }
  // variant colors (skin, hair, uniform) — fallback to defaults if k is undefined
  var skinTones=[C.keeperSkin1,C.keeperSkin2,C.keeperSkin3];
  var hairTones=[C.keeperHair1,C.keeperHair2,C.keeperHair3];
  var uniforms=[C.keeperBlue,'#2c4f8c'];
  var skin=skinTones[k&&k.variant||0];
  var hair=hairTones[k&&k.hairVariant||0];
  var uniform=uniforms[k&&k.uniVariant||0];
  ellipse(0,6,10,4,'rgba(0,0,0,0.2)');
  // 4-phase discrete walk cycle (both legs alternate) — frozen keepers stand still
  var stride=walkStride4(anim,0.14,!frozen);
  var leftLift=-stride[0], rightLift=-stride[1], bodyBob=-stride[2];
  line(-4,8+bodyBob,-4,16+bodyBob+leftLift,'#143170',3.5);
  line(4,8+bodyBob,4,16+bodyBob+rightLift,'#10265a',3.5);
  rnd(-7,-5+bodyBob,14,17,6,frozen?'#92a7b8':uniform,C.ink,2);
  fillRect(-7,3+bodyBob,14,3,'#d9cf84');
  topLeftLight(0,3+bodyBob,7,8,0.15);
  circ(0,-12+bodyBob,5.5,frozen?'#c8dff0':skin);strokeCirc(0,-12+bodyBob,5.5,C.ink,1.8);
  topLeftLight(0,-12+bodyBob,5.5,5.5,0.18);
  // hair visible at the back of the cap
  ellipse(0,-10+bodyBob,6,2.2,hair);
  fillRect(-8,-20+bodyBob,16,6,'#1b2b5d');
  ellipse(0,-20+bodyBob,10,3,'#0e1a3d');
  strokeEllipse(0,-20+bodyBob,10,3,C.ink,1.5);
  if(frozen){
    // blue icy tint
    ctx.save();
    ctx.globalAlpha=0.35;
    fillRect(-10,-22,20,38,'#8cc6ef');
    ctx.globalAlpha=1;
    ctx.restore();
    // ice shards around the body
    ctx.fillStyle='rgba(210,240,255,0.85)';
    ctx.strokeStyle='#6da4cf';ctx.lineWidth=1;
    for(let i=0;i<4;i++){
      const a=(t*0.05+i*TAU/4)%TAU;
      const sx=Math.cos(a)*14,sy=Math.sin(a)*14-6;
      ctx.beginPath();
      ctx.moveTo(sx,sy-3);ctx.lineTo(sx+2.5,sy);ctx.lineTo(sx,sy+3);ctx.lineTo(sx-2.5,sy);
      ctx.closePath();ctx.fill();ctx.stroke();
    }
    // breath puff
    const puffT=(t*0.03)%1;
    ctx.globalAlpha=(1-puffT)*0.8;
    circ(0,-26-puffT*8,2+puffT*2,'rgba(230,245,255,0.9)');
    ctx.globalAlpha=1;
    // sparkle stars
    ctx.fillStyle='rgba(180,230,255,0.85)';
    ctx.font='bold 10px Georgia';
    for(let i=0;i<3;i++){
      const sx=Math.cos(t*0.1+i*TAU/3)*12;
      const sy=Math.sin(t*0.1+i*TAU/3)*12-8;
      ctx.fillText('*',sx-3,sy+4);
    }
  }
  ctx.restore();
}

function drawMouseTD(x,y,anim){
  anim=anim||0;
  // short scurry loop: 1.2s scurry + 0.8s pause
  const cycT=(anim*0.02)%2;
  const scurry=cycT<1.2?(cycT/1.2):1;
  const offX=Math.sin(scurry*TAU)*6;
  const bob=Math.abs(Math.sin(anim*0.45))*1.2;
  const xx=x+offX;
  ellipse(xx,y+3,8,3,'rgba(0,0,0,0.18)');
  ellipse(xx,y-bob,7,5,'#d9a0a3'); strokeEllipse(xx,y-bob,7,5,C.ink,1.5);
  circ(xx,y-5-bob,5,'#d9a0a3'); strokeCirc(xx,y-5-bob,5,C.ink,1.5);
  circ(xx-5,y-8-bob,3,'#d9a0a3'); circ(xx+5,y-8-bob,3,'#d9a0a3');
  // blink on head
  const mb=isBlinking(anim,0);
  if(mb){
    ctx.strokeStyle=C.ink;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(xx-2,y-5-bob);ctx.lineTo(xx+2,y-5-bob);ctx.stroke();
  } else {
    circ(xx-1.3,y-6-bob,0.9,C.ink);circ(xx+1.3,y-6-bob,0.9,C.ink);
  }
  // wagging tail

function drawParrotTD(x,y,anim){

function drawCatTD(x,y,anim){
  anim=anim||0;

  poly([[x+5,y-12+groom],[x+2,y-18+groom],[x,y-12+groom]],'#c9c8cf',C.ink,1.2);

    circ(x-2,y-9+groom,0.9,C.ink);circ(x+2,y-9+groom,0.9,C.ink);

}

    },

function loadDialogHarnessCase(idx){
  const cases=dialogHarnessCases();
  const next=((idx%cases.length)+cases.length)%cases.length;
  dlgHarness.caseIdx=next;
  dlgHarness.caseDef=cases[next];
  startDialog(dlgHarness.caseDef.lines,dlgHarness.caseDef.portrait,dlgHarness.caseDef.speaker,()=>{
    if(dlgHarness)dlgHarness.loopPending=true;
  });
  dlgHarness.loopPending=false;
}

function initDialogHarness(){
  dlgHarness={caseIdx:0,caseDef:null,poisonAlign:true,loopPending:false};
  loadDialogHarnessCase(0);
}

function updateDialogHarness(dt){
  if(!dlgHarness)initDialogHarness();
  if(eat('ArrowRight')||eat('KeyD'))loadDialogHarnessCase(dlgHarness.caseIdx+1);
  if(eat('ArrowLeft')||eat('KeyA'))loadDialogHarnessCase(dlgHarness.caseIdx-1);
  if(eat('KeyP'))dlgHarness.poisonAlign=!dlgHarness.poisonAlign;
  if(eat('KeyR'))loadDialogHarnessCase(dlgHarness.caseIdx);
  if(eat('Escape')||eat('Backspace')){
    dlgHarness=null;
    dlgState.active=false;
    phase='title';
    return;
  }
  updateDialog(dt);
  if(dlgHarness&&dlgHarness.loopPending&&!dlgState.active){
    loadDialogHarnessCase(dlgHarness.caseIdx);
  }
}
