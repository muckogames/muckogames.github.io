let creditsConfetti=null;
function drawCredits(){
  // Save score once per run (stealth score = 100 − suspicion; higher is better)
  if(!hippoScoreSaved){
    hippoScoreSaved=true;
    const stealthScore=Math.max(0,100-Math.round(suspicion));
    saveHS('mucko_hs_hippo',{score:stealthScore,suspicion:Math.round(suspicion),
      label:suspicionLabel(),date:new Date().toLocaleDateString()});
    // seed confetti on first paint
    creditsConfetti=[];
    for(let i=0;i<80;i++){
      creditsConfetti.push({
        x:Math.random()*W, y:-(Math.random()*200),
        vx:(Math.random()-0.5)*0.6, vy:0.8+Math.random()*1.6,
        rot:Math.random()*TAU, spin:(Math.random()-0.5)*0.08,
        col:['#f6d57a','#ef97c0','#b184d7','#66cc66','#5f86d9','#ef6a45'][i%6],
        w:5+Math.random()*6, h:8+Math.random()*6
      });
    }
    sfx.win();
  }

  drawCachedBackdrop('credits-bg',function(){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0520'); g.addColorStop(0.6,'#1a1038'); g.addColorStop(1,'#2a1a4a');
    fillRect(0,0,W,H,g);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(let i=0;i<60;i++){
      const sx=(i*137+30)%W,sy=(i*97+20)%(H*0.8);
      ctx.beginPath();ctx.arc(sx,sy,1,0,TAU);ctx.fill();
    }
    // moon
    const mnx=W-100,mny=70;
    const gg=ctx.createRadialGradient(mnx,mny,0,mnx,mny,100);
    gg.addColorStop(0,'rgba(255,241,204,0.24)');
    gg.addColorStop(1,'rgba(255,241,204,0)');
    ctx.fillStyle=gg;
    ctx.beginPath(); ctx.arc(mnx,mny,100,0,TAU); ctx.fill();
    ctx.fillStyle='#fff1cc';
    ctx.beginPath(); ctx.arc(mnx,mny,34,0,TAU); ctx.fill();
  });

  // Confetti
  if(creditsConfetti){
    creditsConfetti.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.spin;
      if(p.y>H+20){p.y=-20; p.x=Math.random()*W;}
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
  }

  // Twinkling stars
  for(let i=0;i<30;i++){
    const sx=(i*211+40)%W, sy=(i*97+20)%(H*0.7);
    ctx.globalAlpha=0.35+pulse(t+i*11,0,1,0.05)*0.6;
    ctx.fillStyle='#fff8d0';
    ctx.beginPath(); ctx.arc(sx,sy,0.8+(i%3)*0.5,0,TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Characters with ground shadows
  softShadow(240,H-80,40,7,0.3);
  softShadow(440,H-100,46,8,0.3);
  softShadow(600,H-80,36,6,0.3);
  ctx.save(); ctx.translate(240,H-140+Math.sin(t*0.04)*3);
  drawPflueger(0,0,1.2,false,t*0.5);
  ctx.restore();
  ctx.save(); ctx.translate(440,H-160+Math.sin(t*0.04+1.2)*3);
  drawHippoCool(0,0,1.3,t*0.4);
  ctx.restore();
  ctx.save(); ctx.translate(600,H-140+Math.sin(t*0.04+2.4)*3);
  drawLisa(0,0,1,false,t*0.6);
  ctx.restore();

  // Title + ending summary
  glowText('The End',W/2,102,C.gold,54,'center','bold Georgia','rgba(246,213,122,0.7)',20);
  txt('"Good night, Hippo."  "Good night."',W/2,152,'#f0e0a8',18,'center','italic Georgia');
  txt(endingSummary(),W/2,190,'#d0c0a0',14,'center','Georgia');
  drawSuspicionMeter(W/2-120,212,240,false);

  // Star rating (0-5) based on stealthScore
  const score=Math.max(0,100-Math.round(suspicion));
  const stars=Math.max(0,Math.min(5,Math.floor(score/20)+(score%20>=10?1:0)));
  const sy0=256;
  for(let s=0;s<5;s++){
    const sx0=W/2-90+s*38;
    const lit=s<stars;
    const sp=pulse(t+s*17,0.8,1.0,0.08);
    ctx.save();
    ctx.translate(sx0,sy0);
    if(lit)ctx.scale(sp,sp);
    ctx.fillStyle=lit?'#ffe36a':'rgba(120,100,60,0.35)';
    if(lit){ctx.shadowColor='rgba(255,230,120,0.8)'; ctx.shadowBlur=14;}
    ctx.beginPath();
    for(let k=0;k<10;k++){
      const ang=-Math.PI/2+k*Math.PI/5;
      const rr=k%2===0?15:7;
      ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // High score board
  const hsAll=getHS('mucko_hs_hippo');
  if(hsAll.length>0){
    const bx=14,by=306,bw=200,rowH=22;
    const rows=hsAll.slice(0,5);
    rnd(bx,by-22,bw,26+rows.length*rowH,6,'rgba(10,5,30,0.85)','rgba(246,213,122,0.55)',1.2);
    txt('Best Runs',bx+bw/2,by-5,C.gold,12,'center','bold Georgia');
    rows.forEach(function(e,i){
      const ry=by+i*rowH;
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
      txt(medal+' '+e.score+'pts',bx+8,ry+14,'#d4c090',11,'left',"'Courier New',monospace");
      txt(e.label||'',bx+bw-8,ry+14,'#a080c0',10,'right',"'Courier New',monospace");
    });
  }

  txt('"Waaastin\' away again in Margaritaville..."',W/2,H-80,'#c0a080',13,'center','italic Georgia');

  // Play Again
  const bx2=W/2-130,by2=H-50,bw2=260,bh2=42;
  const bhov=mx>=bx2&&mx<=bx2+bw2&&my>=by2&&my<=by2+bh2;
  const bg2=ctx.createLinearGradient(bx2,by2,bx2,by2+bh2);
  if(bhov){bg2.addColorStop(0,'#6b3cb8');bg2.addColorStop(1,'#2a1060');}
  else{bg2.addColorStop(0,'#4a2890');bg2.addColorStop(1,'#1e0a48');}
  ctx.save();
  ctx.shadowColor='rgba(246,213,122,'+(bhov?0.55:0.3)+')';
  ctx.shadowBlur=bhov?16:8;
  rnd(bx2,by2,bw2,bh2,10,bg2,C.gold,2.2);
  ctx.restore();
  rnd(bx2+3,by2+3,bw2-6,bh2-6,8,null,'rgba(255,240,190,0.22)',1);
  txt('Play Again',W/2,by2+27,C.gold,17,'center','bold Georgia');
  if(bhov)canvas.style.cursor='pointer';
  if(bhov&&mclk){mclk=false; sfx.confirm(); creditsConfetti=null; resetRun(); phase='title';}
}

/* ================================================================
   MAIN GAME LOOP
   ================================================================ */
let lastTs=0;
let lastRenderTs=0;
let simDebt=0;
const SIM_STEP=1/60;
const MAX_SIM_CATCHUP=SIM_STEP*6;
function targetFps(){
  if(LOW_FPS_PHASES.has(phase))return 30;
  if(phase==='escape'&&esc&&(esc.won||esc.zone===1))return 30;
  if(phase==='stealth'&&stl&&(stl.won||stl.caught||stl.sandwichEaten))return 30;
  if(phase==='cleanup'&&cln&&(cln.won||cln.failed))return 30;
  if(phase==='closet_game'&&cls&&cls.won)return 30;
  return 60;
}
function phaseUsesBackdropLayer(){
  return phase==='story'||phase==='escape'||phase==='stealth'||phase==='cleanup'||phase==='closet_game'||phase==='credits';
}
function stepSimulation(dt){
  t++;
  updateFade(dt);
  switch(phase){
    case 'dialog_harness': updateDialogHarness(dt); break;
    case 'escape': updateEscape(dt); break;
    case 'stealth': updateStealth(dt); break;
    case 'cleanup': updateCleanup(dt); break;
    case 'closet_game': updateCloset(dt); break;
    case 'cheatscroll': updateCheatScroll(); break;
  }
  if(suspNotice.timer>0)suspNotice.timer=Math.max(0,suspNotice.timer-dt*60);
}
function renderPhase(){
  switch(phase){
    case 'title': drawTitle(); break;
    case 'highscores': drawHighScores(); break;
    case 'diff': drawDiff(); break;
    case 'story': handleStory(); break;
    case 'dialog_harness': drawDialogHarness(); break;
    case 'escape': drawEscape(); break;
    case 'stealth': drawStealth(); break;
    case 'cleanup': drawCleanup(); break;
    case 'closet_game': drawCloset(); break;
    case 'credits': drawCredits(); break;
    case 'cheatscroll': drawCheatScroll(); break;
    case 'epilogue':
      sceneIdx=findScene('epilogue_start');
      phase='story';
      handleStory();
      break;
  }
}
function loop(ts){
  const elapsed=lastTs?Math.min((ts-lastTs)/1000,MAX_SIM_CATCHUP):0;
  lastTs=ts;
  simDebt=Math.min(simDebt+elapsed,MAX_SIM_CATCHUP);
  while(simDebt>=SIM_STEP){
    stepSimulation(SIM_STEP);
    simDebt-=SIM_STEP;
  }
  const fps=targetFps();
  if(fps<60){
    const minFrameMs=1000/fps;
    if(lastRenderTs&&ts-lastRenderTs<minFrameMs){
      requestAnimationFrame(loop);
      return;
    }
  }
  lastRenderTs=ts;
  if(!phaseUsesBackdropLayer()&&activeBackdropKey!==null)clearBackdropLayer();
  ctx.clearRect(0,0,W,H);
  canvas.style.cursor='default';
  renderPhase();
  drawMobileControls();
  if(phase!=='title'&&phase!=='diff'&&phase!=='dialog_harness')drawSuspicionNotice();
  drawFade();
  // Clear one-shot click
  mclk=false;
  Object.keys(JP).forEach(k=>JP[k]=false);
  requestAnimationFrame(loop);
}
if(DEBUG_HARNESS==='dialog'){
  initDialogHarness();
  phase='dialog_harness';
}
requestAnimationFrame(loop);
</script>
