<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pflueger and the Hippo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0828;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#gc{display:block;cursor:default;border:3px solid #c8a050;border-radius:8px;box-shadow:0 0 40px rgba(200,160,80,0.3);}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
'use strict';
/* ===================================================================
   PFLUEGER AND THE HIPPO  —  a web game
   =================================================================== */
const W=800,H=560;
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/(W+6),(window.innerHeight-6)/(H+6));
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

/* ─── INPUT ─── */
const K={},JP={};
document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true; K[e.code]=true; cheatKey(e.key);});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function eat(c){if(JP[c]){JP[c]=false;return true;}return false;}
let mx=W/2,my=H/2,mclk=false;
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);
  my=(e.clientY-r.top)*(H/r.height);
  mclk=true;
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);
  my=(e.clientY-r.top)*(H/r.height);
});

/* ─── CHEAT CODES ─── */
let cbuf='';
const CHEATS={
  MARGARITAVILLE:()=>startPhase('epilogue'),
  LEKAN:()=>startPhase('escape'),
  NIKNIK:()=>{if(esc)esc.cheatFrozen=true;},
  BASIL:()=>{if(esc)esc.cheatInvis=true;},
  PRASTHEKOALA:()=>{if(esc)esc.cheatSlow=0.2;},
  SKREEEEM:()=>{if(esc&&esc.nikReady&&!esc.nikActive)activateNik(true);},
  CLOSETLIFE:()=>startPhase('closet_game'),
  PBANDJ:()=>startPhase('stealth'),
};
function cheatKey(k){
  if(k.length!==1)return;
  cbuf=(cbuf+k.toUpperCase()).slice(-20);
  for(const code of Object.keys(CHEATS)){
    if(cbuf.endsWith(code)){CHEATS[code]();cbuf='';return;}
  }
}

/* ─── DIFFICULTY ─── */
const DIFFS=[
  {id:'easy',  label:'Jimmy Buffett',      col:'#66cc66', spd:0.65, vis:75,  nikDur:7,   desc:'Keepers are slow and near-sighted.'},
  {id:'medium',label:'Mischievous Fellow', col:'#e8b820', spd:1.2,  vis:110, nikDur:5,   desc:'A fair challenge for any adventurer.'},
  {id:'hard',  label:'Panda Mastermind',   col:'#dd4444', spd:1.9,  vis:155, nikDur:3.5, desc:'Lekan did not plan for easy mode.'},
];
let diff=DIFFS[1];

/* ─── GLOBAL STATE ─── */
let phase='title';
let t=0;       // tick counter
let sceneIdx=0;
let esc=null;  // escape game state
let fade={a:0,dir:0,cb:null}; // screen fade

function startPhase(p){
  if(p==='escape'){initEscape();}
  else if(p==='stealth'){initStealth();}
  else if(p==='closet_game'){initCloset();}
  else if(p==='epilogue'){sceneIdx=findScene('epilogue_start');}
  phase=p;
}
function findScene(id){
  const idx=SCENES.findIndex(s=>s.id===id);
  return idx>=0?idx:0;
}

/* ─── DRAW UTILITIES ─── */
const TAU=Math.PI*2;
function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function circ(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();}
function ellipse(x,y,rx,ry,c,rot){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,TAU);ctx.fill();}
function txt(s,x,y,c,sz,align,font){
  ctx.fillStyle=c; ctx.font=`${sz||16}px ${font||'Georgia'}`;
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  ctx.fillText(s,x,y);
}
function txtW(s,sz,font){
  ctx.font=`${sz||16}px ${font||'Georgia'}`;
  return ctx.measureText(s).width;
}
function rnd(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r||0);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}

/* ─── COLOR PALETTE ─── */
const C={
  sky1:'#c8dff8',sky2:'#8ab8e8',
  grass:'#a8d868',grassDk:'#78b040',
  path:'#d0c090',pathBrd:'#b0a060',
  wall:'#8890b0',wallDk:'#586080',
  water:'#68a8e0',waterDk:'#3878b8',
  bush:'#60a040',bushDk:'#409028',
  hippo:'#bcb8cc',hippoDk:'#8c8898',hippoMouth:'#c88090',
  pflShirt:'#e84830',pflOrange:'#f09020',pflBlue:'#4870c8',pflHair:'#e8c030',
  lisaPink:'#e060a0',lisaPurp:'#8858b8',lisaHair:'#d09030',
  momShirt:'#a09070',momHair:'#e0c040',
  keeperBlue:'#2848a0',keeperDk:'#081840',
  pandaW:'#f0f0f0',pandaDk:'#202028',
  nikBrown:'#a05020',nikSkin:'#d09060',
  gold:'#ffd700',cream:'#f8f0d8',dimTxt:'#b09060',
  dialogBg:'rgba(12,5,28,0.94)',dialogBdr:'#c8a050',
  nikBtn:'#d04018',nikHov:'#ff5828',
};

/* ================================================================
   STORY-MODE SPRITES  (side/front view, drawn on story canvas)
   ================================================================ */

function drawHippoSide(cx,cy,sc,flip,anim){
  sc=sc||1; anim=anim||0;
  const bob=Math.sin(anim*0.05)*2;
  ctx.save(); ctx.translate(cx,cy);
  if(flip)ctx.scale(-1,1); ctx.scale(sc,sc);
  // shadow
  ellipse(0,44+bob,28,7,'rgba(0,0,0,0.12)');
  // body
  ellipse(0,8+bob,32,26,C.hippo);
  // head
  ellipse(28,-1+bob,20,16,C.hippo);
  // snout
  ellipse(40,4+bob,11,8,'#aca8bc');
  circ(37,2+bob,2,'#708090'); circ(42,2+bob,2,'#708090');
  // ear
  ellipse(12,-20+bob,6,8,C.hippoDk,-0.3);
  // eye
  circ(31,-6+bob,4,'#202028'); circ(32,-7+bob,1.5,'#fff');
  // legs
  fillRect(-22,26+bob,14,20,C.hippoDk);
  fillRect(6,26+bob,14,20,C.hippoDk);
  // feet
  ellipse(-15,46+bob,9,5,'#8080a0');
  ellipse(13,46+bob,9,5,'#8080a0');
  ctx.restore();
}

function drawHippoCool(cx,cy,sc,anim){
  sc=sc||1; anim=anim||0;
  drawHippoSide(cx,cy,sc,false,anim);
  const bob=Math.sin((anim||0)*0.05)*2;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  // cap
  ctx.fillStyle='#3850a8';
  ctx.beginPath(); ctx.ellipse(24,-16+bob,17,6,0,0,TAU); ctx.fill();
  fillRect(10,-26+bob,28,12,'#3850a8');
  fillRect(8,-28+bob,30,6,'#2a4090');
  // sunglasses
  rnd(20,-10+bob,14,7,3,'#1a1a2a','#707080',1.5);
  fillRect(18,-8+bob,4,3,'#505060');
  ctx.restore();
}

function drawPflueger(cx,cy,sc,flip,anim){
  sc=sc||1; anim=anim||0;
  const bob=Math.sin(anim*0.08)*2;
  const ls=Math.sin(anim*0.14)*8;
  ctx.save(); ctx.translate(cx,cy);
  if(flip)ctx.scale(-1,1); ctx.scale(sc,sc);
  // shadow
  ellipse(0,52,14,4,'rgba(0,0,0,0.1)');
  // legs
  fillRect(-10,26+bob,10,20+Math.max(0,ls),C.pflBlue);
  fillRect(2,26+bob,10,20+Math.max(0,-ls),'#3868b8');
  // shoes follow their leg bottoms
  ctx.fillStyle='#604030';
  ctx.beginPath(); ctx.ellipse(-5,48+bob+Math.max(0,ls),7,4,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,48+bob+Math.max(0,-ls),7,4,0,0,TAU); ctx.fill();
  // shirt (red with orange stripe)
  fillRect(-12,8+bob,24,20,C.pflShirt);
  fillRect(-12,14+bob,24,5,C.pflOrange);
  // arms
  fillRect(-20,10+bob,9,16,'#d84020');
  fillRect(11,10+bob,9,16,'#d84020');
  circ(-16,27+bob,5,'#f0c850'); circ(17,27+bob,5,'#f0c850');
  // neck
  fillRect(-5,2+bob,10,8,'#f0c850');
  // head
  circ(0,-9+bob,15,'#f8d060');
  // curly hair
  ctx.fillStyle=C.pflHair;
  for(let i=-12;i<=12;i+=6){ ctx.beginPath(); ctx.arc(i,-20+bob,7,0,TAU); ctx.fill(); }
  ctx.beginPath(); ctx.arc(0,-24+bob,6,0,TAU); ctx.fill();
  // eyes
  circ(-5,-9+bob,2.5,'#202028'); circ(5,-9+bob,2.5,'#202028');
  circ(-4,-10+bob,1,'#fff'); circ(6,-10+bob,1,'#fff');
  // mouth
  ctx.strokeStyle='#a05030'; ctx.lineWidth=1.5; ctx.beginPath();
  ctx.arc(0,-5+bob,5,0.25,Math.PI-0.25); ctx.stroke();
  ctx.restore();
}

function drawLisa(cx,cy,sc,flip,anim){
  sc=sc||1; anim=anim||0;
  const bob=Math.sin(anim*0.08)*2;
  ctx.save(); ctx.translate(cx,cy);
  if(flip)ctx.scale(-1,1); ctx.scale(sc,sc);
  ellipse(0,50,12,4,'rgba(0,0,0,0.1)');
  // skirt/legs
  fillRect(-12,22+bob,24,24,C.lisaPurp);
  circ(-6,46+bob,5,'#d0c0e0'); circ(6,46+bob,5,'#d0c0e0');
  // shirt
  fillRect(-11,6+bob,22,18,C.lisaPink);
  circ(0,12+bob,3.5,'#fff8a0'); // flower
  ctx.strokeStyle='#e8d020'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,12+bob,3.5,0,TAU); ctx.stroke();
  // arms
  fillRect(-18,8+bob,8,16,'#d050a0');
  fillRect(10,8+bob,8,16,'#d050a0');
  circ(-15,24+bob,5,'#f8d090'); circ(14,24+bob,5,'#f8d090');
  // neck
  fillRect(-4,0+bob,8,8,'#f8d090');
  // hair & pigtails FIRST so the face covers the roots
  ctx.fillStyle='#c08020';
  ctx.beginPath(); ctx.arc(-16,-7+bob,6,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(16,-7+bob,6,0,TAU); ctx.fill();
  ctx.fillStyle='#d09030';
  ctx.beginPath(); ctx.arc(0,-11+bob,11,0,TAU); ctx.fill();
  // head face on top of hair
  circ(0,-9+bob,13,'#f8d090');
  // bows
  circ(-16,-13+bob,3,'#e060a0'); circ(16,-13+bob,3,'#e060a0');
  // glasses and eyes on top of everything
  ctx.strokeStyle='#404040'; ctx.lineWidth=1.5;
  rnd(-12,-13+bob,10,8,2,null,'#404040',1.5);
  rnd(2,-13+bob,10,8,2,null,'#404040',1.5);
  fillRect(-1,-11+bob,2,4,'#404040');
  circ(-7,-9+bob,2,'#202028'); circ(7,-9+bob,2,'#202028');
  ctx.restore();
}

function drawMom(cx,cy,sc,anim){
  sc=sc||1; anim=anim||0;
  const bob=Math.sin(anim*0.06)*2;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ellipse(0,66,16,5,'rgba(0,0,0,0.1)');
  fillRect(-14,26+bob,28,34,C.momShirt);
  circ(-7,60+bob,6,'#908060'); circ(7,60+bob,6,'#908060');
  fillRect(-13,4+bob,26,24,C.momShirt);
  fillRect(-20,6+bob,8,22,'#907860');
  fillRect(12,6+bob,8,22,'#907860');
  circ(-17,28+bob,5,'#f8d0a0'); circ(17,28+bob,5,'#f8d0a0');
  fillRect(-5,-2+bob,10,8,'#f8d0a0');
  circ(0,-12+bob,14,'#f8d0a0');
  ctx.fillStyle='#e0c020';
  for(let i=-10;i<=10;i+=5){ ctx.beginPath(); ctx.arc(i,-22+bob,7,0,TAU); ctx.fill(); }
  circ(-5,-12+bob,2.5,'#202028'); circ(5,-12+bob,2.5,'#202028');
  circ(-4,-13+bob,1,'#fff'); circ(6,-13+bob,1,'#fff');
  ctx.restore();
}

/* ================================================================
   BACKGROUND DRAWING (story mode)
   ================================================================ */

function bgNeighborhood(){
  // sky
  const sg=ctx.createLinearGradient(0,0,0,H*0.55);
  sg.addColorStop(0,'#c0d8f8'); sg.addColorStop(1,'#e8eefc');
  fillRect(0,0,W,H*0.55,sg);
  // ground
  fillRect(0,H*0.55,W,H*0.45,C.path);
  fillRect(0,H*0.52,W,12,C.grass);
  // houses
  const houses=[
    {x:40,w:110,h:130,c:'#e8d8b0',rc:'#c09880'},
    {x:170,w:140,h:150,c:'#d8c8f0',rc:'#a888c8'},
    {x:330,w:120,h:120,c:'#f0e0c0',rc:'#d8a880'},
    {x:470,w:130,h:140,c:'#d0e8c8',rc:'#90b870'},
    {x:620,w:120,h:130,c:'#f0d8d8',rc:'#c89090'},
  ];
  houses.forEach(h=>{
    const top=H*0.52-h.h;
    fillRect(h.x,top+30,h.w,h.h,h.c);
    ctx.fillStyle=h.rc;
    ctx.beginPath(); ctx.moveTo(h.x-10,top+32); ctx.lineTo(h.x+h.w/2,top-10); ctx.lineTo(h.x+h.w+10,top+32); ctx.closePath(); ctx.fill();
    fillRect(h.x+h.w/2-12,top+h.h-20,24,24,'#e8d0a0');
    rnd(h.x+15,top+50,30,26,3,'#c0d8f8');
  });
  // sidewalk
  fillRect(0,H*0.72,W,6,'#c8c0a8');
}

  sg.addColorStop(0,'#c0d0e8'); sg.addColorStop(1,'#dce8f8');
  fillRect(0,0,W,H,sg);

  const bldgs=[
    {x:0,w:200,h:320,c:'#f0c0a0',label:"Angela's\nBed & Breakfast"},

    {x:400,w:190,h:260,c:'#d0d8f0',label:'BOOKSHOP'},

/* ================================================================
   DIALOG BOX
   ================================================================ */

let dlgState={active:false,lines:[],lineIdx:0,charIdx:0,charTimer:0,portrait:null,speaker:'',cb:null};

function startDialog(lines,portrait,speaker,cb){
  dlgState={active:true,lines:lines.map(l=>l||''),lineIdx:0,charIdx:0,charTimer:0,portrait:portrait||null,speaker:speaker||'',cb:cb||null};
}

function updateDialog(dt){
  if(!dlgState.active)return;
  dlgState.charTimer+=dt;
  if(dlgState.charTimer>0.025){
    dlgState.charTimer=0;
    const line=dlgState.lines[dlgState.lineIdx]||'';
    if(dlgState.charIdx<line.length)dlgState.charIdx++;
  }
  if(eat('Space')||eat('Enter')||mclk){
    mclk=false;
    const line=dlgState.lines[dlgState.lineIdx]||'';
    if(dlgState.charIdx<line.length){
      dlgState.charIdx=line.length; // show full line
    } else {
      dlgState.lineIdx++;
      dlgState.charIdx=0;
      if(dlgState.lineIdx>=dlgState.lines.length){
        dlgState.active=false;
        if(dlgState.cb)dlgState.cb();
      }
    }
  }
}

function drawDialog(){
  if(!dlgState.active)return;
  // In game phases, stay within the map area (left of right panel)
  const inGame=(phase==='escape'||phase==='stealth'||phase==='closet_game');
  const bx=10,by=H-130,bw=inGame?630:W-40,bh=115;
  rnd(bx,by,bw,bh,8,C.dialogBg,C.dialogBdr,2);
  // portrait
  const hasPortrait=!!dlgState.portrait;
  const textX=bx+(hasPortrait?90:20);
  const textW=bw-(hasPortrait?110:40);
  if(hasPortrait){
    rnd(bx+10,by+10,72,72,4,'rgba(0,0,0,0.4)',C.dialogBdr,1);
    ctx.save(); ctx.translate(bx+46,by+70);
    if(dlgState.portrait==='hippo')drawHippoSide(0,0,0.55,false,t);
    else if(dlgState.portrait==='pflueger')drawPflueger(0,0,0.55,false,t);
    else if(dlgState.portrait==='lisa')drawLisa(0,0,0.55,false,t);
    else if(dlgState.portrait==='mom')drawMom(0,0,0.55,t);
    ctx.restore();
  }
  if(dlgState.speaker){
    txt(dlgState.speaker,textX,by+20,C.gold,14,'left',"'Courier New',monospace");
  }
  // word-wrapped text
  const line=(dlgState.lines[dlgState.lineIdx]||'').substring(0,dlgState.charIdx);
  const words=line.split(' ');
  ctx.font=`16px Georgia`;
  let lx=textX,ly=by+(dlgState.speaker?42:28),lineH=22;
  words.forEach(w=>{
    const ww=ctx.measureText(w+' ').width;
    if(lx>textX&&lx+ww>bx+bw-20){lx=textX;ly+=lineH;}
    ctx.fillStyle=C.cream; ctx.fillText(w+' ',lx,ly);
    lx+=ww;
  });
  // advance indicator
  const line2=dlgState.lines[dlgState.lineIdx]||'';
  if(dlgState.charIdx>=line2.length){
    const blk=Math.floor(t/20)%2===0;
    if(blk)txt('▼',bx+bw-30,by+bh-15,C.gold,14);
  }
  // line counter
  if(dlgState.lines.length>1){
    txt(`${dlgState.lineIdx+1}/${dlgState.lines.length}`,bx+bw-60,by+18,C.dimTxt,11,'left',"'Courier New',monospace");
  }
}

let titleSel=1; // selected difficulty
function drawTitle(){
  // bg gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0828'); g.addColorStop(1,'#2a1040');
  fillRect(0,0,W,H,g);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<60;i++){
    const sx=(i*137+20)%W, sy=(i*97+10)%(H*0.6);
    const sz=Math.sin(t*0.02+i)*0.5+1;
    ctx.beginPath(); ctx.arc(sx,sy,sz,0,TAU); ctx.fill();
  }
  // silhouette ground
  fillRect(0,H-80,W,80,'#0a0518');
  for(let i=0;i<8;i++){
    const hx=i*110-10, hw=90+i*5;
    fillRect(hx,H-80-60-i*8,hw,70+i*8,'#0d0720');
  }
  // moon
  circ(W-120,80,50,'#f8f0d0');
  circ(W-100,68,42,'#1a0828');
  // floating characters
  const bob=Math.sin(t*0.04)*6;
  ctx.save(); ctx.translate(W/2-80,H-220+bob);
  drawHippoCool(0,0,1.3,t);
  ctx.restore();
  ctx.save(); ctx.translate(W/2+110,H-190+bob*0.7);
  drawPflueger(0,0,1.1,false,t*0.6);
  ctx.restore();
  // title text
  ctx.save();
  ctx.shadowColor='rgba(255,160,0,0.8)'; ctx.shadowBlur=20;
  txt('Pflueger',W/2,130,C.gold,54,'center','Georgia');
  txt('& the Hippo',W/2,188,'#f0e0a8',42,'center','Georgia');
  ctx.restore();
  txt('A game based on the book by a friend',W/2,218,C.dimTxt,13,'center','Georgia');
  // press to start
  if(Math.floor(t/30)%2===0){
    txt('Click or press SPACE to start',W/2,H-40,'#c8a050',15,'center',"'Courier New',monospace");
  }
  if(mclk||eat('Space')){mclk=false; phase='diff';}
}

function drawDiff(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1030'); g.addColorStop(1,'#0a0818');
  fillRect(0,0,W,H,g);
  txt('Choose Your Challenge',W/2,60,C.gold,30,'center','Georgia');
  txt('This setting affects the Escape mini-game.',W/2,90,C.dimTxt,14,'center',"'Courier New',monospace");
  DIFFS.forEach((d,i)=>{
    const bx=W/2-200, by=130+i*120, bw=400, bh=100;
    const hov=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
    const sel=diff.id===d.id;
    rnd(bx,by,bw,bh,10,sel?'rgba(40,20,80,0.95)':'rgba(20,10,50,0.8)',sel?d.col:'#605050',sel?3:1);
    txt(d.label,bx+20,by+38,d.col,22,'left','Georgia');
    txt(d.desc,bx+20,by+68,'#c0b0a0',14,'left',"'Courier New',monospace");
    // hippo speed preview
    const spd='Speed: '+'█'.repeat(Math.round(d.spd*2.5))+'░'.repeat(6-Math.round(d.spd*2.5));
    txt(spd,bx+20,by+88,d.col,12,'left',"'Courier New',monospace");
    if(hov){canvas.style.cursor='pointer';}
    if(hov&&mclk){mclk=false; diff=d;}
  });
  canvas.style.cursor='default';
  DIFFS.forEach((d,i)=>{
    const bx=W/2-200, by=130+i*120, bw=400, bh=100;
    const hov=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
    if(hov){canvas.style.cursor='pointer';}
  });
  // Start button
  const sx=W/2-120,sy=H-90,sw=240,sh=50;
  const shov=mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh;
  rnd(sx,sy,sw,sh,8,shov?'#3a2060':'#2a1040',C.dialogBdr,2);
  txt('Begin Adventure →',W/2,sy+32,C.gold,18,'center','Georgia');
  if(shov)canvas.style.cursor='pointer';
  if((shov&&mclk)||eat('Space')){
    mclk=false; phase='story'; sceneIdx=0;
  }
}

/* ================================================================
   STORY ENGINE
   ================================================================ */
function drawScene(scene){
  // Draw background
  if(scene.bg)scene.bg();
  else fillRect(0,0,W,H,'#1a1030');
  // Draw characters
  (scene.chars||[]).forEach(ch=>{
    ctx.save();
    const anim=t+(ch.animOff||0);
    if(ch.type==='pflueger')drawPflueger(ch.x,ch.y,ch.sc||1,ch.flip||false,anim);
    else if(ch.type==='hippo')drawHippoSide(ch.x,ch.y,ch.sc||1,ch.flip||false,anim);
    else if(ch.type==='hippocool')drawHippoCool(ch.x,ch.y,ch.sc||1,anim);
    else if(ch.type==='lisa')drawLisa(ch.x,ch.y,ch.sc||1,ch.flip||false,anim);
    else if(ch.type==='mom')drawMom(ch.x,ch.y,ch.sc||1,anim);
    ctx.restore();
  });
  // Special overlays
  if(scene.special==='newspaper'){
    rnd(W/2-200,30,400,260,6,'rgba(240,235,220,0.97)','#808080',2);
    txt('HIPPO ESCAPES FROM LOCAL ZOO',W/2,70,'#111',18,'center',"'Courier New',monospace");
    txt('ZOOKEEPERS BAFFLED, CITY IN TURMOIL',W/2,92,'#333',12,'center',"'Courier New',monospace");
    fillRect(W/2-190,100,380,2,'#888');
    const body="Chaos broke out yesterday when a giant hippopotamus escaped from the confines of his zoo enclosure and burst free into town. The escape occurred at approximately 10am. Witnesses report the hippo stopped for coffee, was spotted at a grocery store, and later seen buying shoes at the mall.";
    wrapText(body,W/2-185,116,370,15,'#222','left',"'Courier New',monospace");
  }
  if(scene.special==='stub'){
    rnd(W/2-220,60,440,100,8,'rgba(255,200,0,0.15)','#c8a050',2);
    txt('🚧 Coming Soon: Closet Packing Puzzle! 🚧',W/2,108,'#e8c040',16,'center','Georgia');
    txt('(Help Mr. Hippo squeeze into Pflueger\'s closet)',W/2,132,'#b09030',13,'center','Georgia');
  }
  // Speech bubble
  if(scene.bubble){
    drawBubble(scene.bubble.txt,scene.bubble.x,scene.bubble.y);
  }
  // Dialog / narrative text at bottom
  const bx=20,by=H-115,bw=W-40,bh=100;
  rnd(bx,by,bw,bh,8,C.dialogBg,C.dialogBdr,2);
  if(scene.speaker){
    txt(scene.speaker+':',bx+18,by+22,C.gold,13,'left',"'Courier New',monospace");
  }
  wrapText(scene.text||'',bx+18,by+(scene.speaker?38:22),bw-36,17,C.cream,'left','Georgia');
  // Chapter label (top-left)
  const chLabel=getChapterLabel(sceneIdx);
  if(chLabel){
    rnd(8,8,chLabel.length*8+16,24,4,'rgba(0,0,0,0.5)','#604830',1);
    txt(chLabel,16,25,C.dimTxt,13,'left',"'Courier New',monospace");
  }
  // Advance hint
  if(Math.floor(t/30)%2===0){

  txt('◄ Back',16,H-15,C.dimTxt,12,'left',"'Courier New',monospace");
  const backHov=mx>=8&&mx<=78&&my>=H-32&&my<=H-8;
  if(backHov){canvas.style.cursor='pointer'; if(mclk){mclk=false; if(sceneIdx>0)sceneIdx--;}}
  else canvas.style.cursor='default';
}

function getChapterLabel(idx){
  const id=SCENES[idx]?.id||'';
  if(id.startsWith('ch1'))return 'Chapter 1: Once Upon a Time';
  if(id.startsWith('ch2'))return 'Chapter 2: The Hippo Arrives';
  if(id.startsWith('ch3'))return 'Chapter 3: Following Everywhere';
  if(id.startsWith('ch4'))return 'Chapter 4: Pflueger\'s Dilemma';
  if(id.startsWith('ch5'))return 'Chapter 5: Long and Hard';
  if(id.startsWith('ch6'))return 'Chapter 6: The Next Morning';
  if(id.startsWith('ch7'))return 'Chapter 7: Calling Lisa';
  if(id.startsWith('ch8'))return 'Chapter 8: The Library';
  if(id.startsWith('decision'))return 'The Decision';
  if(id.startsWith('closet'))return 'Chapter 9: Moving In';
  if(id.startsWith('epilogue'))return 'Epilogue: The New Normal';
  return '';
}

function drawBubble(text,bx,by){
  const lines=text.split('\n');
  const maxW=lines.reduce((m,l)=>Math.max(m,txtW(l,14,"'Courier New',monospace")),0);
  const bw=maxW+24,bh=lines.length*18+16;
  rnd(bx-bw/2,by-bh,bw,bh,8,'white','#404040',1.5);
  // tail
  ctx.fillStyle='white'; ctx.strokeStyle='#404040'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx-8,by); ctx.lineTo(bx+8,by); ctx.lineTo(bx,by+18); ctx.closePath();
  ctx.fill(); ctx.stroke();
  lines.forEach((l,i)=>txt(l,bx,by-bh+22+i*18,'#202028',14,'center',"'Courier New',monospace"));
}

function wrapText(text,x,y,maxW,lineH,col,align,font){
  ctx.fillStyle=col; ctx.font=`${lineH}px ${font||'Georgia'}`;
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  const words=text.split(' ');
  let lx=x,ly=y;
  words.forEach(w=>{
    const ww=ctx.measureText(w+' ').width;
    if(lx>x&&lx+ww>x+maxW){lx=x;ly+=lineH+4;}
    ctx.fillText(w+' ',lx,ly); lx+=ww;
  });
}

function handleStory(){
  canvas.style.cursor='default';
  if(sceneIdx>=SCENES.length){phase='credits';return;}
  const scene=SCENES[sceneIdx];
  drawScene(scene);
  // Advance on click/space
  if(mclk||eat('Space')){
    mclk=false;
    const act=scene.action;
    if(act==='stealth'){initStealth();phase='stealth';return;}
    if(act==='closet_game'){initCloset();phase='closet_game';return;}
    if(act==='escape'){initEscape();phase='escape';return;}
    if(act==='epilogue_story'){sceneIdx=findScene('epilogue_start');return;}
    if(act==='credits'){phase='credits';return;}
    sceneIdx++;
    if(sceneIdx>=SCENES.length)phase='credits';
  }
}

function momSees(px,py){
  const m=stl.mom;
  const dx=px-m.x,dy=py-m.y;
  const dist=Math.hypot(dx,dy);
  const vis=diff.vis*(diff.id==='easy'?0.65:1);
  if(dist>vis)return false;
  const toPlayer=Math.atan2(dy,dx);
  let ad=toPlayer-m.angle;
  while(ad>Math.PI)ad-=TAU;
  while(ad<-Math.PI)ad+=TAU;
  return Math.abs(ad)<Math.PI/2.5;
}

function updateStealth(dt){
  const s=stl;
  if(s.caught||s.sandwichEaten){
    s.caughtTimer-=dt;
    if(s.caughtTimer<=0)restartStealthZone();
    return;
  }
  if(s.won)return;
  const zd=STL_ZONE_DATA[s.zone];
  const map=zd.map;
  // Player movement
  const spd=diff.id==='easy'?2.2:diff.id==='medium'?2:1.8;
  let vx=0,vy=0;
  if(K['ArrowLeft']||K['KeyA']){vx=-spd;s.player.dir=2;}
  if(K['ArrowRight']||K['KeyD']){vx=spd;s.player.dir=3;}
  if(K['ArrowUp']||K['KeyW']){vy=-spd;s.player.dir=0;}
  if(K['ArrowDown']||K['KeyS']){vy=spd;s.player.dir=1;}
  if(vx!==0&&vy!==0){vx*=0.707;vy*=0.707;}
  const nx=s.player.x+vx,ny=s.player.y+vy;
  if(canMoveTo(nx,s.player.y,map))s.player.x=nx;
  if(canMoveTo(s.player.x,ny,map))s.player.y=ny;
  if(vx!==0||vy!==0)s.player.anim++;
  // Mom patrol AI
  const mspd=diff.spd;
  const mtgt=s.mom.patrol[s.mom.pidx];
  const mdx=mtgt.x-s.mom.x,mdy=mtgt.y-s.mom.y;
  const mdist=Math.hypot(mdx,mdy);
  if(mdist<3){s.mom.pidx=(s.mom.pidx+1)%s.mom.patrol.length;}
  else{s.mom.x+=mdx/mdist*mspd;s.mom.y+=mdy/mdist*mspd;s.mom.angle=Math.atan2(mdy,mdx);}
  // Digory AI (zone 0 only)
  if(zd.hasDigory){
    const d=s.digory;
    const dsep=Math.hypot(s.player.x-d.x,s.player.y-d.y);
    d.chasing=dsep<70;
    if(d.chasing){
      const dx2=s.player.x-d.x,dy2=s.player.y-d.y;
      const dd=Math.hypot(dx2,dy2);
      const dspd=1.8;
      if(canMoveTo(d.x+dx2/dd*dspd,d.y,map))d.x+=dx2/dd*dspd;
      if(canMoveTo(d.x,d.y+dy2/dd*dspd,map))d.y+=dy2/dd*dspd;
      d.angle=Math.atan2(dy2,dx2);
      if(dsep<22&&s.hasSandwich){s.sandwichEaten=true;s.caughtTimer=2.5;return;}
    } else {
      d.wanderTimer-=dt*60;
      if(d.wanderTimer<=0){d.wanderTimer=90+Math.random()*120;d.angle=Math.random()*TAU;}
      const wx=Math.cos(d.angle)*0.8,wy=Math.sin(d.angle)*0.8;
      if(canMoveTo(d.x+wx,d.y,map))d.x+=wx;
      if(canMoveTo(d.x,d.y+wy,map))d.y+=wy;
    }
    d.anim++;
  }
  // Mom spotted check
  if(momSees(s.player.x,s.player.y)){s.caught=true;s.caughtTimer=2.5;return;}
  // Exit check
  if(isOnExit(s.player.x,s.player.y,map)){
    s.zone++;
    if(s.zone>=STL_ZONE_DATA.length){s.won=true;}
    else{
      const nzd=STL_ZONE_DATA[s.zone];
      s.player.x=nzd.playerStart.x;s.player.y=nzd.playerStart.y;s.player.dir=0;
      s.mom.x=STL_MOM_PATROLS[s.zone][0].x;s.mom.y=STL_MOM_PATROLS[s.zone][0].y;
      s.mom.patrol=deepClone(STL_MOM_PATROLS[s.zone]);s.mom.pidx=0;
      showStlMsg(nzd.name);
    }
  }
  if(s.zoneMsg.timer>0)s.zoneMsg.timer--;
  if(mclk||eat('Space'))s.showHint=false;
}

function restartStealthZone(){
  const s=stl;
  const zd=STL_ZONE_DATA[s.zone];
  s.player.x=zd.playerStart.x;s.player.y=zd.playerStart.y;s.player.dir=0;
  s.mom.x=STL_MOM_PATROLS[s.zone][0].x;s.mom.y=STL_MOM_PATROLS[s.zone][0].y;
  s.mom.patrol=deepClone(STL_MOM_PATROLS[s.zone]);s.mom.pidx=0;
  if(s.zone===0){
    s.digory.x=STL_DIGORY_START.x;s.digory.y=STL_DIGORY_START.y;
    s.digory.chasing=false;s.digory.wanderTimer=0;
  }
  s.hasSandwich=true;
  s.caught=false;s.sandwichEaten=false;s.caughtTimer=0;
}

function drawMomTD(x,y,angle,anim){
  ctx.save();ctx.translate(x,y);
  // Vision cone (orange)
  ctx.save();
  ctx.globalAlpha=0.18;ctx.fillStyle='#ff8800';
  const vis=diff.vis*(diff.id==='easy'?0.65:1);
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.arc(0,0,vis,-Math.PI/2.5+angle,Math.PI/2.5+angle);
  ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;ctx.restore();

let cls=null;

// Grid: 5 cols × 4 rows, 60px per cell
const CL_COLS=5,CL_ROWS=4,CL_CELL=60;
const CL_X=250,CL_Y=82; // grid top-left on canvas
const CL_W=CL_COLS*CL_CELL,CL_H=CL_ROWS*CL_CELL; // 300×240

// Piece definitions. cells = [row,col] offsets from top-left anchor
const CL_PIECES=[
  {id:'hippo',    name:'Mr. Hippo', col:'#9898b8', cells:[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]]},
  {id:'clothes',  name:'Clothes',   col:'#c050a0', cells:[[0,0],[0,1],[1,0],[1,1]]},
  {id:'suitcase', name:'Suitcase',  col:'#c08828', cells:[[0,0],[0,1],[1,0],[1,1]]},
  {id:'books',    name:'Books',     col:'#3860b8', cells:[[0,0],[1,0]]},
  {id:'umbrella', name:'Umbrella',  col:'#308830', cells:[[0,0],[1,0]]},
  {id:'hat',      name:'Hat',       col:'#c83020', cells:[[0,0]]},
  {id:'sock',     name:'Sock',      col:'#b89040', cells:[[0,0]]},
];

function clRotateCells(cells){
  const r=cells.map(([row,col])=>[col,-row]);
  const minR=Math.min(...r.map(([x])=>x));
  const minC=Math.min(...r.map(([,x])=>x));
  return r.map(([row,col])=>[row-minR,col-minC]);
}
function clGetRots(cells){
  const rots=[cells];
  for(let i=0;i<3;i++)rots.push(clRotateCells(rots[rots.length-1]));
  const seen=new Set();
  return rots.filter(r=>{
    const k=r.map(([a,b])=>a+','+b).sort().join('|');
    if(seen.has(k))return false;seen.add(k);return true;
  });
}

function initCloset(){
  cls={
    grid:Array.from({length:CL_ROWS},()=>Array(CL_COLS).fill(-1)),
    pieces:CL_PIECES.map(p=>({...p,rot:0,placed:false,gr:0,gc:0,rots:clGetRots(p.cells)})),
    sel:-1,
    hoverR:-1,hoverC:-1,
    won:false,
    errTimer:0,
  };
}

function clTrayPos(i){
  const perRow=4;
  const row=Math.floor(i/perRow),col=i%perRow;
  const rowLen=(row===0)?4:3;
  const slotW=72;
  const startX=CL_X+(CL_W-rowLen*slotW)/2;
  return {tx:startX+col*slotW,ty:344+row*82};
}

function clCanPlace(pidx,gr,gc){
  const p=cls.pieces[pidx];
  return p.rots[p.rot].every(([dr,dc])=>{
    const r=gr+dr,c=gc+dc;
    return r>=0&&r<CL_ROWS&&c>=0&&c<CL_COLS&&cls.grid[r][c]===-1;
  });
}
function clPlace(pidx,gr,gc){
  const p=cls.pieces[pidx];
  p.rots[p.rot].forEach(([dr,dc])=>{cls.grid[gr+dr][gc+dc]=pidx;});
  p.placed=true;p.gr=gr;p.gc=gc;
}
function clUnplace(pidx){
  for(let r=0;r<CL_ROWS;r++)
    for(let c=0;c<CL_COLS;c++)
      if(cls.grid[r][c]===pidx)cls.grid[r][c]=-1;
  cls.pieces[pidx].placed=false;
}
function clPieceAt(gr,gc){
  const v=cls.grid[gr]?.[gc];
  return(v!==undefined&&v!==-1)?v:-1;
}

function updateCloset(dt){
  const s=cls;
  if(s.won)return;
  if(s.errTimer>0)s.errTimer-=dt*60;
  // Hover cell
  s.hoverR=Math.floor((my-CL_Y)/CL_CELL);
  s.hoverC=Math.floor((mx-CL_X)/CL_CELL);
  // R to rotate
  if(eat('KeyR')&&s.sel!==-1){
    const p=s.pieces[s.sel];
    p.rot=(p.rot+1)%p.rots.length;
  }
  if(!mclk)return;
  mclk=false;
  // Click on grid?
  if(mx>=CL_X&&mx<CL_X+CL_W&&my>=CL_Y&&my<CL_Y+CL_H){
    const gr=Math.floor((my-CL_Y)/CL_CELL);
    const gc=Math.floor((mx-CL_X)/CL_CELL);
    if(s.sel!==-1){
      if(clCanPlace(s.sel,gr,gc)){
        clPlace(s.sel,gr,gc);
        s.sel=-1;
        if(s.pieces.every(p=>p.placed))s.won=true;
      } else s.errTimer=25;
    } else {
      const pidx=clPieceAt(gr,gc);
      if(pidx!==-1){clUnplace(pidx);s.sel=pidx;}
    }
  } else {
    // Click on tray?
    let hit=false;
    s.pieces.forEach((p,i)=>{
      if(p.placed)return;
      const{tx,ty}=clTrayPos(i);
      if(mx>=tx&&mx<tx+70&&my>=ty&&my<ty+70){s.sel=(s.sel===i)?-1:i;hit=true;}
    });
    if(!hit&&mx<CL_X+CL_W)s.sel=-1;
  }
}

/* ── Closet Rendering ── */
function drawCloset(){
  const s=cls;
  bgBedroom();
  if(s.won){drawClosetWin();return;}

  // Closet frame
  const fx=CL_X-20,fy=CL_Y-40,fw=CL_W+40,fh=CL_H+60;
  fillRect(fx-10,fy-10,fw+20,fh+20,'#4a2e0e');  // outer trim
  fillRect(fx,fy,fw,fh,'#7a5212');               // frame face
  fillRect(fx+10,fy+38,fw-20,fh-48,'#c09050');   // closet interior
  // Hanging rod
  fillRect(fx+12,fy+38,fw-24,7,'#6a3808');
  circ(fx+20,fy+42,5,'#8a5020');
  circ(fx+fw-20,fy+42,5,'#8a5020');
  txt("PFLUEGER'S CLOSET",CL_X+CL_W/2,CL_Y-14,C.gold,13,'center',"'Courier New',monospace");

  // Draw filled / empty cells
  for(let r=0;r<CL_ROWS;r++){
    for(let c=0;c<CL_COLS;c++){
      const x=CL_X+c*CL_CELL,y=CL_Y+r*CL_CELL;
      const pidx=s.grid[r][c];
      if(pidx!==-1){
        const p=s.pieces[pidx];
        rnd(x+3,y+3,CL_CELL-6,CL_CELL-6,5,p.col,null);
        if((r+c)%2===1){ctx.globalAlpha=0.12;fillRect(x+3,y+3,CL_CELL-6,CL_CELL-6,'#000');ctx.globalAlpha=1;}
      } else {
        fillRect(x+3,y+3,CL_CELL-6,CL_CELL-6,'rgba(70,45,10,0.4)');
      }
      ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.5;ctx.strokeRect(x,y,CL_CELL,CL_CELL);
    }
  }

  // Draw piece icons centered on each placed piece
  s.pieces.forEach(p=>{
    if(!p.placed)return;
    const cells=p.rots[p.rot];
    const maxR=Math.max(...cells.map(([r])=>r));
    const maxC=Math.max(...cells.map(([,c])=>c));
    const cx=CL_X+(p.gc+maxC/2+0.5)*CL_CELL;
    const cy=CL_Y+(p.gr+maxR/2+0.5)*CL_CELL;
    ctx.save();ctx.translate(cx,cy);
    drawClosetPieceIcon(p.id);
    ctx.restore();
    // Label in anchor cell
    txt(p.name,cx,cy+maxR*CL_CELL/2+8,'rgba(255,255,255,0.75)',9,'center',"'Courier New',monospace");
  });

  // Ghost preview
  if(s.sel!==-1&&s.hoverR>=0&&s.hoverR<CL_ROWS&&s.hoverC>=0&&s.hoverC<CL_COLS){
    const p=s.pieces[s.sel];
    const ok=clCanPlace(s.sel,s.hoverR,s.hoverC);
    ctx.globalAlpha=ok?0.55:0.35;
    p.rots[p.rot].forEach(([dr,dc])=>{
      const r=s.hoverR+dr,c=s.hoverC+dc;
      if(r>=0&&r<CL_ROWS&&c>=0&&c<CL_COLS)
        fillRect(CL_X+c*CL_CELL+3,CL_Y+r*CL_CELL+3,CL_CELL-6,CL_CELL-6,ok?p.col:'#ff4444');
    });
    ctx.globalAlpha=1;
  }

  // Error flash
  if(s.errTimer>0){
    ctx.globalAlpha=s.errTimer/25*0.3;
    fillRect(CL_X,CL_Y,CL_W,CL_H,'#ff2200');
    ctx.globalAlpha=1;
  }

  drawClosetTray();
  drawClosetPanel();
  // Bottom hint
  txt('[R] Rotate selected  |  Click piece on grid to pick back up',CL_X+CL_W/2,550,C.dimTxt,11,'center',"'Courier New',monospace");
}

    ctx.beginPath();ctx.moveTo(-10,-8);ctx.lineTo(2,-8);ctx.stroke();

function drawClosetTray(){
  const s=cls;
  const rem=s.pieces.filter(p=>!p.placed).length;
  const ty0=clTrayPos(0).ty;
  rnd(CL_X-4,ty0-12,CL_W+8,170,8,'rgba(0,0,0,0.55)','#806040',1.5);
  txt(`ITEMS TO PACK \u2014 ${rem} remaining`,CL_X+CL_W/2,ty0+2,C.dimTxt,11,'center',"'Courier New',monospace");
  s.pieces.forEach((p,i)=>{
    if(p.placed)return;
    const{tx,ty}=clTrayPos(i);
    const isSel=s.sel===i;
    rnd(tx,ty+8,70,66,6,isSel?'rgba(255,215,0,0.2)':'rgba(50,35,15,0.7)',isSel?C.gold:'#806040',isSel?2:1);
    // Mini shape preview (14px cells)
    const cells=p.rots[p.rot];
    const maxR=Math.max(...cells.map(([r])=>r));
    const maxC=Math.max(...cells.map(([,c])=>c));
    const cs=13;
    const ox=tx+35-(maxC+1)*cs/2;
    const oy=ty+34-(maxR+1)*cs/2;
    cells.forEach(([r,c])=>{
      fillRect(ox+c*cs+1,oy+r*cs+1,cs-2,cs-2,p.col);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
      ctx.strokeRect(ox+c*cs+1,oy+r*cs+1,cs-2,cs-2);

    if(isSel)txt('[R]',tx+35,ty+82,C.gold,9,'center',"'Courier New',monospace");
  });
}

function initEscape(){
  esc={
    zone:0,
    player:{x:Z0_PLAYER_START.x,y:Z0_PLAYER_START.y,dir:0,vx:0,vy:0,anim:0},
    keepers:deepClone(Z0_KEEPERS),
    npcs:deepClone([]),
    nikReady:false,
    nikActive:false,
    nikTimer:0,
    nikScreenAnim:0,
    caught:false,
    caughtTimer:0,
    won:false,
    escapeDialog:null,
    z1DialogIdx:0,
    z1Done:false,
    cheatFrozen:false,
    cheatInvis:false,
    cheatSlow:1,
    zoneMsg:{text:'',timer:0},
    npcDialog:null,
    showHint:true,
  };
  showZoneMsg(ZONE_DATA[0].name);
}

function deepClone(obj){return JSON.parse(JSON.stringify(obj));}

function showZoneMsg(text){
  if(esc)esc.zoneMsg={text,timer:180};
}

function activateNik(force){
  if(!esc)return;
  if(!esc.nikReady&&!force)return;
  if(esc.nikActive&&!force)return;
  esc.nikActive=true;
  esc.nikTimer=diff.nikDur*60;
  esc.nikScreenAnim=0;
  // Freeze all keepers
  esc.keepers.forEach(k=>{k.frozen=true; k.ft=diff.nikDur*60;});
  if(!force)esc.nikReady=false; // used up for this zone
}

function canMoveTo(nx,ny,map){
  const hw=12,hh=10;
  const corners=[[nx-hw,ny-hh],[nx+hw,ny-hh],[nx-hw,ny+hh],[nx+hw,ny+hh]];
  for(const[cx,cy] of corners){
    const tx=Math.floor(cx/TILE),ty=Math.floor(cy/TILE);
    if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return false;
    const tile=map[ty][tx];
    if(tile===T.WALL||tile===T.WATER)return false;
  }
  return true;
}

function isOnExit(px,py,map){
  const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);
  if(ty<0||ty>=map.length||tx<0||tx>=map[0].length)return false;
  return map[ty][tx]===T.EXIT;
}

function keeperSees(k,px,py){
  if(k.frozen||esc.cheatInvis)return false;
  const dx=px-k.x,dy=py-k.y;
  const dist=Math.hypot(dx,dy);
  const vr=diff.vis*(esc.cheatSlow<1?0.6:1);
  if(dist>vr)return false;
  // Vision cone check
  const toPlayer=Math.atan2(dy,dx);
  let ad=toPlayer-k.angle;
  while(ad>Math.PI)ad-=TAU;
  while(ad<-Math.PI)ad+=TAU;
  return Math.abs(ad)<Math.PI/3;
}

function updateEscape(dt){
  const e=esc;
  if(e.caught){
    e.caughtTimer-=dt;
    if(e.caughtTimer<=0){
      // Restart zone
      restartZone();
    }
    return;
  }
  if(e.won)return;
  if(e.npcDialog){updateDialog(dt);return;}
  // Zone 1 is a cutscene
  if(e.zone===1){
    updateZ1Cutscene(dt);
    return;
  }
  const zd=ZONE_DATA[e.zone];
  const map=zd.map;
  // Player movement
  const spd=diff.id==='easy'?2.2:diff.id==='medium'?2:1.8;
  let vx=0,vy=0;
  if(K['ArrowLeft']||K['KeyA']){vx=-spd; e.player.dir=2;}
  if(K['ArrowRight']||K['KeyD']){vx=spd; e.player.dir=3;}
  if(K['ArrowUp']||K['KeyW']){vy=-spd; e.player.dir=0;}
  if(K['ArrowDown']||K['KeyS']){vy=spd; e.player.dir=1;}
  if(vx!==0&&vy!==0){vx*=0.707; vy*=0.707;}
  const nx=e.player.x+vx,ny=e.player.y+vy;
  if(canMoveTo(nx,e.player.y,map))e.player.x=nx;
  if(canMoveTo(e.player.x,ny,map))e.player.y=ny;
  if(vx!==0||vy!==0)e.player.anim++;
  // Nik button
  if(eat('KeyN')&&e.nikReady&&!e.nikActive)activateNik(false);
  if(e.nikActive){
    e.nikTimer-=dt*60;
    e.nikScreenAnim++;
    if(e.nikTimer<=0){
      e.nikActive=false;
      e.keepers.forEach(k=>k.frozen=false);
    }
  }
  // Update keepers
  e.keepers.forEach(k=>updateKeeper(k,dt));
  // Check caught
  e.keepers.forEach(k=>{
    if(!e.cheatFrozen&&keeperSees(k,e.player.x,e.player.y)){
      e.caught=true;
      e.caughtTimer=2.5;
    }
  });
  // Nik frozen override
  if(e.cheatFrozen)e.keepers.forEach(k=>{k.frozen=true;});
  // Check NPC interaction
  if(eat('KeyE')||eat('Space')){
    const nearNpc=zd.npcs.find(n=>!n.talked&&Math.hypot(n.x-e.player.x,n.y-e.player.y)<50);
    if(nearNpc){
      nearNpc.talked=true;
      e.npcDialog=true;
      startDialog([nearNpc.msg],null,'',()=>{e.npcDialog=null;});
    }
  }
  // Highlight nearby NPC
  e.nearNpc=zd.npcs.find(n=>!n.talked&&Math.hypot(n.x-e.player.x,n.y-e.player.y)<50);
  // Check exit
  if(isOnExit(e.player.x,e.player.y,map)){
    advanceZone();
  }
  // Zone message timer
  if(e.zoneMsg.timer>0)e.zoneMsg.timer--;
  // Hint dismiss
  if(mclk||eat('Space'))e.showHint=false;
}

function updateKeeper(k,dt){
  if(k.frozen||esc.cheatFrozen)return;
  const spd=(diff.spd*(esc.cheatSlow||1));
  const target=k.patrol[k.pidx];
  const dx=target.x-k.x,dy=target.y-k.y;
  const dist=Math.hypot(dx,dy);
  if(dist<3){
    k.pidx=(k.pidx+1)%k.patrol.length;
  } else {
    k.x+=dx/dist*spd;
    k.y+=dy/dist*spd;
    k.angle=Math.atan2(dy,dx);
  }
}

function updateZ1Cutscene(dt){
  if(esc.z1Done)return;
  if(!dlgState.active&&!esc.z1DialogStarted){
    esc.z1DialogStarted=true;
    startDialog(Z1_DIALOG,null,'',()=>{
      esc.z1Done=true;
      esc.nikReady=true;
      advanceZone();
    });
  }
  updateDialog(dt);
}

function advanceZone(){
  const e=esc;
  e.zone++;
  if(e.zone>=ZONE_DATA.length){
    e.won=true;
    return;
  }
  const zd=ZONE_DATA[e.zone];
  e.player.x=zd.playerStart.x;
  e.player.y=zd.playerStart.y;
  e.player.dir=0;
  e.keepers=deepClone(zd.keepers);
  e.npcs=deepClone(zd.npcs);
  e.nikActive=false;
  e.nikTimer=0;
  if(e.zone>1)e.nikReady=true; // unlock after zone 1 cutscene
  e.z1DialogStarted=false;
  e.z1Done=false;
  showZoneMsg(zd.name);
  dlgState.active=false;
}

function restartZone(){
  const e=esc;
  const zd=ZONE_DATA[e.zone];
  e.player.x=zd.playerStart.x;
  e.player.y=zd.playerStart.y;
  e.player.dir=0;
  e.keepers=deepClone(zd.keepers);
  e.nikActive=false;
  e.nikTimer=0;
  if(e.zone>1)e.nikReady=true;
  e.caught=false;
  e.caughtTimer=0;
}

/* ── Escape Rendering ── */
function drawEscape(){
  const e=esc;
  // Background
  fillRect(0,0,W,H,'#1a1030');
  if(e.won){drawEscapeWin();return;}
  if(e.zone===1){drawZ1Cutscene();return;}
  const zd=ZONE_DATA[e.zone];
  const map=zd.map;
  // Draw tilemap
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const tile=map[row][col];
      const tc=TILE_COLORS[tile]||['#888','#666'];
      const shade=(row+col)%2===0?tc[0]:tc[1];
      fillRect(col*TILE,row*TILE,TILE,TILE,shade);
      // Water ripple
      if(tile===T.WATER){
        ctx.globalAlpha=0.3+Math.sin(t*0.05+col+row)*0.15;
        fillRect(col*TILE+4,row*TILE+TILE/2-2,TILE-8,4,'#a0d0f8');
        ctx.globalAlpha=1;
      }
      // Bush detail
      if(tile===T.BUSH){
        circ(col*TILE+TILE/2,row*TILE+TILE/2,TILE/2-2,C.bushDk);
        circ(col*TILE+TILE/2-5,row*TILE+TILE/2-4,TILE/4,C.bush);
        circ(col*TILE+TILE/2+5,row*TILE+TILE/2-4,TILE/4,C.bush);
      }
    }
  }
  // Draw NPCs
  zd.npcs.forEach(n=>{
    if(n.type==='mouse'){drawMouseTD(n.x,n.y);}
    else if(n.type==='giraffe'){drawGiraffeTD(n.x,n.y);}
    else if(n.type==='parrot'){drawParrotTD(n.x,n.y);}
    else if(n.type==='cat'){drawCatTD(n.x,n.y);}
    if(!n.talked&&Math.hypot(n.x-e.player.x,n.y-e.player.y)<50){
      // "E to talk" prompt
      txt('[E] Talk',n.x-20,n.y-24,'#fff8c0',11,'left',"'Courier New',monospace");
    }
  });
  // Draw keepers
  e.keepers.forEach(k=>drawKeeperTD(k.x,k.y,k.angle,t,k.frozen));
  // Draw player
  drawHippoTD(e.player.x,e.player.y,e.player.dir,e.player.anim,false);
  // Nik animation
  if(e.nikActive){drawNikAnimation();}
  // UI panel
  drawEscapeUI();
  // Caught overlay
  if(e.caught)drawCaughtOverlay();
  // Dialog (NPC or zone1)
  drawDialog();
  // Zone message
  if(e.zoneMsg.timer>0){
    ctx.globalAlpha=Math.min(1,e.zoneMsg.timer/30)*Math.min(1,(e.zoneMsg.timer)/20);
    rnd(W/2-180,20,360,40,8,'rgba(0,0,0,0.85)',C.gold,2);
    txt(e.zoneMsg.text,W/2,47,C.gold,18,'center','Georgia');
    ctx.globalAlpha=1;
  }
  // Hint overlay (first few seconds)
  if(e.showHint&&e.zoneMsg.timer<120&&e.zoneMsg.timer>0&&zd.hint){
    rnd(10,H-70,620,56,8,'rgba(0,0,0,0.8)',C.dialogBdr,1);
    txt('💡 '+zd.hint,20,H-45,C.cream,12,'left',"'Courier New',monospace");
  }
}

function drawEscapeWin(){
  bgBackyard();
  // Animate hippo in pool
  ctx.save(); ctx.translate(W/2,H-180);
  drawHippoSide(0,0,1.4,false,t);
  ctx.restore();
  // Celebration text
  const sg=ctx.createLinearGradient(0,80,0,200);
  sg.addColorStop(0,'#ffd700'); sg.addColorStop(1,'#ff8800');
  ctx.fillStyle=sg; ctx.font='bold 42px Georgia'; ctx.textAlign='center';
  ctx.fillText('FREEDOM!',W/2,130);
  txt('The hippo escapes into the world!',W/2,170,'#f0e0a8',18,'center','Georgia');
  // confetti
  for(let i=0;i<30;i++){
    const cx=(i*137+t)%W, cy=((i*97+t*2)%(H-80))+40;
    const cc=['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'][i%5];
    fillRect(cx,cy,8,8,cc);
  }
  // Continue button
  const bx=W/2-120,by=H-80,bw=240,bh=50;
  const bhov=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
  rnd(bx,by,bw,bh,8,bhov?'#3a2060':'#2a1040',C.dialogBdr,2);
  txt('Continue the Story →',W/2,by+32,C.gold,18,'center','Georgia');
  if(bhov)canvas.style.cursor='pointer';
  if((bhov&&mclk)||eat('Space')){
    mclk=false;
    sceneIdx=findScene('decision_1');
    phase='story';
  }
}

function drawKeeperTD(x,y,angle,anim,frozen){
  ctx.save(); ctx.translate(x,y);
  // Vision cone
  if(!frozen&&!esc.cheatInvis){
    ctx.save();
    ctx.globalAlpha=0.15;
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.arc(0,0,diff.vis,-Math.PI/3+angle,Math.PI/3+angle);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }
  // Shadow
  ellipse(0,6,10,4,'rgba(0,0,0,0.2)');
  // Legs
  const ls=frozen?0:Math.sin(anim*0.2)*3;
  fillRect(-5,2,9,10,'#1a3070');
  fillRect(1,2+ls,9,10,'#102058');
  // Body
  ctx.fillStyle=frozen?'#8090a0':C.keeperBlue;
  ctx.beginPath(); ctx.ellipse(0,-2,7,9,0,0,TAU); ctx.fill();
  // Head
  circ(0,-12,5.5,'#f0d0a0');
  // Hat
  fillRect(-7,-20,14,6,'#102050');
  ctx.fillStyle='#0a1840'; ctx.beginPath(); ctx.ellipse(0,-20,9,3,0,0,TAU); ctx.fill();
  if(frozen){
    // Frozen sparkles
    ctx.fillStyle='rgba(150,220,255,0.8)';
    for(let i=0;i<3;i++){
      const sx=Math.cos(t*0.1+i*TAU/3)*12;
      const sy=Math.sin(t*0.1+i*TAU/3)*12-8;
      ctx.fillText('*',sx-3,sy+4);
    }
  }
  ctx.restore();
}

function drawHippoTD(x,y,dir,anim,frozen){
  ctx.save(); ctx.translate(x,y);
  ellipse(0,7,15,6,'rgba(0,0,0,0.18)');
  const pulse=frozen?Math.sin(anim*0.2)*2:0;
  ctx.fillStyle=frozen?'#a0c8e0':C.hippo;
  ctx.beginPath(); ctx.ellipse(0,0,16+pulse,12,0,0,TAU); ctx.fill();
  // Head direction
  const ha=[[0,-13],[0,11],[-13,0],[13,0]];
  const [hx,hy]=ha[dir]||ha[0];
  ctx.fillStyle=frozen?'#a0c8e0':C.hippo;
  ctx.beginPath(); ctx.ellipse(hx,hy,9,7,0,0,TAU); ctx.fill();
  // Ears
  // ears per direction:
  if(dir===0){ellipse(-7,-17,4,3,C.hippoDk); ellipse(7,-17,4,3,C.hippoDk);}
  else if(dir===1){ellipse(-7,13,4,3,C.hippoDk); ellipse(7,13,4,3,C.hippoDk);}
  else if(dir===2){ellipse(-17,-5,3,4,C.hippoDk); ellipse(-17,5,3,4,C.hippoDk);}
  else{ellipse(17,-5,3,4,C.hippoDk); ellipse(17,5,3,4,C.hippoDk);}
  // Cap
  ctx.fillStyle='#3050a0';
  ctx.beginPath(); ctx.ellipse(hx,hy-4,8,4,0,0,TAU); ctx.fill();
  fillRect(hx-9,hy-8,18,6,'#3050a0');
  // Sunglasses
  rnd(hx-6,hy-3,12,5,2,'#1a1a2a','#606070',1);
  ctx.restore();
}

function drawNikAnimation(){
  const e=esc;
  e.nikScreenAnim++;
  // Nik runs across the screen
  const nikX=(e.nikScreenAnim*3)%(MAP_W+60)-30;
  const nikY=H*0.4+Math.sin(e.nikScreenAnim*0.3)*20;
  ctx.save(); ctx.translate(nikX,nikY);
  // Simple monkey
  ellipse(0,0,10,9,C.nikBrown);
  circ(0,-12,8,C.nikBrown);
  ctx.fillStyle='#d09060'; ctx.beginPath(); ctx.ellipse(0,-11,5,5,0,0,TAU); ctx.fill();
  // Screaming mouth
  ctx.fillStyle='#800000'; ctx.beginPath(); ctx.arc(0,-9,4,0,Math.PI); ctx.fill();
  ctx.fillStyle='white'; fillRect(-3,-13,2.5,4,'white'); fillRect(1,-13,2.5,4,'white');
  // Arms up
  ctx.strokeStyle=C.nikBrown; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-8,-2); ctx.lineTo(-20,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-2); ctx.lineTo(20,-14); ctx.stroke();
  circ(-8,-12,4,C.nikBrown); circ(8,-12,4,C.nikBrown);
  ctx.fillStyle='#d09060'; circ(-8,-12,2,'#d09060'); circ(8,-12,2,'#d09060');
  ctx.restore();
  // Sound waves / SKREEEEM text
  ctx.save();
  ctx.globalAlpha=0.8+Math.sin(e.nikScreenAnim*0.3)*0.2;
  ctx.fillStyle='#ff4400';
  ctx.font=`bold ${20+Math.sin(e.nikScreenAnim*0.2)*4}px 'Courier New',monospace`;
  ctx.textAlign='center';
  ctx.fillText('SKREEEEM!',nikX,nikY-30);
  ctx.restore();
  // Timer bar
  const ratio=e.nikTimer/(diff.nikDur*60);
  fillRect(10,MAP_H-20,200,12,'rgba(0,0,0,0.5)');
  fillRect(10,MAP_H-20,200*ratio,12,'#ff5500');
  txt('NIK ACTIVE',10,MAP_H-24,'#ff7722',11,'left',"'Courier New',monospace");
}

function drawEscapeUI(){
  const e=esc;
  // Panel background
  fillRect(UI_X,0,UI_W,H,'#0d0a1e');
  rnd(UI_X,0,UI_W,H,0,null,'#2a2040',2);
  // Zone name
  const zd=ZONE_DATA[e.zone]||ZONE_DATA[0];
  txt(zd.name.split(':')[0],UI_X+UI_W/2,24,C.gold,12,'center',"'Courier New',monospace");
  txt((zd.name.split(':')[1]||'').trim(),UI_X+UI_W/2,40,'#a090c0',11,'center','Georgia');
  // Difficulty badge
  rnd(UI_X+8,50,144,22,4,null,diff.col,1);
  txt('⚔ '+diff.label,UI_X+12,65,diff.col,10,'left',"'Courier New',monospace");
  // Zone progress
  txt('ZONES',UI_X+UI_W/2,100,C.dimTxt,11,'center',"'Courier New',monospace");
  [0,2,3].forEach((z,i)=>{
    const done=e.zone>z;
    const cur=e.zone===z;
    const px=UI_X+20+i*48,py=110;
    circ(px,py,14,done?'#60c060':cur?diff.col:'#303050');
    if(done)txt('✓',px,py+5,C.cream,14,'center');
    else txt((i+1).toString(),px,py+5,done?C.cream:cur?C.cream:C.dimTxt,13,'center');
    if(i<2)fillRect(px+14,py-1,20,3,done?'#60c060':'#303050');
  });
  // NIK button
  const nby=150,nbx=UI_X+8,nbw=UI_W-16,nbh=60;
  const nikHov=mx>=nbx&&mx<=nbx+nbw&&my>=nby&&my<=nby+nbh;
  const nikOk=e.nikReady&&!e.nikActive;
  rnd(nbx,nby,nbw,nbh,8,
    e.nikActive?'rgba(255,80,0,0.3)':nikOk?(nikHov?'rgba(220,60,20,0.8)':'rgba(180,40,10,0.6)'):'rgba(40,20,10,0.4)',
    nikOk?C.nikBtn:'#604030',2);
  txt('ACTIVATE',UI_X+UI_W/2,nby+20,nikOk?'#fff':'#806050',13,'center',"'Courier New',monospace");
  txt('NIK!',UI_X+UI_W/2,nby+38,nikOk?'#ff8844':C.dimTxt,18,'center','Georgia');
  if(e.nikActive){
    const ratio=e.nikTimer/(diff.nikDur*60);
    fillRect(nbx+4,nby+nbh-12,nbw-8,8,'rgba(0,0,0,0.5)');
    fillRect(nbx+4,nby+nbh-12,(nbw-8)*ratio,8,'#ff5500');
  }
  if(!e.nikReady&&!e.nikActive&&e.zone>0){
    txt('(used)',UI_X+UI_W/2,nby+nbh-8,'#805040',10,'center',"'Courier New',monospace");
  }
  if(e.zone===0){
    txt('Unlock in',UI_X+UI_W/2,nby+nbh-16,C.dimTxt,10,'center',"'Courier New',monospace");
    txt('zone 2',UI_X+UI_W/2,nby+nbh-4,C.dimTxt,10,'center',"'Courier New',monospace");
  }
  if(nikOk&&nikHov&&mclk){mclk=false;activateNik(false);}
  // Controls
  const cy2=225;
  txt('CONTROLS',UI_X+UI_W/2,cy2,C.dimTxt,10,'center',"'Courier New',monospace");
  const ctrls=[['↑↓←→','Move'],['E','Talk to NPC'],['N','Use Nik']];
  ctrls.forEach((c,i)=>{
    rnd(UI_X+8,cy2+10+i*28,50,22,3,'rgba(0,0,0,0.4)','#404060',1);
    txt(c[0],UI_X+33,cy2+25+i*28,'#c0c8ff',11,'center',"'Courier New',monospace");
    txt(c[1],UI_X+64,cy2+25+i*28,C.dimTxt,10,'left',"'Courier New',monospace");
  });
  // Animals legend
  txt('ZOO ROSTER',UI_X+UI_W/2,cy2+100,C.dimTxt,10,'center',"'Courier New',monospace");
  const animals=[['🐭','Mandy Mouse'],['🦒','J. Long'],['🦜','Natasha'],['🐈','Leslie'],['🐼','Lekan']];
  animals.forEach((a,i)=>{
    txt(a[0],UI_X+10,cy2+116+i*22,'white',12,'left');
    txt(a[1],UI_X+28,cy2+116+i*22,C.dimTxt,10,'left',"'Courier New',monospace");
  });
  // Quit to story
  rnd(UI_X+8,H-50,UI_W-16,36,6,'rgba(0,0,0,0.4)','#604040',1);
  txt('◄ Menu',UI_X+UI_W/2,H-28,C.dimTxt,12,'center',"'Courier New',monospace");
  if(mx>=UI_X+8&&mx<=UI_X+UI_W-8&&my>=H-50&&my<=H-14&&mclk){
    mclk=false; phase='title';
  }
}

/* ================================================================
   CREDITS SCREEN
   ================================================================ */
function drawCredits(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0520'); g.addColorStop(1,'#1a1038');
  fillRect(0,0,W,H,g);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<50;i++){const sx=(i*137+30)%W,sy=(i*97+20)%(H*0.8); ctx.beginPath();ctx.arc(sx,sy,1,0,TAU);ctx.fill();}
  // Characters
  ctx.save(); ctx.translate(240,H-140);
  drawPflueger(0,0,1.2,false,t*0.5);
  ctx.restore();
  ctx.save(); ctx.translate(440,H-160);
  drawHippoCool(0,0,1.3,t*0.4);
  ctx.restore();
  ctx.save(); ctx.translate(600,H-140);
  drawLisa(0,0,1,false,t*0.6);
  ctx.restore();
  txt('The End',W/2,100,C.gold,52,'center','Georgia');
  txt('"Good night, Hippo."  "Good night."',W/2,150,'#f0e0a8',18,'center','Georgia');
  txt('Based on the book by a friend.',W/2,190,C.dimTxt,14,'center','Georgia');
  txt('"Waaastin\' away again in Margaritaville..."',W/2,H-80,'#b0a080',13,'center','Georgia');
  // Play again
  const bx=W/2-120,by=H-50,bw=240,bh=38;
  const bhov=mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;
  rnd(bx,by,bw,bh,6,bhov?'#3a2060':'#2a1040',C.dialogBdr,2);
  txt('Play Again',W/2,by+24,C.gold,16,'center','Georgia');
  if(bhov)canvas.style.cursor='pointer';
  if(bhov&&mclk){mclk=false; phase='title'; sceneIdx=0;}
}

/* ================================================================
   MAIN GAME LOOP
   ================================================================ */
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.1);
  lastTs=ts;
  t++;
  ctx.clearRect(0,0,W,H);
  canvas.style.cursor='default';
  switch(phase){
    case 'title':  drawTitle();  break;
    case 'diff':   drawDiff();   break;
    case 'story':  handleStory(); break;
    case 'escape': updateEscape(dt); drawEscape(); break;
    case 'stealth': updateStealth(dt); drawStealth(); break;
    case 'closet_game': updateCloset(dt); drawCloset(); break;
    case 'credits':drawCredits(); break;
    case 'epilogue':
      sceneIdx=findScene('epilogue_start');
      phase='story';
      break;
  }
  // Clear one-shot click
  mclk=false;
  Object.keys(JP).forEach(k=>JP[k]=false);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
