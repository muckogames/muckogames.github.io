<title>Orbital Mechanics</title>
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
               background: #000; color: #ddd; font-family: -apple-system, system-ui, sans-serif;
               touch-action: none; -webkit-tap-highlight-color: transparent; }
  #stage { position: absolute; }
  #gc { display: block; background: #000; }
</style>
</head>
<body>
<div id="stage"><canvas id="gc"></canvas></div>

<script src="physics.js"></script>
<script src="scenarios.js"></script>
<script>
(function () {
'use strict';

// ── roundRect polyfill (Safari < 15.4) ──────────────────────────────────────
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y); this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ── Canvas setup ─────────────────────────────────────────────────────────────
var W = 800, H = 800;
var stage = document.getElementById('stage');
var canvas = document.getElementById('gc');
canvas.width = W; canvas.height = H;
var ctx = canvas.getContext('2d');

var MAX_RENDER_DPR = 1.5;
function safeViewW() { var v = window.visualViewport; return v ? v.width  : window.innerWidth; }
function safeViewH() { var v = window.visualViewport; return v ? v.height : window.innerHeight; }
function resize() {
  var vw = safeViewW(), vh = safeViewH();
  var s = Math.min(vw / W, (vh - 4) / H);
  stage.style.width  = Math.round(W * s) + 'px';
  stage.style.height = Math.round(H * s) + 'px';
  stage.style.left   = Math.round((vw - W * s) / 2) + 'px';
  stage.style.top    = Math.round((vh - H * s) / 2) + 'px';
  var dpr = Math.min(window.devicePixelRatio || 1, MAX_RENDER_DPR);
  canvas.style.width  = '100%';
  canvas.style.height = '100%';
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// ── Module bindings ──────────────────────────────────────────────────────────
var Phys = window.OrbitPhysics;
var SC   = window.OrbitMissions;
var MISSIONS = SC.MISSIONS;
var SANDBOX  = SC.SANDBOX;
var PI2 = Phys.PI2;

// ── Camera (zoom) ────────────────────────────────────────────────────────────
// 4 discrete levels. Auto-picked from the mission's view.zoomLevel.
var ZOOM_LEVELS = [1200, 620, 310, 160];   // px per DU
var zoomIdx = 2;
function SCALE() { return ZOOM_LEVELS[zoomIdx]; }
var CX = W / 2, CY = H / 2;

// View transform: world → screen, with optional rotation for the rotating frame.
function sxw(x, y, t) {
  if (curMission && curMission.view && curMission.view.preset === 'rotating_moon') {
    var ma = curState.moonAngle0 + Phys.MOON_W * t;
    var c = Math.cos(ma), s = Math.sin(ma);
    return CX + (x * c + y * s) * SCALE();
  }
  return CX + x * SCALE();
}
function syw(x, y, t) {
  if (curMission && curMission.view && curMission.view.preset === 'rotating_moon') {
    var ma = curState.moonAngle0 + Phys.MOON_W * t;
    var c = Math.cos(ma), s = Math.sin(ma);
    return CY - (-x * s + y * c) * SCALE();
  }
  return CY - y * SCALE();
}
function viewAngle(angle, t) {
  if (curMission && curMission.view && curMission.view.preset === 'rotating_moon') {
    return angle - (curState.moonAngle0 + Phys.MOON_W * t);
  }
  return angle;
}

// ── Input: keyboard ──────────────────────────────────────────────────────────
var K  = {};
var JP = {};
document.addEventListener('keydown', function (e) {
  if (!K[e.code]) JP[e.code] = true;
  K[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
      e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
    e.preventDefault();
  }
});
document.addEventListener('keyup', function (e) { K[e.code] = false; });
function eat(code) { if (JP[code]) { JP[code] = false; return true; } return false; }

// ── Input: pointer / touch ───────────────────────────────────────────────────
var mx = W / 2, my = H / 2;
var mclk = false;
var pointerDown  = false;
var pointerJust  = false;          // edge: just pressed this frame
var pointerUpEd  = false;          // edge: just released this frame
var pointerAimActive = false;      // dragging on the playfield (sim phase)
var activeTouches = {};            // map id → {x,y}

function clientToCanvas(e) {
  var r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (W / r.width),
    y: (e.clientY - r.top)  * (H / r.height)
  };
}
function clientToCanvasT(t) {
  var r = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - r.left) * (W / r.width),
    y: (t.clientY - r.top)  * (H / r.height)
  };
}

canvas.addEventListener('click', function (e) {
  var p = clientToCanvas(e);
  mx = p.x; my = p.y; mclk = true;
});
canvas.addEventListener('mousedown', function (e) {
  var p = clientToCanvas(e); mx = p.x; my = p.y;
  pointerDown = true; pointerJust = true;
});
canvas.addEventListener('mousemove', function (e) {
  var p = clientToCanvas(e); mx = p.x; my = p.y;
});
canvas.addEventListener('mouseup', function () {
  pointerDown = false; pointerUpEd = true;
});

canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var p = clientToCanvasT(t);
    activeTouches[t.identifier] = { x: p.x, y: p.y };
    mx = p.x; my = p.y;
    pointerDown = true; pointerJust = true;
  }
}, { passive: false });
canvas.addEventListener('touchmove', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var p = clientToCanvasT(t);
    if (activeTouches[t.identifier]) { activeTouches[t.identifier].x = p.x; activeTouches[t.identifier].y = p.y; }
    mx = p.x; my = p.y;
  }
}, { passive: false });
function endTouches(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (activeTouches[t.identifier]) {
      var p = activeTouches[t.identifier];
      mx = p.x; my = p.y;
      delete activeTouches[t.identifier];
      mclk = true;        // synthesize a click on touchend (no 300 ms delay)
    }
  }
  var any = false;
  for (var k in activeTouches) if (activeTouches.hasOwnProperty(k)) { any = true; break; }
  if (!any) { pointerDown = false; pointerUpEd = true; }
}
canvas.addEventListener('touchend',    endTouches, { passive: false });
canvas.addEventListener('touchcancel', endTouches, { passive: false });

function hitRect(bx, by, bw, bh) { return mx >= bx && mx <= bx + bw && my >= by && my <= by + bh; }
function pointerOverCircle(cx, cy, r) {
  if (!pointerDown) return false;
  var any = false;
  for (var id in activeTouches) {
    if (activeTouches.hasOwnProperty(id)) {
      var t = activeTouches[id];
      var dx = t.x - cx, dy = t.y - cy;
      if (dx * dx + dy * dy <= r * r) return true;
      any = true;
    }
  }
  if (!any) {           // mouse path
    var dxm = mx - cx, dym = my - cy;
    return dxm * dxm + dym * dym <= r * r;
  }
  return false;
}
function pointerInRect(bx, by, bw, bh) {
  if (!pointerDown) return false;
  for (var id in activeTouches) {
    if (activeTouches.hasOwnProperty(id)) {
      var t = activeTouches[id];
      if (t.x >= bx && t.x <= bx + bw && t.y >= by && t.y <= by + bh) return true;
    }
  }
  return false;
}

// Web Audio unlock — iOS won't play until first gesture.
var actx = null;
try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
function unlockAudio() { if (actx && actx.state !== 'running') actx.resume(); }
document.addEventListener('touchstart', unlockAudio);
document.addEventListener('touchend',   unlockAudio);
document.addEventListener('click',      unlockAudio);
function playChime(freq, dur, vol) {
  if (!actx) return;
  var o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, actx.currentTime);
  g.gain.linearRampToValueAtTime(vol || 0.15, actx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.3));
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + (dur || 0.3) + 0.05);
}

// ── Phases ───────────────────────────────────────────────────────────────────
// 'select'        — mission picker grid
// 'brief'         — mission info card with DEMO / FLY buttons
// 'demo'          — autopilot runs the canonical solution
// 'fly'           — player flies, demo trajectory shown as ghost
// 'won'           — success banner
// 'failed'        — failure banner
// 'sandbox_place' — drag-to-place sandbox start state
// 'sandbox_fly'   — sandbox flight, full physics knobs unlocked
var phase = 'select';

// ── Sim state (live spacecraft + sim time) ───────────────────────────────────
var curState = {
  x: 0, y: 0, vx: 0, vy: 0, t: 0,
  moonAngle0: 0,
  heading: 0,
  dvBudget: 18
};
var curMission   = null;
var missionMode  = 'fly';                  // 'demo' | 'fly' | 'sandbox'
var trail        = [];
var trailMax     = 2000;
var trailSkip    = 0;
var ghostTrail   = null;                   // captured demo samples ({samples:[]}) for ghost overlay

// Live thrust state (per-frame)
var thrustFwd  = 0;          // -1, 0, +1
var rotDir     = 0;          // -1, 0, +1
var ROT_RATE   = 1.8;        // rad/sec
var THRUST_MAG = 75;         // DU/TU² base
var flameParts = [];
var FLAME_MAX  = 200;

// Demo autopilot
var demoProgram = null;
var burnAnnounce = '';
var burnAnnounceT = 0;
var burnUpcoming  = null;          // {label, dv, dir, secondsUntil} for HUD preview

// Sim time pacing
var TIME_MULTS = [1, 2, 5, 15, 30];
var timeMultIdx = 1;
var BASE_SPEED = 0.01;             // TU/sec at 1×
var SIM_DT = 1 / 3600;
var paused = false;

// Goal tracking
var dwellAccum   = 0;
var minMoonDist  = Infinity;
var minEarthPost = Infinity;
var maxR         = -Infinity;
var passedMoon   = false;
var prevDrM      = null;
var prevDrE      = 0;
var firstApoAfterBurn = null;
var hadAnyBurn   = false;
var postSolveFire = false;
var goalStatus   = 'wip';
var goalReason   = '';

// Predictor
var predCoast  = null;             // { samples, markers }
var predThrust = null;             // { samples, markers }  — only while burn held
var showPred   = true;

// Options
var showOpts    = false;
var autoOrient  = false;
var EARTH_MASS_STEPS = [0.5, 1.0, 2.0, 4.0];
var MOON_MASS_STEPS  = [0.0, 0.5, 1.0, 2.0, 4.0];
var THRUST_STEPS     = [0.2, 0.5, 1.0, 2.0, 5.0];
var earthMassIdx = 1;
var moonMassIdx  = 2;
var thrustIdx    = 2;
var skinIdx      = 0;
var showGhost    = true;
var showNavBall  = true;

// Narration & achievements
var narration  = '';
var narrationT = 0;
var narrated   = {};
var achStore = {};
try { achStore = JSON.parse(localStorage.getItem('orbit_ach') || '{}'); } catch (e) {}
var missionStars = {};
try { missionStars = JSON.parse(localStorage.getItem('orbit_missions') || '{}'); } catch (e) {}
var achToast = '';
var achToastT = 0;

function unlockAch(id, label) {
  if (achStore[id]) return;
  achStore[id] = true;
  try { localStorage.setItem('orbit_ach', JSON.stringify(achStore)); } catch (e) {}
  achToast = '★ ' + label; achToastT = 3.5;
}
function recordStars(missionId, stars) {
  var prev = missionStars[missionId] || 0;
  if (stars > prev) {
    missionStars[missionId] = stars;
    try { localStorage.setItem('orbit_missions', JSON.stringify(missionStars)); } catch (e) {}
  }
}

// ── UI button hitboxes ───────────────────────────────────────────────────────
var BACK_BTN     = { x: 10, y: 10, w: 84, h: 40 };
var PAUSE_BTN    = { x: 0, y: 10, w: 44, h: 40 };     // x set dynamically
var WARP_BTN     = { x: 0, y: 10, w: 44, h: 40 };
var TIME_BTN     = { x: 0, y: 10, w: 78, h: 40 };
var OPT_BTN      = { x: 0, y: 10, w: 72, h: 40 };
var LAUNCH_BTN   = { x: (W - 240) / 2, y: H - 80, w: 240, h: 56 };
var DEMO_BTN     = { x: 0, y: 0, w: 0, h: 0 };
var FLY_BTN      = { x: 0, y: 0, w: 0, h: 0 };
var STOP_BTN     = { x: 0, y: 0, w: 0, h: 0 };
var TRYIT_BTN    = { x: 0, y: 0, w: 0, h: 0 };
var REPLAY_BTN   = { x: 0, y: 0, w: 0, h: 0 };
var NEXT_BTN     = { x: 0, y: 0, w: 0, h: 0 };
var MENU_BTN     = { x: 0, y: 0, w: 0, h: 0 };

// On-canvas held controls
var BURN_BTN     = { cx: W - 90, cy: H - 100, r: 56 };
var RETRO_BTN    = { cx: W - 90, cy: H - 220, r: 42 };
var LEFT_BTN     = { cx: 80,     cy: H - 100, r: 46 };
var RIGHT_BTN    = { cx: 188,    cy: H - 100, r: 46 };
var AUTO_BTN     = { cx: 80,     cy: H - 220, r: 42 };

// ── Earth, Moon, spacecraft sprites — ported from previous build ─────────────
var EARTH_ROT_RATE = PI2 * 2.732;
var CONTINENTS = [
  { lon: -1.35, lat:  0.40, r: 7, c: '#4a8a4a' },
  { lon: -0.95, lat: -0.30, r: 5, c: '#3a7a3a' },
  { lon:  0.35, lat:  0.28, r: 3, c: '#8a7a4a' },
  { lon:  0.55, lat: -0.22, r: 6, c: '#a07a3a' },
  { lon:  1.55, lat:  0.18, r: 9, c: '#5a8a4a' },
  { lon:  2.35, lat: -0.55, r: 4, c: '#8a6a3a' },
  { lon:  0.00, lat: -0.88, r: 7, c: '#d8e4ea' }
];

function drawEarthSprite(ex, ey, R, simTime) {
  ctx.beginPath(); ctx.arc(ex, ey, R, 0, PI2);
  var eg = ctx.createRadialGradient(ex - R * 0.3, ey - R * 0.3, R * 0.1, ex, ey, R);
  eg.addColorStop(0, '#5caaff'); eg.addColorStop(0.5, '#1a6fff'); eg.addColorStop(1, '#0830a0');
  ctx.fillStyle = eg; ctx.fill();

  ctx.save();
  ctx.beginPath(); ctx.arc(ex, ey, R, 0, PI2); ctx.clip();
  var rot = simTime * EARTH_ROT_RATE;
  for (var i = 0; i < CONTINENTS.length; i++) {
    var c = CONTINENTS[i];
    var lon = c.lon + rot, cl = Math.cos(lon);
    if (cl < 0.08) continue;
    var gx = Math.sin(lon) * Math.sqrt(1 - c.lat * c.lat);
    var size = c.r * cl;
    if (size < 0.4) continue;
    ctx.beginPath(); ctx.arc(ex + R * gx, ey + R * -c.lat, size, 0, PI2);
    ctx.fillStyle = c.c; ctx.globalAlpha = Math.min(1, cl * 1.2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();

  ctx.beginPath(); ctx.arc(ex, ey, R, 0, PI2);
  ctx.strokeStyle = 'rgba(150,210,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
}

function drawMoonSprite(mpx, mpy, R) {
  ctx.beginPath(); ctx.arc(mpx, mpy, R, 0, PI2);
  var mg = ctx.createRadialGradient(mpx + R * 0.5, mpy - R * 0.2, 0, mpx, mpy, R * 1.25);
  mg.addColorStop(0, '#f0f0f0'); mg.addColorStop(0.55, '#888'); mg.addColorStop(1, '#333');
  ctx.fillStyle = mg; ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.arc(mpx, mpy, R, 0, PI2); ctx.clip();
  var tg = ctx.createLinearGradient(mpx - R, mpy, mpx + R * 0.3, mpy);
  tg.addColorStop(0, 'rgba(0,0,0,0.55)'); tg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = tg; ctx.fillRect(mpx - R, mpy - R, R * 2, R * 2);
  ctx.restore();
}

function drawSpacecraftShape(spx, spy, ndx, ndy) {
  if (skinIdx === 0) {
    var nose = 9, wing = 4;
    ctx.beginPath();
    ctx.moveTo(spx + ndx * nose, spy + ndy * nose);
    ctx.lineTo(spx - ndy * wing - ndx * 4, spy + ndx * wing - ndy * 4);
    ctx.lineTo(spx + ndy * wing - ndx * 4, spy - ndx * wing - ndy * 4);
    ctx.closePath(); ctx.fillStyle = '#fff'; ctx.fill();
  } else if (skinIdx === 1) {
    var rx = -ndy, ry = ndx, L = 14, Wn = 1.2, Wb = 2.8;
    ctx.beginPath();
    ctx.moveTo(spx + ndx * L,                 spy + ndy * L);
    ctx.lineTo(spx + rx * Wn + ndx * (L - 3), spy + ry * Wn + ndy * (L - 3));
    ctx.lineTo(spx + rx * Wb - ndx * 2,       spy + ry * Wb - ndy * 2);
    ctx.lineTo(spx - rx * Wb - ndx * 2,       spy - ry * Wb - ndy * 2);
    ctx.lineTo(spx - rx * Wn + ndx * (L - 3), spy - ry * Wn + ndy * (L - 3));
    ctx.closePath(); ctx.fillStyle = '#f2f2f0'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(spx + rx * Wb - ndx * 2,        spy + ry * Wb - ndy * 2);
    ctx.lineTo(spx + rx * (Wb + 2) - ndx * 6,  spy + ry * (Wb + 2) - ndy * 6);
    ctx.lineTo(spx - rx * (Wb + 2) - ndx * 6,  spy - ry * (Wb + 2) - ndy * 6);
    ctx.lineTo(spx - rx * Wb - ndx * 2,        spy - ry * Wb - ndy * 2);
    ctx.closePath(); ctx.fillStyle = '#c88830'; ctx.fill();
  } else if (skinIdx === 2) {
    var rx3 = -ndy, ry3 = ndx;
    ctx.beginPath(); ctx.arc(spx - ndx * 2, spy - ndy * 2, 6.5, 0, PI2);
    ctx.fillStyle = '#ffe135'; ctx.fill();
    ctx.strokeStyle = '#b89000'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(spx + ndx * 2.5, spy + ndy * 2.5, 3.5, 0, PI2);
    ctx.fillStyle = '#2d8040'; ctx.fill();
    ctx.beginPath(); ctx.arc(spx + ndx * 2.5, spy + ndy * 2.5, 2, 0, PI2);
    ctx.fillStyle = 'rgba(12,12,12,0.72)'; ctx.fill();
    ctx.beginPath(); ctx.arc(spx + ndx * 2.5 + rx3 * 0.8, spy + ndy * 2.5 + ry3 * 0.8, 0.9, 0, PI2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(spx + ndx * 6 + rx3 * 1.5, spy + ndy * 6 + ry3 * 1.5);
    ctx.lineTo(spx + ndx * 6 - rx3 * 1.5, spy + ndy * 6 - ry3 * 1.5);
    ctx.lineTo(spx + ndx * 10, spy + ndy * 10);
    ctx.closePath(); ctx.fillStyle = '#ff8c00'; ctx.fill();
  } else if (skinIdx === 3) {
    var rx4 = -ndy, ry4 = ndx;
    ctx.beginPath(); ctx.arc(spx - ndx * 1.5, spy - ndy * 1.5, 6, 0, PI2);
    ctx.fillStyle = '#c8956c'; ctx.fill();
    ctx.beginPath(); ctx.arc(spx + ndx * 5, spy + ndy * 5, 4, 0, PI2);
    ctx.fillStyle = '#dba878'; ctx.fill();
    var hx = spx + ndx * 4, hy = spy + ndy * 4;
    ctx.fillStyle = '#dba878';
    ctx.beginPath(); ctx.arc(hx + rx4 * 3.2, hy + ry4 * 3.2, 1.9, 0, PI2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - rx4 * 3.2, hy - ry4 * 3.2, 1.9, 0, PI2); ctx.fill();
    ctx.fillStyle = '#f088a0';
    ctx.beginPath(); ctx.arc(hx + rx4 * 3.2, hy + ry4 * 3.2, 0.95, 0, PI2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - rx4 * 3.2, hy - ry4 * 3.2, 0.95, 0, PI2); ctx.fill();
    ctx.beginPath(); ctx.arc(spx + ndx * 6.5 + rx4 * 1.4, spy + ndy * 6.5 + ry4 * 1.4, 0.9, 0, PI2);
    ctx.fillStyle = '#0a0500'; ctx.fill();
  }
}

// Chevron (instead of Unicode arrows — iOS renders those as boxes).
function drawChevron(cx, cy, size, dir, color) {
  // dir: 'left' | 'right' | 'up' | 'down'
  ctx.strokeStyle = color || 'rgba(255,255,255,0.9)';
  ctx.lineWidth = Math.max(2, size * 0.18);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  if (dir === 'left') {
    ctx.moveTo(cx + size * 0.4, cy - size * 0.6);
    ctx.lineTo(cx - size * 0.4, cy);
    ctx.lineTo(cx + size * 0.4, cy + size * 0.6);
  } else if (dir === 'right') {
    ctx.moveTo(cx - size * 0.4, cy - size * 0.6);
    ctx.lineTo(cx + size * 0.4, cy);
    ctx.lineTo(cx - size * 0.4, cy + size * 0.6);
  } else if (dir === 'up') {
    ctx.moveTo(cx - size * 0.6, cy + size * 0.4);
    ctx.lineTo(cx, cy - size * 0.4);
    ctx.lineTo(cx + size * 0.6, cy + size * 0.4);
  } else if (dir === 'down') {
    ctx.moveTo(cx - size * 0.6, cy - size * 0.4);
    ctx.lineTo(cx, cy + size * 0.4);
    ctx.lineTo(cx + size * 0.6, cy - size * 0.4);
  }
  ctx.stroke();
}

// Flame particles — visual exhaust.
function spawnFlame(px, py, baseVX, baseVY, count, life, size, r, g, b, spread) {
  for (var i = 0; i < count; i++) {
    if (flameParts.length > FLAME_MAX) flameParts.shift();
    var jx = (Math.random() - 0.5) * spread;
    var jy = (Math.random() - 0.5) * spread;
    var lj = life * (0.6 + Math.random() * 0.6);
    flameParts.push({
      x: px, y: py, vx: baseVX + jx, vy: baseVY + jy,
      life: lj, maxLife: lj,
      size: size * (0.7 + Math.random() * 0.6),
      r: r, g: g, b: b
    });
  }
}
function updateFlame(rdt) {
  for (var i = flameParts.length - 1; i >= 0; i--) {
    var p = flameParts[i];
    p.x += p.vx * rdt; p.y += p.vy * rdt; p.life -= rdt;
    if (p.life <= 0) flameParts.splice(i, 1);
  }
}
function drawFlame() {
  for (var i = 0; i < flameParts.length; i++) {
    var p = flameParts[i];
    var a = p.life / p.maxLife; if (a < 0) a = 0;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.4 + a * 0.6), 0, PI2);
    ctx.fillStyle = 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + (a * 0.8) + ')';
    ctx.fill();
  }
}

// ── Mission lifecycle ────────────────────────────────────────────────────────
function selectMission(m) {
  curMission = m;
  applyMissionView(m);
  phase = 'brief';
  narrated = {};
}

function applyMissionView(m) {
  if (m && m.view && m.view.zoomLevel != null) zoomIdx = m.view.zoomLevel;
  if (zoomIdx < 0) zoomIdx = 0;
  if (zoomIdx >= ZOOM_LEVELS.length) zoomIdx = ZOOM_LEVELS.length - 1;
}

function resetCurStateFromMission(m) {
  curState.x = m.start.x; curState.y = m.start.y;
  curState.vx = m.start.vx; curState.vy = m.start.vy;
  curState.t = 0;
  curState.moonAngle0 = m.start.moonAngle0;
  curState.heading    = m.start.heading != null ? m.start.heading : Math.atan2(m.start.vy, m.start.vx);
  curState.dvBudget   = m.start.dvBudget;
  trail = []; trailSkip = 0;
  flameParts = [];
  thrustFwd = 0; rotDir = 0;
  dwellAccum = 0;
  minMoonDist = Infinity; minEarthPost = Infinity; maxR = -Infinity;
  passedMoon = false; prevDrM = null;
  prevDrE = curState.x * curState.vx + curState.y * curState.vy;
  firstApoAfterBurn = null;
  hadAnyBurn = false; postSolveFire = false;
  goalStatus = 'wip'; goalReason = '';
  burnAnnounce = ''; burnAnnounceT = 0;

}

function startDemo() {

  curState.moonAngle0 = 0; curState.heading = 0; curState.dvBudget = 18;

function returnToMenu() {

  curMission = null;
  trail = []; ghostTrail = null; flameParts = [];

// ── Demo trail capture: re-run the demo via simulate() to make a ghost ──────
function captureGhostFromDemo() {
  // Re-run from start of mission, applying impulses where the program would
  // fire. Returns sample list in world coordinates.
  var m = curMission;
  var st = {
    x: m.start.x, y: m.start.y, vx: m.start.vx, vy: m.start.vy, t: 0
  };
  var opts = {
    moonAngle0: m.start.moonAngle0,
    gmEMul: EARTH_MASS_STEPS[earthMassIdx],
    gmMMul: MOON_MASS_STEPS[moonMassIdx],
    thrust: null
  };
  var prog = Phys.makeImpulsiveProgram((m.solution && m.solution.burns) || []);
  var samples = [{ x: st.x, y: st.y, t: 0 }];
  var dt = SIM_DT;
  var TMAX = (m.solution.expectedDuration || 0.5) * 1.5;
  while (st.t < TMAX) {
    prog.tick(st, opts);
    var step = Phys.stepPhysics(st, dt, opts);
    st.x = step.x; st.y = step.y; st.vx = step.vx; st.vy = step.vy; st.t = step.t;
    if (step.collision) break;
    if ((samples.length === 1) || ((st.t - samples[samples.length - 1].t) > 0.005)) {
      samples.push({ x: st.x, y: st.y, t: st.t });
    }
  }
  return { samples: samples };
}

// ── Maneuver predictor ───────────────────────────────────────────────────────
function refreshPredictor() {
  var optsBase = {
    moonAngle0: curState.moonAngle0,
    gmEMul: EARTH_MASS_STEPS[earthMassIdx],
    gmMMul: MOON_MASS_STEPS[moonMassIdx],
    thrust: null
  };
  predCoast = Phys.simulate(curState, optsBase, 0.20, 400, 4, false);
  if (thrustFwd !== 0 && curState.dvBudget > 0) {
    var tMag = THRUST_MAG * THRUST_STEPS[thrustIdx];
    var horizon = Math.min(0.5, curState.dvBudget / tMag);
    if (horizon > 0.005) {
      var optsT = {
        moonAngle0: curState.moonAngle0,
        gmEMul: EARTH_MASS_STEPS[earthMassIdx],
        gmMMul: MOON_MASS_STEPS[moonMassIdx],
        thrust: { fwd: thrustFwd, scAngle: curState.heading, mag: tMag }
      };
      predThrust = Phys.simulate(curState, optsT, horizon, 200, 2, false);
    } else predThrust = null;
  } else {
    predThrust = null;
  }
}

function drawPredictorBranch(pred, baseRGB, dotR) {
  if (!pred) return;
  var s = pred.samples;
  for (var i = 1; i < s.length; i++) {
    var p = s[i];
    var sx = sxw(p.x, p.y, p.t), sy = syw(p.x, p.y, p.t);
    var a = (1 - p.f) * 0.55;
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, PI2);
    ctx.fillStyle = 'rgba(' + baseRGB + ',' + a.toFixed(2) + ')';
    ctx.fill();
  }
  for (var j = 0; j < pred.markers.length; j++) {
    var m = pred.markers[j];
    var msx = sxw(m.x, m.y, m.t), msy = syw(m.x, m.y, m.t);
    var col = m.type.indexOf('apo')  === 0 ? '255,175,55' : '90,215,255';
    ctx.beginPath(); ctx.arc(msx, msy, 4, 0, PI2);
    ctx.strokeStyle = 'rgba(' + col + ',0.85)';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'rgba(' + col + ',0.9)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    var lbl = m.type === 'apo_earth'  ? 'APO'  :
              m.type === 'peri_earth' ? 'PER'  :
              m.type === 'apo_moon'   ? 'mAPO' : 'mPER';
    ctx.fillText(lbl, msx, msy - 5);
  }
}

// ── Stepping the world ───────────────────────────────────────────────────────
function stepWorld(elapsed) {
  if (paused) return;
  var tu_target = elapsed * BASE_SPEED * TIME_MULTS[timeMultIdx];
  var nSteps = Math.max(1, Math.ceil(tu_target / SIM_DT));
  var dt = tu_target / nSteps;

  for (var i = 0; i < nSteps && goalStatus === 'wip'; i++) {
    // 1. Trigger impulsive burns in DEMO mode.
    if (missionMode === 'demo' && demoProgram) {
      var fired = demoProgram.tick(curState, {
        moonAngle0: curState.moonAngle0,
        gmEMul: EARTH_MASS_STEPS[earthMassIdx],
        gmMMul: MOON_MASS_STEPS[moonMassIdx]
      });
      if (fired) {
        hadAnyBurn = true;
        var dvSpent = fired.magnitude;
        curState.dvBudget -= dvSpent;
        if (curState.dvBudget < 0) curState.dvBudget = 0;
        burnAnnounce  = fired.burn.label || 'BURN';
        burnAnnounceT = 3.5;
        spawnBurnBurst();
        if (fired.burn.mode === 'circularize_moon') {
          unlockAch('moon_walker', 'Moon Walker');
          if (curState.t < 0.30) unlockAch('fast_insertion', 'Fast Insertion');
        }
      }
    }

    // 2. Player-driven thrust (in FLY or SANDBOX modes).
    var thrustForStep = null;
    if ((missionMode === 'fly' || missionMode === 'sandbox') && thrustFwd !== 0 && curState.dvBudget > 0) {
      thrustForStep = {
        fwd: thrustFwd,
        scAngle: curState.heading,
        mag: THRUST_MAG * THRUST_STEPS[thrustIdx]
      };
      if (!hadAnyBurn) hadAnyBurn = true;
      if (curMission && curMission.solution &&
          demoProgram == null && demoProgram === null && missionMode === 'fly') {
        // Player firing during fly — record for "no-fire-after" check.
      }
      // postSolveFire flag — if demo solution is done (or there's no demo) and
      // the player keeps firing, we record it for gravity_assist/figure_8 fail checks.
      if (curMission && curMission.solution && curMission.solution.burns &&
          curMission.solution.burns.length > 0 &&
          curState.t > (curMission.fail && curMission.fail.refireAfter != null ? curMission.fail.refireAfter : 0.05)) {
        postSolveFire = true;
      } else if (curMission && curMission.solution && (!curMission.solution.burns || curMission.solution.burns.length === 0)) {
        // figure_8 — no burns allowed at all.
        postSolveFire = true;
      }
    }

    // 3. Step physics.
    var step = Phys.stepPhysics(curState, dt, {
      moonAngle0: curState.moonAngle0,
      gmEMul: EARTH_MASS_STEPS[earthMassIdx],
      gmMMul: MOON_MASS_STEPS[moonMassIdx],
      thrust: thrustForStep,
      dvBudget: curState.dvBudget
    });
    curState.x = step.x; curState.y = step.y;
    curState.vx = step.vx; curState.vy = step.vy;
    curState.t = step.t;
    curState.dvBudget -= step.dvSpent;
    if (curState.dvBudget < 0) curState.dvBudget = 0;

    if (step.collision) {
      goalStatus = 'failed';
      goalReason = (step.collision === 'earth') ? 'Crashed into Earth' : 'Crashed into the Moon';
      playChime(140, 0.5, 0.2);
      return;
    }

    // 4. Track minima/maxima.
    var rE = Math.sqrt(curState.x * curState.x + curState.y * curState.y);
    if (rE > maxR) maxR = rE;
    var mp = Phys.moonPos(curState.t, curState.moonAngle0);
    var mv = Phys.moonVel(curState.t, curState.moonAngle0);
    var dMx = curState.x - mp.x, dMy = curState.y - mp.y;
    var rM = Math.sqrt(dMx * dMx + dMy * dMy);
    if (rM < minMoonDist) minMoonDist = rM;

    var rvx = curState.vx - mv.x, rvy = curState.vy - mv.y;
    var drM = dMx * rvx + dMy * rvy;
    if (!passedMoon && prevDrM !== null && prevDrM < 0 && drM >= 0 && rM < 0.20) passedMoon = true;
    prevDrM = drM;
    if (passedMoon && rE < minEarthPost) minEarthPost = rE;

    var drE = curState.x * curState.vx + curState.y * curState.vy;
    var atApo = (prevDrE > 0 && drE <= 0 && rE > 0.4);
    if (atApo && hadAnyBurn && !firstApoAfterBurn) {
      firstApoAfterBurn = { x: curState.x, y: curState.y, r: rE, t: curState.t };
    }
    prevDrE = drE;

    // 5. Evaluate goal.
    if (missionMode === 'fly' || missionMode === 'demo') {
      var ge = SC.evaluateGoal(curMission.goal, {
        state: curState,
        opts: {
          moonAngle0: curState.moonAngle0,
          gmEMul: EARTH_MASS_STEPS[earthMassIdx],
          gmMMul: MOON_MASS_STEPS[moonMassIdx]
        },
        dwellAccum: dwellAccum,
        minMoonDistSoFar: minMoonDist,
        minEarthPost: isFinite(minEarthPost) ? minEarthPost : null,
        maxRsoFar: isFinite(maxR) ? maxR : null,
        passedMoon: passedMoon,
        atApoapsisEarth: atApo,
        firstApoAfterBurn: firstApoAfterBurn,
        postSolveFire: postSolveFire,
        dt: dt
      });
      dwellAccum = ge.dwell;
      if (ge.status === 'success' && missionMode === 'fly') {
        goalStatus = 'success'; goalReason = ge.reason || '';
        finalizeFlySuccess();
        return;
      }
      if (ge.status === 'failed' && missionMode === 'fly') {
        goalStatus = 'failed'; goalReason = ge.reason || '';
        finalizeFlyFailure();
        return;
      }
    }
  }

  // After the physics steps for this frame, sample the trail.
  trailSkip++;
  if (trailSkip >= 1) {
    trailSkip = 0;
    trail.push({ x: curState.x, y: curState.y, t: curState.t });
    if (trail.length > trailMax) trail.shift();
  }
}

function spawnBurnBurst() {
  // Visual: blast of orange particles trailing off the spacecraft.
  var spx = sxw(curState.x, curState.y, curState.t);
  var spy = syw(curState.x, curState.y, curState.t);
  var hd = viewAngle(curState.heading, curState.t);
  var ndx = Math.cos(hd), ndy = -Math.sin(hd);
  for (var p = 0; p < 14; p++) {
    spawnFlame(spx - ndx * 6, spy - ndy * 6, -ndx * 90, -ndy * 90, 1, 0.75, 4.5, 255, 190, 80, 60);
  }
}

function finalizeFlySuccess() {
  // Stars: 1 = pass, 2 = ΔV used ≤ 1.3× canonical, 3 = ΔV used ≤ 1.1× canonical
  var canon = canonicalDV(curMission);
  var used  = (curMission.start.dvBudget - curState.dvBudget);
  var stars = 1;
  if (canon > 0.01) {
    if (used <= canon * 1.3) stars = 2;
    if (used <= canon * 1.1) stars = 3;
  } else {
    if (used <= 0.05) stars = 3;       // no-burn mission
  }
  recordStars(curMission.id, stars);
  var ach = curMission.achievements || [];
  for (var i = 0; i < ach.length; i++) unlockAch(ach[i], titleCase(ach[i].replace(/_/g, ' ')));
  playChime(880, 0.4, 0.18);
  setTimeout(function () { playChime(1320, 0.6, 0.16); }, 180);
  phase = 'won';
}
function finalizeFlyFailure() {
  playChime(180, 0.6, 0.18);
  phase = 'failed';
}
function canonicalDV(m) {
  var sum = 0;
  var burns = (m.solution && m.solution.burns) || [];
  for (var i = 0; i < burns.length; i++) {
    if (burns[i].dv != null) sum += Math.abs(burns[i].dv);
    else if (burns[i].mode === 'circularize_moon') sum += 1.8;   // typical LOI impulse
  }
  return sum;
}
function titleCase(s) {
  return s.replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

// ── Sandbox placement ────────────────────────────────────────────────────────
var placeHasPos = false, placeHasVel = false;
var placeDragging = false;
var PLACE_VEL_SCALE = 0.05;        // DU/TU per drag pixel
var PLACE_MIN_DRAG = 8;

function updateSandboxPlace() {
  // Tap to set position (must be outside R_EARTH_DU, inside ~1.3 DU)
  if (pointerJust) {
    pointerJust = false;
    // Ignore taps on top bar
    if (my < 60) return;
    if (my > H - 100) return;   // ignore taps near the LAUNCH button row
    var wx = (mx - CX) / SCALE();
    var wy = (CY - my) / SCALE();
    var r = Math.sqrt(wx * wx + wy * wy);
    if (r > 0.05 && r < 1.3) {
      curState.x = wx; curState.y = wy;
      placeHasPos = true; placeHasVel = false; placeDragging = true;
    }
  }
  if (pointerDown && placeHasPos) {
    var spx = sxw(curState.x, curState.y, 0), spy = syw(curState.x, curState.y, 0);
    var dx = mx - spx, dy = my - spy;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > PLACE_MIN_DRAG) {
      curState.vx =  dx * PLACE_VEL_SCALE / 1;
      curState.vy = -dy * PLACE_VEL_SCALE / 1;   // y flip
      placeHasVel = true;
    }
  }
  if (pointerUpEd) {
    pointerUpEd = false;
    placeDragging = false;
  }
  if (placeHasPos && placeHasVel && hitRect(LAUNCH_BTN.x, LAUNCH_BTN.y, LAUNCH_BTN.w, LAUNCH_BTN.h) && mclk) {
    mclk = false;
    curState.t = 0;
    curState.heading = Math.atan2(curState.vy, curState.vx);
    curState.dvBudget = 18;
    trail = []; flameParts = [];
    missionMode = 'sandbox';
    phase = 'sandbox_fly';
  }
}

// ── Top-bar / mission-screen UI ──────────────────────────────────────────────
function layoutTopBar() {
  // Right-justify the cluster: [time mult] [opt] [pause] [warp]
  var x = W - 10;
  WARP_BTN.x  = x - WARP_BTN.w;  x -= WARP_BTN.w + 6;
  PAUSE_BTN.x = x - PAUSE_BTN.w; x -= PAUSE_BTN.w + 6;
  TIME_BTN.x  = x - TIME_BTN.w;  x -= TIME_BTN.w + 6;
  OPT_BTN.x   = x - OPT_BTN.w;
}
layoutTopBar();

// ── Update phases ────────────────────────────────────────────────────────────
function updateSelect() {
  // Mission cards: 2 columns × 4 rows (7 missions + sandbox)
  if (mclk) {
    if (hitRect(BACK_BTN.x, BACK_BTN.y, BACK_BTN.w, BACK_BTN.h)) { mclk = false; }
    for (var i = 0; i < MISSIONS.length; i++) {
      var c = missionCardRect(i);
      if (hitRect(c.x, c.y, c.w, c.h)) { mclk = false; selectMission(MISSIONS[i]); return; }
    }
    var sb = sandboxCardRect();
    if (hitRect(sb.x, sb.y, sb.w, sb.h)) { mclk = false; startSandboxPlace(); return; }
    mclk = false;
  }
}
function missionCardRect(i) {
  var col = i % 2, row = Math.floor(i / 2);
  var W2 = 350, H2 = 92, gap = 12;
  var totalW = 2 * W2 + gap;
  var x = (W - totalW) / 2 + col * (W2 + gap);
  var y = 130 + row * (H2 + gap);
  return { x: x, y: y, w: W2, h: H2 };
}
function sandboxCardRect() {
  return { x: (W - 360) / 2, y: 130 + 4 * (92 + 12), w: 360, h: 70 };
}

function updateBrief() {
  if (mclk) {
    if (hitRect(BACK_BTN.x, BACK_BTN.y, BACK_BTN.w, BACK_BTN.h)) { mclk = false; returnToMenu(); return; }
    if (hitRect(DEMO_BTN.x, DEMO_BTN.y, DEMO_BTN.w, DEMO_BTN.h)) { mclk = false; startDemo(); return; }
    if (hitRect(FLY_BTN.x,  FLY_BTN.y,  FLY_BTN.w,  FLY_BTN.h))  { mclk = false; startFly();  return; }
    mclk = false;
  }
}

function updateDemo(elapsed) {
  // Live controls: just pause/time/back/opt/zoom (no thrust).
  handleTopBarInputs(elapsed);
  stepWorld(elapsed);
  refreshPredictor();
  if (mclk) {
    if (hitRect(STOP_BTN.x, STOP_BTN.y, STOP_BTN.w, STOP_BTN.h)) {
      mclk = false; ghostTrail = { samples: trail.slice() }; startFly(); return;
    }
    if (demoProgram && demoProgram.done() && hitRect(TRYIT_BTN.x, TRYIT_BTN.y, TRYIT_BTN.w, TRYIT_BTN.h)) {
      mclk = false; ghostTrail = { samples: trail.slice() }; startFly(); return;
    }
    mclk = false;
  }
}

function updateFly(elapsed) {
  handleTopBarInputs(elapsed);
  handleFlightControls(elapsed);
  stepWorld(elapsed);
  refreshPredictor();
  mclk = false;
}

function updateWon(elapsed) {
  if (mclk) {
    if (hitRect(REPLAY_BTN.x, REPLAY_BTN.y, REPLAY_BTN.w, REPLAY_BTN.h)) { mclk = false; startFly(); return; }
    if (hitRect(NEXT_BTN.x, NEXT_BTN.y, NEXT_BTN.w, NEXT_BTN.h))         { mclk = false; gotoNextMission(); return; }
    if (hitRect(MENU_BTN.x, MENU_BTN.y, MENU_BTN.w, MENU_BTN.h))         { mclk = false; returnToMenu(); return; }
    mclk = false;
  }
}
function updateFailed(elapsed) {
  if (mclk) {
    if (hitRect(REPLAY_BTN.x, REPLAY_BTN.y, REPLAY_BTN.w, REPLAY_BTN.h)) { mclk = false; startFly(); return; }
    if (hitRect(MENU_BTN.x, MENU_BTN.y, MENU_BTN.w, MENU_BTN.h))         { mclk = false; returnToMenu(); return; }
    mclk = false;
  }
}

function gotoNextMission() {
  for (var i = 0; i < MISSIONS.length; i++) {
    if (MISSIONS[i].id === curMission.id) {
      var nxt = MISSIONS[(i + 1) % MISSIONS.length];
      selectMission(nxt);
      return;
    }
  }
  returnToMenu();
}

function updateSandboxFly(elapsed) {
  handleTopBarInputs(elapsed);
  handleFlightControls(elapsed);
  stepWorld(elapsed);
  refreshPredictor();
  mclk = false;
}

function handleTopBarInputs(elapsed) {
  if (mclk) {
    if (hitRect(BACK_BTN.x, BACK_BTN.y, BACK_BTN.w, BACK_BTN.h)) {
      mclk = false;
      if (phase === 'sandbox_fly') startSandboxPlace();
      else if (curMission) { phase = 'brief'; }
      else returnToMenu();
      return;
    }
    if (hitRect(PAUSE_BTN.x, PAUSE_BTN.y, PAUSE_BTN.w, PAUSE_BTN.h)) { mclk = false; paused = !paused; return; }
    if (hitRect(TIME_BTN.x, TIME_BTN.y, TIME_BTN.w, TIME_BTN.h))    { mclk = false; timeMultIdx = (timeMultIdx + 1) % TIME_MULTS.length; return; }
    if (hitRect(WARP_BTN.x, WARP_BTN.y, WARP_BTN.w, WARP_BTN.h))    { mclk = false; warpToNextEvent(); return; }
    if (hitRect(OPT_BTN.x, OPT_BTN.y, OPT_BTN.w, OPT_BTN.h))        { mclk = false; showOpts = !showOpts; return; }
  }
  if (eat('KeyP')) paused = !paused;
  if (eat('KeyT')) timeMultIdx = (timeMultIdx + 1) % TIME_MULTS.length;
  if (eat('KeyO')) showOpts = !showOpts;
  if (eat('KeyR')) returnToMenu();
  if (eat('Equal') || eat('NumpadAdd'))  zoomIdx = Math.max(0, zoomIdx - 1);    // closer
  if (eat('Minus') || eat('NumpadSubtract')) zoomIdx = Math.min(ZOOM_LEVELS.length - 1, zoomIdx + 1);

  if (showOpts) handleOptsClick();
}

function warpToNextEvent() {
  // Jump simulation to next upcoming scripted event:
  // 1) next demo burn time (if demo), or
  // 2) next earth apoapsis / Moon periapsis on coast forecast, or
  // 3) +0.05 TU as a fallback.
  var target = curState.t + 0.05;
  if (missionMode === 'demo' && demoProgram && !demoProgram.done()) {
    var burn = demoProgram.currentBurn();
    if (burn && burn.trigger === 'time' && burn.t > curState.t) target = burn.t - 0.002;
  } else if (predCoast && predCoast.markers && predCoast.markers.length) {
    var first = predCoast.markers[0];
    target = first.t - 0.002;
  }
  // Fast-forward in larger chunks of time. We just call stepWorld with a big
  // synthetic "elapsed" so the existing pacing applies.
  var dT = target - curState.t;
  if (dT <= 0) return;
  var prevMult = timeMultIdx;
  timeMultIdx = TIME_MULTS.length - 1;
  // Convert dT (TU) to elapsed (s).
  var simElapsed = dT / (BASE_SPEED * TIME_MULTS[timeMultIdx]);
  stepWorld(simElapsed);
  timeMultIdx = prevMult;
}

function handleFlightControls(elapsed) {
  thrustFwd = 0;
  rotDir = 0;
  // Keyboard
  if (K.Space || K.ArrowUp)   thrustFwd =  1;
  if (K.ArrowDown)             thrustFwd = -1;
  if (K.ArrowLeft)             rotDir   =  1;
  if (K.ArrowRight)            rotDir   = -1;
  // Touch buttons
  if (pointerOverCircle(BURN_BTN.cx, BURN_BTN.cy, BURN_BTN.r))   thrustFwd =  1;
  if (pointerOverCircle(RETRO_BTN.cx, RETRO_BTN.cy, RETRO_BTN.r)) thrustFwd = -1;
  if (pointerOverCircle(LEFT_BTN.cx, LEFT_BTN.cy, LEFT_BTN.r))   rotDir   =  1;
  if (pointerOverCircle(RIGHT_BTN.cx, RIGHT_BTN.cy, RIGHT_BTN.r)) rotDir   = -1;
  // RCS rotation: real-time (not sim-time) so it remains snappy at any time mult.
  curState.heading += rotDir * ROT_RATE * elapsed;

  // Flame puffs for visual feedback (real-time, not sim-time)
  if (thrustFwd !== 0 && curState.dvBudget > 0) {
    var spx = sxw(curState.x, curState.y, curState.t);
    var spy = syw(curState.x, curState.y, curState.t);
    var hd = viewAngle(curState.heading, curState.t);
    var ndx = Math.cos(hd), ndy = -Math.sin(hd);
    var bk = thrustFwd > 0 ? -1 : 1;
    spawnFlame(spx + ndx * bk * 8, spy + ndy * bk * 8,
               ndx * bk * 60, ndy * bk * 60, 2, 0.4, 3.4, 255, 180, 70, 30);
  }
  if (rotDir !== 0) {
    var spx2 = sxw(curState.x, curState.y, curState.t);
    var spy2 = syw(curState.x, curState.y, curState.t);
    spawnFlame(spx2 + (Math.random() - 0.5) * 10, spy2 + (Math.random() - 0.5) * 10,
               (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, 1, 0.25, 1.8, 200, 220, 255, 6);
  }
}

// ── Options panel click handling ─────────────────────────────────────────────
function handleOptsClick() {
  if (!mclk) return;
  var panelX = 60, panelY = 80, panelW = W - 120;
  if (!hitRect(panelX, panelY, panelW, H - 160)) { showOpts = false; mclk = false; return; }
  // Rows are laid out in drawOptsPanel; we mirror layout for clicks.
  var ry = panelY + 60;
  var rowH = 56;
  // Trajectory toggle
  if (clickRow(panelX + panelW - 100, ry, 80, 36)) { showPred = !showPred; mclk = false; return; }
  ry += rowH;
  // Ghost toggle
  if (clickRow(panelX + panelW - 100, ry, 80, 36)) { showGhost = !showGhost; mclk = false; return; }
  ry += rowH;
  // Nav-ball toggle
  if (clickRow(panelX + panelW - 100, ry, 80, 36)) { showNavBall = !showNavBall; mclk = false; return; }
  ry += rowH;
  // Auto-orient toggle
  if (clickRow(panelX + panelW - 100, ry, 80, 36)) { autoOrient = !autoOrient; mclk = false; return; }
  ry += rowH;
  // Earth mass chips
  if (handleChipRow(panelX, ry, panelW, EARTH_MASS_STEPS, earthMassIdx, function (i) { earthMassIdx = i; })) { mclk = false; return; }
  ry += rowH;
  // Moon mass chips
  if (handleChipRow(panelX, ry, panelW, MOON_MASS_STEPS, moonMassIdx, function (i) { moonMassIdx = i; })) { mclk = false; return; }
  ry += rowH;
  // Thrust chips
  if (handleChipRow(panelX, ry, panelW, THRUST_STEPS, thrustIdx, function (i) { thrustIdx = i; })) { mclk = false; return; }
  ry += rowH;
  // Skin row (cycle button)
  if (clickRow(panelX + panelW - 100, ry, 80, 36)) { skinIdx = (skinIdx + 1) % 4; mclk = false; return; }
  ry += rowH;
  // Zoom row
  if (clickChip(panelX + panelW - 220, ry, 60, 36)) { zoomIdx = Math.max(0, zoomIdx - 1); mclk = false; return; }
  if (clickChip(panelX + panelW - 100, ry, 60, 36)) { zoomIdx = Math.min(ZOOM_LEVELS.length - 1, zoomIdx + 1); mclk = false; return; }
  // Close-X
  if (hitRect(panelX + panelW - 50, panelY + 10, 40, 40)) { showOpts = false; mclk = false; return; }
}
function clickRow(bx, by, bw, bh) { return hitRect(bx, by, bw, bh); }
function clickChip(cx, cy, cw, ch) { return hitRect(cx, cy, cw, ch); }
function handleChipRow(panelX, ry, panelW, steps, currentIdx, setter) {
  var n = steps.length;
  var avail = 220;
  var chipW = (avail - (n - 1) * 6) / n;
  var startX = panelX + panelW - avail - 10;
  for (var i = 0; i < n; i++) {
    var cx = startX + i * (chipW + 6);
    if (hitRect(cx, ry, chipW, 36)) { setter(i); return true; }
  }
  return false;
}

// ── Rendering ────────────────────────────────────────────────────────────────
function clear() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();
}

// Deterministic starfield. Seeded so it doesn't twinkle.
function drawStars() {
  for (var i = 0; i < 90; i++) {
    var x = (i * 137 + 17) % W;
    var y = (i * 89  + 43) % H;
    var s = ((i * 31) % 5) / 5 + 0.4;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + 0.4 * s).toFixed(2) + ')';
    ctx.fillRect(x, y, 1.2, 1.2);
  }
}

function drawWorld() {
  var rotating = curMission && curMission.view && curMission.view.preset === 'rotating_moon';
  var simT = curState.t;
  // Earth at origin
  var ex = sxw(0, 0, simT), ey = syw(0, 0, simT);
  // Moon (analytical) — use moonPos
  var mp = Phys.moonPos(simT, curState.moonAngle0);
  var mpx = sxw(mp.x, mp.y, simT), mpy = syw(mp.x, mp.y, simT);

  // Moon orbit guide circle (only when not rotating).
  if (!rotating) {
    ctx.beginPath();
    ctx.arc(ex, ey, Phys.MOON_R * SCALE(), 0, PI2);
    ctx.strokeStyle = 'rgba(140,160,200,0.18)';
    ctx.lineWidth = 1; ctx.stroke();
  }

  // Earth surface ring (for collision visualization at higher zoom levels).
  if (Phys.R_EARTH_DU * SCALE() > 20) {
    drawEarthSprite(ex, ey, Phys.R_EARTH_DU * SCALE(), simT);
  } else {
    drawEarthSprite(ex, ey, 22, simT);
  }

  // Moon SOI ring
  ctx.beginPath();
  ctx.arc(mpx, mpy, Phys.SOI_MOON_DU * SCALE(), 0, PI2);
  ctx.strokeStyle = 'rgba(180,200,240,0.12)';
  ctx.lineWidth = 1; ctx.stroke();

  // Moon sprite — radius scales with zoom but capped.
  var moonR = Math.max(6, Phys.R_MOON_DU * SCALE() * 1.2);
  drawMoonSprite(mpx, mpy, moonR);

  // Ghost trail (faint)
  if (showGhost && ghostTrail && ghostTrail.samples && phase === 'fly') {
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    var s0 = ghostTrail.samples[0];
    ctx.moveTo(sxw(s0.x, s0.y, s0.t), syw(s0.x, s0.y, s0.t));
    for (var gi = 1; gi < ghostTrail.samples.length; gi++) {
      var sg = ghostTrail.samples[gi];
      ctx.lineTo(sxw(sg.x, sg.y, sg.t), syw(sg.x, sg.y, sg.t));
    }
    ctx.stroke();
  }

  // Live trail
  if (trail.length > 1) {
    var col = (curMission && curMission.trailRGB) ? curMission.trailRGB : [220, 220, 255];
    ctx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0.85)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    var t0 = trail[0];
    ctx.moveTo(sxw(t0.x, t0.y, t0.t), syw(t0.x, t0.y, t0.t));
    for (var ti = 1; ti < trail.length; ti++) {
      var tp = trail[ti];
      ctx.lineTo(sxw(tp.x, tp.y, tp.t), syw(tp.x, tp.y, tp.t));
    }
    ctx.stroke();
  }

  // Predictor (coast + with-thrust)
  if (showPred) {
    drawPredictorBranch(predCoast,  '255,255,255', 1.4);
    drawPredictorBranch(predThrust, '255,170,80',  1.8);
  }

  drawFlame();

  // Spacecraft
  var spx = sxw(curState.x, curState.y, simT);
  var spy = syw(curState.x, curState.y, simT);
  var hd  = viewAngle(curState.heading, simT);
  var ndx = Math.cos(hd), ndy = -Math.sin(hd);
  drawSpacecraftShape(spx, spy, ndx, ndy);

  // Nav-ball chevrons (prograde / retrograde)
  if (showNavBall && (curState.vx * curState.vx + curState.vy * curState.vy) > 1e-6) {
    var vL = Math.sqrt(curState.vx * curState.vx + curState.vy * curState.vy);
    var pgAngle = Math.atan2(curState.vy, curState.vx);
    var pgView = viewAngle(pgAngle, simT);
    var pgx = Math.cos(pgView), pgy = -Math.sin(pgView);
    drawChevron(spx + pgx * 22, spy + pgy * 22, 8, vectorToDir(pgx, pgy), '#5cf');
    drawChevron(spx - pgx * 22, spy - pgy * 22, 8, vectorToDir(-pgx, -pgy), '#f55');
  }
}

function vectorToDir(dx, dy) {
  // Chevron dir picks the cardinal direction nearest the vector.
  if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? 'right' : 'left';
  return dy > 0 ? 'down' : 'up';
}

// ── HUD ───────────────────────────────────────────────────────────────────────

function drawGoalBanner() {
  if (!curMission || !curMission.goal) return;
  var alpha = 0.95;
  if (curState.t > 0.04) alpha = 0.35;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 60, W, 28);
  ctx.fillStyle = 'rgba(' + (curMission.trailRGB ? curMission.trailRGB.join(',') : '255,255,255') + ',' + alpha + ')';
  ctx.font = '14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Goal: ' + curMission.goal.hudLabel, W / 2, 74);
}

function drawDvMeter() {
  var barX = 130, barY = 100, barW = W - 260, barH = 14;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(barX, barY, barW, barH);
  var frac = curState.dvBudget / 18;
  if (frac < 0) frac = 0; if (frac > 1) frac = 1;
  var col = frac > 0.30 ? '110,220,140' : frac > 0.10 ? '240,210,90' : '230,90,90';
  ctx.fillStyle = 'rgba(' + col + ',0.9)';
  ctx.fillRect(barX, barY, barW * frac, barH);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#ddd'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var kms = curState.dvBudget * Phys.DU_PER_TU_TO_KMPS;
  ctx.fillText('ΔV  ' + curState.dvBudget.toFixed(1) + ' / 18  (' + kms.toFixed(2) + ' km/s left)', W / 2, barY + barH / 2);

  // Mass-multiplier warning pill
  if (earthMassIdx !== 1 || moonMassIdx !== 2 || thrustIdx !== 2) {
    var pillX = W - 220, pillY = 100, pillW = 200, pillH = 18;
    ctx.fillStyle = 'rgba(255,180,60,0.18)';
    ctx.beginPath(); ctx.roundRect(pillX, pillY, pillW, pillH, 9); ctx.fill();
    ctx.strokeStyle = 'rgba(255,180,60,0.6)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#fec'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Physics modified', pillX + pillW / 2, pillY + pillH / 2);
  }
}

function drawBottomInfo() {
  var oeE = Phys.orbitalElements(curState, Phys.GM_E * EARTH_MASS_STEPS[earthMassIdx], { x: 0, y: 0, vx: 0, vy: 0 });
  var alt_km = (oeE.r - Phys.R_EARTH_DU) * Phys.DU_TO_KM;
  var apo_km = isFinite(oeE.apo)  ? oeE.apo  * Phys.DU_TO_KM : null;
  var per_km =                        oeE.peri * Phys.DU_TO_KM;
  var per_TU = isFinite(oeE.period) ? oeE.period : null;
  var v_kms  = oeE.v * Phys.DU_PER_TU_TO_KMPS;
  var mp = Phys.moonPos(curState.t, curState.moonAngle0);
  var moonD_km = Math.sqrt((curState.x - mp.x) * (curState.x - mp.x) + (curState.y - mp.y) * (curState.y - mp.y)) * Phys.DU_TO_KM;

  var stripY = H - 140;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, stripY, W, 38);
  ctx.fillStyle = '#bcd';
  ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var line1 = 'Alt ' + fmtKm(alt_km) +
              '   Apo ' + (apo_km == null ? 'esc' : fmtKm(apo_km)) +
              '   Peri ' + fmtKm(per_km) +
              '   Period ' + (per_TU == null ? '∞' : per_TU.toFixed(3) + ' TU');
  ctx.fillText(line1, 14, stripY + 12);

  var days = curState.t * Phys.TU_TO_DAYS;
  var line2 = 'T+' + curState.t.toFixed(3) + ' TU (' + days.toFixed(2) + ' d)' +
              '   v ' + v_kms.toFixed(2) + ' km/s' +
              '   Moon dist ' + fmtKm(moonD_km);
  ctx.fillText(line2, 14, stripY + 26);
}
function fmtKm(km) {
  if (Math.abs(km) >= 1e6) return (km / 1e6).toFixed(2) + 'M km';
  if (Math.abs(km) >= 1e3) return Math.round(km / 100) / 10 + 'k km';
  return Math.round(km) + ' km';
}

function drawControlButtons(enabled) {
  // Only drawn in fly / sandbox_fly modes.
  drawRoundBtn(BURN_BTN.cx,  BURN_BTN.cy,  BURN_BTN.r,  'BURN',  thrustFwd > 0, '255,170,80', enabled);
  drawRoundBtn(RETRO_BTN.cx, RETRO_BTN.cy, RETRO_BTN.r, 'RETRO', thrustFwd < 0, '120,180,255', enabled);
  // Chevrons drawn with directional triangles inside circles.
  drawRoundBtn(LEFT_BTN.cx,  LEFT_BTN.cy,  LEFT_BTN.r,  '',  rotDir > 0, '255,255,255', enabled);
  drawChevron(LEFT_BTN.cx, LEFT_BTN.cy, 14, 'left', rotDir > 0 ? '#fff' : 'rgba(255,255,255,0.7)');
  drawRoundBtn(RIGHT_BTN.cx, RIGHT_BTN.cy, RIGHT_BTN.r, '', rotDir < 0, '255,255,255', enabled);
  drawChevron(RIGHT_BTN.cx, RIGHT_BTN.cy, 14, 'right', rotDir < 0 ? '#fff' : 'rgba(255,255,255,0.7)');
}
function drawRoundBtn(cx, cy, r, label, held, glowColor, enabled) {
  var a = enabled ? (held ? 0.65 : 0.32) : 0.1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, PI2);
  ctx.fillStyle = 'rgba(255,255,255,' + (enabled ? (held ? 0.20 : 0.06) : 0.02) + ')';
  ctx.fill();
  ctx.strokeStyle = 'rgba(' + glowColor + ',' + a + ')';
  ctx.lineWidth = held ? 3 : 2; ctx.stroke();
  if (held && enabled) {
    ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, PI2);
    ctx.strokeStyle = 'rgba(' + glowColor + ',0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
  if (label) {
    ctx.fillStyle = enabled ? ('rgba(' + glowColor + ',' + (held ? 1 : 0.9) + ')') : 'rgba(255,255,255,0.25)';
    ctx.font = 'bold ' + Math.round(r * 0.34) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, cy);
  }
}
function drawBox(x, y, w, h, fill, stroke) {
  ctx.fillStyle = fill;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 10); ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke();
}

function drawBurnAnnounce() {
  if (burnAnnounceT > 0 && burnAnnounce) {
    ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var alpha = Math.min(1, burnAnnounceT / 1.5);
    ctx.fillStyle = 'rgba(255,210,80,' + alpha.toFixed(2) + ')';
    ctx.fillText(burnAnnounce, W / 2, 160);
  }
}
function drawNarration() {
  if (narrationT > 0 && narration) {
    var pad = 14, maxW = W - 80, alpha = Math.min(1, narrationT / 1.2);
    ctx.font = '14px sans-serif';
    var lines = wrapText(narration, maxW - 2 * pad);
    var th = lines.length * 18 + 2 * pad;
    var bx = 40, by = H - 230 - th, bw = maxW, bh = th;
    ctx.fillStyle = 'rgba(0,0,0,' + (0.7 * alpha).toFixed(2) + ')';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.3 * alpha).toFixed(2) + ')'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    for (var i = 0; i < lines.length; i++) ctx.fillText(lines[i], bx + pad, by + pad + i * 18);
  }
}
function wrapText(s, maxW) {
  var words = s.split(' ');
  var lines = [], line = '';
  for (var i = 0; i < words.length; i++) {
    var trial = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(trial).width > maxW && line) { lines.push(line); line = words[i]; }
    else line = trial;
  }
  if (line) lines.push(line);
  return lines;
}

function drawAchToast() {
  if (achToastT > 0 && achToast) {
    var alpha = Math.min(1, achToastT / 1.5);
    ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var w = ctx.measureText(achToast).width + 32;
    var x = (W - w) / 2, y = 200;
    ctx.fillStyle = 'rgba(0,0,0,' + (0.7 * alpha).toFixed(2) + ')';
    ctx.beginPath(); ctx.roundRect(x, y, w, 32, 16); ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,80,' + (0.8 * alpha).toFixed(2) + ')'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(255,220,120,' + alpha.toFixed(2) + ')';
    ctx.fillText(achToast, W / 2, y + 16);
  }
}

// ── Phase-specific overlays ──────────────────────────────────────────────────
function drawSelect() {
  clear();
  // Title
  ctx.fillStyle = '#fff'; ctx.font = 'bold 34px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Orbital Mechanics', W / 2, 30);
  ctx.fillStyle = '#9ab'; ctx.font = '15px sans-serif';
  ctx.fillText('Real three-body physics. Watch a maneuver, then fly it yourself.', W / 2, 76);

  // Mission cards
  for (var i = 0; i < MISSIONS.length; i++) {
    var c = missionCardRect(i);
    var m = MISSIONS[i];
    var stars = missionStars[m.id] || 0;
    var hover = hitRect(c.x, c.y, c.w, c.h);
    ctx.fillStyle = hover ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(c.x, c.y, c.w, c.h, 10); ctx.fill();
    ctx.strokeStyle = m.color || 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5; ctx.stroke();
    // Difficulty badge
    var diff = m.difficulty || 1;
    ctx.fillStyle = m.color || '#bbb';
    ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    var diffText = ''; for (var dd = 0; dd < diff; dd++) diffText += '◆';   // diamond
    ctx.fillText(diffText, c.x + 12, c.y + 10);
    // Stars
    ctx.fillStyle = stars > 0 ? '#fc6' : 'rgba(255,255,255,0.18)';
    ctx.textAlign = 'right'; ctx.font = '14px sans-serif';
    var st = '';
    for (var s = 0; s < 3; s++) st += (s < stars ? '★' : '☆');
    ctx.fillText(st, c.x + c.w - 12, c.y + 10);
    // Title
    ctx.fillStyle = m.color || '#fff';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText(m.name, c.x + 12, c.y + 28);
    // Blurb
    ctx.fillStyle = '#bbc'; ctx.font = '12px sans-serif';
    var blurbLines = wrapText(m.blurb, c.w - 24);
    for (var bi = 0; bi < Math.min(blurbLines.length, 2); bi++) {
      ctx.fillText(blurbLines[bi], c.x + 12, c.y + 52 + bi * 16);
    }
  }
  // Sandbox tile
  var sb = sandboxCardRect();
  var sbHover = hitRect(sb.x, sb.y, sb.w, sb.h);
  ctx.fillStyle = sbHover ? 'rgba(220,160,255,0.16)' : 'rgba(220,160,255,0.06)';
  ctx.beginPath(); ctx.roundRect(sb.x, sb.y, sb.w, sb.h, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(220,170,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#dac3ff'; ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Sandbox — free play', sb.x + sb.w / 2, sb.y + 20);
  ctx.fillStyle = '#bbc'; ctx.font = '12px sans-serif';
  ctx.fillText('Tap to place, drag to set velocity. All physics knobs unlocked.', sb.x + sb.w / 2, sb.y + 46);
}

function drawBrief() {
  // Underlying play world as a faint backdrop.
  clear();
  // Card overlay
  var bw = 600, bh = 470, bx = (W - bw) / 2, by = (H - bh) / 2;
  ctx.fillStyle = 'rgba(20,20,30,0.95)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();
  ctx.strokeStyle = curMission.color; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = curMission.color; ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(curMission.name, W / 2, by + 28);

  ctx.fillStyle = '#bbc'; ctx.font = '14px sans-serif';
  var blurb = wrapText(curMission.blurb, bw - 60);
  for (var i = 0; i < blurb.length; i++) ctx.fillText(blurb[i], W / 2, by + 70 + i * 20);

  ctx.fillStyle = '#aab'; ctx.font = '13px sans-serif';
  ctx.fillText('Teaches: ' + curMission.teaches, W / 2, by + 130);

  ctx.fillStyle = '#fec'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left';
  var storyLines = wrapText(curMission.story || '', bw - 100);
  for (var sli = 0; sli < storyLines.length; sli++) {
    ctx.fillText(storyLines[sli], bx + 50, by + 180 + sli * 22);
  }

  ctx.fillStyle = '#ddd'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Goal', W / 2, by + 280);
  ctx.fillStyle = '#bcd'; ctx.font = '13px sans-serif';
  var goalLines = wrapText(curMission.goal.hudLabel, bw - 80);
  for (var gli = 0; gli < goalLines.length; gli++) ctx.fillText(goalLines[gli], W / 2, by + 304 + gli * 18);

  // Buttons
  var btnY = by + bh - 80;
  DEMO_BTN = { x: bx + 60,           y: btnY, w: (bw - 140) / 2, h: 54 };
  FLY_BTN  = { x: bx + 60 + DEMO_BTN.w + 20, y: btnY, w: (bw - 140) / 2, h: 54 };
  drawActionBtn(DEMO_BTN, 'WATCH DEMO',   'See it solved', '#9cf');
  drawActionBtn(FLY_BTN,  'FLY IT',       'Take the controls', curMission.color);
  // Back button at top-left
  drawTopBarBackOnly();
}
function drawTopBarBackOnly() {
  drawBox(BACK_BTN.x, BACK_BTN.y, BACK_BTN.w, BACK_BTN.h, 'rgba(255,255,255,0.10)', 'rgba(255,255,255,0.5)');
  ctx.fillStyle = '#ddd'; ctx.font = '15px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  drawChevron(BACK_BTN.x + 16, BACK_BTN.y + BACK_BTN.h / 2, 8, 'left', '#ddd');
  ctx.fillText('Back', BACK_BTN.x + 32, BACK_BTN.y + BACK_BTN.h / 2);
}
function drawActionBtn(btn, label, sub, color) {
  var hover = hitRect(btn.x, btn.y, btn.w, btn.h);
  ctx.fillStyle = hover ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 10); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = color; ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, btn.x + btn.w / 2, btn.y + btn.h / 2 - 8);
  ctx.fillStyle = '#bbc'; ctx.font = '12px sans-serif';
  ctx.fillText(sub, btn.x + btn.w / 2, btn.y + btn.h / 2 + 14);
}

function drawWon() {
  // Underlying world stays visible behind a dim wash.
  ctx.fillStyle = 'rgba(0,30,10,0.55)';
  ctx.fillRect(0, 0, W, H);
  var bw = 520, bh = 320, bx = (W - bw) / 2, by = (H - bh) / 2;
  ctx.fillStyle = 'rgba(8,30,18,0.96)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();
  ctx.strokeStyle = '#9f7'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#cfa'; ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Mission Complete', W / 2, by + 28);

  ctx.fillStyle = '#ddd'; ctx.font = '15px sans-serif';
  var used = (curMission.start.dvBudget - curState.dvBudget);
  ctx.fillText('ΔV used: ' + used.toFixed(2) + ' DU/TU  (' + (used * Phys.DU_PER_TU_TO_KMPS).toFixed(2) + ' km/s)', W / 2, by + 80);
  ctx.fillText('Time: ' + (curState.t * Phys.TU_TO_DAYS).toFixed(2) + ' days', W / 2, by + 104);

  var stars = missionStars[curMission.id] || 0;
  ctx.fillStyle = '#fc6'; ctx.font = '36px sans-serif';
  var sb = ''; for (var i = 0; i < 3; i++) sb += (i < stars ? '★ ' : '☆ ');
  ctx.fillText(sb.trim(), W / 2, by + 140);

  var btnY = by + bh - 80; var bw3 = (bw - 100) / 3;
  REPLAY_BTN = { x: bx + 30,                    y: btnY, w: bw3, h: 50 };
  NEXT_BTN   = { x: bx + 30 + bw3 + 20,         y: btnY, w: bw3, h: 50 };
  MENU_BTN   = { x: bx + 30 + (bw3 + 20) * 2,   y: btnY, w: bw3, h: 50 };
  drawActionBtn(REPLAY_BTN, 'REPLAY',  '', '#fff');
  drawActionBtn(NEXT_BTN,   'NEXT',    '', '#9f7');
  drawActionBtn(MENU_BTN,   'MENU',    '', '#aab');
}
function drawFailed() {
  ctx.fillStyle = 'rgba(50,10,10,0.55)';
  ctx.fillRect(0, 0, W, H);
  var bw = 520, bh = 280, bx = (W - bw) / 2, by = (H - bh) / 2;
  ctx.fillStyle = 'rgba(30,12,12,0.96)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();
  ctx.strokeStyle = '#f88'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fcc'; ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Mission Failed', W / 2, by + 28);
  ctx.fillStyle = '#fbb'; ctx.font = '14px sans-serif';
  var rlines = wrapText(goalReason || '', bw - 60);
  for (var i = 0; i < rlines.length; i++) ctx.fillText(rlines[i], W / 2, by + 90 + i * 20);
  var btnY = by + bh - 80; var bw2 = (bw - 80) / 2;
  REPLAY_BTN = { x: bx + 30,                y: btnY, w: bw2, h: 50 };
  MENU_BTN   = { x: bx + 30 + bw2 + 20,     y: btnY, w: bw2, h: 50 };
  drawActionBtn(REPLAY_BTN, 'REPLAY',  '', '#fff');
  drawActionBtn(MENU_BTN,   'MENU',    '', '#aab');
}

function drawDemoOverlay() {
  // Stop / Try-It button row
  STOP_BTN  = { x: 20,         y: H - 80, w: 200, h: 56 };
  TRYIT_BTN = { x: W - 280,    y: H - 80, w: 260, h: 56 };
  drawActionBtn(STOP_BTN, 'STOP DEMO', '', '#aab');
  if (demoProgram && demoProgram.done()) {
    drawActionBtn(TRYIT_BTN, 'TRY IT YOURSELF', '', curMission.color);
  }
}

function drawSandboxPlaceOverlay() {
  // Title strip + instructions
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 60, W, 30);
  ctx.fillStyle = '#dac3ff'; ctx.font = '14px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var msg = !placeHasPos ? 'Tap anywhere outside Earth to place the spacecraft.' :
            !placeHasVel ? 'Drag from the spacecraft to set initial velocity.' :
                            'Ready to launch. Or tap elsewhere to reposition.';
  ctx.fillText(msg, W / 2, 75);

  // Draw the placed spacecraft + velocity arrow
  if (placeHasPos) {
    var spx = sxw(curState.x, curState.y, 0), spy = syw(curState.x, curState.y, 0);
    ctx.beginPath(); ctx.arc(spx, spy, 8, 0, PI2);
    ctx.fillStyle = '#fff'; ctx.fill();
    if (placeHasVel) {
      var endX = spx + curState.vx / PLACE_VEL_SCALE;
      var endY = spy - curState.vy / PLACE_VEL_SCALE;
      ctx.beginPath();
      ctx.moveTo(spx, spy); ctx.lineTo(endX, endY);
      ctx.strokeStyle = '#dac3ff'; ctx.lineWidth = 2; ctx.stroke();
      drawChevron(endX, endY, 9, vectorToDir(curState.vx, curState.vy), '#dac3ff');
    }
  }

  // Launch button (only when both pos and vel set)
  if (placeHasPos && placeHasVel) {
    drawActionBtn(LAUNCH_BTN, 'LAUNCH', '', '#dac3ff');
  }
}

function drawOptsPanel() {
  var panelX = 60, panelY = 80, panelW = W - 120, panelH = H - 160;
  ctx.fillStyle = 'rgba(10,10,18,0.95)';
  ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Options', panelX + 18, panelY + 28);
  // Close X
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '22px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('×', panelX + panelW - 22, panelY + 30);

  var ry = panelY + 60;
  var rowH = 56;
  drawToggleRow(panelX, ry, panelW, 'Trajectory predictor', showPred);   ry += rowH;
  drawToggleRow(panelX, ry, panelW, 'Ghost trail (in FLY)', showGhost);  ry += rowH;
  drawToggleRow(panelX, ry, panelW, 'Nav-ball markers',     showNavBall); ry += rowH;
  drawToggleRow(panelX, ry, panelW, 'Auto-orient autopilot', autoOrient); ry += rowH;
  drawChipRow(panelX, ry, panelW, 'Earth mass',   EARTH_MASS_STEPS, earthMassIdx, function (v) { return v.toFixed(1) + '×'; }); ry += rowH;
  drawChipRow(panelX, ry, panelW, 'Moon mass',    MOON_MASS_STEPS,  moonMassIdx,  function (v) { return v.toFixed(1) + '×'; }); ry += rowH;
  drawChipRow(panelX, ry, panelW, 'Thrust',       THRUST_STEPS,     thrustIdx,    function (v) { return v.toFixed(1) + '×'; }); ry += rowH;
  drawSkinRow(panelX, ry, panelW); ry += rowH;
  drawZoomRow(panelX, ry, panelW);
}
function drawToggleRow(panelX, ry, panelW, label, value) {
  ctx.fillStyle = '#ddd'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, panelX + 20, ry + 18);
  var bx = panelX + panelW - 100;
  ctx.fillStyle = value ? 'rgba(120,200,140,0.25)' : 'rgba(255,120,120,0.15)';
  ctx.beginPath(); ctx.roundRect(bx, ry, 80, 36, 8); ctx.fill();
  ctx.strokeStyle = value ? '#7d7' : '#d77'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = value ? '#bfb' : '#fbb';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(value ? 'ON' : 'OFF', bx + 40, ry + 18);
}
function drawChipRow(panelX, ry, panelW, label, steps, currentIdx, fmt) {
  ctx.fillStyle = '#ddd'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, panelX + 20, ry + 18);
  var n = steps.length;
  var avail = 220;
  var chipW = (avail - (n - 1) * 6) / n;
  var startX = panelX + panelW - avail - 10;
  for (var i = 0; i < n; i++) {
    var cx = startX + i * (chipW + 6);
    var sel = i === currentIdx;
    ctx.fillStyle = sel ? 'rgba(120,180,255,0.3)' : 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(cx, ry, chipW, 36, 6); ctx.fill();
    ctx.strokeStyle = sel ? '#7af' : 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = sel ? '#cdf' : '#bbb'; ctx.font = '12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(fmt(steps[i]), cx + chipW / 2, ry + 18);
  }
}
function drawSkinRow(panelX, ry, panelW) {
  ctx.fillStyle = '#ddd'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Spacecraft', panelX + 20, ry + 18);
  var labels = ['Capsule', 'Saturn V', 'Duck Dieb', 'Samster'];
  var bx = panelX + panelW - 100;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(bx, ry, 80, 36, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#cdf'; ctx.font = '12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(labels[skinIdx], bx + 40, ry + 18);
}
function drawZoomRow(panelX, ry, panelW) {
  ctx.fillStyle = '#ddd'; ctx.font = '14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Zoom: ' + ZOOM_LEVELS[zoomIdx] + ' px/DU', panelX + 20, ry + 18);
  var bxA = panelX + panelW - 220, bxB = panelX + panelW - 100;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(bxA, ry, 60, 36, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.stroke();
  drawChevron(bxA + 30, ry + 18, 9, 'up', '#cdf');
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(bxB, ry, 60, 36, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.stroke();
  drawChevron(bxB + 30, ry + 18, 9, 'down', '#cdf');
}

// ── Master draw + update dispatch ────────────────────────────────────────────
function drawHUD(showControls) {
  drawTopBar();
  drawGoalBanner();
  drawDvMeter();
  drawBottomInfo();
  if (showControls) drawControlButtons(curState.dvBudget > 0);
  drawBurnAnnounce();
  drawNarration();
  drawAchToast();
  if (showOpts) drawOptsPanel();
  if (paused) {
    ctx.fillStyle = 'rgba(255,200,80,0.9)'; ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', W / 2, 130);
  }
}

function update(elapsed) {
  // Decay timers (real-time)
  if (burnAnnounceT > 0) burnAnnounceT -= elapsed;
  if (narrationT    > 0) narrationT    -= elapsed;
  if (achToastT     > 0) achToastT     -= elapsed;
  updateFlame(elapsed);

  switch (phase) {
    case 'select':         updateSelect();              break;
    case 'brief':          updateBrief();               break;
    case 'demo':           updateDemo(elapsed);         break;
    case 'fly':            updateFly(elapsed);          break;
    case 'won':            updateWon(elapsed);          break;
    case 'failed':         updateFailed(elapsed);       break;
    case 'sandbox_place':  updateSandboxPlace();        break;
    case 'sandbox_fly':    updateSandboxFly(elapsed);   break;
  }
  // Pointer edges reset
  pointerJust = false;
  pointerUpEd = false;
}

function render() {
  switch (phase) {
    case 'select':
      drawSelect();
      break;
    case 'brief':
      drawWorldForBrief();
      drawBrief();
      break;
    case 'demo':
      clear(); drawWorld(); drawHUD(false); drawDemoOverlay();
      break;
    case 'fly':
      clear(); drawWorld(); drawHUD(true);
      break;
    case 'won':
      clear(); drawWorld(); drawWon();
      break;
    case 'failed':
      clear(); drawWorld(); drawFailed();
      break;
    case 'sandbox_place':
      clear(); drawWorld(); drawTopBar(); drawSandboxPlaceOverlay();
      break;
    case 'sandbox_fly':
      clear(); drawWorld(); drawHUD(true);
      break;
  }
}
function drawWorldForBrief() {
  clear();
  // Show a hint of the world geometry behind the brief overlay
  curState.x = curMission.start.x; curState.y = curMission.start.y;
  curState.vx = curMission.start.vx; curState.vy = curMission.start.vy;
  curState.t = 0; curState.moonAngle0 = curMission.start.moonAngle0;
  drawWorld();
}

// ── Game loop ────────────────────────────────────────────────────────────────
var lastTs = 0;
function loop(ts) {
  var elapsed = Math.min((ts - lastTs) / 1000, 0.1);
  if (lastTs === 0) elapsed = 1 / 60;
  lastTs = ts;

  update(elapsed);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Initial pointer reset
pointerDown = false; pointerJust = false; pointerUpEd = false;

}());
</script>
