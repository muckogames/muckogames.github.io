<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Duck Dieb 2 🦆</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%F0%9F%A6%86%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a120a;overflow:hidden;touch-action:none;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
}
#stage{
  position:absolute;
  width:800px;height:560px;
  overflow:hidden;
  transform-origin:0 0;
  border:3px solid #3a5a2a;border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  background:#111;
}
#stage canvas{
  position:absolute;left:0;top:0;
  width:800px;height:560px;
  display:block;
}
#bgc{pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="gc"></canvas>
</div>
<script src="../mucko-engine.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════
   DUCK DIEB 2  —  Second Edition
   Checkpoint 0: skeleton (title → play → gameover, walk in empty room)
   ════════════════════════════════════════════════════════ */

// Polyfill ctx.roundRect for Safari < 15.4
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);    this.quadraticCurveTo(x + w, y,     x + w, y + r);
    this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);    this.quadraticCurveTo(x,     y + h, x,     y + h - r);
    this.lineTo(x, y + r);        this.quadraticCurveTo(x,     y,     x + r, y);
    this.closePath();
  };
}

var W = 800, H = 560, TAU = Math.PI * 2;
var MAX_RENDER_DPR = 1.5;

// ── Dual-canvas setup with DPR cap ───────────────────────────────────────────
var stage = document.getElementById('stage');
var bgcEl = document.getElementById('bgc');
var gcEl  = document.getElementById('gc');
var bgctx = bgcEl.getContext('2d');
var ctx   = gcEl.getContext('2d');

function applyDPR() {
  var DPR = Math.min(window.devicePixelRatio || 1, MAX_RENDER_DPR);
  [bgcEl, gcEl].forEach(function(c) {
    c.width  = W * DPR;
    c.height = H * DPR;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    var cc = c.getContext('2d');
    cc.setTransform(1, 0, 0, 1, 0, 0);
    cc.scale(DPR, DPR);
  });
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  clearBackdropCache();
}

function viewW() { var vv = window.visualViewport; return vv ? vv.width  : window.innerWidth;  }
function viewH() { var vv = window.visualViewport; return vv ? vv.height : window.innerHeight; }

function resize() {
  var vw = viewW(), vh = viewH();
  var s = Math.min(vw / W, vh / H);
  stage.style.transform = 'scale(' + s + ')';
  stage.style.left = Math.round((vw - W * s) / 2) + 'px';
  stage.style.top  = Math.round((vh - H * s) / 2) + 'px';
}
window.addEventListener('resize', function(){ applyDPR(); resize(); });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}
applyDPR();
resize();

// ── Backdrop cache (dual-canvas pattern) ─────────────────────────────────────
var backdropCache = {};
function clearBackdropCache() { backdropCache = {}; }
function drawCachedBackdrop(key, drawFn) {
  if (!backdropCache[key]) {
    var DPR = Math.min(window.devicePixelRatio || 1, MAX_RENDER_DPR);
    var off = document.createElement('canvas');
    off.width = W * DPR; off.height = H * DPR;
    var octx = off.getContext('2d');
    octx.scale(DPR, DPR);
    drawFn(octx);
    backdropCache[key] = off;
  }
  bgctx.clearRect(0, 0, W, H);
  bgctx.drawImage(backdropCache[key], 0, 0, W, H);
}

// ── Input via engine ─────────────────────────────────────────────────────────
var input = MuckoEngine.makeInput();
var K = input.K, JP = input.JP, eat = input.eat;
function eatAction() { return eat('KeyE') || eat('Space') || eat('Enter'); }

var TOUCH_UI = MuckoEngine.TOUCH_UI();

// ── Touch controls: larger D-pad (r=72) + action button (r=54) ───────────────
var touchDirs = { up:false, down:false, left:false, right:false };
var touchActionFired = false;

// Positions (in canvas coords)
var DPAD_CX = 108, DPAD_CY = H - 108, DPAD_R = 72;
var ACT_CX  = W - 88, ACT_CY = H - 108, ACT_R = 54;

var mx = W / 2, my = H / 2, mclk = false;

function inMovablePhase() {
  return phase === 'house' || phase === 'alley' || phase === 'chase'
      || phase === 'jail' || phase === 'safedial';
}

function getDpadDir(px, py) {
  var dx = px - DPAD_CX, dy = py - DPAD_CY;
  var d = Math.sqrt(dx*dx + dy*dy);
  if (d < 14 || d > DPAD_R * 2.4) return null;
  if (Math.abs(dx) >= Math.abs(dy)) return dx < 0 ? 'left' : 'right';
  return dy < 0 ? 'up' : 'down';
}

function syncTouch(e) {
  if (!inMovablePhase()) {
    touchDirs = { up:false, down:false, left:false, right:false };
    return;
  }
  var r = gcEl.getBoundingClientRect();
  var sx = W / r.width, sy = H / r.height;
  var dirs = { up:false, down:false, left:false, right:false };
  var actHit = false;
  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    var px = (t.clientX - r.left) * sx;
    var py = (t.clientY - r.top)  * sy;
    var dir = getDpadDir(px, py);
    if (dir) dirs[dir] = true;
    var adx = px - ACT_CX, ady = py - ACT_CY;
    if (Math.sqrt(adx*adx + ady*ady) < ACT_R * 1.2) actHit = true;
  }
  touchDirs = dirs;
  if (actHit && !touchActionFired) { JP.KeyE = true; touchActionFired = true; }
  if (!actHit) touchActionFired = false;
}

gcEl.addEventListener('touchstart', function(e) {
  if (e.changedTouches.length) {
    var r = gcEl.getBoundingClientRect();
    mx = (e.changedTouches[0].clientX - r.left) * (W / r.width);
    my = (e.changedTouches[0].clientY - r.top)  * (H / r.height);
    mclk = true;
  }
  syncTouch(e); e.preventDefault();
}, { passive:false });
gcEl.addEventListener('touchmove',   function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
gcEl.addEventListener('touchend',    function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
gcEl.addEventListener('touchcancel', function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
window.addEventListener('blur', function() {
  touchDirs = { up:false, down:false, left:false, right:false };
});

gcEl.addEventListener('mousemove', function(e) {
  var r = gcEl.getBoundingClientRect();
  mx = (e.clientX - r.left) * (W / r.width);
  my = (e.clientY - r.top)  * (H / r.height);
});
gcEl.addEventListener('click', function(e) {
  var r = gcEl.getBoundingClientRect();
  mx = (e.clientX - r.left) * (W / r.width);
  my = (e.clientY - r.top)  * (H / r.height);
  mclk = true;
});

function isUp()    { return K.ArrowUp    || K.KeyW || touchDirs.up; }
function isDown()  { return K.ArrowDown  || K.KeyS || touchDirs.down; }
function isLeft()  { return K.ArrowLeft  || K.KeyA || touchDirs.left; }
function isRight() { return K.ArrowRight || K.KeyD || touchDirs.right; }

// ── Game state ───────────────────────────────────────────────────────────────
var phase = 'title';
var LOW_FPS_PHASES = { title:1, victory:1, highscores:1, keypad:1, caught:1 };

var player = { x: 0, y: 0, facing: 'up', sprinting: false };

// Run-level state
var MAX_ENERGY = 300;
var energy = MAX_ENERGY;
var jailCount = 0;
var runStartMs = 0;
var easyMode = false;
var hsStore = MuckoEngine.makeStore('mucko_hs_duckdieb2');

function setPhase(p) { phase = p; }
function enterHousePhase() {
  // Place player on the back door tile
  var dcol = 9, drow = 12;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    if (MAP[r][c] === T_DOOR) { dcol = c; drow = r; }
  }
  player.x = dcol * TILE + TILE/2;
  player.y = drow * TILE + TILE/2;
  player.facing = 'up';
  player.sprinting = false;
  resetStealth();
  setPhase('house');
}
function startGame() {
  energy = MAX_ENERGY;
  jailCount = 0;
  runStartMs = (typeof performance !== 'undefined') ? performance.now() : Date.now();
  resetAlley();
  setPhase('alley');
}

// ── Draw helpers ─────────────────────────────────────────────────────────────
function rect(x, y, w, h, fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
function circ(x, y, r, fill, stroke, sw) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
}
function ell(x, y, rx, ry, fill) {
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, TAU);
  ctx.fillStyle = fill; ctx.fill();
}
function rndRect(x, y, w, h, r, fill, stroke, sw) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r || 0);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
}
function txt(s, x, y, col, size, align, font) {
  ctx.fillStyle = col || '#fff';
  ctx.font = font || ('bold ' + (size || 14) + 'px Georgia,serif');
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(s, x, y);
}

// ── Duck sprite (ported from duckdieb/index.html:565-611) ────────────────────
function drawDuck(x, y, facing) {
  ctx.save();
  ctx.translate(x, y);

  ctx.globalAlpha = 0.18;
  ell(3, 6, 14, 8, '#000');
  ctx.globalAlpha = 1;

  ell(0, 2, 13, 9, '#8b6030');
  ell(0, 3, 10, 6, '#7a5020');

  var hx = 0, hy = 0;
  if (facing === 'up')    hy = -14;
  else if (facing === 'down')  hy = 14;
  else if (facing === 'left')  hx = -14;
  else                         hx = 14;

  circ(hx, hy, 8, '#2a7a38');
  ctx.fillStyle = 'rgba(0,200,160,0.28)';
  ctx.beginPath(); ctx.arc(hx - 2, hy - 2, 4, 0, TAU); ctx.fill();

  ctx.fillStyle = '#111';
  ctx.fillRect(hx - 7, hy - 5, 14, 5);
  circ(hx - 3, hy - 2, 1.5, '#fff');
  circ(hx + 3, hy - 2, 1.5, '#fff');

  ctx.fillStyle = '#e8b800';
  if (facing === 'up') {
    ctx.beginPath(); ctx.ellipse(hx, hy - 10, 3, 4, 0, 0, TAU); ctx.fill();
  } else if (facing === 'down') {
    ctx.beginPath(); ctx.ellipse(hx, hy + 10, 3, 4, 0, 0, TAU); ctx.fill();
  } else if (facing === 'left') {
    ctx.beginPath(); ctx.ellipse(hx - 10, hy, 4, 3, 0, 0, TAU); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(hx + 10, hy, 4, 3, 0, 0, TAU); ctx.fill();
  }

  ctx.restore();
}

// ── Mobile controls (larger, context-aware, with sublabels) ──────────────────
function drawMobileControls() {
  if (!TOUCH_UI || !inMovablePhase()) return;
  ctx.save();
  ctx.globalAlpha = 0.55;

  // D-pad base
  circ(DPAD_CX, DPAD_CY, DPAD_R + 10, '#111');
  circ(DPAD_CX, DPAD_CY, DPAD_R, '#1a1a28', '#555', 2);

  var arm = DPAD_R - 14;
  var dirs = [
    { lbl:'\u25B2', dx:0,    dy:-arm, k:'up'    },
    { lbl:'\u25BC', dx:0,    dy: arm, k:'down'  },
    { lbl:'\u25C4', dx:-arm, dy:0,    k:'left'  },
    { lbl:'\u25BA', dx: arm, dy:0,    k:'right' },
  ];
  for (var i = 0; i < dirs.length; i++) {
    var d = dirs[i];
    var active = touchDirs[d.k];
    rndRect(DPAD_CX + d.dx - 22, DPAD_CY + d.dy - 22, 44, 44, 8,
            active ? '#5a8a5a' : '#2a2a2a', '#666', 1.5);
    txt(d.lbl, DPAD_CX + d.dx, DPAD_CY + d.dy + 7, active ? '#fff' : '#aaa', 20, 'center');
  }

  // Action button
  circ(ACT_CX, ACT_CY, ACT_R + 6, '#111');
  circ(ACT_CX, ACT_CY, ACT_R, touchActionFired ? '#6a9a3a' : '#2a4a2a', '#5a8a4a', 2);
  txt('E', ACT_CX, ACT_CY + 8, '#fff', 26, 'center', 'bold monospace');
  // Sublabel
  ctx.globalAlpha = 0.75;
  txt('action', ACT_CX, ACT_CY + ACT_R + 18, '#cde', 11, 'center', 'bold monospace');

  ctx.restore();
}

// ── Tilemap (20×14 @ 40px) — template-based ──────────────────────────────────
// # wall  . floor  C creak  R rug  P paper  K keypad  L loot  V vault-gate  D door
var TILE = 40;
var COLS = 20, ROWS = 14;
var T_FLOOR=0, T_WALL=1, T_CREAK=2, T_RUG=3, T_PAPER=4, T_KEYPAD=5, T_LOOT=6, T_VAULT=7, T_DOOR=8;
var TILE_FROM_CHAR = { '#':T_WALL, '.':T_FLOOR, 'C':T_CREAK, 'R':T_RUG,
                       'P':T_PAPER, 'K':T_KEYPAD, 'L':T_LOOT, 'V':T_VAULT, 'D':T_DOOR };

// Patrol helper: list of [col,row] → waypoints at tile centers.
function P(list) {
  var pts = [];
  for (var i = 0; i < list.length; i++) {
    pts.push({ x: list[i][0] * TILE + TILE/2, y: list[i][1] * TILE + TILE/2 });
  }
  return pts;
}

var ROOM_TEMPLATES = [
  {
    id: 'living',
    name: 'the living room',
    rows: [
      '####################',
      '#..................#',
      '#....CCCC..........#',
      '#...........P......#',
      '#..................#',
      '#......######......#',
      '#......#..L.#......#',
      '#......#....#......#',
      '#......#....#......#',
      '#......###V##......#',
      '#........K.........#',
      '#.....RRRRR........#',
      '#........D.........#',
      '####################'
    ],
    patrols: [
      { kind: 'perimeter', pts: P([[17,2],[17,11],[2,11],[2,2]]) },
      { kind: 'inner',     pts: P([[4,3],[4,10],[15,10],[15,3]]) },
      { kind: 'creak',     pts: P([[5,2],[10,2]]) },
    ],
  },
  {
    id: 'loft',
    name: 'the open loft',
    rows: [
      '####################',
      '#..................#',
      '#.CCC..............#',
      '#..........P.......#',
      '#..................#',
      '#...........######.#',
      '#...........#..L.#.#',
      '#...........#....#.#',
      '#...........##V###.#',
      '#..................#',
      '#...RRRR..K........#',
      '#..................#',
      '#.........D........#',
      '####################'
    ],
    patrols: [
      { kind: 'perimeter', pts: P([[17,2],[17,4],[2,4],[2,2]]) },
      { kind: 'inner',     pts: P([[18,11],[18,9],[2,9],[2,11]]) },
      { kind: 'vault',     pts: P([[13,10],[17,10]]) },
    ],
  },
  {
    id: 'gallery',
    name: 'the gallery',
    rows: [
      '####################',
      '#..................#',
      '#.........CCC......#',
      '#..................#',
      '#..P........######.#',
      '#............#.L.#.#',
      '#............#...#.#',
      '#............##V##.#',
      '#..................#',
      '#.RRRRR..K.........#',
      '#..................#',
      '#..................#',
      '#.......D..........#',
      '####################'
    ],
    patrols: [
      { kind: 'perimeter', pts: P([[17,2],[17,11],[2,11],[2,2]]) },
      { kind: 'inner',     pts: P([[4,3],[11,3],[11,9],[4,9]]) },
      { kind: 'vault',     pts: P([[10,4],[10,10]]) },
    ],
  },
];

var currentTemplate = ROOM_TEMPLATES[0];
var MAP_ROWS = currentTemplate.rows;
var MAP = [];
function rebuildMap() {
  MAP = [];
  for (var r = 0; r < ROWS; r++) {
    var row = [];
    for (var c = 0; c < COLS; c++) row.push(TILE_FROM_CHAR[MAP_ROWS[r][c]]);
    MAP.push(row);
  }
}
function pickTemplate() {
  currentTemplate = ROOM_TEMPLATES[Math.floor(Math.random() * ROOM_TEMPLATES.length)];
  MAP_ROWS = currentTemplate.rows;
  rebuildMap();
}
rebuildMap();
function tileAt(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return T_WALL;
  return MAP[row][col];
}
function tileAtPx(px, py) { return tileAt(Math.floor(px / TILE), Math.floor(py / TILE)); }
function isBlocking(t) {
  if (t === T_WALL) return true;
  if (t === T_VAULT && !vaultOpen) return true;
  return false;
}
function isWalkablePx(px, py) { return !isBlocking(tileAtPx(px, py)); }

// Line-of-sight: step along the segment, stop at first blocking tile
function lineBlocked(x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var d = Math.sqrt(dx*dx + dy*dy);
  var steps = Math.ceil(d / 8);
  for (var i = 1; i <= steps; i++) {
    var t = i / steps;
    if (isBlocking(tileAtPx(x1 + dx*t, y1 + dy*t))) return true;
  }
  return false;
}

// ── Stealth state ────────────────────────────────────────────────────────────
var vaultOpen = false, hasLoot = false, knowsCode = false;
var CODE = '';           // 4-digit numeric, rolled each run
var paperFlash = 0;      // brief flash when player reads paper
var lootGlow = 0;        // pulsing glow timer
var noise = 0;           // 0–100
var noiseRate = 1.0;     // difficulty tuning

var GUARD_NAMES = ['Officer Pflueger', 'Officer Malin', 'Officer Hickock', 'Officer Lekan'];
var guards = [];

function makeGuard(patrol, name) {
  return {
    x: patrol.pts[0].x, y: patrol.pts[0].y,
    pts: patrol.pts,
    kind: patrol.kind,
    ptIdx: 1 % patrol.pts.length,
    spd: 55,
    facing: 0,               // radians; 0 = +X (right)
    visionRange: 150,
    visionAngle: Math.PI / 2.5,  // ~72°
    suspicion: 0,           // 0–100
    alert: 'calm',          // 'calm' | 'suspicious' | 'alerted'
    name: name,
  };
}

// Capture record for post-mortem
var captureEvent = null; // { distPx, playerNoise, wasSprinting, tileName, guardName, guardFacing }

function resetStealth() {
  vaultOpen = false; hasLoot = false; knowsCode = false;
  noise = 0; paperFlash = 0; lootGlow = 0;
  captureEvent = null;
  pickTemplate();
  // Roll a numeric code (2 digits on easy, 4 on normal)
  if (easyMode) {
    CODE = ('' + Math.floor(10 + Math.random() * 90));
  } else {
    CODE = ('' + Math.floor(1000 + Math.random() * 9000));
  }
  noiseRate = easyMode ? 0.65 : 1.0;
  // Spawn guards: pick N distinct patrols from the template
  var available = currentTemplate.patrols.slice();
  // Shuffle
  for (var i = available.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = available[i]; available[i] = available[j]; available[j] = t;
  }
  var n = easyMode ? 1 : Math.min(available.length, 2 + Math.floor(Math.random() * 2));
  guards = [];
  for (var g = 0; g < n; g++) {
    var guard = makeGuard(available[g], GUARD_NAMES[g % GUARD_NAMES.length]);
    // Per-difficulty tuning + per-kind tweaks
    guard.spd = (easyMode ? 40 : 55) * (guard.kind === 'vault' ? 0.8 : 1.0);
    guard.visionRange = easyMode ? 120 : 150;
    guard.visionAngle = easyMode ? Math.PI / 3 : Math.PI / 2.5;
    if (guard.kind === 'creak') {
      // Short bouncer with a wider cone
      guard.visionAngle += 0.15;
      guard.spd *= 0.8;
    }
    guards.push(guard);
  }
}

function guardFacingToCardinal(f) {
  // Return short label "N/E/S/W/NE/SE/SW/NW" from radians
  var d = ((f * 180 / Math.PI) % 360 + 360) % 360;
  var dirs = ['east','south-east','south','south-west','west','north-west','north','north-east'];
  return dirs[Math.round(d / 45) % 8];
}

function tileNameAt(px, py) {
  var t = tileAtPx(px, py);
  switch (t) {
    case T_FLOOR:  return 'a floorboard';
    case T_CREAK:  return 'a creaky board';
    case T_RUG:    return 'the rug';
    case T_PAPER:  return 'a desk';
    case T_KEYPAD: return 'the keypad';
    case T_LOOT:   return 'the vault';
    case T_DOOR:   return 'the back door';
    default:       return 'the floor';
  }
}

// ── Phase: alley (street between runs) ─────────────────────────────────────
// Four houses + dumpster with raccoons; pick a door and press action to enter.
var ALLEY_HOUSE_COUNT = 4;
var alley = {
  targetIdx: 0,          // which house actually has the loot (decor only for now)
  selectedIdx: -1,       // nearest house the player is standing in front of
  power: 0,              // raccoon power-cut timer (CP3 hook)
};
// Alley layout (800×560 logical). Player x/y are canvas-space here.
var ALLEY_GROUND_Y = 400; // sidewalk line
function houseDoorX(i) {
  // 4 houses evenly spaced across x=120..680
  var x0 = 120, x1 = 680;
  return x0 + (x1 - x0) * (i / (ALLEY_HOUSE_COUNT - 1));
}
function houseDoorY() { return ALLEY_GROUND_Y - 2; }

function resetAlley() {
  alley.targetIdx = Math.floor(Math.random() * ALLEY_HOUSE_COUNT);
  alley.selectedIdx = -1;
  alley.power = 0;
  player.x = 80;
  player.y = ALLEY_GROUND_Y + 42;
  player.facing = 'right';
  player.sprinting = false;
}

function nearestAlleyDoor() {
  var best = -1, bestD = 999;
  for (var i = 0; i < ALLEY_HOUSE_COUNT; i++) {
    var dx = player.x - houseDoorX(i);
    var dy = player.y - (houseDoorY() - 8);
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < bestD) { bestD = d; best = i; }
  }
  return bestD < 54 ? best : -1;
}

function updateAlley(dt) {
  var vx = 0, vy = 0;
  if (isLeft())  vx -= 1;
  if (isRight()) vx += 1;
  if (isUp())    vy -= 1;
  if (isDown())  vy += 1;
  var moving = (vx || vy);
  var speed = 170;
  if (moving) {
    var len = Math.sqrt(vx*vx + vy*vy);
    player.x += vx / len * speed * dt;
    player.y += vy / len * speed * dt;
    if (Math.abs(vx) >= Math.abs(vy)) player.facing = vx < 0 ? 'left' : 'right';
    else                              player.facing = vy < 0 ? 'up'   : 'down';
    // Keep on sidewalk band
    if (player.y < ALLEY_GROUND_Y + 10) player.y = ALLEY_GROUND_Y + 10;
    if (player.y > H - 40)              player.y = H - 40;
    if (player.x < 40)                  player.x = 40;
    if (player.x > W - 40)              player.x = W - 40;
  }
  alley.selectedIdx = nearestAlleyDoor();

  if (eatAction()) {
    if (alley.selectedIdx >= 0) {
      enterHousePhase();
      return;
    }
  }
  if (eat('Escape')) setPhase('title');
}

function drawAlleyBackdrop(c) {

  sky.addColorStop(1, '#1a2040');

  for (var h = 0; h < ALLEY_HOUSE_COUNT; h++) {

// ── Phase: play (stealth) ────────────────────────────────────────────────────
function drawTileBackdrop(c) {
  for (var r = 0; r < ROWS; r++) {
    for (var cc = 0; cc < COLS; cc++) {
      var t = MAP[r][cc];
      var x = cc * TILE, y = r * TILE;
      // Base floor
      c.fillStyle = '#6a4a2a';
      c.fillRect(x, y, TILE, TILE);
      if (t === T_WALL) {
        c.fillStyle = '#2a1a0e';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = '#0c0604'; c.lineWidth = 1;
        c.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (t === T_CREAK) {
        c.fillStyle = '#7a4a1a';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = 'rgba(0,0,0,0.45)'; c.lineWidth = 1;
        // Diagonal hatching hints at brittleness
        for (var k = -TILE; k < TILE; k += 6) {
          c.beginPath(); c.moveTo(x + k, y); c.lineTo(x + k + TILE, y + TILE); c.stroke();
        }
      } else if (t === T_RUG) {
        c.fillStyle = '#3a2a6a';
        c.fillRect(x, y, TILE, TILE);
        c.fillStyle = '#4a3a8a';
        c.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
      } else if (t === T_VAULT) {
        // Render initial state as wall; runtime overlay lifts it when opened
        c.fillStyle = '#3a2a1a';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = '#ffd700'; c.lineWidth = 2;
        c.strokeRect(x + 4, y + 4, TILE - 8, TILE - 8);
      }
      // Floor grain lines
      if (t === T_FLOOR) {
        c.strokeStyle = 'rgba(0,0,0,0.15)'; c.lineWidth = 1;
        c.beginPath(); c.moveTo(x, y + TILE - 0.5); c.lineTo(x + TILE, y + TILE - 0.5); c.stroke();
      }
    }
  }
}

// Find player's current nearest interactable tile (within one tile)
function nearestInteract(px, py) {
  var pc = Math.floor(px / TILE), pr = Math.floor(py / TILE);
  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      var t = tileAt(pc + dc, pr + dr);
      if (t === T_PAPER || t === T_KEYPAD || t === T_LOOT || t === T_DOOR) {
        var cx = (pc + dc) * TILE + TILE/2, cy = (pr + dr) * TILE + TILE/2;
        var d = Math.hypot(cx - px, cy - py);
        if (d < TILE * 0.95) return { tile: t, col: pc + dc, row: pr + dr, d: d };
      }
    }
  }
  return null;
}

// Axis-separated wall collision using a small player radius
function tryMove(p, nx, ny) {
  var R = 12;
  // X axis
  var tx = p.x + nx;
  if (!isBlocking(tileAtPx(tx + R, p.y)) && !isBlocking(tileAtPx(tx - R, p.y)) &&
      !isBlocking(tileAtPx(tx + R, p.y - R*0.6)) && !isBlocking(tileAtPx(tx - R, p.y - R*0.6)) &&
      !isBlocking(tileAtPx(tx + R, p.y + R*0.6)) && !isBlocking(tileAtPx(tx - R, p.y + R*0.6))) {
    p.x = tx;
  }
  // Y axis
  var ty = p.y + ny;
  if (!isBlocking(tileAtPx(p.x + R*0.6, ty + R)) && !isBlocking(tileAtPx(p.x - R*0.6, ty + R)) &&
      !isBlocking(tileAtPx(p.x + R*0.6, ty - R)) && !isBlocking(tileAtPx(p.x - R*0.6, ty - R))) {
    p.y = ty;
  }
}

function updateOneGuard(guard, dt) {
  // Pursue player when alerted, otherwise follow patrol
  var tgt;
  if (guard.alert === 'alerted') {
    tgt = { x: player.x, y: player.y };
  } else {
    tgt = guard.pts[guard.ptIdx];
  }
  var dx = tgt.x - guard.x, dy = tgt.y - guard.y;
  var d = Math.hypot(dx, dy);
  if (d > 1) {
    var spd = guard.spd * (guard.alert === 'alerted' ? 1.8 : (guard.alert === 'suspicious' ? 0.0 : 1.0));
    var step = Math.min(spd * dt, d);
    guard.x += dx / d * step;
    guard.y += dy / d * step;
    if (spd > 0) guard.facing = Math.atan2(dy, dx);
  }
  if (guard.alert !== 'alerted' && d < 4) {
    guard.ptIdx = (guard.ptIdx + 1) % guard.pts.length;
  }

  // Vision check
  var pdx = player.x - guard.x, pdy = player.y - guard.y;
  var pd  = Math.hypot(pdx, pdy);
  var seen = false;
  if (pd < guard.visionRange) {
    var ang = Math.atan2(pdy, pdx);
    var diff = Math.atan2(Math.sin(ang - guard.facing), Math.cos(ang - guard.facing));
    if (Math.abs(diff) < guard.visionAngle / 2) {
      if (!lineBlocked(guard.x, guard.y, player.x, player.y)) seen = true;
    }
  }

  if (seen) {
    var closeness = 1 - Math.min(1, pd / guard.visionRange);
    guard.suspicion += (30 + 60 * closeness) * dt;
  } else {
    guard.suspicion -= 35 * dt;
  }
  if (noise > 70) guard.suspicion += (noise - 70) * 0.35 * dt;
  guard.suspicion = Math.max(0, Math.min(100, guard.suspicion));
  guard.alert = guard.suspicion >= 80 ? 'alerted'
              : guard.suspicion >= 35 ? 'suspicious' : 'calm';

  if (guard.suspicion >= 100 || (guard.alert === 'alerted' && pd < 26)) {
    captureEvent = {
      distPx: Math.round(pd),
      playerNoise: Math.round(noise),
      wasSprinting: !!player.sprinting,
      tileName: tileNameAt(player.x, player.y),
      guardName: guard.name,
      guardFacing: guardFacingToCardinal(guard.facing),
      px: player.x, py: player.y,
      gx: guard.x, gy: guard.y, gFacing: guard.facing,
      gRange: guard.visionRange, gAngle: guard.visionAngle,
    };
    setPhase('caught');
    return true;
  }
  return false;
}

function updateGuards(dt) {
  for (var i = 0; i < guards.length; i++) {
    if (updateOneGuard(guards[i], dt)) return; // captured — stop updating
  }
}

function updateHouse(dt) {
  var vx = 0, vy = 0;
  if (isLeft())  vx -= 1;
  if (isRight()) vx += 1;
  if (isUp())    vy -= 1;
  if (isDown())  vy += 1;
  var moving = (vx || vy);
  var sprint = !!(K.ShiftLeft || K.ShiftRight);
  player.sprinting = sprint && moving;
  var speed = player.sprinting ? 260 : 150;
  if (moving) {
    var len = Math.sqrt(vx*vx + vy*vy);
    vx /= len; vy /= len;
    tryMove(player, vx * speed * dt, vy * speed * dt);
    if (Math.abs(vx) >= Math.abs(vy)) player.facing = vx < 0 ? 'left' : 'right';
    else                              player.facing = vy < 0 ? 'up'   : 'down';
  }

  // Noise — Samster-inspired graduated meter
  var currentTile = tileAtPx(player.x, player.y);
  if (moving) {
    var baseRate = (currentTile === T_CREAK) ? 0.8
                 : (currentTile === T_RUG)   ? 0.0
                 : 0.12;
    var mult = player.sprinting ? 2.2 : 1.0;
    noise += baseRate * mult * noiseRate * (dt * 60);
  } else {
    noise -= 35 * dt;
  }
  noise = Math.max(0, Math.min(100, noise));

  // Interaction
  if (eatAction()) {
    var ni = nearestInteract(player.x, player.y);
    if (ni) {
      if (ni.tile === T_PAPER) {
        knowsCode = true; paperFlash = 2.0;
      } else if (ni.tile === T_KEYPAD) {
        if (knowsCode) {
          setPhase('keypad');
          return;
        } else {
          paperFlash = 1.2; // reuse as "nope, read the paper first" pulse
        }
      } else if (ni.tile === T_LOOT && vaultOpen && !hasLoot) {
        startSafeDial();
        return;
      } else if (ni.tile === T_DOOR && hasLoot) {
        startChase();
        return;
      }
    }
  }
  if (eat('Escape')) setPhase('title');

  paperFlash = Math.max(0, paperFlash - dt);
  lootGlow   = Math.max(0, lootGlow + dt);

  updateGuards(dt);
}

// Vision cone fill on the foreground canvas (semi-transparent)
function drawVisionCone(g, col) {
  ctx.save();
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(g.x, g.y);
  var seg = 14;
  var a0 = g.facing - g.visionAngle / 2;
  var a1 = g.facing + g.visionAngle / 2;
  for (var i = 0; i <= seg; i++) {
    var a = a0 + (a1 - a0) * (i / seg);
    // Shorten ray if blocked
    var r = g.visionRange;
    var steps = 16;
    for (var k = 1; k <= steps; k++) {
      var t = k / steps;
      if (isBlocking(tileAtPx(g.x + Math.cos(a) * r * t, g.y + Math.sin(a) * r * t))) {
        r = r * (k - 1) / steps; break;
      }
    }
    ctx.lineTo(g.x + Math.cos(a) * r, g.y + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawGuardSprite(g) {
  // Body
  circ(g.x, g.y, 13, '#2a4a8a', '#0a0a18', 2);
  // Hat
  ctx.save();
  ctx.translate(g.x, g.y); ctx.rotate(g.facing);
  ctx.fillStyle = '#111';
  ctx.fillRect(-6, -12, 12, 4);
  // Badge
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(6, 0, 2.5, 0, TAU); ctx.fill();
  ctx.restore();
  // Alert bubble
  if (g.alert === 'suspicious') {
    txt('?', g.x + 14, g.y - 12, '#ffe060', 18, 'left', 'bold 18px Georgia,serif');
  } else if (g.alert === 'alerted') {
    txt('!', g.x + 14, g.y - 12, '#ff5555', 20, 'left', 'bold 20px Georgia,serif');
  }
}

function renderHouse() {
  drawCachedBackdrop('room:' + currentTemplate.id, drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);

  // Vault overlay: if open, paint floor over the gate tile
  if (vaultOpen) {
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
      if (MAP[r][c] === T_VAULT) {
        ctx.fillStyle = '#6a4a2a';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
      }
    }
  }

  // Interactable glyphs
  for (var rr = 0; rr < ROWS; rr++) for (var cc = 0; cc < COLS; cc++) {
    var t = MAP[rr][cc];
    var x = cc * TILE + TILE/2, y = rr * TILE + TILE/2;
    if (t === T_PAPER) {
      // Desk with paper
      rndRect(cc * TILE + 6, rr * TILE + 12, 28, 22, 3, '#5a3a1a', '#2a1a0a', 1.5);
      rndRect(cc * TILE + 10, rr * TILE + 8, 20, 14, 2, '#fff8d8', '#888', 1);
      if (paperFlash > 0) {
        ctx.globalAlpha = Math.min(1, paperFlash);
        rndRect(cc * TILE + 6, rr * TILE + 4, 28, 32, 4, null, '#ffd700', 2);
        ctx.globalAlpha = 1;
      }
    } else if (t === T_KEYPAD) {
      rndRect(cc * TILE + 10, rr * TILE + 10, 20, 20, 3, '#222', '#ffd700', 1.5);
      for (var kk = 0; kk < 9; kk++) {
        var kx = cc * TILE + 13 + (kk % 3) * 5;
        var ky = rr * TILE + 13 + Math.floor(kk / 3) * 5;
        ctx.fillStyle = '#ffd700'; ctx.fillRect(kx, ky, 3, 3);
      }
    } else if (t === T_LOOT && !hasLoot) {
      var pulse = 0.5 + 0.5 * Math.sin(lootGlow * 4);
      ctx.globalAlpha = 0.5 + 0.4 * pulse;
      circ(x, y, 18, 'rgba(255,215,0,0.4)');
      ctx.globalAlpha = 1;
      ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\uD83C\uDFC6', x, y);  // 🏆
    } else if (t === T_DOOR) {
      rndRect(cc * TILE + 4, rr * TILE + 4, TILE - 8, TILE - 8, 4,
              hasLoot ? '#3a5a2a' : '#6b3a1a', hasLoot ? '#ffd700' : '#4a2a0a', 2);
      circ(x + 6, y, 2.5, '#ffd700');
    }
  }

  // Guard vision cones (one per guard)
  for (var gi = 0; gi < guards.length; gi++) {
    var g = guards[gi];
    var coneCol = g.alert === 'alerted'    ? 'rgba(255,80,80,0.32)'
                : g.alert === 'suspicious' ? 'rgba(255,200,80,0.26)'
                :                            'rgba(255,255,180,0.16)';
    drawVisionCone(g, coneCol);
  }
  for (var gi2 = 0; gi2 < guards.length; gi2++) drawGuardSprite(guards[gi2]);
  drawDuck(player.x, player.y, player.facing);

  // HUD strip
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 44);
  txt('DUCK DIEB 2', 14, 28, '#ffd700', 16, 'left', 'bold 16px monospace');

  // Noise meter
  var nLabel = noise < 30 ? 'Calm' : noise < 70 ? 'Stirring' : 'Alerted!';
  txt('noise', 200, 18, '#cde', 12, 'left', 'bold 12px monospace');
  rndRect(200, 22, 160, 14, 4, '#111', '#555', 1);
  var nCol = noise < 30 ? '#5a8a3a' : noise < 70 ? '#c8a040' : '#c85050';
  ctx.fillStyle = nCol; ctx.fillRect(202, 24, Math.max(0, 156 * noise / 100), 10);
  txt(nLabel, 370, 32, '#fff', 14, 'left', 'bold 14px monospace');

  // Objective readout
  var obj = !knowsCode  ? 'find the code'
          : !vaultOpen  ? 'enter code on keypad'
          : !hasLoot    ? 'grab the trophy'
          :               'escape through the door';
  txt(obj, W - 14, 28, '#ffe060', 15, 'right', 'bold 15px monospace');

  // Interaction prompt
  var ni = nearestInteract(player.x, player.y);
  if (ni) {
    var label = ni.tile === T_PAPER  ? 'READ'
              : ni.tile === T_KEYPAD ? (knowsCode ? 'ENTER CODE' : 'need the code')
              : ni.tile === T_LOOT   ? (vaultOpen ? 'GRAB' : 'locked')
              : ni.tile === T_DOOR   ? (hasLoot ? 'ESCAPE' : 'door locked')
              :                        '';
    if (label) {
      var cx = ni.col * TILE + TILE/2, cy = ni.row * TILE - 6;
      var w = label.length * 10 + 18;
      rndRect(cx - w/2, cy - 24, w, 22, 5, 'rgba(0,0,0,0.8)', '#ffd700', 1.5);
      txt(label, cx, cy - 8, '#ffd700', 14, 'center', 'bold 14px monospace');
    }
  }

  if (knowsCode && !vaultOpen) {
    rndRect(W/2 - 110, H - 36, 220, 26, 5, 'rgba(0,0,0,0.7)', '#ffd700', 1.5);
    txt('code: ' + CODE, W/2, H - 18, '#ffd700', 17, 'center', 'bold 17px monospace');
  }
}

// ── Phase: keypad (in-world, canvas-drawn) ───────────────────────────────────
var keypadEntry = '';
var keypadError = 0; // shake timer after wrong entry
// Panel geometry (shared by buttons + renderer so layout can't drift)
var KEYPAD_PX = W/2 - 200, KEYPAD_PY = 30, KEYPAD_PW = 400, KEYPAD_PH = 500;
var KEYPAD_GRID_Y = KEYPAD_PY + 160;  // top of the button grid

function openKeypad() { keypadEntry = ''; keypadError = 0; setPhase('keypad'); }

function keypadButtons() {
  // 3×4 grid: 1-9, ⌫, 0, OK
  var bw = 74, bh = 60, gap = 10;
  var gridW = 3 * bw + 2 * gap;
  var x0 = (W - gridW) / 2, y0 = KEYPAD_GRID_Y;
  var labels = ['1','2','3','4','5','6','7','8','9','⌫','0','OK'];
  var btns = [];
  for (var i = 0; i < 12; i++) {
    var col = i % 3, row = Math.floor(i / 3);
    btns.push({
      x: x0 + col * (bw + gap), y: y0 + row * (bh + gap),
      w: bw, h: bh, label: labels[i],
      value: labels[i] === '⌫' ? 'back' : labels[i] === 'OK' ? 'ok' : labels[i],
    });
  }
  // Cancel below the grid
  btns.push({ x: W/2 - 70, y: y0 + 4 * (bh + gap) + 6, w: 140, h: 38,
              label: 'Cancel', value: 'cancel' });
  return btns;
}

function keypadPress(v) {
  if (v === 'cancel') { setPhase('house'); return; }
  if (v === 'back') { keypadEntry = keypadEntry.slice(0, -1); return; }
  if (v === 'ok') {
    if (keypadEntry === CODE) {
      vaultOpen = true;
      clearBackdropCache();  // redraw room without the vault gate
      setPhase('house');
    } else {
      keypadError = 0.6;
      keypadEntry = '';
    }
    return;
  }
  if (keypadEntry.length < CODE.length) keypadEntry += v;
}

function updateKeypad(dt) {
  if (keypadError > 0) keypadError -= dt;
  // Keyboard shortcuts
  for (var i = 0; i <= 9; i++) {
    if (eat('Digit' + i) || eat('Numpad' + i)) keypadPress('' + i);
  }
  if (eat('Backspace')) keypadPress('back');
  if (eat('Enter'))     keypadPress('ok');
  if (eat('Escape'))    keypadPress('cancel');

  // Taps / clicks
  if (mclk) {
    mclk = false;
    var btns = keypadButtons();
    for (var j = 0; j < btns.length; j++) {
      var b = btns[j];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        keypadPress(b.value); break;
      }
    }
  }
}

function renderKeypad() {
  drawCachedBackdrop('room:' + currentTemplate.id, drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  var shakeX = keypadError > 0 ? (Math.sin(keypadError * 50) * 6) : 0;
  ctx.save(); ctx.translate(shakeX, 0);
  rndRect(KEYPAD_PX, KEYPAD_PY, KEYPAD_PW, KEYPAD_PH, 14, '#12121e', '#ffd700', 3);

  txt('Vault Keypad', W/2, KEYPAD_PY + 42, '#ffd700', 26, 'center', 'bold 26px Georgia,serif');
  txt('enter ' + CODE.length + ' digits', W/2, KEYPAD_PY + 68, '#8aa', 14, 'center', 'bold 14px monospace');

  // Display: sits fully above the grid so it can't be covered
  var dispY = KEYPAD_PY + 88;
  rndRect(W/2 - 130, dispY, 260, 54, 6, '#0a0a14', '#3a3a5a', 2);
  var disp = keypadEntry + '_'.repeat(Math.max(0, CODE.length - keypadEntry.length));
  txt(disp.split('').join(' '), W/2, dispY + 38, '#fff', 32, 'center', 'bold 32px monospace');

  // Buttons
  var btns = keypadButtons();
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    var over = mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    var fill = b.value === 'ok'     ? (over ? '#3a8a3a' : '#2a5a2a')
             : b.value === 'cancel' ? (over ? '#8a3a3a' : '#5a2a2a')
             :                        (over ? '#2a2a44' : '#1e1e30');
    var stroke = b.value === 'ok' ? '#4dff4d' : b.value === 'cancel' ? '#ff6a6a' : '#3a3a5a';
    rndRect(b.x, b.y, b.w, b.h, 8, fill, stroke, 1.5);
    var fs = b.value === 'cancel' ? 16 : 26;
    txt(b.label, b.x + b.w/2, b.y + b.h/2 + fs/3, '#fff', fs, 'center',
        'bold ' + fs + 'px monospace');
  }

  if (keypadError > 0) {
    txt('wrong code', W/2, KEYPAD_PY + KEYPAD_PH - 14, '#ff6666', 16, 'center', 'bold 16px monospace');
  }
  ctx.restore();
}

// ── Phase: safedial (hold to rotate, release on the tick) ───────────────────
var safedial = {
  angle: 0, target: 0,
  digits: 3, idx: 0,
  tolerance: 0.22,
  speed: 3.4,                // rad/s
  committedT: 0, failT: 0,
  wasHolding: false, didRotate: false,
};
function dialNorm(a) {
  while (a >  Math.PI) a -= 2 * Math.PI;
  while (a < -Math.PI) a += 2 * Math.PI;
  return a;
}
function startSafeDial() {
  safedial.digits = easyMode ? 1 : 3;
  safedial.idx = 0;
  safedial.angle = 0;
  safedial.target = (Math.random() * 2 - 1) * Math.PI;
  safedial.tolerance = easyMode ? 0.32 : 0.22;
  safedial.speed = easyMode ? 2.4 : 3.4;
  safedial.committedT = 0; safedial.failT = 0;
  safedial.wasHolding = false; safedial.didRotate = false;
  setPhase('safedial');
}
function updateSafeDial(dt) {
  safedial.committedT = Math.max(0, safedial.committedT - dt);
  safedial.failT      = Math.max(0, safedial.failT - dt);

  var left  = isLeft(),  right = isRight();
  var dir = (left && !right) ? -1 : (right && !left) ? 1 : 0;
  var holding = left || right;
  if (holding) {
    if (dir !== 0) safedial.didRotate = true;
    safedial.angle = dialNorm(safedial.angle + dir * safedial.speed * dt);
  }

  if (safedial.wasHolding && !holding) {
    if (safedial.didRotate) {
      var delta = Math.abs(dialNorm(safedial.angle - safedial.target));
      if (delta < safedial.tolerance) {
        safedial.committedT = 0.6;
        safedial.idx++;
        if (safedial.idx >= safedial.digits) {
          hasLoot = true; lootGlow = 2.0;
          setPhase('house');
          return;
        }
        // Pick a new target that requires rotation
        var newT;
        do {
          newT = (Math.random() * 2 - 1) * Math.PI;
        } while (Math.abs(dialNorm(newT - safedial.angle)) < 1.0);
        safedial.target = newT;
      } else {
        safedial.failT = 0.8;
        for (var i = 0; i < guards.length; i++) {
          guards[i].suspicion = Math.min(100, guards[i].suspicion + 25);
        }
        safedial.idx = 0;
        safedial.target = (Math.random() * 2 - 1) * Math.PI;
      }
      safedial.didRotate = false;
    }
  }
  safedial.wasHolding = holding;

  if (eat('Escape')) setPhase('house');
}
function renderSafeDial() {
  drawCachedBackdrop('room:' + currentTemplate.id, drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(6,6,14,0.78)';
  ctx.fillRect(0, 0, W, H);

  txt('Crack the Safe', W/2, 60, '#ffd700', 32, 'center', 'bold 32px Georgia,serif');
  txt('digit ' + (safedial.idx + 1) + ' of ' + safedial.digits,
      W/2, 90, '#cde', 16, 'center', 'bold 16px monospace');

  var cx = W/2, cy = H/2 + 12, r = 130;
  // Dial body
  circ(cx, cy, r, '#222', '#888', 3);
  circ(cx, cy, r - 14, '#1a1a26', '#555', 2);
  // Background ticks on the dial (rotate with angle)
  for (var i = 0; i < 24; i++) {
    var a = -Math.PI/2 + i / 24 * Math.PI * 2 + safedial.angle;
    var x1 = cx + Math.cos(a) * (r - 18), y1 = cy + Math.sin(a) * (r - 18);
    var x2 = cx + Math.cos(a) * (r - 8),  y2 = cy + Math.sin(a) * (r - 8);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  // Gold target tick
  var tA = -Math.PI/2 + dialNorm(safedial.target - safedial.angle);
  var tx1 = cx + Math.cos(tA) * (r - 22), ty1 = cy + Math.sin(tA) * (r - 22);
  var tx2 = cx + Math.cos(tA) * (r - 4),  ty2 = cy + Math.sin(tA) * (r - 4);
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(tx1, ty1); ctx.lineTo(tx2, ty2); ctx.stroke();
  // Tolerance band (subtle arc near the target)
  ctx.strokeStyle = 'rgba(255,215,0,0.25)'; ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.arc(cx, cy, r - 12, tA - safedial.tolerance, tA + safedial.tolerance);
  ctx.stroke();

  // Pointer at top
  var pCol = safedial.failT > 0 ? '#ff5555'
           : safedial.committedT > 0 ? '#5aff5a'
           : '#ffd700';
  ctx.fillStyle = pCol;
  ctx.beginPath();
  ctx.moveTo(cx, cy - r - 6);
  ctx.lineTo(cx - 10, cy - r + 10);
  ctx.lineTo(cx + 10, cy - r + 10);
  ctx.closePath(); ctx.fill();

  // Status text
  var msg = safedial.failT > 0      ? 'missed — restarting' :
            safedial.committedT > 0 ? 'locked in!' :
                                      'hold \u25C4 / \u25BA to rotate · release on the gold tick';
  txt(msg, W/2, H - 90, '#cde', 16, 'center', 'bold 16px monospace');

  // Locked digits row
  for (var d = 0; d < safedial.digits; d++) {
    var lit = d < safedial.idx;
    var dx = cx - (safedial.digits * 28)/2 + d * 28 + 14;
    circ(dx, H - 55, 8, lit ? '#ffd700' : '#333', '#888', 1);
  }
}

// ── Phase: caught (post-mortem) ──────────────────────────────────────────────
function renderCaught() {
  drawCachedBackdrop('room:' + currentTemplate.id, drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(10,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  txt('BUSTED', W/2, 86, '#ff5555', 48, 'center', 'bold 48px Georgia,serif');

  // Post-mortem card
  var px = W/2 - 260, py = 120, pw = 520, ph = 280;
  rndRect(px, py, pw, ph, 12, '#181022', '#ff5555', 2);

  if (captureEvent) {
    var e = captureEvent;
    var lines = [
      e.guardName + ' spotted you.',
      'Distance: ' + e.distPx + 'px · guard facing ' + e.guardFacing + '.',
      'You were on ' + e.tileName + (e.wasSprinting ? ' — sprinting.' : '.'),
      'Noise level at capture: ' + e.playerNoise + '/100.',
    ];
    for (var i = 0; i < lines.length; i++) {
      txt(lines[i], px + 20, py + 40 + i * 26, '#ffe0e0', 15, 'left', 'bold 15px Georgia,serif');
    }

    // Mini schematic of the capture moment
    var sx = px + 20, sy = py + 150, sw = pw - 40, sh = 110;
    var scale = Math.min(sw / (COLS * TILE), sh / (ROWS * TILE));
    rndRect(sx, sy, sw, sh, 6, '#0a0612', '#5a3a3a', 1);
    ctx.save();
    ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();
    ctx.translate(sx + (sw - COLS * TILE * scale) / 2, sy + (sh - ROWS * TILE * scale) / 2);
    ctx.scale(scale, scale);
    // Walls only (quick)
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
      if (MAP[r][c] === T_WALL) {
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
      }
    }
    // Guard cone
    ctx.fillStyle = 'rgba(255,80,80,0.4)';
    ctx.beginPath();
    ctx.moveTo(e.gx, e.gy);
    var a0 = e.gFacing - e.gAngle / 2, a1 = e.gFacing + e.gAngle / 2;
    for (var k = 0; k <= 12; k++) {
      var a = a0 + (a1 - a0) * (k / 12);
      ctx.lineTo(e.gx + Math.cos(a) * e.gRange, e.gy + Math.sin(a) * e.gRange);
    }
    ctx.closePath(); ctx.fill();
    // Guard + player pips
    ctx.fillStyle = '#ff8888';
    ctx.beginPath(); ctx.arc(e.gx, e.gy, 12, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(e.px, e.py, 10, 0, TAU); ctx.fill();
    ctx.restore();
  } else {
    txt('(no capture details recorded)', W/2, py + 80, '#ffe0e0', 14, 'center', 'bold 14px monospace');
  }

  // Continue / title buttons
  var by = py + ph + 20;
  var rb = { x: W/2 - 160, y: by, w: 150, h: 48 };
  var tb = { x: W/2 + 10,  y: by, w: 150, h: 48 };
  function drawBtn(b, label, col) {
    var over = mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    rndRect(b.x, b.y, b.w, b.h, 8, over ? col : '#222', '#ffd700', 2);
    txt(label, b.x + b.w/2, b.y + 32, '#ffd700', 18, 'center', 'bold 18px Georgia,serif');
    return over;
  }
  var rOver = drawBtn(rb, 'Hauled to jail', '#5a3a2a');
  var tOver = drawBtn(tb, 'Quit',           '#3a3a5a');
  if ((rOver && mclk) || eat('Enter') || eat('Space')) { mclk = false; startJail(); }
  if (tOver && mclk) { mclk = false; setPhase('title'); }
}

// ── Phase: chase (foot-chase to the getaway van) ────────────────────────────
var chase = {
  timer: 0,           // counts up; seconds since chase started
  limit: 12,          // seconds before van drives off → caught
  cops: [],           // {x, y, vx, vy}
  caught: false,
  won: false,
};
function startChase() {
  chase.timer = 0;
  chase.limit = easyMode ? 16 : 12;
  chase.cops = [];
  var copCount = easyMode ? 2 : 3;
  for (var i = 0; i < copCount; i++) {
    chase.cops.push({
      x: 200 + i * 160,
      y: 220 + (i % 2) * 160,
      vx: (Math.random() < 0.5 ? -1 : 1) * (60 + i * 12),
      vy: (Math.random() < 0.5 ? -1 : 1) * (40 + i * 10),
    });
  }
  chase.caught = false; chase.won = false;
  player.x = 60; player.y = H / 2;
  player.facing = 'right';
  setPhase('chase');
}
function updateChase(dt) {
  chase.timer += dt;
  var vx = 0, vy = 0;
  if (isLeft())  vx -= 1;
  if (isRight()) vx += 1;
  if (isUp())    vy -= 1;
  if (isDown())  vy += 1;
  if (vx || vy) {
    var len = Math.sqrt(vx*vx + vy*vy);
    var spd = 220;
    player.x += vx / len * spd * dt;
    player.y += vy / len * spd * dt;
    if (Math.abs(vx) >= Math.abs(vy)) player.facing = vx < 0 ? 'left' : 'right';
    else                              player.facing = vy < 0 ? 'up'   : 'down';
  }
  if (player.x < 20) player.x = 20;
  if (player.x > W - 20) player.x = W - 20;
  if (player.y < 80) player.y = 80;
  if (player.y > H - 40) player.y = H - 40;

  // Cops bounce around the street
  for (var i = 0; i < chase.cops.length; i++) {
    var c = chase.cops[i];
    c.x += c.vx * dt; c.y += c.vy * dt;
    if (c.x < 40)      { c.x = 40;      c.vx = Math.abs(c.vx); }
    if (c.x > W - 40)  { c.x = W - 40;  c.vx = -Math.abs(c.vx); }
    if (c.y < 100)     { c.y = 100;     c.vy = Math.abs(c.vy); }
    if (c.y > H - 40)  { c.y = H - 40;  c.vy = -Math.abs(c.vy); }
    if (Math.hypot(c.x - player.x, c.y - player.y) < 24) {
      captureEvent = {
        distPx: 0, playerNoise: Math.round(noise), wasSprinting: true,
        tileName: 'the street', guardName: 'Patrol unit',
        guardFacing: 'right at you',
        px: player.x, py: player.y, gx: c.x, gy: c.y,
        gFacing: 0, gRange: 0, gAngle: 0,
      };
      startJail();
      return;
    }
  }
  // Reach the van
  if (player.x > W - 40 && player.y > H - 180 && player.y < H - 60) {
    chase.won = true;
    finishRun();
    return;
  }
  // Van drives off
  if (chase.timer > chase.limit) {
    captureEvent = {
      distPx: 0, playerNoise: 0, wasSprinting: false,
      tileName: 'the street', guardName: 'The van',
      guardFacing: 'away',
      px: player.x, py: player.y, gx: W - 40, gy: H - 100,
      gFacing: 0, gRange: 0, gAngle: 0,
    };
    startJail();
    return;
  }
  if (eat('Escape')) setPhase('title');
}
function drawChaseBackdrop(c) {
  // Asphalt
  var sky = c.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a1030');
  sky.addColorStop(1, '#181820');
  c.fillStyle = sky; c.fillRect(0, 0, W, H);
  c.fillStyle = '#222'; c.fillRect(0, 80, W, H - 80);
  // Lane stripes
  c.fillStyle = '#c8a040';
  for (var x = 0; x < W; x += 60) c.fillRect(x, H/2 - 2, 30, 4);
  // Curbs
  c.fillStyle = '#444'; c.fillRect(0, 80, W, 4);
  c.fillStyle = '#444'; c.fillRect(0, H - 8, W, 4);
}
function renderChase() {
  drawCachedBackdrop('chase', drawChaseBackdrop);
  ctx.clearRect(0, 0, W, H);

  // Van on the right
  var vx = W - 70, vy = H - 130;
  rndRect(vx - 44, vy, 90, 60, 6, '#3a5a2a', '#0a1a0a', 2);
  rndRect(vx + 10, vy + 8, 28, 22, 2, '#cde', '#111', 1);
  circ(vx - 28, vy + 60, 9, '#111', '#555', 2);
  circ(vx + 28, vy + 60, 9, '#111', '#555', 2);
  txt('VAN', vx, vy + 46, '#ffd700', 12, 'center', 'bold 12px monospace');

  // Cops
  for (var i = 0; i < chase.cops.length; i++) {
    var c = chase.cops[i];
    circ(c.x, c.y, 13, '#2a4a8a', '#0a0a18', 2);
    // Badge dot
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(c.x, c.y - 4, 2.5, 0, TAU); ctx.fill();
    txt('!', c.x + 14, c.y - 12, '#ff5555', 18, 'left', 'bold 18px Georgia,serif');
  }

  drawDuck(player.x, player.y, player.facing);

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 44);
  txt('CHASE', 14, 28, '#ffd700', 16, 'left', 'bold 16px monospace');
  var remaining = Math.max(0, chase.limit - chase.timer);
  txt('van leaves in', 140, 18, '#cde', 12, 'left', 'bold 12px monospace');
  rndRect(140, 22, 220, 14, 4, '#111', '#555', 1);
  ctx.fillStyle = remaining > chase.limit * 0.3 ? '#5a8a3a' : '#c85050';
  ctx.fillRect(142, 24, Math.max(0, 216 * (remaining / chase.limit)), 10);
  txt(remaining.toFixed(1) + 's', 372, 32, '#fff', 14, 'left', 'bold 14px monospace');
  txt('reach the van →', W - 14, 28, '#ffe060', 15, 'right', 'bold 15px monospace');
}

// ── Phase: jail (Simon-says color match) ────────────────────────────────────
var jail = {
  seq: [],
  playerIdx: 0,
  showIdx: -1,   // which rug is being flashed; -1 = waiting for player
  showT: 0,
  flashT: 0,     // player press flash
  wrongT: 0,
  attempts: 0,
  maxAttempts: 3,
  rugs: [
    { col: '#c04040', lit: '#ff8080', name: 'red'   },
    { col: '#40a040', lit: '#80ff80', name: 'green' },
    { col: '#4060c0', lit: '#80a0ff', name: 'blue'  },
    { col: '#c0a040', lit: '#ffdc80', name: 'gold'  },
  ],
  rugBoxes: [],
};
function jailBuildBoxes() {
  var boxes = [];
  var n = jail.rugs.length;
  var totalW = n * 110 + (n - 1) * 16;
  var x0 = (W - totalW) / 2;
  for (var i = 0; i < n; i++) {
    boxes.push({ x: x0 + i * (110 + 16), y: 280, w: 110, h: 110 });
  }
  jail.rugBoxes = boxes;
}
function startJail() {
  jailCount++;
  energy = Math.max(0, energy - 60);
  if (energy <= 0) {
    // No more energy — run over without victory
    chase.won = false;
    finishRun();
    return;
  }
  var seqLen = easyMode ? 2 : 3 + Math.min(2, jailCount - 1);
  jail.seq = [];
  for (var i = 0; i < seqLen; i++) jail.seq.push(Math.floor(Math.random() * jail.rugs.length));
  jail.playerIdx = 0;
  jail.showIdx = 0; jail.showT = 0;
  jail.flashT = 0; jail.wrongT = 0;
  jail.attempts = 0;
  jailBuildBoxes();
  setPhase('jail');
}
function updateJail(dt) {
  // Play back the sequence, then accept input
  if (jail.showIdx >= 0) {
    jail.showT += dt;
    if (jail.showT > 0.6) {
      jail.showT = 0;
      jail.showIdx++;
      if (jail.showIdx >= jail.seq.length) { jail.showIdx = -1; jail.playerIdx = 0; }
    }
    return;
  }
  jail.flashT = Math.max(0, jail.flashT - dt);
  jail.wrongT = Math.max(0, jail.wrongT - dt);

  if (mclk) {
    mclk = false;
    for (var i = 0; i < jail.rugBoxes.length; i++) {
      var b = jail.rugBoxes[i];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        handleJailPress(i); break;
      }
    }
  }
  // Keyboard 1-4 shortcut
  for (var k = 1; k <= jail.rugs.length; k++) {
    if (eat('Digit' + k) || eat('Numpad' + k)) handleJailPress(k - 1);
  }
}
function handleJailPress(i) {
  jail.flashT = 0.25;
  if (jail.seq[jail.playerIdx] === i) {
    jail.playerIdx++;
    if (jail.playerIdx >= jail.seq.length) {
      // Released — back to alley
      resetAlley();
      setPhase('alley');
    }
  } else {
    jail.wrongT = 0.6;
    jail.attempts++;
    if (jail.attempts >= jail.maxAttempts) {
      chase.won = false;
      finishRun();
      return;
    }
    // Replay sequence
    jail.playerIdx = 0;
    jail.showIdx = 0; jail.showT = 0;
  }
}
function drawJailBackdrop(c) {
  c.fillStyle = '#10081a'; c.fillRect(0, 0, W, H);
  // Cell bars
  c.fillStyle = '#222';
  for (var x = 40; x < W - 40; x += 50) c.fillRect(x, 60, 10, 160);
  c.fillStyle = '#444';
  c.fillRect(30, 60, W - 60, 6);
  c.fillRect(30, 218, W - 60, 6);
  // Floor
  c.fillStyle = '#1a1a22'; c.fillRect(0, 240, W, H - 240);
}
function renderJail() {
  drawCachedBackdrop('jail', drawJailBackdrop);
  ctx.clearRect(0, 0, W, H);

  txt('The Slammer', W/2, 50, '#ffd700', 32, 'center', 'bold 32px Georgia,serif');
  var sub = jail.showIdx >= 0 ? 'watch the rugs…'
          : 'tap the rugs in the order they flashed';
  txt(sub, W/2, 100, '#cde', 16, 'center', 'bold 16px monospace');
  txt('attempt ' + (jail.attempts + 1) + ' of ' + jail.maxAttempts,
      W/2, 126, '#8a9', 13, 'center', 'bold 13px monospace');

  // Progress dots
  for (var i = 0; i < jail.seq.length; i++) {
    var px = W/2 - (jail.seq.length * 16) / 2 + i * 16;
    var done = jail.showIdx < 0 && i < jail.playerIdx;
    circ(px + 6, 156, 5, done ? '#ffd700' : '#444', '#888', 1);
  }

  // Rugs
  for (var j = 0; j < jail.rugBoxes.length; j++) {
    var b = jail.rugBoxes[j];
    var rug = jail.rugs[j];
    var litByShow = (jail.showIdx >= 0 && jail.seq[jail.showIdx] === j && jail.showT < 0.35);
    var litByPress = (jail.flashT > 0 && jail.playerIdx > 0 && jail.seq[jail.playerIdx - 1] === j);
    var lit = litByShow || litByPress;
    rndRect(b.x, b.y, b.w, b.h, 10, lit ? rug.lit : rug.col, '#111', 3);
    // Simple rug pattern
    ctx.save();
    ctx.globalAlpha = 0.25; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 8, b.y + 8, b.w - 16, b.h - 16);
    ctx.restore();
    txt(String(j + 1), b.x + b.w/2, b.y + b.h/2 + 10, '#fff', 28,
        'center', 'bold 28px monospace');
  }

  if (jail.wrongT > 0) {
    txt('wrong!', W/2, 420, '#ff6666', 24, 'center', 'bold 24px Georgia,serif');
  }

  // Energy readout
  txt('energy', 14, 28, '#cde', 13, 'left', 'bold 13px monospace');
  rndRect(14, 32, 160, 14, 4, '#111', '#555', 1);
  ctx.fillStyle = '#c8a040';
  ctx.fillRect(16, 34, Math.max(0, 156 * (energy / MAX_ENERGY)), 10);
}

// ── Phase: victory (score + save) ───────────────────────────────────────────
var runResult = { won:false, score:0, stars:0, energyLeft:0, jailed:0, timeSec:0, saved:false };
function finishRun() {
  var timeSec = ((typeof performance !== 'undefined' ? performance.now() : Date.now()) - runStartMs) / 1000;
  var energyLeft = energy;
  var base = chase.won ? 500 : 0;
  var lootBonus = hasLoot ? 200 : 0;
  var energyBonus = Math.round(energyLeft * 0.8);
  var jailPenalty = jailCount * 80;
  var timePenalty = Math.max(0, Math.floor(timeSec - 60)) * 2;
  var score = Math.max(0, base + lootBonus + energyBonus - jailPenalty - timePenalty);
  var stars = chase.won ? (score > 700 ? 3 : score > 400 ? 2 : 1) : 0;
  runResult = {
    won: !!chase.won, score: score, stars: stars,
    energyLeft: energyLeft, jailed: jailCount,
    timeSec: timeSec, saved: false,
  };
  if (chase.won) {
    hsStore.save({ score: score, stars: stars, date: Date.now() });
    runResult.saved = true;
  }
  setPhase('victory');
}
function renderVictory() {
  drawCachedBackdrop('title', drawTitleBackdrop);
  ctx.clearRect(0, 0, W, H);

  if (runResult.won) {
    txt('CLEAN GETAWAY', W/2, 110, '#ffd700', 44, 'center', 'bold 44px Georgia,serif');
    txt('The trophy is yours.', W/2, 146, '#cde', 17, 'center', 'italic 17px Georgia,serif');
  } else {
    txt('RUN ENDED', W/2, 110, '#ff8080', 42, 'center', 'bold 42px Georgia,serif');
    txt('The van left without you.', W/2, 146, '#ffe0e0', 17, 'center', 'italic 17px Georgia,serif');
  }

  // Stars
  if (runResult.won) {
    for (var i = 0; i < 3; i++) {
      var lit = i < runResult.stars;
      ctx.font = '38px serif'; ctx.textAlign = 'center';
      ctx.fillStyle = lit ? '#ffd700' : '#3a3a1a';
      ctx.fillText(lit ? '\u2605' : '\u2606', W/2 - 60 + i * 60, 210);
    }
  }

  // Score card
  var px = W/2 - 180, py = 250, pw = 360, ph = 140;
  rndRect(px, py, pw, ph, 10, 'rgba(0,0,0,0.6)', '#ffd700', 2);
  var rows = [
    ['Score',        String(runResult.score)],
    ['Energy left',  runResult.energyLeft + '/' + MAX_ENERGY],
    ['Times jailed', String(runResult.jailed)],
    ['Time',         runResult.timeSec.toFixed(1) + 's'],
  ];
  for (var j = 0; j < rows.length; j++) {
    txt(rows[j][0], px + 20,     py + 32 + j * 26, '#cde',    16, 'left',  'bold 16px monospace');
    txt(rows[j][1], px + pw - 20, py + 32 + j * 26, '#ffd700', 16, 'right', 'bold 16px monospace');
  }

  // Buttons
  var by = py + ph + 20;
  var pb = { x: W/2 - 260, y: by, w: 160, h: 46 };
  var hb = { x: W/2 -  80, y: by, w: 160, h: 46 };
  var tb = { x: W/2 + 100, y: by, w: 160, h: 46 };
  function drawBtn(b, label, col) {
    var over = mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    rndRect(b.x, b.y, b.w, b.h, 8, over ? col : '#222', '#ffd700', 2);
    txt(label, b.x + b.w/2, b.y + 30, '#ffd700', 17, 'center', 'bold 17px Georgia,serif');
    return over;
  }
  var pOver = drawBtn(pb, 'Play Again', '#3a5a2a');
  var hOver = drawBtn(hb, 'High Scores', '#3a3a5a');
  var tOver = drawBtn(tb, 'Title',      '#3a3a5a');
  if ((pOver && mclk) || eat('Enter') || eat('Space')) { mclk = false; startGame(); }
  if (hOver && mclk) { mclk = false; setPhase('highscores'); }
  if (tOver && mclk) { mclk = false; setPhase('title'); }
}

// ── Phase: highscores ───────────────────────────────────────────────────────
function renderHighscores() {
  drawCachedBackdrop('title', drawTitleBackdrop);
  ctx.clearRect(0, 0, W, H);

  txt('High Scores', W/2, 90, '#ffd700', 40, 'center', 'bold 40px Georgia,serif');

  var list = hsStore.get();
  var px = W/2 - 220, py = 130, pw = 440, ph = 340;
  rndRect(px, py, pw, ph, 10, 'rgba(0,0,0,0.55)', '#ffd700', 2);

  if (list.length === 0) {
    txt('No clean getaways yet.', W/2, py + ph/2, '#cde', 18, 'center', 'italic 18px Georgia,serif');
  } else {
    txt('#',     px + 30,       py + 34, '#8a9', 13, 'left',  'bold 13px monospace');
    txt('Score', px + 70,       py + 34, '#8a9', 13, 'left',  'bold 13px monospace');
    txt('Stars', px + pw - 150, py + 34, '#8a9', 13, 'left',  'bold 13px monospace');
    txt('Date',  px + pw - 30,  py + 34, '#8a9', 13, 'right', 'bold 13px monospace');
    var shown = Math.min(10, list.length);
    for (var i = 0; i < shown; i++) {
      var e = list[i], row = py + 60 + i * 24;
      var dateStr = '';
      if (e.date) {
        var d = new Date(e.date);
        dateStr = (d.getMonth()+1) + '/' + d.getDate();
      }
      txt(String(i+1), px + 30,       row, '#cde',    15, 'left',  'bold 15px monospace');
      txt(String(e.score), px + 70,   row, '#ffd700', 15, 'left',  'bold 15px monospace');
      var stars = '';
      for (var s = 0; s < (e.stars || 0); s++) stars += '\u2605';
      for (var s2 = (e.stars || 0); s2 < 3; s2++) stars += '\u2606';
      txt(stars,   px + pw - 150, row, '#ffd700', 14, 'left',  '14px monospace');
      txt(dateStr, px + pw - 30,  row, '#8a9',    13, 'right', 'bold 13px monospace');
    }
  }

  var bb = { x: W/2 - 90, y: 500, w: 180, h: 42 };
  var over = mx >= bb.x && mx <= bb.x + bb.w && my >= bb.y && my <= bb.y + bb.h;
  rndRect(bb.x, bb.y, bb.w, bb.h, 8, over ? '#3a3a5a' : '#222', '#ffd700', 2);
  txt('Back', bb.x + bb.w/2, bb.y + 28, '#ffd700', 17, 'center', 'bold 17px Georgia,serif');
  if ((over && mclk) || eat('Escape') || eat('Enter') || eat('Space')) {
    mclk = false; setPhase('title');
  }
}

// ── Fixed-timestep main loop ─────────────────────────────────────────────────
var SIM_STEP = 1/60;
var simDebt = 0, lastTs = 0;
var lastDraw = 0;

function stepSim(dt) {
  switch (phase) {
    case 'house':    updateHouse(dt);    break;
    case 'alley':    updateAlley(dt);    break;
    case 'chase':    updateChase(dt);    break;
    case 'jail':     updateJail(dt);     break;
    case 'keypad':   updateKeypad(dt);   break;
    case 'safedial': updateSafeDial(dt); break;
  }
}

function renderPhase() {
  switch (phase) {
    case 'title':      renderTitle();      break;
    case 'alley':      renderAlley();      break;
    case 'house':      renderHouse();      break;
    case 'keypad':     renderKeypad();     break;
    case 'safedial':   renderSafeDial();   break;
    case 'caught':     renderCaught();     break;
    case 'chase':      renderChase();      break;
    case 'jail':       renderJail();       break;
    case 'victory':    renderVictory();    break;
    case 'highscores': renderHighscores(); break;
  }
  drawMobileControls();
}

function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTs) lastTs = ts;
  var elapsed = Math.min((ts - lastTs) / 1000, SIM_STEP * 6);
  lastTs = ts;
  simDebt += elapsed;
  while (simDebt >= SIM_STEP) {
    stepSim(SIM_STEP);
    simDebt -= SIM_STEP;
  }
  // Throttle draw in low-fps phases
  var targetMs = LOW_FPS_PHASES[phase] ? (1000/30) : (1000/60);
  if (ts - lastDraw < targetMs - 2) return;
  lastDraw = ts;
  renderPhase();
  mclk = false;
  Object.keys(JP).forEach(function(k) { JP[k] = false; });
}
requestAnimationFrame(loop);
</script>
