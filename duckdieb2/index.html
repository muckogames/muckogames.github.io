<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Duck Dieb 2 🦆</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%F0%9F%A6%86%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a120a;overflow:hidden;touch-action:none;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
}
#stage{
  position:absolute;
  width:800px;height:560px;
  overflow:hidden;
  transform-origin:0 0;
  border:3px solid #3a5a2a;border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  background:#111;
}
#stage canvas{
  position:absolute;left:0;top:0;
  width:800px;height:560px;
  display:block;
}
#bgc{pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="gc"></canvas>
</div>
<script src="../mucko-engine.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════
   DUCK DIEB 2  —  Second Edition
   Checkpoint 0: skeleton (title → play → gameover, walk in empty room)
   ════════════════════════════════════════════════════════ */

// Polyfill ctx.roundRect for Safari < 15.4
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);    this.quadraticCurveTo(x + w, y,     x + w, y + r);
    this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);    this.quadraticCurveTo(x,     y + h, x,     y + h - r);
    this.lineTo(x, y + r);        this.quadraticCurveTo(x,     y,     x + r, y);
    this.closePath();
  };
}

var W = 800, H = 560, TAU = Math.PI * 2;
var MAX_RENDER_DPR = 1.5;

// ── Dual-canvas setup with DPR cap ───────────────────────────────────────────
var stage = document.getElementById('stage');
var bgcEl = document.getElementById('bgc');
var gcEl  = document.getElementById('gc');
var bgctx = bgcEl.getContext('2d');
var ctx   = gcEl.getContext('2d');

function applyDPR() {
  var DPR = Math.min(window.devicePixelRatio || 1, MAX_RENDER_DPR);
  [bgcEl, gcEl].forEach(function(c) {
    c.width  = W * DPR;
    c.height = H * DPR;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    var cc = c.getContext('2d');
    cc.setTransform(1, 0, 0, 1, 0, 0);
    cc.scale(DPR, DPR);
  });
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  clearBackdropCache();
}

function viewW() { var vv = window.visualViewport; return vv ? vv.width  : window.innerWidth;  }
function viewH() { var vv = window.visualViewport; return vv ? vv.height : window.innerHeight; }

function resize() {
  var vw = viewW(), vh = viewH();
  var s = Math.min(vw / W, vh / H);
  stage.style.transform = 'scale(' + s + ')';
  stage.style.left = Math.round((vw - W * s) / 2) + 'px';
  stage.style.top  = Math.round((vh - H * s) / 2) + 'px';
}
window.addEventListener('resize', function(){ applyDPR(); resize(); });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}
applyDPR();
resize();

// ── Backdrop cache (dual-canvas pattern) ─────────────────────────────────────
var backdropCache = {};
function clearBackdropCache() { backdropCache = {}; }
function drawCachedBackdrop(key, drawFn) {
  if (!backdropCache[key]) {
    var DPR = Math.min(window.devicePixelRatio || 1, MAX_RENDER_DPR);
    var off = document.createElement('canvas');
    off.width = W * DPR; off.height = H * DPR;
    var octx = off.getContext('2d');
    octx.scale(DPR, DPR);
    drawFn(octx);
    backdropCache[key] = off;
  }
  bgctx.clearRect(0, 0, W, H);
  bgctx.drawImage(backdropCache[key], 0, 0, W, H);
}

// ── Input via engine ─────────────────────────────────────────────────────────
var input = MuckoEngine.makeInput();
var K = input.K, JP = input.JP, eat = input.eat;
function eatAction() { return eat('KeyE') || eat('Space') || eat('Enter'); }

var TOUCH_UI = MuckoEngine.TOUCH_UI();

// ── Touch controls: larger D-pad (r=72) + action button (r=54) ───────────────
var touchDirs = { up:false, down:false, left:false, right:false };
var touchActionFired = false;

// Positions (in canvas coords)
var DPAD_CX = 108, DPAD_CY = H - 108, DPAD_R = 72;
var ACT_CX  = W - 88, ACT_CY = H - 108, ACT_R = 54;

var mx = W / 2, my = H / 2, mclk = false;

function inMovablePhase() {
  return phase === 'play';
}

function getDpadDir(px, py) {
  var dx = px - DPAD_CX, dy = py - DPAD_CY;
  var d = Math.sqrt(dx*dx + dy*dy);
  if (d < 14 || d > DPAD_R * 2.4) return null;
  if (Math.abs(dx) >= Math.abs(dy)) return dx < 0 ? 'left' : 'right';
  return dy < 0 ? 'up' : 'down';
}

function syncTouch(e) {
  if (!inMovablePhase()) {
    touchDirs = { up:false, down:false, left:false, right:false };
    return;
  }
  var r = gcEl.getBoundingClientRect();
  var sx = W / r.width, sy = H / r.height;
  var dirs = { up:false, down:false, left:false, right:false };
  var actHit = false;
  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    var px = (t.clientX - r.left) * sx;
    var py = (t.clientY - r.top)  * sy;
    var dir = getDpadDir(px, py);
    if (dir) dirs[dir] = true;
    var adx = px - ACT_CX, ady = py - ACT_CY;
    if (Math.sqrt(adx*adx + ady*ady) < ACT_R * 1.2) actHit = true;
  }
  touchDirs = dirs;
  if (actHit && !touchActionFired) { JP.KeyE = true; touchActionFired = true; }
  if (!actHit) touchActionFired = false;
}

gcEl.addEventListener('touchstart', function(e) {
  if (e.changedTouches.length) {
    var r = gcEl.getBoundingClientRect();
    mx = (e.changedTouches[0].clientX - r.left) * (W / r.width);
    my = (e.changedTouches[0].clientY - r.top)  * (H / r.height);
    mclk = true;
  }
  syncTouch(e); e.preventDefault();
}, { passive:false });
gcEl.addEventListener('touchmove',   function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
gcEl.addEventListener('touchend',    function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
gcEl.addEventListener('touchcancel', function(e) { syncTouch(e); e.preventDefault(); }, { passive:false });
window.addEventListener('blur', function() {
  touchDirs = { up:false, down:false, left:false, right:false };
});

gcEl.addEventListener('mousemove', function(e) {
  var r = gcEl.getBoundingClientRect();
  mx = (e.clientX - r.left) * (W / r.width);
  my = (e.clientY - r.top)  * (H / r.height);
});
gcEl.addEventListener('click', function(e) {
  var r = gcEl.getBoundingClientRect();
  mx = (e.clientX - r.left) * (W / r.width);
  my = (e.clientY - r.top)  * (H / r.height);
  mclk = true;
});

function isUp()    { return K.ArrowUp    || K.KeyW || touchDirs.up; }
function isDown()  { return K.ArrowDown  || K.KeyS || touchDirs.down; }
function isLeft()  { return K.ArrowLeft  || K.KeyA || touchDirs.left; }
function isRight() { return K.ArrowRight || K.KeyD || touchDirs.right; }

// ── Game state ───────────────────────────────────────────────────────────────
var phase = 'title';
var LOW_FPS_PHASES = { title:1, caught:1, escaped:1, keypad:1 };

var player = { x: 0, y: 0, facing: 'up', sprinting: false };

function setPhase(p) { phase = p; }
function startGame() {
  // Place player on the door tile, facing north into the house
  var dcol = 9, drow = 12;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    if (MAP[r][c] === T_DOOR) { dcol = c; drow = r; }
  }
  player.x = dcol * TILE + TILE/2;
  player.y = drow * TILE + TILE/2;
  player.facing = 'up';
  player.sprinting = false;
  resetStealth();
  setPhase('play');
}

// ── Draw helpers ─────────────────────────────────────────────────────────────
function rect(x, y, w, h, fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
function circ(x, y, r, fill, stroke, sw) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
}
function ell(x, y, rx, ry, fill) {
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, TAU);
  ctx.fillStyle = fill; ctx.fill();
}
function rndRect(x, y, w, h, r, fill, stroke, sw) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r || 0);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
}
function txt(s, x, y, col, size, align, font) {
  ctx.fillStyle = col || '#fff';
  ctx.font = font || ('bold ' + (size || 14) + 'px Georgia,serif');
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(s, x, y);
}

// ── Duck sprite (ported from duckdieb/index.html:565-611) ────────────────────
function drawDuck(x, y, facing) {
  ctx.save();
  ctx.translate(x, y);

  ctx.globalAlpha = 0.18;
  ell(3, 6, 14, 8, '#000');
  ctx.globalAlpha = 1;

  ell(0, 2, 13, 9, '#8b6030');
  ell(0, 3, 10, 6, '#7a5020');

  var hx = 0, hy = 0;
  if (facing === 'up')    hy = -14;
  else if (facing === 'down')  hy = 14;
  else if (facing === 'left')  hx = -14;
  else                         hx = 14;

  circ(hx, hy, 8, '#2a7a38');
  ctx.fillStyle = 'rgba(0,200,160,0.28)';
  ctx.beginPath(); ctx.arc(hx - 2, hy - 2, 4, 0, TAU); ctx.fill();

  ctx.fillStyle = '#111';
  ctx.fillRect(hx - 7, hy - 5, 14, 5);
  circ(hx - 3, hy - 2, 1.5, '#fff');
  circ(hx + 3, hy - 2, 1.5, '#fff');

  ctx.fillStyle = '#e8b800';
  if (facing === 'up') {
    ctx.beginPath(); ctx.ellipse(hx, hy - 10, 3, 4, 0, 0, TAU); ctx.fill();
  } else if (facing === 'down') {
    ctx.beginPath(); ctx.ellipse(hx, hy + 10, 3, 4, 0, 0, TAU); ctx.fill();
  } else if (facing === 'left') {
    ctx.beginPath(); ctx.ellipse(hx - 10, hy, 4, 3, 0, 0, TAU); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(hx + 10, hy, 4, 3, 0, 0, TAU); ctx.fill();
  }

  ctx.restore();
}

// ── Mobile controls (larger, context-aware, with sublabels) ──────────────────
function drawMobileControls() {
  if (!TOUCH_UI || !inMovablePhase()) return;
  ctx.save();
  ctx.globalAlpha = 0.55;

  // D-pad base
  circ(DPAD_CX, DPAD_CY, DPAD_R + 10, '#111');
  circ(DPAD_CX, DPAD_CY, DPAD_R, '#1a1a28', '#555', 2);

  var arm = DPAD_R - 14;
  var dirs = [
    { lbl:'\u25B2', dx:0,    dy:-arm, k:'up'    },
    { lbl:'\u25BC', dx:0,    dy: arm, k:'down'  },
    { lbl:'\u25C4', dx:-arm, dy:0,    k:'left'  },
    { lbl:'\u25BA', dx: arm, dy:0,    k:'right' },
  ];
  for (var i = 0; i < dirs.length; i++) {
    var d = dirs[i];
    var active = touchDirs[d.k];
    rndRect(DPAD_CX + d.dx - 22, DPAD_CY + d.dy - 22, 44, 44, 8,
            active ? '#5a8a5a' : '#2a2a2a', '#666', 1.5);
    txt(d.lbl, DPAD_CX + d.dx, DPAD_CY + d.dy + 7, active ? '#fff' : '#aaa', 20, 'center');
  }

  // Action button
  circ(ACT_CX, ACT_CY, ACT_R + 6, '#111');
  circ(ACT_CX, ACT_CY, ACT_R, touchActionFired ? '#6a9a3a' : '#2a4a2a', '#5a8a4a', 2);
  txt('E', ACT_CX, ACT_CY + 8, '#fff', 26, 'center', 'bold monospace');
  // Sublabel
  ctx.globalAlpha = 0.75;
  txt('action', ACT_CX, ACT_CY + ACT_R + 18, '#cde', 11, 'center', 'bold monospace');

  ctx.restore();
}

// ── Tilemap (20×14 @ 40px) ───────────────────────────────────────────────────
// # wall  . floor  C creak  R rug  P paper  K keypad  L loot  V vault-gate  D door
var TILE = 40;
var COLS = 20, ROWS = 14;
var T_FLOOR=0, T_WALL=1, T_CREAK=2, T_RUG=3, T_PAPER=4, T_KEYPAD=5, T_LOOT=6, T_VAULT=7, T_DOOR=8;
var TILE_FROM_CHAR = { '#':T_WALL, '.':T_FLOOR, 'C':T_CREAK, 'R':T_RUG,
                       'P':T_PAPER, 'K':T_KEYPAD, 'L':T_LOOT, 'V':T_VAULT, 'D':T_DOOR };
var MAP_ROWS = [
  '####################',
  '#..................#',
  '#....CCCC..........#',
  '#...........P......#',
  '#..................#',
  '#......######......#',
  '#......#..L.#......#',
  '#......#....#......#',
  '#......#....#......#',
  '#......###V##......#',
  '#........K.........#',
  '#.....RRRRR........#',
  '#........D.........#',
  '####################'
];
var MAP = (function() {
  var m = [];
  for (var r = 0; r < ROWS; r++) {
    var row = [];
    for (var c = 0; c < COLS; c++) row.push(TILE_FROM_CHAR[MAP_ROWS[r][c]]);
    m.push(row);
  }
  return m;
})();
function tileAt(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return T_WALL;
  return MAP[row][col];
}
function tileAtPx(px, py) { return tileAt(Math.floor(px / TILE), Math.floor(py / TILE)); }
function isBlocking(t) {
  if (t === T_WALL) return true;
  if (t === T_VAULT && !vaultOpen) return true;
  return false;
}
function isWalkablePx(px, py) { return !isBlocking(tileAtPx(px, py)); }

// Line-of-sight: step along the segment, stop at first blocking tile
function lineBlocked(x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var d = Math.sqrt(dx*dx + dy*dy);
  var steps = Math.ceil(d / 8);
  for (var i = 1; i <= steps; i++) {
    var t = i / steps;
    if (isBlocking(tileAtPx(x1 + dx*t, y1 + dy*t))) return true;
  }
  return false;
}

// ── Stealth state ────────────────────────────────────────────────────────────
var vaultOpen = false, hasLoot = false, knowsCode = false;
var CODE = '';           // 4-digit numeric, rolled each run
var paperFlash = 0;      // brief flash when player reads paper
var lootGlow = 0;        // pulsing glow timer
var noise = 0;           // 0–100
var noiseRate = 1.0;     // difficulty tuning

var guard = {
  x: 2 * TILE + TILE/2, y: 2 * TILE + TILE/2,
  pts: [
    { x: 17 * TILE + TILE/2, y:  2 * TILE + TILE/2 },
    { x: 17 * TILE + TILE/2, y: 11 * TILE + TILE/2 },
    { x:  2 * TILE + TILE/2, y: 11 * TILE + TILE/2 },
    { x:  2 * TILE + TILE/2, y:  2 * TILE + TILE/2 },
  ],
  ptIdx: 0,
  spd: 55,
  facing: 0,               // radians; 0 = +X (right)
  visionRange: 150,
  visionAngle: Math.PI / 2.5,  // ~72°
  suspicion: 0,           // 0–100
  alert: 'calm',          // 'calm' | 'suspicious' | 'alerted'
  name: 'Officer Pflueger',
};

// Capture record for post-mortem
var captureEvent = null; // { distPx, playerNoise, wasSprinting, tileName, guardName, guardFacing }

function resetStealth() {
  vaultOpen = false; hasLoot = false; knowsCode = false;
  noise = 0; paperFlash = 0; lootGlow = 0;
  captureEvent = null;
  // Roll a 4-digit code
  CODE = ('' + Math.floor(1000 + Math.random() * 9000));
  // Reset guard
  guard.x = guard.pts[0].x; guard.y = guard.pts[0].y;
  guard.ptIdx = 1; guard.facing = 0;
  guard.suspicion = 0; guard.alert = 'calm';
}

function guardFacingToCardinal(f) {
  // Return short label "N/E/S/W/NE/SE/SW/NW" from radians
  var d = ((f * 180 / Math.PI) % 360 + 360) % 360;
  var dirs = ['east','south-east','south','south-west','west','north-west','north','north-east'];
  return dirs[Math.round(d / 45) % 8];
}

function tileNameAt(px, py) {
  var t = tileAtPx(px, py);
  switch (t) {
    case T_FLOOR:  return 'a floorboard';
    case T_CREAK:  return 'a creaky board';
    case T_RUG:    return 'the rug';
    case T_PAPER:  return 'a desk';
    case T_KEYPAD: return 'the keypad';
    case T_LOOT:   return 'the vault';
    case T_DOOR:   return 'the back door';
    default:       return 'the floor';
  }
}

// ── Phase: title ─────────────────────────────────────────────────────────────
function drawTitleBackdrop(c) {
  c.fillStyle = '#0e1a0e'; c.fillRect(0, 0, W, H);
  // Faint brick pattern on left quarter
  c.fillStyle = '#1a2a1a';
  for (var r = 0; r < 12; r++) {
    for (var col = 0; col < 4; col++) {
      var bx = col * 48 + ((r % 2) ? 24 : 0);
      c.fillRect(bx, r * 48, 44, 44);
    }
  }
  // Streetlamp glow right
  var grd = c.createRadialGradient(W - 120, 180, 20, W - 120, 180, 260);
  grd.addColorStop(0, 'rgba(255,220,140,0.35)');
  grd.addColorStop(1, 'rgba(255,220,140,0)');
  c.fillStyle = grd; c.fillRect(0, 0, W, H);
}

function renderTitle() {
  drawCachedBackdrop('title', drawTitleBackdrop);
  ctx.clearRect(0, 0, W, H);
  txt('Duck Dieb 2', W/2, 170, '#ffd700', 56, 'center', 'bold 56px Georgia,serif');
  txt('Second Edition', W/2, 210, '#cde', 18, 'center', 'italic 18px Georgia,serif');
  txt('Checkpoint 1 — Stealth Slice', W/2, 240, '#7a9', 13, 'center', 'bold 13px monospace');

  // Start button
  var bx = W/2 - 110, by = 310, bw = 220, bh = 60;
  var over = mx >= bx && mx <= bx+bw && my >= by && my <= by+bh;
  rndRect(bx, by, bw, bh, 10, over ? '#3a5a2a' : '#2a3a1a', '#ffd700', 3);
  txt('Start', W/2, by + 40, '#ffd700', 28, 'center', 'bold 28px Georgia,serif');
  if (over && mclk) { mclk = false; startGame(); }

  txt(TOUCH_UI ? 'Tap Start' : 'Click Start or press Enter',
      W/2, 430, '#8a9', 14, 'center', 'bold 14px monospace');

  if (eat('Enter') || eat('Space')) startGame();
}

// ── Phase: play (stealth) ────────────────────────────────────────────────────
function drawTileBackdrop(c) {
  for (var r = 0; r < ROWS; r++) {
    for (var cc = 0; cc < COLS; cc++) {
      var t = MAP[r][cc];
      var x = cc * TILE, y = r * TILE;
      // Base floor
      c.fillStyle = '#6a4a2a';
      c.fillRect(x, y, TILE, TILE);
      if (t === T_WALL) {
        c.fillStyle = '#2a1a0e';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = '#0c0604'; c.lineWidth = 1;
        c.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (t === T_CREAK) {
        c.fillStyle = '#7a4a1a';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = 'rgba(0,0,0,0.45)'; c.lineWidth = 1;
        // Diagonal hatching hints at brittleness
        for (var k = -TILE; k < TILE; k += 6) {
          c.beginPath(); c.moveTo(x + k, y); c.lineTo(x + k + TILE, y + TILE); c.stroke();
        }
      } else if (t === T_RUG) {
        c.fillStyle = '#3a2a6a';
        c.fillRect(x, y, TILE, TILE);
        c.fillStyle = '#4a3a8a';
        c.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
      } else if (t === T_VAULT) {
        // Render initial state as wall; runtime overlay lifts it when opened
        c.fillStyle = '#3a2a1a';
        c.fillRect(x, y, TILE, TILE);
        c.strokeStyle = '#ffd700'; c.lineWidth = 2;
        c.strokeRect(x + 4, y + 4, TILE - 8, TILE - 8);
      }
      // Floor grain lines
      if (t === T_FLOOR) {
        c.strokeStyle = 'rgba(0,0,0,0.15)'; c.lineWidth = 1;
        c.beginPath(); c.moveTo(x, y + TILE - 0.5); c.lineTo(x + TILE, y + TILE - 0.5); c.stroke();
      }
    }
  }
}

// Find player's current nearest interactable tile (within one tile)
function nearestInteract(px, py) {
  var pc = Math.floor(px / TILE), pr = Math.floor(py / TILE);
  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      var t = tileAt(pc + dc, pr + dr);
      if (t === T_PAPER || t === T_KEYPAD || t === T_LOOT || t === T_DOOR) {
        var cx = (pc + dc) * TILE + TILE/2, cy = (pr + dr) * TILE + TILE/2;
        var d = Math.hypot(cx - px, cy - py);
        if (d < TILE * 0.95) return { tile: t, col: pc + dc, row: pr + dr, d: d };
      }
    }
  }
  return null;
}

// Axis-separated wall collision using a small player radius
function tryMove(p, nx, ny) {
  var R = 12;
  // X axis
  var tx = p.x + nx;
  if (!isBlocking(tileAtPx(tx + R, p.y)) && !isBlocking(tileAtPx(tx - R, p.y)) &&
      !isBlocking(tileAtPx(tx + R, p.y - R*0.6)) && !isBlocking(tileAtPx(tx - R, p.y - R*0.6)) &&
      !isBlocking(tileAtPx(tx + R, p.y + R*0.6)) && !isBlocking(tileAtPx(tx - R, p.y + R*0.6))) {
    p.x = tx;
  }
  // Y axis
  var ty = p.y + ny;
  if (!isBlocking(tileAtPx(p.x + R*0.6, ty + R)) && !isBlocking(tileAtPx(p.x - R*0.6, ty + R)) &&
      !isBlocking(tileAtPx(p.x + R*0.6, ty - R)) && !isBlocking(tileAtPx(p.x - R*0.6, ty - R))) {
    p.y = ty;
  }
}

function updateGuard(dt) {
  // Pursue player when alerted, otherwise follow patrol
  var tgt;
  if (guard.alert === 'alerted') {
    tgt = { x: player.x, y: player.y };
  } else {
    tgt = guard.pts[guard.ptIdx];
  }
  var dx = tgt.x - guard.x, dy = tgt.y - guard.y;
  var d = Math.hypot(dx, dy);
  if (d > 1) {
    var spd = guard.spd * (guard.alert === 'alerted' ? 1.8 : (guard.alert === 'suspicious' ? 0.0 : 1.0));
    var step = Math.min(spd * dt, d);
    guard.x += dx / d * step;
    guard.y += dy / d * step;
    // Only rotate facing when actually moving
    if (spd > 0) guard.facing = Math.atan2(dy, dx);
  }
  if (guard.alert !== 'alerted' && d < 4) {
    guard.ptIdx = (guard.ptIdx + 1) % guard.pts.length;
  }

  // Vision check
  var pdx = player.x - guard.x, pdy = player.y - guard.y;
  var pd  = Math.hypot(pdx, pdy);
  var seen = false;
  if (pd < guard.visionRange) {
    var ang = Math.atan2(pdy, pdx);
    var diff = Math.atan2(Math.sin(ang - guard.facing), Math.cos(ang - guard.facing));
    if (Math.abs(diff) < guard.visionAngle / 2) {
      if (!lineBlocked(guard.x, guard.y, player.x, player.y)) seen = true;
    }
  }

  // Suspicion update
  if (seen) {
    var closeness = 1 - Math.min(1, pd / guard.visionRange);
    guard.suspicion += (30 + 60 * closeness) * dt;
  } else {
    guard.suspicion -= 35 * dt;
  }
  // Noise nudges suspicion when loud
  if (noise > 70) guard.suspicion += (noise - 70) * 0.35 * dt;
  guard.suspicion = Math.max(0, Math.min(100, guard.suspicion));
  guard.alert = guard.suspicion >= 80 ? 'alerted'
              : guard.suspicion >= 35 ? 'suspicious' : 'calm';

  if (guard.suspicion >= 100 || (guard.alert === 'alerted' && pd < 26)) {
    captureEvent = {
      distPx: Math.round(pd),
      playerNoise: Math.round(noise),
      wasSprinting: !!player.sprinting,
      tileName: tileNameAt(player.x, player.y),
      guardName: guard.name,
      guardFacing: guardFacingToCardinal(guard.facing),
      px: player.x, py: player.y,
      gx: guard.x, gy: guard.y, gFacing: guard.facing,
      gRange: guard.visionRange, gAngle: guard.visionAngle,
    };
    setPhase('caught');
  }
}

function updatePlay(dt) {
  var vx = 0, vy = 0;
  if (isLeft())  vx -= 1;
  if (isRight()) vx += 1;
  if (isUp())    vy -= 1;
  if (isDown())  vy += 1;
  var moving = (vx || vy);
  var sprint = !!(K.ShiftLeft || K.ShiftRight);
  player.sprinting = sprint && moving;
  var speed = player.sprinting ? 260 : 150;
  if (moving) {
    var len = Math.sqrt(vx*vx + vy*vy);
    vx /= len; vy /= len;
    tryMove(player, vx * speed * dt, vy * speed * dt);
    if (Math.abs(vx) >= Math.abs(vy)) player.facing = vx < 0 ? 'left' : 'right';
    else                              player.facing = vy < 0 ? 'up'   : 'down';
  }

  // Noise — Samster-inspired graduated meter
  var currentTile = tileAtPx(player.x, player.y);
  if (moving) {
    var baseRate = (currentTile === T_CREAK) ? 0.8
                 : (currentTile === T_RUG)   ? 0.0
                 : 0.12;
    var mult = player.sprinting ? 2.2 : 1.0;
    noise += baseRate * mult * noiseRate * (dt * 60);
  } else {
    noise -= 35 * dt;
  }
  noise = Math.max(0, Math.min(100, noise));

  // Interaction
  if (eatAction()) {
    var ni = nearestInteract(player.x, player.y);
    if (ni) {
      if (ni.tile === T_PAPER) {
        knowsCode = true; paperFlash = 2.0;
      } else if (ni.tile === T_KEYPAD) {
        if (knowsCode) {
          setPhase('keypad');
          return;
        } else {
          paperFlash = 1.2; // reuse as "nope, read the paper first" pulse
        }
      } else if (ni.tile === T_LOOT && vaultOpen) {
        hasLoot = true; lootGlow = 2.0;
      } else if (ni.tile === T_DOOR && hasLoot) {
        setPhase('escaped');
        return;
      }
    }
  }
  if (eat('Escape')) setPhase('title');

  paperFlash = Math.max(0, paperFlash - dt);
  lootGlow   = Math.max(0, lootGlow + dt);

  updateGuard(dt);
}

// Vision cone fill on the foreground canvas (semi-transparent)
function drawVisionCone(g, col) {
  ctx.save();
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(g.x, g.y);
  var seg = 14;
  var a0 = g.facing - g.visionAngle / 2;
  var a1 = g.facing + g.visionAngle / 2;
  for (var i = 0; i <= seg; i++) {
    var a = a0 + (a1 - a0) * (i / seg);
    // Shorten ray if blocked
    var r = g.visionRange;
    var steps = 16;
    for (var k = 1; k <= steps; k++) {
      var t = k / steps;
      if (isBlocking(tileAtPx(g.x + Math.cos(a) * r * t, g.y + Math.sin(a) * r * t))) {
        r = r * (k - 1) / steps; break;
      }
    }
    ctx.lineTo(g.x + Math.cos(a) * r, g.y + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawGuardSprite(g) {
  // Body
  circ(g.x, g.y, 13, '#2a4a8a', '#0a0a18', 2);
  // Hat
  ctx.save();
  ctx.translate(g.x, g.y); ctx.rotate(g.facing);
  ctx.fillStyle = '#111';
  ctx.fillRect(-6, -12, 12, 4);
  // Badge
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(6, 0, 2.5, 0, TAU); ctx.fill();
  ctx.restore();
  // Alert bubble
  if (g.alert === 'suspicious') {
    txt('?', g.x + 14, g.y - 12, '#ffe060', 18, 'left', 'bold 18px Georgia,serif');
  } else if (g.alert === 'alerted') {
    txt('!', g.x + 14, g.y - 12, '#ff5555', 20, 'left', 'bold 20px Georgia,serif');
  }
}

function renderPlay() {
  drawCachedBackdrop('room-1', drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);

  // Vault overlay: if open, paint floor over the gate tile
  if (vaultOpen) {
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
      if (MAP[r][c] === T_VAULT) {
        ctx.fillStyle = '#6a4a2a';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
      }
    }
  }

  // Interactable glyphs
  for (var rr = 0; rr < ROWS; rr++) for (var cc = 0; cc < COLS; cc++) {
    var t = MAP[rr][cc];
    var x = cc * TILE + TILE/2, y = rr * TILE + TILE/2;
    if (t === T_PAPER) {
      // Desk with paper
      rndRect(cc * TILE + 6, rr * TILE + 12, 28, 22, 3, '#5a3a1a', '#2a1a0a', 1.5);
      rndRect(cc * TILE + 10, rr * TILE + 8, 20, 14, 2, '#fff8d8', '#888', 1);
      if (paperFlash > 0) {
        ctx.globalAlpha = Math.min(1, paperFlash);
        rndRect(cc * TILE + 6, rr * TILE + 4, 28, 32, 4, null, '#ffd700', 2);
        ctx.globalAlpha = 1;
      }
    } else if (t === T_KEYPAD) {
      rndRect(cc * TILE + 10, rr * TILE + 10, 20, 20, 3, '#222', '#ffd700', 1.5);
      for (var kk = 0; kk < 9; kk++) {
        var kx = cc * TILE + 13 + (kk % 3) * 5;
        var ky = rr * TILE + 13 + Math.floor(kk / 3) * 5;
        ctx.fillStyle = '#ffd700'; ctx.fillRect(kx, ky, 3, 3);
      }
    } else if (t === T_LOOT && !hasLoot) {
      var pulse = 0.5 + 0.5 * Math.sin(lootGlow * 4);
      ctx.globalAlpha = 0.5 + 0.4 * pulse;
      circ(x, y, 18, 'rgba(255,215,0,0.4)');
      ctx.globalAlpha = 1;
      ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\uD83C\uDFC6', x, y);  // 🏆
    } else if (t === T_DOOR) {
      rndRect(cc * TILE + 4, rr * TILE + 4, TILE - 8, TILE - 8, 4,
              hasLoot ? '#3a5a2a' : '#6b3a1a', hasLoot ? '#ffd700' : '#4a2a0a', 2);
      circ(x + 6, y, 2.5, '#ffd700');
    }
  }

  // Guard vision cone
  var coneCol = guard.alert === 'alerted'    ? 'rgba(255,80,80,0.32)'
              : guard.alert === 'suspicious' ? 'rgba(255,200,80,0.26)'
              :                                'rgba(255,255,180,0.16)';
  drawVisionCone(guard, coneCol);

  drawGuardSprite(guard);
  drawDuck(player.x, player.y, player.facing);

  // HUD strip
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 36);
  txt('DUCK DIEB 2 · CP1', 12, 24, '#ffd700', 13, 'left', 'bold 13px monospace');

  // Noise meter
  var nLabel = noise < 30 ? '🕊 Calm' : noise < 70 ? '👂 Stirring' : '🚨 Alerted';
  txt('noise', 220, 18, '#cde', 10, 'left', 'bold 10px monospace');
  rndRect(220, 22, 140, 10, 3, '#111', '#555', 1);
  var nCol = noise < 30 ? '#5a8a3a' : noise < 70 ? '#c8a040' : '#c85050';
  ctx.fillStyle = nCol; ctx.fillRect(222, 24, Math.max(0, 136 * noise / 100), 6);
  txt(nLabel, 370, 26, '#fff', 11, 'left', 'bold 11px monospace');

  // Objective readout
  var obj = !knowsCode  ? 'find the code'
          : !vaultOpen  ? 'enter code on keypad'
          : !hasLoot    ? 'grab the trophy'
          :               'escape through the door';
  txt('objective: ' + obj, 560, 24, '#ffe060', 12, 'left', 'bold 12px monospace');

  // Interaction prompt
  var ni = nearestInteract(player.x, player.y);
  if (ni) {
    var label = ni.tile === T_PAPER  ? 'READ'
              : ni.tile === T_KEYPAD ? (knowsCode ? 'ENTER CODE' : 'need the code')
              : ni.tile === T_LOOT   ? (vaultOpen ? 'GRAB' : 'locked')
              : ni.tile === T_DOOR   ? (hasLoot ? 'ESCAPE' : 'door locked')
              :                        '';
    if (label) {
      var cx = ni.col * TILE + TILE/2, cy = ni.row * TILE - 4;
      var w = label.length * 7 + 12;
      rndRect(cx - w/2, cy - 18, w, 18, 4, 'rgba(0,0,0,0.75)', '#ffd700', 1.5);
      txt(label, cx, cy - 4, '#ffd700', 11, 'center', 'bold 11px monospace');
    }
  }

  if (knowsCode && !vaultOpen) {
    txt('code: ' + CODE, W/2, H - 18, '#ffd700', 13, 'center', 'bold 13px monospace');
  }
}

// ── Phase: keypad (in-world, canvas-drawn) ───────────────────────────────────
var keypadEntry = '';
var keypadError = 0; // shake timer after wrong entry

function openKeypad() { keypadEntry = ''; keypadError = 0; setPhase('keypad'); }

function keypadButtons() {
  // 3×4 grid: 1-9, ⌫, 0, OK
  var bw = 64, bh = 54, gap = 10;
  var gridW = 3 * bw + 2 * gap, gridH = 4 * bh + 3 * gap;
  var x0 = (W - gridW) / 2, y0 = 160;
  var labels = ['1','2','3','4','5','6','7','8','9','⌫','0','OK'];
  var btns = [];
  for (var i = 0; i < 12; i++) {
    var col = i % 3, row = Math.floor(i / 3);
    btns.push({
      x: x0 + col * (bw + gap), y: y0 + row * (bh + gap),
      w: bw, h: bh, label: labels[i],
      value: labels[i] === '⌫' ? 'back' : labels[i] === 'OK' ? 'ok' : labels[i],
    });
  }
  // Cancel below
  btns.push({ x: W/2 - 60, y: y0 + 4 * (bh + gap) + 10, w: 120, h: 34,
              label: 'Cancel', value: 'cancel' });
  return btns;
}

function keypadPress(v) {
  if (v === 'cancel') { setPhase('play'); return; }
  if (v === 'back') { keypadEntry = keypadEntry.slice(0, -1); return; }
  if (v === 'ok') {
    if (keypadEntry === CODE) {
      vaultOpen = true;
      clearBackdropCache();  // redraw room without the vault gate
      setPhase('play');
    } else {
      keypadError = 0.6;
      keypadEntry = '';
    }
    return;
  }
  if (keypadEntry.length < 4) keypadEntry += v;
}

function updateKeypad(dt) {
  if (keypadError > 0) keypadError -= dt;
  // Keyboard shortcuts
  for (var i = 0; i <= 9; i++) {
    if (eat('Digit' + i) || eat('Numpad' + i)) keypadPress('' + i);
  }
  if (eat('Backspace')) keypadPress('back');
  if (eat('Enter'))     keypadPress('ok');
  if (eat('Escape'))    keypadPress('cancel');

  // Taps / clicks
  if (mclk) {
    mclk = false;
    var btns = keypadButtons();
    for (var j = 0; j < btns.length; j++) {
      var b = btns[j];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        keypadPress(b.value); break;
      }
    }
  }
}

function renderKeypad() {
  drawCachedBackdrop('room-1', drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);
  // Dim underlying scene
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  var px = W/2 - 180, py = 70, pw = 360, ph = 460;
  var shakeX = keypadError > 0 ? (Math.sin(keypadError * 50) * 6) : 0;
  ctx.save(); ctx.translate(shakeX, 0);
  rndRect(px, py, pw, ph, 14, '#12121e', '#ffd700', 3);

  txt('Vault Keypad', W/2, py + 32, '#ffd700', 22, 'center', 'bold 22px Georgia,serif');
  txt('expected: 4 digits', W/2, py + 54, '#8aa', 11, 'center', 'bold 11px monospace');

  // Display
  rndRect(W/2 - 110, py + 72, 220, 48, 6, '#0a0a14', '#3a3a5a', 2);
  var disp = keypadEntry + '_'.repeat(Math.max(0, 4 - keypadEntry.length));
  txt(disp.split('').join(' '), W/2, py + 104, '#fff', 28, 'center', 'bold 28px monospace');

  // Buttons
  var btns = keypadButtons();
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    var over = mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    var fill = b.value === 'ok'     ? (over ? '#3a8a3a' : '#2a5a2a')
             : b.value === 'cancel' ? (over ? '#8a3a3a' : '#5a2a2a')
             :                        (over ? '#2a2a44' : '#1e1e30');
    var stroke = b.value === 'ok' ? '#4dff4d' : b.value === 'cancel' ? '#ff6a6a' : '#3a3a5a';
    rndRect(b.x, b.y, b.w, b.h, 8, fill, stroke, 1.5);
    txt(b.label, b.x + b.w/2, b.y + b.h/2 + 8, '#fff',
        b.value === 'cancel' ? 13 : 22, 'center',
        'bold ' + (b.value === 'cancel' ? 13 : 22) + 'px monospace');
  }

  if (keypadError > 0) {
    txt('wrong code', W/2, py + ph - 16, '#ff6666', 14, 'center', 'bold 14px monospace');
  }
  ctx.restore();
}

// ── Phase: caught (post-mortem) ──────────────────────────────────────────────
function renderCaught() {
  drawCachedBackdrop('room-1', drawTileBackdrop);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(10,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  txt('BUSTED', W/2, 86, '#ff5555', 48, 'center', 'bold 48px Georgia,serif');

  // Post-mortem card
  var px = W/2 - 260, py = 120, pw = 520, ph = 280;
  rndRect(px, py, pw, ph, 12, '#181022', '#ff5555', 2);

  if (captureEvent) {
    var e = captureEvent;
    var lines = [
      e.guardName + ' spotted you.',
      'Distance: ' + e.distPx + 'px · guard facing ' + e.guardFacing + '.',
      'You were on ' + e.tileName + (e.wasSprinting ? ' — sprinting.' : '.'),
      'Noise level at capture: ' + e.playerNoise + '/100.',
    ];
    for (var i = 0; i < lines.length; i++) {
      txt(lines[i], px + 20, py + 40 + i * 26, '#ffe0e0', 15, 'left', 'bold 15px Georgia,serif');
    }

    // Mini schematic of the capture moment
    var sx = px + 20, sy = py + 150, sw = pw - 40, sh = 110;
    var scale = Math.min(sw / (COLS * TILE), sh / (ROWS * TILE));
    rndRect(sx, sy, sw, sh, 6, '#0a0612', '#5a3a3a', 1);
    ctx.save();
    ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();
    ctx.translate(sx + (sw - COLS * TILE * scale) / 2, sy + (sh - ROWS * TILE * scale) / 2);
    ctx.scale(scale, scale);
    // Walls only (quick)
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
      if (MAP[r][c] === T_WALL) {
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
      }
    }
    // Guard cone
    ctx.fillStyle = 'rgba(255,80,80,0.4)';
    ctx.beginPath();
    ctx.moveTo(e.gx, e.gy);
    var a0 = e.gFacing - e.gAngle / 2, a1 = e.gFacing + e.gAngle / 2;
    for (var k = 0; k <= 12; k++) {
      var a = a0 + (a1 - a0) * (k / 12);
      ctx.lineTo(e.gx + Math.cos(a) * e.gRange, e.gy + Math.sin(a) * e.gRange);
    }
    ctx.closePath(); ctx.fill();
    // Guard + player pips
    ctx.fillStyle = '#ff8888';
    ctx.beginPath(); ctx.arc(e.gx, e.gy, 12, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(e.px, e.py, 10, 0, TAU); ctx.fill();
    ctx.restore();
  } else {
    txt('(no capture details recorded)', W/2, py + 80, '#ffe0e0', 14, 'center', 'bold 14px monospace');
  }

  // Retry / title buttons
  var by = py + ph + 20;
  var rb = { x: W/2 - 160, y: by, w: 150, h: 48 };
  var tb = { x: W/2 + 10,  y: by, w: 150, h: 48 };
  function drawBtn(b, label, col) {
    var over = mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
    rndRect(b.x, b.y, b.w, b.h, 8, over ? col : '#222', '#ffd700', 2);
    txt(label, b.x + b.w/2, b.y + 32, '#ffd700', 18, 'center', 'bold 18px Georgia,serif');
    return over;
  }
  var rOver = drawBtn(rb, 'Try Again', '#3a5a2a');
  var tOver = drawBtn(tb, 'Title',     '#3a3a5a');
  if ((rOver && mclk) || eat('Enter') || eat('Space')) { mclk = false; startGame(); }
  if (tOver && mclk) { mclk = false; setPhase('title'); }
}

// ── Fixed-timestep main loop ─────────────────────────────────────────────────
var SIM_STEP = 1/60;
var simDebt = 0, lastTs = 0;
var lastDraw = 0;

function stepSim(dt) {
  switch (phase) {
    case 'play':   updatePlay(dt);   break;
    case 'keypad': updateKeypad(dt); break;
  }
}

function renderPhase() {
  switch (phase) {
    case 'title':   renderTitle();   break;
    case 'play':    renderPlay();    break;
    case 'keypad':  renderKeypad();  break;
    case 'caught':  renderCaught();  break;
    case 'escaped': renderEscaped(); break;
  }
  drawMobileControls();
}

function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTs) lastTs = ts;
  var elapsed = Math.min((ts - lastTs) / 1000, SIM_STEP * 6);
  lastTs = ts;
  simDebt += elapsed;
  while (simDebt >= SIM_STEP) {
    stepSim(SIM_STEP);
    simDebt -= SIM_STEP;
  }
  // Throttle draw in low-fps phases
  var targetMs = LOW_FPS_PHASES[phase] ? (1000/30) : (1000/60);
  if (ts - lastDraw < targetMs - 2) return;
  lastDraw = ts;
  renderPhase();
  mclk = false;
  Object.keys(JP).forEach(function(k) { JP[k] = false; });
}
requestAnimationFrame(loop);
</script>
