<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mucko Smash</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0b1622;
    font-family: Georgia, serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #stage {
    position: fixed;
    transform-origin: top left;
  }
  #game {
    display: block;
    background: #7cc3e6;
    touch-action: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
  </div>
  <script src="../mucko-engine.js"></script>
  <script>
'use strict';

/* ── Constants ─────────────────────────────────────────────── */
var W = 800;
var H = 560;
var TAU = Math.PI * 2;

var GRAVITY     = 1400;
var MOVE_ACCEL_GROUND = 2000;
var MOVE_ACCEL_AIR    = 1100;
var MOVE_MAX    = 260;
var GROUND_FRIC = 1700;
// Peak jump height ≈ JUMP_VEL^2 / (2*GRAVITY).
// 760^2 / 2800 ≈ 206 px — enough to clear the tallest generated platform
// (see makeArena: y range [280, 420]) from the floor (y=470).
var JUMP_VEL    = 760;
var JUMP_CUT    = 340;
var TERM_VEL    = 1000;

// Entity vertical pivot sits this many px above the feet.
// drawCharacter() draws a shadow at +18 in local space.
var FEET_OFFSET = 18;
var ENTITY_W    = 30;

/* ── Canvas + engine bootstrap ─────────────────────────────── */
var canvas = document.getElementById('game');
var ctx = MuckoEngine.initCanvas(canvas, W, H);
ctx.lineJoin = 'round';
ctx.lineCap  = 'round';

var input = MuckoEngine.makeInput();
var K = input.K;
var JP = input.JP;
var eat = input.eat;

var audio = MuckoEngine.makeAudio();
var beep = audio.beep;

var TOUCH_UI = MuckoEngine.TOUCH_UI();

/* ── Pointer state ─────────────────────────────────────────── */
var mx = W / 2;
var my = H / 2;
var mclk = false;
var touchSuppressUntil = 0;
var touchState = { leftBtn: false, rightBtn: false, jumpBtn: false, jumpJustPressed: false };

function setPointerFromEvent(e) {
  var r = canvas.getBoundingClientRect();
  mx = (e.clientX - r.left) * (W / r.width);
  my = (e.clientY - r.top)  * (H / r.height);
}
canvas.addEventListener('mousemove', function(e) { setPointerFromEvent(e); });
canvas.addEventListener('click', function(e) {
  if (performance.now() < touchSuppressUntil) return;
  setPointerFromEvent(e);
  mclk = true;
});

/* ── Characters (copied from lakehousemath) ────────────────── */
var CHARACTERS = {
  samster: { name: 'Samster',        color: '#dfc18e', accent: '#8d5f35', outline: '#4f311d', sprite: 'hamster' },
  duck:    { name: 'Duck Dieb',      color: '#f3f1eb', accent: '#161616', outline: '#2a2217', sprite: 'duck' },
  hippo:   { name: 'Hippo',          color: '#8f7ea8', accent: '#63557b', outline: '#40324c', sprite: 'hippo' },
  nik:     { name: 'Nik',            color: '#83c7e3', accent: '#3f7da0', outline: '#24506d', sprite: 'seal' },
  lekan:   { name: 'Lekan',          color: '#f4f4f4', accent: '#242424', outline: '#202020', sprite: 'panda' },
  basil:   { name: 'Basil',          color: '#d1b48d', accent: '#48683c', outline: '#4d3726', sprite: 'keeper' },
  mucko:   { name: 'Captain Mucko',  color: '#d8a95a', accent: '#8f2f2f', outline: '#5f3914', sprite: 'captain' },
  rocket:  { name: 'Saturn V',       color: '#ededed', accent: '#d76039', outline: '#373737', sprite: 'rocket' }
};
var CHAR_IDS = ['samster', 'duck', 'hippo', 'nik', 'lekan', 'basil', 'mucko', 'rocket'];

// CPU difficulty "moods" — drive AI dwell time and jump frequency.
// idleChance + walkChance + jumpChance must sum to 1.
var MOODS = {
  chill:  { dwellMin: 1.0, dwellMax: 2.2, idleChance: 0.50, walkChance: 0.40, jumpChance: 0.10, label: 'CHILL'  },
  normal: { dwellMin: 0.5, dwellMax: 1.4, idleChance: 0.25, walkChance: 0.55, jumpChance: 0.20, label: 'NORMAL' },
  frisky: { dwellMin: 0.25, dwellMax: 0.9, idleChance: 0.10, walkChance: 0.50, jumpChance: 0.40, label: 'FRISKY' }
};
var CPU_MODES = ['off', 'chill', 'normal', 'frisky'];

/* ── Drawing helpers (from lakehousemath) ──────────────────── */
function roundRectPath(cx, x, y, w, h, r) {
  var rr = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
  cx.beginPath();
  cx.moveTo(x + rr, y);
  cx.lineTo(x + w - rr, y); cx.quadraticCurveTo(x + w, y, x + w, y + rr);
  cx.lineTo(x + w, y + h - rr); cx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  cx.lineTo(x + rr, y + h); cx.quadraticCurveTo(x, y + h, x, y + h - rr);
  cx.lineTo(x, y + rr); cx.quadraticCurveTo(x, y, x + rr, y);
  cx.closePath();
}
function fillRoundRect(cx, x, y, w, h, r, fill, stroke, sw) {
  roundRectPath(cx, x, y, w, h, r);
  if (fill)   { cx.fillStyle = fill; cx.fill(); }
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = sw || 2; cx.stroke(); }
}
function drawLine(cx, x1, y1, x2, y2, color, width) {
  cx.strokeStyle = color; cx.lineWidth = width || 2;
  cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
}
function drawText(cx, text, x, y, color, size, align, font, baseline) {
  cx.fillStyle = color;
  cx.font = (font || 'bold') + ' ' + (size || 16) + 'px Georgia,serif';
  cx.textAlign = align || 'left';
  cx.textBaseline = baseline || 'alphabetic';
  cx.fillText(text, x, y);
}
function drawCircle(cx, x, y, r, fill, stroke, sw) {
  cx.beginPath(); cx.arc(x, y, r, 0, TAU);
  if (fill)   { cx.fillStyle = fill; cx.fill(); }
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = sw || 2; cx.stroke(); }
}
function drawEllipse(cx, x, y, rx, ry, fill, stroke, sw, rot) {
  cx.beginPath(); cx.ellipse(x, y, rx, ry, rot || 0, 0, TAU);
  if (fill)   { cx.fillStyle = fill; cx.fill(); }
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = sw || 2; cx.stroke(); }
}

/* ── Character sprites (copied verbatim from lakehousemath) ── */
function drawCharacter(cx, id, x, y, facing, bob, shadowScale) {
  var ch = CHARACTERS[id];
  var bounce = Math.sin(bob || 0) * 1.5;
  cx.save();
  cx.translate(x, y + bounce);
  if (facing === 'left') cx.scale(-1, 1);
  drawEllipse(cx, 0, 18, 16 * (shadowScale || 1), 6 * (shadowScale || 1), 'rgba(0,0,0,.16)');
  if (ch.sprite === 'hamster') {
    drawEllipse(cx, 0, 2, 16, 14, ch.color, ch.outline, 2);
    drawCircle(cx, -8, -10, 6, ch.color, ch.outline, 2);
    drawCircle(cx, 8, -10, 6, ch.color, ch.outline, 2);
    drawCircle(cx, 0, -2, 11, '#f5ddbc');
    drawCircle(cx, -4, -4, 2, '#35231b');
    drawCircle(cx, 4, -4, 2, '#35231b');
    drawCircle(cx, 0, 1, 2.2, '#c56f62');
  } else if (ch.sprite === 'duck') {
    drawEllipse(cx, -2, 4, 16, 12, '#f2f0eb', ch.outline, 2);
    drawEllipse(cx, 10, -6, 10, 9, '#f2f0eb', ch.outline, 2);
    fillRoundRect(cx, 4, -10, 14, 6, 3, ch.accent);
    drawCircle(cx, 9, -8, 1.8, '#f2f0eb');
    drawEllipse(cx, 20, -2, 7, 4, '#e8a34a', '#9c5e1d', 1.4);
    cx.fillStyle = '#202020';
    cx.beginPath(); cx.moveTo(-12, 2); cx.lineTo(-22, 16); cx.lineTo(-6, 12); cx.closePath(); cx.fill();
  } else if (ch.sprite === 'hippo') {
    drawEllipse(cx, 0, 5, 20, 15, ch.color, ch.outline, 2);
    drawCircle(cx, -9, -7, 5, ch.color, ch.outline, 2);
    drawCircle(cx, 9, -7, 5, ch.color, ch.outline, 2);
    drawEllipse(cx, 0, 0, 12, 9, '#b8a7d4');
    drawCircle(cx, -4, -2, 1.8, '#2e2338');
    drawCircle(cx, 4, -2, 1.8, '#2e2338');
    drawCircle(cx, -3, 4, 1.6, '#6f5b88');
    drawCircle(cx, 3, 4, 1.6, '#6f5b88');
  } else if (ch.sprite === 'seal') {
    drawEllipse(cx, 0, 5, 18, 12, ch.color, ch.outline, 2);
    drawCircle(cx, 10, -3, 9, ch.color, ch.outline, 2);
    cx.fillStyle = ch.color;
    cx.beginPath(); cx.moveTo(-16, 6); cx.lineTo(-26, -1); cx.lineTo(-26, 13); cx.closePath(); cx.fill();
    drawCircle(cx, 12, -5, 1.8, '#1f3444');
    drawCircle(cx, 7, 2, 1.4, '#1f3444');
  } else if (ch.sprite === 'panda') {
    drawEllipse(cx, 0, 5, 17, 13, '#f4f4f4', ch.outline, 2);
    drawCircle(cx, -8, -9, 5, '#1c1c1c');
    drawCircle(cx, 8, -9, 5, '#1c1c1c');
    drawCircle(cx, 0, -2, 10, '#f4f4f4', ch.outline, 2);
    drawEllipse(cx, -4, -3, 3, 4, '#1c1c1c');
    drawEllipse(cx, 4, -3, 3, 4, '#1c1c1c');
    drawCircle(cx, -4, -3, 1.4, '#fff');
    drawCircle(cx, 4, -3, 1.4, '#fff');
    drawCircle(cx, 0, 2, 2, '#1c1c1c');
  } else if (ch.sprite === 'keeper') {
    drawCircle(cx, 0, -4, 10, '#f2d6b0', '#69492b', 2);
    fillRoundRect(cx, -6, -18, 20, 8, 4, ch.accent, '#2d4927', 1.4);
    fillRoundRect(cx, -12, 6, 24, 22, 8, '#7f5d3e', '#4d3726', 2);
    drawLine(cx, -8, 12, -16, 26, '#4d3726', 3);
    drawLine(cx, 8, 12, 16, 26, '#4d3726', 3);
  } else if (ch.sprite === 'captain') {
    drawCircle(cx, 0, -4, 10, '#f3d7ae', '#744b23', 2);
    fillRoundRect(cx, -10, -18, 22, 8, 4, '#ffffff', '#8f2f2f', 1.6);
    fillRoundRect(cx, -14, 6, 28, 24, 8, '#d8a95a', '#744b23', 2);
    drawLine(cx, -10, 12, -16, 28, '#744b23', 3);
    drawLine(cx, 10, 12, 16, 28, '#744b23', 3);
  } else if (ch.sprite === 'rocket') {
    fillRoundRect(cx, -9, -16, 18, 40, 9, '#f0f0f0', '#464646', 2);
    cx.fillStyle = '#d76039';
    cx.beginPath(); cx.moveTo(-9, 14); cx.lineTo(-18, 24); cx.lineTo(-6, 20); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(9, 14); cx.lineTo(18, 24); cx.lineTo(6, 20); cx.closePath(); cx.fill();
    cx.fillStyle = '#d76039';
    cx.beginPath(); cx.moveTo(0, -28); cx.lineTo(-10, -12); cx.lineTo(10, -12); cx.closePath(); cx.fill();
    drawCircle(cx, 0, -2, 4, '#84cbe8', '#3f7e9a', 1.4);
    drawLine(cx, -4, 24, -8, 32, '#444', 3);
    drawLine(cx, 4, 24, 8, 32, '#444', 3);
  }
  cx.restore();
}

/* ── RNG + arena generation ───────────────────────────────── */
function seededRng(seed) {
  var s = seed >>> 0;
  if (s === 0) s = 1;
  return function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 0x100000000;
  };
}

function makeArena(seed) {
  var rng = seededRng(seed);
  var platforms = [];
  // Main floor: centered with open gaps on both sides so you can fall off.
  platforms.push({ x: 120, y: 470, w: 560, h: 18, isFloor: true });
  // 3..5 floating platforms above.
  var n = 3 + Math.floor(rng() * 3);
  var attempts = 0;
  while (platforms.length - 1 < n && attempts < 40) {
    attempts++;
    var w = 100 + Math.floor(rng() * 80);
    var x = 60 + Math.floor(rng() * (W - 120 - w));
    // y range keeps every platform within one jump of the floor (y=470).
    // Reachable from floor: y >= 470 - peakJumpHeight ≈ 264.
    var y = 280 + Math.floor(rng() * 140);
    // Reject platforms that stack too close to another.
    var ok = true;
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (Math.abs(y - p.y) < 60 && x < p.x + p.w + 30 && x + w > p.x - 30) { ok = false; break; }
    }
    if (ok) platforms.push({ x: x, y: y, w: w, h: 12, isFloor: false });
  }
  return platforms;
}

/* ── Entity factory ────────────────────────────────────────── */
function makeEntity(charId, x, y, isCPU, mood) {
  return {
    charId: charId,
    x: x, y: y,
    vx: 0, vy: 0,
    w: ENTITY_W,
    onGround: false,
    facing: 'right',
    invulnFrames: 0,
    damage: 0,     // unused until Stage 4
    stocks: 3,     // unused until Stage 4
    isCPU: !!isCPU,
    bob: 0,
    prevFootY: y + FEET_OFFSET,
    ai: isCPU ? {
      mood: mood || MOODS.normal,
      state: 'idle',        // 'idle' | 'walk_left' | 'walk_right' | 'jump'
      timer: 0.3,
      inputLeft: false,
      inputRight: false,
      inputJumpPressed: false,
      inputJumpHeld: false,
      jumpCooldown: 0
    } : null
  };
}

/* ── Top-level state ───────────────────────────────────────── */
// Slots drive the lobby. Slot 0 is the human player; 1..3 are CPUs.
// player mode: 'play' | 'spectator'
// cpu mode:    'off'  | 'chill' | 'normal' | 'frisky'
var state = {
  phase: 'title',          // 'title' | 'select' | 'play'
  phaseTime: 0,
  slots: [
    { kind: 'player', charIdx: 0, mode: 'play' },
    { kind: 'cpu',    charIdx: 1, mode: 'normal' },
    { kind: 'cpu',    charIdx: 2, mode: 'off' },
    { kind: 'cpu',    charIdx: 3, mode: 'off' }
  ],
  entities: [],
  platforms: [],
  seed: 0,
  respawnFlash: 0          // global "you just respawned" tint timer
};

function slotActive(s) {
  if (s.kind === 'player') return s.mode === 'play';
  return s.mode !== 'off';
}
function activeSlotCount() {
  var n = 0;
  for (var i = 0; i < state.slots.length; i++) if (slotActive(state.slots[i])) n++;
  return n;
}

function startPlay() {
  state.seed = (Date.now() ^ Math.floor(Math.random() * 0xffffffff)) >>> 0;
  state.platforms = makeArena(state.seed);
  state.entities = [];
  // Spawn active fighters spaced across the stage.
  var activeSlots = [];
  for (var i = 0; i < state.slots.length; i++) if (slotActive(state.slots[i])) activeSlots.push(state.slots[i]);
  var n = activeSlots.length;
  for (var j = 0; j < n; j++) {
    var s = activeSlots[j];
    var sx = (W * (j + 1)) / (n + 1);
    var sy = 80 + (j % 2) * 40;
    var isCPU = s.kind === 'cpu';
    var mood = isCPU ? MOODS[s.mode] : null;
    state.entities.push(makeEntity(CHAR_IDS[s.charIdx], sx, sy, isCPU, mood));
  }
  state.respawnFlash = 0;
  state.phase = 'play';
  state.phaseTime = 0;
}

function respawn(e) {
  e.x = W / 2;
  e.y = 60;
  e.vx = 0;
  e.vy = 0;
  e.invulnFrames = 60;
  e.facing = 'right';
  state.respawnFlash = 0.4;
  beep(180, 0.18, 0.28, 'sawtooth');
}

/* ── Player input resolution ───────────────────────────────── */
function playerLeft()  { return K.ArrowLeft  || K.KeyA || touchState.leftBtn; }
function playerRight() { return K.ArrowRight || K.KeyD || touchState.rightBtn; }
function jumpHeld()    { return K.Space || K.ArrowUp || K.KeyW || touchState.jumpBtn; }
function jumpPressed() {
  var kp = eat('Space') || eat('ArrowUp') || eat('KeyW');
  if (touchState.jumpJustPressed) { touchState.jumpJustPressed = false; return true; }
  return kp;
}

/* ── CPU AI: picks new behaviour once per frame, latches inputs ─ */
function cpuThink(e, dt) {
  var s = e.ai;
  s.jumpCooldown = Math.max(0, s.jumpCooldown - dt);
  s.timer -= dt;

  // Edge avoidance: if near a blast zone and on the ground, steer inward.
  // The floor runs x ∈ [120, 680]; blast zones are at x < -60 and x > W+60.
  var nearLeft  = e.x < 170 && e.onGround;
  var nearRight = e.x > W - 170 && e.onGround;
  if (nearLeft)  { s.state = 'walk_right'; s.timer = Math.max(s.timer, 0.6); }
  if (nearRight) { s.state = 'walk_left';  s.timer = Math.max(s.timer, 0.6); }

  if (s.timer <= 0) {
    var m = s.mood;
    var r = Math.random();
    if      (r < m.idleChance)                       s.state = 'idle';
    else if (r < m.idleChance + m.walkChance * 0.5)  s.state = 'walk_left';
    else if (r < m.idleChance + m.walkChance)        s.state = 'walk_right';
    else                                             s.state = 'jump';
    s.timer = m.dwellMin + Math.random() * (m.dwellMax - m.dwellMin);
  }

  s.inputLeft       = s.state === 'walk_left';
  s.inputRight      = s.state === 'walk_right';
  s.inputJumpPressed = false;
  s.inputJumpHeld    = false;

  if (s.state === 'jump') {
    // Keep pushing toward the center if we jumped while hugging an edge,
    // otherwise drift in the current facing direction.
    if      (nearLeft)               s.inputRight = true;
    else if (nearRight)              s.inputLeft  = true;
    s.inputJumpHeld = true;
    if (e.onGround && s.jumpCooldown <= 0) {
      s.inputJumpPressed = true;
      s.jumpCooldown = 0.4;
    }
  }
}

/* ── Physics step ──────────────────────────────────────────── */
function stepEntity(e, dt) {
  var pressingLeft, pressingRight, jp, jh;
  if (e.isCPU) {
    pressingLeft  = e.ai.inputLeft;
    pressingRight = e.ai.inputRight;
    jp = e.ai.inputJumpPressed;
    jh = e.ai.inputJumpHeld;
    e.ai.inputJumpPressed = false; // consume so multi-substep doesn't re-jump
  } else {
    pressingLeft  = playerLeft();
    pressingRight = playerRight();
    jp = jumpPressed();
    jh = jumpHeld();
  }
  var accel = e.onGround ? MOVE_ACCEL_GROUND : MOVE_ACCEL_AIR;
  if (pressingLeft && !pressingRight)  { e.vx -= accel * dt; e.facing = 'left'; }
  if (pressingRight && !pressingLeft)  { e.vx += accel * dt; e.facing = 'right'; }
  if (!pressingLeft && !pressingRight && e.onGround) {
    var dec = GROUND_FRIC * dt;
    if (e.vx > 0)      e.vx = Math.max(0, e.vx - dec);
    else if (e.vx < 0) e.vx = Math.min(0, e.vx + dec);
  }
  if (jp && e.onGround) {
    e.vy = -JUMP_VEL;
    e.onGround = false;
    if (!e.isCPU) beep(380, 0.14, 0.09, 'triangle');
  }
  if (!jh && e.vy < -JUMP_CUT) e.vy = -JUMP_CUT;
  if (e.vx >  MOVE_MAX) e.vx =  MOVE_MAX;
  if (e.vx < -MOVE_MAX) e.vx = -MOVE_MAX;

  // Gravity + terminal velocity
  e.vy += GRAVITY * dt;
  if (e.vy >  TERM_VEL) e.vy =  TERM_VEL;

  // Integrate
  var prevFootY = e.y + FEET_OFFSET;
  e.x += e.vx * dt;
  e.y += e.vy * dt;
  var newFootY = e.y + FEET_OFFSET;

  e.onGround = false;

  // One-way platform collision: only from above, only when falling.
  if (e.vy >= 0) {
    for (var i = 0; i < state.platforms.length; i++) {
      var p = state.platforms[i];
      var ex0 = e.x - e.w / 2, ex1 = e.x + e.w / 2;
      if (ex1 < p.x || ex0 > p.x + p.w) continue;
      if (prevFootY <= p.y + 1 && newFootY >= p.y) {
        e.y = p.y - FEET_OFFSET;
        e.vy = 0;
        e.onGround = true;
        break;
      }
    }
  }

  // Blast zones: fall off any open side / bottom → respawn
  if (e.x < -60 || e.x > W + 60 || e.y > H + 120) respawn(e);

  // Bob: step while walking, decay otherwise
  if (e.onGround && Math.abs(e.vx) > 20) e.bob += dt * 10;
  else if (!e.onGround)                   e.bob += dt * 2;
  else                                    e.bob *= 0.88;

  if (e.invulnFrames > 0) e.invulnFrames--;
  e.prevFootY = newFootY;
}

/* ── Touch controls (mobile D-pad + jump button) ───────────── */
function mobileControlsOn() {
  return TOUCH_UI && state.phase === 'play' && state.slots[0].mode === 'play';
}

function mobileLayout() {
  return {
    left:  { cx: 68,      cy: H - 80, r: 44, label: '◀' },
    right: { cx: 170,     cy: H - 80, r: 44, label: '▶' },
    jump:  { cx: W - 90,  cy: H - 84, r: 52, label: 'JUMP' }
  };
}
function hitMobileControl(px, py) {
  if (!mobileControlsOn()) return null;
  var L = mobileLayout();
  if (Math.hypot(px - L.jump.cx,  py - L.jump.cy)  <= L.jump.r)  return 'jump';
  if (Math.hypot(px - L.left.cx,  py - L.left.cy)  <= L.left.r)  return 'left';
  if (Math.hypot(px - L.right.cx, py - L.right.cy) <= L.right.r) return 'right';
  return null;
}
function syncTouches(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = W / rect.width, sy = H / rect.height;
  var leftHit = false, rightHit = false, jumpHit = false, paperTap = null;
  var touches = e.touches;
  for (var i = 0; i < touches.length; i++) {
    var t = touches[i];
    var px = (t.clientX - rect.left) * sx;
    var py = (t.clientY - rect.top) * sy;
    var hit = hitMobileControl(px, py);
    if      (hit === 'left')  leftHit  = true;
    else if (hit === 'right') rightHit = true;
    else if (hit === 'jump')  jumpHit  = true;
    else                      paperTap = { x: px, y: py };
  }
  if (jumpHit && !touchState.jumpBtn) touchState.jumpJustPressed = true;
  touchState.leftBtn  = leftHit;
  touchState.rightBtn = rightHit;
  touchState.jumpBtn  = jumpHit;
  // Non-control taps (title / select screens) register as clicks.
  if (paperTap && !mclk) { mx = paperTap.x; my = paperTap.y; mclk = true; }
}
canvas.addEventListener('touchstart', function(e) {
  touchSuppressUntil = performance.now() + 500;
  syncTouches(e);
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove',   function(e) { syncTouches(e); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend',    function(e) { syncTouches(e); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchcancel', function(e) { syncTouches(e); e.preventDefault(); }, { passive: false });
window.addEventListener('blur', function() {
  touchState.leftBtn = touchState.rightBtn = touchState.jumpBtn = false;
});

/* ── Background ────────────────────────────────────────────── */
function drawBackground() {
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#7cc3e6');
  g.addColorStop(0.7, '#c5e8f2');
  g.addColorStop(1, '#e6f1e2');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // distant hills (parallax-ready; static in Stage 1)
  ctx.fillStyle = '#a9cf96';
  ctx.beginPath();
  ctx.moveTo(0, 380);
  ctx.bezierCurveTo(160, 310, 320, 420, 520, 360);
  ctx.bezierCurveTo(660, 320, 740, 400, W, 360);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#7fb076';
  ctx.beginPath();
  ctx.moveTo(0, 450);
  ctx.bezierCurveTo(220, 410, 420, 480, 640, 440);
  ctx.bezierCurveTo(720, 425, 780, 455, W, 440);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();

  // a couple of clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  drawCloud(110, 90, 1.0);
  drawCloud(540, 70, 1.3);
  drawCloud(700, 140, 0.9);
}
function drawCloud(cx, cy, s) {
  ctx.beginPath();
  ctx.arc(cx,       cy,     22 * s, 0, TAU);
  ctx.arc(cx + 20*s, cy - 6*s, 18 * s, 0, TAU);
  ctx.arc(cx + 44*s, cy,     20 * s, 0, TAU);
  ctx.arc(cx + 20*s, cy + 8*s, 18 * s, 0, TAU);
  ctx.fill();
}

/* ── Title screen ──────────────────────────────────────────── */
function drawTitle() {
  drawBackground();

  // Decorative characters on the ground
  var t = state.phaseTime;
  drawCharacter(ctx, 'samster', 150, 450, 'right', t * 6,       1);
  drawCharacter(ctx, 'duck',    240, 446, 'right', t * 6 + 0.9, 1);
  drawCharacter(ctx, 'hippo',   340, 454, 'right', t * 6 + 1.7, 1);
  drawCharacter(ctx, 'rocket',  660, 448, 'left',  t * 6 + 2.3, 1);

  fillRoundRect(ctx, 90, 70, 620, 230, 26, 'rgba(16,30,46,0.82)', 'rgba(255,239,190,0.55)', 2);
  drawText(ctx, 'MUCKO',  400, 145, '#ffd86f', 56, 'center', 'bold');
  drawText(ctx, 'SMASH',  400, 200, '#fff4cf', 56, 'center', 'bold');
  drawText(ctx, 'Pick a fighter. Run. Jump. Don\u2019t fall off.', 400, 240, '#d9e6ef', 15, 'center', 'bold');
  var pulse = 0.5 + 0.5 * Math.sin(t * 4);
  drawText(ctx, TOUCH_UI ? 'TAP TO START' : 'PRESS SPACE / CLICK',
    400, 284, '#ffd86f', 18 + pulse * 2, 'center', 'bold');
}
function updateTitle(dt) {
  state.phaseTime += dt;
  if (eat('Space') || eat('Enter') || mclk) {
    mclk = false;
    state.phase = 'select';
    state.phaseTime = 0;
  }
}

/* ── Character select (4-slot lobby) ───────────────────────── */
// Layout: four vertical cards across the screen. Each card has:
//   - slot label at top (P1 / CPU 1 / CPU 2 / CPU 3)
//   - left ◀ / right ▶ arrow pills that cycle the character
//   - portrait in the middle
//   - mode pill at bottom (PLAY/SPECTATOR for P1, OFF/CHILL/NORMAL/FRISKY for CPU)
// Start button at the bottom. Needs at least one active fighter.
function selectLayout() {
  var cardW = 180, cardH = 380, gap = 10;
  var total = cardW * 4 + gap * 3;
  var x0 = (W - total) / 2;
  var y0 = 92;
  var cards = [];
  for (var i = 0; i < 4; i++) {
    var cx = x0 + i * (cardW + gap);
    cards.push({
      slotIndex: i,
      x: cx, y: y0, w: cardW, h: cardH,
      portrait:  { x: cx + 18, y: y0 + 72,  w: cardW - 36, h: 200 },
      leftArrow: { x: cx + 8,  y: y0 + 152, w: 28, h: 36 },
      rightArrow:{ x: cx + cardW - 36, y: y0 + 152, w: 28, h: 36 },
      modePill:  { x: cx + 16, y: y0 + cardH - 56, w: cardW - 32, h: 42 }
    });
  }
  return {
    cards: cards,
    startBtn: { x: W / 2 - 120, y: y0 + cardH + 18, w: 240, h: 50 }
  };
}
function hit(r) { return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; }

function slotModeLabel(s) {
  if (s.kind === 'player') return s.mode === 'play' ? 'PLAY' : 'SPECTATE';
  return MOODS[s.mode] ? MOODS[s.mode].label : 'OFF';
}
function slotModeColor(s) {
  if (s.kind === 'player') return s.mode === 'play' ? '#5ec867' : '#9aa5ad';
  if (s.mode === 'off')    return '#9aa5ad';
  if (s.mode === 'chill')  return '#84b5e0';
  if (s.mode === 'normal') return '#f2c85a';
  if (s.mode === 'frisky') return '#e2744b';
  return '#9aa5ad';
}
function cycleCharacter(slot, dir) {
  slot.charIdx = (slot.charIdx + CHAR_IDS.length + dir) % CHAR_IDS.length;
}
function cycleMode(slot) {
  if (slot.kind === 'player') {
    slot.mode = slot.mode === 'play' ? 'spectator' : 'play';
  } else {
    var i = CPU_MODES.indexOf(slot.mode);
    slot.mode = CPU_MODES[(i + 1) % CPU_MODES.length];
  }
}

function drawSelect() {
  drawBackground();
  fillRoundRect(ctx, 20, 12, W - 40, 70, 18, 'rgba(16,30,46,0.82)', 'rgba(255,239,190,0.5)', 2);
  drawText(ctx, 'PICK YOUR FIGHTERS', W / 2, 46, '#ffd86f', 26, 'center', 'bold');
  drawText(ctx, 'Tap ◀ / ▶ to switch fighter \u2022 tap the mode pill to change it',
    W / 2, 68, '#d9e6ef', 12, 'center', 'bold');

  var L = selectLayout();
  for (var i = 0; i < L.cards.length; i++) {
    var c = L.cards[i];
    var slot = state.slots[i];
    var active = slotActive(slot);

    var cardFill = active ? 'rgba(255,246,214,0.96)' : 'rgba(217,210,193,0.65)';
    var cardStroke = active ? '#d8982a' : 'rgba(90,70,34,0.4)';
    fillRoundRect(ctx, c.x, c.y, c.w, c.h, 18, cardFill, cardStroke, active ? 3 : 2);

    // Slot label header
    var labelColor = slot.kind === 'player' ? '#2c5ea8' : '#7b4f1a';
    fillRoundRect(ctx, c.x + 14, c.y + 14, c.w - 28, 36, 12, labelColor, null);
    var slotName = slot.kind === 'player' ? 'PLAYER 1' : ('CPU ' + i);
    drawText(ctx, slotName, c.x + c.w / 2, c.y + 38, '#fff4cf', 17, 'center', 'bold');

    // Portrait + cycle arrows
    if (active) {
      drawCharacter(ctx, CHAR_IDS[slot.charIdx],
        c.x + c.w / 2, c.y + 180, 'right', state.phaseTime * 4 + i, 1.35);
      drawText(ctx, CHARACTERS[CHAR_IDS[slot.charIdx]].name,
        c.x + c.w / 2, c.y + 232, '#5a3d16', 14, 'center', 'bold');
    } else {
      drawText(ctx, slot.kind === 'player' ? '(spectating)' : '(off)',
        c.x + c.w / 2, c.y + 180, '#6a5d44', 16, 'center', 'bold');
    }

    var arrowFill = active ? 'rgba(255,228,170,0.9)' : 'rgba(200,200,200,0.6)';
    fillRoundRect(ctx, c.leftArrow.x,  c.leftArrow.y,  c.leftArrow.w,  c.leftArrow.h, 10, arrowFill, '#7b4f1a', 2);
    fillRoundRect(ctx, c.rightArrow.x, c.rightArrow.y, c.rightArrow.w, c.rightArrow.h, 10, arrowFill, '#7b4f1a', 2);
    drawText(ctx, '◀', c.leftArrow.x  + c.leftArrow.w  / 2, c.leftArrow.y  + 24, '#5a3d16', 18, 'center', 'bold');
    drawText(ctx, '▶', c.rightArrow.x + c.rightArrow.w / 2, c.rightArrow.y + 24, '#5a3d16', 18, 'center', 'bold');

    // Mode pill
    fillRoundRect(ctx, c.modePill.x, c.modePill.y, c.modePill.w, c.modePill.h, 14,
      slotModeColor(slot), '#322010', 2);
    drawText(ctx, slotModeLabel(slot), c.x + c.w / 2, c.modePill.y + 28,
      '#20160a', 17, 'center', 'bold');
  }

  // Start button — disabled if no active fighters
  var B = L.startBtn;
  var canStart = activeSlotCount() >= 1;
  var startHover = hit(B);
  var sfill = !canStart ? 'rgba(150,140,120,0.8)'
    : (startHover ? '#ffd86f' : '#f2c85a');
  fillRoundRect(ctx, B.x, B.y, B.w, B.h, 18, sfill, '#7b4f1a', 3);
  drawText(ctx, canStart ? 'START' : 'NEED A FIGHTER', B.x + B.w / 2, B.y + 34,
    '#3a2608', canStart ? 24 : 18, 'center', 'bold');
}

function updateSelect(dt) {
  state.phaseTime += dt;

  if (eat('Space') || eat('Enter')) {
    if (activeSlotCount() >= 1) { startPlay(); return; }
  }
  if (eat('Escape')) { state.phase = 'title'; state.phaseTime = 0; return; }

  if (!mclk) return;
  mclk = false;
  var L = selectLayout();

  for (var i = 0; i < L.cards.length; i++) {
    var c = L.cards[i];
    var slot = state.slots[i];
    if (hit(c.leftArrow))  {
      if (!slotActive(slot) && slot.kind === 'cpu') slot.mode = 'normal';
      cycleCharacter(slot, -1); return;
    }
    if (hit(c.rightArrow)) {
      if (!slotActive(slot) && slot.kind === 'cpu') slot.mode = 'normal';
      cycleCharacter(slot, +1); return;
    }
    if (hit(c.modePill))   { cycleMode(slot); return; }
    if (hit(c.portrait))   {
      // Tap portrait as convenience: cycle character forward.
      if (!slotActive(slot) && slot.kind === 'cpu') slot.mode = 'normal';
      else cycleCharacter(slot, +1);
      return;
    }
  }

  var B = L.startBtn;
  if (hit(B) && activeSlotCount() >= 1) { startPlay(); return; }
}

/* ── Play screen ───────────────────────────────────────────── */
function updatePlay(dt) {
  state.phaseTime += dt;
  if (state.respawnFlash > 0) state.respawnFlash = Math.max(0, state.respawnFlash - dt);

  // CPU AI ticks once per render frame; inputs are latched into entity.ai.*
  for (var a = 0; a < state.entities.length; a++) {
    var e = state.entities[a];
    if (e.isCPU) cpuThink(e, dt);
  }

  // Fixed-step simulation with accumulator
  var step = 1 / 60;
  var remaining = dt;
  if (remaining > 0.08) remaining = 0.08;
  while (remaining > 0) {
    var dts = Math.min(step, remaining);
    for (var i = 0; i < state.entities.length; i++) stepEntity(state.entities[i], dts);
    remaining -= dts;
  }

  if (eat('Escape')) { state.phase = 'select'; state.phaseTime = 0; }
}

function drawPlay() {
  drawBackground();

  // Platforms
  for (var i = 0; i < state.platforms.length; i++) {
    var p = state.platforms[i];
    // Sides + dirt underside
    fillRoundRect(ctx, p.x, p.y, p.w, p.h + 16, 6, '#7a5633', '#432c15', 2);
    // Grass top
    fillRoundRect(ctx, p.x, p.y - 4, p.w, 8, 4, '#76b552', '#4a7a2d', 1.5);
  }

  // Entities (blink during invuln)
  for (var j = 0; j < state.entities.length; j++) {
    var e = state.entities[j];
    var blink = e.invulnFrames > 0 && (Math.floor(e.invulnFrames / 5) % 2 === 0);
    if (blink) continue;
    drawCharacter(ctx, e.charId, e.x, e.y, e.facing, e.bob, 1);
  }

  // Respawn tint flash
  if (state.respawnFlash > 0) {
    ctx.fillStyle = 'rgba(255,245,190,' + (state.respawnFlash * 0.5) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // HUD: back hint
  drawText(ctx, 'Esc: back to select', 12, 20, '#14314a', 12, 'left', 'bold');

  if (mobileControlsOn()) drawMobileControls();
}

function drawMobileControls() {
  var L = mobileLayout();
  ctx.save();
  ctx.globalAlpha = 0.9;
  drawCircle(ctx, L.left.cx,  L.left.cy,  L.left.r,  touchState.leftBtn  ? 'rgba(255,216,111,0.6)' : 'rgba(32,46,60,0.55)', 'rgba(255,244,207,0.42)', 2);
  drawCircle(ctx, L.right.cx, L.right.cy, L.right.r, touchState.rightBtn ? 'rgba(255,216,111,0.6)' : 'rgba(32,46,60,0.55)', 'rgba(255,244,207,0.42)', 2);
  drawCircle(ctx, L.jump.cx,  L.jump.cy,  L.jump.r,  touchState.jumpBtn  ? 'rgba(255,216,111,0.75)' : 'rgba(32,46,60,0.65)', 'rgba(255,244,207,0.48)', 2);
  drawText(ctx, L.left.label,  L.left.cx,  L.left.cy  + 10, '#fff4cf', 26, 'center', 'bold');
  drawText(ctx, L.right.label, L.right.cx, L.right.cy + 10, '#fff4cf', 26, 'center', 'bold');
  drawText(ctx, L.jump.label,  L.jump.cx,  L.jump.cy  + 8,  '#fff4cf', 22, 'center', 'bold');
  ctx.restore();
}

/* ── Main loop ─────────────────────────────────────────────── */
function update(dt) {
  if (state.phase === 'title')  updateTitle(dt);
  else if (state.phase === 'select') updateSelect(dt);
  else if (state.phase === 'play')   updatePlay(dt);
  mclk = false;
}
function draw() {
  if (state.phase === 'title')  drawTitle();
  else if (state.phase === 'select') drawSelect();
  else if (state.phase === 'play')   drawPlay();
}

MuckoEngine.makeLoop(update, draw, 60);
  </script>
