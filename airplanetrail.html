<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Airplane Trail</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#d4a853;font-family:'Courier New',monospace;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}
#app{width:min(780px,100%);background:#0d1520;border:3px solid #8b6914;border-radius:10px;padding:22px;position:relative}
h1{text-align:center;color:#ffd700;font-size:2.2em;text-shadow:2px 2px 8px rgba(255,180,0,0.5);margin-bottom:6px}
h2{color:#ffd700;font-size:1.3em;margin-bottom:12px}
.sub{text-align:center;color:#8b6914;font-size:.9em;margin-bottom:16px}
.prose{color:#c8a060;line-height:1.7;font-size:.92em}
/* Status bar */
.sbar{display:flex;justify-content:space-between;background:rgba(0,0,0,.5);border:1px solid #4a3510;border-radius:5px;padding:7px 12px;margin-bottom:12px;flex-wrap:wrap;gap:6px /* Safari 14.1+ */}
.sbar > * + *{margin-left:6px}
.sbar-item{text-align:center;min-width:60px}
.sbar-label{font-size:.65em;color:#6a5010;display:block}
.sbar-val{font-size:.95em;font-weight:bold;color:#ffd700}
.sbar-val.lo{color:#ff4444}
.sbar-val.md{color:#ffaa00}
.sbar-val.ok{color:#44dd44}
/* Route strip */
.route{display:flex;justify-content:space-between;align-items:center;position:relative;margin-bottom:14px;padding:0 10px}
.route::before{content:'';position:absolute;top:8px;left:10px;right:10px;height:2px;background:#2a2010}
.rstop{position:relative;text-align:center;z-index:1}
.rdot{width:14px;height:14px;border-radius:50%;background:#1a1408;border:2px solid #4a3510;margin:0 auto 4px}
.rdot.done{background:#ffd700;border-color:#ffd700}
.rdot.now{background:#ff8800;border-color:#ff8800;animation:pulse 1s infinite}
.rname{font-size:.62em;color:#6a5010}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,136,0,.7)}50%{box-shadow:0 0 0 5px rgba(255,136,0,0)}}
/* Progress bar */
.pbar-wrap{background:rgba(0,0,0,.4);border:1px solid #2a2010;border-radius:8px;height:14px;overflow:hidden;margin:4px 0 12px}
.pbar{height:100%;border-radius:8px;transition:width .4s}
.pbar.fuel{background:linear-gradient(90deg,#882200,#ff6600)}
.pbar.food{background:linear-gradient(90deg,#115511,#33cc33)}
.pbar.hull{background:linear-gradient(90deg,#112255,#3388ff)}
/* Content panel */
.panel{background:rgba(0,0,0,.3);border:1px solid #2a2010;border-radius:6px;padding:16px;margin-bottom:14px}
/* Buttons */
button{background:#1a1200;color:#d4a853;border:2px solid #5a4010;border-radius:4px;padding:9px 18px;font-family:'Courier New',monospace;font-size:.92em;cursor:pointer;transition:all .15s;margin:4px}
button:hover{background:#2a2000;border-color:#ffd700;color:#ffd700}
button:disabled{opacity:.35;cursor:default;transform:none}
.btn-go{background:#0a2040;border-color:#2a6aaa;color:#88ccff;font-size:1.05em;padding:11px 24px}
.btn-go:hover{background:#1a3a60;border-color:#88ccff;color:#fff}
.btn-bad{border-color:#6a2210;color:#ff8888}
.btns{text-align:center;margin-top:10px}
/* Crew */
.crew-row{display:flex;gap:8px /* Safari 14.1+ */;flex-wrap:wrap;margin-bottom:12px}
.crew-row > * + *{margin-left:8px}
.crew-card{background:rgba(0,0,0,.4);border:1px solid #2a2010;border-radius:5px;padding:8px 10px;text-align:center;min-width:92px;flex:1}
.crew-card.alive{border-color:#225522}
.crew-card.ill{border-color:#886600}
.crew-card.dead{border-color:#440000;opacity:.5}
.crew-icon{font-size:1.4em}
.crew-name{font-size:.65em;color:#8b6914;margin:2px 0}
.crew-hp{font-size:.7em}
/* Event */
.ev-box{background:rgba(10,5,0,.9);border:2px solid #8b6914;border-radius:8px;padding:20px;text-align:center}
.ev-big{font-size:3.6em;line-height:1;margin-bottom:4px}
.ev-title{color:#ffd700;font-size:1.2em;margin-bottom:10px}
.ev-text{color:#c8a060;line-height:1.6;margin-bottom:18px}
.ev-choices{display:flex;flex-direction:column;gap:7px /* Safari 14.1+ */;align-items:center}
.ev-choices > * + *{margin-top:7px}
.ev-choices button{width:88%;text-align:left;padding:10px 14px;display:flex;align-items:center}
.ev-choices .ch-icon{font-size:1.5em;margin-right:10px;line-height:1;flex-shrink:0}
.ev-choices .ch-txt{flex:1}
/* Store */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.store-item{background:rgba(0,0,0,.35);border:1px solid #2a2010;border-radius:5px;padding:10px;display:flex;justify-content:space-between;align-items:center;gap:8px /* Safari 14.1+ */}
.store-item > * + *{margin-left:8px}
.si-info{flex:1}
.si-name{color:#ffd700;font-size:.85em}
.si-desc{color:#6a5010;font-size:.72em;margin:2px 0}
.si-price{color:#44cc44;font-size:.78em}
/* Diff cards */
.diff-row{display:flex;gap:12px /* Safari 14.1+ */;justify-content:center;margin:16px 0}
.diff-row > * + *{margin-left:12px}
.dcard{background:rgba(0,0,0,.45);border:2px solid #2a2010;border-radius:8px;padding:14px;width:170px;text-align:center;cursor:pointer;transition:all .15s}
.dcard:hover,.dcard.sel{border-color:#ffd700;background:rgba(40,25,0,.7);transform:translateY(-3px)}
.dcard.tone-green{border-color:#225522}
.dcard.tone-yellow{border-color:#887020}
.dcard.tone-red{border-color:#772020}
.dcard.tone-green.sel{border-color:#44cc44;box-shadow:0 0 12px rgba(68,204,68,.45)}
.dcard.tone-yellow.sel{border-color:#ffcc33;box-shadow:0 0 12px rgba(255,204,51,.45)}
.dcard.tone-red.sel{border-color:#ff5544;box-shadow:0 0 12px rgba(255,85,68,.45)}
.dcard-big{font-size:3.4em;line-height:1;margin-bottom:2px}
.dcard-stars{font-size:1.1em;letter-spacing:4px;color:#ffd700;margin-bottom:4px}
.dcard-name{color:#ffd700;font-size:1em;margin-bottom:5px}
.dcard-class{color:#8b6914;font-size:.78em;margin-bottom:6px}
.dcard-desc{color:#6a5010;font-size:.72em;line-height:1.4;margin-bottom:8px}
.dcard-mult{color:#44cc44;font-size:1.1em;font-weight:bold}
/* Input */
input[type=text]{background:rgba(0,0,0,.6);border:2px solid #5a4010;border-radius:4px;color:#ffd700;font-family:'Courier New',monospace;font-size:1em;padding:8px 12px;width:280px}
input[type=text]:focus{outline:none;border-color:#ffd700}
/* Message box */
.msg{background:rgba(139,105,20,.15);border:1px solid #5a4010;border-radius:4px;padding:9px 12px;margin:8px 0;color:#ffd700;font-style:italic;font-size:.88em}
/* Throttle bar */
.throttle-bar{display:flex;align-items:center;gap:6px /* Safari 14.1+ */;margin-bottom:10px;flex-wrap:wrap;padding:5px 0}
.throttle-bar > * + *{margin-left:6px}
.throttle-bar button{font-size:.75em;padding:4px 10px;margin:2px}
/* Scoreboard */
.sb-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #1a1008}
.sb-row:nth-child(odd){background:rgba(0,0,0,.2)}
.sb-new{background:rgba(255,215,0,0.07)!important;font-weight:bold}
canvas{display:block;margin:0 auto;border:2px solid #5a4010;border-radius:5px;cursor:crosshair;max-width:100%;height:auto}
@media(max-width:600px){body{padding:6px}button{padding:10px 14px;font-size:.95em}.btn-go{font-size:1em!important;padding:12px 20px!important}.diff-row{flex-direction:column;align-items:center}.dcard{width:90%!important}}
#back-btn{position:fixed;top:10px;left:10px;z-index:999;font-family:'Courier New',monospace;font-size:.78em;color:#d4a853;background:rgba(10,13,20,0.88);border:1px solid #5a4010;padding:5px 11px;text-decoration:none;opacity:.65;transition:opacity .15s;white-space:nowrap}
#back-btn:hover{opacity:1;border-color:#ffd700;color:#ffd700}
</style>
</head>
<body>
<a id="back-btn" href="index.html">← Mucko's Games</a>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const STOPS = [
  {id:'southampton', name:'Southampton', flag:'🇬🇧', desc:'The grand sky-port of England. Brass horns sound as the R.M.A.S. Mucko is prepared for her maiden voyage.'},
  {id:'cherbourg',   name:'Cherbourg',   flag:'🇫🇷', desc:'The French aerial harbour, where wealthy passengers and their mountains of luggage come aboard.'},
  {id:'queenstown',  name:'Queenstown',  flag:'🇮🇪', desc:'Ireland\'s windswept sky-dock. The last stop before the vast open Atlantic sky-ocean.'},
  {id:'atlantic',    name:'Mid-Atlantic',flag:'🌊',  desc:'The great open sky. Nothing but clouds and stars in every direction. Fishing conditions: excellent.'},
  {id:'newyork',     name:'New York',    flag:'🗽',  desc:'The New World awaits — if you can survive the Iceberg Field!'},
];

const DIFFS = [
  {id:'first',  name:'First Class',  short:'First',     icon:'👑',  tone:'green',  stars:'⭐',       mult:1.0, gold:155, fuel:90, food:50, hull:100, desc:'Comfortable luxury travel. Generous supplies and forgiving weather. Perfect for beginners.'},
  {id:'second', name:'Second Class', short:'Second',    icon:'✈️',  tone:'yellow', stars:'⭐⭐',     mult:1.5, gold:105, fuel:76, food:36, hull:100, desc:'A balanced voyage. Moderate supplies, moderate risk. Good for experienced captains.'},
  {id:'third',  name:'Third Class',  short:'Steerage',  icon:'⚙️',  tone:'red',    stars:'⭐⭐⭐',   mult:2.5, gold:95,  fuel:66, food:28, hull:100, desc:'Tight supplies and rough weather. Every gold coin counts. The hardest voyage!'},
];

const CREW = [
  {name:'Capt. Smith',   icon:'👨‍✈️', role:'Captain'},
  {name:'Molly Brown',   icon:'👩',   role:'Navigator'},
  {name:'Jack',          icon:'🧑',   role:'Mechanic'},
  {name:'Rose',          icon:'👧',   role:'Co-Pilot'},
];

const EVENTS = [
  // ── GOOD ──────────────────────────────────────────────────────────────────
  {title:'💨 Magnificent Tailwind!', text:'A powerful sky-current has found the Mucko! The propellers barely need to spin.',
   choices:[
    {i:'🔥',t:'Ride it at full speed', out:'You race ahead, saving precious fuel!',        fx:G=>{G.fuel=c(G.fuel+20,0,100);G.progress+=12}},
    {i:'⏳',t:'Use it carefully',      out:'A steady push forward. Every bit helps.',      fx:G=>{G.fuel=c(G.fuel+10,0,100)}},
  ]},
  {title:'🎻 The Sky-Orchestra Plays', text:'Your ship\'s orchestra strikes up a cheerful ragtime tune in the steam-pipes. The music floats up to the bridge!',
   choices:[
    {i:'🎶',t:'Let them play all night!',        out:'Wonderful music! The crew dances. Morale soars.',  fx:G=>{G.morale=c(G.morale+18,0,100)}},
    {i:'🌙',t:'Thank them and send them to rest',out:'A brief but lovely concert. All feel refreshed.',  fx:G=>{G.morale=c(G.morale+7,0,100)}},
  ]},
  {title:'🐋 A Sky-Whale Appears!', text:'A magnificent sky-whale drifts alongside the Mucko, its bioluminescent fins glowing in the moonlight. The crew watches in awe.',
   choices:[
    {i:'👋',t:'Wave and fly alongside it', out:'The whale seems friendly! It breathes a mist of food-crystals onto the deck.',  fx:G=>{G.food=c(G.food+8,0,80);G.morale=c(G.morale+12,0,100)}},
    {i:'➡️',t:'Continue on course',        out:'The whale watches you go, then vanishes into the clouds.',                        fx:G=>{}},
  ]},
  {title:'🫐 Cloud-Berry Patch!', text:'Hidden in a towering cumulus cloud: luminous azure sky-berries, growing only in the high atmosphere.',
   choices:[
    {i:'🧺',t:'Harvest them',         out:'Delicious! The crew feasts on the sweet berries.',     fx:G=>{G.food=c(G.food+15,0,80)}},
    {i:'🙏',t:'Leave them for others',out:'A kind choice. The sky-fairies will remember.',        fx:G=>{G.morale=c(G.morale+6,0,100)}},
  ]},
  {title:'📡 Helpful Radio Signal', text:'You pick up a weather broadcast from a distant sky-station. Clear skies ahead for the next 48 hours!',
   choices:[
    {i:'🧭',t:'Adjust course to take advantage', out:'The clear route saves fuel and time!',  fx:G=>{G.fuel=c(G.fuel+12,0,100);G.progress+=8}},
    {i:'➡️',t:'Maintain current heading',        out:'Good to know regardless.',               fx:G=>{G.morale=c(G.morale+4,0,100)}},
  ]},
  // ── MIXED ─────────────────────────────────────────────────────────────────
  {title:'🧍 Stowaway Found!', text:'A small child is discovered hiding in the steam-pipes! She says her name is Trudy and she just wanted to see America.',
   choices:[
    {i:'🤝',t:'Welcome her as honorary crew', out:'Trudy proves useful with the boiler gauges! She does eat, though.',  fx:G=>{G.food=c(G.food-10,0,80);G.morale=c(G.morale+10,0,100)}},
    {i:'🛏️',t:'Give her rations and a bed',   out:'She\'s grateful. A little less food, but your heart is full.',       fx:G=>{G.food=c(G.food-8,0,80)}},
    {i:'🚪',t:'Put her off at the next stop', out:'Poor Trudy. The crew is disheartened.',                              fx:G=>{G.morale=c(G.morale-15,0,100)}},
  ]},
  {title:'🎩 Mr. Guggenheim Demands Priority', text:'The wealthy passenger Benjamin Guggenheim — impeccably dressed, as always — demands exclusive use of the wireless for "urgent business."',
   choices:[
    {i:'💰',t:'Agree (he\'s very important)', out:'He\'s pleased and tips you handsomely. But you miss a weather warning.', fx:G=>{G.gold=c(G.gold+22,0,999);G.hull=c(G.hull-10,0,100)}},
    {i:'🙅',t:'Politely decline',             out:'He huffs magnificently. But safety first!',                              fx:G=>{G.morale=c(G.morale-5,0,100)}},
    {i:'🍵',t:'Offer him tea instead',        out:'He grumbles, but the tea is excellent. Crisis averted.',                 fx:G=>{G.food=c(G.food-3,0,80);G.morale=c(G.morale+4,0,100)}},
  ]},
  {title:'🍞 Ration Dispute!', text:'First Class passengers want more food. Third Class passengers want more food. The cook is hiding beneath his hat.',
   choices:[
    {i:'⚖️',t:'Equal rations for all',          out:'Fair — but neither group is happy.',                        fx:G=>{G.food=c(G.food-10,0,80);G.morale=c(G.morale-5,0,100)}},
    {i:'🍲',t:'Cook a grand pot of sky-stew',   out:'Everyone gets extra! But the provisions take a hit.',      fx:G=>{G.food=c(G.food-20,0,80);G.morale=c(G.morale+15,0,100)}},
    {i:'📋',t:'Announce rationing immediately', out:'Unpopular but necessary. Morale dips.',                     fx:G=>{G.morale=c(G.morale-10,0,100)}},
  ]},
  {title:'📡 SOS Signal Received!', text:'Your wireless crackles: "...SOS... sky-yacht Carpathia... engine failure..." Someone needs help!',
   choices:[
    {i:'🆘',t:'Divert to help them',             out:'You find the Carpathia! They give you supplies in gratitude.',  fx:G=>{G.fuel=c(G.fuel-20,0,100);G.food=c(G.food+14,0,80);G.morale=c(G.morale+20,0,100)}},
    {i:'📡',t:'Radio their position to others',  out:'Another ship responds. You continue on course.',                fx:G=>{G.morale=c(G.morale+4,0,100)}},
    {i:'➡️',t:'Keep flying — you have problems', out:'You can\'t save everyone. The crew is troubled.',              fx:G=>{G.morale=c(G.morale-15,0,100)}},
  ]},
  // ── BAD ───────────────────────────────────────────────────────────────────
  {title:'⛈️ Terrible Sky-Storm!', text:'Black clouds roll in without warning! Lightning crackles across the propeller blades and the hull groans under the gale.',
   choices:[
    {i:'⚡',t:'Fly through at full power',     out:'You push through — hull cracked but time saved!',           fx:G=>{G.hull=c(G.hull-22,0,100);G.fuel=c(G.fuel-15,0,100)}},
    {i:'⬇️',t:'Drop altitude and go around',   out:'Safe but slow and fuel-hungry.',                            fx:G=>{G.fuel=c(G.fuel-25,0,100);G.progress=c(G.progress-8,0,100)}},
    {i:'⚓',t:'Anchor to a cloud and wait',    out:'A clever trick! You ride it out with minor hull scrapes.',  fx:G=>{G.hull=c(G.hull-8,0,100);G.fuel=c(G.fuel-5,0,100)}},
  ]},
  {title:'🔥 Boiler Room Crisis!', text:'The pressure gauges are screaming! Something has gone terribly wrong below decks.',
   choices:[
    {i:'🔧',t:'Jack patches it (risky!)',       out:null, fx:G=>{if(Math.random()<.6){G.fuel=c(G.fuel+5,0,100);G._msg='Jack heroically patches the boiler! Just a scorch mark.'}else{G.crewHp[2]=c(G.crewHp[2]-40,0,100);G._msg='Oh no! Jack takes a bad hit. He\'ll recover...'}}},
    {i:'💨',t:'Dump steam and slow down',       out:'Crisis averted! But you\'ve lost fuel pressure.',          fx:G=>{G.fuel=c(G.fuel-22,0,100)}},
    {i:'❌',t:'Ignore it — full steam ahead!', out:'The boiler blows! Hull severely damaged!',                  fx:G=>{G.hull=c(G.hull-35,0,100);G.fuel=c(G.fuel-25,0,100)}},
  ]},
  {title:'🌫️ Thick Atlantic Fog', text:'The fog is so thick you cannot see the propeller tips. Flying blind over the open sky-ocean.',
   choices:[
    {i:'🧭',t:'Trust the compass and press on', out:'You emerge on course, but tension drained the fuel.',     fx:G=>{G.fuel=c(G.fuel-15,0,100)}},
    {i:'🐢',t:'Slow to half-speed',             out:'Careful and slow. Takes extra fuel.',                     fx:G=>{G.fuel=c(G.fuel-20,0,100);G.progress=c(G.progress-5,0,100)}},
    {i:'🎇',t:'Send up a signal flare',         out:'A passing sky-ship radios your position! Safe.',          fx:G=>{G.morale=c(G.morale+5,0,100)}},
  ]},
  {title:'🔭 Crow\'s Nest Alert!', text:'"Something HUGE ahead in the clouds!" radios the lookout. He sounds very frightened.',
   choices:[
    {i:'↩️',t:'Turn hard to starboard!',     out:'A flying iceberg! You narrowly miss it. Wing grazed.',   fx:G=>{G.hull=c(G.hull-14,0,100)}},
    {i:'⬆️',t:'Climb above the clouds',      out:'You soar over the obstacle safely. Fuel cost.',           fx:G=>{G.fuel=c(G.fuel-18,0,100)}},
    {i:'🤔',t:'Throttle back and assess',    out:'It was a cloud shaped like a whale. Phew!',               fx:G=>{}},
  ]},
  {title:'🧭 The Compass Has Gone Haywire!', text:'Something magnetic in the cargo hold is throwing off the compass. You\'re flying by the stars.',
   choices:[
    {i:'⭐',t:'Rose navigates by starlight',  out:'Her sky-reading is perfect! Tense, but no course lost.',  fx:G=>{G.crewHp[3]=c(G.crewHp[3]-5,0,100)}},
    {i:'📦',t:'Search cargo for the culprit', out:"It was Mr. Guggenheim's magnetised safe. Fixed!",          fx:G=>{G.fuel=c(G.fuel-10,0,100)}},
    {i:'🎲',t:'Guess and hope',               out:'You get a little lost. Extra fuel burned re-finding the route.', fx:G=>{G.fuel=c(G.fuel-20,0,100);G.progress=c(G.progress-10,0,100)}},
  ]},
  {title:'🧊 Iceberg Sighting — Too Close!', text:'A towering flying iceberg drifts across your flight path, trailing glittering ice-mist. Beautiful. Terrifying.',
   choices:[
    {i:'🛑',t:'Full stop! Let it pass!',          out:'You wait nervously as it drifts by. Lost time.',        fx:G=>{G.fuel=c(G.fuel-10,0,100);G.progress=c(G.progress-6,0,100)}},
    {i:'🪡',t:'Thread the needle between bergs',  out:'Expert flying! But the wingtip clips an edge.',         fx:G=>{G.hull=c(G.hull-10,0,100)}},
    {i:'🔀',t:'Turn and find another route',      out:'A safe detour. Costs fuel.',                             fx:G=>{G.fuel=c(G.fuel-16,0,100)}},
  ]},
  {title:'🤢 Sky-Sickness Strikes!', text:'The turbulence has been rough. Half the crew is looking rather green around the goggles.',
   choices:[
    {i:'🫚',t:'Distribute ginger chews',         out:'Helps! Costs a little food.',                                    fx:G=>{G.food=c(G.food-5,0,80);G.crewHp=G.crewHp.map(h=>c(h+10,0,100))}},
    {i:'🛬',t:'Smooth the ride (lower altitude)', out:'Calmer flying helps. Costs fuel.',                               fx:G=>{G.fuel=c(G.fuel-12,0,100);G.crewHp=G.crewHp.map(h=>c(h+5,0,100))}},
    {i:'💪',t:'Press on — they\'ll adapt',       out:'Some do. One crew member takes a bad turn.',                     fx:G=>{const i=Math.floor(Math.random()*4);G.crewHp[i]=c(G.crewHp[i]-22,0,100)}},
  ]},
  {title:'🌙 Mysterious Night Lights', text:'Strange glowing shapes drift past in the dark — sky-jellyfish, perhaps, or something stranger. The crew watches, entranced.',
   choices:[
    {i:'👀',t:'Slow down and observe',        out:'Magical. The crew\'s spirits lift enormously.',            fx:G=>{G.morale=c(G.morale+20,0,100);G.progress=c(G.progress-5,0,100)}},
    {i:'➡️',t:'Keep your course — stay sharp',out:'Discipline first. But you saw something wonderful.',       fx:G=>{G.morale=c(G.morale+5,0,100)}},
  ]},
];

// ── SKY TELEGRAMS ─────────────────────────────────────────────────────────────

const TELEGRAMS = [
  {from:'R.M.A.S. Olympic',         msg:'Beautiful skies all the way to the Azores. Smooth sailing, sister ship!'},
  {from:'Sky-Station Azores',       msg:'Strong westerly winds at altitude 4000 ft. Recommend descending to 2500.'},

function c(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function newGame(diffId, name){
  const d = DIFFS.find(x=>x.id===diffId);
  G = {
    screen:'store', diff:d, name, leg:0, progress:0, day:0,
    gold:d.gold, fuel:d.fuel, food:d.food, hull:d.hull, morale:80,
    crewHp:[100,100,100,100],
    fishCaught:0, bergsDodged:0, fishingUsed:false,
    msg:'', curEvent:null, _msg:null,
    sel:diffId, throttle:'cruising',
  };
}

// ── RENDER DISPATCH ───────────────────────────────────────────────────────────

function render(){
  stopAnim();
  const el = document.getElementById('app');
  const s = G.screen;
  if      (s==='menu')      showMenu(el);
  else if (s==='diff')      showDiff(el);
  else if (s==='name')      showName(el);
  else if (s==='store')     showStore(el);
  else if (s==='takeoff')   showTakeoff(el);
  else if (s==='travel')    showTravel(el);
  else if (s==='event')     showEvent(el);
  else if (s==='fishing')   showFishing(el);
  else if (s==='icebergs')  showIcebergs(el);
  else if (s==='landing')          showLanding(el);
  else if (s==='emergency_landing') showEmergencyLanding(el);
  else if (s==='victory')          { playEndSting('win'); showVictory(el); }
  else if (s==='gameover')         { playEndSting('lose'); showGameOver(el); }
  else if (s==='scores')           showScores(el);
}

function stopAnim(){
  if(animId){cancelAnimationFrame(animId);animId=null}
  if(CV) CV.onclick = null;
}

function drawTakeoffIdle(){
  const canvas=document.getElementById('tocanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=720,H=220,GY=172;
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#050e22'); sg.addColorStop(0.55,'#0c2248'); sg.addColorStop(1,'#2a6a9a');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);
  for(let i=0;i<14;i++){ctx.fillStyle=`rgba(255,255,255,${0.4*(1-i/16)})`;ctx.fillRect((i*61+9)%W,(i*27+5)%52,1.5,1.5);}
  [[140,44,75,0.8],[360,30,60,0.65],[575,48,88,0.75]].forEach(([cx,cy,cw,cs])=>{
    ctx.fillStyle=`rgba(255,255,255,${cs*0.6})`;
    ctx.beginPath();ctx.ellipse(cx,cy,cw*.5,10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-cw*.18,cy+4,cw*.3,8,0,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#040b1a';
  ctx.fillRect(0,GY-52,92,52); ctx.fillRect(615,GY-38,105,38);
  ctx.fillStyle='rgba(255,210,100,0.2)';
  [[8,GY-45,9,11],[22,GY-45,9,11],[36,GY-45,9,11],[8,GY-28,9,11],[22,GY-28,9,11],[36,GY-28,9,11],
   [624,GY-30,9,9],[638,GY-30,9,9],[653,GY-30,9,9]].forEach(([wx,wy,ww,wh])=>ctx.fillRect(wx,wy,ww,wh));
  ctx.fillStyle='#242424'; ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(0,GY,W,2);
  ctx.fillStyle='#d0d018';
  for(let i=-1;i<12;i++){ctx.fillRect(i*76,GY+(H-GY)/2-2.5,36,5);}
  ctx.fillStyle='rgba(255,255,255,0.28)';
  for(let i=-1;i<14;i++){ctx.fillRect(i*52,GY+3,18,3);ctx.fillRect(i*52,H-5,18,3);}
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(220,GY+5,55,5,0,0,Math.PI*2); ctx.fill();
  drawSkyPlane(ctx,220,GY-14,0.9);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,215,0,0.85)'; ctx.font='13px Courier New';
  ctx.fillText('All systems ready. Press BLAST OFF! to begin.',360,22);
  ctx.textAlign='left';
}

function startTakeoffAnimFromButton(){
  const btns=document.getElementById('blastoff-btns');
  if(btns) btns.innerHTML=`<button onclick="stopAnim();G.screen='travel';G.msg='🛫 The Mucko is airborne!';render()">Skip →</button>`;
  startTakeoffAnim();
}

function startTakeoffAnim(){
  const canvas=document.getElementById('tocanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=720,H=220,GY=172;
  let t=0,scroll=0,done=false;

  function loop(){
    t++;
    scroll+=Math.min(t*0.26,17);
    ctx.clearRect(0,0,W,H);

    // Sky gradient (pre-dawn → blue)
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,'#050e22'); sg.addColorStop(0.55,'#0c2248'); sg.addColorStop(1,'#2a6a9a');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);
    // Stars (fade as speed increases)
    const sa=Math.max(0,0.5-t/150);
    for(let i=0;i<14;i++){ctx.fillStyle=`rgba(255,255,255,${sa*(1-i/16)})`;ctx.fillRect((i*61+9)%W,(i*27+5)%52,1.5,1.5);}
    // Clouds
    [[140,44,75,0.8],[360,30,60,0.65],[575,48,88,0.75]].forEach(([cx,cy,cw,cs])=>{
      ctx.fillStyle=`rgba(255,255,255,${cs*0.6})`;
      ctx.beginPath();ctx.ellipse(cx,cy,cw*.5,10,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-cw*.18,cy+4,cw*.3,8,0,0,Math.PI*2);ctx.fill();
    });
    // Airport buildings
    ctx.fillStyle='#040b1a';
    ctx.fillRect(0,GY-52,92,52); ctx.fillRect(615,GY-38,105,38);
    ctx.fillStyle='rgba(255,210,100,0.2)';
    [[8,GY-45,9,11],[22,GY-45,9,11],[36,GY-45,9,11],[8,GY-28,9,11],[22,GY-28,9,11],[36,GY-28,9,11],
     [624,GY-30,9,9],[638,GY-30,9,9],[653,GY-30,9,9]].forEach(([wx,wy,ww,wh])=>ctx.fillRect(wx,wy,ww,wh));

    // Runway tarmac
    ctx.fillStyle='#242424'; ctx.fillRect(0,GY,W,H-GY);
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(0,GY,W,2);
    // Yellow center dashes
    ctx.fillStyle='#d0d018';
    for(let i=-1;i<12;i++){const rx=(i*76-scroll%76+76)%W;ctx.fillRect(rx,GY+(H-GY)/2-2.5,36,5);}
    // White edge stripes
    ctx.fillStyle='rgba(255,255,255,0.28)';
    for(let i=-1;i<14;i++){const rx=(i*52-scroll%52+52)%W;ctx.fillRect(rx,GY+3,18,3);ctx.fillRect(rx,H-5,18,3);}

    // Compute plane position + angle
    let px,py,angle,showWheels;
    if(t<=92){
      px=220; py=GY-14; angle=0; showWheels=true;
    } else if(t<=148){
      const rt=t-92;
      px=220+rt*5.4; py=GY-14-rt*1.35; angle=-rt*0.0042; showWheels=rt<30;
    } else {
      const ct=t-148;
      px=220+56*5.4+ct*8; py=GY-14-56*1.35-ct*4.2; angle=-0.235; showWheels=false;
    }

    // Shadow on ground during roll
    if(t<=92){
      ctx.fillStyle='rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse(px,GY+5,55,5,0,0,Math.PI*2); ctx.fill();
    }

    // Landing gear
    if(showWheels){
      const wa=t<=92?1:Math.max(0,1-(t-92)/30);
      ctx.globalAlpha=wa;
      ctx.fillStyle='#1a1a1a';
      [[-22,15],[10,15]].forEach(([wdx,wdy])=>{
        ctx.beginPath(); ctx.arc(px+wdx,py+wdy,7,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#4a4a55'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(px+wdx,py+wdy,7,0,Math.PI*2); ctx.stroke();
        // axle strut
        ctx.strokeStyle='#333'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(px+wdx,py+7); ctx.lineTo(px+wdx,py+wdy-7); ctx.stroke();
      });
      ctx.globalAlpha=1;
    }

    // Jet flame (grows with acceleration)
    const fl=Math.min(t*0.32,26);
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    ctx.fillStyle='rgba(255,130,40,0.75)';
    ctx.beginPath(); ctx.moveTo(-50,-4.5); ctx.lineTo(-50-fl,0); ctx.lineTo(-50,4.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,220,80,0.55)';
    ctx.beginPath(); ctx.moveTo(-52,-2.5); ctx.lineTo(-52-fl*0.62,0); ctx.lineTo(-52,2.5); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Plane
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle); drawSkyPlane(ctx,0,0,0.9); ctx.restore();

    // Status text
    ctx.textAlign='center';
    if(t<=92){
      ctx.fillStyle='rgba(255,215,0,0.82)'; ctx.font='13px Courier New';
      ctx.fillText(`Accelerating… ${Math.round(t/92*100)}%`,360,22);
    } else if(t<=148){
      ctx.fillStyle='rgba(255,215,0,0.95)'; ctx.font='bold 14px Courier New';
      ctx.fillText('Rotation! Nose up! ✈️',360,22);
    } else {
      ctx.fillStyle='rgba(120,220,255,0.96)'; ctx.font='bold 16px Courier New';
      ctx.shadowColor='#44aaff'; ctx.shadowBlur=10;
      ctx.fillText('The Mucko is AIRBORNE!',360,22);
      ctx.shadowBlur=0;
    }
    ctx.textAlign='left';

    if(t>225&&!done){
      done=true;
      setTimeout(()=>{G.screen='travel';G.msg='🛫 The Mucko is airborne! Good luck, Captain!';render();},280);
      return;
    }
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

  <div class="throttle-bar">
    <span style="color:#6a5010;font-size:.78em;font-weight:bold">⚙️ THROTTLE:</span>
    <button style="font-size:.75em;padding:4px 10px${th==='economy'?';background:#0a2a0a;border-color:#33aa33;color:#44cc44':''}" onclick="G.throttle='economy';render()">🐢 Economy</button>
    <button style="font-size:.75em;padding:4px 10px${th==='cruising'?';background:#0a1a3a;border-color:#3366bb;color:#6699ff':''}" onclick="G.throttle='cruising';render()">✈️ Cruising</button>
    <button style="font-size:.75em;padding:4px 10px${th==='full_throttle'?';background:#2a1000;border-color:#bb6600;color:#ffaa44':''}" onclick="G.throttle='full_throttle';render()">🔥 Full Throttle</button>
    <span style="color:#4a3a10;font-size:.7em;font-style:italic">${thDesc}</span>
  </div>
  ${crewRow()}
  ${G.msg?`<div class="msg">${G.msg}</div>`:''}
  <div class="btns">
    <button class="btn-go" onclick="flyDay()">🛫 Fly for a day</button>
    ${canFish?`<button onclick="G.screen='fishing';render()">🎣 Drop anchor &amp; fish</button>`:''}
    <button onclick="G.screen='scores';render()">🏆 Scores</button>
  </div>
  <div style="font-size:.72em;color:#3a2a08;text-align:center;margin-top:8px">
    Tip: watch your fuel and food — and adjust your throttle for the conditions!
  </div>`;
  startTravelAnim();
}

function startTravelAnim(){
  const canvas = document.getElementById('flycanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let planeX = 100;
  const planeY = 42;
  let t = 0;
  const clouds = [
    {x:200, y:16, w:70,  s:0.9},
    {x:430, y:38, w:55,  s:0.7},
    {x:610, y:13, w:85,  s:1.0},
    {x:60,  y:54, w:45,  s:0.6},
    {x:330, y:60, w:60,  s:0.75},
    {x:710, y:28, w:65,  s:0.8},
  ];
  function drawCloud(x,y,w,s){
    ctx.fillStyle='rgba(255,255,255,0.68)';
    ctx.beginPath(); ctx.ellipse(x,y,w*.5,11*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x-w*.18,y+5,w*.32,9*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+w*.22,y+3,w*.28,8*s,0,0,Math.PI*2); ctx.fill();
  }
  function loop(){
    t++;
    const sg=ctx.createLinearGradient(0,0,0,80);
    sg.addColorStop(0,'#0d1e3a'); sg.addColorStop(0.55,'#1a3a6a'); sg.addColorStop(1,'#3a6a9a');
    ctx.fillStyle=sg; ctx.fillRect(0,0,720,80);
    // stars
    for(let i=0;i<10;i++){
      const b=Math.sin(t*.05+i*1.3)*.3+.5;
      ctx.fillStyle=`rgba(255,255,255,${b*.5})`;
      ctx.fillRect((i*67+7)%720,(i*23)%26,1.5,1.5);
    }
    // clouds drift left
    clouds.forEach(cl=>{drawCloud(cl.x,cl.y,cl.w,cl.s);cl.x-=0.35;if(cl.x<-cl.w)cl.x=760+cl.w;});
    // steam trail behind plane
    for(let i=0;i<7;i++){
      ctx.fillStyle=`rgba(210,190,150,${.22-i*.03})`;
      ctx.beginPath();
      ctx.arc(planeX-46-i*13,planeY+Math.sin(t/15+i*.7)*2.2,5+i,0,Math.PI*2);
      ctx.fill();
    }
    // plane
    drawSkyPlane(ctx,planeX,planeY,.8);
    // propeller blur ring
    ctx.strokeStyle='rgba(140,140,140,.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(planeX+50,planeY,10,0,Math.PI*2);ctx.stroke();
    // advance
    planeX+=1.1; if(planeX>770)planeX=-80;
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

function flyDay(){
  G.day++;
  G.msg='';
  const th = G.throttle||'cruising';
  const throttleMult = th==='economy'?0.70:th==='full_throttle'?1.40:1.0;
  const fuelBurn = (G.diff.id==='third'?7:G.diff.id==='second'?7:5.5)*throttleMult;
  const foodEat  = G.diff.id==='third'?2.7:G.diff.id==='second'?2.5:2;
  G.fuel=c(G.fuel-fuelBurn,0,100);
  G.food=c(G.food-foodEat,0,80);
  // starvation
  if(G.food<=0){
    G.crewHp=G.crewHp.map(h=>h>0?c(h-10,0,100):0);
    G.msg='⚠️ No food! The crew is starving!';
  }
  // morale drift
  if(G.food>5) G.morale=c(G.morale-0.5,0,100);
  // progress (throttle-adjusted)
  const baseAdv=(G.diff.id==='third'?20:G.diff.id==='second'?22:27)*throttleMult;
  const adv=baseAdv+(Math.random()*10-5);
  G.progress=c(G.progress+adv,0,120);

  if(checkLoss()) return;

  // arrived at next stop?
  if(G.progress>=100){
    G.leg++;
    G.progress=0;
    if(G.leg>=4){
      G.screen='icebergs'; G.msg=''; render(); return;
    } else {
      G.screen='store';
      G.msg=`✈️ Arrived at ${STOPS[G.leg].name}! Day ${G.day}.`;
      render(); return;
    }
  }

  // random event (38%)
  if(Math.random()<0.38){
    triggerEvent(); return;
  }

  // sky telegram (22% when no event fires)
  if(Math.random()<0.22){
    const tg=TELEGRAMS[Math.floor(Math.random()*TELEGRAMS.length)];
    G.msg=`📡 <strong>Wireless from ${tg.from}:</strong><br><em>"${tg.msg}"</em>`;
  } else if(th==='full_throttle'){
    G.msg='🔥 The boilers roar at full throttle! You\'re making excellent time.';
  } else if(th==='economy'){
    G.msg='🐢 Steady and smooth at economy cruise. The crew appreciates the calm ride.';
  }

  G.screen='travel';
  render();
}

function checkLoss(){
  if(G.fuel<=0){G.msg='⛽ The Mucko has run out of fuel and is going down over the sky-ocean!';G.screen='emergency_landing';render();return true}
  if(G.hull<=0){G.msg='🔧 The hull has given way — the Mucko is breaking apart!';G.screen='emergency_landing';render();return true}
  if(G.crewHp.every(h=>h<=0)){G.msg='😔 The crew are too ill to continue — the Mucko makes an emergency descent.';G.screen='emergency_landing';render();return true}
  return false;
}

// ── EVENTS ───────────────────────────────────────────────────────────────────

function triggerEvent(){
  G.curEvent = EVENTS[Math.floor(Math.random()*EVENTS.length)];
  G.screen='event'; render();
}

function showEvent(el){
  const ev=G.curEvent;
  // Pull the first emoji out of the title (e.g. "⛈️ Terrible Sky-Storm!") for the big badge.
  const emojiMatch = ev.title.match(/^\s*(\p{Extended_Pictographic}(?:\uFE0F|\u200D\p{Extended_Pictographic})*)/u);
  const bigIcon = ev.icon || (emojiMatch ? emojiMatch[1] : '🎲');
  const cleanTitle = emojiMatch ? ev.title.slice(emojiMatch[0].length).trim() : ev.title;
  el.innerHTML = `
  <div class="sbar" style="font-size:.82em">
    <span>⛽ ${Math.round(G.fuel)}%</span><span>🍖 ${Math.round(G.food)}</span>
    <span>🔧 ${Math.round(G.hull)}%</span><span>💰 ${G.gold}</span><span>Day ${G.day}</span>
  </div>
  <div class="ev-box">
    <div class="ev-big" aria-hidden="true">${bigIcon}</div>
    <div class="ev-title">${cleanTitle}</div>
    <div class="ev-text">${ev.text}</div>
    <div class="ev-choices">
      ${ev.choices.map((ch,i)=>`<button onclick="resolveEvent(${i})"><span class="ch-icon" aria-hidden="true">${ch.i||'▶'}</span><span class="ch-txt">${ch.t}</span></button>`).join('')}
    </div>
  </div>`;
}

function resolveEvent(i){
  const ev=G.curEvent;
  const ch=ev.choices[i];
  G._msg=null;
  ch.fx(G);
  // clamp all
  G.fuel=c(G.fuel,0,100); G.food=c(G.food,0,80); G.hull=c(G.hull,0,100);
  G.morale=c(G.morale,0,100); G.gold=c(G.gold,0,9999);
  G.crewHp=G.crewHp.map(h=>c(h,0,100));
  const out = G._msg || ch.out || '';
  G.msg = out;
  G.curEvent=null;
  if(checkLoss()) return;
  G.screen='travel'; render();
}

function showFishing(el){
  el.innerHTML = `
  <h2>🎣 Pontoon Fishing</h2>
  <div class="prose" style="margin-bottom:8px">
    The Mucko has lowered her pontoons onto the sky-ocean.<br>
    <strong>Click on fish</strong> as they swim past! You have 30 seconds.
  </div>
  <canvas id="fc" width="720" height="300"></canvas>
  <div style="display:flex;justify-content:space-between;margin-top:6px">
    <span id="fcnt" style="color:#44cc44">Fish caught: 0</span>
    <span id="ftmr" style="color:#ffd700">Time: 40s</span>
  </div>
  <div class="btns" style="margin-top:8px">
    <button class="btn-go" id="fstrt" onclick="startFishing()">🎣 Start Fishing!</button>
    <button onclick="G.screen='store';render()">← Back to port</button>
  </div>`;
  CV=document.getElementById('fc'); CX=CV.getContext('2d');

function drawFishIdle(){
  drawFishBg();
  [[190,200,'#ff8c00'],[400,245,'#4169e1'],[560,215,'#32cd32'],[310,265,'#ff6347'],[480,230,'#ff1493']].forEach(([x,y,col])=>drawFish(CX,x,y,col,1,1));
  drawPontoonPlane(CX,360,100);
}

function drawFishBg(){
  const sg=CX.createLinearGradient(0,0,0,140); sg.addColorStop(0,'#1a2a4a'); sg.addColorStop(1,'#87ceeb');
  CX.fillStyle=sg; CX.fillRect(0,0,720,140);
  const wg=CX.createLinearGradient(0,140,0,300); wg.addColorStop(0,'#1a5a8a'); wg.addColorStop(1,'#0a2a4a');
  CX.fillStyle=wg; CX.fillRect(0,140,720,160);
  CX.fillStyle='rgba(135,206,235,0.25)'; CX.fillRect(0,138,720,4);
}

function drawPontoonPlane(ctx,x,y){
  // x,y is the center of the plane
  const s=0.88;
  drawSkyPlane(ctx,x,y,s);
  // Pontoon floats below hull
  ctx.fillStyle='#3a4a5a';
  ctx.fillRect(x-24*s, y+11*s, 22*s, 7*s);
  ctx.fillRect(x+6*s,  y+11*s, 22*s, 7*s);
  // Struts
  ctx.strokeStyle='#5a6a7a'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(x-14*s,y+9*s); ctx.lineTo(x-12*s,y+17*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+10*s,y+9*s); ctx.lineTo(x+16*s,y+17*s); ctx.stroke();
}

function drawFish(ctx,x,y,col,dir,scale){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale*dir,scale);
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.ellipse(0,0,18,9,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-28,-9); ctx.lineTo(-28,9); ctx.closePath(); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(10,-3,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(11,-3,1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

let FS = {};
let fishTimer = null;

function startFishing(){
  document.getElementById('fstrt').disabled=true;
  FS={fish:[],caught:0,timeLeft:40,active:true,spawnT:0};
  function spawnFish(){
    const lr=Math.random()<0.5;
    FS.fish.push({x:lr?760:-40,y:148+Math.random()*90,vx:lr?-(0.9+Math.random()*1.2):(0.9+Math.random()*1.2),
      col:['#ff8c00','#ff6347','#4169e1','#32cd32','#ff1493','#ff4500'][Math.floor(Math.random()*6)],
      sz:0.9+Math.random()*0.5,caught:false,splash:0});
  }
  spawnFish(); spawnFish(); spawnFish();
  function hitFish(mx,my){
    if(!FS.active)return;
    for(const f of FS.fish){
      if(f.caught)continue;
      const dx=mx-f.x,dy=my-f.y,hr=30*f.sz;
      if(dx*dx+dy*dy<hr*hr){f.caught=true;f.splash=25;FS.caught++;document.getElementById('fcnt').textContent=`Fish caught: ${FS.caught}`;break;}
    }
  }
  CV.onclick=(e)=>{
    const r=CV.getBoundingClientRect();
    hitFish((e.clientX-r.left)*(720/r.width),(e.clientY-r.top)*(300/r.height));
  };
  CV.addEventListener('touchstart',(e)=>{
    e.preventDefault();
    const r=CV.getBoundingClientRect();
    const t=e.touches[0];
    hitFish((t.clientX-r.left)*(720/r.width),(t.clientY-r.top)*(300/r.height));
  },{passive:false});
  let st=0,elapsed=0;
  fishTimer=setInterval(()=>{elapsed++;FS.timeLeft=40-elapsed;const t=document.getElementById('ftmr');if(t)t.textContent=`Time: ${FS.timeLeft}s`;if(elapsed>=40){clearInterval(fishTimer);FS.active=false;endFishing();}},1000);
  function loop(ts){
    if(!FS.active){drawFishFrame();return;}
    FS.spawnT+=ts-st; st=ts;
    if(FS.spawnT>1400){spawnFish();FS.spawnT=0;}
    FS.fish.forEach(f=>{if(!f.caught)f.x+=f.vx;if(f.splash>0)f.splash--;});
    FS.fish=FS.fish.filter(f=>(f.x>-60&&f.x<790)||f.splash>0);
    drawFishFrame();
    animId=requestAnimationFrame(loop);
  }
  st=performance.now(); animId=requestAnimationFrame(loop);
}

function drawFishFrame(){
  drawFishBg();
  CX.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<6;i++){CX.fillRect((Date.now()/60+i*120)%720,142+i*4,50,2);}
  FS.fish.forEach(f=>{
    if(f.caught&&f.splash>0){
      CX.fillStyle=`rgba(100,200,255,${f.splash/25})`;
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2,r=(25-f.splash)*0.9;CX.beginPath();CX.arc(f.x+Math.cos(a)*r,f.y+Math.sin(a)*r,3,0,Math.PI*2);CX.fill();}
    } else if(!f.caught){
      drawFish(CX,f.x,f.y,f.col,f.vx>0?1:-1,f.sz);
    }
  });
  drawPontoonPlane(CX,360,100);
  // Fishing line from center of plane down into water
  CX.strokeStyle='rgba(200,200,200,0.65)'; CX.lineWidth=1.2; CX.setLineDash([4,3]);
  CX.beginPath(); CX.moveTo(360,119); CX.lineTo(360,270); CX.stroke(); CX.setLineDash([]);
  // Bobber at water surface
  CX.fillStyle='white'; CX.beginPath(); CX.arc(360,143,5.5,0,Math.PI*2); CX.fill();
  CX.fillStyle='#ff3333'; CX.beginPath(); CX.arc(360,146.5,5.5,0,Math.PI*2); CX.fill();
}

function endFishing(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  CV.onclick=null;
  G.fishingUsed=true;
  const gained=FS.caught*5;
  G.food=c(G.food+gained,0,80);
  G.fishCaught+=FS.caught;
  const res=document.createElement('div');
  res.style.cssText='text-align:center;margin-top:12px';
  res.innerHTML=`<div class="msg">🎣 You caught <strong>${FS.caught} fish</strong>! That's +${gained} food for the crew!<br>
    ${FS.caught>=6?'⭐ Outstanding!':FS.caught>=3?'👍 Good haul!':'Keep practising!'}</div>
    <button class="btn-go" onclick="G.screen='store';G.msg='The crew returns from fishing, refreshed!';render()">🛫 Back to the Mucko!</button>`;
  document.getElementById('app').appendChild(res);
}

  <h2>🧊 The Iceberg Field!</h2>

function drawBergIdle(){
  CX.fillStyle='#080d18'; CX.fillRect(0,0,720,360);
  for(let i=0;i<60;i++){CX.fillStyle=`rgba(255,255,255,${.3+Math.random()*.7})`;CX.fillRect(Math.random()*720,Math.random()*360,1+Math.random(),1+Math.random());}
  [[400,80,.9],[560,200,.7],[300,270,.8],[620,140,.6]].forEach(([x,y,s])=>drawBerg(CX,x,y,s));
  drawSkyPlane(CX,100,180,1);
  CX.fillStyle='rgba(255,215,0,.5)'; CX.font='18px Courier New'; CX.fillText('🗽 New York →',580,28);
}

function drawBerg(ctx,x,y,scale){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  const g=ctx.createLinearGradient(0,-45,0,30);
  g.addColorStop(0,'#e8f6ff'); g.addColorStop(.5,'#9dd4f0'); g.addColorStop(1,'#5099c0');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(35,-18); ctx.lineTo(42,12); ctx.lineTo(28,32); ctx.lineTo(-28,32); ctx.lineTo(-42,12); ctx.lineTo(-35,-18); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.moveTo(-4,-46); ctx.lineTo(12,-28); ctx.lineTo(0,-18); ctx.lineTo(-14,-34); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(200,240,255,.7)';
  [[-22,-56],[26,-44],[-36,-28],[40,-8]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function drawSkyPlane(ctx,x,y,scale){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);

  // === TAIL STABILIZER ===
  ctx.fillStyle='#162850';
  ctx.beginPath(); ctx.moveTo(-44,-8); ctx.lineTo(-28,-8); ctx.lineTo(-26,-22); ctx.lineTo(-42,-20); ctx.closePath(); ctx.fill();

  // === MAIN WING ===
  ctx.fillStyle='#162850';
  ctx.beginPath(); ctx.moveTo(-14,-12); ctx.lineTo(30,-12); ctx.lineTo(40,-32); ctx.lineTo(-6,-32); ctx.closePath(); ctx.fill();
  // Wing leading-edge stripe
  ctx.fillStyle='rgba(200,170,50,0.4)';
  ctx.beginPath(); ctx.moveTo(29,-12); ctx.lineTo(40,-32); ctx.lineTo(36,-32); ctx.lineTo(26,-12); ctx.closePath(); ctx.fill();

  // === TURBOFAN ENGINES (under wing) ===
  // Engine 1
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(4,-22,10,5.5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#6a7a9a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(4,-22,10,5.5,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(4,-22,5,3,0,0,Math.PI*2); ctx.fill();
  // fan blades
  ctx.strokeStyle='#5a6a7a'; ctx.lineWidth=1.2;
  for(let a=0;a<4;a++){const ang=a/4*Math.PI*2;ctx.beginPath();ctx.moveTo(4,-22);ctx.lineTo(4+Math.cos(ang)*8,-22+Math.sin(ang)*4);ctx.stroke();}
  // Engine 2
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(22,-25,9,5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#6a7a9a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(22,-25,9,5,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(22,-25,4.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5a6a7a'; ctx.lineWidth=1.2;
  for(let a=0;a<4;a++){const ang=a/4*Math.PI*2;ctx.beginPath();ctx.moveTo(22,-25);ctx.lineTo(22+Math.cos(ang)*7,-25+Math.sin(ang)*4);ctx.stroke();}

  // === HULL ===
  ctx.fillStyle='#0a1f4a'; // Titanic dark navy
  ctx.beginPath();
  ctx.moveTo(-50,-11); ctx.lineTo(44,-11);
  ctx.lineTo(64,0);           // nose point
  ctx.lineTo(44,11); ctx.lineTo(-50,11); ctx.lineTo(-58,0); ctx.closePath();
  ctx.fill();
  // White Plimsoll band
  ctx.fillStyle='rgba(240,235,218,0.9)';
  ctx.fillRect(-50,-2.5,112,5);

  // === FOUR FUNNELS (Titanic!) ===
  [-28,-9,10,29].forEach((fx,i)=>{
    // Funnel body — brass/gold
    ctx.fillStyle='#c8a030';
    ctx.fillRect(fx-5.5,-30,11,20);
    // Black top band
    ctx.fillStyle='#111';
    ctx.fillRect(fx-5.5,-34,11,6);
    // Steam puff
    ctx.fillStyle='rgba(255,255,255,0.38)';
    ctx.beginPath(); ctx.arc(fx+(i%2?2:-1),-38,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(fx+(i%2?5:-4),-42,2.5,0,Math.PI*2); ctx.fill();
  });

  // === JET NOZZLE (tail) ===
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.moveTo(-50,-6); ctx.lineTo(-64,0); ctx.lineTo(-50,6); ctx.closePath(); ctx.fill();
  // Jet glow
  ctx.fillStyle='rgba(255,130,40,0.72)';
  ctx.beginPath(); ctx.moveTo(-60,-4); ctx.lineTo(-78,0); ctx.lineTo(-60,4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,220,90,0.5)';
  ctx.beginPath(); ctx.moveTo(-62,-2); ctx.lineTo(-75,0); ctx.lineTo(-62,2); ctx.closePath(); ctx.fill();

  // === STEAMPUNK PROPELLER (nose) ===
  ctx.fillStyle='#b87333'; // copper
  ctx.fillRect(61,-16,4,32);  // vertical blade
  ctx.fillRect(55,-3,17,6);   // horizontal blade
  ctx.fillStyle='#d4af37';    // brass hub
  ctx.beginPath(); ctx.arc(63,0,5.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8a6010'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(63,0,5.5,0,Math.PI*2); ctx.stroke();

  // === PORTHOLES ===
  [-32,-16,0,16,32].forEach(px=>{
    ctx.fillStyle='#87ceeb';
    ctx.beginPath(); ctx.arc(px,0,3.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c8a030'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(px,0,3.5,0,Math.PI*2); ctx.stroke();
  });

  ctx.restore();
}

let BS={};

function startIcebergs(){
  document.getElementById('bstrt').disabled=true;
  const dm = G.diff.id==='third'?1.2:G.diff.id==='second'?1.1:1.0;
  BS={
    px:110, py:180, keys:{}, bergs:[], cleared:0, progress:0,
    active:true, invuln:0, spawnT:0, dm,
    stars:Array.from({length:70},()=>({x:Math.random()*720,y:Math.random()*360,s:.5+Math.random()*1.5,b:Math.random()})),
    touchY:null, touchX:null,
  };
  const kd=e=>{BS.keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();};
  const ku=e=>{BS.keys[e.key]=false;};
  document.addEventListener('keydown',kd);
  document.addEventListener('keyup',ku);
  const tm=e=>{e.preventDefault();const r=CV.getBoundingClientRect();BS.touchX=(e.touches[0].clientX-r.left)*(720/r.width);BS.touchY=(e.touches[0].clientY-r.top)*(360/r.height);};
  const te=e=>{BS.touchX=null;BS.touchY=null;};
  CV.addEventListener('touchmove',tm,{passive:false});
  CV.addEventListener('touchend',te);
  BS.cleanup=()=>{document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);CV.removeEventListener('touchmove',tm);CV.removeEventListener('touchend',te);};

  function spawn(){
    const sz=(0.5+Math.random()*0.7);
    const speedScale=Math.min(BS.progress,75)*0.022;
    BS.bergs.push({x:780,y:40+Math.random()*285,vx:-(2.0+Math.random()*1.6+speedScale)*BS.dm,vy:(Math.random()-.5)*1.6,scale:sz,hr:28*sz});
  }
  spawn(); spawn();

  function loop(){
    if(!BS.active)return;
    const spd=4.5;
    if(BS.keys['ArrowUp']||BS.keys['w']||BS.keys['W'])     BS.py-=spd;
    if(BS.keys['ArrowDown']||BS.keys['s']||BS.keys['S'])   BS.py+=spd;
    if(BS.keys['ArrowLeft']||BS.keys['a']||BS.keys['A'])   BS.px=Math.max(50,BS.px-spd);
    if(BS.keys['ArrowRight']||BS.keys['d']||BS.keys['D'])  BS.px=Math.min(660,BS.px+spd);
    if(BS.touchX!==null){const dx=BS.touchX-BS.px,dy=BS.touchY-BS.py;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>8){BS.px+=dx/dist*spd*1.4;BS.py+=dy/dist*spd*1.4;}}
    BS.py=c(BS.py,18,346); BS.px=c(BS.px,30,690);
    BS.progress=c(BS.progress+0.13,0,100);
    BS.spawnT++;
    const sr=Math.max(75-Math.min(BS.progress,70)*0.62,30);
    if(BS.spawnT>sr){spawn();BS.spawnT=0;}
    BS.bergs.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.y<18||b.y>346)b.vy*=-1;});
    const before=BS.bergs.length;
    BS.bergs=BS.bergs.filter(b=>b.x>-120);
    BS.cleared+=(before-BS.bergs.length);
    if(BS.invuln<=0){
      for(const b of BS.bergs){
        const dx=BS.px-b.x,dy=BS.py-b.y;
        if(Math.sqrt(dx*dx+dy*dy)<b.hr+18){
          G.hull=c(G.hull-(G.diff.id==='third'?20:G.diff.id==='second'?14:10),0,100);
          BS.invuln=65;
          const hel=document.getElementById('bhull');if(hel)hel.textContent=`Hull: ${Math.round(G.hull)}%`;
          if(G.hull<=0){BS.active=false;BS.lost=true;}
          break;
        }
      }
    } else BS.invuln--;
    if(BS.progress>=100){BS.active=false;BS.won=true;}
    const sc=document.getElementById('bscore'); if(sc)sc.textContent=`Icebergs cleared: ${BS.cleared}`;
    const di=document.getElementById('bdist'); if(di)di.textContent=`Distance to NY: ${Math.max(0,Math.round(100-BS.progress))}%`;
    drawBergFrame();
    if(BS.active){animId=requestAnimationFrame(loop);}
    else{BS.cleanup();setTimeout(()=>{G.bergsDodged=BS.cleared;G.screen=BS.won?'landing':'emergency_landing';if(!BS.won)G.msg='🧊 The Mucko took too many iceberg hits — structural damage! Going down!';render();},1800);}
  }
  animId=requestAnimationFrame(loop);
}

function drawBergFrame(){
  CX.fillStyle='#070c18'; CX.fillRect(0,0,720,360);
  BS.stars.forEach(s=>{CX.fillStyle=`rgba(255,255,255,${.35+s.b*.65})`;CX.fillRect(s.x,s.y,s.s,s.s);});
  CX.fillStyle='#fff9e0'; CX.beginPath(); CX.arc(660,48,28,0,Math.PI*2); CX.fill();
  CX.fillStyle='#070c18'; CX.beginPath(); CX.arc(670,42,24,0,Math.PI*2); CX.fill();
  CX.fillStyle='rgba(0,0,0,.5)'; CX.fillRect(4,4,200,12);
  CX.fillStyle='#ffd700'; CX.fillRect(4,4,200*(BS.progress/100),12);
  CX.strokeStyle='#5a4010'; CX.lineWidth=1; CX.strokeRect(4,4,200,12);
  CX.fillStyle='#ffd700'; CX.font='10px Courier New'; CX.fillText('NYC →',208,14);
  BS.bergs.forEach(b=>drawBerg(CX,b.x,b.y,b.scale));
  if(BS.invuln<=0||Math.floor(BS.invuln/5)%2===0){
    drawSkyPlane(CX,BS.px,BS.py,1);
    CX.strokeStyle='rgba(160,160,160,.4)'; CX.lineWidth=2;
    CX.beginPath(); CX.arc(BS.px+63,BS.py,12,0,Math.PI*2); CX.stroke();
  }
  if(BS.invuln>58){CX.fillStyle='rgba(255,0,0,.28)';CX.fillRect(0,0,720,360);}
  if(BS.won){
    CX.fillStyle='rgba(0,30,0,.72)';CX.fillRect(0,0,720,360);
    CX.fillStyle='#ffd700';CX.font='bold 34px Courier New';CX.textAlign='center';CX.fillText('🗽 NEW YORK! 🗽',360,155);
    CX.fillStyle='#87ceeb';CX.font='18px Courier New';CX.fillText('You made it through the icebergs!',360,195);CX.textAlign='left';
  }
  if(BS.lost){
    CX.fillStyle='rgba(20,10,0,.75)';CX.fillRect(0,0,720,360);
    CX.fillStyle='#ffaa44';CX.font='bold 30px Courier New';CX.textAlign='center';CX.fillText('HULL DAMAGE!',360,150);
    CX.fillStyle='#ffd700';CX.font='18px Courier New';CX.fillText('The Mucko makes an emergency landing…',360,192);CX.textAlign='left';
  }
}

function showLanding(el){
  el.innerHTML=`
  <h2>🛬 Approaching New York!</h2>

function startLandingAnim(){
  const canvas=document.getElementById('landcanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=720,H=220,GY=170;
  let t=0,done=false;
  function loop(){
    t++;
    ctx.clearRect(0,0,W,H);
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,'#050e22'); sg.addColorStop(0.45,'#1a3a6a'); sg.addColorStop(0.8,'#b03a1a'); sg.addColorStop(1,'#e07830');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);
    const sa=Math.max(0,0.55-t/130);
    for(let i=0;i<12;i++){ctx.fillStyle=`rgba(255,255,255,${sa})`;ctx.fillRect((i*57+5)%W,(i*31+4)%55,1.5,1.5);}
    ctx.fillStyle='#040b18';
    [[220,95,22],[242,78,20],[266,62,26],[300,47,26],[332,32,36],[372,22,40],[416,37,28],
     [452,52,26],[482,66,20],[507,57,28],[542,72,26],[573,86,28],[607,96,20],[632,82,26],[660,91,28]
    ].forEach(([x,yt,w])=>ctx.fillRect(x,yt,w,GY-yt));
    // Runway
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,GY,W,H-GY);
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(0,GY,W,2);
    ctx.fillStyle='#d0d018';
    for(let i=-1;i<12;i++){ctx.fillRect(i*76,GY+(H-GY)/2-2.5,36,5);}
    ctx.fillStyle='rgba(255,255,255,0.25)';
    for(let i=-1;i<14;i++){ctx.fillRect(i*52,GY+3,18,3);ctx.fillRect(i*52,H-5,18,3);}
    // Terminal buildings
    ctx.fillStyle='#040b1a'; ctx.fillRect(600,GY-50,120,50);
    ctx.fillStyle='rgba(255,210,100,0.22)';
    [[608,GY-42,9,9],[622,GY-42,9,9],[637,GY-42,9,9],[608,GY-26,9,9],[622,GY-26,9,9],[637,GY-26,9,9]].forEach(([wx,wy,ww,wh])=>ctx.fillRect(wx,wy,ww,wh));
    // Plane approach
    const totalF=260;
    let px,py,angle;
    if(t<totalF){
      const prog=t/totalF, e=prog*prog*(3-2*prog);
      px=710-(710-240)*e; py=36+(GY-14-36)*e; angle=-0.18*(1-e);
    } else {
      px=240; py=GY-14; angle=0;
    }
    if(py>GY-55){const a=Math.min(0.28,(py-(GY-55))/55*0.28);ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.beginPath();ctx.ellipse(px,GY+5,55,4,0,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.translate(px,py);ctx.rotate(angle);
    ctx.fillStyle='rgba(255,130,40,0.5)';ctx.beginPath();ctx.moveTo(-50,-3);ctx.lineTo(-60,0);ctx.lineTo(-50,3);ctx.closePath();ctx.fill();
    drawSkyPlane(ctx,0,0,0.9);
    ctx.restore();
    ctx.textAlign='center';
    if(t<60){ctx.fillStyle='rgba(255,215,0,0.85)';ctx.font='13px Courier New';ctx.fillText('New York in sight! Descending…',360,22);}
    else if(t<totalF){ctx.fillStyle='rgba(135,206,235,0.95)';ctx.font='bold 14px Courier New';ctx.fillText('Final approach — lowering landing gear! ✈️',360,22);}
    else{ctx.fillStyle='rgba(255,215,0,0.98)';ctx.font='bold 16px Courier New';ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.fillText('THE MUCKO HAS LANDED! 🗽',360,22);ctx.shadowBlur=0;}
    ctx.textAlign='left';
    if(t>totalF+90&&!done){done=true;setTimeout(()=>{G.screen='victory';render();},320);}
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

function showEmergencyLanding(el){
  el.innerHTML=`
  <h2>⚠️ Emergency!</h2>
  <div class="prose" style="margin-bottom:8px">${G.msg||'The Mucko has been forced down!'}</div>
  <canvas id="elcanvas" width="720" height="280" style="border-radius:6px;border:1px solid #8b3010;display:block;cursor:default"></canvas>
  <div style="text-align:center;margin-top:8px">
    <button onclick="stopAnim();G.screen='gameover';render()">Skip →</button>
  </div>`;
  startEmergencyAnim();
}

function startEmergencyAnim(){
  const canvas=document.getElementById('elcanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=720,H=280,WY=195;
  let t=0,done=false;

  function drawBg(){
    const sg=ctx.createLinearGradient(0,0,0,WY);
    sg.addColorStop(0,'#070f1e'); sg.addColorStop(0.7,'#0c2040'); sg.addColorStop(1,'#1a3560');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,WY);
    for(let i=0;i<14;i++){ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillRect((i*47+6)%W,(i*29+5)%75,1.5,1.5);}
    [[80,45,90],[280,25,65],[510,40,80],[650,28,55]].forEach(([cx,cy,cw])=>{
      ctx.fillStyle='rgba(160,170,200,0.35)';
      ctx.beginPath();ctx.ellipse(cx,cy,cw*.5,11,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-cw*.15,cy+5,cw*.3,8,0,0,Math.PI*2);ctx.fill();
    });
    const wg=ctx.createLinearGradient(0,WY,0,H);
    wg.addColorStop(0,'#0a2040'); wg.addColorStop(1,'#050d20');
    ctx.fillStyle=wg; ctx.fillRect(0,WY,W,H-WY);
    ctx.strokeStyle='rgba(100,160,220,0.3)'; ctx.lineWidth=1.5;
    for(let i=0;i<8;i++){const wx=(i*90+t*.5)%W;ctx.beginPath();ctx.moveTo(wx,WY+7+i%3*5);ctx.lineTo(wx+32,WY+7+i%3*5);ctx.stroke();}
  }

  function drawRaft(rx,ry,alpha){
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.ellipse(rx,ry,38,11,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#CC8800'; ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(rx,ry,38,11,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#FFFACD';
    ctx.beginPath();ctx.ellipse(rx,ry,26,6,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#444'; ctx.lineWidth=1.5;
    [-16,0,16].forEach((dx,i)=>{
      const bx=rx+dx,by=ry-11;
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.arc(bx,by-7,3.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(bx,by-3.5);ctx.lineTo(bx,by+4);ctx.stroke();
      const wv=Math.sin(t*0.12+i*1.1)*5;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+9,by-5+wv);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-5,by+3);ctx.stroke();
    });
    ctx.globalAlpha=1; ctx.restore();
  }

  let raftX=355,showRaft=false,raftAlpha=0;

  function loop(){
    t++;
    ctx.clearRect(0,0,W,H);
    drawBg();

    const scale=1.0, breakX=355;
    if(t<50){
      ctx.save();ctx.translate(360,115);ctx.rotate(-0.05);drawSkyPlane(ctx,0,0,scale);ctx.restore();
    } else if(t<90){
      const p=(t-50)/40;
      ctx.save();ctx.translate(360,115+p*18);ctx.rotate(-0.05+p*0.35);drawSkyPlane(ctx,0,0,scale);ctx.restore();
    } else if(t<122){
      ctx.save();ctx.translate(360,133);ctx.rotate(0.3);drawSkyPlane(ctx,0,0,scale);ctx.restore();
      const cf=(t<106)?(t-90)/16:(122-t)/16;
      if(cf>0){
        ctx.save();ctx.globalAlpha=cf;
        ctx.strokeStyle='#ff8800';ctx.lineWidth=5;
        ctx.beginPath();ctx.moveTo(352,98);ctx.lineTo(356,133);ctx.lineTo(351,168);ctx.stroke();
        ctx.globalAlpha=cf*0.28;ctx.fillStyle='#ff4400';ctx.fillRect(0,0,W,H);
        ctx.globalAlpha=1;ctx.restore();
      }
    } else {
      const sp=Math.min((t-122)/200,1);
      const ease=sp*sp*(3-2*sp);
      const breakY=133;
      const bowAngle=0.3+ease*1.3;
      const bowOffY=ease*ease*95;
      const sternAngle=0.3+ease*1.65;
      const sternAlpha=sternAngle>Math.PI?Math.max(0,1-(sternAngle-Math.PI)/0.45):1;

      ctx.save();ctx.translate(breakX,breakY+bowOffY);ctx.rotate(bowAngle);
      ctx.beginPath();ctx.rect(0,-85,180,170);ctx.clip();
      drawSkyPlane(ctx,5,0,scale);ctx.restore();

      if(sternAlpha>0){
        ctx.save();ctx.globalAlpha=sternAlpha;ctx.translate(breakX,breakY);ctx.rotate(sternAngle);
        ctx.beginPath();ctx.rect(-180,-85,180,170);ctx.clip();
        drawSkyPlane(ctx,5,0,scale);ctx.restore();ctx.globalAlpha=1;
      }

      if(t>205){
        const ra=t-205; raftX=355+ra*0.9; raftAlpha=Math.min(ra/35,1); showRaft=true;
      }
    }

    if(showRaft) drawRaft(raftX,WY-2,raftAlpha);

    ctx.textAlign='center';
    if(t<90){ctx.fillStyle='rgba(255,165,0,0.9)';ctx.font='bold 15px Courier New';ctx.fillText('⚠️ Mayday! Mayday!',360,20);}
    else if(t<145){ctx.fillStyle='rgba(255,70,0,0.97)';ctx.font='bold 18px Courier New';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;ctx.fillText('💥 STRUCTURAL FAILURE!',360,20);ctx.shadowBlur=0;}
    else if(t<245){ctx.fillStyle='rgba(255,200,0,0.9)';ctx.font='bold 14px Courier New';ctx.fillText('The Mucko breaks apart over the sky-ocean…',360,20);}
    else{ctx.fillStyle='rgba(100,220,255,0.92)';ctx.font='13px Courier New';ctx.fillText('All crew safe on the life-raft! 🌊',360,20);}
    ctx.textAlign='left';

    if(t>430&&!done){done=true;setTimeout(()=>{G.screen='gameover';render();},200);}
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

function startArrivalAnim(){
  const canvas = document.getElementById('arrival-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let planeX = -90;
  let t = 0;
  const confetti = Array.from({length:28},(_,i)=>({
    x:Math.random()*720, y:Math.random()*180,
    vx:(Math.random()-.5)*1.6, vy:0.9+Math.random()*1.6,
    col:['#ffd700','#ff6644','#44cc66','#4499ff','#ff44cc','#ffffff','#ffcc44'][i%7],
    sz:3+Math.random()*4, angle:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.12,
  }));

  function drawScene(){
    // Dawn sky
    const sg=ctx.createLinearGradient(0,0,0,180);
    sg.addColorStop(0,'#050d1e'); sg.addColorStop(0.4,'#0f2040');
    sg.addColorStop(0.75,'#b03a1a'); sg.addColorStop(1,'#e07830');
    ctx.fillStyle=sg; ctx.fillRect(0,0,720,180);
    // Sun glow on horizon
    const glow=ctx.createRadialGradient(360,195,8,360,195,130);
    glow.addColorStop(0,'rgba(255,150,40,0.45)'); glow.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,720,180);
    // Fading stars
    const sa=Math.max(0,0.55-t/220);
    for(let i=0;i<18;i++){ctx.fillStyle=`rgba(255,255,255,${sa})`;ctx.fillRect((i*43+5)%720,(i*29+3)%75,1.5,1.5);}
    // Manhattan skyline silhouette
    ctx.fillStyle='#060c18';
    [[220,105,25],[242,88,20],[266,72,30],[300,57,26],[332,42,36],
     [372,32,40],[416,47,30],[452,62,26],[482,76,20],[507,67,30],
     [542,82,26],[573,96,30],[607,106,20],[632,91,26],[660,101,30],
     [188,116,26],[163,121,20],[143,111,26],[122,126,20],[99,121,30]
    ].forEach(([x,yt,w])=>{
      ctx.fillRect(x,yt,w,180-yt);
      ctx.fillStyle='rgba(255,210,100,0.3)';
      for(let wy=yt+4;wy<172;wy+=10)for(let wx=x+3;wx<x+w-3;wx+=7)if((wx+wy)%17>7)ctx.fillRect(wx,wy,4,6);
      ctx.fillStyle='#060c18';
    });
    // Statue of Liberty
    ctx.fillStyle='#0a1828';
    ctx.fillRect(77,106,8,74); ctx.fillRect(71,91,20,20);
    ctx.fillRect(75,79,12,16);
    ctx.beginPath(); ctx.arc(81,73,9,0,Math.PI*2); ctx.fill();
    ctx.fillRect(83,63,4,14);
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.arc(85,61,4,0,Math.PI*2); ctx.fill();
    // Water
    const wg=ctx.createLinearGradient(0,155,0,180);
    wg.addColorStop(0,'#0a1830'); wg.addColorStop(1,'#050d1e');
    ctx.fillStyle=wg; ctx.fillRect(0,155,720,25);
    ctx.strokeStyle='rgba(255,200,100,0.2)'; ctx.lineWidth=1;
    for(let i=0;i<8;i++){const wx=(i*95+t*.5)%720;ctx.beginPath();ctx.moveTo(wx,162+i%3*5);ctx.lineTo(wx+28,162+i%3*5);ctx.stroke();}
  }

  function loop(){
    t++;
    ctx.clearRect(0,0,720,180);
    drawScene();
    // Confetti
    confetti.forEach(cf=>{
      ctx.save(); ctx.translate(cf.x,cf.y); ctx.rotate(cf.angle);
      ctx.fillStyle=cf.col; ctx.globalAlpha=0.85;
      ctx.fillRect(-cf.sz/2,-cf.sz/2,cf.sz,cf.sz*1.6);
      ctx.globalAlpha=1; ctx.restore();
      cf.x+=cf.vx; cf.y+=cf.vy; cf.angle+=cf.spin;
      if(cf.y>186){cf.y=-6;cf.x=Math.random()*720;}
    });
    // Plane landing approach — eases in from left
    if(planeX<285) planeX+=Math.max(1.5,(285-planeX)*0.04);
    // Steam trail
    for(let i=0;i<6;i++){
      ctx.fillStyle=`rgba(200,180,140,${.20-i*.03})`;
      ctx.beginPath(); ctx.arc(planeX-46-i*14,58+Math.sin(t/20+i)*2.5,6-i*.5,0,Math.PI*2); ctx.fill();
    }
    drawSkyPlane(ctx,planeX,58,.85);
    // Celebration text
    if(t>55){
      ctx.fillStyle='rgba(255,215,0,0.95)'; ctx.font='bold 22px Courier New';
      ctx.textAlign='center'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
      ctx.fillText('THE MUCKO HAS ARRIVED!',470,38);
      ctx.shadowBlur=0; ctx.font='12px Courier New';
      ctx.fillStyle='rgba(180,200,255,0.85)';
      ctx.fillText('🗽  New York Harbor  •  April 1912',470,57);
      ctx.textAlign='left';
    }
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ── VICTORY / GAME OVER ───────────────────────────────────────────────────────

function calcScore(){
  const base=Math.round(
    G.fuel*2 + G.food*3 + G.hull*4 + G.morale + G.fishCaught*10 + G.bergsDodged*5 +
    G.crewHp.filter(h=>h>0).length*50
  );
  return Math.round(base*G.diff.mult);
}

function saveScore(score){
  const entry={name:G.name,score,diff:G.diff.name,crew:G.crewHp.filter(h=>h>0).length,date:new Date().toLocaleDateString()};
  let sc=[];try{sc=JSON.parse(localStorage.getItem('mucko_scores')||'[]');}catch{}
  sc.push(entry);
  sc.sort((a,b)=>b.score-a.score);
  sc=sc.slice(0,20);
  localStorage.setItem('mucko_scores',JSON.stringify(sc));
  return sc.findIndex(e=>e.score===entry.score&&e.date===entry.date)+1;
}

var _endActx=null;
function playEndSting(kind){
  try{
    if(!_endActx) _endActx = new (window.AudioContext||window.webkitAudioContext)();
    var actx=_endActx; if(actx.state!=='running') actx.resume();
    var t0=actx.currentTime;
    var notes = kind==='win' ? [[523,0],[659,0.12],[784,0.24],[1047,0.36]] : [[392,0],[330,0.12],[262,0.24],[196,0.36]];
    notes.forEach(function(n){
      var o=actx.createOscillator(), g=actx.createGain();
      o.type = kind==='win' ? 'triangle' : 'sine';
      o.frequency.value = n[0];
      g.gain.setValueAtTime(0.0001, t0+n[1]);
      g.gain.exponentialRampToValueAtTime(0.22, t0+n[1]+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+n[1]+0.36);
      o.connect(g); g.connect(actx.destination);
      o.start(t0+n[1]); o.stop(t0+n[1]+0.4);
    });
  }catch(e){}
}

function showVictory(el){
  const score=calcScore();
  const rank=saveScore(score);
  let sc=[];try{sc=JSON.parse(localStorage.getItem('mucko_scores')||'[]');}catch{}
  const hsRows=sc.slice(0,8).map((s,i)=>`
    <div class="sb-row${(i===rank-1)?' sb-new':''}">
      <span style="width:30px;color:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#5a4010'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
      <span style="flex:1">${s.name}</span>
      <span style="width:90px;text-align:center;font-size:.75em;color:#6a5010">${s.diff}</span>
      <span style="width:50px;text-align:center;color:#87ceeb">${s.crew}/4</span>
      <span style="width:80px;text-align:right;color:${i===rank-1?'#ffd700':'#44cc44'}">${s.score.toLocaleString()}</span>
    </div>`).join('');
  const hsNewMsg=rank<=3?`<div style="color:#ffd700;text-align:center;font-size:.82em;margin-top:6px">🌟 New personal best — #${rank}!</div>`:'';
  const survived=G.crewHp.filter(h=>h>0).length;
  el.innerHTML=`
  <div style="text-align:center;padding:8px 0 14px">
    <div style="font-size:5em;line-height:1;margin:8px 0 4px">🏆 🎉</div>
    <h1 style="color:#ffd700;font-size:2em;margin:0 0 14px;text-shadow:0 0 14px rgba(255,215,0,.45)">YOU MADE IT!</h1>
    <canvas id="arrival-canvas" width="720" height="180" style="border-radius:8px;margin-bottom:14px;border:1px solid #2a4a8a;display:block;cursor:default"></canvas>
    <div class="panel prose" style="max-width:500px;margin:12px auto;text-align:left">
      Against all odds — through storm and fog and flying iceberg — Captain
      <strong>${G.name}</strong> has guided the sky-vessel <em>R.M.A.S. Mucko</em>
      safely across the Atlantic to the glittering brass towers of New York City.<br><br>
      The crowds cheer from the sky-docks! Newsboys in goggles wave their papers:<br>
      <em>"Sky-Marvel Arrives Safe! Greatest Ship Makes It! Captain ${G.name} a Hero!"</em><br><br>
      Somewhere below, a small girl named Trudy presses her nose to the porthole
      and whispers: <em>"We made it."</em>
    </div>
    <div class="panel" style="max-width:380px;margin:0 auto 14px;text-align:left">
      <h2 style="text-align:center">Final Score: <span style="color:#44cc66">${score.toLocaleString()}</span></h2>
      <div style="font-size:.8em;color:#6a5010;line-height:1.9">
        <div>Difficulty: ${G.diff.name} (×${G.diff.mult})</div>
        <div>⛽ Fuel remaining: ${Math.round(G.fuel)}% → +${Math.round(G.fuel*2)} pts</div>
        <div>🍖 Food remaining: ${Math.round(G.food)} → +${Math.round(G.food*3)} pts</div>
        <div>🔧 Hull integrity: ${Math.round(G.hull)}% → +${Math.round(G.hull*4)} pts</div>
        <div>😊 Morale: ${Math.round(G.morale)}% → +${Math.round(G.morale)} pts</div>
        <div>🎣 Fish caught: ${G.fishCaught} → +${G.fishCaught*10} pts</div>
        <div>🧊 Icebergs cleared: ${G.bergsDodged} → +${G.bergsDodged*5} pts</div>
        <div>👥 Crew survived: ${survived}/4 → +${survived*50} pts</div>
        <div>📅 Journey: ${G.day} days</div>
      </div>
    </div>
    ${crewRow()}
    <div class="panel" style="max-width:480px;margin:0 auto 14px;text-align:left">
      <div style="color:#d4a853;font-weight:bold;font-size:.85em;margin-bottom:8px;text-align:center">🏆 Best Voyages — This Device</div>
      ${hsRows}
      ${hsNewMsg}
    </div>
    <button class="btn-go" onclick="G={screen:'diff',sel:'first'};render()">🔄 Play Again</button>
    <button onclick="G.screen='scores';render()">🏆 Full Scoreboard</button>
    <button onclick="G={screen:'menu'};render()">🏠 Main Menu</button>
  </div>`;
  startArrivalAnim();
}

function showGameOver(el){
  el.innerHTML=`
  <div style="text-align:center;padding:20px">
    <div style="font-size:5em;line-height:1;margin-bottom:6px">😵 ☁️</div>
    <h1 style="color:#d4a853;font-size:1.8em;margin:0 0 10px">Emergency Landing!</h1>
    <div class="panel prose" style="max-width:500px;margin:14px auto;text-align:left">
      ${G.msg||'The great sky-vessel has been forced to land short of New York.'}<br><br>

      <span style="width:30px">#</span>

  <div class="btns" style="margin-top:16px">

G={screen:'menu',sel:'first'};
render();
