<html lang="en">
<head>

<style>
/* iOS 12 safe: no inset:, no flex gap:, no aspect-ratio */
*{box-sizing:border-box;margin:0;padding:0}
html{width:100%;height:100%;overflow:hidden}
body{
  background:#040d18;
  width:100%;height:100%;overflow:hidden;position:relative;
}
#stage{
  position:absolute;display:block;
  border:3px solid #4a6a9a;border-radius:14px;overflow:hidden;background:#0d1f38;
  box-shadow:0 24px 70px rgba(0,0,0,.65),0 0 0 8px rgba(60,100,160,.12);
}
#bgc,#gc{
  display:block;position:absolute;
  top:0;right:0;bottom:0;left:0;
  width:100%;height:100%;
}
#bgc{pointer-events:none}
#gc{cursor:default;background:transparent;touch-action:none;-webkit-tap-highlight-color:transparent}
</style>

<body>
<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="gc"></canvas>
</div>
<script>
'use strict';

// ── roundRect polyfill (Safari < 15.4) ────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r=Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);    this.quadraticCurveTo(x+w,y,    x+w,y+r);
    this.lineTo(x+w,y+h-r);  this.quadraticCurveTo(x+w,y+h,  x+w-r,y+h);
    this.lineTo(x+r,y+h);    this.quadraticCurveTo(x,  y+h,   x,  y+h-r);
    this.lineTo(x,y+r);      this.quadraticCurveTo(x,  y,     x+r,y);
    this.closePath();
  };
}

// ── Constants ─────────────────────────────────────────────────────────────
const W=800, H=560;
const MAX_RENDER_DPR=1.5;
const SIM_STEP=1/60, MAX_SIM_CATCHUP=SIM_STEP*6;
const LOW_FPS_PHASES=new Set(['title','diff','victory']);

// ── Colors ────────────────────────────────────────────────────────────────
const C={
  deepBlue: '#0d1f38',
  midBlue:  '#163050',
  gold:     '#f6d57a',
  cream:    '#fcf6eb',
  subYellow:'#f5d040',
  wallGrey: '#3a3a4a',
  floorGrey:'#2a2a38',
  donRed:   '#cc3322',
  krakGreen:'#3a8a5a',
  dimTxt:   '#8a9ab8',
  ink:      '#0a1420',
  white:    '#ffffff',
  orange:   '#f09030',
};

// ── Canvas + stage ────────────────────────────────────────────────────────
const stage=document.getElementById('stage');
const bgCanvas=document.getElementById('bgc');
const canvas=document.getElementById('gc');
const bgCtx=bgCanvas.getContext('2d');
const ctx=canvas.getContext('2d');

function configureCtx(c){c.lineJoin='round';c.lineCap='round';c.imageSmoothingEnabled=true;}
function renderDpr(){return Math.min(MAX_RENDER_DPR,Math.max(1,window.devicePixelRatio||1));}
function safeViewW(){const vv=window.visualViewport;return vv?vv.width:window.innerWidth;}
function safeViewH(){const vv=window.visualViewport;return vv?vv.height:window.innerHeight;}

let canvasScale=1;
function resize(){
  const vw=safeViewW(), vh=safeViewH(), dpr=renderDpr();
  const s=Math.min(vw/(W+6),(vh-6)/(H+6));
  canvasScale=s;
  const sw=Math.max(1,Math.round(W*s)), sh=Math.max(1,Math.round(H*s));
  stage.style.width=sw+'px'; stage.style.height=sh+'px';
  stage.style.left=Math.round((vw-sw)/2)+'px';
  stage.style.top=Math.round((vh-sh)/2)+'px';
  bgCanvas.width=Math.max(1,Math.round(W*dpr)); bgCanvas.height=Math.max(1,Math.round(H*dpr));
  canvas.width=Math.max(1,Math.round(W*dpr));   canvas.height=Math.max(1,Math.round(H*dpr));
  bgCtx.setTransform(dpr,0,0,dpr,0,0); ctx.setTransform(dpr,0,0,dpr,0,0);
  configureCtx(bgCtx); configureCtx(ctx);
  clearBackdropCache();
}
// ── Backdrop cache ────────────────────────────────────────────────────────
// Must be initialized before resize() is called (resize calls clearBackdropCache)
const backdropCache=new Map();
let activeBackdropKey=null;
function clearBackdropLayer(){bgCtx.clearRect(0,0,W,H);activeBackdropKey=null;}
function clearBackdropCache(){backdropCache.clear();clearBackdropLayer();}
function snapshotBackdrop(){
  const c=document.createElement('canvas');
  c.width=canvas.width;c.height=canvas.height;
  const cx=c.getContext('2d');cx.imageSmoothingEnabled=true;cx.drawImage(canvas,0,0);
  return c;
}
function presentBackdrop(c){bgCtx.clearRect(0,0,W,H);bgCtx.drawImage(c,0,0,c.width,c.height,0,0,W,H);}
function drawCachedBackdrop(key,fn){
  let c=backdropCache.get(key);
  if(!c){fn();c=snapshotBackdrop();backdropCache.set(key,c);ctx.clearRect(0,0,W,H);}
  if(activeBackdropKey!==key){presentBackdrop(c);activeBackdropKey=key;}
}

window.addEventListener('resize',resize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',resize);
  window.visualViewport.addEventListener('scroll',resize);
}
resize();

// ── Input ─────────────────────────────────────────────────────────────────
const K={}, JP={};
document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true;K[e.code]=true;});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function eat(c){if(JP[c]){JP[c]=false;return true;}return false;}
let mx=W/2, my=H/2, mclk=false, touchSuppressUntil=0;
canvas.addEventListener('click',e=>{
  if(performance.now()<touchSuppressUntil)return;
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
  mclk=true;
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
});

// ── Touch + Mobile Controls ───────────────────────────────────────────────
const TOUCH_UI=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0||
  (window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
const touchState={dirs:new Set(), buttons:new Set()};

function mobileControlsOn(){return TOUCH_UI;}

function mobileLayout(){
  const btns=[];
  if(phase==='sub1'||phase==='sub2'){
    btns.push({id:'thrust',cx:W-88,cy:H-100,r:62,label:'GO',sub:'Thrust'});
    if(phase==='sub1'&&s1&&s1NearStation()){
      btns.push({id:'refuel',cx:W-88,cy:H-224,r:44,label:'E',sub:'Refuel'});
    }
    if(phase==='sub2'){
      const dodgeActive=s2&&s2.chargeFalling;
      btns.push({id:'dodge',cx:W-88,cy:H-224,r:50,label:'A',sub:'Dodge',hot:dodgeActive});
      if(cigarsFound>0){
        btns.push({id:'cigar',cx:W-210,cy:H-150,r:40,label:'C',sub:'Cigar\xD7'+cigarsFound});
      }
      if(s2&&s2NearStation()){
        btns.push({id:'refuel',cx:90,cy:H-100,r:44,label:'E',sub:'Refuel'});
      }
      return {dpad:null,buttons:btns};
    }
    // Sub1 has a D-pad for 4-direction piloting (left, right, up, down)
    return {dpad:{cx:90,cy:H-100,r:58},buttons:btns};
  }
  if(phase==='heist'||phase==='home'){
    const sub=phase==='heist'?'Use / Read':'Lock door';
    btns.push({id:'act',cx:W-88,cy:H-100,r:46,label:'USE',sub});
    return {dpad:{cx:90,cy:H-100,r:58},buttons:btns};
  }
  return {dpad:null,buttons:[]};
}

function getMobileDpadDirs(tx,ty,dpad){
  const dx=tx-dpad.cx, dy=ty-dpad.cy;
  if(Math.hypot(dx,dy)>dpad.r*2.4)return null;
  // Each axis registers independently past a small per-axis deadzone, so
  // a touch in the wedge between two arrows naturally activates BOTH —
  // ergonomic diagonals on mobile.
  const axisDz=dpad.r*0.30;
  const out=[];
  if(Math.abs(dx)>axisDz)out.push(dx<0?'left':'right');
  if(Math.abs(dy)>axisDz)out.push(dy<0?'up':'down');
  // Inner ring (under the deadzone): fall back to the dominant axis so
  // there's always a direction once you're inside the active circle.
  if(out.length===0){
    if(Math.abs(dx)>=Math.abs(dy))out.push(dx<0?'left':'right');
    else out.push(dy<0?'up':'down');
  }
  return out;
}

function hitMobileControl(tx,ty){
  if(!mobileControlsOn())return null;
  const layout=mobileLayout();
  for(const btn of layout.buttons){
    if(Math.hypot(tx-btn.cx,ty-btn.cy)<=btn.r)return {kind:'button',id:btn.id};
  }
  if(layout.dpad){
    const dirs=getMobileDpadDirs(tx,ty,layout.dpad);
    if(dirs)return {kind:'dpad',dirs};
  }
  return null;
}

function fireMobileButtonDown(id){
  if(id==='dodge')JP['KeyA']=true;
  else if(id==='cigar')JP['KeyC']=true;
  else if(id==='act')JP['KeyE']=true;
}

function syncTouchControls(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const newDirs=new Set(), newBtns=new Set();
  for(let i=0;i<e.touches.length;i++){
    const t=e.touches[i];
    const tx=(t.clientX-rect.left)*sx, ty=(t.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(hit){
      if(hit.kind==='dpad'){for(const d of hit.dirs)newDirs.add(d);}
      else if(hit.kind==='button')newBtns.add(hit.id);
    }
  }
  for(const id of newBtns){if(!touchState.buttons.has(id))fireMobileButtonDown(id);}
  touchState.dirs=newDirs; touchState.buttons=newBtns;
  K['ArrowLeft']=newDirs.has('left'); K['ArrowRight']=newDirs.has('right');
  K['ArrowUp']=newDirs.has('up');     K['ArrowDown']=newDirs.has('down');
  if(e.touches.length>0){
    const t=e.touches[0];
    mx=(t.clientX-rect.left)*sx; my=(t.clientY-rect.top)*sy;
  }
}
function clearTouch(){
  touchState.dirs=new Set(); touchState.buttons=new Set();
  K['ArrowLeft']=K['ArrowRight']=K['ArrowUp']=K['ArrowDown']=false;
}
canvas.addEventListener('touchstart',e=>{
  touchSuppressUntil=performance.now()+500;
  syncTouchControls(e);
  if(e.touches.length>0){
    const r=canvas.getBoundingClientRect();
    mx=(e.touches[0].clientX-r.left)*(W/r.width);
    my=(e.touches[0].clientY-r.top)*(H/r.height);
    mclk=true;
  }
},{passive:false});
canvas.addEventListener('touchmove',syncTouchControls,{passive:false});
canvas.addEventListener('touchend',syncTouchControls,{passive:false});
canvas.addEventListener('touchcancel',e=>{clearTouch();},{passive:false});
window.addEventListener('blur',clearTouch);

// ── Drawing helpers ───────────────────────────────────────────────────────
function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function rnd(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||1.5;ctx.stroke();}
}
function circ(x,y,r,fill,stroke,sw){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||1.5;ctx.stroke();}
}
function txt(s,x,y,c,size,align,font){
  ctx.fillStyle=c;
  ctx.font=(size||16)+'px '+(font||"'Trebuchet MS',Verdana,sans-serif");
  ctx.textAlign=align||'left';
  ctx.fillText(s,x,y);
}
function ln(x1,y1,x2,y2,c,w){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=c;ctx.lineWidth=w||1.5;ctx.stroke();
}
function inRect(px,py,x,y,w,h){return px>=x&&px<=x+w&&py>=y&&py<=y+h;}

// ── Mobile controls drawing ───────────────────────────────────────────────
function drawChevron(x,y,dir,col){
  const s=9;
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
  if(dir==='up'){ctx.moveTo(x-s,y+s*0.5);ctx.lineTo(x,y-s*0.5);ctx.lineTo(x+s,y+s*0.5);}
  else if(dir==='down'){ctx.moveTo(x-s,y-s*0.5);ctx.lineTo(x,y+s*0.5);ctx.lineTo(x+s,y-s*0.5);}
  else if(dir==='left'){ctx.moveTo(x+s*0.5,y-s);ctx.lineTo(x-s*0.5,y);ctx.lineTo(x+s*0.5,y+s);}
  else{ctx.moveTo(x-s*0.5,y-s);ctx.lineTo(x+s*0.5,y);ctx.lineTo(x-s*0.5,y+s);}
  ctx.stroke();
}
function drawMobileControls(){
  if(!mobileControlsOn())return;
  const layout=mobileLayout();
  ctx.save();ctx.globalAlpha=0.94;
  if(layout.dpad){
    const d=layout.dpad;
    circ(d.cx,d.cy,d.r*0.78,'rgba(20,12,30,0.58)','rgba(200,160,96,0.5)',2);
    const dirs=[
      {id:'up',   x:d.cx,        y:d.cy-d.r-6},
      {id:'down', x:d.cx,        y:d.cy+d.r+6},
      {id:'left', x:d.cx-d.r-6, y:d.cy},
      {id:'right',x:d.cx+d.r+6, y:d.cy},
    ];
    for(const p of dirs){
      const a=touchState.dirs.has(p.id);
      circ(p.x,p.y,40,a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.66)',a?C.gold:'rgba(200,160,96,0.45)',2);
      drawChevron(p.x,p.y,p.id,a?'#fff6d8':'#efe2c2');
    }
  }
  for(const btn of layout.buttons){
    const a=touchState.buttons.has(btn.id);
    const fill=btn.hot?(a?'rgba(200,50,30,0.7)':'rgba(170,30,20,0.6)'):(a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.7)');
    const stroke=btn.hot?'#ff6644':(a?C.gold:'rgba(200,160,96,0.55)');
    circ(btn.cx,btn.cy,btn.r,fill,stroke,2.2);
    txt(btn.label,btn.cx,btn.cy+9,a?'#ffffff':'#fff7e7',btn.r>55?22:18,'center',"'Courier New',monospace");
    if(btn.sub)txt(btn.sub,btn.cx,btn.cy+btn.r+16,C.dimTxt,12,'center',"'Courier New',monospace");
  }
  ctx.restore();
}

// ── Difficulty ────────────────────────────────────────────────────────────
const DIFFS=[
  {id:'easy',  label:'Puppy Nap',     col:'#88cc88',

// ── Audio ─────────────────────────────────────────────────────────────────
var _actx=null;
function getACtx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function unlockAudio(){var a=getACtx();if(a.state!=='running')a.resume();}
document.addEventListener('touchstart',unlockAudio,{passive:true});
document.addEventListener('touchend',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
function beep(freq,vol,dur,type){
  var a=getACtx();
  a.resume().then(function(){
    var osc=a.createOscillator();var gain=a.createGain();
    osc.connect(gain);gain.connect(a.destination);
    osc.type=type||'sine';osc.frequency.value=freq;
    gain.gain.setValueAtTime(Math.min(vol,0.4),a.currentTime);
    gain.gain.setTargetAtTime(0,a.currentTime+dur*0.65,dur*0.18);
    osc.start();osc.stop(a.currentTime+dur);
  });
}
function sfxPickup(){beep(880,0.18,0.08,'square');}
function sfxCode(){beep(660,0.2,0.07);setTimeout(function(){beep(880,0.2,0.1);},80);}
function sfxLock(){beep(440,0.22,0.07,'square');setTimeout(function(){beep(660,0.18,0.1);},70);}
function sfxDodge(){beep(330,0.15,0.06,'sawtooth');}
function sfxMiss(){beep(110,0.25,0.18,'sawtooth');}
function sfxCigar(){beep(220,0.2,0.05);setTimeout(function(){beep(440,0.25,0.12,'sawtooth');},40);}
function sfxVictory(){
  var notes=[523,659,784,1047];
  notes.forEach(function(n,i){setTimeout(function(){beep(n,0.22,0.18);},i*120);});
}
function sfxAlert(){beep(880,0.3,0.12,'square');setTimeout(function(){beep(880,0.3,0.12,'square');},160);}

// ── High scores ───────────────────────────────────────────────────────────
const HS_KEY='mucko_hs_donstower';
function getHS(){try{return JSON.parse(localStorage.getItem(HS_KEY)||'[]');}catch(e){return[];}}
function saveHS(entry){
  const sc=getHS();sc.push(entry);
  sc.sort((a,b)=>b.score-a.score);
  const trimmed=sc.slice(0,10);
  try{localStorage.setItem(HS_KEY,JSON.stringify(trimmed));}catch(e){}
  return trimmed.findIndex(e=>e.score===entry.score&&e.date===entry.date)+1;
}

// ── Game state ────────────────────────────────────────────────────────────
let phase='title';
let score=0;
let cigarsFound=0;
let stageScores={sub1:0,heist:0,sub2:0,home:0};
let scoreSaved=false;
let s1=null, s2=null, vic=null;

function resetRun(){
  score=0;cigarsFound=0;
  stageScores={sub1:0,heist:0,sub2:0,home:0};
  scoreSaved=false;s1=null;s2=null;vic=null;
}
function startPhase(p){
  phase=p;clearBackdropCache();
  if(p==='sub1')initSub1();
  else if(p==='sub2')initSub2();
  else if(p==='heist')initHeist();
  else if(p==='home')initHome();
  else if(p==='victory')initVictory();
}

// ── Sub1 mechanics ────────────────────────────────────────────────────────
const S1_DIST_TOTAL=10.0;       // sub2 goal (escape phase)
const S1_FUEL_MAX=3.0;
const S1_STATIONS=[1.6,4.0,6.5,9.0]; // station km positions (shared with sub2)
const S1_NEAR_DIST=0.42;        // sub2 still uses the wide refuel radius

// Sub1 (outbound) is now a 4-direction pilot section in a 12 km world.
// Stations are small buoys at varying depths — must align in BOTH axes to dock.
const SUB1_GOAL_KM=12.0;
const SUB1_STATION_Y=[170,400,240,430];          // screen Y for each S1_STATIONS entry
const SUB1_STATION_KIND=['surface','wreck','surface','kelp'];
const SUB1_NEAR_X=0.12;
const SUB1_NEAR_Y=60;
const SUB1_DRIFT=0.30;          // baseline forward km/s (always-on)
const SUB1_THRUST=1.55;         // extra forward km/s while GO held
const SUB1_REVERSE=0.95;        // km/s subtracted while LEFT held (enough to reverse past drift)
const SUB1_FUEL_BURN=0.85;      // fuel/s while thrusting
const SUB1_REFUEL_RATE=1.4;
const SUB1_VY_ACCEL=520;        // px/s^2 vertical acceleration
const SUB1_VY_MAX=200;
const SUB1_DAMP=2.4;            // velocity damping per second when no input
const SUB1_TOW_SPD=0.42;        // forward km/s while Johnny Mackerel tows you
const SUB1_Y_MIN=80;
const SUB1_Y_MAX=H-60;
const SUB1_SURFACE_Y=104;       // when sub.y <= this, conning tower hatch is above water

function s1NearStation(){
  if(!s1)return false;
  const sub=s1.sub;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(Math.abs(s1.dist-S1_STATIONS[i])<SUB1_NEAR_X &&
       Math.abs(sub.y-SUB1_STATION_Y[i])<SUB1_NEAR_Y)return true;
  }
  return false;
}
function s1NextStationIdx(){
  if(!s1)return -1;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(s1.dist<S1_STATIONS[i]+SUB1_NEAR_X)return i;
  }
  return -1;
}
function s2NearStation(){
  if(!s2)return false;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(Math.abs(s2.dist-S1_STATIONS[i])<S1_NEAR_DIST)return true;
  }
  return false;
}

// Seeded decorative background objects (deterministic, no Math.random)
function makeS1BgObjects(){
  const objs=[];
  const wrecks=[0.7,1.4,2.8,3.6,4.9,5.7,7.1,7.8,9.0];
  const yWreck=[320,345,310,355,325,340,315,350,330];
  for(let i=0;i<wrecks.length;i++){
    objs.push({type:'wreck',wd:wrecks[i],y:yWreck[i],layer:0.32});
  }
  const corals=[0.3,1.0,1.8,2.5,3.2,4.0,4.8,5.6,6.3,7.0,7.9,8.7,9.4];
  const yC=[430,415,445,420,440,418,442,426,436,422,448,412,438];
  for(let i=0;i<corals.length;i++){
    objs.push({type:'coral',wd:corals[i],y:yC[i],layer:0.7});
  }
  return objs;
}

function makeS1Bubbles(){
  const bx=[70,190,310,420,540,650,730];
  const by=[310,390,265,425,350,470,285];

function initSub1(){
  s1={
    dist:0,fuel:S1_FUEL_MAX,bobT:0,
    failed:false,failTimer:0,failMsg:'',
    sub:{x:S1_SUB_X,y:H/2,vx:0,vy:0,rot:0,propT:0},
    bgObjs:makeS1BgObjects(),
    bubbles:makeS1Bubbles(),
    currents:makeSub1Currents(),
    squids:makeSub1Squids(),
    pearls:makeSub1Pearls(),
    tow:false,towMsgT:0,
    shake:0,
    pearlsGot:0,
    surfaced:false,popLerp:0,freshAirT:0,surfaceCount:0,
  };
}

const S1_SUB_X=190;     // fixed screen X of submarine
const S1_WORLD_SCALE=70; // px per km for parallax calc

function updateSub1(dt){
  const s=s1;
  if(s.failed){
    s.failTimer-=dt;
    if(s.failTimer<=0)initSub1();
    return;
  }

  const sub=s.sub;
  const goBtn=K['Space']||touchState.buttons.has('thrust');
  const upBtn=K['ArrowUp']||K['KeyW'];
  const dnBtn=K['ArrowDown']||K['KeyS'];
  const ltBtn=K['ArrowLeft']||K['KeyA'];
  const rtBtn=K['ArrowRight']||K['KeyD'];
  const refuelBtn=(K['KeyE']||touchState.buttons.has('refuel'))&&s1NearStation();

  // ---- Vertical control (Up/Down) ----
  if(upBtn)      sub.vy-=SUB1_VY_ACCEL*dt;
  else if(dnBtn) sub.vy+=SUB1_VY_ACCEL*dt;
  else           sub.vy*=Math.max(0,1-SUB1_DAMP*dt);
  sub.vy=Math.max(-SUB1_VY_MAX,Math.min(SUB1_VY_MAX,sub.vy));
  sub.y+=sub.vy*dt;
  if(sub.y<SUB1_Y_MIN){sub.y=SUB1_Y_MIN;sub.vy=Math.max(0,sub.vy);}
  if(sub.y>SUB1_Y_MAX){sub.y=SUB1_Y_MAX;sub.vy=Math.min(0,sub.vy);}

  // ---- Forward control (always-on drift, GO thrusts, LEFT reverses) ----
  let fwd=SUB1_DRIFT;
  let burning=false;
  if(s.tow){
    fwd=SUB1_TOW_SPD;
  } else {
    if(goBtn||rtBtn){
      if(s.fuel>0){
        fwd+=SUB1_THRUST;
        s.fuel=Math.max(0,s.fuel-SUB1_FUEL_BURN*dt);
        burning=true;
      }
    }
    if(ltBtn) fwd-=SUB1_REVERSE;     // negative fwd → sub drives backward
  }
  s.dist+=fwd*dt;
  if(s.dist<0)s.dist=0;
  if(burning)score+=dt*2;

  // ---- Currents ----
  for(const c of s.currents){
    if(s.dist>c.wd-c.w/2&&s.dist<c.wd+c.w/2&&
       sub.y>c.wy-c.h/2&&sub.y<c.wy+c.h/2){
      s.dist+=c.vx*dt;
      sub.vy+=c.vy*dt;
    }
  }

  // ---- Squids ----
  for(const sq of s.squids){
    sq.bumpT=Math.max(0,sq.bumpT-dt);
    const sqY=sq.wy0+Math.sin(s.bobT*sq.period+sq.phase)*sq.ampY;
    const sx=S1_SUB_X+(sq.wd-s.dist)*S1_WORLD_SCALE;
    if(sq.bumpT<=0&&Math.abs(sx-S1_SUB_X)<28&&Math.abs(sqY-sub.y)<26){
      sq.bumpT=0.6;
      sub.vx=-180;sub.vy+=(sub.y<sqY?-160:160);
      s.fuel=Math.max(0,s.fuel-0.15);
      s.shake=0.25;
      sfxAlert();
    }
  }

  // ---- Pearls ----
  for(const p of s.pearls){
    if(p.got)continue;
    const sx=S1_SUB_X+(p.wd-s.dist)*S1_WORLD_SCALE;
    if(sx>-30&&sx<W+30&&Math.hypot(sx-S1_SUB_X,p.wy-sub.y)<18){
      p.got=true;score+=10;s.pearlsGot++;sfxPickup();
    }
  }

  // ---- Refuel (requires X+Y dock) ----
  if(refuelBtn){
    s.fuel=Math.min(S1_FUEL_MAX,s.fuel+SUB1_REFUEL_RATE*dt);
    if(s.tow&&s.fuel>0.4){s.tow=false;s.towMsgT=2.0;}
  } else if(s.tow&&s1NearStation()){
    // Tow rescue auto-refuels at the buoy — no button-mash needed for kids
    s.fuel=Math.min(S1_FUEL_MAX,s.fuel+SUB1_REFUEL_RATE*dt);
    if(s.fuel>0.6){s.tow=false;s.towMsgT=2.0;}
  }

  // ---- Out of fuel: Johnny Mackerel rescue (no game-over) ----
  if(!s.tow&&s.fuel<=0&&!s1NearStation()){
    s.tow=true;s.towMsgT=2.5;
    score=Math.max(0,score-15);
  }

  // ---- Cosmetic state ----
  s.bobT+=dt;
  sub.propT+=(burning?14:6)*dt;
  // Tilt sub toward velocity vector (mostly vy since vx is auxiliary)
  const targetRot=Math.max(-0.28,Math.min(0.28,sub.vy*0.0014));
  sub.rot+=(targetRot-sub.rot)*Math.min(1,dt*6);
  if(sub.vx!==0)sub.vx*=Math.max(0,1-3*dt);
  if(s.shake>0)s.shake=Math.max(0,s.shake-dt);
  if(s.towMsgT>0)s.towMsgT=Math.max(0,s.towMsgT-dt);

  // ---- Surface for fresh air ----
  const wasSurfaced=s.surfaced;
  s.surfaced=(sub.y<=SUB1_SURFACE_Y);
  if(s.surfaced&&!wasSurfaced){
    s.freshAirT=2.4;
    s.surfaceCount++;
    sfxPickup();
  }
  const popTarget=s.surfaced?1:0;
  s.popLerp+=(popTarget-s.popLerp)*Math.min(1,dt*5);
  if(s.freshAirT>0)s.freshAirT=Math.max(0,s.freshAirT-dt);

  for(const b of s.bubbles){
    b.y+=b.vy*dt;
    if(b.y<60)b.y=490+(b.t%3)*20;
  }

  // ---- Win ----
  if(s.dist>=SUB1_GOAL_KM){
    const bonus=Math.floor(s.fuel*30)+s.pearlsGot*2;
    score+=bonus;
    stageScores.sub1=score;
    startPhase('heist');
  }
}

// Drifting current band — visualized as parallel arrows + bubble streaks
function drawSub1Current(c,sx){
  if(sx<-180||sx>W+180)return;
  ctx.save();
  const w=c.w*S1_WORLD_SCALE;
  // Faint band fill
  ctx.fillStyle='rgba(120,170,220,0.06)';
  ctx.fillRect(sx-w/2,c.wy-c.h/2,w,c.h);
  ctx.strokeStyle='rgba(140,200,255,0.25)';ctx.lineWidth=1;
  ctx.strokeRect(sx-w/2,c.wy-c.h/2,w,c.h);
  // Arrows
  const dirX=c.vx>=0?1:-1, hor=Math.abs(c.vx)>Math.abs(c.vy);
  const phase=(s1?s1.bobT*Math.max(40,Math.abs(c.vx)*120+Math.abs(c.vy)*1.5):0)%24;
  ctx.fillStyle='rgba(170,220,255,0.55)';
  if(hor){
    for(let row=0;row<3;row++){
      const ay=c.wy-c.h/2+18+row*((c.h-36)/2);
      for(let col=0;col<5;col++){
        const ax=sx-w/2+12+col*(w-24)/4+(dirX>0?phase:-phase);
        ctx.beginPath();
        if(dirX>0){
          ctx.moveTo(ax,ay-3);ctx.lineTo(ax+8,ay);ctx.lineTo(ax,ay+3);
        } else {
          ctx.moveTo(ax+8,ay-3);ctx.lineTo(ax,ay);ctx.lineTo(ax+8,ay+3);
        }
        ctx.closePath();ctx.fill();
      }
    }
  } else {
    const dirY=c.vy>=0?1:-1;
    for(let col=0;col<3;col++){
      const ax=sx-w/2+18+col*((w-36)/2);
      for(let row=0;row<5;row++){
        const ay=c.wy-c.h/2+12+row*(c.h-24)/4+(dirY>0?phase:-phase);
        ctx.beginPath();
        if(dirY>0){
          ctx.moveTo(ax-3,ay);ctx.lineTo(ax,ay+8);ctx.lineTo(ax+3,ay);
        } else {
          ctx.moveTo(ax-3,ay+8);ctx.lineTo(ax,ay);ctx.lineTo(ax+3,ay+8);
        }
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawSub1(){
  const s=s1;
  const sub=s.sub;

  // Optional camera shake (squid bump)
  const shakeX=s.shake>0?(Math.sin(s.bobT*40)*4*s.shake):0;
  const shakeY=s.shake>0?(Math.cos(s.bobT*48)*3*s.shake):0;
  ctx.save();ctx.translate(shakeX,shakeY);

  // Depth-banded ocean gradient (surface light → mid → deep)
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a2244');grad.addColorStop(0.30,'#0c2848');
  grad.addColorStop(0.65,'#0a1c38');grad.addColorStop(1,'#040e18');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Light ray bands (concentrated near the surface)
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?'rgba(255,255,255,0.028)':'rgba(90,160,255,0.020)';
    ctx.fillRect(0,40+i*56,W,28);
  }

  // Surface ripple
  ctx.strokeStyle='rgba(180,220,255,0.20)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<W;x+=8){
    const yy=44+Math.sin((x+s.dist*40)*0.06)*2;
    if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy);
  }
  ctx.stroke();

  // Seabed hint
  const sedGrad=ctx.createLinearGradient(0,H-40,0,H);
  sedGrad.addColorStop(0,'transparent');sedGrad.addColorStop(1,'rgba(20,12,8,0.55)');
  ctx.fillStyle=sedGrad;ctx.fillRect(0,H-40,W,40);

  // Parallax bg objects (wrecks, corals)
  for(const obj of s.bgObjs){
    const sx=S1_SUB_X+(obj.wd-s.dist)*S1_WORLD_SCALE*obj.layer;
    if(sx<-90||sx>W+90)continue;
    if(obj.type==='wreck')drawS1Wreck(sx,obj.y);
    else drawS1Coral(sx,obj.y);
  }

  // Currents (drawn behind everything but bg objects)
  for(const c of s.currents){
    const sx=S1_SUB_X+(c.wd-s.dist)*S1_WORLD_SCALE;
    drawSub1Current(c,sx);
  }

  // Kraken fuel buoys (small, depth-varying)
  for(let i=0;i<S1_STATIONS.length;i++){
    const sx=S1_SUB_X+(S1_STATIONS[i]-s.dist)*S1_WORLD_SCALE;
    if(sx<-90||sx>W+90)continue;
    const sy=SUB1_STATION_Y[i];
    drawSub1Buoy(sx,sy,SUB1_STATION_KIND[i],s.bobT);
    if(Math.abs(s.dist-S1_STATIONS[i])<SUB1_NEAR_X &&
       Math.abs(sub.y-sy)<SUB1_NEAR_Y){
      const pulse=0.5+0.5*Math.abs(Math.sin(s.bobT*3.2));
      ctx.save();ctx.globalAlpha=pulse*0.55;
      circ(sx,sy,38,null,C.krakGreen,2.5);
      ctx.restore();
    }
  }

  // Pearls
  for(const p of s.pearls){
    if(p.got)continue;
    const sx=S1_SUB_X+(p.wd-s.dist)*S1_WORLD_SCALE;
    if(sx<-30||sx>W+30)continue;
    drawSub1Pearl(sx,p.wy,p.sparkle);
  }

  // Squids
  for(const sq of s.squids){
    const sx=S1_SUB_X+(sq.wd-s.dist)*S1_WORLD_SCALE;
    if(sx<-60||sx>W+60)continue;
    const sqY=sq.wy0+Math.sin(s.bobT*sq.period+sq.phase)*sq.ampY;
    drawSub1Squid(sx,sqY,sq.bumpT);
  }

  // Destination marker at SUB1_GOAL_KM
  const destX=S1_SUB_X+(SUB1_GOAL_KM-s.dist)*S1_WORLD_SCALE;
  if(destX>=-44&&destX<=W+44){
    ctx.save();
    rnd(destX-22,160,44,140,4,'rgba(50,30,80,0.7)','#8a60b0',1.5);
    ctx.fillStyle='#c8a0e8';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText("DON'S",destX,208);ctx.fillText("TOWER",destX,222);
    ln(destX,158,destX,300,'rgba(160,120,220,0.3)',1);
    ctx.restore();
  }

  // Bubbles
  for(const b of s.bubbles){
    circ(b.x,b.y,b.r,null,'rgba(160,220,255,0.28)',1);
  }

  // Submarine
  if(!s.failed){
    const bobY=Math.sin(s.bobT*1.3)*3;
    ctx.save();
    ctx.translate(sub.x+sub.vx*0.05,sub.y+bobY);
    ctx.rotate(sub.rot);
    drawSubmarineSprite(0,0,'SAMSTER');
    // Samster + Digory pop out of the hatch when surfaced.
    if(s.popLerp>0.02){
      const popH=s.popLerp*14;
      // Hatch lip lifts a touch when they pop
      circ(0,-56-s.popLerp*4,4.5,'#9999bb','#666688',0.8);
      // Wiggle so they look excited
      const wig=Math.sin(s.bobT*5)*1.2*s.popLerp;
      drawSamsterPopHead(-8+wig,-58-popH);
      drawDigoryPopHead(8-wig,-58-popH);
    }
    ctx.restore();
    // Tow companion
    if(s.tow){
      drawJohnnyMackerel(sub.x-58,sub.y+8);
    }
    // Surface splash ring around the sub when surfaced.
    if(s.popLerp>0.05){
      ctx.save();
      ctx.globalAlpha=0.35*s.popLerp;
      ctx.strokeStyle='rgba(220,240,255,0.9)';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(sub.x,sub.y-6+bobY,90+Math.sin(s.bobT*4)*4,8,0,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }

  ctx.restore(); // end shake

  // Compass chevron toward next station
  drawSub1Compass(s);

  // HUD
  drawSub1HUD(s);

  // Tow flavor banner
  if(s.tow){
    const a=0.82;
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-180,H-78,360,34,8,'rgba(20,40,80,0.92)','#5a90c8',1.5);
    txt("Johnny Mackerel is towing you to the next buoy!",W/2,H-54,C.cream,12,'center');
    ctx.restore();
  } else if(s.towMsgT>0){
    ctx.save();ctx.globalAlpha=Math.min(1,s.towMsgT);
    rnd(W/2-180,H-78,360,34,8,'rgba(20,40,80,0.92)','#5a90c8',1.5);
    txt('Refueled — Johnny waves goodbye!',W/2,H-54,C.cream,12,'center');
    ctx.restore();
  } else if(s1NearStation()){
    const pulse=0.65+0.35*Math.abs(Math.sin(s.bobT*3));
    ctx.save();ctx.globalAlpha=pulse;
    rnd(W/2-152,H-78,304,34,8,'rgba(28,62,38,0.92)',C.krakGreen,1.5);
    txt('Hold E (or Refuel button) to fill up',W/2,H-54,C.cream,13,'center');
    ctx.restore();
  } else if(s.freshAirT>0){
    const a=Math.min(1,s.freshAirT*1.4);
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-180,H-78,360,34,8,'rgba(20,50,80,0.92)','rgba(180,220,255,0.7)',1.5);
    txt('Fresh air for Samster & Digory!',W/2,H-54,C.cream,13,'center');
    ctx.restore();
  }
}

function drawSub1Compass(s){
  const idx=s1NextStationIdx();
  if(idx<0)return;
  const sub=s.sub;
  const sx=S1_SUB_X+(S1_STATIONS[idx]-s.dist)*S1_WORLD_SCALE;
  const sy=SUB1_STATION_Y[idx];
  ctx.save();
  if(sx>W-40){
    // Right-edge horizontal chevron
    const cx=W-22,cy=H/2;
    ctx.fillStyle=C.krakGreen;
    ctx.beginPath();
    ctx.moveTo(cx-8,cy-10);ctx.lineTo(cx+4,cy);ctx.lineTo(cx-8,cy+10);
    ctx.closePath();ctx.fill();
    txt('FUEL',cx-26,cy-16,C.krakGreen,10,'right','bold monospace');
  } else if(sy<sub.y-40){
    // Up chevron — station is above the sub
    const cx=W-30,cy=Math.max(60,sub.y-90);
    ctx.fillStyle=C.krakGreen;
    ctx.beginPath();
    ctx.moveTo(cx-9,cy+5);ctx.lineTo(cx,cy-5);ctx.lineTo(cx+9,cy+5);
    ctx.closePath();ctx.fill();
  } else if(sy>sub.y+40){
    // Down chevron — station is below the sub
    const cx=W-30,cy=Math.min(H-60,sub.y+90);
    ctx.fillStyle=C.krakGreen;
    ctx.beginPath();
    ctx.moveTo(cx-9,cy-5);ctx.lineTo(cx,cy+5);ctx.lineTo(cx+9,cy-5);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawSub1HUD(s){
  // Row 1: Progress bar (full width)
  rnd(18,8,W-36,26,5,'rgba(0,0,0,0.6)','rgba(90,140,210,0.4)',1);
  const prog=Math.min(1,s.dist/SUB1_GOAL_KM);
  if(prog>0)rnd(20,10,Math.round((W-40)*prog),22,4,'rgba(55,120,190,0.75)',null,0);
  // Station dots on progress bar
  for(let i=0;i<S1_STATIONS.length;i++){
    const st=S1_STATIONS[i];
    const sx=20+(st/SUB1_GOAL_KM)*(W-40);
    const near=Math.abs(s.dist-st)<SUB1_NEAR_X;
    circ(sx,21,near?6:4,near?C.krakGreen:'#2a6a40');
  }
  txt('Submarine Outbound',28,26,C.dimTxt,11,'left');
  txt(s.dist.toFixed(1)+' / '+SUB1_GOAL_KM.toFixed(1)+' km',W-24,26,C.cream,11,'right');

  // Row 2: Fuel gauge (left) + Pearls (center) + Score (right)
  // Kept up here so the D-pad / GO button at the bottom don't cover them.
  rnd(18,42,164,22,5,'rgba(0,0,0,0.6)','rgba(80,140,100,0.4)',1);
  const fp=s.fuel/S1_FUEL_MAX;
  const fc=s.tow?'#5a90c8':(fp>0.45?'#3a9a52':fp>0.2?'#cca030':'#cc3322');
  if(fp>0)rnd(20,44,Math.round(160*fp),18,4,fc,null,0);
  txt(s.tow?'TOWED':'Fuel',28,57,C.dimTxt,11,'left');
  txt((fp*100).toFixed(0)+'%',170,57,C.cream,11,'right');

  if(s.pearlsGot>0){
    txt('Pearls: '+s.pearlsGot,W/2,58,'#ffe6c8',12,'center');
  }

  txt('Score: '+Math.floor(score),W-18,58,C.gold,13,'right','bold Georgia');
}

// ── Sub2: Submarine Escape ─────────────────────────────────────────────────
const S2_BASE_SPD=0.5;
const S2_THRUST_SPD=1.5;
const S2_DESTROYER_Y=54;

function initSub2(){
  s2={
    dist:0,fuel:S1_FUEL_MAX,bobT:0,
    failed:false,failTimer:0,failMsg:'',
    bgObjs:makeS1BgObjects(),
    bubbles:makeS1Bubbles(),
    destroyers:[{x:160,alive:true},{x:400,alive:true},{x:640,alive:true}],
    sonarPhase:'idle',sonarT:3.5,
    chargeT:0,chargeFromIdx:0,chargeFalling:false,
    explodeAnims:[],
    missFlash:0,dodgeFlash:0,dodgeMsg:'',
  };
}

function s2ActiveCount(){
  var n=0;
  for(var i=0;i<s2.destroyers.length;i++){if(s2.destroyers[i].alive)n++;}
  return n;
}

function s2PickDestroyer(seed){
  var alive=[];
  for(var i=0;i<s2.destroyers.length;i++){if(s2.destroyers[i].alive)alive.push(i);}
  if(!alive.length)return -1;
  return alive[Math.floor(Math.abs(seed||0))%alive.length];
}

function updateSub2(dt){
  var s=s2;
  if(s.failed){
    s.failTimer-=dt;
    if(s.failTimer<=0)initSub2();
    return;
  }

  var thrusting=K['Space']||K['ArrowRight']||touchState.buttons.has('thrust');
  var refueling=(K['KeyE']||touchState.buttons.has('refuel'))&&s2NearStation();

  var spd=S2_BASE_SPD;
  if(thrusting){
    spd+=S2_THRUST_SPD;
    s.fuel=Math.max(0,s.fuel-1.0*dt);
    score+=dt*1.5;
  }
  s.dist+=spd*dt;
  if(refueling){s.fuel=Math.min(S1_FUEL_MAX,s.fuel+1.4*dt);}

  s.bobT+=dt;
  for(var bi=0;bi<s.bubbles.length;bi++){
    var b=s.bubbles[bi];b.y+=b.vy*dt;
    if(b.y<60)b.y=490+(b.t%3)*20;
  }

  if(s.missFlash>0)s.missFlash=Math.max(0,s.missFlash-dt);
  if(s.dodgeFlash>0)s.dodgeFlash=Math.max(0,s.dodgeFlash-dt);
  for(var ei=s.explodeAnims.length-1;ei>=0;ei--){
    s.explodeAnims[ei].t-=dt;
    if(s.explodeAnims[ei].t<=0)s.explodeAnims.splice(ei,1);
  }

  // Cigar throw
  if(eat('KeyC')&&cigarsFound>0){
    cigarsFound--;
    var cidx=s2PickDestroyer(Math.floor(s.bobT*7));
    if(cidx>=0){
      s.destroyers[cidx].alive=false;
      s.explodeAnims.push({x:s.destroyers[cidx].x,t:0.9});
      if(s.sonarPhase==='falling'&&s.chargeFromIdx===cidx){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=2.5;
      }
      score+=80;sfxCigar();
    }
  }

  // Sonar QTE
  var nActive=s2ActiveCount();
  if(nActive>0){
    var cooldown=Math.max(2.5,5.5-nActive*0.7);
    if(s.sonarPhase==='idle'){
      s.sonarT-=dt;
      if(s.sonarT<=0){s.sonarPhase='ping';s.sonarT=0.6;sfxAlert();}
    } else if(s.sonarPhase==='ping'){
      s.sonarT-=dt;
      if(s.sonarT<=0){s.sonarPhase='warning';s.sonarT=1.0;}
    } else if(s.sonarPhase==='warning'){
      s.sonarT-=dt;
      if(s.sonarT<=0){
        s.sonarPhase='falling';s.chargeT=0;s.chargeFalling=true;
        s.chargeFromIdx=s2PickDestroyer(Math.floor(s.bobT*13));
      }
    } else if(s.sonarPhase==='falling'){
      s.chargeT+=dt;
      if(eat('KeyA')){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=cooldown;
        s.dodgeFlash=0.8;score+=20;sfxDodge();
        var msgs=['Dodged!','Nice!','Close call!'];
        s.dodgeMsg=msgs[Math.floor(s.bobT*7)%3];
      } else if(s.chargeT>=diff.chargeWindow){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=cooldown;
        s.fuel=Math.max(0,s.fuel-0.6);s.missFlash=0.6;sfxMiss();
        score=Math.max(0,score-10);
      }
    }
  }

  if(s.fuel<=0&&thrusting){
    s.fuel=0;s.failed=true;s.failTimer=2.6;
    s.failMsg='Out of gas! Refuel at Kraken stations.';
    score=Math.max(0,score-50);stageScores.sub2=0;
  }
  if(s.dist>=S1_DIST_TOTAL){
    var bonus=Math.floor(s.fuel*20);
    score+=bonus;
    stageScores.sub2=score-stageScores.heist;
    startPhase('home');
  }
}

function drawS2Destroyer(x,alive,explodeT){
  if(explodeT>0){
    ctx.save();ctx.globalAlpha=explodeT/0.9*0.9;
    var er=55*(explodeT/0.9);
    circ(x,S2_DESTROYER_Y,er,'rgba(255,120,20,0.7)','rgba(255,200,50,0.5)',2);
    circ(x,S2_DESTROYER_Y,er*0.55,'rgba(255,230,80,0.65)');
    ctx.restore();return;
  }
  if(!alive)return;
  ctx.save();
  ctx.fillStyle='#3a2228';
  ctx.beginPath();
  ctx.moveTo(x-52,S2_DESTROYER_Y+20);ctx.lineTo(x-52,S2_DESTROYER_Y+2);
  ctx.lineTo(x-26,S2_DESTROYER_Y-12);ctx.lineTo(x+26,S2_DESTROYER_Y-12);
  ctx.lineTo(x+52,S2_DESTROYER_Y+2);ctx.lineTo(x+52,S2_DESTROYER_Y+20);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#5a3038';ctx.lineWidth=1.5;ctx.stroke();
  rnd(x-16,S2_DESTROYER_Y-28,32,18,2,'#4a2830','#6a3840',1);
  ctx.fillStyle='#5a3038';
  ctx.beginPath();ctx.rect(x-34,S2_DESTROYER_Y-4,14,7);ctx.fill();
  ctx.beginPath();ctx.rect(x+20,S2_DESTROYER_Y-4,14,7);ctx.fill();
  ctx.strokeStyle=C.donRed;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-52,S2_DESTROYER_Y+12);ctx.lineTo(x+52,S2_DESTROYER_Y+12);
  ctx.stroke();ctx.restore();
}

function drawSub2(){
  var s=s2;

  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#040e1e');grad.addColorStop(0.45,'#0c2240');grad.addColorStop(1,'#040e18');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  for(var li=0;li<7;li++){
    ctx.fillStyle=li%2===0?'rgba(255,255,255,0.022)':'rgba(90,160,255,0.016)';
    ctx.fillRect(0,70+li*56,W,28);
  }

  var sedGrad=ctx.createLinearGradient(0,H-40,0,H);
  sedGrad.addColorStop(0,'transparent');sedGrad.addColorStop(1,'rgba(20,12,8,0.5)');
  ctx.fillStyle=sedGrad;ctx.fillRect(0,H-40,W,40);

  for(var oi=0;oi<s.bgObjs.length;oi++){
    var obj=s.bgObjs[oi];
    var osx=S1_SUB_X+(obj.wd-s.dist)*S1_WORLD_SCALE*obj.layer;
    if(osx<-90||osx>W+90)continue;
    if(obj.type==='wreck')drawS1Wreck(osx,obj.y);else drawS1Coral(osx,obj.y);
  }

  for(var si=0;si<S1_STATIONS.length;si++){
    var stX=S1_SUB_X+(S1_STATIONS[si]-s.dist)*S1_WORLD_SCALE;
    if(stX<-150||stX>W+150)continue;
    drawS1Station(stX,230);
    if(Math.abs(s.dist-S1_STATIONS[si])<S1_NEAR_DIST){
      var stp=0.5+0.5*Math.abs(Math.sin(s.bobT*2.8));
      ctx.save();ctx.globalAlpha=stp*0.5;circ(stX,230,80,null,'#3a8a5a',3);ctx.restore();
    }
  }

  var destX=S1_SUB_X+(S1_DIST_TOTAL-s.dist)*S1_WORLD_SCALE;
  if(destX>=0&&destX<=W){
    ctx.save();
    rnd(destX-22,160,44,140,4,'rgba(30,70,30,0.7)','#508040',1.5);
    ctx.fillStyle='#a0e880';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('HOME',destX,208);ctx.fillText('PORT',destX,222);
    ln(destX,158,destX,300,'rgba(100,200,60,0.28)',1);
    ctx.restore();
  }

  for(var bui=0;bui<s.bubbles.length;bui++){
    var bu=s.bubbles[bui];
    circ(bu.x,bu.y,bu.r,null,'rgba(160,220,255,0.28)',1);
  }

  // Sky / surface band above waterline
  ctx.save();ctx.fillStyle='rgba(4,10,20,0.88)';
  ctx.fillRect(0,0,W,S2_DESTROYER_Y+28);ctx.restore();

  // Surface line
  ctx.save();ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;
  ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(0,S2_DESTROYER_Y+28);ctx.lineTo(W,S2_DESTROYER_Y+28);
  ctx.stroke();ctx.setLineDash([]);ctx.restore();

  // Destroyers
  for(var di=0;di<s.destroyers.length;di++){
    var dd=s.destroyers[di];var et=0;
    for(var xi=0;xi<s.explodeAnims.length;xi++){
      if(s.explodeAnims[xi].x===dd.x)et=s.explodeAnims[xi].t;
    }
    drawS2Destroyer(dd.x,dd.alive,et);
  }

  // Falling depth charge
  if(s.sonarPhase==='falling'&&s.chargeFromIdx>=0&&s.chargeFromIdx<s.destroyers.length){
    var fd=s.destroyers[s.chargeFromIdx];
    var prog=Math.min(1,s.chargeT/diff.chargeWindow);
    var cy2=(S2_DESTROYER_Y+30)+(H-160-(S2_DESTROYER_Y+30))*prog;
    var cx2=fd.x+(S1_SUB_X-fd.x)*prog;
    ctx.save();
    if(prog>0.65)ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(s.bobT*14));
    circ(cx2,cy2,11,'rgba(220,90,20,0.92)','rgba(255,150,40,0.9)',2.5);
    ctx.strokeStyle='rgba(255,180,50,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx2,cy2-16);ctx.lineTo(cx2,cy2-11);
    ctx.moveTo(cx2+14,cy2+6);ctx.lineTo(cx2+9,cy2+4);
    ctx.moveTo(cx2-14,cy2+6);ctx.lineTo(cx2-9,cy2+4);
    ctx.stroke();
    if(prog<0.55){
      ctx.strokeStyle='rgba(180,120,60,0.35)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(fd.x,S2_DESTROYER_Y+20);ctx.lineTo(cx2,cy2);
      ctx.stroke();ctx.setLineDash([]);
    }
    ctx.restore();
    ctx.save();ctx.globalAlpha=0.7+0.3*Math.abs(Math.sin(s.bobT*9));
    rnd(W/2-88,H/2-14,176,28,7,'rgba(120,18,10,0.78)','rgba(220,55,28,0.85)',1.5);
    txt('PRESS A TO DODGE!',W/2,H/2+7,C.cream,14,'center','bold monospace');
    ctx.restore();
  }

  // Sonar ping ring
  if(s.sonarPhase==='ping'){
    var pr=(0.6-s.sonarT)/0.6;
    ctx.save();ctx.globalAlpha=(1-pr)*0.55;
    circ(S1_SUB_X,H/2,pr*210,null,'rgba(100,255,180,0.7)',2.5);ctx.restore();
  }

  // Incoming warning bar
  if(s.sonarPhase==='warning'){
    var wp=Math.abs(Math.sin(s.sonarT*Math.PI*3.5));
    ctx.save();ctx.globalAlpha=0.5+0.5*wp;
    rnd(W/2-168,H/2-22,336,44,9,'rgba(170,45,18,0.75)','rgba(255,75,38,0.9)',2);
    txt('INCOMING DEPTH CHARGE',W/2,H/2+8,C.cream,17,'center','bold monospace');
    ctx.restore();
  }

  if(s.missFlash>0){
    ctx.save();ctx.globalAlpha=s.missFlash/0.6*0.33;
    ctx.fillStyle='rgba(200,28,10,0.9)';ctx.fillRect(0,0,W,H);ctx.restore();
  }
  if(s.dodgeFlash>0){
    ctx.save();ctx.globalAlpha=Math.min(1,s.dodgeFlash/0.8);
    rnd(W/2-96,H/2-106,192,34,9,'rgba(28,100,48,0.88)','rgba(50,200,90,0.85)',1.5);
    txt(s.dodgeMsg||'Dodged!',W/2,H/2-81,C.cream,18,'center','bold Georgia');
    ctx.restore();
  }

  if(!s.failed){
    var bobY=Math.sin(s.bobT*1.3)*5;

  drawSub2HUD(s);

  if(!s.failed&&s2NearStation()){

    rnd(W/2-136,H-76,272,34,8,'rgba(28,62,38,0.88)',C.krakGreen,1.5);

}
