// ── Level editor format (mucko-level/v1) ────────────────────────────────
// Parses a JSON level into the same shape that H_ROOM_DEFS produces, so the
// heist runtime can play it without any other changes. See don/editor.html.
const LEVEL_TILE_CHARS={
  '.':TF, '#':TW, 'N':TN, 'D':TD, 'L':TL, 'O':TO, 'I':TI,
  '<':TCL, '>':TCR, '^':TCU, 'v':TCD,
  'K':TKD, 'S':TLS, 'B':TBO
};
const LEVEL_TILE_INV=(function(){var m={};for(var k in LEVEL_TILE_CHARS)m[LEVEL_TILE_CHARS[k]]=k;return m;})();
const LEVEL_KNOWN_NPC_CHARS={
  digory:1, samster:1, duckdieb:1, pflueger:1,
  don:1, firelightGuy:1, mom:1, guard:1
};

function parseLevel(input){
  var data;
  if(typeof input==='string'){
    try{data=JSON.parse(input);}catch(e){return {error:'JSON parse: '+e.message};}
  } else data=input;
  if(!data||typeof data!=='object')return {error:'level must be an object'};
  if(data.format&&data.format!=='mucko-level/v1')return {error:'unknown format: '+data.format};
  if(!Array.isArray(data.rooms)||data.rooms.length===0)return {error:'rooms[] required'};
  var rooms=[];
  for(var i=0;i<data.rooms.length;i++){
    var rd=data.rooms[i];
    var parsed=parseRoom(rd,i);
    if(parsed.error)return {error:'room '+i+': '+parsed.error};
    rooms.push(parsed.room);
  }
  return {
    rooms:rooms,
    playerChar:data.playerChar||'digory',
    levelName:data.name||'Untitled',
    missionTitle:data.missionTitle||data.name||'BEDTIME MISSION',
    missionSubtitle:data.missionSubtitle||'',
    successLine:data.successLine||''
  };
}

function parseRoom(rd,idx){
  if(!rd||typeof rd!=='object')return {error:'not an object'};
  if(!Array.isArray(rd.map)||rd.map.length!==H_ROWS)
    return {error:'map must be '+H_ROWS+' rows'};
  var map=new Array(H_COLS*H_ROWS);
  for(var row=0;row<H_ROWS;row++){
    var line=rd.map[row];
    if(typeof line!=='string'||line.length!==H_COLS)
      return {error:'map row '+row+' must be '+H_COLS+' chars'};
    for(var col=0;col<H_COLS;col++){
      var ch=line.charAt(col);
      if(!(ch in LEVEL_TILE_CHARS))return {error:"unknown tile '"+ch+"' at row "+row+" col "+col};
      map[row*H_COLS+col]=LEVEL_TILE_CHARS[ch];
    }
  }
  var room={
    name:rd.name||('Room '+(idx+1)),
    roomIntro:typeof rd.roomIntro==='string'?rd.roomIntro:'',
    roomBacktrackLine:typeof rd.roomBacktrackLine==='string'?rd.roomBacktrackLine:'',
    roomCompleteLine:typeof rd.roomCompleteLine==='string'?rd.roomCompleteLine:'',
    map:map,
    floppies:[], containers:[], cigars:[], keycards:[],
    notes:[], keypads:[],
    npcs:[],                           // new field — non-guard NPCs
    guardDef:null,
    dark:!!rd.dark,
    timerSecs:typeof rd.timerSecs==='number'?rd.timerSecs:120,
    complete:!!rd.complete
  };
  // Spawn position (tile coords; defaults to col 9 row 13)
  var spawn=rd.spawn||{};
  var sCol=typeof spawn.col==='number'?spawn.col:9;
  var sRow=typeof spawn.row==='number'?spawn.row:13;
  room.startX=hTX(sCol); room.startY=hTY(sRow);
  room.spawnFacing=spawn.facing||'up';
  // Items
  if(rd.items)for(var ii=0;ii<rd.items.length;ii++){
    var it=rd.items[ii];
    if(!it||typeof it!=='object')continue;
    var x=hTX(it.col), y=hTY(it.row);
    if(it.type==='floppy')         room.floppies.push({x:x,y:y});
    else if(it.type==='container') room.containers.push({x:x,y:y});
    else if(it.type==='cigar')     room.cigars.push({x:x,y:y});
    else if(it.type==='keycard')   room.keycards.push({x:x,y:y,color:it.color||'yellow'});
    else if(it.type==='note')      room.notes.push({x:x,y:y,code:it.code||'',text:it.text||''});
    else if(it.type==='keypad')    room.keypads.push({tx:it.col,ty:it.row,code:it.code||''});
    else return {error:"unknown item type '"+it.type+"'"};
  }
  // NPCs
  if(rd.npcs)for(var ni=0;ni<rd.npcs.length;ni++){
    var np=rd.npcs[ni];
    if(!np||typeof np!=='object')continue;
    if(!LEVEL_KNOWN_NPC_CHARS[np.char])return {error:"unknown NPC char '"+np.char+"'"};
    if(np.char==='guard'&&Array.isArray(np.patrol)&&np.patrol.length>0){
      // The shipped guard system uses guardDef — keep using that for guards.
      var path=np.patrol.map(function(p){return {tx:p[0],ty:p[1]};});
      room.guardDef={path:path,speed:np.speed||52};
    } else {
      var anpc={
        char:np.char,
        col:typeof np.col==='number'?np.col:0,
        row:typeof np.row==='number'?np.row:0,
        dir:np.dir||'down',
        dialog:np.dialog||'',
        speed:np.speed||52
      };
      if(Array.isArray(np.patrol)&&np.patrol.length>0){
        anpc.patrol=np.patrol.map(function(p){return {tx:p[0],ty:p[1]};});
      }
      room.npcs.push(anpc);
    }
  }
  // Hooks reserved for the scripting DSL — pass through, don't act on yet.
  if(rd.onEnter)room._onEnter=rd.onEnter;
  return {room:room};
}

// Encode a single room back into the v1 JSON shape (for the editor's
// "save / copy out" path). Inverse of parseRoom; lossless for fields we own.
function encodeRoom(room){
  var lines=[];
  for(var row=0;row<H_ROWS;row++){
    var s='';
    for(var col=0;col<H_COLS;col++){
      var t=room.map[row*H_COLS+col];
      s+=(t in LEVEL_TILE_INV)?LEVEL_TILE_INV[t]:'.';
    }
    lines.push(s);
  }
  var items=[];
  function pushAll(arr,type,extra){
    if(!arr)return;
    for(var i=0;i<arr.length;i++){
      var it=arr[i],e={type:type,col:Math.round((it.x-H_ROOM_X-H_TILE/2)/H_TILE),row:Math.round((it.y-H_ROOM_Y-H_TILE/2)/H_TILE)};
      if(extra)extra(e,it);
      items.push(e);
    }
  }
  pushAll(room.floppies,'floppy');
  pushAll(room.containers,'container');
  pushAll(room.cigars,'cigar');
  pushAll(room.keycards,'keycard',function(e,it){e.color=it.color||'yellow';});
  pushAll(room.notes,'note',function(e,it){e.code=it.code||'';e.text=it.text||'';});
  if(room.keypads)for(var k=0;k<room.keypads.length;k++){
    items.push({type:'keypad',col:room.keypads[k].tx,row:room.keypads[k].ty,code:room.keypads[k].code||''});
  }
  var npcs=[];
  if(room.guardDef){
    npcs.push({char:'guard',col:room.guardDef.path[0].tx,row:room.guardDef.path[0].ty,
               speed:room.guardDef.speed||52,
               patrol:room.guardDef.path.map(function(p){return [p.tx,p.ty];})});
  }
  if(room.npcs)for(var n=0;n<room.npcs.length;n++){
    var nn=room.npcs[n],out={char:nn.char,col:nn.col,row:nn.row};
    if(nn.dir&&nn.dir!=='down')out.dir=nn.dir;
    if(nn.dialog)out.dialog=nn.dialog;
    if(nn.patrol)out.patrol=nn.patrol.map(function(p){return [p.tx,p.ty];});
    if(nn.speed&&nn.speed!==52)out.speed=nn.speed;
    npcs.push(out);
  }
  var sCol=Math.round((room.startX-H_ROOM_X-H_TILE/2)/H_TILE);
  var sRow=Math.round((room.startY-H_ROOM_Y-H_TILE/2)/H_TILE);
  var out={
    name:room.name,
    map:lines,
    spawn:{col:sCol,row:sRow,facing:room.spawnFacing||'up'},
    items:items,
    npcs:npcs
  };
  if(room.dark)out.dark=true;
  if(typeof room.timerSecs==='number'&&room.timerSecs!==120)out.timerSecs=room.timerSecs;
  if(room.complete)out.complete=true;
  if(room.roomIntro)out.roomIntro=room.roomIntro;
  if(room.roomBacktrackLine)out.roomBacktrackLine=room.roomBacktrackLine;
  if(room.roomCompleteLine)out.roomCompleteLine=room.roomCompleteLine;
  return out;
}

let heist=null;
function hCopyRoom(d){
  let guard=null;
  if(d.guardDef){
    const gd=d.guardDef;
    guard={path:gd.path,speed:gd.speed||52,pathIdx:0,
           x:hTX(gd.path[0].tx),y:hTY(gd.path[0].ty),dir:'right'};
  }
  // Editor-authored NPCs (non-guard). Each gets its own runtime state with
  // a tile-anchored position, optional patrol, and a one-shot dialog flag.
  var npcs=null;
  if(d.npcs&&d.npcs.length){
    npcs=d.npcs.map(function(n){
      return {char:n.char,col:n.col,row:n.row,
              x:hTX(n.col),y:hTY(n.row),
              dir:n.dir||'down',facing:n.dir||'down',
              dialog:n.dialog||'',spoken:false,
              speed:n.speed||52,
              patrol:n.patrol?n.patrol.slice():null,pathIdx:0,bobT:0};
    });
  }
  return {name:d.name,map:d.map.slice(),
    floppies:d.floppies.map(i=>({x:i.x,y:i.y,got:false})),
    containers:d.containers.map(i=>({x:i.x,y:i.y,got:false})),
    cigars:d.cigars.map(i=>({x:i.x,y:i.y,got:false})),
    keycards:d.keycards.map(k=>({x:k.x,y:k.y,got:false,color:k.color})),
    notes:d.notes.map(n=>({x:n.x,y:n.y,code:n.code,text:n.text,read:false})),
    keypads:d.keypads.map(k=>({tx:k.tx,ty:k.ty,code:k.code,open:false})),
    guard,npcs:npcs,dark:d.dark||false,lightsOn:false,
    startX:d.startX,startY:d.startY,spawnFacing:d.spawnFacing||'up',
    timerSecs:d.timerSecs||0,
    roomIntro:d.roomIntro||'',
    roomBacktrackLine:d.roomBacktrackLine||'',
    roomCompleteLine:d.roomCompleteLine||'',
    complete:d.complete||false};
}
// Convert pixel start coords (r.startX,r.startY) into tile col/row
function hPxToCol(px){return Math.floor((px-H_ROOM_X)/H_TILE);}
function hPxToRow(py){return Math.floor((py-H_ROOM_Y)/H_TILE);}

// Active player character id for the heist phase. Defaults to digory; the
// editor's "Play this level" path can override this via editorLevel.playerChar.
let heistPlayerChar='digory';
let editorLevel=null;        // active editor level (null = shipped rooms)

function goToEditor(){
  var levelName='play';
  try{
    var params=new URLSearchParams(window.location.search);
    levelName=params.get('level')||'play';
  }catch(e){}
  window.location.href='editor.html?resume='+encodeURIComponent(levelName);
}

function initHeist(){
  cigarsFound=0;
  var sourceRooms;
  if(editorLevel){
    // Editor levels carry their own room definitions and player character.
    sourceRooms=editorLevel.rooms;
    heistPlayerChar=editorLevel.playerChar||'digory';
  } else {
    sourceRooms=H_ROOM_DEFS;
    heistPlayerChar='digory';
  }
  const rooms=sourceRooms.map(hCopyRoom),r=rooms[0];
  var pPlayer={dir:'down',vx:0,vy:0,facing:r.spawnFacing||'up'};
  MuckoGrid.init(pPlayer, hPxToCol(r.startX), hPxToRow(r.startY), H_TILE, H_ROOM_X, H_ROOM_Y);
  heist={rooms,roomIdx:0,room:r,
    missionTitle:editorLevel?(editorLevel.missionTitle||editorLevel.levelName||'BEDTIME MISSION'):'',
    missionSubtitle:editorLevel?(editorLevel.missionSubtitle||''):'',
    successLine:editorLevel?(editorLevel.successLine||''):'',
    player:pPlayer,
    timer:r.timerSecs*(diff.timerMul||1),
    collected:{f:0,c:0,g:0},
    kInventory:{yellow:false},
    msg:'',msgT:0,completeT:0,
    noteOpen:false,noteText:'',noteCode:'',
    kpOpen:false,kpInput:'',kpIdx:-1,
    guardStunned:false,guardStunT:0,
    failed:false,failT:0};
}

function hTileAt(map,col,row){
  if(col<0||col>=H_COLS||row<0||row>=H_ROWS)return TW;
  return map[row*H_COLS+col];
}
function hTileUnder(px,py,map){
  return hTileAt(map,Math.floor((px-H_ROOM_X)/H_TILE),Math.floor((py-H_ROOM_Y)/H_TILE));
}
function hSolid(t){return t===TW||t===TN||t===TD||t===TL||t===TKD;}
function hCanMove(nx,ny){
  const map=heist.room.map;
  const pts=[[nx-H_HS,ny-H_HS],[nx+H_HS,ny-H_HS],[nx-H_HS,ny+H_HS],[nx+H_HS,ny+H_HS]];
  for(const pt of pts){
    const c=Math.floor((pt[0]-H_ROOM_X)/H_TILE),r=Math.floor((pt[1]-H_ROOM_Y)/H_TILE);
    if(hSolid(hTileAt(map,c,r)))return false;
  }
  return true;
}
function hTryOpenKD(nx,ny){
  if(!heist||!heist.kInventory.yellow)return;
  const pts=[[nx-H_HS,ny-H_HS],[nx+H_HS,ny-H_HS],[nx-H_HS,ny+H_HS],[nx+H_HS,ny+H_HS]];
  for(const pt of pts){
    const c=Math.floor((pt[0]-H_ROOM_X)/H_TILE),r=Math.floor((pt[1]-H_ROOM_Y)/H_TILE);
    if(hTileAt(heist.room.map,c,r)===TKD){
      heist.kInventory.yellow=false;
      heist.room.map[r*H_COLS+c]=TO;
      clearBackdropCache();
      hShowMsg('Keycard used — sealed door unlocked. Nice sniffing.');
      return;
    }
  }
}
function hGuardUpdate(g,dt,p){
  const wp=g.path[g.pathIdx];
  const tx=hTX(wp.tx),ty=hTY(wp.ty);
  const dx=tx-g.x,dy=ty-g.y,dist=Math.hypot(dx,dy);
  if(dist<6){
    g.x=tx;g.y=ty;
    g.pathIdx=(g.pathIdx+1)%g.path.length;
  } else {
    g.x+=dx/dist*g.speed*dt;
    g.y+=dy/dist*g.speed*dt;
    if(Math.abs(dx)>Math.abs(dy))g.dir=dx>0?'right':'left';
    else g.dir=dy>0?'down':'up';
  }
  if(!heist.guardStunned&&Math.hypot(g.x-p.x,g.y-p.y)<22){
    // Softened: stun the player in place for 1s, -10 pts, no teleport.
    // The guard is "looking the other way" briefly so the kid can recover.
    heist.guardStunned=true;heist.guardStunT=1.0;
    score=Math.max(0,score-10);
    hShowMsg('Guard spotted you! Freeze, breathe, and try again. (-10 pts)');
  }
}
// Update editor-authored NPCs each frame: walk their patrol path (if any)
// and emit a one-shot dialog when the player gets close. Non-guard NPCs
// don't catch the player; they're decoration and dialog hooks for now.
function hNpcsUpdate(npcs,dt,p){
  for(var i=0;i<npcs.length;i++){
    var n=npcs[i];
    n.bobT=(n.bobT||0)+dt;
    if(n.patrol&&n.patrol.length>1){
      var wp=n.patrol[n.pathIdx%n.patrol.length];
      var tx=hTX(wp[0]||wp.tx||0),ty=hTY(wp[1]||wp.ty||0);
      // patrol entries from parseLevel are {tx,ty}; from raw JSON they may
      // be [col,row] arrays — accept both shapes.
      if(Array.isArray(wp)){tx=hTX(wp[0]);ty=hTY(wp[1]);}
      var dx=tx-n.x,dy=ty-n.y,dist=Math.hypot(dx,dy);
      if(dist<6){n.x=tx;n.y=ty;n.pathIdx=(n.pathIdx+1)%n.patrol.length;}
      else{
        n.x+=dx/dist*(n.speed||52)*dt;
        n.y+=dy/dist*(n.speed||52)*dt;
        if(Math.abs(dx)>Math.abs(dy))n.dir=dx>0?'right':'left';
        else n.dir=dy>0?'down':'up';
      }
    }
    if(n.dialog&&!n.spoken&&Math.hypot(n.x-p.x,n.y-p.y)<26){
      n.spoken=true;
      hShowMsg(n.dialog);
    }
  }
}
function hShowMsg(m){heist.msg=m;heist.msgT=3.0;}
// Digory's room-entry quips — keep the kid-friendly story-bible tone
const DIGORY_QUIPS_FWD=[
  "A nice yellow welcome mat. Deeb first, nap later.",
  "Storage room! Crates, disks, and not a crumb of lunch left behind.",
  "Mind the conveyors, Digory. Paws tidy, ears up.",
  "Security wing. Sniff out that yellow keycard and keep moving.",
  "Guard up ahead. Tail down, paws light, no heroic barking.",
  "It's dark. Find the switch, then the secrets, then maybe a cookie.",
  "The Vault! Slippy floor, big prize, definitely a bedtime story room.",
  "Mission accomplished. Swim home, lock the house, find the blanket."
];
const DIGORY_QUIPS_BACK=[
  "Backtracking. Don't tell Duckdee I missed a clue.",
  "Forgot something? It happens in every good heist.",
  "Conveyors again. Hop hop hop and don't skid into trouble.",
  "Back to the security wing. Quietly now.",
  "Patrol zone, take two. This time with extra sneaking.",
  "Dark again. Nose first, paws second, switch third."
];

function hEnterRoom(idx,entryDir){
  const r=heist.rooms[idx];
  heist.roomIdx=idx;heist.room=r;
  var col, row;
  if(entryDir==='fromNorth'){
    // Backtracked from a higher room: drop in just below the north door
    col=9; row=2;
  } else {
    col=hPxToCol(r.startX); row=hPxToRow(r.startY);
  }
  MuckoGrid.init(heist.player, col, row, H_TILE, H_ROOM_X, H_ROOM_Y);
  heist.player.vx=0; heist.player.vy=0;
  heist.player.facing=entryDir==='fromNorth'?'down':'up';
  if(r.timerSecs>0)heist.timer=r.timerSecs*diff.timerMul;
  clearBackdropCache();
  const quip=entryDir==='fromNorth'
    ?(r.roomBacktrackLine||DIGORY_QUIPS_BACK[idx])
    :(r.roomIntro||DIGORY_QUIPS_FWD[idx]);
  if(quip)hShowMsg(quip);
}

function hKpTryConfirm(){
  const h=heist,kp=h.room.keypads[h.kpIdx];
  if(h.kpInput===kp.code){
    kp.open=true;h.room.map[kp.ty*H_COLS+kp.tx]=TO;
    clearBackdropCache();
    h.kpOpen=false;h.kpInput='';h.kpIdx=-1;
    score+=25;sfxCode();hShowMsg('Code accepted — door is open. Nice detective work.');
  } else {
    h.kpInput='';hShowMsg('Wrong code — try again.');
  }
}

function updateHeistKP(){
  const h=heist;
  if(h.kpInput.length<4){
    for(let d=0;d<=9;d++){
      if(eat('Digit'+d)||eat('Numpad'+d)){h.kpInput+=''+d;break;}
    }
  }
  if(eat('Backspace'))h.kpInput=h.kpInput.slice(0,-1);
  if(eat('Escape')){h.kpOpen=false;h.kpInput='';h.kpIdx=-1;return;}
  if(h.kpInput.length===4&&(eat('Enter')||eat('KeyE'))){hKpTryConfirm();return;}
  if(mclk){
    mclk=false;
    const btns=hKpBtns();
    for(const b of btns){
      if(inRect(mx,my,b.x,b.y,b.w,b.h)&&h.kpInput.length<4){h.kpInput+=''+b.d;return;}
    }
    const cy=H/2+104;
    if(inRect(mx,my,W/2-60,cy,120,34)&&h.kpInput.length===4){hKpTryConfirm();return;}
    if(inRect(mx,my,W/2-90,H/2-96,180,34)&&h.kpInput.length>0){h.kpInput=h.kpInput.slice(0,-1);return;}
    if(!inRect(mx,my,W/2-170,H/2-150,340,320)){h.kpOpen=false;h.kpInput='';h.kpIdx=-1;}
  }
}

function updateHeist(dt){
  const h=heist;
  if(!h||!h.room)return;
  if(editorLevel&&mclk&&inRect(mx,my,H_HUD_X+10,H-64,W-H_HUD_X-20,34)){
    mclk=false;
    goToEditor();
    return;
  }
  if(h.failed){
    h.failT-=dt;
    if(h.failT<=0){score=Math.max(0,score-50);stageScores.heist=0;initHeist();}
    return;
  }
  if(h.guardStunned){
    h.guardStunT-=dt;
    // Pass a far-away position so the guard doesn't keep "spotting" the player
    // during the stun window, but resume its patrol normally.
    if(h.room.guard)hGuardUpdate(h.room.guard,dt,{x:-999,y:-999});
    if(h.guardStunT<=0){
      h.guardStunned=false;
      // Don't teleport; the player stays where they were caught.
      h.player.vx=0;h.player.vy=0;
    }
    if(h.msgT>0)h.msgT-=dt;
    return;
  }
  if(h.noteOpen){
    if(eat('KeyE')||eat('Space')||eat('Enter')||eat('Escape'))h.noteOpen=false;
    if(mclk){mclk=false;h.noteOpen=false;}
    return;
  }
  if(h.kpOpen){updateHeistKP();return;}
  if(editorLevel&&(eat('Escape')||eat('Backspace'))){
    goToEditor();
    return;
  }
  if(h.room.complete){
    h.completeT+=dt;
    if(h.completeT>1.4){
      stageScores.heist=score;
      startPhase(editorLevel?'victory':'sub2');
    }
    return;
  }
  const p=h.player,r=h.room;
  // Guard update
  if(r.guard)hGuardUpdate(r.guard,dt,p);
  if(r.npcs)hNpcsUpdate(r.npcs,dt,p);

  // ── Grid movement (Pokémon-style discrete steps) ──────────────────────
  // Tiles that block the duck's step. TKD is normally blocking — but if you
  // have the yellow keycard, the side-effect in this callback unlocks it.
  function heistBlocked(c,row){
    if(c<0||row<0||c>=H_COLS||row>=H_ROWS)return true;
    var t=r.map[row*H_COLS+c];
    if(t===TKD&&h.kInventory.yellow){
      h.kInventory.yellow=false;
      r.map[row*H_COLS+c]=TO;
      clearBackdropCache();
      hShowMsg('Keycard used — sealed door unlocked. Nice sniffing.');
      return false;
    }
    return t===TW||t===TN||t===TD||t===TL||t===TKD;
  }
  var dir=MuckoGrid.readDir(K,{
    up:touchState.dirs.has('up'),    down:touchState.dirs.has('down'),
    left:touchState.dirs.has('left'),right:touchState.dirs.has('right')
  });
  MuckoGrid.update(p,dt,dir,false,heistBlocked,H_TILE);
  MuckoGrid.applyBumpRender(p,H_TILE);
  p.dir=p.facing;

  // ── Tile effects on idle: conveyor belts auto-step in their direction;
  //    ice floor slides one more tile in your last direction. Player input
  //    above takes precedence — these only kick in when the player isn't
  //    actively committing a step.
  if(!p.gridMoving&&p.bumpT<=0&&!dir){
    var underT=r.map[p.gridRow*H_COLS+p.gridCol];
    var autoDir=null;
    if(underT===TCR)autoDir='right';
    else if(underT===TCL)autoDir='left';
    else if(underT===TCU)autoDir='up';
    else if(underT===TCD)autoDir='down';
    else if(underT===TI&&p.lastDir)autoDir=p.lastDir;
    if(autoDir)MuckoGrid.startStep(p,autoDir,false,heistBlocked,H_TILE);
  }
  // Item pickups
  for(const it of r.floppies){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.f++;score+=15;sfxPickup();hShowMsg('Floppy disk! ('+h.collected.f+'/8)');
    }
  }
  for(const it of r.containers){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.c++;score+=15;sfxPickup();hShowMsg('Container! ('+h.collected.c+'/8)');
    }
  }
  for(const it of r.cigars){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.g++;cigarsFound++;score+=40;sfxPickup();
      hShowMsg('Exploding cigar! ('+cigarsFound+' total)');
    }
  }
  for(const it of r.keycards){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.kInventory[it.color]=true;score+=10;
      hShowMsg('Yellow keycard! Use it at a sealed door.');
    }
  }
  // E key interactions
  if(eat('KeyE')){
    let acted=false;
    // Light switch
    const pc=Math.floor((p.x-H_ROOM_X)/H_TILE),pr=Math.floor((p.y-H_ROOM_Y)/H_TILE);
    for(let dr=-1;dr<=1&&!acted;dr++){
      for(let dc=-1;dc<=1&&!acted;dc++){
        if(hTileAt(r.map,pc+dc,pr+dr)===TLS){
          const lsx=H_ROOM_X+(pc+dc)*H_TILE+H_TILE/2,lsy=H_ROOM_Y+(pr+dr)*H_TILE+H_TILE/2;
          if(Math.hypot(p.x-lsx,p.y-lsy)<H_IACT){
            r.lightsOn=!r.lightsOn;clearBackdropCache();
            hShowMsg(r.lightsOn?'Lights on!':'Lights off.');acted=true;
          }
        }
      }
    }
    // Notes (unread only — skip already-read to prevent blocking keypad access)
    if(!acted){
      for(const n of r.notes){
        if(!n.read&&Math.hypot(p.x-n.x,p.y-n.y)<H_IACT){
          if(r.dark&&!r.lightsOn){hShowMsg('Too dark to read — find the light switch!');acted=true;break;}
          h.noteOpen=true;h.noteText=n.text;h.noteCode=n.code;n.read=true;score+=5;acted=true;break;
        }
      }
    }
    // Keypads
    if(!acted){
      for(let i=0;i<r.keypads.length;i++){
        const kp=r.keypads[i];
        if(!kp.open){
          const kx=H_ROOM_X+kp.tx*H_TILE+H_TILE/2,ky=H_ROOM_Y+kp.ty*H_TILE+H_TILE/2;
          if(Math.hypot(p.x-kx,p.y-ky)<H_IACT+H_TILE){
            h.kpOpen=true;h.kpInput='';h.kpIdx=i;break;
          }
        }
      }
    }
  }
  // Timer
  if(r.timerSecs>0){
    h.timer-=dt;
    if(h.timer<=0){h.timer=0;h.failed=true;h.failT=2.8;hShowMsg("Time's up! The bedtime window is closing.");}
  }
  if(h.msgT>0)h.msgT-=dt;
  // Room transition: stepped onto an open north door (row 0 TO tile)
  if(!p.gridMoving&&p.gridRow===0&&hTileAt(r.map,p.gridCol,0)===TO){
    if(editorLevel){
      if(h.roomIdx<h.rooms.length-1){hEnterRoom(h.roomIdx+1);return;}
      if(!h.room.complete){
        h.room.complete=true;
        h.completeT=0;
        hShowMsg(h.room.roomCompleteLine||'Exit reached! Home, blanket, and dinner next.');
      }
      return;
    }
    if(h.roomIdx===6){
      if(h.collected.f>=8&&h.collected.c>=8){hEnterRoom(7);return;}
      else if(h.msgT<=0)hShowMsg('Need '+(8-h.collected.f)+' more disks and '+(8-h.collected.c)+' more crates before bedtime. Try the back door.');
    } else if(h.roomIdx<7){hEnterRoom(h.roomIdx+1);return;}
  }
  // Room transition: stepped onto a back door (row H_ROWS-1 TBO tile)
  if(!p.gridMoving&&p.gridRow===H_ROWS-1&&hTileAt(r.map,p.gridCol,H_ROWS-1)===TBO){
    if(h.roomIdx>0){hEnterRoom(h.roomIdx-1,'fromNorth');return;}
  }
}

// ── Player & NPC sprite dispatch ─────────────────────────────────────────────
// drawHeistPlayer / drawHeistNpcs route by char id to a draw function.
// MUCKO_NPCS is populated lazily — Phase 2 will fill in samster/pflueger/etc
// from don/mucko-npcs.js. For now only the natively-defined chars are wired.
var MUCKO_NPCS=window.MUCKO_NPCS||(window.MUCKO_NPCS={});
function drawHeistPlayer(charId,x,y,dir){
  var entry=MUCKO_NPCS[charId];
  if(entry&&entry.draw){entry.draw(x,y,dir,0);return;}
  drawDigory(x,y,dir); // fallback
}
function drawHeistNpcs(npcs){
  for(var i=0;i<npcs.length;i++){
    var n=npcs[i],e=MUCKO_NPCS[n.char];
    n.bobT=(n.bobT||0)+1/60;
    if(e&&e.draw)e.draw(n.x,n.y,n.dir,n.bobT,n);
    else drawDigory(n.x,n.y,n.dir); // fallback so NPC is at least visible
  }
}

// ── Digory sprite ─────────────────────────────────────────────────────────────
function drawDigory(x,y,dir){
  ctx.save();
  if(dir==='left'){ctx.translate(x,y);ctx.scale(-1,1);ctx.translate(-x,-y);}
  const side=dir==='right'||dir==='left';
  const hx=x+(side?8.8:0),hy=y+(side?-7.8:(dir==='up'?-14:-12));

  // torso + canonical coat zones
  ctx.beginPath();ctx.ellipse(x+0.4,y+2.2,12.6,8.2,0,0,Math.PI*2);
  ctx.fillStyle='#f7f5f0';ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.ellipse(x+3.2,y+1.1,5.9,4.6,0.12,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill(); // side spot
  ctx.beginPath();ctx.ellipse(x+8.2,y+2.1,3.5,4.8,-0.12,0,Math.PI*2);ctx.fill(); // rump pants
  ctx.beginPath();ctx.ellipse(x+6.2,y+1.7,1.2,1.4,0,0,Math.PI*2);ctx.fillStyle='#f7f5f0';ctx.fill(); // white gap
  ctx.beginPath();ctx.arc(x+4.6,y+5.5,1.2,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill(); // on/off button

  // tail (white tip)
  ctx.beginPath();ctx.moveTo(x+11.3,y+2.2);ctx.bezierCurveTo(x+20,y-7,x+22,y-5,x+19.2,y+1);
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+18.1,y-3.9);ctx.bezierCurveTo(x+24.2,y-11,x+26.2,y-9.2,x+22.2,y-3);
  ctx.strokeStyle='#f7f5f0';ctx.lineWidth=2;ctx.stroke();

  // head mostly black + tan muzzle
  ctx.beginPath();ctx.arc(hx,hy,8,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.ellipse(hx+4.2,hy+2.1,3.6,3,0,0,Math.PI*2);
  ctx.fillStyle='#8a5030';ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+4.6,hy+2.4,2.2,1.8,0,0,Math.PI*2);ctx.fillStyle='#d1a17a';ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.moveTo(hx-5.2,hy-5.2);ctx.lineTo(hx-9.1,hy-16);ctx.lineTo(hx-1,hy-7.2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(hx+5.2,hy-5.2);ctx.lineTo(hx+9,hy-16);ctx.lineTo(hx+1,hy-7.2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#888888';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(hx,hy+5.1,4.5,Math.PI*0.2,Math.PI*0.8);ctx.stroke();

  ctx.fillStyle='#f0f0ec';
  ctx.fillRect(x-9,y+8,4,7);ctx.fillRect(x+5,y+8,4,7);
  ctx.restore();
}

// ── Heist room drawing ────────────────────────────────────────────────────────
function drawHeistRoomBg(){
  const r=heist.room;
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#22222f';ctx.fillRect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
  ctx.strokeStyle='rgba(50,50,70,0.35)';ctx.lineWidth=0.5;
  for(let row=0;row<=H_ROWS;row++){
    ctx.beginPath();ctx.moveTo(H_ROOM_X,H_ROOM_Y+row*H_TILE);ctx.lineTo(H_HUD_X,H_ROOM_Y+row*H_TILE);ctx.stroke();
  }
  for(let col=0;col<=H_COLS;col++){
    ctx.beginPath();ctx.moveTo(H_ROOM_X+col*H_TILE,H_ROOM_Y);ctx.lineTo(H_ROOM_X+col*H_TILE,H_ROOM_Y+H_ROWS*H_TILE);ctx.stroke();
  }
  for(let row=0;row<H_ROWS;row++){
    for(let col=0;col<H_COLS;col++){
      const t=r.map[row*H_COLS+col],tx=H_ROOM_X+col*H_TILE,ty=H_ROOM_Y+row*H_TILE;
      if(t===TW){
        ctx.fillStyle='#383848';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#484858';ctx.lineWidth=0.5;ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
      } else if(t===TN){
        rnd(tx+3,ty+3,H_TILE-6,H_TILE-6,3,'#48303a','#683048',1);
      } else if(t===TD){
        rnd(tx+2,ty+2,H_TILE-4,H_TILE-4,2,'#6a4020','#9a6030',1);
        ctx.strokeStyle='#7a5028';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(tx+5,ty+H_TILE/2);ctx.lineTo(tx+H_TILE-5,ty+H_TILE/2);ctx.stroke();
      } else if(t===TL){
        ctx.fillStyle='#383848';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        rnd(tx+9,ty+9,14,14,2,'#cc3322','#ff5544',1.5);
        ctx.fillStyle='#ffaaaa';ctx.font='bold 8px monospace';ctx.textAlign='center';
        ctx.fillText('!',tx+H_TILE/2,ty+H_TILE/2+4);
      } else if(t===TO){
        ctx.fillStyle='#0a1c12';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#3a8a5a';ctx.lineWidth=1.5;ctx.strokeRect(tx+1,ty+1,H_TILE-2,H_TILE-2);
      } else if(t===TI){
        ctx.fillStyle='#8ec8e8';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(200,235,255,0.5)';ctx.lineWidth=0.5;
        ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(tx+4,ty+4);ctx.lineTo(tx+H_TILE-4,ty+H_TILE-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(tx+H_TILE-4,ty+4);ctx.lineTo(tx+4,ty+H_TILE-4);ctx.stroke();
      } else if(t===TCR||t===TCL||t===TCU||t===TCD){
        ctx.fillStyle='#1a2840';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(60,100,160,0.4)';ctx.lineWidth=0.5;ctx.strokeRect(tx,ty,H_TILE,H_TILE);
        const cx2=tx+H_TILE/2,cy2=ty+H_TILE/2,aw=7,ah=4;
        ctx.fillStyle='#4a80cc';ctx.beginPath();
        if(t===TCR){ctx.moveTo(cx2+aw,cy2);ctx.lineTo(cx2-aw,cy2-ah);ctx.lineTo(cx2-aw,cy2+ah);}
        else if(t===TCL){ctx.moveTo(cx2-aw,cy2);ctx.lineTo(cx2+aw,cy2-ah);ctx.lineTo(cx2+aw,cy2+ah);}
        else if(t===TCD){ctx.moveTo(cx2,cy2+aw);ctx.lineTo(cx2-ah,cy2-aw);ctx.lineTo(cx2+ah,cy2-aw);}
        else{ctx.moveTo(cx2,cy2-aw);ctx.lineTo(cx2-ah,cy2+aw);ctx.lineTo(cx2+ah,cy2+aw);}
        ctx.closePath();ctx.fill();
      } else if(t===TKD){
        ctx.fillStyle='#302200';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        rnd(tx+3,ty+3,H_TILE-6,H_TILE-6,3,'#584010','#d0a020',2);
        ctx.fillStyle='#ffe060';ctx.font='bold 9px monospace';ctx.textAlign='center';
        ctx.fillText('K',tx+H_TILE/2,ty+H_TILE/2+4);
      } else if(t===TLS){
        ctx.fillStyle='#22222f';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        const lsOn=heist&&heist.room&&heist.room.lightsOn;
        rnd(tx+7,ty+7,H_TILE-14,H_TILE-14,3,lsOn?'#404010':'#282830',lsOn?'#c0c020':'#505060',1.5);
        ctx.fillStyle=lsOn?'#e8e840':'#606060';
        ctx.font='bold 6px sans-serif';ctx.textAlign='center';
        ctx.fillText(lsOn?'ON':'OFF',tx+H_TILE/2,ty+H_TILE/2+3);
      } else if(t===TBO){
        // Back door — open archway in the south wall (passable)
        ctx.fillStyle='#0a1c12';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#3a8a5a';ctx.lineWidth=1.5;ctx.strokeRect(tx+1,ty+1,H_TILE-2,H_TILE-2);
        ctx.fillStyle='#3a8a5a';ctx.font='bold 7px sans-serif';ctx.textAlign='center';
        ctx.fillText('BACK',tx+H_TILE/2,ty+H_TILE/2-2);
        // Down-arrow chevron (drawn, not unicode — iOS 12 safe)
        ctx.beginPath();
        ctx.moveTo(tx+H_TILE/2-4,ty+H_TILE/2+4);
        ctx.lineTo(tx+H_TILE/2+4,ty+H_TILE/2+4);
        ctx.lineTo(tx+H_TILE/2,ty+H_TILE/2+9);
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.fillStyle='#181828';ctx.fillRect(0,0,H_HUD_X,H_ROOM_Y);
  ctx.strokeStyle='rgba(80,100,140,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H_ROOM_Y);ctx.lineTo(H_HUD_X,H_ROOM_Y);ctx.stroke();
  const fy=H_ROOM_Y+H_ROWS*H_TILE;
  ctx.fillStyle='#181828';ctx.fillRect(0,fy,H_HUD_X,H-fy);
}

function drawHeistItems(){
  const r=heist.room;
  for(const it of r.floppies){
    if(it.got)continue;
    rnd(it.x-8,it.y-9,16,18,2,'#1a2a6a','#4466cc',1.5);
    ctx.fillStyle='#5577bb';ctx.fillRect(it.x-5,it.y-6,10,7);
    ctx.fillStyle='#888888';ctx.fillRect(it.x-2,it.y+4,4,3);
    ctx.save();ctx.globalAlpha=0.25;circ(it.x,it.y,14,null,'#6688ff',2);ctx.restore();
  }
  for(const it of r.containers){
    if(it.got)continue;
    rnd(it.x-9,it.y-8,18,16,2,'#3a2a10','#b08040',1.5);
    ctx.strokeStyle='#806030';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(it.x-9,it.y);ctx.lineTo(it.x+9,it.y);
    ctx.moveTo(it.x,it.y-8);ctx.lineTo(it.x,it.y+8);ctx.stroke();
    ctx.save();ctx.globalAlpha=0.22;circ(it.x,it.y,13,null,'#c09050',2);ctx.restore();
  }
  const cigT=performance.now()/1000;
  for(const it of r.cigars){
    if(it.got)continue;
    ctx.save();ctx.fillStyle='#a07028';
    ctx.beginPath();ctx.ellipse(it.x,it.y,11,4,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c09040';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#cc2200';ctx.beginPath();ctx.arc(it.x+11,it.y,2.5,0,Math.PI*2);ctx.fill();
    const pulse=0.5+0.5*Math.sin(cigT*3+it.x*0.05);
    ctx.globalAlpha=0.22+pulse*0.25;
    circ(it.x,it.y,15+pulse*3,null,'#ffa040',2);
    // Sparkle cross — twinkles at the tip of the cigar
    ctx.globalAlpha=0.6+pulse*0.4;
    ctx.strokeStyle='#fff0c0';ctx.lineWidth=1;
    const sx=it.x+11,sy=it.y-1,sr=3+pulse*2;
    ctx.beginPath();ctx.moveTo(sx-sr,sy);ctx.lineTo(sx+sr,sy);
    ctx.moveTo(sx,sy-sr);ctx.lineTo(sx,sy+sr);ctx.stroke();
    ctx.restore();
  }
  for(const n of r.notes){
    if(n.read)continue;
    rnd(n.x-9,n.y-11,18,22,2,'#f0e8c0','#c0a060',1.5);
    ctx.fillStyle='#8a7050';ctx.font='6px sans-serif';ctx.textAlign='center';
    ctx.fillText('- -',n.x,n.y-3);ctx.fillText('- -',n.x,n.y+5);ctx.fillText('- -',n.x,n.y+12);
    ctx.save();ctx.globalAlpha=0.28;circ(n.x,n.y,14,null,'#ffd080',2);ctx.restore();
  }
  for(const it of r.keycards){
    if(it.got)continue;
    ctx.save();
    rnd(it.x-10,it.y-5,20,11,3,'#705010','#e0b820',1.5);
    ctx.fillStyle='#20180a';ctx.beginPath();ctx.arc(it.x+7,it.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e0b820';ctx.fillRect(it.x+4,it.y-1,3,2);ctx.fillRect(it.x+4,it.y+3,2,2);
    ctx.globalAlpha=0.28;circ(it.x,it.y,14,null,'#ffd060',2);
    ctx.restore();
  }
  // Light-switch glow — pulses when the dark room is unlit, to draw a kid's eye to it.
  if(r.dark&&!r.lightsOn){
    for(let row=0;row<H_ROWS;row++){
      for(let col=0;col<H_COLS;col++){
        if(hTileAt(r.map,col,row)===TLS){
          const lx=hTX(col),ly=hTY(row);
          const pulse=0.5+0.5*Math.sin(performance.now()/250);
          ctx.save();
          ctx.globalAlpha=0.18+pulse*0.32;
          circ(lx,ly,18+pulse*6,null,'#ffe060',2.5);
          ctx.restore();
        }
      }
    }
  }
}

function drawGuard(g){
  ctx.save();
  if(g.dir==='left'){ctx.translate(g.x,g.y);ctx.scale(-1,1);ctx.translate(-g.x,-g.y);}
  const gx=g.x,gy=g.y;
  rnd(gx-9,gy-6,18,14,3,'#7a4030',null,0);
  rnd(gx-6,gy-20,12,14,3,'#aa1818','#ee2222',1.5);
  ctx.fillStyle='#ffee00';ctx.beginPath();ctx.arc(gx+4,gy-14,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#503828';ctx.fillRect(gx-7,gy+8,5,9);ctx.fillRect(gx+2,gy+8,5,9);
  ctx.restore();
}

function drawHeistHints(){
  const h=heist,p=h.player,r=h.room;
  for(const n of r.notes){
    if(!n.read&&Math.hypot(p.x-n.x,p.y-n.y)<H_IACT*1.5){
      if(r.dark&&!r.lightsOn)txt('[E] ??? (dark)',n.x,n.y-22,'#555566',10,'center');
      else txt('[E] Read note',n.x,n.y-22,C.gold,10,'center');
    }
  }
  for(const kp of r.keypads){
    if(!kp.open){
      const kx=H_ROOM_X+kp.tx*H_TILE+H_TILE/2,ky=H_ROOM_Y+kp.ty*H_TILE+H_TILE/2;
      if(Math.hypot(p.x-kx,p.y-ky)<H_IACT+H_TILE)
        txt('[E] Enter code',kx,H_ROOM_Y+H_TILE*2+4,C.gold,10,'center');
    }
  }
  // Light switch hint
  const pc=Math.floor((p.x-H_ROOM_X)/H_TILE),pr=Math.floor((p.y-H_ROOM_Y)/H_TILE);
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      if(hTileAt(r.map,pc+dc,pr+dr)===TLS){
        const lsx=H_ROOM_X+(pc+dc)*H_TILE+H_TILE/2,lsy=H_ROOM_Y+(pr+dr)*H_TILE+H_TILE/2;
        if(Math.hypot(p.x-lsx,p.y-lsy)<H_IACT)
          txt('[E] '+(r.lightsOn?'Lights off':'Lights on!'),lsx,lsy-22,C.gold,10,'center');
      }
    }
  }
  // Keycard door hint
  if(h.kInventory.yellow){
    for(let dr=-1;dr<=1;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(hTileAt(r.map,pc+dc,pr+dr)===TKD)
          txt('[walk] Use keycard',p.x,p.y-28,C.gold,10,'center');
      }
    }
  }
}

function drawHeistHUD(){
  const h=heist,hx=H_HUD_X,hw=W-hx;
  ctx.fillStyle='rgba(8,14,28,0.97)';ctx.fillRect(hx,0,hw,H);
  ctx.strokeStyle='rgba(60,80,130,0.55)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(hx,0);ctx.lineTo(hx,H);ctx.stroke();
  var topY=26;
  if(editorLevel&&h.missionTitle){
    ctx.fillStyle=C.gold;ctx.font='bold 12px Georgia,serif';ctx.textAlign='left';
    ctx.fillText(h.missionTitle,hx+8,topY);
    topY+=14;
    if(h.missionSubtitle){
      ctx.fillStyle=C.dimTxt;ctx.font='12px Georgia,serif';
      ctx.fillText(h.missionSubtitle,hx+8,topY);
      topY+=16;
    } else {
      topY+=2;
    }
    ctx.fillStyle=C.cream;ctx.font='bold 12px Georgia,serif';
    ctx.fillText(h.room.name,hx+8,topY);
  } else {
    ctx.fillStyle=C.gold;ctx.font='bold 13px Georgia,serif';ctx.textAlign='left';
    ctx.fillText(h.room.name,hx+8,topY);
  }
  const t=Math.max(0,h.timer);
  const tm=Math.floor(t/60),ts=Math.floor(t%60);
  const tStr=h.room.timerSecs>0?(tm<10?'0':'')+tm+':'+(ts<10?'0':'')+ts:'--:--';
  txt('TIME',hx+8,50,C.dimTxt,11,'left');
  ctx.fillStyle=h.room.timerSecs>0?(t<30?C.donRed:t<60?C.orange:C.cream):C.dimTxt;
  ctx.font='bold 19px Courier New,monospace';ctx.textAlign='right';
  ctx.fillText(tStr,hx+hw-8,50);
  // Show vault-gate requirement (8) for disks/crates so the kid knows the
  // target. Cigars are bonus loot — show world total.
  let totalG=0;
  for(const r2 of h.rooms)totalG+=r2.cigars.length;
  const rows=[
    {lbl:'Disks:',   v:h.collected.f,tot:8,      col:'#6699ff'},
    {lbl:'Crates:',  v:h.collected.c,tot:8,      col:C.orange},
    {lbl:'Cigars:',  v:h.collected.g,tot:totalG, col:'#ffcc44'},
  ];
  let cy=64;
  for(const row of rows){
    const done=row.tot>0&&row.v>=row.tot;
    rnd(hx+6,cy,hw-12,22,4,done?'rgba(20,52,32,0.85)':'rgba(16,22,44,0.8)',done?'rgba(80,200,120,0.7)':'rgba(50,70,110,0.5)',1);
    txt(row.lbl,hx+12,cy+15,C.dimTxt,11,'left');
    txt(row.v+'/'+(row.tot||'?')+(done?' OK':''),hx+hw-14,cy+15,done?'#9ce0a8':(row.v>0?row.col:C.dimTxt),12,'right');
    cy+=28;
  }
  let codesRead=0;
  for(const n of h.room.notes)if(n.read){codesRead++;break;}
  if(codesRead){
    cy+=4;
    rnd(hx+6,cy,hw-12,20,3,'rgba(60,50,10,0.8)','rgba(180,150,40,0.5)',1);
    txt('Code: '+h.room.notes[0].code,hx+hw/2,cy+14,'#ffd060',12,'center');
    cy+=26;
  }
  // Keycard indicator
  if(h.kInventory.yellow){
    cy+=4;
    rnd(hx+6,cy,hw-12,20,3,'rgba(60,50,8,0.85)','rgba(190,160,20,0.6)',1.5);
    txt('KEY  Yellow',hx+hw/2,cy+14,'#ffd060',11,'center');
    cy+=26;
  }
  ctx.strokeStyle='rgba(60,80,120,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(hx+6,cy+6);ctx.lineTo(hx+hw-6,cy+6);ctx.stroke();
  txt('Room '+(h.roomIdx+1)+' / '+h.rooms.length,hx+hw/2,cy+20,C.dimTxt,10,'center');
  txt('Score',hx+8,H-30,C.dimTxt,11,'left');
  txt(Math.floor(score)+'',hx+hw-8,H-30,C.gold,15,'right','bold Georgia');
  if(editorLevel){
    var backY=H-64;
    var backHover=inRect(mx,my,hx+10,backY,hw-20,34);
    rnd(hx+10,backY,hw-20,34,7,backHover?'rgba(246,213,122,0.20)':'rgba(246,213,122,0.08)',C.gold,backHover?2:1.2);
    txt('Back to editor',hx+hw/2,backY+22,C.gold,13,'center','bold Georgia');
  } else if(!TOUCH_UI){
    txt('Arrows + E',hx+hw/2,H-10,C.dimTxt,10,'center');
  }
}

function drawHeistKP(){
  const h=heist,kp=h.room.keypads[h.kpIdx];
  ctx.save();ctx.globalAlpha=0.9;
  rnd(W/2-170,H/2-150,340,320,16,'rgba(6,12,26,0.98)','rgba(80,100,140,0.7)',2);
  ctx.globalAlpha=1;
  txt('KEYPAD',W/2,H/2-120,C.dimTxt,11,'center','bold Courier New,monospace');
  rnd(W/2-90,H/2-96,180,34,6,'rgba(0,20,8,0.97)','#3a8a5a',2);
  let disp='';
  for(let i=0;i<4;i++){disp+=(i<h.kpInput.length?h.kpInput[i]:'_');if(i<3)disp+=' ';}
  txt(disp,W/2,H/2-68,C.krakGreen,24,'center','bold Courier New,monospace');
  const btns=hKpBtns();
  for(const b of btns){
    const hov=inRect(mx,my,b.x,b.y,b.w,b.h);
    rnd(b.x,b.y,b.w,b.h,6,hov?'rgba(30,80,40,0.9)':'rgba(16,32,20,0.8)',hov?C.krakGreen:'rgba(50,100,70,0.55)',1.5);
    txt(''+b.d,b.x+b.w/2,b.y+b.h/2+8,hov?C.cream:'#90c880',20,'center','bold Courier New,monospace');
  }
  const cy=H/2+104,canOk=h.kpInput.length===4;
  rnd(W/2-60,cy,120,34,6,
    canOk?'rgba(30,80,40,0.95)':'rgba(16,24,16,0.55)',
    canOk?C.krakGreen:'rgba(50,70,50,0.35)',canOk?2:1);
  txt('ENTER',W/2,cy+22,canOk?C.cream:C.dimTxt,14,'center','bold Courier New,monospace');
  txt('ESC — cancel',W/2,H/2+154,C.dimTxt,11,'center');
  ctx.restore();
}

function drawHeistNote(){
  const h=heist;
  ctx.save();
  rnd(W/2-222,H/2-116,444,232,14,'rgba(236,224,196,0.98)','#8a7050',2.5);
  ctx.fillStyle='#5a3820';ctx.font='bold 14px Georgia,serif';ctx.textAlign='center';
  ctx.fillText('— Note —',W/2,H/2-86);
  const words=h.noteText.split(' ');
  let line='',y=H/2-56,lh=21;
  for(const w of words){
    const test=line+(line?' ':'')+w;
    if(test.length>44&&line){
      ctx.fillStyle='#3a2010';ctx.font='13px Georgia,serif';ctx.textAlign='center';
      ctx.fillText(line,W/2,y);line=w;y+=lh;
    } else {line=test;}
  }
  if(line){ctx.fillStyle='#3a2010';ctx.font='13px Georgia,serif';ctx.textAlign='center';ctx.fillText(line,W/2,y);y+=lh;}
  if(h.noteCode){
    y+=8;rnd(W/2-72,y,144,30,6,'rgba(255,220,80,0.28)','#b09030',1.5);
    ctx.fillStyle='#7a3808';ctx.font='bold 16px Courier New,monospace';ctx.textAlign='center';
    ctx.fillText('Code: '+h.noteCode,W/2,y+21);
  }
  ctx.fillStyle='#7a5030';ctx.font='11px Georgia';ctx.textAlign='center';
  ctx.fillText('Press E or tap to close',W/2,H/2+100);
  ctx.restore();
}

function drawHeist(){
  if(!heist||!heist.room){
    fillRect(0,0,W,H,C.deepBlue);
    txt('Level preview could not start.',W/2,H/2-8,'#ffb0b0',22,'center','bold Georgia');
    txt('Open the console for details, then return to the editor.',W/2,H/2+22,C.cream,13,'center');
    return;
  }
  const h=heist,r=h.room,p=h.player;
  // Background (cached)
  drawCachedBackdrop('hroom_'+h.roomIdx,drawHeistRoomBg);
  // Items (under dark overlay)
  drawHeistItems();
  // Guard (under dark overlay so it lurks in the dark)
  if(r.guard)drawGuard(r.guard);
  // Dark room overlay with visibility hole around player
  if(r.dark&&!r.lightsOn){
    ctx.save();
    ctx.fillStyle='rgba(0,0,8,0.93)';
    ctx.beginPath();
    ctx.rect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
    ctx.arc(p.x,p.y,88,0,Math.PI*2);
    ctx.fill('evenodd');
    ctx.restore();
  }
  // Digory always visible
  if(!h.failed&&!h.guardStunned)drawHeistPlayer(heistPlayerChar,p.x,p.y,p.dir);
  if(h.room.npcs)drawHeistNpcs(h.room.npcs);
  // Hints above dark overlay
  if(!h.noteOpen&&!h.kpOpen&&!h.failed&&!h.guardStunned)drawHeistHints();
  // Guard stun flash
  if(h.guardStunned){
    const flash=0.35+0.25*Math.abs(Math.sin(h.guardStunT*18));
    ctx.save();ctx.globalAlpha=flash;
    ctx.fillStyle='#cc0000';
    ctx.fillRect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
    ctx.restore();
    txt('Caught! Stay still...',H_HUD_X/2,H_ROOM_Y+H_ROWS*H_TILE/2,'#ff8888',20,'center','bold Georgia');
  }
  drawHeistHUD();
  if(h.kpOpen)drawHeistKP();
  else if(h.noteOpen)drawHeistNote();
  if(h.msgT>0){
    const a=Math.min(1,h.msgT/0.5);
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,8,24,0.9)';ctx.fillRect(0,H_ROOM_Y+H_ROWS*H_TILE,H_HUD_X,H-(H_ROOM_Y+H_ROWS*H_TILE));
    txt(h.msg,H_HUD_X/2,H-12,C.cream,13,'center');
    ctx.restore();
  }
  if(h.failed){
    const a=Math.min(1,(2.8-h.failT)/0.5);
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-220,H/2-60,440,120,14,'rgba(70,8,8,0.95)',C.donRed,2.5);
    txt("Time's Up!",W/2,H/2-14,'#ffaaaa',30,'center','bold Georgia');
    txt('The guards returned — restarting heist...',W/2,H/2+24,C.cream,13,'center');
    ctx.restore();
  }
  if(h.room.complete){
    const a=Math.min(1,h.completeT/0.4);
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-200,H/2-60,400,120,12,'rgba(20,50,28,0.96)','#3a8a5a',2);
    txt('Deeb Complete!',W/2,H/2-14,C.krakGreen,28,'center','bold Georgia');
    txt('Loading escape route...',W/2,H/2+24,C.dimTxt,14,'center');
    ctx.restore();
  }
}

// ── Home: House Lockdown ──────────────────────────────────────────────────
const HM_SPD=115,HM_IACT=46,HM_PICK=24;
const HOME_MAP=(function(){
  var F=TF,W=TW,I=TI;
  return [
    [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W], // row 0 perimeter
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 1 bedroom/uhall/office
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 2
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 3
    [W,W,F,W,W,W,F,F,F,F,F,F,F,W,W,F,W,W,W], // row 4 passages at col 2+15
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 5 main floor
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 6
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 7
    [W,F,F,F,F,F,W,W,F,F,F,W,W,F,I,I,I,F,W], // row 8 kitchen island+ice
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,I,I,I,F,W], // row 9 ice right
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,I,I,I,F,W], // row 10
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 11
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 12 blanket at col 2
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 13
    [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W], // row 14 perimeter
  ];
})();

function hmTileAt(col,row){
  if(col<0||col>=H_COLS||row<0||row>=H_ROWS)return TW;
  return HOME_MAP[row][col];
}
function hmCanMove(px,py){
  var off=10,c0=Math.floor((px-off-H_ROOM_X)/H_TILE),c1=Math.floor((px+off-H_ROOM_X)/H_TILE);
  var r0=Math.floor((py-off-H_ROOM_Y)/H_TILE),r1=Math.floor((py+off-H_ROOM_Y)/H_TILE);
  for(var r=r0;r<=r1;r++)for(var c=c0;c<=c1;c++)if(hmTileAt(c,r)===TW)return false;
  return true;
}

let hm=null;
function hmMsg(s){hm.msg=s;hm.msgT=2.6;}

// ── Fire particles (adapted from flametrail) ────────────────────────────────
const fireParticles=[];
function emitFlame(ox,oy,angle){
  for(var i=0;i<6;i++){
    const spread=(Math.random()-0.5)*0.65;
    const spd=180+Math.random()*120;
    fireParticles.push({
      x:ox+Math.cos(angle)*12,
      y:oy+Math.sin(angle)*12,
      vx:Math.cos(angle+spread)*spd,
      vy:Math.sin(angle+spread)*spd,
      life:1.0, maxLife:0.32+Math.random()*0.18,
      r:3+Math.random()*4
    });
  }
  while(fireParticles.length>180)fireParticles.shift();
}
function updateFireParticles(dt){
  for(var i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy-=18*dt; p.vx*=Math.max(0,1-1.2*dt);
    p.life-=dt/p.maxLife;
    if(p.life<=0)fireParticles.splice(i,1);
  }
}
function drawFireParticles(){
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(var i=0;i<fireParticles.length;i++){
    const p=fireParticles[i],t=p.life;
    var r,g,b;
    if(t>0.7){r=255;g=Math.round(200+55*(t-0.7)/0.3);b=Math.round(80*(t-0.7)/0.3);}
    else if(t>0.4){r=255;g=Math.round(100+(t-0.4)/0.3*100);b=0;}
    else{r=Math.round(200+55*t/0.4);g=Math.round(50*t/0.4);b=0;}
    ctx.globalAlpha=t*0.85;
    ctx.fillStyle='rgb('+r+','+g+','+b+')';
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.r*t),0,Math.PI*2);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  ctx.restore();
}

// ── Don / Firelight perimeter helpers ───────────────────────────────────────
// The Don walks around the outside of the house (the wall tiles). Position is
// parameterized as t in [0,4): top edge → right → bottom → left → wrap.
const PERI_X0=16, PERI_X1=H_ROOM_X+(H_COLS-1)*H_TILE+H_TILE/2; // 16, 592
const PERI_Y0=H_ROOM_Y+H_TILE/2, PERI_Y1=H_ROOM_Y+(H_ROWS-1)*H_TILE+H_TILE/2; // 56, 504
const PERI_W=PERI_X1-PERI_X0, PERI_H=PERI_Y1-PERI_Y0;
function periPos(t){
  t=((t%4)+4)%4;
  if(t<1)return {x:PERI_X0+t*PERI_W,       y:PERI_Y0,                  side:'n'};
  if(t<2)return {x:PERI_X1,                 y:PERI_Y0+(t-1)*PERI_H,     side:'e'};
  if(t<3)return {x:PERI_X1-(t-2)*PERI_W,    y:PERI_Y1,                  side:'s'};
  return        {x:PERI_X0,                 y:PERI_Y1-(t-3)*PERI_H,     side:'w'};
}
// Door positions on the perimeter (matches initHome's lock list)
const DOOR_T={n:0.5, e:1+(248-PERI_Y0)/PERI_H, s:2.5, w:3+(PERI_Y1-248)/PERI_H};

function shortestPeriDelta(from,to){
  // Move around the loop along the shorter arc
  var d=to-from;
  d=((d%4)+4)%4;
  if(d>2)d-=4;
  return d;
}

function initHome(){
  var hp={vx:0,vy:0,dir:'down',bobT:0,facing:'down'};
  MuckoGrid.init(hp,9,7,H_TILE,H_ROOM_X,H_ROOM_Y);
  hm={
    p:hp,
    locks:[
      {col:9, row:1, name:'North Window',dir:'n',locked:false,pressure:0,needKey:false},
      {col:17,row:6, name:'East Window', dir:'e',locked:false,pressure:0,needKey:false},
      {col:9, row:13,name:'Front Door',  dir:'s',locked:false,pressure:0,needKey:false},
      {col:1, row:6, name:'Back Door',   dir:'w',locked:false,pressure:0,needKey:true},
    ],
    kcard:{found:false,col:14,row:9},
    donInside:0,breachFlash:0,
    firelightCalled:false,firelightActive:false,firelightTimer:0,
    cmpUsed:false,
    fpUsed:false,fpFire:false,fpFireT:0,
    failed:false,failTimer:0,
    msg:'',msgT:0,
    startScore:score,
    don:{t:DOOR_T.s, x:0, y:0, dir:'left', bobT:0, inside:false,
         ix:0, iy:0, burnT:0},
    fg: {t:DOOR_T.s-0.6, x:0, y:0, dir:'right', bobT:0, fireT:0},
  };
  fireParticles.length=0;
}

function updateHome(dt){
  var h=hm,p=h.p;
  if(h.failed){
    h.failTimer-=dt;
    if(h.failTimer<=0){score=Math.max(0,score-50);stageScores.home=0;initHome();}
    return;
  }

  // Grid movement (Pokémon-style discrete steps, 8-direction)
  function homeBlocked(c,r){
    if(c<0||r<0||c>=H_COLS||r>=H_ROWS)return true;
    return HOME_MAP[r][c]===TW;
  }
  var homeOpts={allowDiagonals:true};
  var dir=MuckoGrid.readDir(K,{
    up:touchState.dirs.has('up'),    down:touchState.dirs.has('down'),
    left:touchState.dirs.has('left'),right:touchState.dirs.has('right')
  },homeOpts);
  MuckoGrid.update(p,dt,dir,false,homeBlocked,H_TILE,homeOpts);
  MuckoGrid.applyBumpRender(p,H_TILE);
  p.dir=p.facing;
  // Ice slide: when idle on ice with no input, take one more step in last dir.
  if(!p.gridMoving&&p.bumpT<=0&&!dir&&p.lastDir){
    if(HOME_MAP[p.gridRow][p.gridCol]===TI){
      MuckoGrid.startStep(p,p.lastDir,false,homeBlocked,H_TILE,homeOpts);
    }
  }
  p.bobT+=dt;

  // Keycard pickup
  if(!h.kcard.found){
    var kx=hTX(h.kcard.col),ky=hTY(h.kcard.row);
    if(Math.hypot(p.x-kx,p.y-ky)<HM_PICK+H_TILE){
      h.kcard.found=true;score+=15;sfxPickup();hmMsg('Found the garage keycard! One less thing for the Don to rattle. +15');
    }
  }

  // ACT key (E)
  if(eat('KeyE')||touchState.buttons.has('act')){
    var acted=false;
    for(var li=0;li<h.locks.length;li++){
      var lk=h.locks[li];
      if(lk.locked)continue;
      var lx=hTX(lk.col),ly=hTY(lk.row);
      if(Math.hypot(p.x-lx,p.y-ly)<HM_IACT+H_TILE){
        if(lk.needKey&&!h.kcard.found){hmMsg('Need the garage keycard first! Digory noses around for it.');}
        else{lk.locked=true;lk.pressure=0;score+=50;sfxLock();hmMsg(lk.name+' locked! Cozy house points: +50');}
        acted=true;break;
      }
    }
    // Phone (col 9, row 5)
    if(!acted&&Math.hypot(p.x-hTX(9),p.y-hTY(5))<HM_IACT+H_TILE){
      if(!h.firelightCalled){
        h.firelightCalled=true;h.firelightActive=true;h.firelightTimer=18;
        // Spawn FG at the next corner behind the Don so the chase reads.
        h.fg.t=h.don.t-0.6;
        score+=30;hmMsg('Firelight Guy arrives — the flaming distraction is officially underway! +30');
      } else hmMsg("He's still out there buying you time.");
      acted=true;
    }
    // Crow computer (col 15, row 2)
    if(!acted&&Math.hypot(p.x-hTX(15),p.y-hTY(2))<HM_IACT+H_TILE){
      if(!h.cmpUsed){h.cmpUsed=true;score+=8;hmMsg('Playing The Sims on the crow computer while the house panics... +8');}
      else hmMsg('The Sims is still loading. Crow tech takes its time.');
      acted=true;
    }
    // Fireplace robot (col 2, row 7) — reusable: light again whenever the
    // rug isn't currently on fire.
    if(!acted&&Math.hypot(p.x-hTX(2),p.y-hTY(7))<HM_IACT+H_TILE){
      if(h.fpFire){
        h.fpFire=false;hmMsg('Fireplace Robot puts out the rug before it becomes a whole situation.');
      } else {
        h.fpFire=true;h.fpFireT=4.0;
        var first=!h.fpUsed; h.fpUsed=true;
        score+=first?8:2;
        hmMsg(first?'Fireplace Robot lights a fire! The rug ignites! Very cozy, slightly unhelpful. +8'
                   :'Fireplace Robot lights another fire! Warmth bonus: +2');
      }
      acted=true;
    }
  }

  if(h.fpFire){h.fpFireT-=dt;if(h.fpFireT<=0)h.fpFire=false;}
  if(h.firelightActive){h.firelightTimer-=dt;if(h.firelightTimer<=0)h.firelightActive=false;}
  if(h.msgT>0)h.msgT-=dt;
  if(h.breachFlash>0)h.breachFlash=Math.max(0,h.breachFlash-dt);
  if(h.don.burnT>0)h.don.burnT=Math.max(0,h.don.burnT-dt);
  updateFireParticles(dt);

  // Don pressure
  var allLocked=true;
  var hottestLock=null, hottestPressure=-1;
  for(var pi=0;pi<h.locks.length;pi++){
    var lck=h.locks[pi];
    if(!lck.locked){
      allLocked=false;
      var rate=0.028*diff.donRate;
      // The Don only mounts pressure on the door he's actually standing at,
      // so the perimeter chase actually means something.
      var atDoor=h.don.t!=null&&Math.abs(shortestPeriDelta(h.don.t,DOOR_T[lck.dir]))<0.06;
      if(!atDoor)rate*=0.25;       // background creep when he's elsewhere
      if(h.firelightActive)rate*=0.35;     // FG slows ALL doors now (he chases)
      if(h.don.burnT>0)rate*=0.0;          // can't push while on fire
      lck.pressure=Math.min(1,lck.pressure+rate*dt);
      if(lck.pressure>hottestPressure){hottestPressure=lck.pressure;hottestLock=lck;}
      if(lck.pressure>=1&&!h.don.inside){
        lck.pressure=0;h.donInside++;h.breachFlash=0.9;
        hmMsg('The Don busted through the '+lck.name+'! This is why we lock things.');
        if(h.donInside>=2){
          // Don walks IN toward Digory instead of an instant fail.
          h.don.inside=true;
          h.don.ix=hTX(lck.col);h.don.iy=hTY(lck.row);
        }
      }
    }
  }

  // ── Don movement ─────────────────────────────────────────────────────────
  if(h.don.inside){
    // Stalk Digory inside the house.
    var ddx=p.x-h.don.ix, ddy=p.y-h.don.iy, dd=Math.hypot(ddx,ddy);
    if(dd>1){h.don.ix+=ddx/dd*38*dt; h.don.iy+=ddy/dd*38*dt;}
    h.don.dir=ddx<0?'left':'right';
    h.don.x=h.don.ix; h.don.y=h.don.iy;
    h.don.bobT+=dt;
    if(dd<22&&!h.failed){h.failed=true;h.failTimer=3.2;}
  } else {
    // Walk along the perimeter toward whichever unlocked door is closest to
    // breaking. If everything's locked, just amble around.
    var targetT;
    if(hottestLock)targetT=DOOR_T[hottestLock.dir];
    else targetT=h.don.t+0.4*dt; // ambient pacing
    var delta=shortestPeriDelta(h.don.t,targetT);
    var spd=h.don.burnT>0?1.6:0.55; // sprints away when on fire
    if(h.don.burnT>0)delta=-Math.sign(shortestPeriDelta(h.don.t,h.fg.t))||1;
    if(Math.abs(delta)>0.005){
      var step=Math.sign(delta)*Math.min(Math.abs(delta),spd*dt);
      h.don.t+=step;
    }
    var dp=periPos(h.don.t);
    h.don.x=dp.x; h.don.y=dp.y;
    h.don.dir=(dp.side==='n'||dp.side==='s')?(Math.sign(delta)<0?'left':'right'):'right';
    h.don.bobT+=dt;
  }

  // ── Firelight Guy ────────────────────────────────────────────────────────
  if(h.firelightActive&&!h.don.inside){
    // Trail the Don around the loop; close the gap and shoot.
    var fgDelta=shortestPeriDelta(h.fg.t,h.don.t);
    // Stay slightly behind so the chase reads as a chase.
    var lead=Math.sign(fgDelta||1)*0.4;
    var fgTarget=h.don.t-lead;
    var fgD=shortestPeriDelta(h.fg.t,fgTarget);
    var fgSpd=0.85;
    if(Math.abs(fgD)>0.005){
      h.fg.t+=Math.sign(fgD)*Math.min(Math.abs(fgD),fgSpd*dt);
    }
    var fp=periPos(h.fg.t);
    h.fg.x=fp.x; h.fg.y=fp.y;
    h.fg.dir=Math.sign(fgDelta)<0?'left':'right';
    h.fg.bobT+=dt;
    h.fg.fireT-=dt;
    var fdx=h.don.x-h.fg.x, fdy=h.don.y-h.fg.y;
    var fdist=Math.hypot(fdx,fdy);
    if(fdist<260&&h.fg.fireT<=0){
      var ang=Math.atan2(fdy,fdx);
      emitFlame(h.fg.x,h.fg.y-4,ang);
      if(fdist<140)h.don.burnT=Math.max(h.don.burnT,1.2);
      h.fg.fireT=0.05;
    }
  }

  // Victory: all locked + near yellow blanket
  if(allLocked&&Math.hypot(p.x-hTX(2),p.y-hTY(12))<HM_IACT+4){
    score+=30;stageScores.home=score-h.startScore;
    startPhase('victory');
  }
}

// ─── Home drawing ──────────────────────────────────────────────────────────
function drawHomeBg(){
  // Outer bg
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,W,H);
  // Floor tiles
  for(var row=0;row<H_ROWS;row++){
    for(var col=0;col<H_COLS;col++){
      var tx=H_ROOM_X+col*H_TILE,ty=H_ROOM_Y+row*H_TILE;
      var t=hmTileAt(col,row);
      if(t===TW){
        ctx.fillStyle='#2e2840';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.fillStyle='rgba(80,70,120,0.25)';ctx.fillRect(tx,ty,H_TILE,3);
      } else if(t===TI){
        ctx.fillStyle='#b8d8ec';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(200,230,255,0.5)';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(tx+4,ty+4);ctx.lineTo(tx+H_TILE-4,ty+H_TILE-4);
        ctx.moveTo(tx+H_TILE-4,ty+4);ctx.lineTo(tx+4,ty+H_TILE-4);ctx.stroke();
      } else {
        // Warm cream floor with room-specific tint
        var inBedroom=(col>=1&&col<=4&&row>=1&&row<=3);
        var inOffice=(col>=14&&col<=17&&row>=1&&row<=3);
        var inLiving=(col>=1&&col<=5&&row>=5&&row<=10);
        ctx.fillStyle=inBedroom?'#cfc0a0':inOffice?'#b8c8a0':inLiving?'#c8b890':'#d0c4a0';
        ctx.fillRect(tx,ty,H_TILE,H_TILE);
        // Subtle grid
        ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.5;
        ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
      }
    }
  }
  // Room decorations (static)
  // Bed in bedroom (cols 1-2, rows 1-2)
  ctx.fillStyle='#8a6048';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE,H_TILE*2,H_TILE*0.6); // headboard
  ctx.fillStyle='#e0e8f0';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE+H_TILE*0.6,H_TILE*2,H_TILE*1.4); // sheets
  ctx.fillStyle='#c0d0e8';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE*0.6,H_TILE*2,H_TILE*0.6); // pillow
  // Office desk (cols 15-16, row 2)
  rnd(H_ROOM_X+15*H_TILE,H_ROOM_Y+2*H_TILE,H_TILE*2,H_TILE*0.7,3,'#6a4828',null,0);
  // HUD banner area (top strip)
  ctx.fillStyle='#181428';ctx.fillRect(0,0,W,H_ROOM_Y);
  ctx.strokeStyle='rgba(100,80,160,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H_ROOM_Y);ctx.lineTo(W,H_ROOM_Y);ctx.stroke();
}

function drawHomeLocks(){
  var h=hm,p=h.p;
  for(var i=0;i<h.locks.length;i++){
    var lk=h.locks[i];
    var lx=hTX(lk.col),ly=hTY(lk.row);
    var near=Math.hypot(p.x-lx,p.y-ly)<HM_IACT+H_TILE;
    // Draw door/window sprite at wall edge
    var wx,wy,ww,wh;
    if(lk.dir==='n'){wx=lx-12;wy=H_ROOM_Y+2;ww=24;wh=H_TILE-4;}
    else if(lk.dir==='s'){wx=lx-12;wy=H_ROOM_Y+(H_ROWS-1)*H_TILE+2;ww=24;wh=H_TILE-4;}
    else if(lk.dir==='w'){wx=H_ROOM_X+2;wy=ly-12;ww=H_TILE-4;wh=24;}
    else{wx=H_ROOM_X+(H_COLS-1)*H_TILE+2;wy=ly-12;ww=H_TILE-4;wh=24;}
    // Door/window frame
    var frameCol=lk.locked?C.krakGreen:(lk.pressure>0.7?C.donRed:'#9a8060');
    rnd(wx,wy,ww,wh,3,lk.locked?'rgba(30,100,50,0.7)':'rgba(80,50,20,0.7)',frameCol,2);
    if(lk.locked){
      ctx.fillStyle=C.krakGreen;ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText('✓',wx+ww/2,wy+wh/2+4);
    } else {
      ctx.fillStyle=C.donRed;ctx.font='bold 7px monospace';ctx.textAlign='center';
      if(lk.needKey&&!h.kcard.found)ctx.fillStyle='#d09030';
      ctx.fillText(lk.dir==='n'||lk.dir==='s'?'||':'=',wx+ww/2,wy+wh/2+3);
    }
    // Pressure bar (below or beside door)
    if(!lk.locked){
      var bx,by,blen=36,bthick=5;
      if(lk.dir==='n'){bx=lx-18;by=H_ROOM_Y+H_TILE;blen=36;bthick=5;}
      else if(lk.dir==='s'){bx=lx-18;by=H_ROOM_Y+(H_ROWS-2)*H_TILE-8;blen=36;bthick=5;}
      else if(lk.dir==='w'){bx=H_ROOM_X+H_TILE;by=ly-3;blen=5;bthick=36;}
      else{bx=H_ROOM_X+(H_COLS-2)*H_TILE-8;by=ly-3;blen=5;bthick=36;}
      var horiz=(lk.dir==='n'||lk.dir==='s');
      rnd(bx,by,horiz?blen:bthick,horiz?bthick:blen,2,'rgba(0,0,0,0.4)',null,0);
      var fill=Math.min(1,lk.pressure);
      var pulsing=lk.pressure>0.7&&Math.abs(Math.sin(h.p.bobT*9))>0.4;
      if(fill>0){
        var pc=lk.pressure>0.7?C.donRed:'#c09030';
        ctx.save();if(pulsing)ctx.globalAlpha=0.7+0.3*Math.abs(Math.sin(h.p.bobT*9));
        if(horiz)rnd(bx,by,Math.round(blen*fill),bthick,2,pc,null,0);
        else rnd(bx,by,bthick,Math.round(blen*fill),2,pc,null,0);
        ctx.restore();
      }
      // (Don is now drawn as a full sprite walking the perimeter — no peek here)
      // Proximity hint
      if(near){
        ctx.save();ctx.globalAlpha=0.8+0.2*Math.abs(Math.sin(h.p.bobT*4));
        var hint=(lk.needKey&&!h.kcard.found)?'[Need keycard]':'[E] Lock';
        txt(hint,lx,ly-26,C.gold,10,'center');
        ctx.restore();
      }
    }
  }
}

// ── Don sprite — gangster in a suit and fedora ─────────────────────────────
function drawDon(x,y,dir,bobT,burning){
  ctx.save();
  if(dir==='left'){ctx.translate(x,y);ctx.scale(-1,1);ctx.translate(-x,-y);}
  var bob=Math.sin(bobT*8)*1.2;
  // Shadow
  ctx.save();ctx.globalAlpha=0.28;
  ctx.fillStyle='#000';ctx.beginPath();
  ctx.ellipse(x,y+13,12,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Legs (charcoal slacks)
  ctx.fillStyle='#1a1620';
  ctx.fillRect(x-5,y+4+bob*0.3,3,9);
  ctx.fillRect(x+2,y+4+bob*0.3,3,9);
  // Suit jacket — torso
  ctx.fillStyle='#26222e';
  rnd(x-9,y-8+bob,18,14,3,'#26222e','#0c0a12',1);
  // White shirt collar
  ctx.fillStyle='#f0e8d0';
  ctx.beginPath();
  ctx.moveTo(x-3,y-7+bob);ctx.lineTo(x,y-2+bob);
  ctx.lineTo(x+3,y-7+bob);ctx.closePath();ctx.fill();
  // Red tie
  ctx.fillStyle='#a8202a';
  ctx.beginPath();
  ctx.moveTo(x-1.5,y-3+bob);ctx.lineTo(x+1.5,y-3+bob);
  ctx.lineTo(x+2.5,y+5+bob);ctx.lineTo(x,y+7+bob);ctx.lineTo(x-2.5,y+5+bob);
  ctx.closePath();ctx.fill();
  // Head — pale skin
  circ(x,y-12+bob,5.5,'#e6c2a4','#3a2418',1.2);
  // Stubble shadow
  ctx.save();ctx.globalAlpha=0.35;
  ctx.fillStyle='#3a2418';ctx.fillRect(x-4,y-10+bob,8,2);
  ctx.restore();
  // Fedora — wide brim + crown
  ctx.fillStyle='#0a0810';
  ctx.beginPath();
  ctx.ellipse(x,y-15+bob,9.5,2.2,0,0,Math.PI*2);ctx.fill();   // brim
  rnd(x-5,y-20+bob,10,6,1.5,'#0a0810','#000',0.8);             // crown
  // Hat band
  ctx.fillStyle='#444';ctx.fillRect(x-5,y-16+bob,10,1.2);
  // Eye glint
  circ(x-1.5,y-12+bob,0.8,'#fff');
  // Burn overlay — flicker red while on fire
  if(burning>0){
    ctx.save();ctx.globalAlpha=Math.min(0.6,burning*0.5);
    ctx.fillStyle='#ff5020';ctx.fillRect(x-10,y-22+bob,20,32);
    ctx.restore();
  }
  ctx.restore();
}

// ── Firelight Guy — human in a jacket with a flamethrower tank ─────────────
function drawFirelightGuy(x,y,dir,bobT){
  ctx.save();
  if(dir==='left'){ctx.translate(x,y);ctx.scale(-1,1);ctx.translate(-x,-y);}
  var bob=Math.sin(bobT*9)*1.4;
  // Shadow
  ctx.save();ctx.globalAlpha=0.28;
  ctx.fillStyle='#000';ctx.beginPath();
  ctx.ellipse(x,y+13,12,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Legs
  ctx.fillStyle='#3a2818';
  ctx.fillRect(x-5,y+4+bob*0.3,3,9);
  ctx.fillRect(x+2,y+4+bob*0.3,3,9);
  // Jacket (orange-brown)
  ctx.fillStyle='#a85a26';
  rnd(x-9,y-8+bob,18,14,3,'#a85a26','#5a2a10',1);
  // Tank on back — green cylinder + nozzle hose
  ctx.fillStyle='#3a6a3a';
  rnd(x-12,y-6+bob,5,12,2,'#3a6a3a','#1a3d1a',1);
  ctx.fillStyle='#5a8a4a';ctx.fillRect(x-11,y-4+bob,3,2);
  // Hose snaking to nozzle in front
  ctx.strokeStyle='#222';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x-7,y-2+bob);ctx.quadraticCurveTo(x+2,y+2+bob,x+10,y-1+bob);
  ctx.stroke();
  // Nozzle — short metal barrel
  ctx.fillStyle='#888';ctx.fillRect(x+9,y-3+bob,7,3);
  ctx.fillStyle='#444';ctx.fillRect(x+15,y-3.5+bob,2,4);
  // Head
  circ(x,y-12+bob,5,'#d8a878','#3a2418',1);
  // Helmet
  ctx.fillStyle='#7a3010';
  rnd(x-6,y-18+bob,12,5,2,'#7a3010','#3a1808',1);
  // Goggles
  ctx.fillStyle='#181818';ctx.fillRect(x-4,y-13+bob,8,2);
  circ(x-2,y-12+bob,1.4,'#aaeaff');
  circ(x+2,y-12+bob,1.4,'#aaeaff');
  ctx.restore();
}

}

// ── Victory ───────────────────────────────────────────────────────────────
function initVictory(){
  const thresholds=[200,550,900];
  var stars=0;
  var mul=diff.starMul;
  for(var i=2;i>=0;i--){if(score>=thresholds[i]*mul){stars=i+1;break;}}
  var sub1Pts=stageScores.sub1;
  var heistPts=stageScores.heist-stageScores.sub1;
  var sub2Pts=stageScores.sub2;
  var homePts=stageScores.home;
  vic={stars,rank:0,sub1Pts,heistPts,sub2Pts,homePts};
  if(!scoreSaved){
    scoreSaved=true;
    vic.rank=saveHS({score:Math.floor(score),diff:diff.label,date:Date.now()});
  }
  setTimeout(sfxVictory,400);
}

let vicT=0;
function updateVictory(dt){
  vicT+=dt;
  if(editorLevel&&(eat('Escape')||eat('Backspace'))){goToEditor();return;}
  if(editorLevel&&mclk&&inRect(mx,my,W/2-120,H-146,240,46)){mclk=false;goToEditor();return;}
  if(eat('Enter')||eat('Space')){mclk=false;resetRun();phase='title';vicT=0;}
  if(mclk&&inRect(mx,my,W/2-120,H-82,240,54)){mclk=false;resetRun();phase='title';vicT=0;}
}

function drawVictory(){
  fillRect(0,0,W,H,'#080d18');

  // Yellow blanket bed
  rnd(W/2-110,H-140,220,48,8,'#c49020',null,0);
  rnd(W/2-104,H-136,208,40,6,'#f5d040',null,0);

  const dx=W/2, dy=H-120;
  circ(dx,dy-12,14,'#f0f0f0');           // white head
  fillRect(dx-18,dy-8,36,18,'#f0f0f0');  // body
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(dx-5,dy-22,10,8,0,0,Math.PI*2);ctx.fill(); // black spot on head
  circ(dx-10,dy-14,4,'#111');circ(dx+10,dy-14,4,'#111'); // ears
  ctx.fillStyle='#8a5030';
  ctx.beginPath();ctx.ellipse(dx+4,dy-10,5,4,0,0,Math.PI*2);ctx.fill(); // muzzle

  const starStr=(vicT>0.2?'★':'☆')+(vicT>0.7&&vic.stars>=2?'★':'☆')+(vicT>1.2&&vic.stars>=3?'★':'☆');

  txt(editorLevel&&heist&&heist.missionTitle?heist.missionTitle:'Mission Complete!',W/2,120,C.gold,32,'center','bold Georgia');
  if(editorLevel&&heist&&heist.missionSubtitle){
    txt(heist.missionSubtitle,W/2,136,C.dimTxt,14,'center','Georgia');
  }
  var bedtimeLine=
    editorLevel&&heist&&heist.successLine?heist.successLine:
    vic.stars===3?'Everything made it home before bedtime. Even the score did.':
    vic.stars===2?'A little smoky, a little splashy, but everyone got home safely.':
    'Digory made it home, which is the part that matters most.';
  txt(bedtimeLine,W/2,148,C.cream,13,'center','Georgia');

  // Per-stage score breakdown
  var panelX=W/2-310, panelY=140, panelW=340, panelH=166;
  rnd(panelX,panelY,panelW,panelH,12,'rgba(0,8,26,0.88)','rgba(90,140,210,0.4)',1.5);
  var stages=[
    {label:'Sub Run',    pts:vic.sub1Pts,  col:'#5ab5e8'},
    {label:'The Heist',  pts:vic.heistPts, col:'#a0e878'},
    {label:'Escape',     pts:vic.sub2Pts,  col:'#e8a040'},
    {label:'Lockdown',   pts:vic.homePts,  col:'#e86060'},

  var maxBar=panelW-100, maxPts=Math.max(1,Math.floor(score));
  for(var si=0;si<stages.length;si++){

  }
  txt('Difficulty: '+diff.label,panelX+panelW/2,panelY+panelH-12,C.dimTxt,11,'center');

  // Total + rank
  var rightX=W/2+50, rightPanelW=210, rightPanelH=80;
  rnd(rightX,panelY,rightPanelW,rightPanelH,12,'rgba(0,8,26,0.88)','rgba(90,140,210,0.4)',1.5);

  rnd(bx,by,240,54,10,hover?'rgba(246,213,122,0.22)':'rgba(246,213,122,0.08)',C.gold,hover?2.5:1.5);

// ── Title ─────────────────────────────────────────────────────────────────

  titleT+=dt;

}

  for(let i=0;i<6;i++){
    ctx.fillStyle='rgba(40,100,180,0.05)';
    ctx.fillRect(0,80+i*74,W,37);
  }

  // Title glow
  const glow=0.72+0.28*Math.abs(Math.sin(titleT*0.75));
  ctx.save();ctx.globalAlpha=glow;
  txt("THE DON'S TOWER",W/2,100,C.gold,46,'center','bold Georgia');
  ctx.restore();
  // shadow pass
  ctx.save();ctx.globalAlpha=0.25;
  txt("THE DON'S TOWER",W/2,104,'rgba(246,213,122,0.8)',46,'center','bold Georgia');
  ctx.restore();

  txt('A Samster & Digory bedtime heist',W/2,138,C.dimTxt,17,'center','Georgia');

    '5.  Reach the yellow blanket before the story can get any later',

  for(let i=0;i<steps.length;i++){
    txt(steps[i],W/2,276+i*25,i===4?'#f5d090':C.cream,14,'center');

  // Start button
  const bx=W/2-130,by=378;
  const hover=inRect(mx,my,bx,by,260,62);
  rnd(bx,by,260,62,12,hover?'rgba(246,213,122,0.22)':'rgba(246,213,122,0.09)',C.gold,hover?2.5:2);
  txt('START MISSION',W/2,by+39,C.gold,22,'center','bold Georgia');

  txt('Press ENTER or tap to start the bedtime mission',W/2,H-14,C.dimTxt,12,'center');

// ── Difficulty select ─────────────────────────────────────────────────────
function updateDiff(dt){
  for(let i=0;i<DIFFS.length;i++){
    const d=DIFFS[i];
    const bx=W/2-310+i*218, by=290, bw=202, bh=130;
    if(mclk&&inRect(mx,my,bx,by,bw,bh)){
      mclk=false;diff=d;startPhase('sub1');return;
    }
    if(eat('Digit'+(i+1))){diff=d;startPhase('sub1');return;}
  }
  // Mobile back: a tappable chevron in the bottom-left corner
  if(mclk&&inRect(mx,my,18,H-58,140,44)){mclk=false;phase='title';return;}
  if(eat('Escape')||eat('Backspace')){phase='title';}
}
function drawDiff(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#030b14');grad.addColorStop(1,'#051426');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  txt('CHOOSE DIFFICULTY',W/2,70,C.gold,28,'center','bold Georgia');
  txt('Press 1, 2, or 3  —  or tap a card',W/2,104,C.dimTxt,14,'center');

  for(let i=0;i<DIFFS.length;i++){

    const bx=W/2-310+i*218, by=290, bw=202, bh=130;

    const hover=inRect(mx,my,bx,by,bw,bh);
    rnd(bx,by,bw,bh,12,
      sel?'rgba(246,213,122,0.15)':hover?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.42)',
      sel?d.col:hover?'rgba(200,180,100,0.5)':'rgba(70,80,110,0.55)',sel?2.5:1.5);
    txt((i+1)+'.  '+d.label,bx+101,by+34,d.col,16,'center','bold Georgia');
    txt(d.desc,bx+101,by+64,C.cream,12,'center');
    const wl=d.id==='easy'?'Long':d.id==='medium'?'Normal':'Short';
    txt('Dodge window: '+wl,bx+101,by+90,C.dimTxt,11,'center');
    txt('Press '+(i+1),bx+101,by+114,C.dimTxt,11,'center');
  }

  // Description column
  rnd(W/2-300,140,600,132,10,'rgba(0,8,22,0.7)','rgba(60,80,120,0.4)',1);
  txt('Difficulty affects:',W/2,166,C.dimTxt,13,'center');
  txt('•  Depth charge dodge window in the submarine escape',W/2,190,C.cream,13,'center');
  txt('•  How fast the Don tries to enter your house',W/2,210,C.cream,13,'center');
  txt('•  Timer length in the Don’s tower heist',W/2,230,C.cream,13,'center');
  txt('•  Star thresholds (harder difficulty is easier to 3-star)',W/2,250,C.cream,13,'center');

  // Back button (visible on every device, also doubles as the touch target)
  const bbHover=inRect(mx,my,18,H-58,140,44);
  rnd(18,H-58,140,44,8,bbHover?'rgba(246,213,122,0.18)':'rgba(20,16,30,0.55)',
    bbHover?C.gold:'rgba(200,160,96,0.5)',1.5);
  // Drawn chevron (iOS 12 safe — never use Unicode arrows)
  ctx.save();ctx.fillStyle=bbHover?C.gold:'rgba(220,200,150,0.85)';
  ctx.beginPath();
  ctx.moveTo(40,H-36);ctx.lineTo(54,H-44);ctx.lineTo(54,H-28);
  ctx.closePath();ctx.fill();
  ctx.restore();
  txt('Back',104,H-30,bbHover?C.gold:C.cream,15,'center','bold Georgia');
  txt('Esc — back',W/2,H-14,C.dimTxt,12,'center');
}

// ── Game loop ─────────────────────────────────────────────────────────────
let lastTs=0, lastRenderTs=0, simDebt=0, t=0;
function targetFps(){return LOW_FPS_PHASES.has(phase)?30:60;}

function stepSimulation(dt){
  t++;
  switch(phase){
    case 'title':   updateTitle(dt);   break;
    case 'diff':    updateDiff(dt);    break;
    case 'sub1':    updateSub1(dt);    break;
    case 'heist':   updateHeist(dt);   break;
    case 'sub2':    updateSub2(dt);    break;
    case 'home':    updateHome(dt);    break;
    case 'victory': updateVictory(dt); break;
  }
}

function renderPhase(){
  switch(phase){
    case 'title':   drawTitle();   break;
    case 'diff':    drawDiff();    break;
    case 'sub1':    drawSub1();    break;
    case 'heist':   drawHeist();   break;
    case 'sub2':    drawSub2();    break;
    case 'home':    drawHome();    break;
    case 'victory': drawVictory(); break;
  }
}

function loop(ts){
  const elapsed=lastTs?Math.min((ts-lastTs)/1000,MAX_SIM_CATCHUP):0;
  lastTs=ts;
  simDebt=Math.min(simDebt+elapsed,MAX_SIM_CATCHUP);
  while(simDebt>=SIM_STEP){
    stepSimulation(SIM_STEP);
    simDebt-=SIM_STEP;
    // Consume one-shot inputs only after a sim step actually ran.
    // Resetting at end-of-frame instead would wipe keypresses on
    // high-refresh displays where most frames render without simulating.
    mclk=false;
    for(const k in JP)JP[k]=false;
  }

  const fps=targetFps();
  if(fps<60){
    const minInterval=1000/fps;
    if(lastRenderTs&&ts-lastRenderTs<minInterval){requestAnimationFrame(loop);return;}
  }
  lastRenderTs=ts;

  ctx.clearRect(0,0,W,H);
  renderPhase();
  drawMobileControls();

  requestAnimationFrame(loop);
}
// ── Editor-level boot ────────────────────────────────────────────────────
// If launched with ?level=<name>, look up the level in localStorage and jump
// into a self-contained heist preview. Wait for support scripts first.
function bootEditorLevelFromQuery(){
  try{
    var params=new URLSearchParams(window.location.search);
    var name=params.get('level');
    if(!name)return;
    if(typeof MuckoGrid==='undefined'){
      console.warn('[level] MuckoGrid not ready; deferring editor boot until load.');
      window.addEventListener('load',bootEditorLevelFromQuery,{once:true});
      return;
    }
    var raw=localStorage.getItem('mucko_level_'+name);
    if(!raw){console.warn('[level] not found in storage:',name);return;}
    var parsed=parseLevel(raw);
    if(parsed.error){
      console.warn('[level] parse failed:',parsed.error);
      return;
    }
    editorLevel=parsed;
    diff=DIFFS[1]; // medium — editor levels skip the difficulty screen
    cigarsFound=3; // give a cigar so the heist isn't penalised on test runs
    score=0;
    startPhase('heist');
  }catch(e){console.warn('[level] boot error:',e);}
}

bootEditorLevelFromQuery();

requestAnimationFrame(loop);
