/* ══════════════════════════════════════════════════════════════════════════
   PHASE: LAUNCH
   ══════════════════════════════════════════════════════════════════════════ */
var lch = null;
function initLaunch() {
  lch = {
    t:0,            // seconds since phase start
    rocketY: H-90,  // rocket bottom Y on screen
    rocketVy:0,     // px/s, negative=up
    stages:3,       // stages still attached
    countdownDone: [false,false,false,false], // 3,2,1,0
    liftoffDone: false,
    liftoffRadio: false,
    flashAlpha:0,
    debris:[],
    exhaust:[],
    done:false,
    doneTimer:0
  };
  showRadio('All stations go for launch. Go for launch!');
  phase = 'launch';
}
function updateLaunch(dt) {
  lch.t += dt;
  lch.flashAlpha = Math.max(0, lch.flashAlpha - 3*dt);

  // Countdown beeps at t=0,1,2
  var cN = 3 - Math.floor(lch.t);
  if (cN===3 && !lch.countdownDone[0]) { lch.countdownDone[0]=true; beep(523,0.25,0.4); }
  if (cN===2 && !lch.countdownDone[1]) { lch.countdownDone[1]=true; beep(587,0.25,0.4); }
  if (cN===1 && !lch.countdownDone[2]) { lch.countdownDone[2]=true; beep(659,0.25,0.4); }
  if (lch.t>=3.2 && !lch.countdownDone[3]) {
    lch.countdownDone[3]=true;
    boom(1.0,0.4); // ignition roar
    beep(100,1.5,0.2,'square');
    showRadio('Ignition sequence start!');
  }

  // Liftoff at t=3.5
  if (lch.t >= 3.5) {
    lch.liftoffDone = true;
    if (!lch.liftoffRadio) { lch.liftoffRadio=true; showRadio('Tower clear \u2014 you are go! Go! Go!'); }
    var bt = lch.t - 3.5;
    lch.rocketVy = -(18 + bt*bt*6);
    if (lch.rocketVy < -380) lch.rocketVy = -380;
    lch.rocketY += lch.rocketVy * dt;

    // Exhaust particles from engine base
    if (Math.random() < 0.5) {
      for (var i=0;i<3;i++) {
        lch.exhaust.push({
          x:W/2+(Math.random()-0.5)*16,
          y:lch.rocketY+10,
          vx:(Math.random()-0.5)*40, vy:50+Math.random()*80,
          r:Math.random()*10+5, life:0
        });
      }
    }
  }

  // Stage separations
  if (lch.stages===3 && lch.rocketY < H/2+60) {
    separateStage(1);
  }
  if (lch.stages===2 && lch.rocketY < H/3) {
    separateStage(2);
  }
  if (lch.stages===1 && lch.rocketY < 0) {
    separateStage(3);
  }

  // Update exhaust
  lch.exhaust = lch.exhaust.filter(function(p) {
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life+=dt;
    return p.life < 1.2;
  });
  // Update debris
  lch.debris = lch.debris.filter(function(d) {
    d.x+=d.vx*dt; d.y+=d.vy*dt; d.vy+=60*dt;
    d.rot+=d.rotV*dt; d.alpha-=0.5*dt;
    return d.alpha>0 && d.y<H+100;
  });

  // Done condition
  if (lch.rocketY < -250 || lch.t > 28) {
    lch.doneTimer += dt;
    if (lch.doneTimer > 1.5 || eat('Space') || eat('Enter')) {
      initTravel('moonland');
    }
  }
  if (eat('Space') && lch.liftoffDone) { initTravel('moonland'); }
}
function separateStage(n) {
  lch.stages--;
  lch.flashAlpha = 0.7;
  boom(0.35, 0.2);
  beep(200,0.3,0.15,'sawtooth');
  var debrisH = n===1?56 : n===2?46 : 35;
  lch.debris.push({
    x:W/2, y:lch.rocketY+debrisH,
    vx:(Math.random()-0.5)*25,
    vy:Math.abs(lch.rocketVy)*0.15+15,
    n:n, rot:0, rotV:(Math.random()-0.5)*4, alpha:1
  });
  if (n===1) showRadio('S-IC separation confirmed. Stage 2 ignition!');
  else if (n===2) showRadio('S-II sep confirmed. Stage 3 burning. Beautiful!');
  else showRadio('TLI burn complete. Godspeed, crew \u2014 you\'re on your way!');
}
function drawLaunch() {
  // Sky colour based on altitude
  var progress = Math.max(0, Math.min(1, 1 - lch.rocketY/H));
  var r1=Math.round(5+progress*0),   g1=Math.round(5+progress*5),   b1=Math.round(15+progress*10);
  var r2=Math.round(10+progress*0),  g2=Math.round(10+progress*5),  b2=Math.round(40+progress*20);
  vgrad(0,0,W,H,[
    [0,'rgb('+r1+','+g1+','+b1+')'],
    [1,'rgb('+r2+','+g2+','+b2+')']
  ]);
  drawStars(Math.min(1, progress*2.5));

  // Ground / launch pad (only visible before liftoff + early ascent)
  var groundY = H - 30 - lch.rocketY + (H-90);
  // groundY when rocketY=H-90: H-30-(H-90)+(H-90) = H-30. Correct at start.
  if (groundY < H + 50) {
    vgrad(0,groundY,W,H-groundY,[[0,'#8a8a7a'],[1,'#555548']]);
    drect(W/2-50, groundY-8, 100, 8, '#555');
    drect(W/2-80, groundY-3, 160, 5, '#444');
    // Support towers
    drect(W/2-45, groundY-80, 6, 80, '#444');
    drect(W/2+39, groundY-80, 6, 80, '#444');
  }

  // Exhaust cloud (on ground, rises)
  for (var i=0;i<lch.exhaust.length;i++) {
    var p=lch.exhaust[i];
    var a=0.5*(1-p.life/1.2);
    ctx.save(); ctx.globalAlpha=a;
    circ(p.x,p.y,p.r,'rgba(200,200,180,0.8)');
    ctx.restore();
  }

  // Debris (falling stages)
  for (var di=0;di<lch.debris.length;di++) {
    var d=lch.debris[di];
    ctx.save(); ctx.globalAlpha=d.alpha;
    ctx.translate(d.x,d.y); ctx.rotate(d.rot);
    var dw=d.n===1?14:d.n===2?12:10, dh=d.n===1?30:d.n===2?24:18;
    rnd(-dw/2,-dh/2,dw,dh,2,'#e0e0d8','#888',1);
    drect(-dw/2,dh*0.1,dw,dh*0.2,'#222');
    ctx.restore();
  }

  // Rocket
  var flameSz = lch.liftoffDone ? 40+Math.random()*20 : 0;
  var rBottom = lch.rocketY;
  drawSaturnV(W/2, rBottom, lch.stages, flameSz);

  // Countdown / status text
  var cN = 3 - Math.floor(lch.t);
  ctx.save();
  if (cN >= 1 && cN <= 3 && lch.t < 3) {
    ctx.font='bold 100px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.shadowColor='rgba(255,200,100,0.8)'; ctx.shadowBlur=30;
    ctx.fillText(String(cN), W/2, H/2);
  } else if (lch.t >= 3 && lch.t < 3.5) {
    ctx.font='bold 40px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,220,100,0.9)';
    ctx.shadowColor='rgba(255,150,0,0.8)'; ctx.shadowBlur=20;
    ctx.fillText('IGNITION', W/2, H/2);
  } else if (lch.t >= 3.5 && lch.t < 5.5) {
    ctx.font='bold 44px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,200,0.9)';
    ctx.shadowColor='rgba(255,200,100,0.8)'; ctx.shadowBlur=24;
    ctx.fillText('LIFTOFF!', W/2, H/2+80);
  }
  // Stage separation labels
  if (lch.flashAlpha > 0.3) {
    ctx.font='bold 22px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,220,100,'+lch.flashAlpha+')';
    var sepLabel = lch.stages===2?'STAGE 1 SEP':lch.stages===1?'STAGE 2 SEP':'TLI BURN';
    ctx.fillText(sepLabel, W/2, 80);
  }
  ctx.restore();

  // Flash
  if (lch.flashAlpha > 0) {
    ctx.save(); ctx.globalAlpha=lch.flashAlpha*0.5;
    drect(0,0,W,H,'#fff');
    ctx.restore();
  }

  // Skip hint (available as soon as rocket lifts off)
  if (lch.liftoffDone) {
    rnd(W-120,H-42,112,34,6,'rgba(0,0,0,0.5)','rgba(100,150,200,0.4)',1);
    txt('SPACE=skip',W-64,H-20,'rgba(150,180,220,0.7)',11,'center','monospace');
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: MOON LANDING (mini-game)
   ══════════════════════════════════════════════════════════════════════════ */
var ml = null;
var GROUND_Y = 390;   // moon surface Y
var PAD_X_DEFAULT = 380;

function initMoonLand() {
  var padX = 280 + Math.floor(Math.random()*240);
  var fuelBonus = Math.min(100, minerals * 3); // minerals mined → extra LEM fuel
  ml = {
    t: 0,
    x: 200+Math.random()*400,
    y: 70,
    vx: (Math.random()-0.5)*30,
    vy: 12,           // px/s downward at start
    fuel: 150 + fuelBonus,
    padX: padX,
    landed: false,
    crashed: false,
    crashReason: '',
    landingSpeed: 0,
    onPad: false,
    resultTimer: 0,
    done: false,
    thrustOn: false,
    warnBeepT: 0,   // cooldown for speed-warning beep
    lowFuelBeepT: 0,
    // Moon walk animation state
    walkPhase: null,   // null|'walkout'|'plant'|'pose'|'walkin'
    walkT: 0,
    astroX: 0,        // astronaut X position
    flagPlanted: false,
    // Difficulty-scaled values (cached at init time)
    // Apollo landing bonus: systems check widens the safe speed window
    dGravity: getDiff().gravity,
    dMaxSafe: getDiff().maxSafe * (ds && ds.landingBonus ? 1.3 : 1),
    dFuelRate: getDiff().fuelRate
  };
  showRadio('Eagle, you are go for powered descent. Good luck!');
  phase = 'moonland';
}

var ML_GRAVITY  = 16;   // px/s² downward
var ML_THRUST   = 55;   // px/s² upward (net -39 px/s²)
var ML_RCS      = 28;   // px/s² lateral
var ML_MAX_SAFE = 65;   // px/s max safe vy
var ML_FUEL_RATE = 3.5; // fuel per second when thrusting

function updateMoonLand(dt) {
  ml.t += dt;
  if (ml.done) { ml.resultTimer+=dt; if(ml.resultTimer>3) initMoonAsc(); return; }
  if (ml.crashed) { ml.resultTimer+=dt; if(ml.resultTimer>2.5) initMoonAsc(); return; }
  if (ml.landed) {
    ml.resultTimer+=dt;
    // Initiate moon walk: after result shows, wait for player tap (or auto after 3s)
    if (ml.resultTimer > 1.0 && !ml.walkPhase) {
      var autoWalk = ml.resultTimer > 4.0; // auto-trigger after 3s of showing button
      if (autoWalk || mclk || eat('Space') || eat('Enter')) {
        if (mclk) mclk=false;
        ml.walkPhase='walkout'; ml.walkT=0;
        ml.astroX = ml.x + 16;
        ml.flagPlanted = false;
        showRadio('One small step! Planting the flag on the Moon!');
      }
    }
    if (ml.walkPhase) {
      ml.walkT+=dt;
      var flagX = ml.x + 50; // flag planting spot
      if (ml.walkPhase==='walkout') {
        ml.astroX = ml.x+16 + (flagX-ml.x-16)*Math.min(1,ml.walkT/1.2);
        if (ml.walkT>=1.2) { ml.walkPhase='plant'; ml.walkT=0; }
      } else if (ml.walkPhase==='plant') {
        if (!ml.flagPlanted && ml.walkT>0.5) {
          ml.flagPlanted=true;
          beep(784,0.06,0.2); beep(1047,0.2,0.25);
          showRadio(ml.onPad?'Tranquility Base. The Eagle has landed! Historic moment!':'Good touchdown. Exploring the surface!');
        }
        if (ml.walkT>=1.6) { ml.walkPhase='pose'; ml.walkT=0; }
      } else if (ml.walkPhase==='pose') {
        if (ml.walkT>=0.8) { ml.walkPhase='walkin'; ml.walkT=0; }
      } else if (ml.walkPhase==='walkin') {
        var flagX2=ml.x+50;
        ml.astroX = flagX2 - (flagX2-ml.x-16)*Math.min(1,ml.walkT/1.0);
        if (ml.walkT>=1.2) { initMoonAsc(); return; }
      }
    }
    return;
  }

  var thrustOn  = held('ArrowUp')||held('Space')||held('KeyW');
  var rcsLeft   = held('ArrowLeft')||held('KeyA');
  var rcsRight  = held('ArrowRight')||held('KeyD');
  ml.thrustOn   = thrustOn;

  // Apply physics (gravity and fuel rate from difficulty)
  ml.vy += ml.dGravity * dt;
  if (thrustOn && ml.fuel > 0) {
    ml.vy -= ML_THRUST * dt;
    ml.fuel = Math.max(0, ml.fuel - ml.dFuelRate*dt);
  }
  if (rcsLeft && ml.fuel > 0) {
    ml.vx -= ML_RCS * dt;
    ml.fuel = Math.max(0, ml.fuel - ml.dFuelRate*0.4*dt);
  }
  if (rcsRight && ml.fuel > 0) {
    ml.vx += ML_RCS * dt;
    ml.fuel = Math.max(0, ml.fuel - ml.dFuelRate*0.4*dt);
  }

  // Clamp vx
  if (ml.vx > 120) ml.vx=120; if (ml.vx < -120) ml.vx=-120;

  // Warning beeps
  ml.warnBeepT = Math.max(0, ml.warnBeepT - dt);
  ml.lowFuelBeepT = Math.max(0, ml.lowFuelBeepT - dt);
  var alt = Math.max(0, GROUND_Y - ml.y - 30);
  if (ml.vy > ml.dMaxSafe*0.7 && alt < 200 && ml.warnBeepT<=0) {
    beep(180,0.06,0.15,'sawtooth'); ml.warnBeepT = 0.4;
  }
  if (ml.fuel < ml.dFuelRate*15 && ml.fuel > 0 && ml.lowFuelBeepT<=0) {
    beep(440,0.05,0.12,'square'); ml.lowFuelBeepT = 1.0;
  }

  ml.x += ml.vx * dt;
  ml.y += ml.vy * dt;

  // Wrap x
  if (ml.x < 0) ml.x=W; if (ml.x > W) ml.x=0;

  // Landing check (LEM legs are ~30px below center)
  var legsY = ml.y + 30;
  if (legsY >= GROUND_Y) {
    ml.y = GROUND_Y - 30;
    ml.vy = Math.max(0, ml.vy);
    ml.landingSpeed = ml.vy;
    ml.onPad = Math.abs(ml.x - ml.padX) < 32;
    if (ml.vy > ml.dMaxSafe * 2) {
      ml.crashed = true;
      ml.crashVx = ml.vx;
      ml.crashFuel = ml.fuel;
      ml.crashReason = ml.vy > Math.abs(ml.vx)*1.5 ? 'TOO FAST \u2014 use thrust next time!' : 'HARD IMPACT \u2014 slow down earlier!';
      boom(0.5, 0.35);
      beep(150,0.4,0.2,'sawtooth');
      shake(12, 700);
      showRadio('Eagle, we lost signal. Search and rescue on standby.');
    } else {
      ml.landed = true;
      // Score
      var softness = Math.max(0, 1 - ml.vy/ml.dMaxSafe);
      var padBonus = ml.onPad ? 100 : 0;
      var fuelBonus = Math.round(ml.fuel/3);
      var timeBonus = Math.max(0, Math.round(30 - ml.t));
      runScore.landing = Math.round(softness*100) + padBonus + fuelBonus + timeBonus;
      chime();
    }
    ml.vx = 0; ml.vy = 0;
    ml.resultTimer = 0;
  }
}

function drawMoonLand() {
  drawMoonSurface(GROUND_Y, ml.padX);

  // Earth in sky
  ctx.save(); ctx.globalAlpha=0.7;
  drawEarth(700, 80, 55);
  ctx.restore();

  // LEM
  drawLEM(ml.x, ml.y, ml.thrustOn && ml.fuel > 0);

  // ── Moon walk animation ──────────────────────────────────────────────────
  if (ml.walkPhase) {
    var ax = ml.astroX, ay = GROUND_Y; // astronaut foot Y
    var walkBob = (ml.walkPhase==='walkout'||ml.walkPhase==='walkin') ? Math.sin(gT*0.3)*2 : 0;
    // Astronaut (cute simple figure, ~12px tall)
    ctx.save(); ctx.translate(ax, ay-12+walkBob);
    // Suit body
    rnd(-5,-6,10,9,3,'#e0e0d8','#aaa',1);
    // Helmet (round)
    circ(0,-10,5,'#d8d8d0');
    ctx.fillStyle='rgba(50,80,150,0.7)'; ctx.beginPath();
    ctx.arc(0,-10,4,Math.PI*1.15,Math.PI*1.85); ctx.closePath(); ctx.fill();
    // Highlight on visor
    ctx.save(); ctx.globalAlpha=0.5;
    circ(-1,-11,1.5,'rgba(200,230,255,0.8)');
    ctx.restore();
    // Backpack
    rnd(4,-5,4,6,1,'#aaa','#888',1);
    // Legs
    ln(-3,3,-4,7,'#bbb',2); ln(3,3,4,7,'#bbb',2);
    // Arms (waving on arrive)
    var armAngle = ml.walkPhase==='plant' ? -0.8 : 0.2;
    ctx.save(); ctx.translate(-5,-3); ctx.rotate(-armAngle);
    ln(0,0,-4,4,'#bbb',1.5); ctx.restore();
    ctx.save(); ctx.translate(5,-3); ctx.rotate(armAngle);
    ln(0,0,4,4,'#bbb',1.5); ctx.restore();
    ctx.restore();

    // Flag (appears after planted)
    if (ml.flagPlanted) {
      var flagX = ml.x+50, flagY = GROUND_Y;
      var plantT = ml.walkPhase==='plant'?(ml.walkT/1.6):1;
      plantT = Math.min(1, plantT);
      ctx.save(); ctx.globalAlpha=plantT;
      // Pole
      ln(flagX, flagY, flagX, flagY-28, '#ddd', 2);
      // Flag fabric (waves gently)
      var wave = Math.sin(gT*0.12)*3;
      ctx.fillStyle='#cc2222';
      ctx.beginPath();
      ctx.moveTo(flagX, flagY-28);
      ctx.lineTo(flagX+16+wave, flagY-24+wave*0.3);
      ctx.lineTo(flagX+16+wave*0.5, flagY-18);
      ctx.lineTo(flagX, flagY-20);
      ctx.closePath(); ctx.fill();
      // Stars (simplified: 3 dots)
      ctx.fillStyle='#ffffff'; ctx.globalAlpha=plantT*0.9;
      [[-5,-25],[0,-23],[5,-22]].forEach(function(p){
        ctx.beginPath(); ctx.arc(flagX+p[0],flagY+p[1],1.2,0,TAU); ctx.fill();
      });
      ctx.restore();
    }
  }

  // Crash explosion
  if (ml.crashed) {
    ctx.save(); ctx.globalAlpha=Math.max(0,1-ml.resultTimer*2);
    var eg=ctx.createRadialGradient(ml.x,ml.y,0,ml.x,ml.y,50+ml.resultTimer*80);
    eg.addColorStop(0,'rgba(255,255,200,0.9)');
    eg.addColorStop(0.3,'rgba(255,160,0,0.7)');
    eg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=eg; ctx.beginPath();
    ctx.arc(ml.x,ml.y,50+ml.resultTimer*80,0,TAU); ctx.fill();
    ctx.restore();
  }

  // ── HUD ──
  // Altitude bar (left side)
  var alt = Math.max(0, GROUND_Y - ml.y - 30);
  var maxAlt = GROUND_Y - 70 - 30;
  var altFrac = alt / maxAlt;
  rnd(12,20,20,200,4,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  rnd(12,20+200*(1-altFrac),20,200*altFrac,4,'#44aaff',null,0);
  txt('ALT',22,235,'#99bbdd',10,'center','monospace');

  // Speed indicator
  var vColor = ml.vy > ml.dMaxSafe ? '#ff4444' : ml.vy > ml.dMaxSafe*0.6 ? '#ffaa44' : '#44ff88';
  rnd(8,260,62,20,4,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  txt('V: '+Math.round(ml.vy),12,275,vColor,11,'left','monospace');

  // Fuel bar (flashes red when low)
  var fuelFrac = ml.fuel / (getDiff().fuelBase + Math.min(100,minerals*3));
  var fColor = fuelFrac > 0.3 ? '#44cc44' : '#ff4444';
  var fuelAlpha = (fuelFrac < 0.15) ? (0.5+Math.sin(gT*0.3)*0.5) : 1;
  rnd(8,290,62,14,3,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  ctx.save(); ctx.globalAlpha=fuelAlpha;
  rnd(8,290,Math.round(62*Math.max(0,fuelFrac)),14,3,fColor,null,0);
  ctx.restore();
  txt('FUEL',39,302,fuelFrac<0.15?'#ff4444':'#99cc99',9,'center','monospace');

  // TOO FAST warning
  var alt2 = Math.max(0, GROUND_Y - ml.y - 30);
  if (!ml.landed && !ml.crashed && ml.vy > ml.dMaxSafe*0.75 && alt2 < 220) {
    var warnA = 0.6+Math.sin(gT*0.25)*0.4;
    ctx.save(); ctx.globalAlpha=warnA;
    rnd(W/2-90,ml.y-54,180,30,6,'rgba(180,0,0,0.7)',null,0);
    txt('TOO FAST \u25BC',W/2,ml.y-34,'#ff8888',14,'center','bold monospace');
    ctx.restore();
  }
  // LOW FUEL warning
  if (!ml.landed && !ml.crashed && ml.fuel>0 && fuelFrac<0.15) {
    ctx.save(); ctx.globalAlpha=0.5+Math.sin(gT*0.28)*0.5;
    txt('LOW FUEL!',39,315,'#ff4444',8,'center','bold monospace');
    ctx.restore();
  }

  // Pad arrow indicator
  var dx = ml.padX - ml.x;
  if (!ml.landed && !ml.crashed && Math.abs(dx) > 40) {
    var arrowX = dx > 0 ? ml.x+20 : ml.x-20;
    txt(dx>0?'\u25BA':'\u25C4', arrowX, ml.y-40, '#ffee44', 18, 'center');
  }

  // Controls hint
  if (ml.t < 4) {
    rnd(W/2-130,H-46,260,36,6,'rgba(0,0,0,0.6)',null,0);
    txt('\u2191/SPACE=thrust  \u2190\u2192=steer',W/2,H-25,'#99aacc',12,'center','monospace');
  }

  // Result overlay — fades out as moonwalk starts
  if (ml.landed || ml.crashed) {
    var fa = Math.min(1, ml.resultTimer*2);
    if (ml.walkPhase) fa = Math.max(0, 1 - ml.walkT*2); // fade during moonwalk
    if (fa > 0.01) {
      ctx.save(); ctx.globalAlpha=fa;
      rnd(W/2-160,H/2-55,320,160,14,'rgba(0,10,30,0.9)','rgba(100,200,255,0.5)',2);
      if (ml.crashed) {
        txt('CRASH!',W/2,H/2-22,'#ff4444',32,'center','bold Georgia');
        txt(ml.crashReason||'No landing score',W/2,H/2+10,'#cc8888',13,'center','Georgia');
        txt('Impact: '+Math.round(ml.landingSpeed)+' px/s  \u2014  Safe max: '+Math.round(ml.dMaxSafe)+' px/s',W/2,H/2+34,'#996666',11,'center','monospace');
        txt('Horizontal drift: '+Math.round(Math.abs(ml.crashVx||0))+' px/s',W/2,H/2+51,'#996666',11,'center','monospace');
        txt('Fuel remaining: '+Math.round(ml.crashFuel||0)+'%',W/2,H/2+68,'#996666',11,'center','monospace');
      } else {
        txt(ml.onPad?'PERFECT LANDING!':'SAFE LANDING',W/2,H/2-10,
            ml.onPad?'#ffee44':'#88ffaa',ml.onPad?26:22,'center','bold Georgia');
        txt('Score: '+runScore.landing,W/2,H/2+30,'#ccddff',18,'center','Georgia');
      }
      ctx.restore();
    }
  }

  // "Plant flag" prompt — shown after successful landing, before moonwalk begins
  if (ml.landed && ml.resultTimer > 1.0 && !ml.walkPhase) {
    var pfa = Math.min(1,(ml.resultTimer-1.0)*3);
    ctx.save(); ctx.globalAlpha=pfa*(0.75+Math.sin(gT*0.2)*0.25);
    rnd(W/2-140,H/2+50,280,38,10,'rgba(0,40,0,0.85)','rgba(100,220,100,0.65)',2);
    txt('\uD83D\uDEA9 TAP TO PLANT THE FLAG!',W/2,H/2+74,'#aaffaa',14,'center','bold monospace');
    ctx.restore();
  }

  // Mobile controls hint
  drawMobileLandingControls();
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: MOON ASCENT (scripted)
   ══════════════════════════════════════════════════════════════════════════ */
var masc = null;
function initMoonAsc() {
  masc = { t:0, lemY: GROUND_Y-30, lemVy:-60, phase:'ascent', done:false };
  phase = 'moonasc';
}
function updateMoonAsc(dt) {
  masc.t += dt;
  if (masc.phase === 'ascent') {
    masc.lemY += masc.lemVy * dt;
    masc.lemVy -= 5*dt; // slight acceleration
    if (masc.lemY < -60) { masc.phase='dock'; masc.t=0; }
  } else if (masc.phase === 'dock') {
    if (masc.t > 2.5 || eat('Space') || eat('Enter')) initTravel('reentry');
  }
  if (eat('Space') && masc.t > 0.5) initTravel('reentry');
}
function drawMoonAsc() {
  drawMoonSurface(GROUND_Y, ml ? ml.padX : PAD_X_DEFAULT);
  ctx.save(); ctx.globalAlpha=0.7;
  drawEarth(700,80,55); ctx.restore();

  if (masc.phase === 'ascent') {
    // LEM ascent stage rising (just the top half)
    ctx.save(); ctx.translate(W/2, masc.lemY);
    rnd(-10,-14,20,22,5,'#d0c888','#555',2);
    circ(-4,-8,4,'#111'); circ(4,-8,4,'#111');
    circ(-4,-8,2.5,'#334466'); circ(4,-8,2.5,'#334466');
    // Ascent engine flame
    var fg=ctx.createLinearGradient(0,8,0,8+30);
    fg.addColorStop(0,'rgba(180,220,255,1)');
    fg.addColorStop(1,'rgba(50,100,255,0)');
    ctx.fillStyle=fg; ctx.beginPath();
    ctx.ellipse(0,8+14,4,14*(0.85+Math.random()*0.3),0,0,TAU); ctx.fill();
    ctx.restore();
  }

  // Status text
  ctx.save(); ctx.textAlign='center';
  if (masc.phase === 'ascent') {
    txt('ASCENT STAGE FIRING...', W/2, 60, '#ccddff', 20, 'center', 'bold Georgia');
  } else {
    var fadeIn = Math.min(1, masc.t*2);
    ctx.globalAlpha=fadeIn;
    rnd(W/2-220,H/2-70,440,120,14,'rgba(0,10,40,0.9)','rgba(100,180,255,0.5)',2);
    txt('DOCKING WITH CSM', W/2, H/2-35, '#88ccff', 24, 'center', 'bold Georgia');
    txt('Heading back to Earth...', W/2, H/2+5, '#ccddff', 16, 'center', 'Georgia');
    txt('Score so far: '+runScore.landing+' pts', W/2, H/2+35, '#ffee88', 15, 'center', 'Georgia');
    if (masc.t > 1) {
      txt('SPACE / tap to continue', W/2, H/2+60, 'rgba(150,180,220,0.7)', 12, 'center', 'monospace');
    }
  }
  ctx.restore();

  // Skip
  if (masc.t > 0.5) {
    rnd(W-120,H-42,112,34,6,'rgba(0,0,0,0.5)','rgba(100,150,200,0.4)',1);
    txt('SPACE=skip',W-64,H-20,'rgba(150,180,220,0.7)',11,'center','monospace');
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: RE-ENTRY  (dodge the rockets!)
   ══════════════════════════════════════════════════════════════════════════ */
var re = null;
var RE_DURATION  = 22;   // seconds
var RE_CAP_SPEED = 220;  // px/s player lateral
var RE_START_FREQ = 0.6; // rockets per second initially

function initReentry() {
  var shieldBonus = Math.min(2, Math.floor(minerals / 5)); // 5 minerals → 1 extra shield
  var d = getDiff();
  re = {
    t: 0,
    cx: W/2,        // capsule center X
    vy: 0,          // capsule descent (visual only)
    shields: 3 + shieldBonus,
    maxShields: 3 + shieldBonus,
    rocketsHit: 0,
    rockets: [],
    hitTimer: 0,    // flash on hit
    spawnTimer: 0,
    scrollY: 0,
    done: false,
    doneTimer: 0,
    score: 0,
    // Difficulty-scaled
    startFreq: d.reFreq,
    duration:  d.reDur,
    spdMul:    d.reSpdMul
  };
  showRadio('Columbia, you\'re go for re-entry. Watch those rockets!');
  phase = 'reentry';
}
function updateReentry(dt) {
  re.t += dt;
  re.scrollY += 120 * dt; // atmosphere scroll speed
  re.hitTimer = Math.max(0, re.hitTimer - dt);
  if (re.done) { re.doneTimer+=dt; if(re.doneTimer>2) initChute(); return; }

  // Player movement
  var spd = RE_CAP_SPEED;
  if (held('ArrowLeft')||held('KeyA'))  re.cx = Math.max(40,  re.cx - spd*dt);
  if (held('ArrowRight')||held('KeyD')) re.cx = Math.min(W-40, re.cx + spd*dt);

  // Spawn enemy rockets (difficulty scales starting frequency and speed)
  var freq = re.startFreq + re.t*0.04;
  re.spawnTimer += dt;
  if (re.spawnTimer >= 1/freq) {
    re.spawnTimer = 0;
    var roll = Math.random();
    var rType = roll<0.6?'std':roll<0.8?'big':'fast';
    var baseSpd = (160+re.t*8+Math.random()*80) * re.spdMul;
    re.rockets.push({
      x: 40+Math.random()*(W-80),
      y: H+20,
      vy: rType==='big' ? -baseSpd*0.62 : rType==='fast' ? -baseSpd*1.65 : -baseSpd,
      w: rType==='big'?22:rType==='fast'?7:14,
      h: rType==='big'?66:rType==='fast'?36:50,
      type: rType,
      hit: false
    });
  }

  // Update rockets
  re.rockets = re.rockets.filter(function(r) {
    r.y += r.vy * dt;
    return r.y > -80;
  });

  // Collision (capsule center at W/2 (x), H-110 (y) roughly)
  var capX = re.cx, capY = H-110;
  for (var i=0;i<re.rockets.length;i++) {
    var r=re.rockets[i];
    if (!r.hit &&
        Math.abs(capX-r.x) < (r.w/2+10) &&
        capY+14 >= r.y && capY-20 <= r.y+r.h) {
      r.hit = true;
      re.shields--;
      re.rocketsHit++;
      re.hitTimer = 0.5;
      boom(0.3, 0.25);
      beep(300,0.25,0.2,'sawtooth');
      if (re.shields <= 0) {
        re.shields = 0;
        re.done = true;
        re.score = Math.round(re.t * 12);
        runScore.reentry = re.score;
      }
    }
  }

  // Time's up
  if (re.t >= re.duration) {
    re.done = true;
    re.score = Math.round(re.duration*12) + re.shields*60;
    runScore.reentry = re.score;
    chime();
  }
}
function drawReentry() {
  // Atmospheric background
  var atmoProgress = Math.min(1, re.t/RE_DURATION);
  vgrad(0,0,W,H,[
    [0,'#050520'],
    [0.3,'rgba('+Math.round(30+atmoProgress*100)+','+Math.round(20+atmoProgress*30)+',10,1)'],
    [0.7,'rgba('+Math.round(80+atmoProgress*120)+','+Math.round(40+atmoProgress*40)+',5,1)'],
    [1,'rgba(200,100,10,1)']
  ]);
  drawStars(Math.max(0, 1-atmoProgress*2));

  // Scrolling atmosphere streaks
  ctx.save(); ctx.globalAlpha=0.18;
  for (var si=0;si<12;si++) {
    var sx = ((si*137+re.scrollY*0.3)%W);
    var sy = (re.scrollY*0.7+si*60)%H;
    ln(sx,sy,sx+20,sy+60,'rgba(255,200,100,0.8)',1.5);
  }
  ctx.restore();

  // Earth below (rising into view)
  if (atmoProgress > 0.3) {
    ctx.save(); ctx.globalAlpha=(atmoProgress-0.3)*0.5;
    drawEarth(W/2, H+120-atmoProgress*180, 180);
    ctx.restore();
  }

  // Enemy rockets — three types with distinct visuals
  for (var i=0;i<re.rockets.length;i++) {
    var r=re.rockets[i];
    if (r.hit) continue;
    ctx.save(); ctx.translate(r.x, r.y);
    var hw=r.w/2;
    if (r.type==='big') {
      // Big & slow — chunky, dark red, visible from far away
      poly([[0,-14],[-hw,0],[hw,0]],'#881100','#ff2200',1.5);
      rnd(-hw,0,r.w,r.h,3,'#aa1100','#ff3300',2);
      drect(-hw+2,r.h*0.2,r.w-4,r.h*0.15,'#cc4400');
      drect(-hw+2,r.h*0.5,r.w-4,r.h*0.12,'#cc4400');
      var ff2=ctx.createLinearGradient(0,r.h,0,r.h+32);
      ff2.addColorStop(0,'rgba(255,180,50,0.9)'); ff2.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=ff2; ctx.beginPath();
      ctx.ellipse(0,r.h+14,9,22,0,0,TAU); ctx.fill();
    } else if (r.type==='fast') {
      // Fast & small — bright yellow, narrow, harder to see coming
      poly([[0,-7],[-hw,0],[hw,0]],'#ffcc00','#ffff44',1);
      rnd(-hw,0,r.w,r.h,1,'#ddaa00','#ffee44',1.5);
      var ff3=ctx.createLinearGradient(0,r.h,0,r.h+18);
      ff3.addColorStop(0,'rgba(255,255,100,0.9)'); ff3.addColorStop(1,'rgba(255,200,0,0)');
      ctx.fillStyle=ff3; ctx.beginPath();
      ctx.ellipse(0,r.h+8,3.5,12,0,0,TAU); ctx.fill();
      // Speed streak
      ctx.save(); ctx.globalAlpha=0.35;
      ln(0,0,0,r.h*2,'rgba(255,220,0,0.6)',1.5);
      ctx.restore();
    } else {
      // Standard — original look
      poly([[0,-10],[-hw,0],[hw,0]],'#cc2222','#ff4444',1);
      rnd(-hw,0,r.w,r.h,2,'#cc3333','#ff5555',1.5);
      var ff4=ctx.createLinearGradient(0,r.h,0,r.h+20);
      ff4.addColorStop(0,'rgba(255,200,50,0.9)'); ff4.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=ff4; ctx.beginPath();
      ctx.ellipse(0,r.h+9,5,14,0,0,TAU); ctx.fill();
    }
    ctx.restore();
  }

  // Player capsule
  ctx.save();
  if (re.hitTimer > 0) {
    var flashA = (Math.sin(re.hitTimer*30)*0.5+0.5)*0.8;
    ctx.globalAlpha = 0.2+flashA*0.8;
  }
  drawCapsule(re.cx, H-110, Math.min(1, re.t/8)*0.7);
  ctx.restore();

  // Shield indicators
  for (var si2=0;si2<3;si2++) {
    var scolor = si2 < re.shields ? '#44aaff' : '#333344';
    rnd(W-38-si2*28, 14, 22, 22, 4, scolor, 'rgba(255,255,255,0.3)', 1);
  }
  txt('SHIELD', W-90, 46, '#7799bb', 9, 'center', 'monospace');

  // Timer bar
  var timeLeft = Math.max(0, re.duration - re.t);
  var tf = timeLeft/re.duration;
  rnd(W/2-120,12,240,14,4,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  rnd(W/2-120,12,Math.round(240*tf),14,4,tf>0.3?'#44aaff':'#ff4444',null,0);
  txt(Math.ceil(timeLeft)+'s',W/2,24,'#ccddff',10,'center','monospace');

  // Hit flash
  if (re.hitTimer > 0) {
    ctx.save(); ctx.globalAlpha=re.hitTimer*0.4;
    drect(0,0,W,H,'#ff0000');
    ctx.restore();
  }

  // Mobile controls
  drawMobileReentryControls();

  // Done overlay
  if (re.done) {
    var fa=Math.min(1,re.doneTimer*2);
    ctx.save(); ctx.globalAlpha=fa;
    rnd(W/2-180,H/2-65,360,140,14,'rgba(0,10,30,0.9)','rgba(100,200,255,0.5)',2);
    txt(re.shields>0?'ATMOSPHERE CLEARED!':'SHIELDS DOWN!',W/2,H/2-28,
        re.shields>0?'#88ffaa':'#ff6644',22,'center','bold Georgia');
    txt('Reentry score: '+re.score,W/2,H/2+5,'#ccddff',18,'center','Georgia');
    if (re.shields <= 0) {
      txt('Took '+re.rocketsHit+' of '+re.maxShields+' hits — shields exhausted',W/2,H/2+32,'#cc8866',12,'center','Georgia');
    } else {
      txt('Shields remaining: '+re.shields+' / '+re.maxShields,W/2,H/2+32,'#88ccaa',12,'center','Georgia');
    }
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: PARACHUTE TIMING
   ══════════════════════════════════════════════════════════════════════════ */
var ch = null;
var CHUTE_ALT_START = 1000;
var CHUTE_PERFECT_LOW  = 430;
var CHUTE_PERFECT_HIGH = 570;
var CHUTE_GOOD_LOW     = 320;
var CHUTE_GOOD_HIGH    = 680;

function initChute() {
  var d = getDiff();
  ch = {
    t: 0,
    alt: CHUTE_ALT_START,  // altitude 1000→0
    vy: 90,                // descent rate px/s of altitude
    deployed: false,
    deployAlt: 0,
    chuteOpen: 0,          // animation 0→1
    capsuleY: 40,          // visual capsule Y
    capsuleVy: 80,         // visual descent speed
    splashTimer: 0,
    done: false,
    promptShown: false,
    // Difficulty-scaled zone bounds
    perfLo: d.perfLo, perfHi: d.perfHi,
    goodLo: d.goodLo, goodHi: d.goodHi
  };
  showRadio('Columbia, we see you on radar. Deploy chutes when ready!');
  phase = 'chute';
}
function updateChute(dt) {
  ch.t += dt;
  if (ch.done) { ch.splashTimer+=dt; if(ch.splashTimer>2.5) initVictory(); return; }

  if (!ch.deployed) {
    ch.alt -= ch.vy * dt;
    ch.vy  += 8 * dt; // accelerating
    ch.capsuleY += ch.capsuleVy * dt;
    ch.capsuleVy += 6*dt;
    // clamp capsule visual to H-200
    if (ch.capsuleY > H-200) ch.capsuleY = H-200;

    if (ch.alt <= 0) {
      // Missed! Hard splash
      ch.alt = 0; ch.deployed = true; ch.deployAlt = 0;
      ch.chuteOpen = 1; ch.done = true; ch.splashTimer = 0;
      boom(0.6, 0.4);
      runScore.chute = 0;
    }

    if (eat('Space')||eat('KeyD')) {
      ch.deployed = true;
      ch.deployAlt = ch.alt;
      // Score
      var a = ch.deployAlt;
      if (a >= ch.perfLo && a <= ch.perfHi) {
        runScore.chute = 200; chime();
      } else if (a >= ch.goodLo && a <= ch.goodHi) {
        runScore.chute = 100; beep(660,0.3,0.3); beep(784,0.4,0.3);
      } else {
        runScore.chute = 25; beep(440,0.2,0.2);
      }
    }
  } else {
    // Deployed: slow descent
    ch.alt = Math.max(0, ch.alt - 40*dt);
    ch.chuteOpen = Math.min(1, ch.chuteOpen + dt*3);
    ch.capsuleVy = Math.max(20, ch.capsuleVy - 80*dt); // slow down
    ch.capsuleY += ch.capsuleVy * dt;
    if (ch.capsuleY > H-80 || ch.alt <= 0) {
      ch.capsuleY = H-80;
      ch.done = true; ch.splashTimer = 0;
      if (!ch.done) chime(); // splash
    }
  }
}
function drawChute() {
  // Sky gradient (changes as we descend)
  var altFrac = ch.alt / CHUTE_ALT_START;
  var skyR = Math.round(5 + (1-altFrac)*30);
  var skyG = Math.round(10 + (1-altFrac)*80);
  var skyB = Math.round(40 + (1-altFrac)*140);
  vgrad(0,0,W,H,[
    [0,'rgb('+skyR+','+skyG+','+skyB+')'],
    [0.5,'rgba(20,80,160,1)'],
    [0.8,'rgba(20,100,160,1)'],
    [1,'rgba(10,60,120,1)']
  ]);
  // Clouds
  ctx.save(); ctx.globalAlpha=0.35;
  for (var ci=0;ci<5;ci++) {
    var cx2=(ci*180+ch.t*15)%W, cy2=100+ci*40;
    ell(cx2,cy2,60,18,'#ddeeff');
    ell(cx2+30,cy2-8,40,14,'#ddeeff');
    ell(cx2-30,cy2-6,45,15,'#ddeeff');
  }
  ctx.restore();
  // Ocean at bottom
  vgrad(0,H-80,W,80,[[0,'#1a5888'],[0.5,'#1a6899'],[1,'#0d4466']]);
  // Wave hints
  ctx.save(); ctx.globalAlpha=0.25;
  for (var wi=0;wi<6;wi++) {
    var wx=(wi*140+ch.t*20)%W;
    ln(wx,H-40,wx+80,H-40,'#6ab4e8',2);
  }
  ctx.restore();

  // Capsule + parachute
  var capX = W/2, capY = ch.capsuleY;
  if (ch.deployed && ch.chuteOpen > 0) {
    // Chute lines
    ctx.save(); ctx.globalAlpha=ch.chuteOpen;
    var cOpen = ch.chuteOpen;
    var cw = 60*cOpen, ch2 = 45*cOpen;
    ln(capX,capY-14,capX-cw,capY-14-ch2,'#ccc',1);
    ln(capX,capY-14,capX,capY-14-ch2-5,'#ccc',1);
    ln(capX,capY-14,capX+cw,capY-14-ch2,'#ccc',1);
    // Chute canopy
    var cg=ctx.createRadialGradient(capX,capY-14-ch2,0,capX,capY-14-ch2,cw*1.1);
    cg.addColorStop(0,'rgba(255,140,0,0.9)');
    cg.addColorStop(0.5,'rgba(255,255,255,0.85)');
    cg.addColorStop(1,'rgba(255,140,0,0.8)');
    ctx.fillStyle=cg;
    ctx.beginPath();
    ctx.ellipse(capX,capY-14-ch2*0.6,cw*1.05,ch2*0.7,0,0,Math.PI,true);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#cc8800'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }
  drawCapsule(capX, capY, 0);

  // ── ALTIMETER (right side) ──
  var altH = 300, altX = W-45, altY = H/2-altH/2;
  rnd(altX, altY, 30, altH, 6, 'rgba(0,0,0,0.6)', 'rgba(200,220,255,0.3)', 1.5);

  // Sweet zones (bounds from difficulty)
  var pLow  = altY + altH*(1 - ch.perfHi/CHUTE_ALT_START);
  var pHigh = altY + altH*(1 - ch.perfLo/CHUTE_ALT_START);
  var gLow  = altY + altH*(1 - ch.goodHi/CHUTE_ALT_START);
  var gHigh = altY + altH*(1 - ch.goodLo/CHUTE_ALT_START);

  rnd(altX, gLow, 30, gHigh-gLow, 0, 'rgba(100,200,100,0.35)', null, 0);
  rnd(altX, pLow, 30, pHigh-pLow, 0, 'rgba(80,255,80,0.5)', null, 0);

  // Current altitude marker
  if (!ch.deployed || ch.alt > 0) {
    var markerY = altY + altH*(1 - ch.alt/CHUTE_ALT_START);
    markerY = Math.max(altY+2, Math.min(altY+altH-6, markerY));
    rnd(altX-2, markerY-3, 34, 6, 2, '#ffffff', null, 0);
  }
  txt('ALT', altX+15, altY+altH+14, '#8899bb', 10, 'center', 'monospace');

  // Zone labels
  txt('PERFECT', altX-52, (pLow+pHigh)/2+4, '#88ff88', 9, 'right', 'bold monospace');
  txt('GOOD',    altX-52, (gLow+gHigh)/2+4, '#88dd88', 9, 'right', 'monospace');

  // Center instructions / result
  if (!ch.deployed) {
    var a = ch.alt;
    var inZone = a >= ch.goodLo && a <= ch.goodHi;
    if (!ch.promptShown) {
      rnd(W/2-160, H-90, 320, 60, 10, 'rgba(0,0,20,0.75)', 'rgba(100,200,100,0.5)', 2);
      txt('PRESS SPACE / TAP TO', W/2, H-65, '#ccffcc', 15, 'center', 'bold monospace');
      txt('DEPLOY PARACHUTE', W/2, H-44, inZone?'#88ff88':'#cc8844', 18, 'center', 'bold monospace');
    }
    // Pulse deploy button hint when in zone
    if (inZone) {
      ctx.save(); ctx.globalAlpha=0.5+Math.sin(gT*0.2)*0.3;
      rnd(W/2-90,H-38,180,32,8,null,'#88ff88',2);
      ctx.restore();
    }
  } else {
    // Show zone result
    var ra = ch.deployAlt;
    var resultTxt = '', resultCol = '#ffcc44';
    if (ra >= ch.perfLo && ra <= ch.perfHi)      { resultTxt='PERFECT!'; resultCol='#88ff88'; }
    else if (ra >= ch.goodLo && ra <= ch.goodHi) { resultTxt='GOOD!';    resultCol='#aaddff'; }
    else if (ra > 0)                                        { resultTxt='TOO EARLY/LATE'; resultCol='#ffaa44'; }
    else                                                    { resultTxt='NO PARACHUTE!'; resultCol='#ff4444'; }
    var fa=Math.min(1, ch.t*2);
    ctx.save(); ctx.globalAlpha=fa;
    var chuteBoxH = (ra === 0) ? 120 : 90;
    rnd(W/2-160,H/2-50,320,chuteBoxH,14,'rgba(0,10,30,0.9)','rgba(100,200,255,0.5)',2);
    txt(resultTxt, W/2, H/2-15, resultCol, 26, 'center', 'bold Georgia');
    txt('Parachute score: '+runScore.chute, W/2, H/2+22, '#ccddff', 16, 'center', 'Georgia');
    if (ra === 0) {
      txt('Deploy between alt '+ch.goodLo+'\u2013'+ch.goodHi+' (perfect: '+ch.perfLo+'\u2013'+ch.perfHi+')',W/2,H/2+48,'#886644',11,'center','monospace');
    }
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: VICTORY
   ══════════════════════════════════════════════════════════════════════════ */
var vic = null;
function initVictory() {
  var total = runScore.landing + runScore.reentry + runScore.chute;
  var stars = total >= 600 ? 3 : total >= 350 ? 2 : 1;
  // Confetti
  var confettiCols = ['#ff4444','#ff8800','#ffee00','#44ff44','#44aaff','#cc44ff','#ff44cc'];
  var confetti = [];
  for (var ci2=0;ci2<60;ci2++) {
    confetti.push({
      x: Math.random()*W,
      y: H + Math.random()*80,
      vx: (Math.random()-0.5)*120,
      vy: -(150+Math.random()*250),
      rot: Math.random()*TAU,
      rotV: (Math.random()-0.5)*8,
      w: 6+Math.random()*8, h: 4+Math.random()*5,
      col: confettiCols[Math.floor(Math.random()*confettiCols.length)],
      life: 0, maxLife: 2.0+Math.random()*2.0
    });
  }
  vic.confetti = confetti;

  // Splash particles — burst on entry
  var splashParts = [];
  for (var si=0;si<40;si++) {
    var ang = Math.PI*(0.9+Math.random()*1.2); // upward fan
    var spd = 60+Math.random()*180;
    splashParts.push({
      x:W/2+(Math.random()-0.5)*10, y:H*0.65,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      r:2+Math.random()*4, life:0, maxLife:0.6+Math.random()*0.8
    });
  }
  vic = { t:0, total:total, wave:0, stars:stars, splash:splashParts };
  if (!scoreSaved) {
    scoreSaved = true;
    var d = new Date();
    saveHS({
      score: total,
      landing: runScore.landing,
      reentry: runScore.reentry,
      chute: runScore.chute,
      date: (d.getMonth()+1)+'/'+d.getDate()+'/'+(d.getFullYear()%100)
    });
    chime();
  }
  if (stars===3) showRadio('Incredible mission! Perfect score across the board!');
  else if (stars===2) showRadio('Great mission crew! The whole world is watching!');
  else showRadio('Welcome home, Columbia. Recovery team is en route!');
  phase = 'victory';
}
function updateVictory(dt) {
  vic.t += dt;
  vic.wave += dt;
  // Update confetti physics
  vic.confetti.forEach(function(p) {
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=160*dt; // gravity
    p.rot+=p.rotV*dt;
    p.life+=dt;
  });
  if ((eat('Space')||eat('Enter')) && vic.t > 2) { phase='title'; return; }
}
function drawVictory() {
  // Ocean + sky
  vgrad(0,0,W,H*0.65,[[0,'#1a3a6a'],[0.4,'#1a5888'],[1,'#2278aa']]);
  vgrad(0,H*0.65,W,H*0.35,[[0,'#1a6899'],[0.5,'#1a5888'],[1,'#0d3355']]);
  // Waves
  ctx.save(); ctx.globalAlpha=0.4;
  for (var wi=0;wi<8;wi++) {
    var wx=(wi*105+vic.wave*25)%W;
    ell(wx,H*0.68+Math.sin(vic.wave+wi)*4,50,6,'rgba(100,180,240,0.5)');
  }
  ctx.restore();

  // Confetti (first ~4s)
  vic.confetti.forEach(function(p) {
    var a=Math.max(0,1-p.life/p.maxLife);
    if(a<0.01||p.y>H+20) return;
    ctx.save(); ctx.globalAlpha=a;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.col;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });

  // Splashdown spray (first ~1.5s)
  if (vic.t < 1.6) {
    var dt2 = 0.016; // approximate frame dt for update
    vic.splash.forEach(function(p) {
      p.x+=p.vx*dt2; p.y+=p.vy*dt2;
      p.vy+=200*dt2; // gravity pulls drops back
      p.life+=dt2;
    });
    vic.splash.forEach(function(p) {
      var a=Math.max(0,1-p.life/p.maxLife);
      if(a<0.01) return;
      ctx.save(); ctx.globalAlpha=a*0.85;
      circ(p.x,p.y,p.r*(1-p.life/p.maxLife*0.5),'rgba(150,210,255,0.9)');
      ctx.restore();
    });
    // Central splash ring expanding outward
    var ringR = vic.t*120;
    ctx.save(); ctx.globalAlpha=Math.max(0,0.7-vic.t*0.55);
    ctx.strokeStyle='rgba(180,230,255,0.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(W/2,H*0.65,ringR,ringR*0.25,0,0,TAU); ctx.stroke();
    ctx.restore();
  }

  // Capsule floating
  var bob=Math.sin(vic.wave*1.2)*4;
  drawCapsule(W/2, H*0.55+bob, 0);

  // Parachute draped in water
  ctx.save(); ctx.globalAlpha=0.5;
  ell(W/2+40,H*0.6+bob+10,35,12,'rgba(255,140,0,0.7)');
  ctx.restore();

  // Title
  var fa=Math.min(1, vic.t*1.5);
  ctx.save(); ctx.globalAlpha=fa;
  ctx.font='bold 42px Georgia'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.shadowColor='rgba(100,200,255,0.8)'; ctx.shadowBlur=20;
  ctx.fillStyle='#ffffff';
  ctx.fillText('MISSION COMPLETE!', W/2, 80);
  ctx.shadowBlur=0;
  // Difficulty badge
  var dcLabel={'mercury':'MERCURY','gemini':'GEMINI','apollo':'APOLLO'}[difficulty];
  var dcColor={'mercury':'#44cc88','gemini':'#ffcc44','apollo':'#ff7744'}[difficulty];
  txt(dcLabel+' DIFFICULTY', W/2, 96, dcColor, 11, 'center', 'bold monospace');
  ctx.restore();

  // Star rating
  if (vic.t > 0.3) {
    var sa=Math.min(1,(vic.t-0.3)*2);
    ctx.save(); ctx.globalAlpha=sa;
    var starStr=''; var emptyStr='';
    for(var si=0;si<3;si++) starStr += (si<vic.stars?'\u2605':'\u2606');
    var starCol = vic.stars===3?'#ffd700':vic.stars===2?'#e8e820':'#cc9900';
    ctx.font='bold 32px Georgia'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.shadowColor=starCol; ctx.shadowBlur=vic.stars===3?18:8;
    ctx.fillStyle=starCol; ctx.fillText(starStr, W/2, 108);
    ctx.shadowBlur=0; ctx.restore();
  }

  // Score breakdown
  if (vic.t > 0.5) {
    var ba=Math.min(1,(vic.t-0.5)*2);
    ctx.save(); ctx.globalAlpha=ba;
    rnd(W/2-200,118,400,178,14,'rgba(0,10,40,0.85)','rgba(100,180,255,0.4)',2);
    var rows=[
      ['\uD83C\uDF11 Moon Landing',  runScore.landing,  300],
      ['\uD83D\uDD25 Re-entry',      runScore.reentry,  Math.round((re?re.duration:RE_DURATION)*12)+180],
      ['\uD83E\uDE82 Parachute',     runScore.chute,    200],
    ];
    rows.forEach(function(row,i) {
      var ry=152+i*44;
      txt(row[0],    W/2-80, ry, '#aaccee', 15, 'left',   'Georgia');
      txt(row[1]+' pts', W/2+80, ry, '#ffee88', 15, 'right', 'bold monospace');
      var bw=100, bx=W/2-50;
      rnd(bx,ry+6,bw,8,3,'rgba(50,50,80,0.6)',null,0);
      rnd(bx,ry+6,Math.round(bw*(row[1]/row[2])),8,3,'#4488cc',null,0);
    });
    ln(W/2-190,265,W/2+190,265,'rgba(100,150,200,0.4)',1);
    txt('TOTAL', W/2-80, 288, '#ccddff', 18, 'left', 'bold Georgia');
    txt(vic.total+' pts', W/2+80, 288, '#ffee44', 20, 'right', 'bold monospace');
    ctx.restore();
  }

  // Buttons
  if (vic.t > 1.8) {
    var fa2=Math.min(1,(vic.t-1.8)*2);
    ctx.save(); ctx.globalAlpha=fa2;
    var h1=mx>W/2-130&&mx<W/2+130&&my>310&&my<350;
    var h2=mx>W/2-110&&mx<W/2+110&&my>360&&my<395;
    var h3=mx>W/2-80 &&mx<W/2+80 &&my>400&&my<430;
    rnd(W/2-130,310,260,40,10,h1?'#1a3a6a':'#0d2040','#4488cc',2);
    txt('\u25B6  PLAY AGAIN',W/2,337,'#88ccff',17,'center','bold monospace');
    rnd(W/2-110,360,220,35,8,h2?'#1a2030':'#0a1020','rgba(100,150,200,0.5)',1.5);
    txt('\uD83C\uDFC6 High Scores',W/2,383,'#7799bb',14,'center','bold monospace');
    txt('\u2190 Mucko\'s Games',W/2,424,'#445',13,'center','monospace');
    ctx.restore();
    if (mclk) {
      mclk=false;
      if (h1)       { initPad(); return; }
      if (h2)       { phase='scores'; return; }
      if (my>395&&my<435) { window.location.href='/index.html'; return; }
    }
    if ((eat('Space')||eat('Enter')) && vic.t>2) { initPad(); }
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: HIGH SCORES
   ══════════════════════════════════════════════════════════════════════════ */
function drawScores() {
  vgrad(0,0,W,H,[[0,'#05050f'],[1,'#080820']]);
  drawStars(0.8);
  ctx.save(); ctx.globalAlpha=0.3;
  drawEarth(680,420,100); drawMoon(120,380,60);
  ctx.restore();

  ctx.font='bold 36px Georgia'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.shadowColor='rgba(100,180,255,0.8)'; ctx.shadowBlur=16;
  ctx.fillStyle='#ffffff'; ctx.fillText('\uD83C\uDFC6 HIGH SCORES',W/2,60);
  ctx.shadowBlur=0; txt('Rocket Trail',W/2,84,'#7799bb',15,'center','italic Georgia');

  var hs=getHS();
  if (hs.length===0) {
    txt('No missions completed yet!',W/2,H/2,'#667',18,'center','Georgia');
  } else {
    var cols=[W/2-220,W/2-90,W/2+20,W/2+110,W/2+200];
    var hdrs=['#','Total','Landing','Re-entry','Chute'];
    rnd(W/2-240,102,480,24,4,'rgba(0,20,50,0.8)','rgba(100,150,200,0.3)',1);
    hdrs.forEach(function(h,i){txt(h,cols[i],120,'#88aacc',11,'center','bold monospace');});
    var rows=hs.slice(0,8);
    rows.forEach(function(e,i) {
      var ry=130+i*38;
      rnd(W/2-240,ry,480,34,4,i%2===0?'rgba(0,20,50,0.5)':'rgba(0,15,40,0.3)','rgba(50,70,100,0.3)',1);
      var med = i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':String(i+1)+'.';
      var col=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#aabbcc';
      var vals=[med,String(e.score||0),String(e.landing||0),String(e.reentry||0),String(e.chute||0)];
      vals.forEach(function(v,j){txt(v,cols[j],ry+23,col,12,'center','monospace');});
    });
  }

  var bh=mx>W/2-100&&mx<W/2+100&&my>H-52&&my<H-18;
  rnd(W/2-100,H-52,200,34,8,bh?'#1a2030':'#0a1020','rgba(100,150,200,0.5)',1.5);
  txt('\u2190  Back',W/2,H-30,'#7799bb',16,'center','bold monospace');
  if (mclk){mclk=false;if(bh)phase='title';}
  if (eat('Escape')||eat('Backspace')) phase='title';
}

/* ══════════════════════════════════════════════════════════════════════════
   MOBILE CONTROL OVERLAYS
   ══════════════════════════════════════════════════════════════════════════ */
function drawMobileBtn(cx,cy,r,label,sub,active) {
  ctx.save();
  ctx.globalAlpha = active ? 0.75 : 0.45;
  circ(cx,cy,r,'rgba(30,60,120,0.8)');
  strokeEll(cx,cy,r,r,active?'#88aaff':'rgba(100,150,200,0.6)',2);
  ctx.globalAlpha = active ? 0.9 : 0.55;
  txt(label,cx,cy+8,'#ffffff',20,'center','bold monospace');
  if (sub) txt(sub,cx,cy+r-6,'#aabbcc',9,'center','monospace');
  ctx.restore();
}
function drawMobileLandingControls() {
  var hL=K.ArrowLeft, hR=K.ArrowRight, hU=K.ArrowUp;
  // Larger, clearly-separated buttons; thrust takes up generous center
  drawMobileBtn(52,  H-70, 52, '\u25C4', 'LEFT',   hL);
  drawMobileBtn(W-52,H-70, 52, '\u25BA', 'RIGHT',  hR);
  // Big THRUST button — center bottom
  ctx.save();
  ctx.globalAlpha = hU ? 0.82 : 0.48;
  rnd(W/2-80, H-110, 160, 90, 14,
      hU?'rgba(40,80,200,0.85)':'rgba(20,40,120,0.7)',
      hU?'#88aaff':'rgba(100,150,200,0.55)', hU?2.5:1.5);
  ctx.globalAlpha = hU ? 1.0 : 0.65;
  txt('\u25B2',  W/2, H-60, '#fff', 28, 'center', 'bold monospace');
  txt('THRUST',  W/2, H-30, hU?'#aaccff':'#7799cc', 11, 'center', 'monospace');
  ctx.restore();
}
function drawMobileReentryControls() {
  var hL=K.ArrowLeft, hR=K.ArrowRight;
  drawMobileBtn(70,  H-65, 52, '\u25C4', 'LEFT',  hL);
  drawMobileBtn(W-70,H-65, 52, '\u25BA', 'RIGHT', hR);
}
function drawMobileChuteControls() {
  if (ch && ch.deployed) return;
  var a=0.4+Math.sin(gT*0.15)*0.15;
  ctx.save(); ctx.globalAlpha=a;
  rnd(W/2-130,H-52,260,42,10,'rgba(20,80,20,0.7)','rgba(100,220,100,0.6)',2);
  txt('TAP TO DEPLOY',W/2,H-26,'#aaffaa',16,'center','bold monospace');
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════════════════════
   GAME LOOP
   ══════════════════════════════════════════════════════════════════════════ */
var lastTs = 0;
function loop(ts) {
  var dt = lastTs ? Math.min((ts-lastTs)/1000, 0.05) : 0.016;
  lastTs = ts;
  gT++;

  ctx.clearRect(0,0,W,H);

  switch (phase) {
    case 'title':    updateTitle(dt);    drawTitle();    break;
    case 'pad':      updatePad(dt);      drawPad();      break;
    case 'launch':   updateLaunch(dt);   drawLaunch();   break;
    case 'travel':     updateTravel(dt);     drawTravel();     break;
    case 'mining':     updateMining(dt);     drawMining();     break;
    case 'solarflare': updateSolarFlare(dt); drawSolarFlare(); break;
    case 'deepspace':  updateDeepSpace(dt);  drawDeepSpace();  break;
    case 'moonland': updateMoonLand(dt); drawMoonLand(); break;
    case 'moonasc':  updateMoonAsc(dt);  drawMoonAsc();  break;
    case 'reentry':  updateReentry(dt);  drawReentry();  break;
    case 'chute':    updateChute(dt);    drawChute();    drawMobileChuteControls(); break;
    case 'victory':  updateVictory(dt);  drawVictory();  break;
    case 'scores':                       drawScores();   break;
  }

  // Radio overlay (drawn on top of everything except title/scores)
  if (phase!=='title' && phase!=='scores' && phase!=='pad') {
    updateRadio(dt);
    drawRadio();
  }

  mclk = false;
  // Clear just-pressed (but keep for this frame's logic)
  var codes = Object.keys(JP);
  for (var i=0;i<codes.length;i++) JP[codes[i]] = false;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
