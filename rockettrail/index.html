<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Rocket Trail 🚀</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05050f;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
#stage{
  position:absolute;width:800px;height:560px;overflow:hidden;
  transform-origin:0 0;
  border:2px solid #334;border-radius:10px;
  box-shadow:0 0 60px rgba(100,150,255,0.15);
}
#gc{display:block;width:800px;height:560px;}
</style>
</head>
<body>
<div id="stage"><canvas id="gc"></canvas></div>
<script>
'use strict';

/* ── POLYFILL: ctx.roundRect for Safari < 15.4 ─────────────────────────── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r||0, Math.abs(w)/2, Math.abs(h)/2);
    this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

/* ── CANVAS & RESIZE ────────────────────────────────────────────────────── */
var W = 800, H = 560, TAU = Math.PI * 2;
var stage  = document.getElementById('stage');
var canvas = document.getElementById('gc');
var ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
ctx.lineJoin = 'round'; ctx.lineCap = 'round';

function resize() {
  var s = Math.min(window.innerWidth / W, window.innerHeight / H);
  stage.style.transform = 'scale(' + s + ')';
  stage.style.left = Math.round((window.innerWidth  - W*s) / 2) + 'px';
  stage.style.top  = Math.round((window.innerHeight - H*s) / 2) + 'px';
}
window.addEventListener('resize', resize);
resize();

/* ── AUDIO ───────────────────────────────────────────────────────────────── */
var ACtx = window.AudioContext || window.webkitAudioContext;
var actx = null;
function initAudio() {
  if (!actx && ACtx) { try { actx = new ACtx(); } catch(e) {} }
  if (actx && actx.state === 'suspended') { try { actx.resume(); } catch(e) {} }
}
function beep(freq, dur, vol, type) {
  if (!actx) return;
  try {
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.3, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e) {}
}
function boom(dur, vol) {
  if (!actx) return;
  try {
    var n = Math.floor(actx.sampleRate * dur);
    var buf = actx.createBuffer(1, n, actx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.5);
    var src = actx.createBufferSource(), g = actx.createGain();
    src.buffer = buf; g.gain.value = vol||0.3;
    src.connect(g); g.connect(actx.destination); src.start();
  } catch(e) {}
}
function chime() {
  if (!actx) return;
  var notes = [523,659,784,1047];
  notes.forEach(function(f,i) {
    try {
      var o=actx.createOscillator(),g=actx.createGain();
      var t0=actx.currentTime+i*0.12;
      o.frequency.value=f; g.gain.setValueAtTime(0.18,t0);
      g.gain.exponentialRampToValueAtTime(0.001,t0+0.5);
      o.connect(g); g.connect(actx.destination);
      o.start(t0); o.stop(t0+0.55);
    } catch(e) {}
  });
}

/* ── SCREEN SHAKE ────────────────────────────────────────────────────────── */
function shake(intensity, ms) {
  var el = document.getElementById('stage');
  var base = el.style.transform; // preserve existing scale()
  var start = performance.now();
  (function tick() {
    var p = 1 - (performance.now() - start) / ms;
    if (p <= 0) { el.style.transform = base; return; }
    var dx = (Math.random()-0.5)*intensity*p*2, dy = (Math.random()-0.5)*intensity*p*2;
    el.style.transform = base + ' translate(' + dx + 'px,' + dy + 'px)';
    requestAnimationFrame(tick);
  })();
}

/* ── INPUT ───────────────────────────────────────────────────────────────── */
var K = {}, JP = {};
document.addEventListener('keydown', function(e) {
  if (!K[e.code]) JP[e.code] = true;
  K[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) >= 0)
    e.preventDefault();
});
document.addEventListener('keyup', function(e) { K[e.code] = false; });
function eat(c) { if (JP[c]) { JP[c]=false; return true; } return false; }
function held(c) { return !!K[c]; }

var mx=W/2, my=H/2, mclk=false, mouseDown=false;
canvas.addEventListener('mousedown', function(e) {
  var r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
  mouseDown=true; mclk=true;
});
canvas.addEventListener('mouseup', function() { mouseDown=false; });
canvas.addEventListener('click', function(e) {
  var r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
  mclk=true;
});
canvas.addEventListener('mousemove', function(e) {
  var r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
});

var touchIds = {};
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault(); initAudio();
  var r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  for (var i=0;i<e.changedTouches.length;i++) {
    var t=e.changedTouches[i];
    touchIds[t.identifier]={x:(t.clientX-r.left)*sx, y:(t.clientY-r.top)*sy};
  }
  syncTouchKeys();
  // Also fire mclk for menu taps
  if (e.changedTouches.length > 0) {
    var t0=e.changedTouches[0];
    mx=(t0.clientX-r.left)*sx; my=(t0.clientY-r.top)*sy;
    mclk=true;
    handleTouchFire(mx,my);
  }
},{passive:false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  for (var i=0;i<e.changedTouches.length;i++) {
    var t=e.changedTouches[i];
    touchIds[t.identifier]={x:(t.clientX-r.left)*sx, y:(t.clientY-r.top)*sy};
  }
  syncTouchKeys();
},{passive:false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i=0;i<e.changedTouches.length;i++) delete touchIds[e.changedTouches[i].identifier];
  syncTouchKeys();
},{passive:false});
canvas.addEventListener('touchcancel', function(e) {
  e.preventDefault(); touchIds={}; syncTouchKeys();
},{passive:false});

function handleTouchFire(tx,ty) {
  if (phase==='chute') {
    if (ty > H-120 && Math.abs(tx-W/2)<130) { JP.Space=true; }
  }
  if (phase==='moonasc' || phase==='launch' || phase==='travel') {
    if (tx > W-120 && ty > H-60) { JP.Space=true; }
  }
  if (phase==='mining' && mine && !mine.done) {
    fireMiningLaser(tx, ty); mclk=false;
  }
}
function syncTouchKeys() {
  K.ArrowLeft=false; K.ArrowRight=false; K.ArrowUp=false;
  var ids=Object.keys(touchIds);
  for (var i=0;i<ids.length;i++) {
    var p=touchIds[ids[i]];
    if (phase==='moonland') {
      // Full-screen touch zones: bottom-left = steer left, bottom-right = steer right,
      // anywhere else (center column or upper half) = thrust
      if (p.y > H*0.55) {
        if (p.x < W*0.28)       K.ArrowLeft=true;
        else if (p.x > W*0.72)  K.ArrowRight=true;
        else                     K.ArrowUp=true;
      } else {
        K.ArrowUp=true; // upper half of screen = thrust too
      }
    } else if (phase==='reentry' || phase==='solarflare') {
      if (p.y > H-160) {
        if (p.x < W/2) K.ArrowLeft=true;
        else            K.ArrowRight=true;
      }
    }
  }
}

/* ── DRAW UTILITIES ─────────────────────────────────────────────────────── */
function drect(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function circ(x,y,r,c)    { ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); }
function ell(x,y,rx,ry,c,rot) {
  ctx.fillStyle=c; ctx.beginPath();
  ctx.ellipse(x,y,rx,ry,rot||0,0,TAU); ctx.fill();
}
function strokeEll(x,y,rx,ry,c,lw,rot) {
  ctx.strokeStyle=c; ctx.lineWidth=lw||2; ctx.beginPath();
  ctx.ellipse(x,y,rx,ry,rot||0,0,TAU); ctx.stroke();
}
function ln(x1,y1,x2,y2,c,lw) {
  ctx.strokeStyle=c; ctx.lineWidth=lw||2;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function poly(pts,fill,strk,sw) {
  if (!pts.length) return;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for (var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  if (fill){ctx.fillStyle=fill;ctx.fill();}
  if (strk){ctx.strokeStyle=strk;ctx.lineWidth=sw||2;ctx.stroke();}
}
function rnd(x,y,w,h,r,fill,strk,sw) {
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r||0);
  if (fill){ctx.fillStyle=fill;ctx.fill();}
  if (strk){ctx.strokeStyle=strk;ctx.lineWidth=sw||2;ctx.stroke();}
}
function txt(s,x,y,c,sz,align,font) {
  ctx.fillStyle=c; ctx.font=(sz||16)+'px '+(font||'Georgia');
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  ctx.fillText(s,x,y);
}
function vgrad(x,y,w,h,stops) {
  var g=ctx.createLinearGradient(x,y,x,y+h);
  stops.forEach(function(s){g.addColorStop(s[0],s[1]);});
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
}
function hgrad(x,y,w,h,stops) {
  var g=ctx.createLinearGradient(x,y,x+w,y);
  stops.forEach(function(s){g.addColorStop(s[0],s[1]);});
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
}

/* ── STARS ───────────────────────────────────────────────────────────────── */
var STARS = [];
(function() {
  for (var i=0;i<200;i++) STARS.push({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.5+0.3, a:Math.random()*0.6+0.4,
    tw:Math.random()*TAU
  });
})();
function drawStars(alpha) {
  ctx.save(); ctx.globalAlpha=(alpha!==undefined?alpha:1);
  for (var i=0;i<STARS.length;i++) {
    var s=STARS[i];
    var a=s.a+Math.sin(gT*0.015+s.tw)*0.12;
    ctx.fillStyle='rgba(255,255,255,'+a+')';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill();
  }
  ctx.restore();
}
function drawEarth(x,y,r) {
  var g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  g.addColorStop(0,'#6ab4f5'); g.addColorStop(0.4,'#3a7abd');
  g.addColorStop(0.7,'#2a5a8a'); g.addColorStop(1,'#1a3a5a');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill();
  // continents hint
  ctx.save(); ctx.globalAlpha=0.5;
  ell(x-r*0.1,y-r*0.1,r*0.25,r*0.32,'#4a8a3a',-0.3);
  ell(x+r*0.25,y+r*0.1,r*0.18,r*0.28,'#4a8a3a',0.2);
  ctx.restore();
  // atmosphere rim
  ctx.save(); ctx.globalAlpha=0.35;
  strokeEll(x,y,r,r,'#88ccff',r*0.12);
  ctx.restore();
}
function drawMoon(x,y,r) {
  var g=ctx.createRadialGradient(x-r*0.2,y-r*0.25,r*0.05,x,y,r);
  g.addColorStop(0,'#e0e0d8'); g.addColorStop(0.6,'#b8b8b0');
  g.addColorStop(1,'#888880');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.35;
  var craters=[[x-r*0.3,y-r*0.1,r*0.12],[x+r*0.25,y+r*0.2,r*0.09],
               [x-r*0.05,y+r*0.3,r*0.07],[x+r*0.4,y-r*0.3,r*0.06]];
  for (var i=0;i<craters.length;i++) {
    var cr=craters[i];
    strokeEll(cr[0],cr[1],cr[2],cr[2],'#666',2);
  }
  ctx.restore();
}

/* ── HIGH SCORES ────────────────────────────────────────────────────────── */
var HS_KEY = 'mucko_hs_rockettrail';
function getHS() { try{return JSON.parse(localStorage.getItem(HS_KEY)||'[]');}catch(e){return[];} }
function saveHS(entry) {
  var sc=getHS(); sc.push(entry);
  sc.sort(function(a,b){return b.score-a.score;});
  localStorage.setItem(HS_KEY,JSON.stringify(sc.slice(0,10)));
}

/* ── MISSION CONTROL RADIO ───────────────────────────────────────────────── */
var radio = {msg:'', alpha:0, timer:0};
function showRadio(msg) { radio.msg=msg; radio.alpha=1; radio.timer=0; }
function updateRadio(dt) {
  radio.timer+=dt;
  if(radio.timer>3.8) radio.alpha=Math.max(0,radio.alpha-dt*2.5);
}
function drawRadio() {
  if(radio.alpha<0.01) return;
  ctx.save(); ctx.globalAlpha=radio.alpha;
  rnd(8,H-52,W-16,40,8,'rgba(0,15,0,0.88)','rgba(0,180,0,0.55)',1.5);
  txt('\uD83D\uDCE1 HOUSTON: '+radio.msg, 20, H-28, '#55ff55', 11.5, 'left', 'bold monospace');
  ctx.restore();
}

/* ── DIFFICULTY ──────────────────────────────────────────────────────────── */
var difficulty = 'gemini'; // 'mercury' | 'gemini' | 'apollo'
var DIFF = {
  mercury: {
    // Lunar lander
    gravity:12,   maxSafe:85,  fuelBase:200, fuelRate:3.0,
    // Re-entry
    reFreq:0.38,  reDur:18,    reSpdMul:0.72,

  },
  gemini: {

  },
  apollo: {

  }
};
function getDiff() { return DIFF[difficulty]; }

/* ── RANDOM EVENTS (Oregon Trail style) ─────────────────────────────────── */
var EVENTS = [
  {txt:'Carbon-rich asteroid spotted nearby!',
   opts:['Mine it (+ minerals)','Keep course'],
   res:[{m:6,s:0},{m:0,s:25}]},
  {txt:'Micrometeorite shower rattles the hull.',
   opts:['Boost shields','Ride it out'],
   res:[{m:-2,s:30},{m:0,s:-20}]},
  {txt:'Strange signal from the lunar surface!',

  {txt:'Equipment glitch in the nav computer.',

   res:[{m:-2,s:40},{m:0,s:-15}]},
  {txt:'Solar flare warning from Mission Control!',
   opts:['All shields up','Partial cover only'],
   res:[{m:-1,s:20},{m:0,s:10}]},
];

/* ── GAME STATE ─────────────────────────────────────────────────────────── */
var phase = 'title';
var gT = 0; // global tick
var runScore = {landing:0, reentry:0, chute:0};
var scoreSaved = false;
var minerals = 0;   // collected during asteroid mining
var trav = null;    // travel phase state
var mine = null;    // mining phase state

/* ══════════════════════════════════════════════════════════════════════════
   DRAWING: SATURN V
   ══════════════════════════════════════════════════════════════════════════ */
/* stages: 3=all attached, 2=S-IC separated, 1=S-II separated, 0=S-IVB separated (just CSM)
   Separation order: S-IC first (bottom), then S-II, then S-IVB.
   cx/baseY: bottom-center of current stack (whatever remains)
   flameSz: height of flame plume (0=off) */
function drawSaturnV(cx, baseY, stages, flameSz) {
  ctx.save(); ctx.translate(cx, baseY);
  var y = 0; // cursor; goes negative (upward) as sections are drawn

  // S-IC — first stage (only present when all 3 attached)
  if (stages === 3) {
    // Fins
    poly([[-11,y-10],[-18,y],[-11,y]], '#c0c0c0','#333',1);
    poly([[11,y-10],[18,y],[11,y]], '#c0c0c0','#333',1);
    // Engine skirt (trapezoid)
    poly([[-11,y-3],[-14,y],[14,y],[11,y-3]], '#888','#333',1);
    // 5 engine bells
    for (var ei=-2;ei<=2;ei++) {
      var ex=ei*4.5;
      poly([[ex-2.5,y],[ex-3.5,y+7],[ex+3.5,y+7],[ex+2.5,y]],'#777','#444',1);
    }
    // S-IC flames (orange/yellow)
    if (flameSz>0) {
      for (var fi=-2;fi<=2;fi++) {
        var fx=fi*4.5, fh=flameSz*(0.8+Math.random()*0.4);
        var fg=ctx.createLinearGradient(fx,y+7,fx,y+7+fh);
        fg.addColorStop(0,'rgba(255,255,200,1)');
        fg.addColorStop(0.1,'rgba(255,200,50,0.95)');
        fg.addColorStop(0.4,'rgba(255,100,0,0.8)');
        fg.addColorStop(1,'rgba(255,30,0,0)');
        ctx.fillStyle=fg; ctx.beginPath();
        ctx.ellipse(fx,y+7+fh*0.35,4,fh*0.65,0,0,TAU); ctx.fill();
      }
    }
    // Body
    rnd(-11,y-56,22,56,2,'#f2f2f0','#333',1.5);
    drect(-11,y-42,22,10,'#111');
    drect(-11,y-22,22,5,'#111');
    y -= 56;
    // Interstage 1-2 (travels with S-IC; only present while S-IC is attached)
    rnd(-10,y-5,20,5,1,'#999','#444',1); y -= 5;
  }

  // S-II — second stage (present when stages >= 2, i.e., S-II or S-IVB still attached)
  if (stages >= 2) {
    // S-II flames (blue/white — J-2 engines)
    if (flameSz>0 && stages===2) {
      for (var fi2=-2;fi2<=2;fi2++) {
        var fh2=flameSz*0.55*(0.8+Math.random()*0.4);
        var fg2=ctx.createLinearGradient(fi2*4,y,fi2*4,y+fh2);
        fg2.addColorStop(0,'rgba(180,220,255,1)');
        fg2.addColorStop(0.4,'rgba(100,160,255,0.7)');
        fg2.addColorStop(1,'rgba(50,100,255,0)');
        ctx.fillStyle=fg2; ctx.beginPath();
        ctx.ellipse(fi2*4,y+fh2*0.3,3,fh2*0.7,0,0,TAU); ctx.fill();
      }
    }
    rnd(-10,y-42,20,42,2,'#f2f2f0','#333',1.5);
    drect(-10,y-32,20,8,'#111');
    drect(-10,y-16,20,4,'#111');
    y -= 42;
    // Interstage 2-3
    rnd(-9,y-5,18,5,1,'#999','#444',1); y -= 5;
  }

  // S-IVB — third stage (present when stages >= 1)
  if (stages >= 1) {
    // S-IVB flame (single J-2)
    if (flameSz>0 && stages===1) {
      var fh3=flameSz*0.4*(0.85+Math.random()*0.3);
      var fg3=ctx.createLinearGradient(0,y,0,y+fh3);
      fg3.addColorStop(0,'rgba(180,220,255,1)');
      fg3.addColorStop(1,'rgba(50,100,255,0)');
      ctx.fillStyle=fg3; ctx.beginPath();
      ctx.ellipse(0,y+fh3*0.3,4,fh3*0.7,0,0,TAU); ctx.fill();
    }
    rnd(-8,y-30,16,30,2,'#f2f2f0','#333',1.5);
    drect(-8,y-23,16,6,'#111');
    drect(-8,y-12,16,3,'#111');
    y -= 30;
  }

  // SLA (spacecraft/lunar module adapter) - tapers
  poly([[-8,y],[-7,y-14],[7,y-14],[8,y]],'#e0e0d8','#444',1);
  y -= 14;

  // Service Module
  rnd(-7,y-20,14,20,2,'#e8e8e0','#444',1.5);
  y -= 20;

  // Command Module (truncated cone)
  poly([[-7,y],[-2,y-13],[2,y-13],[7,y]],'#e8e8e0','#444',1.5);
  y -= 13;

  // Launch Escape Tower
  ln(0,y,-4,y-8,'#777',1); ln(0,y,4,y-8,'#777',1);
  ln(-4,y-8,0,y-28,'#999',2); ln(4,y-8,0,y-28,'#999',2);

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: TRAVEL  (Oregon Trail progress — sleep/wake cycles + mining)
   ══════════════════════════════════════════════════════════════════════════ */
var TRAVEL_TEXTS_OUT = [
  'Leaving Earth behind! The crew can see the whole planet out the window.',
  'Asteroid field ahead! Time to mine some rocks and collect minerals!',
  'Almost there! The Moon is getting bigger and bigger outside the window.',
];
var TRAVEL_TEXTS_BACK = [
  'Mission accomplished! Now the long trip home begins.',
  'Earth is getting closer every minute! Almost back home!',
  'Home stretch! The crew can see the blue oceans from up here.',
];

function initTravel(dest) {
  trav = {
    t:0, sub:'intro', subT:0,
    dest: dest,
    hasMining: dest === 'moonland',
    day: 1,
    shipX: dest==='moonland' ? 90 : W-90,
    zzz: [],
    texts: dest==='moonland' ? TRAVEL_TEXTS_OUT : TRAVEL_TEXTS_BACK,
    event: null,       // random event object (shown during wake1)
    eventDone: false,  // event has been resolved
  };
  if (dest==='moonland') showRadio('Columbia, Houston. You\'re on course. Looking good.');
  else showRadio('Trans-Earth Injection burn complete. Welcome home!');
  phase = 'travel';
}
// Sequence of sub-phases for each trip direction (varies by difficulty)
var SEQ_BACK = ['intro','sleep1','wake1','sleep2','wake2','done'];
function getSeqOut() {
  if (difficulty === 'mercury') return ['intro','sleep1','wake1','solarflare','mining','sleep2','wake2','done'];
  if (difficulty === 'apollo')  return ['intro','sleep1','wake1','deepspace','sleep2','wake2','done'];
  return ['intro','sleep1','wake1','mining','sleep2','wake2','done']; // gemini default
}

function nextTravelSub() {
  var seq = trav.hasMining ? getSeqOut() : SEQ_BACK;
  var idx = seq.indexOf(trav.sub);
  if (idx < 0 || idx >= seq.length-1) return;
  trav.sub = seq[idx+1]; trav.subT = 0;
  trav.day = idx >= 3 ? 3 : idx >= 1 ? 2 : 1;
  // Trigger random event on wake1 during outbound trip
  if (trav.sub === 'wake1' && trav.hasMining) {
    trav.event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
    trav.eventDone = false;
  }
  if (trav.sub === 'mining')     { initMining();     return; }
  if (trav.sub === 'solarflare') { initSolarFlare(); return; }
  if (trav.sub === 'deepspace')  { initDeepSpace();  return; }
  if (trav.sub === 'done') {
    if (trav.dest === 'moonland') initMoonLand(); else initReentry();
  }
}
function updateTravel(dt) {
  trav.t += dt; trav.subT += dt;
  var sub = trav.sub;
  // Zzz particles during sleep
  if ((sub==='sleep1'||sub==='sleep2') && Math.random()<0.06) {
    trav.zzz.push({x:W/2+(Math.random()-0.5)*70, y:H/2+10, vy:-20-Math.random()*15, life:0});
  }
  trav.zzz = trav.zzz.filter(function(z){z.y+=z.vy*dt; z.life+=dt; return z.life<3.5;});
  // Ship moves toward destination
  var prog = sub==='intro'?0:sub==='sleep1'?0.15:sub==='wake1'?0.32:
             sub==='mining'?0.45:sub==='sleep2'?0.62:sub==='wake2'?0.82:1;
  var targetX = trav.dest==='moonland' ? (90+prog*(W-200)) : ((W-90)-prog*(W-200));
  trav.shipX += (targetX - trav.shipX) * Math.min(1, dt*1.8);
  // Auto-advance sleep after 2.5s, wake2 after 3s
  if ((sub==='sleep1'||sub==='sleep2') && trav.subT>2.5) nextTravelSub();
  if (sub==='wake2' && trav.subT>3) nextTravelSub();
}
function drawTravel() {
  var isNight = trav.sub==='sleep1'||trav.sub==='sleep2';
  // Space background
  drect(0,0,W,H,'#03030d'); drawStars(isNight?0.85:0.65);

  drawEarth(earthX, H/2+10, 46);
  drawMoon(moonX,   H/2+10, 30);

  // Dotted flight path
  ctx.save(); ctx.setLineDash([5,7]);
  ln(earthX+48, H/2+10, moonX-32, H/2+10, 'rgba(80,130,200,0.3)', 1.5);
  ctx.setLineDash([]); ctx.restore();
  // Ship
  ctx.save(); ctx.translate(trav.shipX, H/2+10);
  poly([[0,-7],[-5,6],[5,6]],'#d8d8d0','#888',1);
  ctx.restore();

  // Night overlay
  if (isNight) {
    ctx.save(); ctx.globalAlpha=0.55; drect(0,0,W,H,'#000'); ctx.restore();
    // Zzz
    trav.zzz.forEach(function(z) {
      ctx.save(); ctx.globalAlpha=Math.max(0,0.7-z.life/3.5);

    });
    txt('REST CYCLE — DAY '+trav.day, W/2, H/2-66, '#7788aa', 16, 'center', 'bold monospace');

    var bh=mx>W/2-100&&mx<W/2+100&&my>H/2+20&&my<H/2+56;

  }

  // Day panel
  var sub=trav.sub;
  var hdg = sub==='intro' ?
      (trav.dest==='moonland'?'DAY 1 \u2014 HEADING TO THE MOON! \uD83C\uDF15':'DAY 1 \u2014 HEADING HOME! \uD83C\uDF0D') :
    sub==='wake1' ? 'DAY 2 \u2014 HALFWAY THERE!' :
    sub==='wake2' ? (trav.dest==='moonland'?'DAY 3 \u2014 ALMOST AT THE MOON!':'DAY 3 \u2014 ALMOST HOME!') :
    'MISSION DAY '+trav.day;
  var tidx = sub==='intro'?0:sub==='wake1'?1:2;
  var evtTxt = trav.texts[Math.min(tidx, trav.texts.length-1)];

  rnd(W/2-260,H/2-110,520,220,14,'rgba(0,6,20,0.88)','rgba(80,140,220,0.4)',2);

  // Word-wrap event text
  var words=evtTxt.split(' '), ln1='', ln2='';
  words.forEach(function(w){
    if((ln1+' '+w).trim().length<=48) ln1=(ln1+' '+w).trim();
    else ln2=(ln2+' '+w).trim();
  });
  txt(ln1, W/2, H/2-40, '#a8bedd', 13, 'center', 'Georgia');
  if (ln2) txt(ln2, W/2, H/2-22, '#a8bedd', 13, 'center', 'Georgia');

  // Minerals hint on return trip
  if (trav.dest==='reentry' && minerals>0) {
    txt('\u2694 '+minerals+' minerals aboard — shields boosted!', W/2, H/2+2, '#ffcc44', 12, 'center', 'italic Georgia');
  }
  if (trav.dest==='moonland' && minerals>0) {
    txt('\u2694 '+minerals+' minerals — extra LEM fuel!', W/2, H/2+2, '#ffcc44', 12, 'center', 'italic Georgia');
  }

  // ── Random event panel (wake1 outbound) ──────────────────────────────────
  if (sub==='wake1' && trav.event && !trav.eventDone) {
    var ev=trav.event;
    rnd(W/2-230,H/2+18,460,148,12,'rgba(5,20,5,0.92)','rgba(0,200,80,0.45)',2);
    txt('\u26A0\uFE0F  EVENT', W/2, H/2+40, '#ffdd44', 13, 'center', 'bold monospace');
    txt(ev.txt, W/2, H/2+60, '#cceecc', 13, 'center', 'Georgia');
    // Choice A

    rnd(W/2-210,H/2+72,200,34,7,ha?'#1a3a1a':'#0d2010','rgba(0,180,60,0.5)',1.5);
    txt(ev.opts[0],W/2-110,H/2+95,ha?'#fff':'#88ffaa',11,'center','bold monospace');
    // Choice B
    var hb=mx>W/2+10&&mx<W/2+210&&my>H/2+72&&my<H/2+106;
    rnd(W/2+10,H/2+72,200,34,7,hb?'#1a3a1a':'#0d2010','rgba(0,180,60,0.5)',1.5);
    txt(ev.opts[1],W/2+110,H/2+95,hb?'#fff':'#88ffaa',11,'center','bold monospace');

    if (mclk) {

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: ASTEROID MINING  (shoot rocks, collect minerals)
   ══════════════════════════════════════════════════════════════════════════ */
var MINE_DUR = 30;
function initMining() {
  mine = {
    t:0, asteroids:[], lasers:[], frags:[], gems:[],
    minerals:0, spawnT:0, spawnInt:getDiff().spawnInt,
    done:false, doneT:0, cooldown:0,
    goldMsg: 0  // timer for gold asteroid hint
  };
  for (var i=0;i<5;i++) spawnAsteroid();
  showRadio('Mining lasers online. Shoot those asteroids! Watch for gold!');
  phase = 'mining';
}
function spawnAsteroid() {
  var side=Math.floor(Math.random()*3); // 0=top,1=left,2=right
  var isGold = Math.random() < 0.08; // 8% chance — rare gold asteroid!
  var r = isGold ? (12+Math.random()*10) : (13+Math.random()*22);
  var spdMul = getDiff().asteroidSpd;
  var spd = (isGold ? (55+Math.random()*30) : (28+Math.random()*38)) * spdMul;
  var x,y,vx,vy;
  if (side===0)      { x=Math.random()*W; y=-r;   vx=(Math.random()-0.5)*24; vy=spd; }
  else if (side===1) { x=-r;  y=50+Math.random()*(H-180); vx=spd;  vy=(Math.random()-0.5)*18; }
  else               { x=W+r; y=50+Math.random()*(H-180); vx=-spd; vy=(Math.random()-0.5)*18; }
  var isIce = !isGold && Math.random()<0.25;
  mine.asteroids.push({
    x:x,y:y,vx:vx,vy:vy,r:r,
    health: isGold ? 1 : r>28 ? 2 : 1,
    minerals: isGold ? 8 : r>28 ? 3 : r>20 ? 2 : 1,
    rot:Math.random()*TAU, rotV:(Math.random()-0.5)*1.5,
    ice: isIce, gold: isGold
  });
}
function fireMiningLaser(tx,ty) {
  if (!mine||mine.done||mine.cooldown>0) return;
  mine.cooldown=0.14;
  var sx=W/2,sy=H-48;
  var dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1) return;
  var ndx=dx/len,ndy=dy/len;
  var hitX=sx+ndx*W*2,hitY=sy+ndy*H*2,hitAny=false;
  for (var i=0;i<mine.asteroids.length;i++) {
    var a=mine.asteroids[i]; if(a.health<=0) continue;
    var t2=(a.x-sx)*ndx+(a.y-sy)*ndy; if(t2<0) continue;
    var cx=sx+t2*ndx,cy=sy+t2*ndy;
    var dist=Math.sqrt((a.x-cx)*(a.x-cx)+(a.y-cy)*(a.y-cy));
    if(dist<a.r+3) {
      hitX=a.x; hitY=a.y; hitAny=true;
      a.health--;
      if(a.health<=0) {
        mine.minerals+=a.minerals;
        for(var fi=0;fi<5;fi++) mine.frags.push({
          x:a.x,y:a.y,vx:(Math.random()-0.5)*90,vy:(Math.random()-0.5)*90,r:a.r*0.22,life:0,
          gold:a.gold
        });
        for(var gi=0;gi<a.minerals;gi++) mine.gems.push({
          x:a.x+(Math.random()-0.5)*18,y:a.y,vy:-28-Math.random()*18,life:0, gold:a.gold
        });
        if(a.gold){ beep(1200,0.08,0.25); beep(1400,0.2,0.3); showRadio('Gold asteroid! +8 minerals! Outstanding!'); }
        else beep(880,0.15,0.2);
      } else { beep(440,0.08,0.15); }
      break;
    }
  }
  mine.lasers.push({x1:sx,y1:sy,x2:hitX,y2:hitY,life:0});
  if(!hitAny) beep(200,0.06,0.08,'square');
}
function updateMining(dt) {
  mine.t+=dt; mine.cooldown=Math.max(0,mine.cooldown-dt);
  if(mine.done){ mine.doneT+=dt; if(mine.doneT>2.5){minerals+=mine.minerals;nextTravelSub();} return; }
  // Auto-fire while mouse held on desktop
  if(mouseDown && mine.cooldown<=0) fireMiningLaser(mx,my);
  if(mclk && !mine.done){ fireMiningLaser(mx,my); mclk=false; }
  // Spawn
  mine.spawnT+=dt;
  if(mine.spawnT>=mine.spawnInt){ mine.spawnT=0; mine.spawnInt=Math.max(getDiff().spawnInt*0.45,mine.spawnInt-0.04); spawnAsteroid(); }
  // Update objects
  mine.asteroids=mine.asteroids.filter(function(a){
    a.x+=a.vx*dt;a.y+=a.vy*dt;a.rot+=a.rotV*dt;
    return a.health>0&&a.x>-80&&a.x<W+80&&a.y>-80&&a.y<H+20;
  });
  mine.lasers=mine.lasers.filter(function(l){l.life+=dt;return l.life<0.22;});
  mine.frags=mine.frags.filter(function(f){f.x+=f.vx*dt;f.y+=f.vy*dt;f.life+=dt;return f.life<1.0;});
  mine.gems=mine.gems.filter(function(g){g.y+=g.vy*dt;g.life+=dt;return g.life<2.2;});
  // Time bonus at 15 minerals (once)
  if(!mine.bonusGiven && mine.minerals>=15) {
    mine.bonusGiven=true; mine.bonusFlash=2.5;
    mine.timeBonus=(mine.timeBonus||0)+5;
    showRadio('Great haul! +5 seconds bonus time!');
    beep(660,0.05,0.2); beep(880,0.15,0.25);
  }
  mine.bonusFlash=Math.max(0,(mine.bonusFlash||0)-dt);
  if(mine.t>=MINE_DUR+(mine.timeBonus||0)) mine.done=true;
}
function drawMining() {
  drect(0,0,W,H,'#03030e'); drawStars(0.75);
  // Faint Earth
  ctx.save(); ctx.globalAlpha=0.22; drawEarth(640,430,75); ctx.restore();

  // Asteroids

      glow.addColorStop(0,'rgba(255,220,0,0.35)');
      glow.addColorStop(1,'rgba(255,180,0,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,a.r*2.2,0,TAU); ctx.fill();
    }
    ctx.rotate(a.rot);
    ctx.beginPath();
    for(var pi=0;pi<7;pi++){
      var ang=pi/7*TAU, rr=a.r*(0.72+Math.sin(pi*2.3+a.rot*2)*0.28);
      pi===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
    }
    ctx.closePath();
    ctx.fillStyle=a.gold?'#f0c020':a.ice?'#6a8fa8':'#7a6a56'; ctx.fill();
    ctx.strokeStyle=a.gold?'#ffd700':a.ice?'#4a6f88':'#5a4a38'; ctx.lineWidth=a.gold?2.5:2; ctx.stroke();
    if(a.health===1&&!a.ice&&!a.gold){ // cracked
      ctx.globalAlpha=0.5+Math.sin(gT*0.2)*0.3;
      ctx.strokeStyle='#ff8844'; ctx.lineWidth=2; ctx.stroke();
    }
    if(a.gold){ // sparkle
      ctx.globalAlpha=0.6+Math.sin(gT*0.25)*0.4;
      circ(a.r*0.25,-a.r*0.3,3,'rgba(255,255,150,0.9)');

  });

  // Fragments
  mine.frags.forEach(function(f){
    ctx.save(); ctx.globalAlpha=1-f.life;
    circ(f.x,f.y,Math.max(0.5,f.r*(1-f.life)),f.gold?'#ffd700':'#988878'); ctx.restore();
  });

  // Gems
  mine.gems.forEach(function(g){
    var a=Math.max(0,1-g.life/2.2), sz=(g.gold?8:5.5)-g.life*1.8;
    if(sz>0.3){
      ctx.save(); ctx.globalAlpha=a;
      ctx.fillStyle=g.gold?'#ffd700':'#ffcc44';
      if(g.gold){ ctx.shadowColor='#ffd700'; ctx.shadowBlur=10; }
      ctx.beginPath();

      ctx.lineTo(g.x,g.y+sz);ctx.lineTo(g.x-sz,g.y);
      ctx.closePath(); ctx.fill();
      if(g.gold){ // star shape extra points
        ctx.beginPath();
        ctx.moveTo(g.x-sz*0.5,g.y-sz*0.5);ctx.lineTo(g.x+sz*0.5,g.y+sz*0.5);
        ctx.moveTo(g.x+sz*0.5,g.y-sz*0.5);ctx.lineTo(g.x-sz*0.5,g.y+sz*0.5);
        ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
      }
      ctx.restore();
    }
  });

  // Lasers
  mine.lasers.forEach(function(l){

    ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(l.x1,l.y1); ctx.lineTo(l.x2,l.y2); ctx.stroke();
    ctx.restore();
  });

  // Ship (cannon at bottom)
  ctx.save(); ctx.translate(W/2,H-48);
  rnd(-20,-12,40,22,5,'#484848','#777',1.5);
  rnd(-9,-20,18,12,3,'#333','#666',1);
  ln(0,-20,0,-32,'#aaa',3.5);   // barrel
  ctx.restore();

  // HUD
  rnd(10,10,170,36,6,'rgba(0,0,0,0.6)','rgba(255,200,50,0.4)',1.5);
  txt('\u2694 MINERALS: '+mine.minerals, 16, 33, '#ffcc44', 14, 'left', 'bold monospace');
  // Timer bar (accounts for time bonus)
  var totalDur=MINE_DUR+(mine.timeBonus||0);
  var tf=Math.max(0,(totalDur-mine.t)/totalDur);
  rnd(W/2-120,12,240,14,4,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  rnd(W/2-120,12,Math.round(240*tf),14,4,tf>0.3?'#44aaff':'#ff4444',null,0);
  txt(Math.max(0,Math.ceil(totalDur-mine.t))+'s',W/2,24,'#ccddff',10,'center','monospace');
  // Time bonus flash
  if(mine.bonusFlash>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,mine.bonusFlash);
    txt('+5 SEC!',W/2+60,24,'#88ffaa',10,'left','bold monospace');
    ctx.restore();
  }

  // Gold asteroid indicator (top right when one is present)
  var hasGold = mine.asteroids.some(function(a){return a.gold;});
  if(hasGold && !mine.done) {
    ctx.save(); ctx.globalAlpha=0.7+Math.sin(gT*0.2)*0.25;
    rnd(W-160,10,150,32,6,'rgba(0,0,0,0.7)','rgba(255,200,0,0.7)',1.5);
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
    txt('\u2605 GOLD! +8 min',W-85,30,'#ffd700',12,'center','bold monospace');
    ctx.shadowBlur=0; ctx.restore();
  }

  // First-5s instruction
  if(mine.t<5){

  // Done overlay

    txt('Minerals will boost your mission!',W/2,H/2+46,'#8899bb',13,'center','Georgia');
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PHASE: SOLAR FLARE  (Mercury difficulty — dodge plasma bursts mid-travel)
   ══════════════════════════════════════════════════════════════════════════ */
var sf = null;
var SF_DUR = 10;  // seconds
function initSolarFlare() {
  sf = {
    t: 0, cx: W/2, vy: 0,
    bursts: [], spawnT: 0,
    shields: 2, hitTimer: 0,
    done: false, doneT: 0, survived: false,
    score: 0
  };
  showRadio('Columbia, solar activity spiking — brace for plasma bursts!');
  phase = 'solarflare';
}
function updateSolarFlare(dt) {
  sf.t += dt;
  sf.hitTimer = Math.max(0, sf.hitTimer - dt);
  if (sf.done) {
    sf.doneT += dt;
    if (sf.doneT > 2.5) {
      // Advance sequence: solarflare → mining (nextTravelSub updates trav.sub
      // so the later mining→sleep2 transition works correctly)
      nextTravelSub();
    }
    return;
  }
  // Move capsule
  var spd = 200;
  if (held('ArrowLeft')||held('KeyA'))  sf.cx = Math.max(36, sf.cx - spd*dt);
  if (held('ArrowRight')||held('KeyD')) sf.cx = Math.min(W-36, sf.cx + spd*dt);
  // Spawn plasma bursts — come from top, random X
  sf.spawnT += dt;
  var spawnInterval = Math.max(0.28, 0.75 - sf.t * 0.04);
  if (sf.spawnT >= spawnInterval) {
    sf.spawnT = 0;
    var fast = Math.random() < 0.35;
    sf.bursts.push({
      x: 30 + Math.random() * (W - 60),
      y: -20,
      vy: fast ? 280 : 160,
      r: fast ? 8 : 14,
      fast: fast
    });
  }
  // Update bursts
  sf.bursts = sf.bursts.filter(function(b) {
    b.y += b.vy * dt;
    return b.y < H + 30;
  });
  // Collision (capsule center at sf.cx, H-110)
  var capX = sf.cx, capY = H - 110;
  for (var i = 0; i < sf.bursts.length; i++) {
    var b = sf.bursts[i];
    var dist = Math.sqrt((capX-b.x)*(capX-b.x)+(capY-b.y)*(capY-b.y));
    if (dist < b.r + 14 && !b.hit) {
      b.hit = true; sf.shields--; sf.hitTimer = 0.4;
      boom(0.2, 0.2); beep(300, 0.2, 0.15, 'sawtooth');
      if (sf.shields <= 0) {
        sf.shields = 0; sf.done = true; sf.survived = false;
        sf.score = Math.round(sf.t * 8); showRadio('Shield damage! Pushing through on reserve power.');
      }
    }
  }
  // Time's up
  if (sf.t >= SF_DUR) {
    sf.done = true; sf.survived = true;
    sf.score = 60 + sf.shields * 30;
    minerals += 4; // survived flare = bonus minerals
    chime(); showRadio('Flare passing! Core systems intact. Mining lasers back online.');
  }
}
function drawSolarFlare() {
  // Orange-red space background
  var prog = Math.min(1, sf.t / SF_DUR);
  vgrad(0,0,W,H,[
    [0,'#0a0208'],
    [0.4,'rgba('+Math.round(30+prog*80)+','+Math.round(8+prog*15)+',5,1)'],
    [1,'rgba('+Math.round(60+prog*120)+','+Math.round(20+prog*30)+',5,1)']
  ]);
  drawStars(Math.max(0.1, 0.7 - prog*0.5));
  // Solar glow at top
  var sg = ctx.createRadialGradient(W/2, -60, 0, W/2, -60, W);
  sg.addColorStop(0, 'rgba(255,180,50,'+(0.3+prog*0.4)+')');
  sg.addColorStop(0.5, 'rgba(255,80,0,'+(0.1+prog*0.2)+')');
  sg.addColorStop(1, 'rgba(255,30,0,0)');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H/2);
  // Plasma bursts
  sf.bursts.forEach(function(b) {
    if (b.hit) return;
    var bg = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*1.8);
    bg.addColorStop(0, b.fast?'rgba(255,255,180,0.95)':'rgba(255,140,20,0.9)');
    bg.addColorStop(0.5, b.fast?'rgba(255,200,50,0.6)':'rgba(255,60,0,0.6)');
    bg.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.8,0,TAU); ctx.fill();
    ctx.fillStyle=b.fast?'#ffff88':'#ffaa22'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
  });
  // Capsule
  if (sf.hitTimer > 0) { ctx.save(); ctx.globalAlpha=0.6+Math.sin(gT*0.4)*0.3; }
  drawCapsule(sf.cx, H-110, 0);
  if (sf.hitTimer > 0) ctx.restore();
  // Hit flash
  if (sf.hitTimer > 0) {
    ctx.save(); ctx.globalAlpha=sf.hitTimer*0.35; drect(0,0,W,H,'#ff4400'); ctx.restore();
  }
  // Timer bar
  var timeLeft = Math.max(0, SF_DUR - sf.t);
  var tf = timeLeft / SF_DUR;
  rnd(W/2-120,10,240,14,4,'rgba(0,0,0,0.5)','rgba(255,255,255,0.2)',1);
  rnd(W/2-120,10,Math.round(240*tf),14,4,tf>0.4?'#ff8844':'#ff3300',null,0);
  txt(Math.ceil(timeLeft)+'s',W/2,22,'#ffccaa',10,'center','monospace');
  // Shield pips
  txt('SHIELD', W-90, 46, '#bb7755', 9, 'center', 'monospace');
  for (var si=0;si<2;si++) {
    var sx=W-114+si*24, sy=18, scol=si<sf.shields?'#ff8844':'rgba(100,50,30,0.5)';
    circ(sx+10,sy+10,9,scol,si<sf.shields?'rgba(255,150,80,0.8)':'#333',1.5);
  }
  // Controls
  if (TOUCH_UI) {
    drawMobileReentryControls();
  } else if (sf.t < 3) {
    ctx.save(); ctx.globalAlpha=Math.max(0,1-(sf.t-2));
    rnd(W/2-130,H-46,260,36,6,'rgba(0,0,0,0.6)',null,0);
    txt('\u2190\u2192 / A D  to dodge plasma bursts',W/2,H-25,'#ffbb88',12,'center','monospace');
    ctx.restore();
  }
  // Done overlay
  if (sf.done) {
    var fa=Math.min(1,sf.doneT*2);
    ctx.save(); ctx.globalAlpha=fa;
    rnd(W/2-170,H/2-50,340,110,14,'rgba(0,10,30,0.92)','rgba(255,150,80,0.5)',2);
    txt(sf.survived?'FLARE SURVIVED!':'SHIELD DEPLETED',W/2,H/2-16,
        sf.survived?'#ffcc88':'#ff6644',24,'center','bold Georgia');
    txt(sf.survived?'Mining lasers online! +4 bonus minerals':'Proceeding on reserve power.',
        W/2,H/2+18,'#cc9966',13,'center','Georgia');
    ctx.restore();
  }
}

}
