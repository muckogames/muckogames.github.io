// Polyfill ctx.roundRect for Safari < 15.4 / older iPads
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y,     x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x,     y + h, x,     y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x,     y,     x + r, y);
    this.closePath();
  };
}

// ── Gamestate ─────────────────────────────────────────────────────────────────
let gs = {};

function resetGs(opts = {}) {
  const diff = opts.difficulty || 'normal';
  const m = diff === 'easy' ? 1.5 : diff === 'hard' ? 0.65 : 1.0;
  gs = {
    name:        opts.name     || 'Kid',
    petName:     opts.petName  || 'Buddy',
    petEmoji:    opts.petEmoji || '🐶',
    difficulty:  diff,
    gas:         clamp(Math.round(80  * m)),
    euros:       Math.round(120 * m),
    snacks:      clamp(Math.round(70  * m)),
    bladder:     0,
    stepIdx:     0,
    score:       0,
    log:         [],
    arrived:     false,
    date:        new Date().toLocaleDateString(),
    done:        {},   // activities completed
    continueUsed: false,
  };
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function clamp(v, lo = 0, hi = 100) { return Math.max(lo, Math.min(hi, v)); }
function resColor(v) { return v > 50 ? '#50c070' : v > 25 ? '#c8901a' : '#c05050'; }
function eurosColor(v) { return v > 60 ? '#50c070' : v > 30 ? '#c8901a' : '#c05050'; }

function addLog(msg, type = 'normal') {
  gs.log.push({ msg, type });
  if (gs.log.length > 60) gs.log.shift();
}

function renderLog(maxItems = 5) {
  const cols = { normal:'#e8d8b0', good:'#50c070', bad:'#c05050', event:'#ffd700', info:'#a0c0f0' };
  return gs.log.slice(-maxItems).map(e =>
    `<div style="font-size:12px;color:${cols[e.type]||'#e8d8b0'};margin-bottom:3px;line-height:1.4">${e.msg}</div>`
  ).join('');
}

// ── High Scores ───────────────────────────────────────────────────────────────
const HS_KEY = 'mucko_hs_cartrail';
function getHS() { try { return JSON.parse(localStorage.getItem(HS_KEY)||'[]'); } catch { return []; } }
function saveHS(entry) {
  const list = [...getHS(), entry].sort((a,b) => b.score - a.score).slice(0,10);
  try { localStorage.setItem(HS_KEY, JSON.stringify(list)); } catch {}
  return list.findIndex(e => e.score === entry.score && e.name === entry.name && e.date === entry.date) + 1;
}

// ── Viewport scaling ──────────────────────────────────────────────────────────
function viewW() { var vv = window.visualViewport; return vv ? vv.width  : window.innerWidth;  }
function viewH() { var vv = window.visualViewport; return vv ? vv.height : window.innerHeight; }
function scaleToViewport() {
  const app = document.getElementById('app');
  if (!app) return;
  const vw = viewW(), vh = viewH();
  const s = Math.min(vw / W, vh / H);
  app.style.transform = `scale(${s})`;
  app.style.left = `${(vw - W*s)/2}px`;
  app.style.top  = `${(vh - H*s)/2}px`;
}
window.addEventListener('resize', scaleToViewport);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scaleToViewport);
  window.visualViewport.addEventListener('scroll', scaleToViewport);
}

// ── Screen manager ────────────────────────────────────────────────────────────
let _cleanup = null;
function goTo(fn, ...args) {
  if (_cleanup) { try { _cleanup(); } catch {} _cleanup = null; }
  const app = document.getElementById('app');
  app.innerHTML = '';
  fn(app, ...args);
  scaleToViewport();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title, body, buttons) {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = body;
  const btns = document.getElementById('modal-btns');
  btns.innerHTML = '';
  buttons.forEach(b => {
    const el = document.createElement('button');
    el.innerHTML = b.label;
    if (b.disabled) { el.disabled = true; }
    el.addEventListener('click', () => { hideModal(); b.fn(); });
    btns.appendChild(el);
  });
  document.getElementById('modal').classList.add('show');
}
function hideModal() { document.getElementById('modal').classList.remove('show'); }

// ── Car drawing ───────────────────────────────────────────────────────────────
function drawCar(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#2a6abf';
  ctx.beginPath(); ctx.roundRect(0, 10, 80, 28, 4); ctx.fill();
  // Cabin
  ctx.fillStyle = '#3a7acf';
  ctx.beginPath(); ctx.roundRect(14, 0, 50, 18, 5); ctx.fill();
  // Windows
  ctx.fillStyle = 'rgba(180,220,255,0.75)';
  ctx.beginPath(); ctx.roundRect(17,3,20,12,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(40,3,20,12,3); ctx.fill();
  // Wheels
  [18, 62].forEach(wx => {
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(wx,38,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(wx,38, 5,0,Math.PI*2); ctx.fill();
  });
  // Headlight
  ctx.fillStyle = '#ffe870';
  ctx.beginPath(); ctx.arc(80, 20, 4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Title Screen ──────────────────────────────────────────────────────────────
function buildTitle(app) {
  app.style.background = '#0d1b2a';
  app.innerHTML = `
    <canvas id="tc" width="${W}" height="${H}" style="position:absolute;top:0;left:0"></canvas>
    <div style="position:absolute;top:0;left:0;width:${W}px;pointer-events:none;text-align:center;padding-top:72px">
      <div style="font-size:58px;font-weight:bold;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.5),2px 2px 0 #7a5a00;letter-spacing:5px">CAR TRAIL</div>
      <div style="font-size:17px;color:#c8901a;margin-top:8px;text-shadow:1px 1px 3px #000">Basel to Leipzig &mdash; The Family Road Trip</div>
      <div style="font-size:28px;margin-top:10px">🇨🇭 ➡️ 🇩🇪</div>
    </div>
    <div style="position:absolute;bottom:72px;left:0;width:${W}px;display:flex;flex-direction:column;align-items:center;row-gap:14px">
      <button id="btn-play" class="game-btn primary" style="font-size:20px;padding:16px 50px;min-width:210px">🚗 Start Road Trip</button>
      <button id="btn-scores" class="game-btn" style="font-size:15px;padding:10px 32px">🏆 High Scores</button>
      <a href="/index.html" style="color:#666;font-size:13px;text-decoration:none;margin-top:4px">← Mucko's Games</a>
    </div>
  `;

  const canvas = document.getElementById('tc');
  const ctx = canvas.getContext('2d');
  let rafId;

  function frame(ts) {
    const t = ts / 1000;
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.65);
    sky.addColorStop(0, '#0d1b2a');
    sky.addColorStop(0.45, '#1a3a5c');
    sky.addColorStop(1, '#b05818');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // Sun
    const sunGrad = ctx.createRadialGradient(650, H*0.38, 0, 650, H*0.38, 90);
    sunGrad.addColorStop(0, 'rgba(255,220,100,0.9)');
    sunGrad.addColorStop(0.35, 'rgba(255,160,50,0.55)');
    sunGrad.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath(); ctx.arc(650, H*0.38, 90, 0, Math.PI*2); ctx.fill();

    // Mountain silhouette (Alps)
    ctx.fillStyle = '#152030';
    ctx.beginPath(); ctx.moveTo(0, H*0.58);
    [[0,0.58],[70,0.36],[140,0.46],[230,0.28],[320,0.38],[400,0.24],[490,0.33],[570,0.43],[650,0.30],[730,0.40],[820,0.53],[820,1],[0,1]]
      .forEach(([x,y]) => ctx.lineTo(x, H*y));
    ctx.fill();

    // Road
    const ry = H * 0.63;
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(0, ry, W, H-ry);
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, ry, W, 3);
    // Dashes
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.setLineDash([40,40]); ctx.lineDashOffset = -(t*180%80);
    ctx.beginPath(); ctx.moveTo(0, ry+(H-ry)*0.45); ctx.lineTo(W, ry+(H-ry)*0.45); ctx.stroke();
    ctx.setLineDash([]);

    // Car
    const carX = ((t * 90) % (W + 180)) - 90;
    drawCar(ctx, carX, ry + 8);

    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
  _cleanup = () => cancelAnimationFrame(rafId);

  document.getElementById('btn-play').addEventListener('click', () => goTo(buildSetup));
  document.getElementById('btn-scores').addEventListener('click', showHighScoresModal);
}

function buildStop(app, stopIdx) {
  gs.stepIdx = stopIdx;

  const isLast = stopIdx === STOPS.length - 1;
  const gameOver = !isLast && (gs.gas <= 0 || gs.euros <= 3);

  app.style.background = `linear-gradient(160deg,${stop.bgTop},${stop.bgBot})`;

  const allActs = [...stop.activities, ...universalActs(stop)];

  function actBtn(act) {
    const done      = !!gs.done[act.id];
    const noEuros   = act.cost.euros && gs.euros < act.cost.euros;
    const disabled  = done || noEuros;
    return `
      <button class="act-btn" data-act="${act.id}" ${disabled?'disabled':''}
        style="display:flex;align-items:center;column-gap:10px;width:100%;padding:11px 14px;margin-bottom:8px;
               background:${done?'rgba(80,192,112,0.08)':'rgba(15,12,5,0.85)'};
               border:1px solid ${done?'#50c070':noEuros?'#333':'#c8901a'};border-radius:8px;
               color:${done?'#50c070':noEuros?'#444':'#e8d8b0'};
               font-family:Georgia,serif;font-size:14px;cursor:${disabled?'default':'pointer'};
               text-align:left;touch-action:manipulation">
        <span style="font-size:26px">${act.emoji}</span>
        <span>
          <strong>${act.label}</strong>${done?' ✓':''}<br>
          <span style="font-size:11px;color:#777">${act.desc}</span>
        </span>
      </button>`;
  }

  const driveLabel = isLast
    ? `🏁 We've arrived in Leipzig!`
    : `🚗 Drive to ${STOPS[stopIdx+1].name} ${STOPS[stopIdx+1].country}`;

  app.innerHTML = `
    <div style="position:absolute;top:0;left:0;width:620px;height:${H}px;padding:18px 20px;overflow-y:auto">
      <div style="display:flex;align-items:center;column-gap:12px;margin-bottom:12px">
        <div style="font-size:44px">${stop.landmark}</div>
        <div>
          <div style="font-size:26px;font-weight:bold;color:#ffd700;text-shadow:1px 1px 3px #000">${stop.country} ${stop.name}</div>
          <div style="font-size:12px;color:#c8d0b0;margin-top:2px">${stop.desc}</div>
        </div>
      </div>

      <div id="stop-log" style="background:rgba(0,0,0,0.4);border:1px solid rgba(200,144,26,0.25);
           border-radius:6px;padding:8px 10px;min-height:56px;margin-bottom:12px">
        ${renderLog()}
      </div>

      ${gameOver ? gameOverPanel() : `
        <div style="font-size:10px;color:#c8901a;margin-bottom:7px;letter-spacing:1px">ACTIVITIES</div>
        ${allActs.map(actBtn).join('')}
        <div style="margin-top:8px">
          <button id="btn-drive" class="game-btn primary" style="width:100%;font-size:16px;padding:14px">${driveLabel}</button>
        </div>
      `}
    </div>
    ${buildResourcePanel()}
  `;

  // Wire activity buttons
  app.querySelectorAll('.act-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = allActs.find(a => a.id === btn.dataset.act);
      if (!act || gs.done[act.id]) return;
      if (act.cost.euros && gs.euros < act.cost.euros) {
        addLog('❌ Not enough euros!', 'bad'); refreshLog(); return;
      }
      gs.done[act.id] = true;
      if (act.minigame === 'photo') {
        goTo(buildPhotoGame, stopIdx);
        return;
      }
      act.effect(gs);
      gs.gas    = clamp(gs.gas);
      gs.snacks = clamp(gs.snacks);
      gs.bladder= clamp(gs.bladder,0,100);
      gs.euros  = Math.max(0, gs.euros);
      addLog(`✓ ${act.label} — ${act.desc}`, 'good');
      goTo(buildStop, stopIdx);
    });
  });

  const driveBtn = document.getElementById('btn-drive');
  if (driveBtn) {
    driveBtn.addEventListener('click', () => {
      if (isLast) { gs.arrived = true; goTo(buildEnding); }
      else goTo(buildDriving, stopIdx + 1);
    });
  }

  const contBtn = document.getElementById('btn-continue');
  if (contBtn) {
    contBtn.addEventListener('click', () => {
      gs.gas    = Math.max(gs.gas, 30);
      gs.euros  = Math.max(gs.euros, 20);
      gs.score  = 0;
      gs.continueUsed = true;
      addLog('🔄 Continue used — score reset to zero.', 'event');
      goTo(buildStop, stopIdx);
    });
  }
  const giveupBtn = document.getElementById('btn-giveup');
  if (giveupBtn) giveupBtn.addEventListener('click', () => goTo(buildEnding));
}

  1: { // Matterhorn
    title: 'Alpine Wildlife',
    animals: ['🦅','🐐','🦫','🌸','🦅','🐐'],
    bgTop: '#0a1520', bgBot: '#1a3060',
    hillColor: '#1a2a3a',
    hint: 'Tap the animals before they vanish!',
  },
  3: { // Budapest
    title: 'Danube Wildlife',
    animals: ['🦢','🦆','🐟','🦢','🦆','🦆'],
    bgTop: '#0a0a1a', bgBot: '#101830',
    hillColor: '#0a1a2a',
    hint: 'Watch for Duck Dieb on the Danube!',
  },
  5: { // Munich
    title: 'English Garden Wildlife',
    animals: ['🐿️','🦌','🦋','🐿️','🐦','🦌'],
    bgTop: '#0a1a0a', bgBot: '#142010',
    hillColor: '#1a2a10',
    hint: 'Snap the garden critters!',
  },
};

function buildPhotoGame(app, stopIdx) {
  const cfg = PHOTO_CONFIGS[stopIdx] || PHOTO_CONFIGS[1];
  const DURATION = 25;
  const HIT_R = 52; // generous tap radius in canvas px

  let targets   = []; // { emoji, x, y, scale, bobPhase, life, maxLife, shot, flashT }
  let sparks    = []; // { x, y, vx, vy, life, color }
  let timeLeft  = DURATION;
  let photos    = 0;
  let done      = false;
  let lastTs    = 0;
  let spawnT    = 0;
  let nextSpawn = 1.2;

  app.style.background = `linear-gradient(160deg,${cfg.bgTop},${cfg.bgBot})`;
  app.innerHTML = `
    <canvas id="pg" width="${W}" height="${H}" style="position:absolute;top:0;left:0;cursor:crosshair"></canvas>
    <div style="position:absolute;top:0;left:0;width:${W}px;pointer-events:none">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 18px;
                  background:rgba(0,0,0,0.55)">
        <div id="pg-timer" style="font-size:16px;font-weight:bold;color:#ffe8a0;text-shadow:1px 1px 3px #000">
          TIME: ${DURATION}s
        </div>
        <div style="font-size:13px;color:#c8d0b0">${cfg.hint}</div>
        <div id="pg-photos" style="font-size:16px;font-weight:bold;color:#50c070;text-shadow:1px 1px 3px #000">
          📸 0
        </div>
      </div>
    </div>
  `;

  const canvas = document.getElementById('pg');
  const ctx    = canvas.getContext('2d');

  function spawnTarget() {
    const margin = 80;
    const x = margin + Math.random() * (W - margin * 2);
    const y = H * 0.28 + Math.random() * (H * 0.45);
    const emoji = cfg.animals[Math.floor(Math.random() * cfg.animals.length)];
    targets.push({
      emoji, x, y,
      scale:    0,
      bobPhase: Math.random() * Math.PI * 2,
      life:     0,
      maxLife:  2.0 + Math.random() * 1.5,
      shot:     false,
      flashT:   0,
    });
  }

  function update(dt) {
    if (done) return;
    timeLeft -= dt;
    spawnT   += dt;

    if (spawnT >= nextSpawn) {
      spawnT = 0;
      nextSpawn = 1.0 + Math.random() * 1.4;
      if (targets.filter(t => !t.shot).length < 3) spawnTarget();
    }

    targets.forEach(t => {
      t.life += dt;
      // Pop in
      if (!t.shot) t.scale = Math.min(1, t.scale + dt * 4);
      // Flash decay
      if (t.shot) { t.flashT += dt; t.scale = Math.max(0, t.scale - dt * 5); }
    });
    targets = targets.filter(t => t.life < t.maxLife || (t.shot && t.scale > 0));

    // Sparks
    sparks.forEach(s => { s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=120*dt; s.life-=dt; });
    sparks = sparks.filter(s => s.life > 0);

    // UI
    const tel = document.getElementById('pg-timer');
    if (tel) tel.textContent = `TIME: ${Math.ceil(Math.max(0,timeLeft))}s`;

    if (timeLeft <= 0) finish();
  }

  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    // Sky
    const sky = ctx.createLinearGradient(0,0,0,H*0.6);
    sky.addColorStop(0, cfg.bgTop);
    sky.addColorStop(1, cfg.bgBot);
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    // Hills
    ctx.fillStyle = cfg.hillColor;
    ctx.beginPath(); ctx.moveTo(0, H*0.55);
    for (let i=0; i<=14; i++) {
      ctx.lineTo((i/14)*W, H*0.55 - 50 - Math.sin(i*1.1)*35 - Math.cos(i*1.9)*20);
    }
    ctx.lineTo(W,H*0.55); ctx.lineTo(0,H*0.55); ctx.closePath(); ctx.fill();

    // Ground
    ctx.fillStyle = cfg.hillColor;
    ctx.fillRect(0, H*0.55, W, H-H*0.55);

    // Vignette
    const vig = ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.75);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);

    // Viewfinder corners
    const cLen = 30, cT = 3;
    ctx.strokeStyle = 'rgba(255,232,160,0.8)'; ctx.lineWidth = cT;
    [[20,44],[W-20,44],[20,H-20],[W-20,H-20]].forEach(([cx,cy]) => {
      const sx = cx < W/2 ? 1 : -1, sy = cy < H/2 ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*cLen,cy); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx,cy); ctx.lineTo(cx,cy+sy*cLen); ctx.stroke();
    });

    // Targets
    targets.forEach(t => {
      if (t.scale <= 0) return;
      ctx.save();
      ctx.translate(t.x, t.y + Math.sin(ts*0.003 + t.bobPhase)*4);
      ctx.scale(t.scale, t.scale);
      if (t.shot) {
        ctx.globalAlpha = Math.max(0, 1 - t.flashT * 3);
        // White flash ring
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.globalAlpha *= 0.8;
        ctx.beginPath(); ctx.arc(0,0,HIT_R*0.7,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha = Math.max(0, 1 - t.flashT * 3);
      }
      // Emoji
      ctx.font = '44px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t.emoji, 0, 0);
      // Subtle shadow ring on unshot targets
      if (!t.shot) {
        ctx.strokeStyle = 'rgba(255,232,160,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    });

    // Sparks
    sparks.forEach(s => {
      ctx.globalAlpha = s.life;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Center crosshair (subtle)
    ctx.strokeStyle = 'rgba(255,232,160,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2-10,H/2); ctx.lineTo(W/2+10,H/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W/2,H/2-10); ctx.lineTo(W/2,H/2+10); ctx.stroke();
  }

  let rafId;
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min((ts-lastTs)/1000, 0.1); lastTs = ts;
    update(dt);
    draw(ts);
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
  _cleanup = () => cancelAnimationFrame(rafId);

  function handleTap(e) {
    if (done) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const cx = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * scaleX;
    const cy = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top)  * scaleY;

    let hit = false;
    targets.forEach(t => {
      if (t.shot) return;
      const dx = cx - t.x, dy = cy - (t.y + Math.sin(Date.now()*0.003 + t.bobPhase)*4);
      if (dx*dx + dy*dy < HIT_R*HIT_R) {
        t.shot = true; t.flashT = 0;
        photos++;
        hit = true;
        // Sparks burst
        for (let i=0; i<14; i++) {
          const ang = (i/14)*Math.PI*2;
          sparks.push({ x:t.x, y:t.y, vx:Math.cos(ang)*80, vy:Math.sin(ang)*80-40,
                        life:0.7, color: i%2===0 ? '#ffd700' : '#fff' });
        }
        const el = document.getElementById('pg-photos');
        if (el) el.textContent = `📸 ${photos}`;
      }
    });
    // Miss flash — brief red tint on canvas border
    if (!hit) {
      canvas.style.outline = '3px solid rgba(200,50,50,0.6)';
      setTimeout(() => { canvas.style.outline = ''; }, 150);
    }
  }

  canvas.addEventListener('click', handleTap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTap(e); }, {passive:false});

  function finish() {
    if (done) return;
    done = true;
    cancelAnimationFrame(rafId);

    const earned = photos * 12;
    gs.score += earned;
    addLog(`📸 Wildlife Photography: ${photos} photo${photos!==1?'s':''} — +${earned}pts!`, 'good');

    showModal(
      `📸 ${cfg.title}`,
      `You snapped ${photos} photo${photos!==1?'s':''}!<br>` +
      `<span style="color:#ffd700;font-size:20px;font-weight:bold">+${earned} points</span>`,
      [{ label: '← Back to ' + STOPS[stopIdx].name, fn: () => goTo(buildStop, stopIdx) }]
    );
  }
}

// ── Driving Screen ────────────────────────────────────────────────────────────
function buildDriving(app, nextIdx) {
  const from = STOPS[nextIdx - 1];
  const to   = STOPS[nextIdx];
  const diff = gs.difficulty;
  const costMult = diff === 'easy' ? 0.6 : diff === 'hard' ? 1.45 : 1.0;

  const gasUsed    = Math.round((to.gasToHere || 15) * costMult);
  const snackUsed  = Math.round(8 * costMult);
  const bladderAdd = Math.round(15 + Math.random() * 12);

  gs.gas     = clamp(gs.gas    - gasUsed);
  gs.snacks  = clamp(gs.snacks - snackUsed);
  gs.bladder = clamp(gs.bladder + bladderAdd, 0, 100);
  addLog(`🚗 Driving ${from.name} → ${to.name}...`, 'info');
  addLog(`⛽ Used ${gasUsed} gas · 🍿 Ate ${snackUsed} snacks en route.`, 'normal');

  // Pick events
  const maxEvt = diff === 'easy' ? 1 : diff === 'hard' ? 3 : 2;
  const numEvt = Math.floor(Math.random() * (maxEvt + 1));
  const queue  = [];
  // Force bladder event if urgent
  if (gs.bladder > 72) {
    const bev = EVENTS.find(e => e.id === 'bladder');
    if (bev) queue.push(bev);
  }
  const shuffled = [...EVENTS].sort(() => Math.random() - 0.5);
  for (const ev of shuffled) {
    if (queue.length >= numEvt) break;
    if (queue.find(e => e.id === ev.id)) continue;
    queue.push(ev);
  }

  app.style.background = '#0d1b2a';
  app.innerHTML = `
    <canvas id="dc" width="${W}" height="${H}" style="position:absolute;top:0;left:0"></canvas>
    <div style="position:absolute;top:22px;left:0;width:${W}px;text-align:center;pointer-events:none">
      <div style="font-size:22px;color:#ffd700;text-shadow:1px 1px 4px #000">🚗 On the road...</div>
      <div style="font-size:14px;color:#e8d8b0;margin-top:5px">${from.name} ${from.country} → ${to.name} ${to.country}</div>
    </div>
  `;

  const canvas = document.getElementById('dc');
  const ctx = canvas.getContext('2d');
  let rafId;

  // Pick scenery color for this leg
  const sceneColors = ['#1a3a2a','#2a4a1a','#1a3040','#2a1a3a','#1a3020','#2a1a10','#1a3a3a'];
  const sceneColor = sceneColors[nextIdx % sceneColors.length];

  function frame(ts) {
    const t = ts / 1000;
    ctx.clearRect(0, 0, W, H);
    // Sky
    const sky = ctx.createLinearGradient(0,0,0,H*0.6);
    sky.addColorStop(0,'#0d1b2a'); sky.addColorStop(1,'#1a2a20');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
    // Hills
    ctx.fillStyle = sceneColor;
    ctx.beginPath(); ctx.moveTo(0, H*0.55);
    for (let i=0; i<=14; i++) {
      const x = (i/14)*W;
      const y = H*0.55 - (55 + Math.sin(i*0.9+1)*35 + Math.cos(i*1.6+2)*20);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W,H*0.55); ctx.lineTo(0,H*0.55); ctx.closePath(); ctx.fill();
    // Road
    const ry = H*0.55;
    ctx.fillStyle='#252525'; ctx.fillRect(0,ry,W,H-ry);
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
    ctx.setLineDash([40,40]); ctx.lineDashOffset=-(t*200%80);
    ctx.beginPath(); ctx.moveTo(0,ry+(H-ry)*0.45); ctx.lineTo(W,ry+(H-ry)*0.45); ctx.stroke();
    ctx.setLineDash([]);
    // Car (centered, slight wobble)
    drawCar(ctx, W/2 - 40 + Math.sin(t*2.8)*1.5, ry + 8);
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
  _cleanup = () => cancelAnimationFrame(rafId);

  // Process events then go to next stop
  let evIdx = 0;
  function nextEvent() {
    if (evIdx >= queue.length) {
      cancelAnimationFrame(rafId);
      goTo(buildStop, nextIdx);
      return;
    }
    const ev = queue[evIdx++];
    const textStr = typeof ev.text === 'function' ? ev.text(gs) : ev.text;
    const buttons = ev.choices.map(ch => {
      const unavailable = ch.canAfford ? !ch.canAfford(gs) : false;
      const em = ch.label.match(/^\s*(\p{Extended_Pictographic}(?:\uFE0F|\u200D\p{Extended_Pictographic})*)/u);
      const ic = em ? em[1] : '▶';
      const tx = em ? ch.label.slice(em[0].length).trim() : ch.label;
      return {
        label: `<span class="ch-icon">${ic}</span><span class="ch-txt">${tx}</span><br><small style="color:#888;font-size:11px">${ch.desc}</small>`,
        disabled: unavailable,
        fn: () => {
          ch.effect(gs);
          gs.gas    = clamp(gs.gas);
          gs.snacks = clamp(gs.snacks);
          gs.euros  = Math.max(0, gs.euros);
          gs.bladder= clamp(gs.bladder,0,100);
          addLog(`${ev.emoji} ${ev.title}`, 'event');
          nextEvent();
        }
      };
    });
    showModal(`<span class="ev-big">${ev.emoji}</span>${ev.title}`, textStr, buttons);
  }

  setTimeout(nextEvent, 900);
}

// ── Ending Screen ─────────────────────────────────────────────────────────────
var _endActx=null;
function playEndSting(kind){
  try{
    if(!_endActx) _endActx = new (window.AudioContext||window.webkitAudioContext)();
    var actx=_endActx; if(actx.state!=='running') actx.resume();
    var t0=actx.currentTime;
    var notes = kind==='win' ? [[523,0],[659,0.12],[784,0.24],[1047,0.36]] : [[392,0],[330,0.12],[262,0.24],[196,0.36]];
    notes.forEach(function(n){
      var o=actx.createOscillator(), g=actx.createGain();
      o.type = kind==='win' ? 'triangle' : 'sine';
      o.frequency.value = n[0];
      g.gain.setValueAtTime(0.0001, t0+n[1]);
      g.gain.exponentialRampToValueAtTime(0.22, t0+n[1]+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+n[1]+0.36);
      o.connect(g); g.connect(actx.destination);
      o.start(t0+n[1]); o.stop(t0+n[1]+0.4);
    });
  }catch(e){}
}

function buildEnding(app) {
  const arrived = gs.arrived;
  playEndSting(arrived ? 'win' : 'lose');
  let score = gs.score;
  const breakdown = [];

  if (arrived) { score += 500; breakdown.push(['Safe arrival bonus 🏁', 500, 'pos']); }
  const gasB = Math.round(gs.gas * 0.5);       if (gasB  > 0) { score += gasB;  breakdown.push([`Gas remaining`,     gasB,  'pos']); }
  const eurB = Math.round(gs.euros * 0.8);      if (eurB  > 0) { score += eurB;  breakdown.push([`Euros remaining`,   eurB,  'pos']); }
  const snkB = Math.round(gs.snacks * 0.3);     if (snkB  > 0) { score += snkB;  breakdown.push([`Snacks remaining`,  snkB,  'pos']); }
  if (gs.continueUsed) breakdown.push(['Continue used', 0, 'neg']);

  const diffMult = gs.difficulty === 'hard' ? 1.5 : gs.difficulty === 'easy' ? 0.7 : 1.0;
  const finalScore = Math.round(score * diffMult);

  const rating = finalScore >= 900 ? 'Legendary Road Warrior 🏆'
               : finalScore >= 650 ? 'Expert Traveler ⭐'
               : finalScore >= 400 ? 'Good Journey 🚗'
               : finalScore >= 200 ? 'Rough Ride 😅'
               : 'Stranded... 💀';

  const entry = { score: finalScore, name: gs.name, diff: gs.difficulty, rating, date: gs.date };
  const rank  = saveHS(entry);
  const hsList = getHS();

  app.style.background = 'linear-gradient(160deg,#0d1b2a,#0d1a0d)';
  app.innerHTML = `
    <div style="width:${W}px;height:${H}px;overflow-y:auto;color:#e8d8b0;font-family:Georgia,serif;padding:26px 44px">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:84px;line-height:1;margin-bottom:2px">${arrived?'🏆 🎉':'😵 💀'}</div>
        <div style="font-size:28px;font-weight:bold;color:${arrived?'#ffd700':'#c05050'};text-shadow:${arrived?'0 0 14px rgba(255,215,0,.45)':'none'}">${arrived?'You made it to Leipzig!':'Road Trip Cut Short'}</div>
        <div style="font-size:15px;color:#c8901a;margin-top:5px">${rating}</div>
        ${rank<=3?`<div style="font-size:14px;color:#ffd700;margin-top:5px">★ New high score — rank #${rank}! ★</div>`:''}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px">
        <div style="background:rgba(0,0,0,0.4);border:1px solid #c8901a;border-radius:8px;padding:15px">
          <div style="font-size:10px;color:#c8901a;margin-bottom:10px;letter-spacing:1px">SCORE BREAKDOWN</div>
          ${breakdown.map(([lbl,val,dir])=>`
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${lbl}</span>
              <span style="color:${dir==='pos'?'#50c070':'#888'}">${dir==='pos'?'+':''}${val}</span>
            </div>`).join('')}
          ${diffMult!==1?`<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:6px;border-top:1px solid #444;padding-top:6px">
            <span>Difficulty (${gs.difficulty})</span><span style="color:#c8901a">×${diffMult}</span>
          </div>`:''}
          <div style="display:flex;justify-content:space-between;font-size:17px;font-weight:bold;
                      margin-top:8px;border-top:1px solid #c8901a;padding-top:8px">
            <span>FINAL SCORE</span><span style="color:#ffd700">${finalScore}</span>
          </div>
        </div>

        <div style="background:rgba(0,0,0,0.4);border:1px solid #c8901a;border-radius:8px;padding:15px">
          <div style="font-size:10px;color:#c8901a;margin-bottom:10px;letter-spacing:1px">HIGH SCORES</div>
          ${hsList.slice(0,8).map((e,i)=>`
            <div style="display:flex;column-gap:6px;font-size:12px;margin-bottom:3px;
                        ${e.score===finalScore&&e.name===gs.name?'color:#ffd700;font-weight:bold':''}">
              <span style="width:18px;color:#666">${i+1}.</span>
              <span style="flex:1">${e.name}</span>
              <span style="color:#50c070">${e.score}</span>
              <span style="color:#555;font-size:10px">${e.diff}</span>
            </div>`).join('')}
        </div>
      </div>

      <div style="display:flex;column-gap:12px;justify-content:center">
        <button id="btn-again" class="game-btn primary" style="font-size:16px;padding:13px 32px">🚗 Play Again</button>
        <a href="/index.html"><button class="game-btn" style="font-size:16px;padding:13px 32px">🏠 Main Menu</button></a>
      </div>
    </div>
  `;

  document.getElementById('btn-again').addEventListener('click', () => goTo(buildTitle));
}

// ── High Scores Modal ─────────────────────────────────────────────────────────
function showHighScoresModal() {
  const list = getHS();
  if (!list.length) {
    showModal('🏆 High Scores', 'No scores yet — hit the road!', [{label:'✓ OK', fn:()=>{}}]);
    return;
  }
  const rows = list.slice(0,10).map((e,i)=>`
    <div style="display:flex;column-gap:8px;font-size:13px;margin-bottom:4px">
      <span style="width:22px;color:#666">${i+1}.</span>
      <span style="flex:1">${e.name}</span>
      <span style="color:#50c070">${e.score}</span>
      <span style="color:#666;font-size:11px">${e.diff}</span>
    </div>`).join('');
  showModal('🏆 High Scores', `<div style="text-align:left">${rows}</div>`, [{label:'✗ Close', fn:()=>{}}]);
}

// ── Init ──────────────────────────────────────────────────────────────────────
scaleToViewport();
goTo(buildTitle);
</script>
