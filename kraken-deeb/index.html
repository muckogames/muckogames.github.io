<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kraken Deeb Run</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' font-size='82'%3E%F0%9F%90%B9%3C/text%3E%3C/svg%3E">
<style>
/* iOS 12 safe: no inset:, no flex gap:, no aspect-ratio */
*{box-sizing:border-box;margin:0;padding:0}
html{width:100%;height:100%;overflow:hidden}
body{
  background:#040d18;
  width:100%;height:100%;overflow:hidden;position:relative;
}
#stage{
  position:absolute;display:block;
  border:3px solid #4a6a9a;border-radius:14px;overflow:hidden;background:#0d1f38;
  box-shadow:0 24px 70px rgba(0,0,0,.65),0 0 0 8px rgba(60,100,160,.12);
}
#bgc,#gc{
  display:block;position:absolute;
  top:0;right:0;bottom:0;left:0;
  width:100%;height:100%;
}
#bgc{pointer-events:none}
#gc{cursor:default;background:transparent;touch-action:none;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="gc"></canvas>
</div>
<script>
'use strict';

// ── roundRect polyfill (Safari < 15.4) ────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r=Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);    this.quadraticCurveTo(x+w,y,    x+w,y+r);
    this.lineTo(x+w,y+h-r);  this.quadraticCurveTo(x+w,y+h,  x+w-r,y+h);
    this.lineTo(x+r,y+h);    this.quadraticCurveTo(x,  y+h,   x,  y+h-r);
    this.lineTo(x,y+r);      this.quadraticCurveTo(x,  y,     x+r,y);
    this.closePath();
  };
}

// ── Constants ─────────────────────────────────────────────────────────────
const W=800, H=560;
const MAX_RENDER_DPR=1.5;
const SIM_STEP=1/60, MAX_SIM_CATCHUP=SIM_STEP*6;
const LOW_FPS_PHASES=new Set(['title','diff','victory']);

// ── Colors ────────────────────────────────────────────────────────────────
const C={
  deepBlue: '#0d1f38',
  midBlue:  '#163050',
  gold:     '#f6d57a',
  cream:    '#fcf6eb',
  subYellow:'#f5d040',
  wallGrey: '#3a3a4a',
  floorGrey:'#2a2a38',
  donRed:   '#cc3322',
  krakGreen:'#3a8a5a',
  dimTxt:   '#8a9ab8',
  ink:      '#0a1420',
  white:    '#ffffff',
  orange:   '#f09030',
};

// ── Canvas + stage ────────────────────────────────────────────────────────
const stage=document.getElementById('stage');
const bgCanvas=document.getElementById('bgc');
const canvas=document.getElementById('gc');
const bgCtx=bgCanvas.getContext('2d');
const ctx=canvas.getContext('2d');

function configureCtx(c){c.lineJoin='round';c.lineCap='round';c.imageSmoothingEnabled=true;}
function renderDpr(){return Math.min(MAX_RENDER_DPR,Math.max(1,window.devicePixelRatio||1));}
function safeViewW(){const vv=window.visualViewport;return vv?vv.width:window.innerWidth;}
function safeViewH(){const vv=window.visualViewport;return vv?vv.height:window.innerHeight;}

let canvasScale=1;
function resize(){
  const vw=safeViewW(), vh=safeViewH(), dpr=renderDpr();
  const s=Math.min(vw/(W+6),(vh-6)/(H+6));
  canvasScale=s;
  const sw=Math.max(1,Math.round(W*s)), sh=Math.max(1,Math.round(H*s));
  stage.style.width=sw+'px'; stage.style.height=sh+'px';
  stage.style.left=Math.round((vw-sw)/2)+'px';
  stage.style.top=Math.round((vh-sh)/2)+'px';
  bgCanvas.width=Math.max(1,Math.round(W*dpr)); bgCanvas.height=Math.max(1,Math.round(H*dpr));
  canvas.width=Math.max(1,Math.round(W*dpr));   canvas.height=Math.max(1,Math.round(H*dpr));
  bgCtx.setTransform(dpr,0,0,dpr,0,0); ctx.setTransform(dpr,0,0,dpr,0,0);
  configureCtx(bgCtx); configureCtx(ctx);
  clearBackdropCache();
}
// ── Backdrop cache ────────────────────────────────────────────────────────
// Must be initialized before resize() is called (resize calls clearBackdropCache)
const backdropCache=new Map();
let activeBackdropKey=null;
function clearBackdropLayer(){bgCtx.clearRect(0,0,W,H);activeBackdropKey=null;}
function clearBackdropCache(){backdropCache.clear();clearBackdropLayer();}
function snapshotBackdrop(){
  const c=document.createElement('canvas');
  c.width=canvas.width;c.height=canvas.height;
  const cx=c.getContext('2d');cx.imageSmoothingEnabled=true;cx.drawImage(canvas,0,0);
  return c;
}
function presentBackdrop(c){bgCtx.clearRect(0,0,W,H);bgCtx.drawImage(c,0,0,c.width,c.height,0,0,W,H);}
function drawCachedBackdrop(key,fn){
  let c=backdropCache.get(key);
  if(!c){fn();c=snapshotBackdrop();backdropCache.set(key,c);ctx.clearRect(0,0,W,H);}
  if(activeBackdropKey!==key){presentBackdrop(c);activeBackdropKey=key;}
}

window.addEventListener('resize',resize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',resize);
  window.visualViewport.addEventListener('scroll',resize);
}
resize();

// ── Input ─────────────────────────────────────────────────────────────────
const K={}, JP={};
document.addEventListener('keydown',e=>{if(!K[e.code])JP[e.code]=true;K[e.code]=true;});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function eat(c){if(JP[c]){JP[c]=false;return true;}return false;}
let mx=W/2, my=H/2, mclk=false, touchSuppressUntil=0;
canvas.addEventListener('click',e=>{
  if(performance.now()<touchSuppressUntil)return;
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
  mclk=true;
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height);
});

// ── Touch + Mobile Controls ───────────────────────────────────────────────
const TOUCH_UI=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0||
  (window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
const touchState={dirs:new Set(), buttons:new Set()};

function mobileControlsOn(){return TOUCH_UI;}

function mobileLayout(){
  const btns=[];
  if(phase==='sub1'||phase==='sub2'){
    btns.push({id:'thrust',cx:W-88,cy:H-100,r:62,label:'GO',sub:'Thrust'});
    if(phase==='sub1'&&s1&&s1NearStation()){
      btns.push({id:'refuel',cx:W-88,cy:H-224,r:44,label:'E',sub:'Refuel'});
    }
    if(phase==='sub2'){
      const dodgeActive=s2&&s2.chargeFalling;
      btns.push({id:'dodge',cx:W-88,cy:H-224,r:50,label:'A',sub:'Dodge',hot:dodgeActive});
      if(cigarsFound>0){
        btns.push({id:'cigar',cx:W-210,cy:H-150,r:40,label:'C',sub:'Cigar\xD7'+cigarsFound});
      }
      if(s2&&s2NearStation()){
        btns.push({id:'refuel',cx:90,cy:H-100,r:44,label:'E',sub:'Refuel'});
      }
      return {dpad:null,buttons:btns};
    }
    // Sub1 has a D-pad for 4-direction piloting (left, right, up, down)
    return {dpad:{cx:90,cy:H-100,r:58},buttons:btns};
  }
  if(phase==='heist'||phase==='home'){
    btns.push({id:'act',cx:W-88,cy:H-100,r:46,label:'ACT',sub:'Use/Lock'});
    return {dpad:{cx:90,cy:H-100,r:58},buttons:btns};
  }
  return {dpad:null,buttons:[]};
}

function getMobileDpadDir(tx,ty,dpad){
  const dx=tx-dpad.cx, dy=ty-dpad.cy;
  if(Math.hypot(dx,dy)>dpad.r*2.4)return null;
  return Math.abs(dx)>=Math.abs(dy)?(dx<0?'left':'right'):(dy<0?'up':'down');
}

function hitMobileControl(tx,ty){
  if(!mobileControlsOn())return null;
  const layout=mobileLayout();
  for(const btn of layout.buttons){
    if(Math.hypot(tx-btn.cx,ty-btn.cy)<=btn.r)return {kind:'button',id:btn.id};
  }
  if(layout.dpad){
    const dir=getMobileDpadDir(tx,ty,layout.dpad);
    if(dir)return {kind:'dpad',dir};
  }
  return null;
}

function fireMobileButtonDown(id){
  if(id==='dodge')JP['KeyA']=true;
  else if(id==='cigar')JP['KeyC']=true;
  else if(id==='act')JP['KeyE']=true;
}

function syncTouchControls(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const newDirs=new Set(), newBtns=new Set();
  for(let i=0;i<e.touches.length;i++){
    const t=e.touches[i];
    const tx=(t.clientX-rect.left)*sx, ty=(t.clientY-rect.top)*sy;
    const hit=hitMobileControl(tx,ty);
    if(hit){
      if(hit.kind==='dpad')newDirs.add(hit.dir);
      else if(hit.kind==='button')newBtns.add(hit.id);
    }
  }
  for(const id of newBtns){if(!touchState.buttons.has(id))fireMobileButtonDown(id);}
  touchState.dirs=newDirs; touchState.buttons=newBtns;
  K['ArrowLeft']=newDirs.has('left'); K['ArrowRight']=newDirs.has('right');
  K['ArrowUp']=newDirs.has('up');     K['ArrowDown']=newDirs.has('down');
  if(e.touches.length>0){
    const t=e.touches[0];
    mx=(t.clientX-rect.left)*sx; my=(t.clientY-rect.top)*sy;
  }
}
function clearTouch(){
  touchState.dirs=new Set(); touchState.buttons=new Set();
  K['ArrowLeft']=K['ArrowRight']=K['ArrowUp']=K['ArrowDown']=false;
}
canvas.addEventListener('touchstart',e=>{
  touchSuppressUntil=performance.now()+500;
  syncTouchControls(e);
  if(e.touches.length>0){
    const r=canvas.getBoundingClientRect();
    mx=(e.touches[0].clientX-r.left)*(W/r.width);
    my=(e.touches[0].clientY-r.top)*(H/r.height);
    mclk=true;
  }
},{passive:false});
canvas.addEventListener('touchmove',syncTouchControls,{passive:false});
canvas.addEventListener('touchend',syncTouchControls,{passive:false});
canvas.addEventListener('touchcancel',e=>{clearTouch();},{passive:false});
window.addEventListener('blur',clearTouch);

// ── Drawing helpers ───────────────────────────────────────────────────────
function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function rnd(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||1.5;ctx.stroke();}
}
function circ(x,y,r,fill,stroke,sw){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||1.5;ctx.stroke();}
}
function txt(s,x,y,c,size,align,font){
  ctx.fillStyle=c;
  ctx.font=(size||16)+'px '+(font||"'Trebuchet MS',Verdana,sans-serif");
  ctx.textAlign=align||'left';
  ctx.fillText(s,x,y);
}
function ln(x1,y1,x2,y2,c,w){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=c;ctx.lineWidth=w||1.5;ctx.stroke();
}
function inRect(px,py,x,y,w,h){return px>=x&&px<=x+w&&py>=y&&py<=y+h;}

// ── Mobile controls drawing ───────────────────────────────────────────────
function drawChevron(x,y,dir,col){
  const s=9;
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
  if(dir==='up'){ctx.moveTo(x-s,y+s*0.5);ctx.lineTo(x,y-s*0.5);ctx.lineTo(x+s,y+s*0.5);}
  else if(dir==='down'){ctx.moveTo(x-s,y-s*0.5);ctx.lineTo(x,y+s*0.5);ctx.lineTo(x+s,y-s*0.5);}
  else if(dir==='left'){ctx.moveTo(x+s*0.5,y-s);ctx.lineTo(x-s*0.5,y);ctx.lineTo(x+s*0.5,y+s);}
  else{ctx.moveTo(x-s*0.5,y-s);ctx.lineTo(x+s*0.5,y);ctx.lineTo(x-s*0.5,y+s);}
  ctx.stroke();
}
function drawMobileControls(){
  if(!mobileControlsOn())return;
  const layout=mobileLayout();
  ctx.save();ctx.globalAlpha=0.94;
  if(layout.dpad){
    const d=layout.dpad;
    circ(d.cx,d.cy,d.r*0.78,'rgba(20,12,30,0.58)','rgba(200,160,96,0.5)',2);
    const dirs=[
      {id:'up',   x:d.cx,        y:d.cy-d.r-6},
      {id:'down', x:d.cx,        y:d.cy+d.r+6},
      {id:'left', x:d.cx-d.r-6, y:d.cy},
      {id:'right',x:d.cx+d.r+6, y:d.cy},
    ];
    for(const p of dirs){
      const a=touchState.dirs.has(p.id);
      circ(p.x,p.y,40,a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.66)',a?C.gold:'rgba(200,160,96,0.45)',2);
      drawChevron(p.x,p.y,p.id,a?'#fff6d8':'#efe2c2');
    }
  }
  for(const btn of layout.buttons){
    const a=touchState.buttons.has(btn.id);
    const fill=btn.hot?(a?'rgba(200,50,30,0.7)':'rgba(170,30,20,0.6)'):(a?'rgba(200,160,96,0.34)':'rgba(25,16,36,0.7)');
    const stroke=btn.hot?'#ff6644':(a?C.gold:'rgba(200,160,96,0.55)');
    circ(btn.cx,btn.cy,btn.r,fill,stroke,2.2);
    txt(btn.label,btn.cx,btn.cy+9,a?'#ffffff':'#fff7e7',btn.r>55?22:18,'center',"'Courier New',monospace");
    if(btn.sub)txt(btn.sub,btn.cx,btn.cy+btn.r+16,C.dimTxt,12,'center',"'Courier New',monospace");
  }
  ctx.restore();
}

// ── Difficulty ────────────────────────────────────────────────────────────
const DIFFS=[
  {id:'easy',  label:'Puppy Nap',     col:'#88cc88',
   chargeWindow:4.5,donRate:0.5,timerMul:1.4,starMul:1.4,
   desc:'Plenty of time. Great for first runs.'},
  {id:'medium',label:'Deeb Run',      col:C.gold,
   chargeWindow:3.0,donRate:1.0,timerMul:1.0,starMul:1.0,
   desc:'Standard mission pace.'},
  {id:'hard',  label:'Maximum Deeb', col:C.donRed,
   chargeWindow:1.8,donRate:1.5,timerMul:0.75,starMul:0.7,
   desc:'The Don is very angry.'},
];
let diff=DIFFS[1];

// ── Audio ─────────────────────────────────────────────────────────────────
var _actx=null;
function getACtx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function unlockAudio(){var a=getACtx();if(a.state!=='running')a.resume();}
document.addEventListener('touchstart',unlockAudio,{passive:true});
document.addEventListener('touchend',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
function beep(freq,vol,dur,type){
  var a=getACtx();
  a.resume().then(function(){
    var osc=a.createOscillator();var gain=a.createGain();
    osc.connect(gain);gain.connect(a.destination);
    osc.type=type||'sine';osc.frequency.value=freq;
    gain.gain.setValueAtTime(Math.min(vol,0.4),a.currentTime);
    gain.gain.setTargetAtTime(0,a.currentTime+dur*0.65,dur*0.18);
    osc.start();osc.stop(a.currentTime+dur);
  });
}
function sfxPickup(){beep(880,0.18,0.08,'square');}
function sfxCode(){beep(660,0.2,0.07);setTimeout(function(){beep(880,0.2,0.1);},80);}
function sfxLock(){beep(440,0.22,0.07,'square');setTimeout(function(){beep(660,0.18,0.1);},70);}
function sfxDodge(){beep(330,0.15,0.06,'sawtooth');}
function sfxMiss(){beep(110,0.25,0.18,'sawtooth');}
function sfxCigar(){beep(220,0.2,0.05);setTimeout(function(){beep(440,0.25,0.12,'sawtooth');},40);}
function sfxVictory(){
  var notes=[523,659,784,1047];
  notes.forEach(function(n,i){setTimeout(function(){beep(n,0.22,0.18);},i*120);});
}
function sfxAlert(){beep(880,0.3,0.12,'square');setTimeout(function(){beep(880,0.3,0.12,'square');},160);}

// ── High scores ───────────────────────────────────────────────────────────
const HS_KEY='mucko_hs_krakendeeb';
function getHS(){try{return JSON.parse(localStorage.getItem(HS_KEY)||'[]');}catch(e){return[];}}
function saveHS(entry){
  const sc=getHS();sc.push(entry);
  sc.sort((a,b)=>b.score-a.score);
  const trimmed=sc.slice(0,10);
  try{localStorage.setItem(HS_KEY,JSON.stringify(trimmed));}catch(e){}
  return trimmed.findIndex(e=>e.score===entry.score&&e.date===entry.date)+1;
}

// ── Game state ────────────────────────────────────────────────────────────
let phase='title';
let score=0;
let cigarsFound=0;
let stageScores={sub1:0,heist:0,sub2:0,home:0};
let scoreSaved=false;
let s1=null, s2=null, vic=null;

function resetRun(){
  score=0;cigarsFound=0;
  stageScores={sub1:0,heist:0,sub2:0,home:0};
  scoreSaved=false;s1=null;s2=null;vic=null;
}
function startPhase(p){
  phase=p;clearBackdropCache();
  if(p==='sub1')initSub1();
  else if(p==='sub2')initSub2();
  else if(p==='heist')initHeist();
  else if(p==='home')initHome();
  else if(p==='victory')initVictory();
}

// ── Sub1 mechanics ────────────────────────────────────────────────────────
const S1_DIST_TOTAL=10.0;       // sub2 goal (escape phase)
const S1_FUEL_MAX=3.0;
const S1_STATIONS=[1.6,4.0,6.5,9.0]; // station km positions (shared with sub2)
const S1_NEAR_DIST=0.42;        // sub2 still uses the wide refuel radius

// Sub1 (outbound) is now a 4-direction pilot section in a 12 km world.
// Stations are small buoys at varying depths — must align in BOTH axes to dock.
const SUB1_GOAL_KM=12.0;
const SUB1_STATION_Y=[170,400,240,430];          // screen Y for each S1_STATIONS entry
const SUB1_STATION_KIND=['surface','wreck','surface','kelp'];
const SUB1_NEAR_X=0.12;
const SUB1_NEAR_Y=60;
const SUB1_DRIFT=0.30;          // baseline forward km/s (always-on)
const SUB1_THRUST=1.55;         // extra forward km/s while GO held
const SUB1_BRAKE=0.55;          // forward km/s subtracted while LEFT held
const SUB1_FUEL_BURN=0.85;      // fuel/s while thrusting
const SUB1_REFUEL_RATE=1.4;
const SUB1_VY_ACCEL=520;        // px/s^2 vertical acceleration
const SUB1_VY_MAX=200;
const SUB1_DAMP=2.4;            // velocity damping per second when no input
const SUB1_TOW_SPD=0.42;        // forward km/s while Johnny Mackerel tows you
const SUB1_Y_MIN=80;
const SUB1_Y_MAX=H-60;

function s1NearStation(){
  if(!s1)return false;
  const sub=s1.sub;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(Math.abs(s1.dist-S1_STATIONS[i])<SUB1_NEAR_X &&
       Math.abs(sub.y-SUB1_STATION_Y[i])<SUB1_NEAR_Y)return true;
  }
  return false;
}
function s1NextStationIdx(){
  if(!s1)return -1;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(s1.dist<S1_STATIONS[i]+SUB1_NEAR_X)return i;
  }
  return -1;
}
function s2NearStation(){
  if(!s2)return false;
  for(var i=0;i<S1_STATIONS.length;i++){
    if(Math.abs(s2.dist-S1_STATIONS[i])<S1_NEAR_DIST)return true;
  }
  return false;
}

// Seeded decorative background objects (deterministic, no Math.random)
function makeS1BgObjects(){
  const objs=[];
  const wrecks=[0.7,1.4,2.8,3.6,4.9,5.7,7.1,7.8,9.0];
  const yWreck=[320,345,310,355,325,340,315,350,330];
  for(let i=0;i<wrecks.length;i++){
    objs.push({type:'wreck',wd:wrecks[i],y:yWreck[i],layer:0.32});
  }
  const corals=[0.3,1.0,1.8,2.5,3.2,4.0,4.8,5.6,6.3,7.0,7.9,8.7,9.4];
  const yC=[430,415,445,420,440,418,442,426,436,422,448,412,438];
  for(let i=0;i<corals.length;i++){
    objs.push({type:'coral',wd:corals[i],y:yC[i],layer:0.7});
  }
  return objs;
}

function makeS1Bubbles(){
  const bx=[70,190,310,420,540,650,730];
  const by=[310,390,265,425,350,470,285];
  const spd=[22,18,28,15,24,20,26];
  return bx.map((x,i)=>({x,y:by[i],r:3+(i%3)*1.5,vy:-spd[i],t:i*0.37}));
}

// Ocean currents — bands at fixed world positions that push the sub.
// vx is in km/s added to s.dist progress; vy is in px/s added to sub.y.
function makeSub1Currents(){
  return [
    {wd:2.5, wy:200, w:0.6, h:120, vx: 0.50, vy:  0,   tag:'east'},
    {wd:3.6, wy:380, w:0.5, h:140, vx:-0.35, vy:  0,   tag:'west'},
    {wd:5.4, wy:140, w:0.4, h:100, vx: 0,    vy: 70,   tag:'down'},
    {wd:7.6, wy:300, w:0.6, h:140, vx: 0.55, vy:-30,   tag:'east'},
    {wd:10.6,wy:260, w:0.5, h:160, vx:-0.40, vy:  0,   tag:'west'},
  ];
}

// Wandering squid — drifts in a sine pattern at a world position
function makeSub1Squids(){
  return [
    {wd:3.0,wy0:280,ampY:90, period:1.20,phase:0.0, bumpT:0},
    {wd:8.2,wy0:330,ampY:110,period:0.90,phase:1.5, bumpT:0},
  ];
}

// Bonus pearls — collectible breadcrumbs threaded between stations
function makeSub1Pearls(){
  const pts=[
    {wd:0.7, wy:240},{wd:1.1, wy:200},
    {wd:2.2, wy:260},{wd:2.9, wy:230},
    {wd:3.5, wy:340},{wd:4.4, wy:380},
    {wd:5.0, wy:300},{wd:5.7, wy:260},
    {wd:6.2, wy:240},{wd:6.9, wy:220},
    {wd:7.4, wy:280},{wd:8.0, wy:320},

function initSub1(){
  s1={
    dist:0,fuel:S1_FUEL_MAX,bobT:0,
    failed:false,failTimer:0,failMsg:'',
    sub:{x:S1_SUB_X,y:H/2,vx:0,vy:0,rot:0,propT:0},
    bgObjs:makeS1BgObjects(),
    bubbles:makeS1Bubbles(),
    currents:makeSub1Currents(),
    squids:makeSub1Squids(),
    pearls:makeSub1Pearls(),
    tow:false,towMsgT:0,
    shake:0,
    pearlsGot:0,
  };
}

const S1_SUB_X=190;     // fixed screen X of submarine
const S1_WORLD_SCALE=70; // px per km for parallax calc

function updateSub1(dt){
  const s=s1;
  if(s.failed){
    s.failTimer-=dt;
    if(s.failTimer<=0)initSub1();
    return;
  }

  const sub=s.sub;
  const goBtn=K['Space']||touchState.buttons.has('thrust');
  const upBtn=K['ArrowUp']||K['KeyW'];
  const dnBtn=K['ArrowDown']||K['KeyS'];
  const ltBtn=K['ArrowLeft']||K['KeyA'];
  const rtBtn=K['ArrowRight']||K['KeyD'];
  const refuelBtn=(K['KeyE']||touchState.buttons.has('refuel'))&&s1NearStation();

  // ---- Vertical control (Up/Down) ----
  if(upBtn)      sub.vy-=SUB1_VY_ACCEL*dt;
  else if(dnBtn) sub.vy+=SUB1_VY_ACCEL*dt;
  else           sub.vy*=Math.max(0,1-SUB1_DAMP*dt);
  sub.vy=Math.max(-SUB1_VY_MAX,Math.min(SUB1_VY_MAX,sub.vy));
  sub.y+=sub.vy*dt;
  if(sub.y<SUB1_Y_MIN){sub.y=SUB1_Y_MIN;sub.vy=Math.max(0,sub.vy);}
  if(sub.y>SUB1_Y_MAX){sub.y=SUB1_Y_MAX;sub.vy=Math.min(0,sub.vy);}

  // ---- Forward control (always-on drift, GO thrusts, LEFT/RIGHT trim) ----
  let fwd=SUB1_DRIFT;
  let burning=false;
  if(s.tow){
    fwd=SUB1_TOW_SPD;
  } else {
    if(goBtn||rtBtn){
      if(s.fuel>0){
        fwd+=SUB1_THRUST;
        s.fuel=Math.max(0,s.fuel-SUB1_FUEL_BURN*dt);
        burning=true;
      }
    }
    if(ltBtn) fwd=Math.max(0,fwd-SUB1_BRAKE);
  }
  s.dist+=fwd*dt;
  if(s.dist<0)s.dist=0;
  if(burning)score+=dt*2;

  // ---- Currents ----
  for(const c of s.currents){
    if(s.dist>c.wd-c.w/2&&s.dist<c.wd+c.w/2&&
       sub.y>c.wy-c.h/2&&sub.y<c.wy+c.h/2){
      s.dist+=c.vx*dt;
      sub.vy+=c.vy*dt;
    }
  }

  // ---- Squids ----
  for(const sq of s.squids){
    sq.bumpT=Math.max(0,sq.bumpT-dt);
    const sqY=sq.wy0+Math.sin(s.bobT*sq.period+sq.phase)*sq.ampY;
    const sx=S1_SUB_X+(sq.wd-s.dist)*S1_WORLD_SCALE;
    if(sq.bumpT<=0&&Math.abs(sx-S1_SUB_X)<28&&Math.abs(sqY-sub.y)<26){
      sq.bumpT=0.6;
      sub.vx=-180;sub.vy+=(sub.y<sqY?-160:160);
      s.fuel=Math.max(0,s.fuel-0.15);
      s.shake=0.25;
      sfxAlert();
    }
  }

  // ---- Pearls ----
  for(const p of s.pearls){
    if(p.got)continue;
    const sx=S1_SUB_X+(p.wd-s.dist)*S1_WORLD_SCALE;
    if(sx>-30&&sx<W+30&&Math.hypot(sx-S1_SUB_X,p.wy-sub.y)<18){
      p.got=true;score+=10;s.pearlsGot++;sfxPickup();
    }
  }

  // ---- Refuel (requires X+Y dock) ----
  if(refuelBtn){
    s.fuel=Math.min(S1_FUEL_MAX,s.fuel+SUB1_REFUEL_RATE*dt);
    if(s.tow&&s.fuel>0.4){s.tow=false;s.towMsgT=2.0;}
  } else if(s.tow&&s1NearStation()){
    // Tow rescue auto-refuels at the buoy — no button-mash needed for kids
    s.fuel=Math.min(S1_FUEL_MAX,s.fuel+SUB1_REFUEL_RATE*dt);
    if(s.fuel>0.6){s.tow=false;s.towMsgT=2.0;}
  }

  // ---- Out of fuel: Johnny Mackerel rescue (no game-over) ----
  if(!s.tow&&s.fuel<=0&&!s1NearStation()){
    s.tow=true;s.towMsgT=2.5;
    score=Math.max(0,score-15);
  }

  // ---- Cosmetic state ----
  s.bobT+=dt;
  sub.propT+=(burning?14:6)*dt;
  // Tilt sub toward velocity vector (mostly vy since vx is auxiliary)
  const targetRot=Math.max(-0.28,Math.min(0.28,sub.vy*0.0014));
  sub.rot+=(targetRot-sub.rot)*Math.min(1,dt*6);
  if(sub.vx!==0)sub.vx*=Math.max(0,1-3*dt);
  if(s.shake>0)s.shake=Math.max(0,s.shake-dt);
  if(s.towMsgT>0)s.towMsgT=Math.max(0,s.towMsgT-dt);

  for(const b of s.bubbles){
    b.y+=b.vy*dt;
    if(b.y<60)b.y=490+(b.t%3)*20;
  }

  // ---- Win ----
  if(s.dist>=SUB1_GOAL_KM){
    const bonus=Math.floor(s.fuel*30)+s.pearlsGot*2;
    score+=bonus;
    stageScores.sub1=score;
    startPhase('heist');
  }
}

// Drifting current band — visualized as parallel arrows + bubble streaks
function drawSub1Current(c,sx){
  if(sx<-180||sx>W+180)return;
  ctx.save();
  const w=c.w*S1_WORLD_SCALE;
  // Faint band fill
  ctx.fillStyle='rgba(120,170,220,0.06)';
  ctx.fillRect(sx-w/2,c.wy-c.h/2,w,c.h);
  ctx.strokeStyle='rgba(140,200,255,0.25)';ctx.lineWidth=1;
  ctx.strokeRect(sx-w/2,c.wy-c.h/2,w,c.h);
  // Arrows
  const dirX=c.vx>=0?1:-1, hor=Math.abs(c.vx)>Math.abs(c.vy);
  const phase=(s1?s1.bobT*Math.max(40,Math.abs(c.vx)*120+Math.abs(c.vy)*1.5):0)%24;
  ctx.fillStyle='rgba(170,220,255,0.55)';
  if(hor){
    for(let row=0;row<3;row++){
      const ay=c.wy-c.h/2+18+row*((c.h-36)/2);
      for(let col=0;col<5;col++){
        const ax=sx-w/2+12+col*(w-24)/4+(dirX>0?phase:-phase);
        ctx.beginPath();
        if(dirX>0){
          ctx.moveTo(ax,ay-3);ctx.lineTo(ax+8,ay);ctx.lineTo(ax,ay+3);
        } else {
          ctx.moveTo(ax+8,ay-3);ctx.lineTo(ax,ay);ctx.lineTo(ax+8,ay+3);
        }
        ctx.closePath();ctx.fill();
      }
    }
  } else {
    const dirY=c.vy>=0?1:-1;
    for(let col=0;col<3;col++){
      const ax=sx-w/2+18+col*((w-36)/2);
      for(let row=0;row<5;row++){
        const ay=c.wy-c.h/2+12+row*(c.h-24)/4+(dirY>0?phase:-phase);
        ctx.beginPath();
        if(dirY>0){
          ctx.moveTo(ax-3,ay);ctx.lineTo(ax,ay+8);ctx.lineTo(ax+3,ay);
        } else {
          ctx.moveTo(ax-3,ay+8);ctx.lineTo(ax,ay);ctx.lineTo(ax+3,ay+8);
        }
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawSub1Squid(x,y,bumpT){
  ctx.save();
  const wob=Math.sin((s1?s1.bobT:0)*5+x*0.02)*3;
  const tint=bumpT>0?'#cc6080':C.krakGreen;
  // Body
  ctx.fillStyle=tint;
  ctx.beginPath();ctx.ellipse(x,y,18,13,0,0,Math.PI*2);ctx.fill();
  // Hood
  ctx.fillStyle='#163050';
  ctx.beginPath();ctx.moveTo(x-14,y);ctx.quadraticCurveTo(x,y-22,x+14,y);
  ctx.closePath();ctx.fill();
  // Eyes
  circ(x-5,y-2,2.4,'#fff');circ(x+5,y-2,2.4,'#fff');
  circ(x-5,y-2,1.2,'#0a1420');circ(x+5,y-2,1.2,'#0a1420');
  // Tentacles
  ctx.strokeStyle=tint;ctx.lineWidth=2;
  for(let i=-3;i<=3;i++){
    const tx=x+i*4, ty=y+10;
    ctx.beginPath();
    ctx.moveTo(tx,ty);
    ctx.quadraticCurveTo(tx+wob*0.4*Math.sign(i||1),ty+10,tx+i*1.5+wob*0.6,ty+18);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSub1Pearl(x,y,sparkle){

  circ(x,y,4,'#fff8e0','#e0c890',1);

  ctx.globalAlpha=0.7+pulse*0.3;
  ctx.strokeStyle='#fff';ctx.lineWidth=1;
  const sr=3+pulse*1.5;

  ctx.moveTo(x,y-sr);ctx.lineTo(x,y+sr);ctx.stroke();
  ctx.restore();
}

function drawSub1(){
  const s=s1;
  const sub=s.sub;

  // Optional camera shake (squid bump)
  const shakeX=s.shake>0?(Math.sin(s.bobT*40)*4*s.shake):0;
  const shakeY=s.shake>0?(Math.cos(s.bobT*48)*3*s.shake):0;
  ctx.save();ctx.translate(shakeX,shakeY);

  // Depth-banded ocean gradient (surface light → mid → deep)
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a2244');grad.addColorStop(0.30,'#0c2848');
  grad.addColorStop(0.65,'#0a1c38');grad.addColorStop(1,'#040e18');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Light ray bands (concentrated near the surface)
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?'rgba(255,255,255,0.028)':'rgba(90,160,255,0.020)';
    ctx.fillRect(0,40+i*56,W,28);
  }

  // Surface ripple
  ctx.strokeStyle='rgba(180,220,255,0.20)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<W;x+=8){
    const yy=44+Math.sin((x+s.dist*40)*0.06)*2;
    if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy);
  }
  ctx.stroke();

  // Seabed hint
  const sedGrad=ctx.createLinearGradient(0,H-40,0,H);
  sedGrad.addColorStop(0,'transparent');sedGrad.addColorStop(1,'rgba(20,12,8,0.55)');
  ctx.fillStyle=sedGrad;ctx.fillRect(0,H-40,W,40);

  // Parallax bg objects (wrecks, corals)
  for(const obj of s.bgObjs){
    const sx=S1_SUB_X+(obj.wd-s.dist)*S1_WORLD_SCALE*obj.layer;
    if(sx<-90||sx>W+90)continue;
    if(obj.type==='wreck')drawS1Wreck(sx,obj.y);
    else drawS1Coral(sx,obj.y);
  }

  // Currents (drawn behind everything but bg objects)
  for(const c of s.currents){
    const sx=S1_SUB_X+(c.wd-s.dist)*S1_WORLD_SCALE;
    drawSub1Current(c,sx);
  }

  // Kraken fuel buoys (small, depth-varying)
  for(let i=0;i<S1_STATIONS.length;i++){
    const sx=S1_SUB_X+(S1_STATIONS[i]-s.dist)*S1_WORLD_SCALE;
    if(sx<-90||sx>W+90)continue;
    const sy=SUB1_STATION_Y[i];
    drawSub1Buoy(sx,sy,SUB1_STATION_KIND[i],s.bobT);
    if(Math.abs(s.dist-S1_STATIONS[i])<SUB1_NEAR_X &&
       Math.abs(sub.y-sy)<SUB1_NEAR_Y){
      const pulse=0.5+0.5*Math.abs(Math.sin(s.bobT*3.2));
      ctx.save();ctx.globalAlpha=pulse*0.55;
      circ(sx,sy,38,null,C.krakGreen,2.5);
      ctx.restore();
    }
  }

  // Pearls
  for(const p of s.pearls){
    if(p.got)continue;
    const sx=S1_SUB_X+(p.wd-s.dist)*S1_WORLD_SCALE;
    if(sx<-30||sx>W+30)continue;
    drawSub1Pearl(sx,p.wy,p.sparkle);
  }

  // Squids
  for(const sq of s.squids){
    const sx=S1_SUB_X+(sq.wd-s.dist)*S1_WORLD_SCALE;
    if(sx<-60||sx>W+60)continue;
    const sqY=sq.wy0+Math.sin(s.bobT*sq.period+sq.phase)*sq.ampY;
    drawSub1Squid(sx,sqY,sq.bumpT);
  }

  // Destination marker at SUB1_GOAL_KM
  const destX=S1_SUB_X+(SUB1_GOAL_KM-s.dist)*S1_WORLD_SCALE;
  if(destX>=-44&&destX<=W+44){
    ctx.save();
    rnd(destX-22,160,44,140,4,'rgba(50,30,80,0.7)','#8a60b0',1.5);
    ctx.fillStyle='#c8a0e8';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText("DON'S",destX,208);ctx.fillText("HIDEOUT",destX,222);
    ln(destX,158,destX,300,'rgba(160,120,220,0.3)',1);
    ctx.restore();
  }

  // Bubbles
  for(const b of s.bubbles){
    circ(b.x,b.y,b.r,null,'rgba(160,220,255,0.28)',1);
  }

  // Submarine
  if(!s.failed){
    const bobY=Math.sin(s.bobT*1.3)*3;
    ctx.save();
    ctx.translate(sub.x+sub.vx*0.05,sub.y+bobY);
    ctx.rotate(sub.rot);
    drawSubmarineSprite(0,0,'SAMSTER');
    ctx.restore();
    // Tow companion
    if(s.tow){
      drawJohnnyMackerel(sub.x-58,sub.y+8);
    }
  }

  ctx.restore(); // end shake

  // Compass chevron toward next station
  drawSub1Compass(s);

  // HUD
  drawSub1HUD(s);

  // Tow flavor banner
  if(s.tow){
    const a=0.82;
    ctx.save();ctx.globalAlpha=a;

// ── Sub2: Submarine Escape ─────────────────────────────────────────────────
const S2_BASE_SPD=0.5;
const S2_THRUST_SPD=1.5;
const S2_DESTROYER_Y=54;

function initSub2(){
  s2={
    dist:0,fuel:S1_FUEL_MAX,bobT:0,
    failed:false,failTimer:0,failMsg:'',
    bgObjs:makeS1BgObjects(),
    bubbles:makeS1Bubbles(),
    destroyers:[{x:160,alive:true},{x:400,alive:true},{x:640,alive:true}],
    sonarPhase:'idle',sonarT:3.5,
    chargeT:0,chargeFromIdx:0,chargeFalling:false,
    explodeAnims:[],
    missFlash:0,dodgeFlash:0,dodgeMsg:'',
  };
}

function s2ActiveCount(){
  var n=0;
  for(var i=0;i<s2.destroyers.length;i++){if(s2.destroyers[i].alive)n++;}
  return n;
}

function s2PickDestroyer(seed){
  var alive=[];
  for(var i=0;i<s2.destroyers.length;i++){if(s2.destroyers[i].alive)alive.push(i);}
  if(!alive.length)return -1;
  return alive[Math.floor(Math.abs(seed||0))%alive.length];
}

function updateSub2(dt){
  var s=s2;
  if(s.failed){
    s.failTimer-=dt;
    if(s.failTimer<=0)initSub2();
    return;
  }

  var thrusting=K['Space']||K['ArrowRight']||touchState.buttons.has('thrust');
  var refueling=(K['KeyE']||touchState.buttons.has('refuel'))&&s2NearStation();

  var spd=S2_BASE_SPD;
  if(thrusting){
    spd+=S2_THRUST_SPD;
    s.fuel=Math.max(0,s.fuel-1.0*dt);
    score+=dt*1.5;
  }
  s.dist+=spd*dt;
  if(refueling){s.fuel=Math.min(S1_FUEL_MAX,s.fuel+1.4*dt);}

  s.bobT+=dt;
  for(var bi=0;bi<s.bubbles.length;bi++){
    var b=s.bubbles[bi];b.y+=b.vy*dt;
    if(b.y<60)b.y=490+(b.t%3)*20;
  }

  if(s.missFlash>0)s.missFlash=Math.max(0,s.missFlash-dt);
  if(s.dodgeFlash>0)s.dodgeFlash=Math.max(0,s.dodgeFlash-dt);
  for(var ei=s.explodeAnims.length-1;ei>=0;ei--){
    s.explodeAnims[ei].t-=dt;
    if(s.explodeAnims[ei].t<=0)s.explodeAnims.splice(ei,1);
  }

  // Cigar throw
  if(eat('KeyC')&&cigarsFound>0){
    cigarsFound--;
    var cidx=s2PickDestroyer(Math.floor(s.bobT*7));
    if(cidx>=0){
      s.destroyers[cidx].alive=false;
      s.explodeAnims.push({x:s.destroyers[cidx].x,t:0.9});
      if(s.sonarPhase==='falling'&&s.chargeFromIdx===cidx){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=2.5;
      }
      score+=80;sfxCigar();
    }
  }

  // Sonar QTE
  var nActive=s2ActiveCount();
  if(nActive>0){
    var cooldown=Math.max(2.5,5.5-nActive*0.7);
    if(s.sonarPhase==='idle'){
      s.sonarT-=dt;
      if(s.sonarT<=0){s.sonarPhase='ping';s.sonarT=0.6;sfxAlert();}
    } else if(s.sonarPhase==='ping'){
      s.sonarT-=dt;
      if(s.sonarT<=0){s.sonarPhase='warning';s.sonarT=1.0;}
    } else if(s.sonarPhase==='warning'){
      s.sonarT-=dt;
      if(s.sonarT<=0){
        s.sonarPhase='falling';s.chargeT=0;s.chargeFalling=true;
        s.chargeFromIdx=s2PickDestroyer(Math.floor(s.bobT*13));
      }
    } else if(s.sonarPhase==='falling'){
      s.chargeT+=dt;
      if(eat('KeyA')){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=cooldown;
        s.dodgeFlash=0.8;score+=20;sfxDodge();
        var msgs=['Dodged!','Nice!','Close call!'];
        s.dodgeMsg=msgs[Math.floor(s.bobT*7)%3];
      } else if(s.chargeT>=diff.chargeWindow){
        s.sonarPhase='idle';s.chargeFalling=false;s.sonarT=cooldown;
        s.fuel=Math.max(0,s.fuel-0.6);s.missFlash=0.6;sfxMiss();
        score=Math.max(0,score-10);
      }
    }
  }

  if(s.fuel<=0&&thrusting){
    s.fuel=0;s.failed=true;s.failTimer=2.6;
    s.failMsg='Out of gas! Refuel at Kraken stations.';
    score=Math.max(0,score-50);stageScores.sub2=0;
  }
  if(s.dist>=S1_DIST_TOTAL){
    var bonus=Math.floor(s.fuel*20);
    score+=bonus;
    stageScores.sub2=score-stageScores.heist;
    startPhase('home');
  }
}

  if(!alive)return;
  ctx.save();

  ctx.beginPath();

  ctx.lineTo(x-26,S2_DESTROYER_Y-12);ctx.lineTo(x+26,S2_DESTROYER_Y-12);

    if(stX<-150||stX>W+150)continue;
    drawS1Station(stX,230);
    if(Math.abs(s.dist-S1_STATIONS[si])<S1_NEAR_DIST){
      var stp=0.5+0.5*Math.abs(Math.sin(s.bobT*2.8));
      ctx.save();ctx.globalAlpha=stp*0.5;circ(stX,230,80,null,'#3a8a5a',3);ctx.restore();
    }
  }

  var destX=S1_SUB_X+(S1_DIST_TOTAL-s.dist)*S1_WORLD_SCALE;
  if(destX>=0&&destX<=W){
    ctx.save();
    rnd(destX-22,160,44,140,4,'rgba(30,70,30,0.7)','#508040',1.5);
    ctx.fillStyle='#a0e880';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('HOME',destX,208);ctx.fillText('PORT',destX,222);
    ln(destX,158,destX,300,'rgba(100,200,60,0.28)',1);
    ctx.restore();
  }

  for(var bui=0;bui<s.bubbles.length;bui++){
    var bu=s.bubbles[bui];
    circ(bu.x,bu.y,bu.r,null,'rgba(160,220,255,0.28)',1);
  }

  // Sky / surface band above waterline
  ctx.save();ctx.fillStyle='rgba(4,10,20,0.88)';
  ctx.fillRect(0,0,W,S2_DESTROYER_Y+28);ctx.restore();

  // Surface line
  ctx.save();ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;
  ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(0,S2_DESTROYER_Y+28);ctx.lineTo(W,S2_DESTROYER_Y+28);
  ctx.stroke();ctx.setLineDash([]);ctx.restore();

  // Destroyers
  for(var di=0;di<s.destroyers.length;di++){
    var dd=s.destroyers[di];var et=0;
    for(var xi=0;xi<s.explodeAnims.length;xi++){
      if(s.explodeAnims[xi].x===dd.x)et=s.explodeAnims[xi].t;
    }
    drawS2Destroyer(dd.x,dd.alive,et);
  }

  // Falling depth charge
  if(s.sonarPhase==='falling'&&s.chargeFromIdx>=0&&s.chargeFromIdx<s.destroyers.length){
    var fd=s.destroyers[s.chargeFromIdx];
    var prog=Math.min(1,s.chargeT/diff.chargeWindow);
    var cy2=(S2_DESTROYER_Y+30)+(H-160-(S2_DESTROYER_Y+30))*prog;
    var cx2=fd.x+(S1_SUB_X-fd.x)*prog;
    ctx.save();
    if(prog>0.65)ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(s.bobT*14));
    circ(cx2,cy2,11,'rgba(220,90,20,0.92)','rgba(255,150,40,0.9)',2.5);
    ctx.strokeStyle='rgba(255,180,50,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx2,cy2-16);ctx.lineTo(cx2,cy2-11);
    ctx.moveTo(cx2+14,cy2+6);ctx.lineTo(cx2+9,cy2+4);
    ctx.moveTo(cx2-14,cy2+6);ctx.lineTo(cx2-9,cy2+4);
    ctx.stroke();
    if(prog<0.55){
      ctx.strokeStyle='rgba(180,120,60,0.35)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(fd.x,S2_DESTROYER_Y+20);ctx.lineTo(cx2,cy2);
      ctx.stroke();ctx.setLineDash([]);
    }
    ctx.restore();
    ctx.save();ctx.globalAlpha=0.7+0.3*Math.abs(Math.sin(s.bobT*9));
    rnd(W/2-88,H/2-14,176,28,7,'rgba(120,18,10,0.78)','rgba(220,55,28,0.85)',1.5);
    txt('PRESS A TO DODGE!',W/2,H/2+7,C.cream,14,'center','bold monospace');
    ctx.restore();
  }

  // Sonar ping ring
  if(s.sonarPhase==='ping'){
    var pr=(0.6-s.sonarT)/0.6;
    ctx.save();ctx.globalAlpha=(1-pr)*0.55;
    circ(S1_SUB_X,H/2,pr*210,null,'rgba(100,255,180,0.7)',2.5);ctx.restore();
  }

  // Incoming warning bar
  if(s.sonarPhase==='warning'){
    var wp=Math.abs(Math.sin(s.sonarT*Math.PI*3.5));
    ctx.save();ctx.globalAlpha=0.5+0.5*wp;
    rnd(W/2-168,H/2-22,336,44,9,'rgba(170,45,18,0.75)','rgba(255,75,38,0.9)',2);
    txt('INCOMING DEPTH CHARGE',W/2,H/2+8,C.cream,17,'center','bold monospace');
    ctx.restore();
  }

  if(s.missFlash>0){
    ctx.save();ctx.globalAlpha=s.missFlash/0.6*0.33;
    ctx.fillStyle='rgba(200,28,10,0.9)';ctx.fillRect(0,0,W,H);ctx.restore();
  }
  if(s.dodgeFlash>0){
    ctx.save();ctx.globalAlpha=Math.min(1,s.dodgeFlash/0.8);
    rnd(W/2-96,H/2-106,192,34,9,'rgba(28,100,48,0.88)','rgba(50,200,90,0.85)',1.5);
    txt(s.dodgeMsg||'Dodged!',W/2,H/2-81,C.cream,18,'center','bold Georgia');
    ctx.restore();
  }

  if(!s.failed){
    var bobY=Math.sin(s.bobT*1.3)*5;
    drawSubmarineSprite(S1_SUB_X,H/2-8+bobY,'SAMSTER');
  }

  drawSub2HUD(s);

  if(s.failed){
    var alpha=Math.min(1,(2.6-s.failTimer)/0.45);
    ctx.save();ctx.globalAlpha=alpha;
    rnd(W/2-230,H/2-62,460,124,14,'rgba(70,8,8,0.94)',C.donRed,2.5);
    txt('Out of Gas!',W/2,H/2-18,'#ffaaaa',32,'center','bold Georgia');
    txt(s.failMsg,W/2,H/2+22,C.cream,13,'center');ctx.restore();
  }

  if(!s.failed&&s2NearStation()){
    var pls=0.65+0.35*Math.abs(Math.sin(s.bobT*3));
    ctx.save();ctx.globalAlpha=pls;
    rnd(W/2-136,H-76,272,34,8,'rgba(28,62,38,0.88)',C.krakGreen,1.5);
    txt('Hold E (or Refuel button) to fill up',W/2,H-52,C.cream,13,'center');
    ctx.restore();
  }
}

// ── Heist Engine ─────────────────────────────────────────────────────────────
const H_TILE=32,H_COLS=19,H_ROWS=15,H_ROOM_X=0,H_ROOM_Y=40,H_HUD_X=H_COLS*H_TILE;
const H_SPD=110,H_HS=10,H_PICK=16,H_IACT=38;
const TF=0,TW=1,TN=2,TD=3,TL=4,TO=5,TI=6,TCL=7,TCR=8,TCU=9,TCD=10,TKD=11,TLS=12,TBO=13;

function hTX(c){return H_ROOM_X+c*H_TILE+H_TILE/2;}
function hTY(r){return H_ROOM_Y+r*H_TILE+H_TILE/2;}

function hKpBtns(){
  const bw=48,bh=46,gap=6,startX=W/2-Math.floor((5*bw+4*gap)/2);
  const y1=H/2-16,y2=H/2+40,btns=[];
  for(let i=0;i<5;i++){
    btns.push({d:i+1,x:startX+i*(bw+gap),y:y1,w:bw,h:bh});
    btns.push({d:i===4?0:i+6,x:startX+i*(bw+gap),y:y2,w:bw,h:bh});
  }
  return btns;
}

const H_ROOM_DEFS=(function(){
  const W=TW,F=TF,N=TN,D=TD,L=TL,O=TO,I=TI,CR=TCR,CL=TCL,KD=TKD,LS=TLS,BO=TBO;
  function flat(rws){let a=[];for(let i=0;i<rws.length;i++)a=a.concat(rws[i]);return a;}
  const so=[W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W];
  const fl=[W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W];
  function lk(c){const r=so.slice();r[c]=L;return r;}
  function op(c){const r=so.slice();r[c]=O;return r;}
  function bk(c){const r=so.slice();r[c]=BO;return r;}
  const cvRow=[W,F,F,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,F,F,W];
  const cvWall=[W,W,W,F,F,F,F,F,F,F,F,F,F,F,F,F,W,W,W];

let heist=null;
function hCopyRoom(d){
  let guard=null;
  if(d.guardDef){
    const gd=d.guardDef;
    guard={path:gd.path,speed:gd.speed||52,pathIdx:0,
           x:hTX(gd.path[0].tx),y:hTY(gd.path[0].ty),dir:'right'};
  }
  return {name:d.name,map:d.map.slice(),
    floppies:d.floppies.map(i=>({x:i.x,y:i.y,got:false})),
    containers:d.containers.map(i=>({x:i.x,y:i.y,got:false})),
    cigars:d.cigars.map(i=>({x:i.x,y:i.y,got:false})),
    keycards:d.keycards.map(k=>({x:k.x,y:k.y,got:false,color:k.color})),
    notes:d.notes.map(n=>({x:n.x,y:n.y,code:n.code,text:n.text,read:false})),
    keypads:d.keypads.map(k=>({tx:k.tx,ty:k.ty,code:k.code,open:false})),
    guard,dark:d.dark||false,lightsOn:false,
    startX:d.startX,startY:d.startY,timerSecs:d.timerSecs||0,
    complete:d.complete||false};
}
function initHeist(){
  cigarsFound=0;
  const rooms=H_ROOM_DEFS.map(hCopyRoom),r=rooms[0];
  heist={rooms,roomIdx:0,room:r,
    player:{x:r.startX,y:r.startY,dir:'down',vx:0,vy:0},
    timer:r.timerSecs*(diff.timerMul||1),
    collected:{f:0,c:0,g:0},
    kInventory:{yellow:false},
    msg:'',msgT:0,completeT:0,
    noteOpen:false,noteText:'',noteCode:'',
    kpOpen:false,kpInput:'',kpIdx:-1,
    guardStunned:false,guardStunT:0,
    failed:false,failT:0};
}

function hTileAt(map,col,row){
  if(col<0||col>=H_COLS||row<0||row>=H_ROWS)return TW;
  return map[row*H_COLS+col];
}
function hTileUnder(px,py,map){
  return hTileAt(map,Math.floor((px-H_ROOM_X)/H_TILE),Math.floor((py-H_ROOM_Y)/H_TILE));
}
function hSolid(t){return t===TW||t===TN||t===TD||t===TL||t===TKD;}
function hCanMove(nx,ny){
  const map=heist.room.map;
  const pts=[[nx-H_HS,ny-H_HS],[nx+H_HS,ny-H_HS],[nx-H_HS,ny+H_HS],[nx+H_HS,ny+H_HS]];
  for(const pt of pts){
    const c=Math.floor((pt[0]-H_ROOM_X)/H_TILE),r=Math.floor((pt[1]-H_ROOM_Y)/H_TILE);
    if(hSolid(hTileAt(map,c,r)))return false;
  }
  return true;
}
function hTryOpenKD(nx,ny){
  if(!heist||!heist.kInventory.yellow)return;
  const pts=[[nx-H_HS,ny-H_HS],[nx+H_HS,ny-H_HS],[nx-H_HS,ny+H_HS],[nx+H_HS,ny+H_HS]];
  for(const pt of pts){
    const c=Math.floor((pt[0]-H_ROOM_X)/H_TILE),r=Math.floor((pt[1]-H_ROOM_Y)/H_TILE);
    if(hTileAt(heist.room.map,c,r)===TKD){
      heist.kInventory.yellow=false;
      heist.room.map[r*H_COLS+c]=TO;
      clearBackdropCache();
      hShowMsg('Keycard used — sealed door unlocked!');
      return;
    }
  }
}
function hGuardUpdate(g,dt,p){
  const wp=g.path[g.pathIdx];
  const tx=hTX(wp.tx),ty=hTY(wp.ty);
  const dx=tx-g.x,dy=ty-g.y,dist=Math.hypot(dx,dy);
  if(dist<6){
    g.x=tx;g.y=ty;
    g.pathIdx=(g.pathIdx+1)%g.path.length;
  } else {
    g.x+=dx/dist*g.speed*dt;
    g.y+=dy/dist*g.speed*dt;
    if(Math.abs(dx)>Math.abs(dy))g.dir=dx>0?'right':'left';
    else g.dir=dy>0?'down':'up';
  }
  if(!heist.guardStunned&&Math.hypot(g.x-p.x,g.y-p.y)<22){
    // Softened: stun the player in place for 1s, -10 pts, no teleport.
    // The guard is "looking the other way" briefly so the kid can recover.
    heist.guardStunned=true;heist.guardStunT=1.0;
    score=Math.max(0,score-10);
    hShowMsg('Guard spotted you! Lay low. (-10 pts)');
  }
}
function hShowMsg(m){heist.msg=m;heist.msgT=3.0;}
// Digory's room-entry quips — keep the kid-friendly story-bible tone
const DIGORY_QUIPS_FWD=[
  "A nice yellow welcome mat. I might come back for a nap.",
  "Storage room! Who hides crates next to disks? Don, that's who.",
  "Mind the conveyors, Digory. Mind them.",
  "Security wing. Sniff out a yellow keycard.",
  "Guard up ahead. Tail down, paws light.",
  "It's dark. Find the switch, then the secrets.",
  "The Vault! Slippy floor, big prize.",
  "Mission accomplished. Time to swim home."
];
const DIGORY_QUIPS_BACK=[
  "Backtracking. Don't tell Duckdee.",
  "Forgot something? It happens.",
  "Conveyors again. Hop hop hop.",
  "Back to the security wing. Quietly.",
  "Patrol zone, take two.",
  "Dark again. Where was that switch?"
];

function hEnterRoom(idx,entryDir){
  const r=heist.rooms[idx];
  heist.roomIdx=idx;heist.room=r;
  if(entryDir==='fromNorth'){
    // Backtracked from a higher room: drop in just below the north door
    heist.player.x=hTX(9);heist.player.y=hTY(2);
  } else {
    heist.player.x=r.startX;heist.player.y=r.startY;
  }
  heist.player.vx=0;heist.player.vy=0;
  if(r.timerSecs>0)heist.timer=r.timerSecs*diff.timerMul;
  clearBackdropCache();
  const quip=entryDir==='fromNorth'?DIGORY_QUIPS_BACK[idx]:DIGORY_QUIPS_FWD[idx];
  if(quip)hShowMsg(quip);
}

function hKpTryConfirm(){
  const h=heist,kp=h.room.keypads[h.kpIdx];
  if(h.kpInput===kp.code){
    kp.open=true;h.room.map[kp.ty*H_COLS+kp.tx]=TO;
    clearBackdropCache();
    h.kpOpen=false;h.kpInput='';h.kpIdx=-1;
    score+=25;sfxCode();hShowMsg('Code accepted — door is open!');
  } else {
    h.kpInput='';hShowMsg('Wrong code — try again.');
  }
}

function updateHeistKP(){
  const h=heist;
  if(h.kpInput.length<4){
    for(let d=0;d<=9;d++){
      if(eat('Digit'+d)||eat('Numpad'+d)){h.kpInput+=''+d;break;}
    }
  }
  if(eat('Backspace'))h.kpInput=h.kpInput.slice(0,-1);
  if(eat('Escape')){h.kpOpen=false;h.kpInput='';h.kpIdx=-1;return;}
  if(h.kpInput.length===4&&(eat('Enter')||eat('KeyE'))){hKpTryConfirm();return;}
  if(mclk){
    mclk=false;
    const btns=hKpBtns();
    for(const b of btns){
      if(inRect(mx,my,b.x,b.y,b.w,b.h)&&h.kpInput.length<4){h.kpInput+=''+b.d;return;}
    }
    const cy=H/2+104;
    if(inRect(mx,my,W/2-60,cy,120,34)&&h.kpInput.length===4){hKpTryConfirm();return;}
    if(inRect(mx,my,W/2-90,H/2-96,180,34)&&h.kpInput.length>0){h.kpInput=h.kpInput.slice(0,-1);return;}
    if(!inRect(mx,my,W/2-170,H/2-150,340,320)){h.kpOpen=false;h.kpInput='';h.kpIdx=-1;}
  }
}

function updateHeist(dt){
  const h=heist;
  if(h.failed){
    h.failT-=dt;
    if(h.failT<=0){score=Math.max(0,score-50);stageScores.heist=0;initHeist();}
    return;
  }
  if(h.guardStunned){
    h.guardStunT-=dt;
    // Pass a far-away position so the guard doesn't keep "spotting" the player
    // during the stun window, but resume its patrol normally.
    if(h.room.guard)hGuardUpdate(h.room.guard,dt,{x:-999,y:-999});
    if(h.guardStunT<=0){
      h.guardStunned=false;
      // Don't teleport; the player stays where they were caught.
      h.player.vx=0;h.player.vy=0;
    }
    if(h.msgT>0)h.msgT-=dt;
    return;
  }
  if(h.noteOpen){
    if(eat('KeyE')||eat('Space')||eat('Enter')||eat('Escape'))h.noteOpen=false;
    if(mclk){mclk=false;h.noteOpen=false;}
    return;
  }
  if(h.kpOpen){updateHeistKP();return;}
  if(h.room.complete){
    h.completeT+=dt;
    if(h.completeT>1.4){stageScores.heist=score;startPhase('sub2');}
    return;
  }
  const p=h.player,r=h.room;
  // Guard update
  if(r.guard)hGuardUpdate(r.guard,dt,p);
  // Movement
  let rawDx=0,rawDy=0;
  if(K['ArrowLeft']||touchState.dirs.has('left'))rawDx=-H_SPD;
  if(K['ArrowRight']||touchState.dirs.has('right'))rawDx=H_SPD;
  if(K['ArrowUp']||touchState.dirs.has('up'))rawDy=-H_SPD;
  if(K['ArrowDown']||touchState.dirs.has('down'))rawDy=H_SPD;
  if(rawDx&&rawDy){rawDx*=0.707;rawDy*=0.707;}
  if(rawDx)p.dir=rawDx<0?'left':'right';
  else if(rawDy)p.dir=rawDy<0?'up':'down';
  let dx=rawDx,dy=rawDy;
  // Conveyor push
  const underTile=hTileUnder(p.x,p.y,r.map);
  if(underTile===TCR)dx+=H_SPD*0.65;
  else if(underTile===TCL)dx-=H_SPD*0.65;
  else if(underTile===TCD)dy+=H_SPD*0.65;
  else if(underTile===TCU)dy-=H_SPD*0.65;
  // Ice: smooth velocity
  const onIce=(underTile===TI);
  if(onIce){p.vx+=(dx-p.vx)*3*dt;p.vy+=(dy-p.vy)*3*dt;}
  else{p.vx=dx;p.vy=dy;}
  // Apply movement with keycard door detection
  const nx=p.x+p.vx*dt,ny=p.y+p.vy*dt;
  hTryOpenKD(nx,p.y);
  if(hCanMove(nx,p.y))p.x=nx; else p.vx=0;
  hTryOpenKD(p.x,ny);
  if(hCanMove(p.x,ny))p.y=ny; else p.vy=0;
  p.x=Math.max(H_ROOM_X+H_HS+1,Math.min(H_HUD_X-H_HS-1,p.x));
  p.y=Math.max(H_ROOM_Y+H_HS+1,Math.min(H_ROOM_Y+H_ROWS*H_TILE-H_HS-1,p.y));
  // Item pickups
  for(const it of r.floppies){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.f++;score+=15;sfxPickup();hShowMsg('Floppy disk! ('+h.collected.f+'/8)');
    }
  }
  for(const it of r.containers){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.c++;score+=15;sfxPickup();hShowMsg('Container! ('+h.collected.c+'/8)');
    }
  }
  for(const it of r.cigars){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.collected.g++;cigarsFound++;score+=40;sfxPickup();
      hShowMsg('Exploding cigar! ('+cigarsFound+' total)');
    }
  }
  for(const it of r.keycards){
    if(!it.got&&Math.hypot(p.x-it.x,p.y-it.y)<H_PICK){
      it.got=true;h.kInventory[it.color]=true;score+=10;
      hShowMsg('Yellow keycard! Use it at a sealed door.');
    }
  }
  // E key interactions
  if(eat('KeyE')){
    let acted=false;
    // Light switch
    const pc=Math.floor((p.x-H_ROOM_X)/H_TILE),pr=Math.floor((p.y-H_ROOM_Y)/H_TILE);
    for(let dr=-1;dr<=1&&!acted;dr++){
      for(let dc=-1;dc<=1&&!acted;dc++){
        if(hTileAt(r.map,pc+dc,pr+dr)===TLS){
          const lsx=H_ROOM_X+(pc+dc)*H_TILE+H_TILE/2,lsy=H_ROOM_Y+(pr+dr)*H_TILE+H_TILE/2;
          if(Math.hypot(p.x-lsx,p.y-lsy)<H_IACT){
            r.lightsOn=!r.lightsOn;clearBackdropCache();
            hShowMsg(r.lightsOn?'Lights on!':'Lights off.');acted=true;
          }
        }
      }
    }
    // Notes (unread only — skip already-read to prevent blocking keypad access)
    if(!acted){
      for(const n of r.notes){
        if(!n.read&&Math.hypot(p.x-n.x,p.y-n.y)<H_IACT){
          if(r.dark&&!r.lightsOn){hShowMsg('Too dark to read — find the light switch!');acted=true;break;}
          h.noteOpen=true;h.noteText=n.text;h.noteCode=n.code;n.read=true;score+=5;acted=true;break;
        }
      }
    }
    // Keypads
    if(!acted){
      for(let i=0;i<r.keypads.length;i++){
        const kp=r.keypads[i];
        if(!kp.open){
          const kx=H_ROOM_X+kp.tx*H_TILE+H_TILE/2,ky=H_ROOM_Y+kp.ty*H_TILE+H_TILE/2;
          if(Math.hypot(p.x-kx,p.y-ky)<H_IACT+H_TILE){
            h.kpOpen=true;h.kpInput='';h.kpIdx=i;break;
          }
        }
      }
    }
  }
  // Timer
  if(r.timerSecs>0){
    h.timer-=dt;
    if(h.timer<=0){h.timer=0;h.failed=true;h.failT=2.8;hShowMsg("Time's up!");}
  }
  if(h.msgT>0)h.msgT-=dt;
  // Room transition: reach north wall
  if(p.y<H_ROOM_Y+H_TILE*1.5){
    if(h.roomIdx===6){
      // Vault: need 8+8 (kid-achievable; world has 11 of each)
      if(h.collected.f>=8&&h.collected.c>=8){hEnterRoom(7);return;}
      else{
        // Don't push-back into the wall — let the kid turn around and
        // exit south through the back-door if they need more pickups.
        hShowMsg('Need '+(8-h.collected.f)+' more disks and '+(8-h.collected.c)+' more crates! Try the back door.');
      }
    } else {
      const pCol=Math.round((p.x-H_ROOM_X)/H_TILE);
      for(let dc=-1;dc<=1;dc++){
        const c=pCol+dc;
        if(c>=0&&c<H_COLS&&hTileAt(r.map,c,0)===TO){
          if(h.roomIdx<7){hEnterRoom(h.roomIdx+1);return;}
        }
      }
    }
  }
  // Room transition: reach south wall (back-door, allows backtracking)
  if(p.y>H_ROOM_Y+(H_ROWS-1)*H_TILE-H_HS){
    const pCol=Math.round((p.x-H_ROOM_X)/H_TILE);
    for(let dc=-1;dc<=1;dc++){
      const c=pCol+dc;
      if(c>=0&&c<H_COLS&&hTileAt(r.map,c,H_ROWS-1)===TBO){
        if(h.roomIdx>0){hEnterRoom(h.roomIdx-1,'fromNorth');return;}
      }
    }
  }
}

// ── Digory sprite ─────────────────────────────────────────────────────────────
function drawDigory(x,y,dir){
  ctx.save();
  if(dir==='left'){ctx.translate(x,y);ctx.scale(-1,1);ctx.translate(-x,-y);}
  const side=dir==='right'||dir==='left';
  const hx=x+(side?9:0),hy=y+(side?-8:(dir==='up'?-14:-12));
  ctx.beginPath();ctx.ellipse(x,y+2,12,8,0,0,Math.PI*2);
  ctx.fillStyle='#f4f4f0';ctx.fill();
  ctx.beginPath();ctx.ellipse(x+4,y+1,6.5,5,0.2,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.moveTo(x+11,y+2);ctx.bezierCurveTo(x+20,y-7,x+22,y-5,x+19,y+1);
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+18,y-4);ctx.bezierCurveTo(x+24,y-11,x+26,y-9,x+22,y-3);
  ctx.strokeStyle='#f4f4f0';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(hx,hy,8,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+4,hy+2,3.5,3,0,0,Math.PI*2);
  ctx.fillStyle='#8a5030';ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.moveTo(hx-5,hy-5);ctx.lineTo(hx-9,hy-16);ctx.lineTo(hx-1,hy-7);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(hx+5,hy-5);ctx.lineTo(hx+9,hy-16);ctx.lineTo(hx+1,hy-7);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#888888';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(hx,hy+5,4.5,Math.PI*0.2,Math.PI*0.8);ctx.stroke();
  ctx.fillStyle='#f0f0ec';
  ctx.fillRect(x-9,y+8,4,7);ctx.fillRect(x+5,y+8,4,7);
  ctx.restore();
}

// ── Heist room drawing ────────────────────────────────────────────────────────
function drawHeistRoomBg(){
  const r=heist.room;
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#22222f';ctx.fillRect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
  ctx.strokeStyle='rgba(50,50,70,0.35)';ctx.lineWidth=0.5;
  for(let row=0;row<=H_ROWS;row++){
    ctx.beginPath();ctx.moveTo(H_ROOM_X,H_ROOM_Y+row*H_TILE);ctx.lineTo(H_HUD_X,H_ROOM_Y+row*H_TILE);ctx.stroke();
  }
  for(let col=0;col<=H_COLS;col++){
    ctx.beginPath();ctx.moveTo(H_ROOM_X+col*H_TILE,H_ROOM_Y);ctx.lineTo(H_ROOM_X+col*H_TILE,H_ROOM_Y+H_ROWS*H_TILE);ctx.stroke();
  }
  for(let row=0;row<H_ROWS;row++){
    for(let col=0;col<H_COLS;col++){
      const t=r.map[row*H_COLS+col],tx=H_ROOM_X+col*H_TILE,ty=H_ROOM_Y+row*H_TILE;
      if(t===TW){
        ctx.fillStyle='#383848';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#484858';ctx.lineWidth=0.5;ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
      } else if(t===TN){
        rnd(tx+3,ty+3,H_TILE-6,H_TILE-6,3,'#48303a','#683048',1);
      } else if(t===TD){
        rnd(tx+2,ty+2,H_TILE-4,H_TILE-4,2,'#6a4020','#9a6030',1);
        ctx.strokeStyle='#7a5028';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(tx+5,ty+H_TILE/2);ctx.lineTo(tx+H_TILE-5,ty+H_TILE/2);ctx.stroke();
      } else if(t===TL){
        ctx.fillStyle='#383848';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        rnd(tx+9,ty+9,14,14,2,'#cc3322','#ff5544',1.5);
        ctx.fillStyle='#ffaaaa';ctx.font='bold 8px monospace';ctx.textAlign='center';
        ctx.fillText('!',tx+H_TILE/2,ty+H_TILE/2+4);
      } else if(t===TO){
        ctx.fillStyle='#0a1c12';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#3a8a5a';ctx.lineWidth=1.5;ctx.strokeRect(tx+1,ty+1,H_TILE-2,H_TILE-2);
      } else if(t===TI){
        ctx.fillStyle='#8ec8e8';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(200,235,255,0.5)';ctx.lineWidth=0.5;
        ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(tx+4,ty+4);ctx.lineTo(tx+H_TILE-4,ty+H_TILE-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(tx+H_TILE-4,ty+4);ctx.lineTo(tx+4,ty+H_TILE-4);ctx.stroke();
      } else if(t===TCR||t===TCL||t===TCU||t===TCD){
        ctx.fillStyle='#1a2840';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(60,100,160,0.4)';ctx.lineWidth=0.5;ctx.strokeRect(tx,ty,H_TILE,H_TILE);
        const cx2=tx+H_TILE/2,cy2=ty+H_TILE/2,aw=7,ah=4;
        ctx.fillStyle='#4a80cc';ctx.beginPath();
        if(t===TCR){ctx.moveTo(cx2+aw,cy2);ctx.lineTo(cx2-aw,cy2-ah);ctx.lineTo(cx2-aw,cy2+ah);}
        else if(t===TCL){ctx.moveTo(cx2-aw,cy2);ctx.lineTo(cx2+aw,cy2-ah);ctx.lineTo(cx2+aw,cy2+ah);}
        else if(t===TCD){ctx.moveTo(cx2,cy2+aw);ctx.lineTo(cx2-ah,cy2-aw);ctx.lineTo(cx2+ah,cy2-aw);}
        else{ctx.moveTo(cx2,cy2-aw);ctx.lineTo(cx2-ah,cy2+aw);ctx.lineTo(cx2+ah,cy2+aw);}
        ctx.closePath();ctx.fill();
      } else if(t===TKD){
        ctx.fillStyle='#302200';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        rnd(tx+3,ty+3,H_TILE-6,H_TILE-6,3,'#584010','#d0a020',2);
        ctx.fillStyle='#ffe060';ctx.font='bold 9px monospace';ctx.textAlign='center';
        ctx.fillText('K',tx+H_TILE/2,ty+H_TILE/2+4);
      } else if(t===TLS){
        ctx.fillStyle='#22222f';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        const lsOn=heist&&heist.room&&heist.room.lightsOn;
        rnd(tx+7,ty+7,H_TILE-14,H_TILE-14,3,lsOn?'#404010':'#282830',lsOn?'#c0c020':'#505060',1.5);
        ctx.fillStyle=lsOn?'#e8e840':'#606060';
        ctx.font='bold 6px sans-serif';ctx.textAlign='center';
        ctx.fillText(lsOn?'ON':'OFF',tx+H_TILE/2,ty+H_TILE/2+3);
      } else if(t===TBO){
        // Back door — open archway in the south wall (passable)
        ctx.fillStyle='#0a1c12';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='#3a8a5a';ctx.lineWidth=1.5;ctx.strokeRect(tx+1,ty+1,H_TILE-2,H_TILE-2);
        ctx.fillStyle='#3a8a5a';ctx.font='bold 7px sans-serif';ctx.textAlign='center';
        ctx.fillText('BACK',tx+H_TILE/2,ty+H_TILE/2-2);
        // Down-arrow chevron (drawn, not unicode — iOS 12 safe)
        ctx.beginPath();
        ctx.moveTo(tx+H_TILE/2-4,ty+H_TILE/2+4);
        ctx.lineTo(tx+H_TILE/2+4,ty+H_TILE/2+4);
        ctx.lineTo(tx+H_TILE/2,ty+H_TILE/2+9);
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.fillStyle='#181828';ctx.fillRect(0,0,H_HUD_X,H_ROOM_Y);
  ctx.strokeStyle='rgba(80,100,140,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H_ROOM_Y);ctx.lineTo(H_HUD_X,H_ROOM_Y);ctx.stroke();
  const fy=H_ROOM_Y+H_ROWS*H_TILE;
  ctx.fillStyle='#181828';ctx.fillRect(0,fy,H_HUD_X,H-fy);
}

function drawHeistItems(){
  const r=heist.room;
  for(const it of r.floppies){
    if(it.got)continue;
    rnd(it.x-8,it.y-9,16,18,2,'#1a2a6a','#4466cc',1.5);
    ctx.fillStyle='#5577bb';ctx.fillRect(it.x-5,it.y-6,10,7);
    ctx.fillStyle='#888888';ctx.fillRect(it.x-2,it.y+4,4,3);
    ctx.save();ctx.globalAlpha=0.25;circ(it.x,it.y,14,null,'#6688ff',2);ctx.restore();
  }
  for(const it of r.containers){
    if(it.got)continue;
    rnd(it.x-9,it.y-8,18,16,2,'#3a2a10','#b08040',1.5);
    ctx.strokeStyle='#806030';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(it.x-9,it.y);ctx.lineTo(it.x+9,it.y);
    ctx.moveTo(it.x,it.y-8);ctx.lineTo(it.x,it.y+8);ctx.stroke();
    ctx.save();ctx.globalAlpha=0.22;circ(it.x,it.y,13,null,'#c09050',2);ctx.restore();
  }
  const cigT=performance.now()/1000;
  for(const it of r.cigars){
    if(it.got)continue;
    ctx.save();ctx.fillStyle='#a07028';
    ctx.beginPath();ctx.ellipse(it.x,it.y,11,4,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c09040';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#cc2200';ctx.beginPath();ctx.arc(it.x+11,it.y,2.5,0,Math.PI*2);ctx.fill();
    const pulse=0.5+0.5*Math.sin(cigT*3+it.x*0.05);
    ctx.globalAlpha=0.22+pulse*0.25;
    circ(it.x,it.y,15+pulse*3,null,'#ffa040',2);
    // Sparkle cross — twinkles at the tip of the cigar
    ctx.globalAlpha=0.6+pulse*0.4;
    ctx.strokeStyle='#fff0c0';ctx.lineWidth=1;
    const sx=it.x+11,sy=it.y-1,sr=3+pulse*2;
    ctx.beginPath();ctx.moveTo(sx-sr,sy);ctx.lineTo(sx+sr,sy);
    ctx.moveTo(sx,sy-sr);ctx.lineTo(sx,sy+sr);ctx.stroke();
    ctx.restore();
  }
  for(const n of r.notes){
    if(n.read)continue;
    rnd(n.x-9,n.y-11,18,22,2,'#f0e8c0','#c0a060',1.5);
    ctx.fillStyle='#8a7050';ctx.font='6px sans-serif';ctx.textAlign='center';
    ctx.fillText('- -',n.x,n.y-3);ctx.fillText('- -',n.x,n.y+5);ctx.fillText('- -',n.x,n.y+12);
    ctx.save();ctx.globalAlpha=0.28;circ(n.x,n.y,14,null,'#ffd080',2);ctx.restore();
  }
  for(const it of r.keycards){
    if(it.got)continue;
    ctx.save();
    rnd(it.x-10,it.y-5,20,11,3,'#705010','#e0b820',1.5);
    ctx.fillStyle='#20180a';ctx.beginPath();ctx.arc(it.x+7,it.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e0b820';ctx.fillRect(it.x+4,it.y-1,3,2);ctx.fillRect(it.x+4,it.y+3,2,2);
    ctx.globalAlpha=0.28;circ(it.x,it.y,14,null,'#ffd060',2);
    ctx.restore();
  }
  // Light-switch glow — pulses when the dark room is unlit, to draw a kid's eye to it.
  if(r.dark&&!r.lightsOn){
    for(let row=0;row<H_ROWS;row++){
      for(let col=0;col<H_COLS;col++){
        if(hTileAt(r.map,col,row)===TLS){
          const lx=hTX(col),ly=hTY(row);
          const pulse=0.5+0.5*Math.sin(performance.now()/250);
          ctx.save();
          ctx.globalAlpha=0.18+pulse*0.32;
          circ(lx,ly,18+pulse*6,null,'#ffe060',2.5);
          ctx.restore();
        }
      }
    }
  }
}

function drawHeistHints(){
  const h=heist,p=h.player,r=h.room;
  for(const n of r.notes){
    if(!n.read&&Math.hypot(p.x-n.x,p.y-n.y)<H_IACT*1.5){
      if(r.dark&&!r.lightsOn)txt('[E] ??? (dark)',n.x,n.y-22,'#555566',10,'center');
      else txt('[E] Read note',n.x,n.y-22,C.gold,10,'center');
    }
  }
  for(const kp of r.keypads){
    if(!kp.open){
      const kx=H_ROOM_X+kp.tx*H_TILE+H_TILE/2,ky=H_ROOM_Y+kp.ty*H_TILE+H_TILE/2;
      if(Math.hypot(p.x-kx,p.y-ky)<H_IACT+H_TILE)
        txt('[E] Enter code',kx,H_ROOM_Y+H_TILE*2+4,C.gold,10,'center');
    }
  }
  // Light switch hint
  const pc=Math.floor((p.x-H_ROOM_X)/H_TILE),pr=Math.floor((p.y-H_ROOM_Y)/H_TILE);
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      if(hTileAt(r.map,pc+dc,pr+dr)===TLS){
        const lsx=H_ROOM_X+(pc+dc)*H_TILE+H_TILE/2,lsy=H_ROOM_Y+(pr+dr)*H_TILE+H_TILE/2;
        if(Math.hypot(p.x-lsx,p.y-lsy)<H_IACT)
          txt('[E] '+(r.lightsOn?'Lights off':'Lights on!'),lsx,lsy-22,C.gold,10,'center');
      }
    }
  }
  // Keycard door hint
  if(h.kInventory.yellow){
    for(let dr=-1;dr<=1;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(hTileAt(r.map,pc+dc,pr+dr)===TKD)
          txt('[walk] Use keycard',p.x,p.y-28,C.gold,10,'center');
      }
    }
  }
}

function drawHeistHUD(){
  const h=heist,hx=H_HUD_X,hw=W-hx;
  ctx.fillStyle='rgba(8,14,28,0.97)';ctx.fillRect(hx,0,hw,H);
  ctx.strokeStyle='rgba(60,80,130,0.55)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(hx,0);ctx.lineTo(hx,H);ctx.stroke();
  ctx.fillStyle=C.gold;ctx.font='bold 13px Georgia,serif';ctx.textAlign='left';
  ctx.fillText(h.room.name,hx+8,26);
  const t=Math.max(0,h.timer);
  const tm=Math.floor(t/60),ts=Math.floor(t%60);
  const tStr=h.room.timerSecs>0?(tm<10?'0':'')+tm+':'+(ts<10?'0':'')+ts:'--:--';
  txt('TIME',hx+8,50,C.dimTxt,11,'left');
  ctx.fillStyle=h.room.timerSecs>0?(t<30?C.donRed:t<60?C.orange:C.cream):C.dimTxt;
  ctx.font='bold 19px Courier New,monospace';ctx.textAlign='right';
  ctx.fillText(tStr,hx+hw-8,50);
  // Show vault-gate requirement (8) for disks/crates so the kid knows the
  // target. Cigars are bonus loot — show world total.
  let totalG=0;
  for(const r2 of h.rooms)totalG+=r2.cigars.length;
  const rows=[
    {lbl:'Disks:',   v:h.collected.f,tot:8,      col:'#6699ff'},
    {lbl:'Crates:',  v:h.collected.c,tot:8,      col:C.orange},
    {lbl:'Cigars:',  v:h.collected.g,tot:totalG, col:'#ffcc44'},
  ];
  let cy=64;
  for(const row of rows){
    const done=row.tot>0&&row.v>=row.tot;
    rnd(hx+6,cy,hw-12,22,4,done?'rgba(20,52,32,0.85)':'rgba(16,22,44,0.8)',done?'rgba(80,200,120,0.7)':'rgba(50,70,110,0.5)',1);
    txt(row.lbl,hx+12,cy+15,C.dimTxt,11,'left');
    txt(row.v+'/'+(row.tot||'?')+(done?' OK':''),hx+hw-14,cy+15,done?'#9ce0a8':(row.v>0?row.col:C.dimTxt),12,'right');
    cy+=28;
  }
  let codesRead=0;
  for(const n of h.room.notes)if(n.read){codesRead++;break;}
  if(codesRead){
    cy+=4;
    rnd(hx+6,cy,hw-12,20,3,'rgba(60,50,10,0.8)','rgba(180,150,40,0.5)',1);
    txt('Code: '+h.room.notes[0].code,hx+hw/2,cy+14,'#ffd060',12,'center');
    cy+=26;
  }
  // Keycard indicator
  if(h.kInventory.yellow){
    cy+=4;
    rnd(hx+6,cy,hw-12,20,3,'rgba(60,50,8,0.85)','rgba(190,160,20,0.6)',1.5);
    txt('KEY  Yellow',hx+hw/2,cy+14,'#ffd060',11,'center');
    cy+=26;
  }
  ctx.strokeStyle='rgba(60,80,120,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(hx+6,cy+6);ctx.lineTo(hx+hw-6,cy+6);ctx.stroke();
  txt('Room '+(h.roomIdx+1)+' / 8',hx+hw/2,cy+20,C.dimTxt,10,'center');
  txt('Score',hx+8,H-30,C.dimTxt,11,'left');
  txt(Math.floor(score)+'',hx+hw-8,H-30,C.gold,15,'right','bold Georgia');
  if(!TOUCH_UI)txt('Arrows + E',hx+hw/2,H-10,C.dimTxt,10,'center');
}

function drawHeistNote(){
  const h=heist;
  ctx.save();
  rnd(W/2-222,H/2-116,444,232,14,'rgba(236,224,196,0.98)','#8a7050',2.5);
  ctx.fillStyle='#5a3820';ctx.font='bold 14px Georgia,serif';ctx.textAlign='center';
  ctx.fillText('— Note —',W/2,H/2-86);
  const words=h.noteText.split(' ');
  let line='',y=H/2-56,lh=21;
  for(const w of words){
    const test=line+(line?' ':'')+w;
    if(test.length>44&&line){
      ctx.fillStyle='#3a2010';ctx.font='13px Georgia,serif';ctx.textAlign='center';
      ctx.fillText(line,W/2,y);line=w;y+=lh;
    } else {line=test;}
  }
  if(line){ctx.fillStyle='#3a2010';ctx.font='13px Georgia,serif';ctx.textAlign='center';ctx.fillText(line,W/2,y);y+=lh;}
  if(h.noteCode){
    y+=8;rnd(W/2-72,y,144,30,6,'rgba(255,220,80,0.28)','#b09030',1.5);
    ctx.fillStyle='#7a3808';ctx.font='bold 16px Courier New,monospace';ctx.textAlign='center';
    ctx.fillText('Code: '+h.noteCode,W/2,y+21);
  }
  ctx.fillStyle='#7a5030';ctx.font='11px Georgia';ctx.textAlign='center';
  ctx.fillText('Press E or tap to close',W/2,H/2+100);
  ctx.restore();
}

function drawHeist(){
  const h=heist,r=h.room,p=h.player;
  // Background (cached)
  drawCachedBackdrop('hroom_'+h.roomIdx,drawHeistRoomBg);
  // Items (under dark overlay)
  drawHeistItems();
  // Guard (under dark overlay so it lurks in the dark)
  if(r.guard)drawGuard(r.guard);
  // Dark room overlay with visibility hole around player
  if(r.dark&&!r.lightsOn){
    ctx.save();
    ctx.fillStyle='rgba(0,0,8,0.93)';
    ctx.beginPath();
    ctx.rect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
    ctx.arc(p.x,p.y,88,0,Math.PI*2);
    ctx.fill('evenodd');
    ctx.restore();
  }
  // Digory always visible
  if(!h.failed&&!h.guardStunned)drawDigory(p.x,p.y,p.dir);
  // Hints above dark overlay
  if(!h.noteOpen&&!h.kpOpen&&!h.failed&&!h.guardStunned)drawHeistHints();
  // Guard stun flash
  if(h.guardStunned){
    const flash=0.35+0.25*Math.abs(Math.sin(h.guardStunT*18));
    ctx.save();ctx.globalAlpha=flash;
    ctx.fillStyle='#cc0000';
    ctx.fillRect(H_ROOM_X,H_ROOM_Y,H_HUD_X,H_ROWS*H_TILE);
    ctx.restore();
    txt('Caught! Stay still...',H_HUD_X/2,H_ROOM_Y+H_ROWS*H_TILE/2,'#ff8888',20,'center','bold Georgia');
  }
  drawHeistHUD();
  if(h.kpOpen)drawHeistKP();
  else if(h.noteOpen)drawHeistNote();
  if(h.msgT>0){
    const a=Math.min(1,h.msgT/0.5);
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,8,24,0.9)';ctx.fillRect(0,H_ROOM_Y+H_ROWS*H_TILE,H_HUD_X,H-(H_ROOM_Y+H_ROWS*H_TILE));
    txt(h.msg,H_HUD_X/2,H-12,C.cream,13,'center');
    ctx.restore();
  }
  if(h.failed){
    const a=Math.min(1,(2.8-h.failT)/0.5);
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-220,H/2-60,440,120,14,'rgba(70,8,8,0.95)',C.donRed,2.5);
    txt("Time's Up!",W/2,H/2-14,'#ffaaaa',30,'center','bold Georgia');
    txt('The guards returned — restarting heist...',W/2,H/2+24,C.cream,13,'center');
    ctx.restore();
  }
  if(h.room.complete){
    const a=Math.min(1,h.completeT/0.4);
    ctx.save();ctx.globalAlpha=a;
    rnd(W/2-200,H/2-60,400,120,12,'rgba(20,50,28,0.96)','#3a8a5a',2);
    txt('Deeb Complete!',W/2,H/2-14,C.krakGreen,28,'center','bold Georgia');
    txt('Loading escape route...',W/2,H/2+24,C.dimTxt,14,'center');
    ctx.restore();
  }
}

// ── Home: House Lockdown ──────────────────────────────────────────────────
const HM_SPD=115,HM_IACT=46,HM_PICK=24;
const HOME_MAP=(function(){
  var F=TF,W=TW,I=TI;
  return [
    [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W], // row 0 perimeter
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 1 bedroom/uhall/office
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 2
    [W,F,F,F,F,W,F,F,F,F,F,F,F,W,F,F,F,F,W], // row 3
    [W,W,F,W,W,W,F,F,F,F,F,F,F,W,W,F,W,W,W], // row 4 passages at col 2+15
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 5 main floor
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 6
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 7
    [W,F,F,F,F,F,W,W,F,F,F,W,W,F,I,I,I,F,W], // row 8 kitchen island+ice
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,I,I,I,F,W], // row 9 ice right
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,I,I,I,F,W], // row 10
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 11
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 12 blanket at col 2
    [W,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,F,W], // row 13
    [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W], // row 14 perimeter
  ];
})();

function hmTileAt(col,row){
  if(col<0||col>=H_COLS||row<0||row>=H_ROWS)return TW;
  return HOME_MAP[row][col];
}
function hmCanMove(px,py){
  var off=10,c0=Math.floor((px-off-H_ROOM_X)/H_TILE),c1=Math.floor((px+off-H_ROOM_X)/H_TILE);
  var r0=Math.floor((py-off-H_ROOM_Y)/H_TILE),r1=Math.floor((py+off-H_ROOM_Y)/H_TILE);
  for(var r=r0;r<=r1;r++)for(var c=c0;c<=c1;c++)if(hmTileAt(c,r)===TW)return false;
  return true;
}

let hm=null;
function hmMsg(s){hm.msg=s;hm.msgT=2.6;}

function initHome(){
  hm={
    p:{x:hTX(9),y:hTY(7),vx:0,vy:0,dir:'down',bobT:0},
    locks:[
      {col:9, row:1, name:'North Window',dir:'n',locked:false,pressure:0,needKey:false},
      {col:17,row:6, name:'East Window', dir:'e',locked:false,pressure:0,needKey:false},
      {col:9, row:13,name:'Front Door',  dir:'s',locked:false,pressure:0,needKey:false},
      {col:1, row:6, name:'Back Door',   dir:'w',locked:false,pressure:0,needKey:true},
    ],
    kcard:{found:false,col:14,row:9},
    donInside:0,breachFlash:0,
    firelightCalled:false,firelightActive:false,firelightTimer:0,
    cmpUsed:false,
    fpUsed:false,fpFire:false,fpFireT:0,
    failed:false,failTimer:0,
    msg:'',msgT:0,
    startScore:score,
  };
}

function updateHome(dt){
  var h=hm,p=h.p;
  if(h.failed){
    h.failTimer-=dt;
    if(h.failTimer<=0){score=Math.max(0,score-50);stageScores.home=0;initHome();}
    return;
  }

  var dx=0,dy=0;
  if(K['ArrowLeft']||touchState.dirs.has('left'))dx-=1;
  if(K['ArrowRight']||touchState.dirs.has('right'))dx+=1;
  if(K['ArrowUp']||touchState.dirs.has('up'))dy-=1;
  if(K['ArrowDown']||touchState.dirs.has('down'))dy+=1;
  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
  if(dx!==0)p.dir=dx<0?'left':'right';
  if(dy!==0)p.dir=dy<0?'up':'down';

  var col=Math.floor((p.x-H_ROOM_X)/H_TILE),row=Math.floor((p.y-H_ROOM_Y)/H_TILE);
  var onIce=(hmTileAt(col,row)===TI);
  if(onIce){
    p.vx+=(dx*HM_SPD-p.vx)*2.8*dt;
    p.vy+=(dy*HM_SPD-p.vy)*2.8*dt;
  } else {
    p.vx=dx*HM_SPD;p.vy=dy*HM_SPD;
  }
  var nx=p.x+p.vx*dt;
  if(hmCanMove(nx,p.y)){p.x=nx;}else p.vx=0;
  var ny=p.y+p.vy*dt;
  if(hmCanMove(p.x,ny)){p.y=ny;}else p.vy=0;
  p.x=Math.max(H_ROOM_X+H_TILE+10,Math.min(H_ROOM_X+(H_COLS-1)*H_TILE-10,p.x));
  p.y=Math.max(H_ROOM_Y+H_TILE+10,Math.min(H_ROOM_Y+(H_ROWS-1)*H_TILE-10,p.y));
  p.bobT+=dt;

  // Keycard pickup
  if(!h.kcard.found){
    var kx=hTX(h.kcard.col),ky=hTY(h.kcard.row);
    if(Math.hypot(p.x-kx,p.y-ky)<HM_PICK+H_TILE){
      h.kcard.found=true;score+=15;sfxPickup();hmMsg('Found the garage keycard! +15');
    }
  }

  // ACT key (E)
  if(eat('KeyE')||touchState.buttons.has('act')){
    var acted=false;
    for(var li=0;li<h.locks.length;li++){
      var lk=h.locks[li];
      if(lk.locked)continue;
      var lx=hTX(lk.col),ly=hTY(lk.row);
      if(Math.hypot(p.x-lx,p.y-ly)<HM_IACT+H_TILE){
        if(lk.needKey&&!h.kcard.found){hmMsg('Need the garage keycard first!');}
        else{lk.locked=true;lk.pressure=0;score+=50;sfxLock();hmMsg(lk.name+' locked! +50');}
        acted=true;break;
      }
    }
    // Phone (col 9, row 5)
    if(!acted&&Math.hypot(p.x-hTX(9),p.y-hTY(5))<HM_IACT+H_TILE){
      if(!h.firelightCalled){
        h.firelightCalled=true;h.firelightActive=true;h.firelightTimer=18;
        score+=30;hmMsg('Firelight Guy arrives! Front door pressure slowed. +30');
      } else hmMsg("He's already on the south side.");
      acted=true;
    }
    // Crow computer (col 15, row 2)
    if(!acted&&Math.hypot(p.x-hTX(15),p.y-hTY(2))<HM_IACT+H_TILE){
      if(!h.cmpUsed){h.cmpUsed=true;score+=8;hmMsg('Playing The Sims on the crow computer... +8');}
      else hmMsg('The Sims is still loading.');
      acted=true;
    }
    // Fireplace robot (col 2, row 7)
    if(!acted&&Math.hypot(p.x-hTX(2),p.y-hTY(7))<HM_IACT+H_TILE){
      if(!h.fpUsed){
        h.fpUsed=true;h.fpFire=true;h.fpFireT=4.0;
        score+=8;hmMsg('Fireplace Robot lights a fire! The rug ignites! +8');
      } else if(h.fpFire){
        h.fpFire=false;hmMsg('Fireplace Robot puts out the rug.');
      } else hmMsg('Fireplace Robot bows.');
      acted=true;
    }
  }

  if(h.fpFire){h.fpFireT-=dt;if(h.fpFireT<=0)h.fpFire=false;}
  if(h.firelightActive){h.firelightTimer-=dt;if(h.firelightTimer<=0)h.firelightActive=false;}
  if(h.msgT>0)h.msgT-=dt;
  if(h.breachFlash>0)h.breachFlash=Math.max(0,h.breachFlash-dt);

  // Don pressure
  var allLocked=true;
  for(var pi=0;pi<h.locks.length;pi++){
    var lck=h.locks[pi];
    if(!lck.locked){
      allLocked=false;
      var rate=0.028*diff.donRate;
      if(lck.dir==='s'&&h.firelightActive)rate*=0.35;
      lck.pressure=Math.min(1,lck.pressure+rate*dt);
      if(lck.pressure>=1){
        lck.pressure=0;h.donInside++;h.breachFlash=0.9;
        hmMsg('The Don broke through the '+lck.name+'!');
        if(h.donInside>=2){h.failed=true;h.failTimer=3.2;}
      }
    }
  }

  // Victory: all locked + near yellow blanket
  if(allLocked&&Math.hypot(p.x-hTX(2),p.y-hTY(12))<HM_IACT+4){
    score+=30;stageScores.home=score-h.startScore;
    startPhase('victory');
  }
}

// ─── Home drawing ──────────────────────────────────────────────────────────
function drawHomeBg(){
  // Outer bg
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,W,H);
  // Floor tiles
  for(var row=0;row<H_ROWS;row++){
    for(var col=0;col<H_COLS;col++){
      var tx=H_ROOM_X+col*H_TILE,ty=H_ROOM_Y+row*H_TILE;
      var t=hmTileAt(col,row);
      if(t===TW){
        ctx.fillStyle='#2e2840';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.fillStyle='rgba(80,70,120,0.25)';ctx.fillRect(tx,ty,H_TILE,3);
      } else if(t===TI){
        ctx.fillStyle='#b8d8ec';ctx.fillRect(tx,ty,H_TILE,H_TILE);
        ctx.strokeStyle='rgba(200,230,255,0.5)';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(tx+4,ty+4);ctx.lineTo(tx+H_TILE-4,ty+H_TILE-4);
        ctx.moveTo(tx+H_TILE-4,ty+4);ctx.lineTo(tx+4,ty+H_TILE-4);ctx.stroke();
      } else {
        // Warm cream floor with room-specific tint
        var inBedroom=(col>=1&&col<=4&&row>=1&&row<=3);
        var inOffice=(col>=14&&col<=17&&row>=1&&row<=3);
        var inLiving=(col>=1&&col<=5&&row>=5&&row<=10);
        ctx.fillStyle=inBedroom?'#cfc0a0':inOffice?'#b8c8a0':inLiving?'#c8b890':'#d0c4a0';
        ctx.fillRect(tx,ty,H_TILE,H_TILE);
        // Subtle grid
        ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.5;
        ctx.strokeRect(tx+0.5,ty+0.5,H_TILE-1,H_TILE-1);
      }
    }
  }
  // Room decorations (static)
  // Bed in bedroom (cols 1-2, rows 1-2)
  ctx.fillStyle='#8a6048';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE,H_TILE*2,H_TILE*0.6); // headboard
  ctx.fillStyle='#e0e8f0';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE+H_TILE*0.6,H_TILE*2,H_TILE*1.4); // sheets
  ctx.fillStyle='#c0d0e8';
  ctx.fillRect(H_ROOM_X+H_TILE,H_ROOM_Y+H_TILE*0.6,H_TILE*2,H_TILE*0.6); // pillow
  // Office desk (cols 15-16, row 2)
  rnd(H_ROOM_X+15*H_TILE,H_ROOM_Y+2*H_TILE,H_TILE*2,H_TILE*0.7,3,'#6a4828',null,0);
  // HUD banner area (top strip)
  ctx.fillStyle='#181428';ctx.fillRect(0,0,W,H_ROOM_Y);
  ctx.strokeStyle='rgba(100,80,160,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H_ROOM_Y);ctx.lineTo(W,H_ROOM_Y);ctx.stroke();
}

function drawHomeLocks(){
  var h=hm,p=h.p;
  for(var i=0;i<h.locks.length;i++){
    var lk=h.locks[i];
    var lx=hTX(lk.col),ly=hTY(lk.row);
    var near=Math.hypot(p.x-lx,p.y-ly)<HM_IACT+H_TILE;
    // Draw door/window sprite at wall edge
    var wx,wy,ww,wh;
    if(lk.dir==='n'){wx=lx-12;wy=H_ROOM_Y+2;ww=24;wh=H_TILE-4;}
    else if(lk.dir==='s'){wx=lx-12;wy=H_ROOM_Y+(H_ROWS-1)*H_TILE+2;ww=24;wh=H_TILE-4;}
    else if(lk.dir==='w'){wx=H_ROOM_X+2;wy=ly-12;ww=H_TILE-4;wh=24;}
    else{wx=H_ROOM_X+(H_COLS-1)*H_TILE+2;wy=ly-12;ww=H_TILE-4;wh=24;}
    // Door/window frame
    var frameCol=lk.locked?C.krakGreen:(lk.pressure>0.7?C.donRed:'#9a8060');
    rnd(wx,wy,ww,wh,3,lk.locked?'rgba(30,100,50,0.7)':'rgba(80,50,20,0.7)',frameCol,2);
    if(lk.locked){
      ctx.fillStyle=C.krakGreen;ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText('✓',wx+ww/2,wy+wh/2+4);
    } else {
      ctx.fillStyle=C.donRed;ctx.font='bold 7px monospace';ctx.textAlign='center';
      if(lk.needKey&&!h.kcard.found)ctx.fillStyle='#d09030';
      ctx.fillText(lk.dir==='n'||lk.dir==='s'?'||':'=',wx+ww/2,wy+wh/2+3);
    }
    // Pressure bar (below or beside door)
    if(!lk.locked){
      var bx,by,blen=36,bthick=5;
      if(lk.dir==='n'){bx=lx-18;by=H_ROOM_Y+H_TILE;blen=36;bthick=5;}
      else if(lk.dir==='s'){bx=lx-18;by=H_ROOM_Y+(H_ROWS-2)*H_TILE-8;blen=36;bthick=5;}
      else if(lk.dir==='w'){bx=H_ROOM_X+H_TILE;by=ly-3;blen=5;bthick=36;}
      else{bx=H_ROOM_X+(H_COLS-2)*H_TILE-8;by=ly-3;blen=5;bthick=36;}
      var horiz=(lk.dir==='n'||lk.dir==='s');
      rnd(bx,by,horiz?blen:bthick,horiz?bthick:blen,2,'rgba(0,0,0,0.4)',null,0);
      var fill=Math.min(1,lk.pressure);
      var pulsing=lk.pressure>0.7&&Math.abs(Math.sin(h.p.bobT*9))>0.4;
      if(fill>0){
        var pc=lk.pressure>0.7?C.donRed:'#c09030';
        ctx.save();if(pulsing)ctx.globalAlpha=0.7+0.3*Math.abs(Math.sin(h.p.bobT*9));
        if(horiz)rnd(bx,by,Math.round(blen*fill),bthick,2,pc,null,0);
        else rnd(bx,by,bthick,Math.round(blen*fill),2,pc,null,0);
        ctx.restore();
      }
      // Don peeking through
      var donPk=lk.pressure*0.7+0.1;
      if(donPk>0.08){
        ctx.save();ctx.globalAlpha=Math.min(1,donPk);
        var dpx,dpy;
        if(lk.dir==='n'){dpx=lx;dpy=H_ROOM_Y-4;}
        else if(lk.dir==='s'){dpx=lx;dpy=H_ROOM_Y+H_ROWS*H_TILE+4;}
        else if(lk.dir==='w'){dpx=H_ROOM_X-4;dpy=ly;}
        else{dpx=H_ROOM_X+H_COLS*H_TILE+4;dpy=ly;}
        circ(dpx,dpy,7,'#3a1010',null,0);
        rnd(dpx-5,dpy+5,10,7,1,'#4a1818',null,0);
        ctx.fillStyle='#2a0a0a';ctx.fillRect(dpx-6,dpy-8,12,3); // hat brim
        ctx.restore();
      }
      // Proximity hint
      if(near){
        ctx.save();ctx.globalAlpha=0.8+0.2*Math.abs(Math.sin(h.p.bobT*4));
        var hint=(lk.needKey&&!h.kcard.found)?'[Need keycard]':'[E] Lock';
        txt(hint,lx,ly-26,C.gold,10,'center');
        ctx.restore();
      }
    }
  }
}

  var h=hm,p=h.p;

    var kx=hTX(h.kcard.col),ky=hTY(h.kcard.row);
    ctx.save();
    rnd(kx-10,ky-5,20,11,3,'#705010','#e0b820',1.5);

    ctx.fillStyle='#e0b820';ctx.fillRect(kx+4,ky-1,3,2);ctx.fillRect(kx+4,ky+3,2,2);
    if(Math.hypot(p.x-kx,p.y-ky)<HM_PICK+H_TILE*2){
      ctx.globalAlpha=0.7+0.3*Math.abs(Math.sin(h.p.bobT*5));

      txt('[E] Computer',ccx,ccy-22,C.gold,10,'center');

  var fpx=hTX(2),fpy=hTY(7);
  rnd(fpx-14,fpy-8,28,22,4,'#3a2828','#6a4040',1.5);
  if(h.fpFire){
