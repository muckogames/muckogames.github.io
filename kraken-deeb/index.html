    ctx.bezierCurveTo(fpx+4,fpy-14,fpx+12,fpy-8,fpx+8,fpy+12);
    ctx.fill();
    ctx.globalAlpha=0.5;ctx.fillStyle='#ffcc40';
    ctx.beginPath();ctx.ellipse(fpx,fpy-2,4,8,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(Math.hypot(p.x-fpx,p.y-fpy)<HM_IACT+H_TILE)
    txt(h.fpFire?'[E] Extinguish':'[E] Fireplace',fpx,fpy-24,C.gold,10,'center');
  // Yellow blanket (col 2, row 12)
  var blx=hTX(2),bly=hTY(12);
  var allLocked=true;
  for(var i=0;i<h.locks.length;i++){if(!h.locks[i].locked){allLocked=false;break;}}
  ctx.save();
  if(allLocked){ctx.globalAlpha=0.8+0.2*Math.abs(Math.sin(h.p.bobT*3));}
  rnd(blx-18,bly-10,36,22,4,'#d0a010','#f5c830',2);
  rnd(blx-14,bly-6,28,14,3,'#f5d040',null,0);
  if(allLocked){
    txt('Find the blanket!',blx,bly-24,C.gold,11,'center','bold Georgia');
  }
  ctx.restore();
}

function drawHomeHUD(){
  var h=hm;
  ctx.fillStyle='#181428';ctx.fillRect(0,0,W,H_ROOM_Y);
  // Lock status indicators
  var labels=['N','E','S','W'];
  var gap=4,iw=64,startX=W/2-(iw*4+gap*3)/2;
  for(var i=0;i<4;i++){
    var lk=h.locks[i];
    var bx=startX+i*(iw+gap),by=5,bw=iw,bh=H_ROOM_Y-10;
    var bc=lk.locked?'rgba(20,80,40,0.8)':(lk.pressure>0.7?'rgba(80,10,10,0.8)':'rgba(20,20,40,0.7)');
    var sc=lk.locked?C.krakGreen:(lk.pressure>0.7?C.donRed:'rgba(80,70,110,0.6)');
    rnd(bx,by,bw,bh,4,bc,sc,1.2);
    txt(labels[i],bx+12,by+22,lk.locked?C.krakGreen:(lk.needKey&&!h.kcard.found?'#d09030':C.dimTxt),11,'center','bold monospace');
    if(lk.locked){
      txt('✓ Locked',bx+bw/2,by+22,C.krakGreen,10,'center','bold monospace');
    } else {
      // Pressure bar
      rnd(bx+4,by+bh-10,bw-8,6,2,'rgba(0,0,0,0.5)',null,0);
      if(lk.pressure>0)rnd(bx+4,by+bh-10,Math.round((bw-8)*lk.pressure),6,2,lk.pressure>0.7?C.donRed:'#c09030',null,0);
      txt(lk.name,bx+bw/2,by+22,C.dimTxt,9,'center');
    }
  }
  // Score
  txt('Score: '+Math.floor(score),W-16,H_ROOM_Y-6,C.gold,12,'right','bold Georgia');
  // Keycard status
  if(h.kcard.found){
    txt('[KEY]',10,H_ROOM_Y-6,C.gold,10,'left','bold monospace');
  }
  // Firelight timer
  if(h.firelightActive){
    txt('Firelight Guy: '+Math.ceil(h.firelightTimer)+'s',10,H_ROOM_Y-6,'#88ff88',10,'left','monospace');
  }
}

// ── Victory ───────────────────────────────────────────────────────────────
function initVictory(){
  const thresholds=[200,550,900];
  var stars=0;
  var mul=diff.starMul;
  for(var i=2;i>=0;i--){if(score>=thresholds[i]*mul){stars=i+1;break;}}
  var sub1Pts=stageScores.sub1;
  var heistPts=stageScores.heist-stageScores.sub1;
  var sub2Pts=stageScores.sub2;
  var homePts=stageScores.home;
  vic={stars,rank:0,sub1Pts,heistPts,sub2Pts,homePts};
  if(!scoreSaved){
    scoreSaved=true;
    vic.rank=saveHS({score:Math.floor(score),diff:diff.label,date:Date.now()});
  }
  setTimeout(sfxVictory,400);
}

let vicT=0;
function updateVictory(dt){
  vicT+=dt;
  if(eat('Enter')||eat('Space')){mclk=false;resetRun();phase='title';vicT=0;}
  if(mclk&&inRect(mx,my,W/2-120,H-82,240,54)){mclk=false;resetRun();phase='title';vicT=0;}
}

function drawVictory(){
  fillRect(0,0,W,H,'#080d18');

  // Yellow blanket bed
  rnd(W/2-110,H-140,220,48,8,'#c49020',null,0);
  rnd(W/2-104,H-136,208,40,6,'#f5d040',null,0);
  // Digory on blanket (simple dog shape)
  const dx=W/2, dy=H-120;
  circ(dx,dy-12,14,'#f0f0f0');           // white head
  fillRect(dx-18,dy-8,36,18,'#f0f0f0');  // body
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(dx-5,dy-22,10,8,0,0,Math.PI*2);ctx.fill(); // black spot on head
  circ(dx-10,dy-14,4,'#111');circ(dx+10,dy-14,4,'#111'); // ears
  ctx.fillStyle='#8a5030';
  ctx.beginPath();ctx.ellipse(dx+4,dy-10,5,4,0,0,Math.PI*2);ctx.fill(); // muzzle

  txt('Digory climbs onto the yellow blanket and falls asleep.',W/2,H-154,C.dimTxt,12,'center');

  // Stars
  const starStr=(vicT>0.2?'★':'☆')+(vicT>0.7&&vic.stars>=2?'★':'☆')+(vicT>1.2&&vic.stars>=3?'★':'☆');
  const starCol=vic.stars===3?'#ffd700':vic.stars===2?'#e8e020':'#888888';
  txt(starStr,W/2,72,starCol,50,'center');

  txt('Mission Complete!',W/2,120,C.gold,32,'center','bold Georgia');

  // Per-stage score breakdown
  var panelX=W/2-310, panelY=140, panelW=340, panelH=166;
  rnd(panelX,panelY,panelW,panelH,12,'rgba(0,8,26,0.88)','rgba(90,140,210,0.4)',1.5);
  var stages=[
    {label:'Sub Run',    pts:vic.sub1Pts,  col:'#5ab5e8'},
    {label:'The Heist',  pts:vic.heistPts, col:'#a0e878'},
    {label:'Escape',     pts:vic.sub2Pts,  col:'#e8a040'},
    {label:'Lockdown',   pts:vic.homePts,  col:'#e86060'},
  ];
  var maxBar=panelW-100, maxPts=Math.max(1,Math.floor(score));
  for(var si=0;si<stages.length;si++){
    var sy=panelY+20+si*36;
    var sp=Math.max(0,stages[si].pts);
    var bw=Math.round(maxBar*(sp/maxPts));
    txt(stages[si].label,panelX+8,sy+13,C.dimTxt,11,'left');
    rnd(panelX+72,sy,maxBar,18,4,'rgba(255,255,255,0.07)',null,0);
    if(bw>0)rnd(panelX+72,sy,bw,18,4,stages[si].col,null,0);
    txt(sp>0?'+'+sp:'0',panelX+72+maxBar+6,sy+13,stages[si].col,11,'left');
  }
  txt('Difficulty: '+diff.label,panelX+panelW/2,panelY+panelH-12,C.dimTxt,11,'center');

  // Total + rank
  var rightX=W/2+50, rightPanelW=210, rightPanelH=80;
  rnd(rightX,panelY,rightPanelW,rightPanelH,12,'rgba(0,8,26,0.88)','rgba(90,140,210,0.4)',1.5);
  txt('Total Score',rightX+rightPanelW/2,panelY+22,C.dimTxt,12,'center');
  txt(Math.floor(score)+'',rightX+rightPanelW/2,panelY+60,C.gold,30,'center','bold Georgia');

  var rankY=panelY+rightPanelH+8;
  var rankPanelH=vic.rank>0&&vic.rank<=3?46:0;
  if(vic.rank>0&&vic.rank<=3){
    var medals=['1st','2nd','3rd'];
    rnd(rightX,rankY,rightPanelW,rankPanelH,10,'rgba(246,213,122,0.12)','rgba(246,213,122,0.5)',1.5);
    txt(medals[vic.rank-1]+' on leaderboard!',rightX+rightPanelW/2,rankY+16,C.gold,11,'center');
    txt('Score #'+vic.rank,rightX+rightPanelW/2,rankY+34,C.gold,13,'center','bold Georgia');
  }

  // High score list
  var hsY=panelY+rankPanelH+(rankPanelH>0?16:0)+rightPanelH+8;
  var hs=getHS();
  if(hs.length>0){
    var hsRows=Math.min(hs.length,5);
    rnd(rightX,hsY,rightPanelW,hsRows*20+22,8,'rgba(0,8,26,0.7)','rgba(70,90,130,0.4)',1);
    txt('Best Scores',rightX+rightPanelW/2,hsY+14,C.dimTxt,10,'center');
    for(var hi=0;hi<hsRows;hi++){
      var hcol=hi===0?C.gold:C.dimTxt;
      txt((hi+1)+'. '+Math.floor(hs[hi].score),rightX+rightPanelW/2,hsY+28+hi*20,hcol,11,'center');
    }
  }

  // Play again button
  var bx=W/2-120,by=H-82;
  var hover=inRect(mx,my,bx,by,240,54);
  rnd(bx,by,240,54,10,hover?'rgba(246,213,122,0.22)':'rgba(246,213,122,0.08)',C.gold,hover?2.5:1.5);
  txt('PLAY AGAIN',W/2,by+34,C.gold,20,'center','bold Georgia');
}

// ── Difficulty select ─────────────────────────────────────────────────────
function updateDiff(dt){
  for(let i=0;i<DIFFS.length;i++){
    const d=DIFFS[i];
    const bx=W/2-310+i*218, by=290, bw=202, bh=130;
    if(mclk&&inRect(mx,my,bx,by,bw,bh)){
      mclk=false;diff=d;startPhase('sub1');return;
    }
    if(eat('Digit'+(i+1))){diff=d;startPhase('sub1');return;}
  }
  if(eat('Escape')||eat('Backspace')){phase='title';}
}
function drawDiff(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#030b14');grad.addColorStop(1,'#051426');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  txt('CHOOSE DIFFICULTY',W/2,70,C.gold,28,'center','bold Georgia');
  txt('Press 1, 2, or 3  —  or tap a card',W/2,104,C.dimTxt,14,'center');

  for(let i=0;i<DIFFS.length;i++){
    const d=DIFFS[i];

  txt('Esc — back',W/2,H-14,C.dimTxt,12,'center');

// ── Game loop ─────────────────────────────────────────────────────────────
let lastTs=0, lastRenderTs=0, simDebt=0, t=0;
function targetFps(){return LOW_FPS_PHASES.has(phase)?30:60;}

function stepSimulation(dt){
  t++;
  switch(phase){
    case 'title':   updateTitle(dt);   break;
    case 'diff':    updateDiff(dt);    break;
    case 'sub1':    updateSub1(dt);    break;
    case 'heist':   updateHeist(dt);   break;
    case 'sub2':    updateSub2(dt);    break;
    case 'home':    updateHome(dt);    break;
    case 'victory': updateVictory(dt); break;
  }
}

function renderPhase(){
  switch(phase){
    case 'title':   drawTitle();   break;
    case 'diff':    drawDiff();    break;
    case 'sub1':    drawSub1();    break;
    case 'heist':   drawHeist();   break;
    case 'sub2':    drawSub2();    break;
    case 'home':    drawHome();    break;
    case 'victory': drawVictory(); break;
  }
}

function loop(ts){
  const elapsed=lastTs?Math.min((ts-lastTs)/1000,MAX_SIM_CATCHUP):0;
  lastTs=ts;
  simDebt=Math.min(simDebt+elapsed,MAX_SIM_CATCHUP);
  while(simDebt>=SIM_STEP){stepSimulation(SIM_STEP);simDebt-=SIM_STEP;}

  const fps=targetFps();
  if(fps<60){
    const minInterval=1000/fps;
    if(lastRenderTs&&ts-lastRenderTs<minInterval){requestAnimationFrame(loop);return;}
  }
  lastRenderTs=ts;

  ctx.clearRect(0,0,W,H);
  renderPhase();
  drawMobileControls();

  // consume input at end of frame
  mclk=false;
  for(const k in JP)JP[k]=false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
