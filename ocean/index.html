<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Muckoville Ocean</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1828; }
#stage { position: absolute; }
canvas { display: block; touch-action: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="stage"><canvas id="gc"></canvas></div>
<script>
// Muckoville Ocean

// ── dimensions ───────────────────────────────────────────────────────────────
var W = 800, H = 500, CELL = 40;
var OCEAN_BASE  = CELL * 2;            // y=80  wave baseline
var FLOOR_BASE  = H - CELL;            // y=460 floor baseline
var OCEAN_DEPTH = FLOOR_BASE - OCEAN_BASE; // 380px
var TERRAIN_MAX = OCEAN_DEPTH * 0.15;  // 57px max mountain height
var MAX_DPR     = 1.5;

// ── canvas setup ─────────────────────────────────────────────────────────────
var stage = document.getElementById('stage');
var gc    = document.getElementById('gc');
var ctx   = gc.getContext('2d');
var dpr   = Math.min(window.devicePixelRatio || 1, MAX_DPR);
gc.width  = Math.round(W * dpr);
gc.height = Math.round(H * dpr);
ctx.scale(dpr, dpr);

function vw() { var v = window.visualViewport; return v ? v.width  : window.innerWidth;  }
function vh() { var v = window.visualViewport; return v ? v.height : window.innerHeight; }
function onResize() {
  var sw = vw(), sh = vh(), s = Math.min(sw / W, sh / H);
  var pw = Math.round(W * s), ph = Math.round(H * s);
  stage.style.width  = pw + 'px';
  stage.style.height = ph + 'px';
  stage.style.left   = Math.round((sw - pw) / 2) + 'px';
  stage.style.top    = Math.round((sh - ph) / 2) + 'px';
  // Canvas CSS must match stage so it doesn't overflow on small screens
  gc.style.width  = pw + 'px';
  gc.style.height = ph + 'px';
}
window.addEventListener('resize', onResize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
onResize();

// ── input ─────────────────────────────────────────────────────────────────────
var K = {}, JP = {};
document.addEventListener('keydown', function(e) {
  unlockAC();
  if (!K[e.code]) JP[e.code] = true;
  K[e.code] = true;
  if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'ShiftRight' ||
      e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
});
document.addEventListener('keyup', function(e) { K[e.code] = false; });

var _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}
function unlockAC() { var a = getAC(); if (a.state !== 'running') a.resume(); }
function playTone(freq, vol, dur, type) {
  var a = getAC(); if (a.state !== 'running') return;
  var o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime + dur);
}
function playNoise(vol, dur) {
  var a = getAC(); if (a.state !== 'running') return;
  var buf = a.createBuffer(1, Math.ceil(a.sampleRate * dur), a.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  var src = a.createBufferSource(), g = a.createGain();
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  src.buffer = buf; src.connect(g); g.connect(a.destination);
  src.start();
}

// ── surface wave ─────────────────────────────────────────────────────────────
var wt = 0;
function wave(wx) {
  return OCEAN_BASE
    + 8  * Math.sin(0.018 * wx + wt * 0.85)
    + 5  * Math.sin(0.043 * wx + wt * 1.45)
    + 3  * Math.sin(0.099 * wx + wt * 0.60);
}

// ── seafloor terrain ──────────────────────────────────────────────────────────
// Deterministic sine-sum terrain; mountains/valleys up to TERRAIN_MAX above floor
function terrain(wx) {
  var h = 0.42 * Math.sin(wx * 0.0071 + 1.23)
        + 0.28 * Math.sin(wx * 0.018  + 4.51)
        + 0.18 * Math.sin(wx * 0.053  + 2.78)
        + 0.12 * Math.sin(wx * 0.137  + 0.44);
  // h in (-1,1) -> normalise to (0,1) -> scale
  return FLOOR_BASE - (h + 1) * 0.5 * TERRAIN_MAX;
}

// ── submarine ─────────────────────────────────────────────────────────────────
var MAX_VX = 200, MAX_VY = 110;
var ACCEL_X = 350, ACCEL_Y = 300;
var DRAG_X  = 0.9, DRAG_Y  = 1.8;
var SUB_HW = 40, SUB_HH = 14;   // half-width / half-height
var SUB_RADIUS = 32;             // collision radius

var sub = { x: 0, y: OCEAN_BASE + CELL * 3, vx: 0, vy: 0 };
var subFace   = 1;               // 1=right -1=left
var subPitch  = 0, subPitchT = 0;
var propAng   = 0;
var hitFlash  = 0;

var shakeX = 0, shakeY = 0, shakeMag = 0;

// ── vehicle select & speedboat ────────────────────────────────────────────────
var vehicleMode = 'none'; // 'sub' | 'boat'
var boat = { x: 0, y: 0, heading: 0, speed: 0 };
var BOAT_ACCEL   = 340;
var BOAT_MAX_SPD = 270;
var BOAT_DRAG    = 1.4;
var BOAT_TURN    = 1.9;
var BOAT_RADIUS  = 22;
var BOAT_BANK_Y  = 190;  // world Y channel half-width; banks beyond this
var boatWake     = [];
var boatThrottleBeepT = 0;
var vsHoverBtn = ''; // vehicle select hover target
var boatFuel = 1.0;
var BOAT_FUEL_DRAIN = 1 / 40; // 40 s continuous throttle to empty
var BOAT_FUEL_FILL  = 1 / 5;  // 5 s to refill at station
var boatEngineState = 'up';   // 'up' | 'lowering' | 'ready'
var boatEngineT     = 0;      // 0→1 lowering progress
var BOAT_ENGINE_DUR = 1.1;    // seconds to lower motor
var score = 0, scorePopT = 0;
var WAKE = [];
var thrustBeepT = 0, surfBreachWas = false;

// ── iceberg sink animation ────────────────────────────────────────────────────
var gamePhase  = 'vehicleSelect'; // 'vehicleSelect'|'playing'|'sinking'|'gameover'|'boatSailing'
var sinkT      = 0;
var sinkFace   = 1;
var sinkCamX   = 0;
// two pieces: bow (front) and stern (back)
var sinkBow    = { x: 0, y: 0, vy: 0, angle: 0, resting: false, restAngle: 0 };
var sinkStern  = { x: 0, y: 0, vy: 0, angle: 0, resting: false, restAngle: 0 };
// tilt phase lasts SINK_TILT s, then pieces split and sink
var SINK_TILT   = 1.4;
var SINK_TOTAL  = 30.0; // fallback timeout
var sinkSettled = 0;    // time both pieces have been resting

function triggerSink() {
  gamePhase      = 'sinking';
  sinkT          = 0;
  sinkFace       = subFace;
  sinkCamX       = camX;
  sinkSettled    = 0;
  var hw = SUB_HW * 0.5;
  sinkBow.x      = sub.x + hw * subFace;
  sinkBow.y      = sub.y;
  sinkBow.vy     = -20;
  sinkBow.angle  = 0;
  sinkBow.resting = false;
  sinkBow.restAngle = (Math.PI * 0.55) * sinkFace; // nose-down into floor
  sinkStern.x    = sub.x - hw * subFace;
  sinkStern.y    = sub.y;
  sinkStern.vy   = -40;
  sinkStern.angle = 0;
  sinkStern.resting = false;
  sinkStern.restAngle = (-Math.PI * 0.30) * sinkFace; // listing back
  diverOut = false; diverRecalling = false;
}

function resetGame() {
  sub.x = 0; sub.y = OCEAN_BASE + CELL * 3; sub.vx = 0; sub.vy = 0;
  subFace = 1; subPitch = 0; subPitchT = 0; propAng = 0; hitFlash = 0;
  fuel = 1.0; air = 1.0; camX = sub.x - W / 2;
  diverOut = false; diverRecalling = false;
  boatFuel = 1.0; boat.x = 0; boat.y = 0; boat.heading = 0; boat.speed = 0;
  boatEngineState = 'up'; boatEngineT = 0;
  gamePhase = 'vehicleSelect'; vehicleMode = 'none';
  sinkT = 0;
}

// ── kraken ────────────────────────────────────────────────────────────────────
var KRAKEN_WX  = 7200;
var KRAKEN_HOX = -38;   // hatch x offset from KRAKEN_WX
var KRAKEN_HOY = -162;  // hatch y offset from terrain(KRAKEN_WX)

var krakPhase    = 'intact'; // 'intact'|'panel'|'exploding'|'debris'|'victory'
var krakExpT     = 0;
var krakFlash    = 0;
var krakDebris   = [];
var krakSmoke    = [];
var krakHatchNear = false;
var krakSettled  = 0;
var piratePhase = 'none'; // 'none'|'arriving'|'docked'
var pirateSub = { x: 0, y: 0 };

function krakenHatchY() { return terrain(KRAKEN_WX) + KRAKEN_HOY; }

function triggerKrakenExplosion() {
  krakPhase = 'exploding'; krakExpT = 0; krakFlash = 1.0; krakSettled = 0;
  playNoise(0.7, 0.5); shakeMag = Math.max(shakeMag, 32);
  score += 500; scorePopT = 1.0;
  diverOut = false; diverRecalling = false;
  var ty = terrain(KRAKEN_WX);
  krakDebris = [];
  var rs = 0xf00d1234;
  function rr() { rs = ((rs >>> 0) * 1664525 + 1013904223) >>> 0; return rs / 0xffffffff; }
  for (var ki = 0; ki < 14; ki++) {
    krakDebris.push({
      x: KRAKEN_WX + (rr()*2-1)*80,  y: ty - 40 - rr()*100,
      vx: (rr()*2-1)*270,             vy: -(65 + rr()*200),
      angle: rr()*Math.PI*2,          dAngle: (rr()*2-1)*5,
      type: Math.floor(rr()*4),       resting: false
    });
  }
  krakSmoke = [];
  for (var si = 0; si < 10; si++) {
    krakSmoke.push({
      x: KRAKEN_WX + (rr()*2-1)*60, y: ty - 30 - rr()*90,
      r: 6 + rr()*16, maxR: 35 + rr()*55,
      vx: (rr()*2-1)*28,             vy: -(25 + rr()*42),
      alpha: 0.88
    });
  }
}

// ── fuel & air ────────────────────────────────────────────────────────────────
var fuel = 1.0;           // 0–1; drained by fwd/rev thrust
var air  = 1.0;           // 0–1; drained always, refilled at surface
var FUEL_DRAIN  = 1 / 30;  // 30 s of continuous thrust empties tank
var AIR_DRAIN   = 1 / 240; // 4-minute air supply
var FUEL_FILL   = 1 / 4;   // 4 s to fully refuel at station
var AIR_FILL    = 1 / 5;   // 5 s to fully top-off at surface
var STATION_GAP = 1800;    // px between stations
var STATION_OFF = 900;     // world x of first station (±)
var nearStation  = false;  // sub within docking range this frame
var atSurface    = false;  // sub at wave surface this frame
var airFillTimer = 0;      // drives surface air-fill visual

// ── diver ─────────────────────────────────────────────────────────────────────
var DIVER_ACCEL = 160, DIVER_MAX = 90, DIVER_DRAG = 2.2;
var diverOut       = false;
var diverRecalling = false; // diver is swimming back to sub
var diver          = { x: 0, y: 0, vx: 0, vy: 0 };
var diverFace      = 1;
var diverNearStation = false;

var camX = sub.x - W / 2;

// ── scenery (coral + wrecks) ──────────────────────────────────────────────────
var CORALS = [], WRECKS = [];
(function() {
  var coralCols = ['#e85570','#ff8c42','#d43a8a','#9b5de5','#00bbf9','#ff6b6b','#ffd166'];
  for (var i = -50; i <= 50; i++) {
    var wx  = i * 178 + (((Math.abs(i) * 97 + 13) * 57) % 80) - 40;
    var col = coralCols[Math.abs(i) % coralCols.length];
    CORALS.push({ wx: wx, col: col, h: 18 + Math.abs((i * 73) % 22), type: Math.abs(i) % 3 });
  }
  for (var j = -8; j <= 8; j++) {
    if (j === 0) continue;
    WRECKS.push({ wx: j * 920 + ((Math.abs(j) * 139) % 200) - 100 });
  }
}());

var ICEBERGS = [];
(function() {
  for (var i = -12; i <= 12; i++) {
    if (i === 0) continue;
    var wx = i * 2400 + ((Math.abs(i) * 317 + 91) % 600) - 300;
    if (Math.abs(wx - KRAKEN_WX) < 500) continue; // leave space for the Kraken
    var sz = 0.75 + (Math.abs(i * 53) % 25) / 100; // 0.75–1.0
    ICEBERGS.push({ wx: wx, sz: sz, wy: (((Math.abs(i) * 173 + 29) % 100) / 100.0 - 0.5) * 320 });
  }
}());

// ── coral reefs (one cluster a bit past each iceberg) ─────────────────────────
var REEFS = [];
(function() {
  var rng = 0xcafe5678;
  function rr() { rng = ((rng >>> 0) * 1664525 + 1013904223) >>> 0; return rng / 0xffffffff; }
  var reefCols = ['#ff4466','#ff7722','#ff2288','#aa44ee','#00bbee','#ffcc00','#22dd88','#ff6655'];
  for (var ri = 0; ri < ICEBERGS.length; ri++) {
    var ib = ICEBERGS[ri];
    var reefWx = ib.wx + 340 + rr() * 180; // 340–520px past the iceberg
    var corals = [];
    for (var ci = 0; ci < 14; ci++) {
      corals.push({
        ox:  (rr() * 2 - 1) * 140,      // spread ±140 around reef center
        h:   28 + rr() * 52,             // height 28–80
        w:   8  + rr() * 14,             // trunk width
        col: reefCols[Math.floor(rr() * reefCols.length)],
        type: Math.floor(rr() * 3)       // 0=branching 1=fan 2=bulb
      });
    }
    REEFS.push({ wx: reefWx, corals: corals });
  }
}());

// ── sea life ──────────────────────────────────────────────────────────────────
var CREATURES = [];
(function() {
  // Deterministic RNG seeded for reproducibility
  var rng = 0xdeadbeef;
  function rand() {
    rng = ((rng >>> 0) * 1664525 + 1013904223) >>> 0;
    return rng / 0xffffffff;
  }

  var fishCols  = ['#3a7aaa','#2a5888','#4a9aaa','#226688','#1a6080'];
  var squidCols = ['#8844aa','#aa44cc','#662288','#993399','#bb66dd'];

  for (var i = 0; i < 40; i++) {
    var wx = (rand() * 2 - 1) * 5000;
    var yr = 0.15 + rand() * 0.65;
    CREATURES.push({
      wx:   wx,
      tdY:  (yr - 0.5) * 340,
      y:    OCEAN_BASE + CELL + yr * (OCEAN_DEPTH - CELL * 2),
      vx:   (22 + rand() * 48) * (rand() > 0.5 ? 1 : -1),
      vy:   0,
      r:    12 + rand() * 10,
      type: 'fish',
      col:  fishCols[i % fishCols.length],
      hit:  0
    });
  }
  for (var j = 0; j < 20; j++) {
    var wx2 = (rand() * 2 - 1) * 5000;
    var yr2 = 0.1 + rand() * 0.55;
    CREATURES.push({
      wx:   wx2,
      tdY:  (yr2 - 0.5) * 340,
      y:    OCEAN_BASE + CELL + yr2 * (OCEAN_DEPTH - CELL * 2),
      vx:   (6 + rand() * 18) * (rand() > 0.5 ? 1 : -1),
      vy:   (rand() * 2 - 1) * 12,
      r:    16 + rand() * 12,
      type: 'squid',
      col:  squidCols[j % squidCols.length],
      hit:  0,
      tentTimer: rand() * Math.PI * 2
    });
  }
}());

// ── bubbles ───────────────────────────────────────────────────────────────────
var BUBBLES = [];
(function() {
  for (var i = 0; i < 22; i++) {
    BUBBLES.push({
      wx:  (i - 11) * 210,
      y:   OCEAN_BASE + CELL + (i % 9) * 35,
      spd: 20 + i % 5 * 8,
      r:   1.5 + i % 3
    });
  }
}());

// ── touch buttons ─────────────────────────────────────────────────────────────
var BTNS = [], btnTouch = {};
(function() {
  var by = H - 65;
  BTNS = [
    { id: 'fwd',   cx: W - 65,  cy: by,      r: 40, key: 'Space'      },
    { id: 'rev',   cx: W - 148, cy: by,      r: 40, key: 'ShiftLeft'  },
    { id: 'up',    cx: 65,      cy: by - 40, r: 32, key: 'ArrowUp'    },
    { id: 'dn',    cx: 65,      cy: by + 10, r: 32, key: 'ArrowDown'  },
    { id: 'left',  cx: 50,      cy: by,      r: 36, key: 'ArrowLeft'  },
    { id: 'right', cx: 130,     cy: by,      r: 36, key: 'ArrowRight' },
    { id: 'diver', cx: W / 2,   cy: H - 38,  r: 30, key: 'KeyD'       }
  ];
}());

function touchCoord(touch) {
  var r = gc.getBoundingClientRect();
  return { x: (touch.clientX - r.left) * (W / r.width),
           y: (touch.clientY - r.top)  * (H / r.height) };
}
gc.addEventListener('touchstart', function(e) {
  e.preventDefault();
  unlockAC();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i], c = touchCoord(t);
    // Vehicle select screen — handle taps directly here (click event unreliable on iOS 12)
    if (gamePhase === 'vehicleSelect') {
      if (c.x > W/2 - 290 && c.x < W/2 - 40 && c.y > 170 && c.y < 330) {
        vehicleMode = 'sub'; gamePhase = 'playing';
      }
      if (c.x > W/2 + 40 && c.x < W/2 + 290 && c.y > 170 && c.y < 330) {
        vehicleMode = 'boat'; gamePhase = 'boatSailing';
        boat.x = 0; boat.y = 0; boat.heading = 0; boat.speed = 0;
        boatEngineState = 'up'; boatEngineT = 0;
      }
      return;
    }
    // Other tap-only interactions
    if (piratePhase === 'docked') { window.location.href = '../piratesub/'; return; }
    if (gamePhase === 'gameover') { resetGame(); return; }
    if (krakPhase === 'victory') { krakPhase = 'debris'; return; }
    if (krakPhase === 'panel') {
      if (c.x > W/2 - 92 && c.x < W/2 + 92 && c.y > H/2 - 18 && c.y < H/2 + 30) {
        triggerKrakenExplosion(); return;
      }
      if (c.x > W/2 - 62 && c.x < W/2 + 62 && c.y > H/2 + 42 && c.y < H/2 + 78) {
        krakPhase = 'intact';
        diverOut = true;
        diver.x = KRAKEN_WX + KRAKEN_HOX; diver.y = krakenHatchY();
        diver.vx = 0; diver.vy = 0; diverRecalling = true;
        return;
      }
    }
    // In-game buttons
    for (var j = 0; j < BTNS.length; j++) {
      var b = BTNS[j];
      if (Math.hypot(c.x - b.cx, c.y - b.cy) < b.r + 10) {
        btnTouch[b.id] = t.identifier; K[b.key] = true; JP[b.key] = true;
        // Diver is a tap-toggle: fire JP immediately on press (not on lift) to avoid
        // the race where touchend fires after the frame's update() has already run
        if (b.id === 'diver') JP['KeyD'] = true;
      }
    }
  }
}, { passive: false });
gc.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var tid = e.changedTouches[i].identifier;
    for (var j = 0; j < BTNS.length; j++) {
      var b = BTNS[j];
      if (btnTouch[b.id] === tid) {
        delete btnTouch[b.id];
        K[b.key] = false;
      }
    }
  }
}, { passive: false });
gc.addEventListener('touchcancel', function() {
  for (var i = 0; i < BTNS.length; i++) K[BTNS[i].key] = false;
  btnTouch = {};
}, { passive: false });
gc.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
function isTouch() { return navigator.maxTouchPoints > 0 || 'ontouchstart' in window; }

// ── draw helpers ──────────────────────────────────────────────────────────────
function rRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);         ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function tri(cx, cy, sz, dir) {
  ctx.beginPath();
  if (dir === 0) { ctx.moveTo(cx-sz, cy-sz); ctx.lineTo(cx+sz, cy); ctx.lineTo(cx-sz, cy+sz); }
  else if (dir===1) { ctx.moveTo(cx+sz, cy-sz); ctx.lineTo(cx-sz, cy); ctx.lineTo(cx+sz, cy+sz); }
  else if (dir===2) { ctx.moveTo(cx-sz, cy+sz); ctx.lineTo(cx, cy-sz); ctx.lineTo(cx+sz, cy+sz); }
  else { ctx.moveTo(cx-sz, cy-sz); ctx.lineTo(cx, cy+sz); ctx.lineTo(cx+sz, cy-sz); }
  ctx.closePath();
  ctx.fill();
}

function drawWake() {
  for (var wi2 = 0; wi2 < WAKE.length; wi2++) {
    var wk = WAKE[wi2];
    ctx.save();
    ctx.globalAlpha = wk.life * 0.55;
    ctx.strokeStyle = 'rgba(160,215,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(wk.x - camX, wk.y, wk.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ── vehicle select screen ─────────────────────────────────────────────────────
function drawVehicleSelect() {
  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#081420'); bg.addColorStop(1, '#030c14');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Animated water ripples for atmosphere
  ctx.strokeStyle = 'rgba(30,100,160,0.18)'; ctx.lineWidth = 1;
  for (var ri = 0; ri < 10; ri++) {
    var ry = 60 + ri * 48 + (wt * 18) % 48;
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry + 12); ctx.stroke();
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 34px monospace';
  ctx.fillText('MUCKOVILLE OCEAN', W / 2, 76);
  ctx.fillStyle = 'rgba(140,200,240,0.5)';
  ctx.font = '15px monospace';
  ctx.fillText('Choose your vessel', W / 2, 118);

  var subBx = W / 2 - 290, subBy = 160, subBW = 248, subBH = 170;
  var boatBx = W / 2 + 42,  boatBy = 160, boatBW = 248, boatBH = 170;

  // Sub button
  ctx.fillStyle = 'rgba(18,58,110,0.88)';
  rRect(subBx, subBy, subBW, subBH, 12); ctx.fill();
  ctx.strokeStyle = '#3388cc'; ctx.lineWidth = 2.5;
  rRect(subBx, subBy, subBW, subBH, 12); ctx.stroke();
  // Mini sub silhouette
  var scx = subBx + subBW / 2, scy = subBy + 60;
  ctx.fillStyle = '#2a7ab8';
  ctx.beginPath(); ctx.ellipse(scx, scy, 38, 13, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#44aaee';
  ctx.fillRect(scx - 10, scy - 22, 18, 13);
  ctx.fillStyle = 'rgba(100,180,255,0.5)';
  ctx.fillRect(scx - 6, scy - 20, 10, 5);
  ctx.fillStyle = '#aaddff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('SUBMARINE', scx, subBy + 108);
  ctx.fillStyle = 'rgba(140,200,240,0.55)';
  ctx.font = '11px monospace';
  ctx.fillText('Classic underwater dive', scx, subBy + 130);
  ctx.fillText('Press S or 1', scx, subBy + 148);

  // Speedboat button
  ctx.fillStyle = 'rgba(80,42,8,0.88)';
  rRect(boatBx, boatBy, boatBW, boatBH, 12); ctx.fill();
  ctx.strokeStyle = '#cc7722'; ctx.lineWidth = 2.5;
  rRect(boatBx, boatBy, boatBW, boatBH, 12); ctx.stroke();
  // Mini top-down boat
  var bcx = boatBx + boatBW / 2, bcy = boatBy + 60;
  ctx.fillStyle = '#bb5511';
  ctx.beginPath();
  ctx.moveTo(bcx + 36, bcy); ctx.lineTo(bcx + 22, bcy - 13);
  ctx.lineTo(bcx - 24, bcy - 13); ctx.lineTo(bcx - 30, bcy);
  ctx.lineTo(bcx - 24, bcy + 13); ctx.lineTo(bcx + 22, bcy + 13);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#884400';
  ctx.fillRect(bcx - 18, bcy - 9, 38, 18);
  ctx.fillStyle = 'rgba(140,220,255,0.7)';
  ctx.fillRect(bcx - 4, bcy - 7, 14, 14);
  // wake lines
  ctx.strokeStyle = 'rgba(120,200,255,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(bcx - 30, bcy - 5); ctx.lineTo(bcx - 52, bcy - 14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bcx - 30, bcy + 5); ctx.lineTo(bcx - 52, bcy + 14); ctx.stroke();
  ctx.fillStyle = '#ffddaa';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('SPEEDBOAT', bcx, boatBy + 108);
  ctx.fillStyle = 'rgba(240,200,140,0.55)';
  ctx.font = '11px monospace';
  ctx.fillText('Top-down steering', bcx, boatBy + 130);
  ctx.fillText('Press B or 2', bcx, boatBy + 148);
}

// ── boat top-down update ──────────────────────────────────────────────────────
function updateBoatSailing(dt) {
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag = Math.max(0, shakeMag - 90 * dt);
  } else { shakeX = 0; shakeY = 0; }
  if (scorePopT > 0) scorePopT = Math.max(0, scorePopT - dt * 2.5);

  // ── outboard motor lowering ──
  if (boatEngineState === 'up') {
    if (JP['Space'] || JP['KeyD'] || JP['ArrowUp']) {
      boatEngineState = 'lowering'; boatEngineT = 0;
      // Engine startup sputter
      playTone(90, 0.08, 0.25, 'sawtooth');
    }
    return; // can't drive yet
  }
  if (boatEngineState === 'lowering') {
    boatEngineT += dt / BOAT_ENGINE_DUR;
    if (boatEngineT >= 1) {
      boatEngineT = 1; boatEngineState = 'ready';
      playTone(180, 0.1, 0.3, 'sawtooth'); // engine running
    }
    return; // still lowering
  }

  var left  = K['ArrowLeft'];
  var right = K['ArrowRight'];
  var fwdKey = K['Space'] || K['ArrowUp'];
  var rev   = K['ShiftLeft'] || K['ShiftRight'] || K['ArrowDown'];
  var fwd   = fwdKey && boatFuel > 0;

  // Fuel drain / refill at bank stations
  if (fwd) boatFuel = Math.max(0, boatFuel - BOAT_FUEL_DRAIN * dt);
  // Bank fuel stations checked after move (below)

  if (left)  boat.heading -= BOAT_TURN * dt;
  if (right) boat.heading += BOAT_TURN * dt;

  if (fwd) {
    boat.speed = Math.min(BOAT_MAX_SPD, boat.speed + BOAT_ACCEL * dt);
    boatThrottleBeepT -= dt;
    if (boatThrottleBeepT <= 0) {
      boatThrottleBeepT = 0.22;
      playTone(220 + boat.speed * 0.5, 0.04, 0.14, 'sawtooth');
    }
  } else if (rev) {
    boat.speed = Math.max(-BOAT_MAX_SPD * 0.35, boat.speed - BOAT_ACCEL * 0.5 * dt);
  } else {
    boatThrottleBeepT = 0;
  }
  if (!fwd && !rev) {
    boat.speed *= Math.exp(-BOAT_DRAG * dt);
    if (Math.abs(boat.speed) < 1.5) boat.speed = 0;
  }

  boat.x += Math.cos(boat.heading) * boat.speed * dt;
  boat.y += Math.sin(boat.heading) * boat.speed * dt;

  // Bank walls — bounce off top/bottom
  if (boat.y < -BOAT_BANK_Y) {
    boat.y = -BOAT_BANK_Y;
    boat.speed *= -0.25;
    playNoise(0.22, 0.10); shakeMag = Math.max(shakeMag, 6);
  }
  if (boat.y > BOAT_BANK_Y) {
    boat.y = BOAT_BANK_Y;
    boat.speed *= -0.25;
    playNoise(0.22, 0.10); shakeMag = Math.max(shakeMag, 6);
  }

  // Bank fuel stations (every STATION_GAP px along both banks)
  var bfsMin = Math.floor((boat.x - 180) / STATION_GAP);
  var bfsMax = Math.ceil( (boat.x + 180) / STATION_GAP);
  for (var bfsi = bfsMin; bfsi <= bfsMax; bfsi++) {
    var bfsWx = bfsi * STATION_GAP + STATION_OFF;
    var dxBfs = boat.x - bfsWx;
    var dyTop = boat.y - (-BOAT_BANK_Y);
    var dyBot = boat.y - ( BOAT_BANK_Y);
    if (dxBfs * dxBfs + dyTop * dyTop < 90 * 90) boatFuel = Math.min(1, boatFuel + BOAT_FUEL_FILL * dt);
    if (dxBfs * dxBfs + dyBot * dyBot < 90 * 90) boatFuel = Math.min(1, boatFuel + BOAT_FUEL_FILL * dt);
  }

  // Wake trail
  if (Math.abs(boat.speed) > 12) {
    boatWake.push({
      x: boat.x - Math.cos(boat.heading) * 20,
      y: boat.y - Math.sin(boat.heading) * 20,
      life: 1.4, r: 5
    });
  }
  for (var wi = boatWake.length - 1; wi >= 0; wi--) {
    boatWake[wi].life -= dt;
    boatWake[wi].r += 14 * dt;
    if (boatWake[wi].life <= 0) boatWake.splice(wi, 1);
  }

  // Iceberg collision (top-down)
  for (var ii = 0; ii < ICEBERGS.length; ii++) {
    var ib = ICEBERGS[ii];
    var ibR = 42 * ib.sz;
    var ibdx = boat.x - ib.wx, ibdy = boat.y - ib.wy;
    var ibD2 = ibdx * ibdx + ibdy * ibdy;
    if (ibD2 < (ibR + BOAT_RADIUS) * (ibR + BOAT_RADIUS)) {
      var ibD = Math.sqrt(ibD2) || 1;
      var nx = ibdx / ibD, ny = ibdy / ibD;
      var push = (ibR + BOAT_RADIUS) - ibD + 2;
      boat.x += nx * push; boat.y += ny * push;
      boat.speed *= -0.28;
      playNoise(0.38, 0.18); shakeMag = Math.max(shakeMag, 14);
    }
  }

  // Creature scatter (boat disturbs them)
  for (var ci = 0; ci < CREATURES.length; ci++) {
    var cr = CREATURES[ci];
    cr.wx += cr.vx * dt;
    if (cr.hit > 0) cr.hit -= dt;
    var cdx = boat.x - cr.wx, cdy = boat.y - cr.tdY;
    var cd2 = cdx * cdx + cdy * cdy;
    if (cd2 < (BOAT_RADIUS + cr.r) * (BOAT_RADIUS + cr.r) * 4) {
      cr.hit = 0.6;
      var clen = Math.sqrt(cd2) || 1;
      cr.vx = -(cdx / clen) * (60 + cr.r * 2);
    }
  }

  // Deploy diver → hand off to sub mode at boat's world position
  if (JP['KeyD']) {
    vehicleMode = 'sub';
    gamePhase   = 'playing';
    sub.x = boat.x; sub.y = OCEAN_BASE + CELL * 2 + SUB_HH;
    sub.vx = 0; sub.vy = 0; subFace = 1;
    fuel = 1.0; air = 1.0;
    camX = sub.x - W / 2;
    diverOut = true;
    diver.x = boat.x; diver.y = sub.y + SUB_HH + 12;
    diver.vx = 0; diver.vy = 28;
    diverFace = 1;
    playTone(440, 0.2, 0.3, 'sine');
  }
}

// ── boat top-down render ──────────────────────────────────────────────────────
// dir: +1 = dock extends downward from top bank, -1 = extends upward from bottom bank
function drawDock(sx, bankEdgeY, dir, isNear) {
  var dockLen = 44; // how far dock juts into the water
  var dockW   = 22;
  var deckY0  = bankEdgeY;              // bank edge
  var deckY1  = bankEdgeY + dir * dockLen; // dock tip into water
  var halfW   = dockW / 2;

  ctx.save();

  // Dock deck planks (drawn as filled rect + plank lines)
  ctx.fillStyle = isNear ? '#c8943a' : '#8b6228';
  if (dir > 0) {
    ctx.fillRect(sx - halfW, deckY0, dockW, dockLen);
  } else {
    ctx.fillRect(sx - halfW, deckY1, dockW, dockLen);
  }
  // Plank lines across the width
  ctx.strokeStyle = isNear ? '#a07020' : '#6a4a18';
  ctx.lineWidth = 1;
  for (var pi = 1; pi < 5; pi++) {
    var py = bankEdgeY + dir * (pi * dockLen / 5);
    ctx.beginPath(); ctx.moveTo(sx - halfW, py); ctx.lineTo(sx + halfW, py); ctx.stroke();
  }
  // Lengthwise gap down the middle
  ctx.beginPath(); ctx.moveTo(sx, deckY0); ctx.lineTo(sx, deckY1); ctx.stroke();

  // Pilings (3 posts along the sides, 1 at tip)
  var pilR = 3.5;
  ctx.fillStyle = '#4a2e0a';
  var pilingYs = [0.15, 0.55, 0.9];
  for (var ppi = 0; ppi < pilingYs.length; ppi++) {
    var py2 = bankEdgeY + dir * dockLen * pilingYs[ppi];
    ctx.beginPath(); ctx.arc(sx - halfW, py2, pilR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + halfW, py2, pilR, 0, Math.PI * 2); ctx.fill();
  }
  // Tip piling
  ctx.beginPath(); ctx.arc(sx, deckY1, pilR + 1, 0, Math.PI * 2); ctx.fill();

  // Fuel pump at dock tip
  var pumpY = deckY1 - dir * 8;
  ctx.fillStyle = isNear ? '#ffe066' : '#ddaa00';
  ctx.fillRect(sx - 5, Math.min(pumpY, pumpY - dir * 10), 10, 10);
  ctx.fillStyle = '#cc2200';
  ctx.fillRect(sx - 2, Math.min(pumpY, pumpY - dir * 10) - dir * 6, 4, 6);

  // Rope tying around tip piling
  ctx.strokeStyle = isNear ? '#ffe0a0' : '#998855';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(sx, deckY1, pilR + 4, 0.4, Math.PI * 1.6); ctx.stroke();

  // "FUEL" label and glow when near
  if (isNear) {
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = dir > 0 ? 'top' : 'bottom';
    ctx.fillText('FUEL', sx, deckY1 + dir * 8);
  }

  ctx.restore();
}

function drawBoatTopDown() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(Math.round(shakeX), Math.round(shakeY));

  // Deep water background
  ctx.fillStyle = '#0c3450';
  ctx.fillRect(0, 0, W, H);

  // Animated ripple streaks
  ctx.lineWidth = 1;
  var ripBase = (wt * 22 + boat.x * 0.2 + boat.y * 0.08) % 70;
  for (var ri = -2; ri < Math.ceil(W / 70) + 2; ri++) {
    var rsx = ri * 70 - ripBase % 70;
    ctx.strokeStyle = 'rgba(80,150,210,0.10)';
    ctx.beginPath(); ctx.moveTo(rsx, 0); ctx.lineTo(rsx + 35, H); ctx.stroke();
    ctx.strokeStyle = 'rgba(100,180,240,0.07)';
    ctx.beginPath(); ctx.moveTo(rsx + 35, 0); ctx.lineTo(rsx + 70, H); ctx.stroke();
  }

  // Screen-space helper
  function sw(wx) { return W / 2 + (wx - boat.x); }
  function sh(wy) { return H / 2 + (wy - boat.y); }

  // Kraken zone marker
  var kzx = sw(KRAKEN_WX), kzy = sh(0);
  if (kzx > -250 && kzx < W + 250 && kzy > -250 && kzy < H + 250) {
    var kpulse = 0.5 + 0.5 * Math.sin(wt * 2.5);
    ctx.save();
    ctx.globalAlpha = 0.18 + 0.10 * kpulse;
    ctx.fillStyle = '#dd2200';
    ctx.beginPath(); ctx.arc(kzx, kzy, 80 + kpulse * 14, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.55 + 0.25 * kpulse;
    ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(kzx, kzy, 76 + kpulse * 12, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ff6644';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('DIVE ZONE', kzx, kzy - 88);
    ctx.restore();
  }

  // Creatures — top-down silhouettes through translucent water
  for (var ci = 0; ci < CREATURES.length; ci++) {
    var cr = CREATURES[ci];
    var csx = sw(cr.wx), csy = sh(cr.tdY);
    if (csx < -100 || csx > W + 100 || csy < -100 || csy > H + 100) continue;
    ctx.save();
    ctx.globalAlpha = cr.hit > 0 ? 0.50 : 0.18;
    if (cr.type === 'fish') {
      ctx.fillStyle = '#002255';
      ctx.translate(csx, csy);
      ctx.scale(cr.vx > 0 ? 1 : -1, 1);
      ctx.beginPath();
      ctx.ellipse(0, 0, cr.r * 1.7, cr.r * 0.55, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cr.r * 1.2, 0); ctx.lineTo(cr.r * 2.0, -cr.r * 0.6);
      ctx.lineTo(cr.r * 2.0, cr.r * 0.6); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = '#440066';
      ctx.translate(csx, csy);
      ctx.beginPath(); ctx.arc(0, 0, cr.r * 0.65, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha *= 0.6;
      ctx.strokeStyle = '#440066'; ctx.lineWidth = 1.5;
      for (var ti = 0; ti < 7; ti++) {
        var ta = (ti / 7) * Math.PI * 2 + cr.tentTimer * 0.5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ta) * cr.r * 0.4, Math.sin(ta) * cr.r * 0.4);
        ctx.lineTo(Math.cos(ta) * cr.r * 1.4, Math.sin(ta) * cr.r * 1.4);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Icebergs — top-down white blobs
  for (var ii = 0; ii < ICEBERGS.length; ii++) {
    var ib = ICEBERGS[ii];
    var ibsx = sw(ib.wx), ibsy = sh(ib.wy);
    if (ibsx < -180 || ibsx > W + 180 || ibsy < -180 || ibsy > H + 180) continue;
    var ibR = 40 * ib.sz;
    ctx.save();
    // Cast shadow
    ctx.globalAlpha = 0.30;
    ctx.fillStyle = '#0a2030';
    ctx.beginPath(); ctx.arc(ibsx + 10, ibsy + 10, ibR * 1.05, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Iceberg body — lumpy polygon using seed from wx
    var ibG = ctx.createRadialGradient(ibsx - ibR * 0.25, ibsy - ibR * 0.25, 2, ibsx, ibsy, ibR);
    ibG.addColorStop(0, '#ffffff');
    ibG.addColorStop(0.55, '#ddeeff');
    ibG.addColorStop(1, '#7ab0cc');
    ctx.fillStyle = ibG;
    ctx.beginPath();
    var ibSeed = ib.wx * 0.0137;
    for (var ip = 0; ip < 9; ip++) {
      var ia = (ip / 9) * Math.PI * 2;
      var iR = ibR * (0.68 + 0.32 * Math.sin(ia * 2.1 + ibSeed));
      if (ip === 0) ctx.moveTo(ibsx + Math.cos(ia) * iR, ibsy + Math.sin(ia) * iR);
      else          ctx.lineTo(ibsx + Math.cos(ia) * iR, ibsy + Math.sin(ia) * iR);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(180,225,255,0.6)'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Wake trail
  for (var wi = 0; wi < boatWake.length; wi++) {
    var wk = boatWake[wi];
    var wsx = sw(wk.x), wsy = sh(wk.y);
    if (wsx < -80 || wsx > W + 80 || wsy < -80 || wsy > H + 80) continue;
    ctx.save();
    ctx.globalAlpha = wk.life * 0.38;
    ctx.strokeStyle = '#b0dcff'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(wsx, wsy, wk.r, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // Banks (rocky channel walls top and bottom)
  var topBY = H / 2 + (-BOAT_BANK_Y - boat.y);
  var botBY = H / 2 + ( BOAT_BANK_Y - boat.y);
  // Top bank
  if (topBY > -100) {
    ctx.fillStyle = '#28381a';
    ctx.fillRect(0, 0, W, Math.max(0, topBY));
    ctx.fillStyle = '#334428';
    ctx.beginPath(); ctx.moveTo(-2, topBY);
    for (var bx2 = 0; bx2 <= W + 6; bx2 += 5) {
      var bh1 = 7 * Math.sin((bx2 + boat.x) * 0.038 + 0.5) + 4 * Math.sin((bx2 + boat.x) * 0.12 + 2.1);
      ctx.lineTo(bx2, topBY + bh1);
    }
    ctx.lineTo(W + 2, 0); ctx.lineTo(-2, 0); ctx.closePath(); ctx.fill();
    // Rocky lumps along edge
    var bSeedT = Math.floor((boat.x - W * 0.5) / 48) * 48;
    for (var rbi = -1; rbi < Math.ceil(W / 48) + 2; rbi++) {
      var rbwx = bSeedT + rbi * 48;
      var rbh  = 7 * Math.sin(rbwx * 0.038 + 0.5) + 4 * Math.sin(rbwx * 0.12 + 2.1);
      var rbsx = W / 2 + (rbwx - boat.x);
      var rbR  = 5 + ((Math.abs(rbi * 11 + 3) % 9));
      ctx.fillStyle = rbR > 9 ? '#445530' : '#3a4e24';
      ctx.beginPath(); ctx.arc(rbsx, topBY + rbh + rbR * 0.5, rbR, 0, Math.PI * 2); ctx.fill();
    }
    // Docks on top bank (extend downward into water)
    var fsMinT = Math.floor((boat.x - W) / STATION_GAP);
    var fsMaxT = Math.ceil((boat.x + W) / STATION_GAP);
    for (var fsti = fsMinT; fsti <= fsMaxT; fsti++) {
      var fsWxT = fsti * STATION_GAP + STATION_OFF;
      var fsSxT = W / 2 + (fsWxT - boat.x);
      if (fsSxT < -60 || fsSxT > W + 60) continue;
      var fsNearT = Math.abs(boat.x - fsWxT) < 90 && Math.abs(boat.y - (-BOAT_BANK_Y)) < 90;
      drawDock(fsSxT, topBY, 1, fsNearT);
    }
  }
  // Bottom bank
  if (botBY < H + 100) {
    ctx.fillStyle = '#28381a';
    ctx.fillRect(0, Math.min(H, botBY), W, H);
    ctx.fillStyle = '#334428';
    ctx.beginPath(); ctx.moveTo(-2, botBY);
    for (var bx3 = 0; bx3 <= W + 6; bx3 += 5) {
      var bh2 = -7 * Math.sin((bx3 + boat.x) * 0.034 + 1.7) - 4 * Math.sin((bx3 + boat.x) * 0.093 + 3.3);
      ctx.lineTo(bx3, botBY + bh2);
    }
    ctx.lineTo(W + 2, H); ctx.lineTo(-2, H); ctx.closePath(); ctx.fill();
    // Rocky lumps
    var bSeedB = Math.floor((boat.x - W * 0.5) / 52) * 52;
    for (var rbi2 = -1; rbi2 < Math.ceil(W / 52) + 2; rbi2++) {
      var rbwx2 = bSeedB + rbi2 * 52;
      var rbh2  = -7 * Math.sin(rbwx2 * 0.034 + 1.7) - 4 * Math.sin(rbwx2 * 0.093 + 3.3);
      var rbsx2 = W / 2 + (rbwx2 - boat.x);
      var rbR2  = 5 + ((Math.abs(rbi2 * 13 + 7) % 9));
      ctx.fillStyle = rbR2 > 9 ? '#445530' : '#3a4e24';
      ctx.beginPath(); ctx.arc(rbsx2, botBY + rbh2 - rbR2 * 0.5, rbR2, 0, Math.PI * 2); ctx.fill();
    }
    // Docks on bottom bank (extend upward into water)
    var fsMinB = Math.floor((boat.x - W) / STATION_GAP);
    var fsMaxB = Math.ceil((boat.x + W) / STATION_GAP);
    for (var fsbi = fsMinB; fsbi <= fsMaxB; fsbi++) {
      var fsWxB = fsbi * STATION_GAP + STATION_OFF;
      var fsSxB = W / 2 + (fsWxB - boat.x);
      if (fsSxB < -60 || fsSxB > W + 60) continue;
      var fsNearB = Math.abs(boat.x - fsWxB) < 90 && Math.abs(boat.y - BOAT_BANK_Y) < 90;
      drawDock(fsSxB, botBY, -1, fsNearB);
    }
  }

  // Speedboat (always at screen center, rotated to heading)
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate(boat.heading);
  // Shadow
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000a14';
  ctx.beginPath();
  ctx.moveTo(34, 5); ctx.lineTo(21, -13); ctx.lineTo(-23, -13);
  ctx.lineTo(-30, 5); ctx.lineTo(-23, 15); ctx.lineTo(21, 15);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
  // Hull
  ctx.fillStyle = '#c05010';
  ctx.beginPath();
  ctx.moveTo(32, 0); ctx.lineTo(20, -12); ctx.lineTo(-22, -12);
  ctx.lineTo(-28, 0); ctx.lineTo(-22, 12); ctx.lineTo(20, 12);
  ctx.closePath(); ctx.fill();
  // Deck
  ctx.fillStyle = '#8a3a0a';
  ctx.fillRect(-20, -8, 40, 16);
  // Windshield
  ctx.fillStyle = 'rgba(130,215,255,0.72)';
  ctx.fillRect(-3, -6, 15, 12);
  ctx.strokeStyle = '#c08020'; ctx.lineWidth = 1;
  ctx.strokeRect(-3, -6, 15, 12);
  // Outboard motor at stern — tilted up (engine up) or down (ready)
  var motorAngle = 0;
  if (boatEngineState === 'up') {
    motorAngle = Math.PI / 2; // pointing straight up (90° from axis)
  } else if (boatEngineState === 'lowering') {
    motorAngle = (1 - boatEngineT) * Math.PI / 2; // easing down
  }
  ctx.save();
  ctx.translate(-30, 0); // stern position
  ctx.rotate(motorAngle);
  ctx.fillStyle = '#333333';
  ctx.fillRect(-3, -2, 6, 12); // motor shaft
  ctx.fillStyle = '#555555';
  ctx.fillRect(-5, 9, 10, 5);  // motor head
  if (boatEngineState === 'ready') {
    // Prop wash bubble
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath(); ctx.arc(0, 16, 5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // Bow spray when fast
  var sprayFrac = Math.abs(boat.speed) / BOAT_MAX_SPD;
  if (sprayFrac > 0.22) {
    ctx.globalAlpha = sprayFrac * 0.7;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(32, 0);
    ctx.lineTo(26, -sprayFrac * 14); ctx.lineTo(18, -4);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(32, 0);
    ctx.lineTo(26, sprayFrac * 14); ctx.lineTo(18, 4);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // "LOWER MOTOR" prompt overlay
  if (boatEngineState !== 'ready') {
    var pulse = 0.6 + 0.4 * Math.abs(Math.sin(wt * 3));
    ctx.save();
    ctx.globalAlpha = boatEngineState === 'lowering' ? (1 - boatEngineT) * 0.9 : pulse;
    ctx.fillStyle = 'rgba(4,18,30,0.78)';
    rRect(W / 2 - 160, H / 2 - 36, 320, 70, 8); ctx.fill();
    ctx.fillStyle = boatEngineState === 'lowering' ? '#44ffaa' : '#ffe066';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(
      boatEngineState === 'lowering' ? 'LOWERING MOTOR...' : 'LOWER MOTOR',
      W / 2, H / 2 - 10
    );
    if (boatEngineState === 'up') {
      ctx.fillStyle = 'rgba(200,230,255,0.65)';
      ctx.font = '13px monospace';
      ctx.fillText(isTouch() ? 'tap SPACE button' : 'press SPACE to begin', W / 2, H / 2 + 18);
    } else {
      // Progress bar for lowering
      ctx.fillStyle = 'rgba(30,80,100,0.7)';
      rRect(W / 2 - 80, H / 2 + 10, 160, 8, 3); ctx.fill();
      ctx.fillStyle = '#44ffaa';
      rRect(W / 2 - 80, H / 2 + 10, boatEngineT * 160, 8, 3); ctx.fill();
    }
    ctx.restore();
  }

  ctx.restore(); // end shake

  // HUD
  ctx.save();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  // Speed
  ctx.fillStyle = 'rgba(4,16,28,0.68)';
  rRect(10, 10, 148, 48, 5); ctx.fill();
  ctx.fillStyle = '#70c8f0';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('SPEED', 18, 16);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(Math.round(Math.abs(boat.speed)) + ' kn', 18, 28);
  var sbar = Math.abs(boat.speed) / BOAT_MAX_SPD;
  ctx.fillStyle = 'rgba(20,60,90,0.7)';
  rRect(18, 46, 126, 6, 2); ctx.fill();
  ctx.fillStyle = sbar > 0.72 ? '#ff9944' : '#44ddaa';
  rRect(18, 46, sbar * 126, 6, 2); ctx.fill();

  // Kraken compass
  var kDistPx = Math.sqrt((KRAKEN_WX - boat.x) * (KRAKEN_WX - boat.x) + boat.y * boat.y);
  var kAngle  = Math.atan2(-boat.y, KRAKEN_WX - boat.x); // angle to kraken
  ctx.fillStyle = 'rgba(4,16,28,0.68)';
  rRect(10, 66, 148, 42, 5); ctx.fill();
  ctx.fillStyle = '#ffaa44';
  ctx.font = '10px monospace';
  ctx.fillText('KRAKEN', 18, 72);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(Math.round(kDistPx) + ' m', 18, 84);
  // Arrow
  ctx.save();
  ctx.translate(140, 87);
  ctx.rotate(kAngle); // rotate arrow toward kraken
  ctx.fillStyle = '#ff6633';
  ctx.beginPath();
  ctx.moveTo(10, 0); ctx.lineTo(-5, -6); ctx.lineTo(-5, 6); ctx.closePath(); ctx.fill();
  ctx.restore();

  // Fuel gauge
  var fuelFlash = boatFuel < 0.15 && Math.floor(wt * 4) % 2 === 0;
  ctx.fillStyle = 'rgba(4,16,28,0.68)';
  rRect(10, 116, 148, 34, 5); ctx.fill();
  ctx.fillStyle = fuelFlash ? '#ff4444' : '#ffcc44';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('FUEL', 18, 122);
  ctx.fillStyle = 'rgba(20,60,90,0.7)';
  rRect(48, 123, 100, 8, 2); ctx.fill();
  ctx.fillStyle = boatFuel < 0.25 ? '#ff4444' : '#ffcc22';
  rRect(48, 123, boatFuel * 100, 8, 2); ctx.fill();
  ctx.fillStyle = 'rgba(120,180,200,0.55)';
  ctx.font = '9px monospace';
  ctx.fillText('refuel at bank docks', 18, 140);

  // Controls / Dive hint
  ctx.fillStyle = 'rgba(4,16,28,0.68)';
  rRect(10, 158, 148, 44, 5); ctx.fill();
  ctx.fillStyle = '#55eeaa';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(isTouch() ? 'DIVE button to dive' : 'D = dive here', 18, 164);
  ctx.fillStyle = 'rgba(120,180,200,0.55)';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS steer', 18, 178);
  ctx.fillText('SPACE throttle', 18, 190);

  ctx.restore();

  // Touch diver button (reuse from BTNS)
  if (isTouch()) {
    var db = null;
    for (var bi = 0; bi < BTNS.length; bi++) { if (BTNS[bi].id === 'diver') { db = BTNS[bi]; break; } }
    if (db) {
      ctx.save();
      ctx.globalAlpha = 0.72;
      ctx.fillStyle = 'rgba(20,120,80,0.85)';
      ctx.strokeStyle = '#44ffaa'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(db.cx, db.cy, db.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#aaffdd';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('DIVE', db.cx, db.cy);
      ctx.restore();
    }
  }
}

// ── update ────────────────────────────────────────────────────────────────────
function update(dt) {
  wt += dt;

  // ── vehicle select ──
  if (gamePhase === 'vehicleSelect') {
    if (JP['Digit1'] || JP['KeyS']) {
      vehicleMode = 'sub'; gamePhase = 'playing';
    } else if (JP['Digit2'] || JP['KeyB']) {
      vehicleMode = 'boat'; gamePhase = 'boatSailing';
      boat.x = 0; boat.y = 0; boat.heading = 0; boat.speed = 0;
      boatEngineState = 'up'; boatEngineT = 0;
    }
    return;
  }

  // ── boat top-down mode ──
  if (gamePhase === 'boatSailing') { updateBoatSailing(dt); return; }

  // ── sinking animation ──
  if (gamePhase === 'sinking') {
    sinkT += dt;
    if (sinkT < SINK_TILT) {
      // Whole sub tilts toward 45° bow-down
      subPitch = (sinkT / SINK_TILT) * (Math.PI / 4) * sinkFace;
    } else {
      var g = 110;

      // Helper: advance one piece with floor collision
      function sinkPiece(p, angRate, driftX) {
        if (p.resting) {
          // Settle angle toward rest angle
          p.angle += (p.restAngle - p.angle) * Math.min(1, 3 * dt);
          return;
        }
        p.vy  += g * dt;
        p.y   += p.vy * dt;
        p.x   += driftX * sinkFace * dt;
        p.angle += angRate * sinkFace * dt;

        var floorY = terrain(p.x) - SUB_HH;
        if (p.y >= floorY) {
          p.y  = floorY;
          p.vy = -p.vy * 0.12; // small bounce
          if (Math.abs(p.vy) < 8) { p.vy = 0; p.resting = true; }
        }
      }

      sinkPiece(sinkBow,   1.1, 18);
      sinkPiece(sinkStern, -0.7, -12);

      // Camera tracks midpoint of the two pieces, drifting down toward floor
      var midX = (sinkBow.x + sinkStern.x) * 0.5;
      camX += (midX - W / 2 - camX) * Math.min(1, 1.8 * dt);

      // Once both resting, start the settled timer then go to gameover
      if (sinkBow.resting && sinkStern.resting) {
        sinkSettled += dt;
        if (sinkSettled > 2.2) gamePhase = 'gameover';
      }
      if (sinkT > SINK_TOTAL) gamePhase = 'gameover'; // fallback
      return;
    }
    camX += (sub.x - W / 2 - camX) * Math.min(1, 1.5 * dt);
    return;
  }

  // ── game over: wait for click / any key to restart ──
  if (gamePhase === 'gameover') {
    var anyKey = false;
    var ks = Object.keys(JP);
    for (var ki = 0; ki < ks.length; ki++) { if (JP[ks[ki]]) { anyKey = true; break; } }
    if (anyKey) resetGame();
    return;
  }

  // ── kraken panel: freeze gameplay, handle activation choice ──
  if (krakPhase === 'panel') {
    if (JP['KeyY'] || JP['Enter']) {
      triggerKrakenExplosion();
    } else if (JP['KeyN'] || JP['Escape']) {
      krakPhase = 'intact';
      diverOut = true;
      diver.x = KRAKEN_WX + KRAKEN_HOX; diver.y = krakenHatchY();
      diver.vx = 0; diver.vy = 0;
      diverRecalling = true;
    }
    camX += (KRAKEN_WX - W / 2 - camX) * Math.min(1, 2 * dt);
    return;
  }

  // ── kraken explosion: animate debris until settled ──
  if (krakPhase === 'exploding') {
    krakExpT += dt;
    krakFlash = Math.max(0, krakFlash - dt * 2.6);
    for (var kdi = 0; kdi < krakDebris.length; kdi++) {
      var kdp = krakDebris[kdi];
      if (!kdp.resting) {
        kdp.vy += 115 * dt; kdp.x += kdp.vx * dt; kdp.y += kdp.vy * dt;
        kdp.vx *= Math.exp(-0.4 * dt);
        kdp.angle += kdp.dAngle * dt;
        var kdFloor = terrain(kdp.x) - 8;
        if (kdp.y >= kdFloor) {
          kdp.y = kdFloor; kdp.vy = -kdp.vy * 0.1;
          kdp.dAngle *= 0.3;
          if (Math.abs(kdp.vy) < 8) { kdp.vy = 0; kdp.resting = true; }
        }
      }
    }
    for (var ksi = 0; ksi < krakSmoke.length; ksi++) {
      var ksm = krakSmoke[ksi];
      ksm.x += ksm.vx * dt; ksm.y += ksm.vy * dt;
      ksm.r   = Math.min(ksm.maxR, ksm.r + 22 * dt);
      ksm.alpha = Math.max(0, ksm.alpha - 0.2 * dt);
    }
    var kAllRest = true;
    for (var kri = 0; kri < krakDebris.length; kri++) {
      if (!krakDebris[kri].resting) { kAllRest = false; break; }
    }
    if (kAllRest) { krakSettled += dt; if (krakSettled > 2.5) krakPhase = 'victory'; }
    if (krakExpT > 25) krakPhase = 'victory';
    camX += (KRAKEN_WX - W / 2 - camX) * Math.min(1, 1.5 * dt);
    return;
  }

  // ── kraken victory: dismiss with any key ──
  if (krakPhase === 'victory') {
    var anyKeyV = false;
    var ksV = Object.keys(JP);
    for (var kiv = 0; kiv < ksV.length; kiv++) { if (JP[ksV[kiv]]) { anyKeyV = true; break; } }
    if (anyKeyV) krakPhase = 'debris';
    // fall through — allow normal gameplay to resume
  }

  // Pirate sub arrival
  if (piratePhase === 'arriving') {
    pirateSub.x -= 180 * dt;
    if (pirateSub.x <= KRAKEN_WX - 280) { pirateSub.x = KRAKEN_WX - 280; piratePhase = 'docked'; }
  }
  if (piratePhase === 'docked' && JP['Enter']) {
    window.location.href = '../piratesub/';
  }

  if (hitFlash > 0) hitFlash -= dt;
  if (airFillTimer > 0) airFillTimer -= dt;
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag = Math.max(0, shakeMag - 90 * dt);
  } else { shakeX = 0; shakeY = 0; }
  if (scorePopT > 0) scorePopT = Math.max(0, scorePopT - dt * 2.5);

  // Air drains passively; refills when at surface
  air = Math.max(0, air - AIR_DRAIN * dt);

  // Toggle diver on KeyD just-press
  if (JP['KeyD']) {
    if (!diverOut) {
      diverOut = true;
      diverRecalling = false;
      diver.x  = sub.x;
      diver.y  = sub.y + SUB_HH + 12;
      diver.vx = 0; diver.vy = 0;
      diverFace = subFace;
    } else if (!diverRecalling) {
      diverRecalling = true; // begin swim-back
    }
  }

  var fwd = K['Space']     || K['ArrowRight'];
  var rev = K['ShiftLeft'] || K['ShiftRight'] || K['ArrowLeft'];
  var up  = K['ArrowUp'];
  var dn  = K['ArrowDown'];

  if (diverOut) {
    // ── diver controls (sub frozen) ──
    sub.vx = 0; sub.vy = 0;
    // In boat mode the "sub" is the surface boat — keep it above the diver
    if (vehicleMode === 'boat') sub.x = diver.x;

    if (diverRecalling) {
      // Auto-pilot back to sub
      var rdx = sub.x - diver.x, rdy = sub.y - diver.y;
      var rLen = Math.sqrt(rdx * rdx + rdy * rdy);
      if (rLen < 18) {
        // Docked — recall complete
        diverOut = false;
        diverRecalling = false;
      } else {
        var rSpd = Math.min(DIVER_MAX * 1.2, rLen * 3);
        diver.vx = (rdx / rLen) * rSpd;
        diver.vy = (rdy / rLen) * rSpd;
        diverFace = rdx > 0 ? 1 : -1;
        diver.x += diver.vx * dt;
        diver.y += diver.vy * dt;
      }
    } else {
      // Manual control
      if (fwd) diver.vx += DIVER_ACCEL * dt;
      if (rev) diver.vx -= DIVER_ACCEL * dt;
      if (up)  diver.vy -= DIVER_ACCEL * dt;
      if (dn)  diver.vy += DIVER_ACCEL * dt;

      diver.vx *= Math.exp(-DIVER_DRAG * dt);
      diver.vy *= Math.exp(-DIVER_DRAG * dt);
      if (diver.vx >  DIVER_MAX) diver.vx =  DIVER_MAX;
      if (diver.vx < -DIVER_MAX) diver.vx = -DIVER_MAX;
      if (diver.vy >  DIVER_MAX) diver.vy =  DIVER_MAX;
      if (diver.vy < -DIVER_MAX) diver.vy = -DIVER_MAX;
      if (Math.abs(diver.vx) > 5) diverFace = diver.vx > 0 ? 1 : -1;

      diver.x += diver.vx * dt;
      diver.y += diver.vy * dt;

    }

    // Diver terrain boundary
    var dFloor = terrain(diver.x) - 10;
    if (diver.y > dFloor) { diver.y = dFloor; if (diver.vy > 0) diver.vy = 0; }
    var dSurf = wave(diver.x) + 10;
    if (diver.y < dSurf) { diver.y = dSurf; if (diver.vy < 0) diver.vy = 0; }

    // Diver station docking (not while recalling)
    diverNearStation = false;
    if (!diverRecalling) {
      var dMinSn = Math.floor((diver.x - 80) / STATION_GAP);
      var dMaxSn = Math.ceil( (diver.x + 80) / STATION_GAP);
      for (var dsn = dMinSn; dsn <= dMaxSn; dsn++) {
        var dstWx = dsn * STATION_GAP + STATION_OFF;
        var dstCy = terrain(dstWx) - 32;
        var ddx   = diver.x - dstWx, ddy = diver.y - dstCy;
        if (Math.sqrt(ddx * ddx + ddy * ddy) < 70) {
          diverNearStation = true;
          fuel = Math.min(1, fuel + FUEL_FILL * dt);
        }
      }
    }
    nearStation = diverNearStation;

  } else {
    // ── normal sub controls ──
    diverNearStation = false;

    // No thrust when tank empty (up/dn diving planes still work)
    if (fuel <= 0) { fwd = false; rev = false; }

    if (fwd) sub.vx += ACCEL_X * dt;
    if (rev) sub.vx -= ACCEL_X * dt;
    if (up)  sub.vy -= ACCEL_Y * dt;
    if (dn)  sub.vy += ACCEL_Y * dt;

    // Drain fuel only when propulsion thrusters fire
    if (fwd || rev) fuel = Math.max(0, fuel - FUEL_DRAIN * dt);
    if ((fwd || rev) && fuel > 0) {
      thrustBeepT -= dt;
      if (thrustBeepT <= 0) { thrustBeepT = 0.28; playTone(90, 0.04, 0.09, 'sawtooth'); }
    } else { thrustBeepT = 0; }

    if (!fwd && !rev) sub.vx *= Math.exp(-DRAG_X * dt);
    if (!up  && !dn)  sub.vy *= Math.exp(-DRAG_Y * dt);

    if (sub.vx >  MAX_VX) sub.vx =  MAX_VX;
    if (sub.vx < -MAX_VX) sub.vx = -MAX_VX;
    if (sub.vy >  MAX_VY) sub.vy =  MAX_VY;
    if (sub.vy < -MAX_VY) sub.vy = -MAX_VY;

    sub.x += sub.vx * dt;
    sub.y += sub.vy * dt;

    // Surface boundary
    var surf = wave(sub.x) + SUB_HH + 4;
    if (sub.y < surf) { sub.y = surf; if (sub.vy < 0) sub.vy = 0; }

    // Terrain boundary (check front, center, back of hull)
    var checks = [sub.x - 36 * subFace, sub.x, sub.x + 36 * subFace];
    var minFloor = FLOOR_BASE;
    for (var ci = 0; ci < 3; ci++) {
      var ty = terrain(checks[ci]);
      if (ty < minFloor) minFloor = ty;
    }
    var floorLim = minFloor - SUB_HH - 2;
    if (sub.y > floorLim) { sub.y = floorLim; if (sub.vy > 0) sub.vy = 0; }

    // Surface air refill
    atSurface = (sub.y <= wave(sub.x) + SUB_HH + 20);
    if (atSurface && !surfBreachWas) playTone(380, 0.14, 0.4, 'sine');
    surfBreachWas = atSurface;
    if (atSurface) {
      air = Math.min(1, air + AIR_FILL * dt);
      airFillTimer = 0.5;
    }

    // Fuel station docking
    nearStation = false;
    var minSn = Math.floor((sub.x - 180) / STATION_GAP);
    var maxSn = Math.ceil( (sub.x + 180) / STATION_GAP);
    for (var sn = minSn; sn <= maxSn; sn++) {
      var stWx = sn * STATION_GAP + STATION_OFF;
      var stCy = terrain(stWx) - 32;
      var sdx  = sub.x - stWx, sdy = sub.y - stCy;
      if (Math.sqrt(sdx * sdx + sdy * sdy) < 115) {
        nearStation = true;
        fuel = Math.min(1, fuel + FUEL_FILL * dt);
      }
    }

    // Iceberg collision
    for (var ii = 0; ii < ICEBERGS.length; ii++) {
      var ib = ICEBERGS[ii];
      if (Math.abs(ib.wx - sub.x) > 200) continue;
      var ibSurf  = wave(ib.wx);
      var ibW     = 52 * ib.sz; // half-width of underwater bulk
      var ibDepth = 90 * ib.sz; // how deep it extends
      var ibdx    = sub.x - ib.wx;
      var ibdy    = sub.y - ibSurf;
      // Elliptical hit zone covering the underwater mass
      if ((ibdx * ibdx) / (ibW * ibW) + (ibdy * ibdy) / (ibDepth * ibDepth) < 1
          && ibdy > -SUB_HH) {
        playNoise(0.45, 0.25); shakeMag = Math.max(shakeMag, 20);
        triggerSink();
        break;
      }
    }
  }

  // Kraken hatch proximity (diver only)
  krakHatchNear = false;
  if (krakPhase === 'intact' && diverOut && !diverRecalling) {
    var khx = KRAKEN_WX + KRAKEN_HOX, khy = krakenHatchY();
    var khdx = diver.x - khx, khdy = diver.y - khy;
    var khDist2 = khdx * khdx + khdy * khdy;
    krakHatchNear = khDist2 < 60 * 60;
    if (khDist2 < 22 * 22) {
      krakPhase = 'panel'; diverOut = false;
      if (piratePhase === 'none') {
        piratePhase = 'arriving';
        pirateSub.x = KRAKEN_WX + 3200;
        pirateSub.y = OCEAN_BASE + 120;
      }
    }
  }

  // Facing & pitch
  if (Math.abs(sub.vx) > 12) subFace = sub.vx > 0 ? 1 : -1;
  var spd = Math.sqrt(sub.vx * sub.vx + sub.vy * sub.vy);
  subPitchT = spd > 20
    ? Math.max(-0.32, Math.min(0.32, Math.atan2(sub.vy, Math.abs(sub.vx))))
    : subPitchT * 0.9;
  subPitch += (subPitchT - subPitch) * Math.min(1, 5 * dt);
  propAng  += Math.abs(sub.vx) * dt * 0.09;

  // Wake trail
  var spd2 = Math.sqrt(sub.vx * sub.vx + sub.vy * sub.vy);
  if (spd2 > 10 && gamePhase === 'playing') {
    WAKE.push({ x: sub.x - sub.vx * 0.08, y: sub.y, life: 0.7, r: 5 + Math.random() * 4 });
  }
  for (var wi = WAKE.length - 1; wi >= 0; wi--) {
    WAKE[wi].life -= dt; WAKE[wi].r += 9 * dt;
    if (WAKE[wi].life <= 0) WAKE.splice(wi, 1);
  }

  // Camera: follow diver when out and not recalling, otherwise follow sub
  var camTarget = (diverOut && !diverRecalling) ? diver.x : sub.x;
  camX += (camTarget - W / 2 - camX) * Math.min(1, 3 * dt);

  // Sea life update
  for (var j = 0; j < CREATURES.length; j++) {
    var c = CREATURES[j];
    if (c.hit > 0) c.hit -= dt;

    c.wx += c.vx * dt;
    c.y  += c.vy * dt;

    if (c.type === 'squid') {
      c.tentTimer += dt * 2;
      c.vx += (Math.random() * 2 - 1) * 22 * dt;
      c.vy += (Math.random() * 2 - 1) * 16 * dt;
      c.vx *= Math.exp(-0.9 * dt);
      c.vy *= Math.exp(-1.6 * dt);
      if (c.vx >  30) c.vx =  30;
      if (c.vx < -30) c.vx = -30;
      if (c.vy >  20) c.vy =  20;
      if (c.vy < -20) c.vy = -20;
    }

    // Wrap fish around visible range
    if (c.type === 'fish') {
      if (c.vx > 0 && c.wx > sub.x + W * 1.5) c.wx = sub.x - W * 1.5;
      if (c.vx < 0 && c.wx < sub.x - W * 1.5) c.wx = sub.x + W * 1.5;
    }

    // Terrain collision for creatures
    var cFloor = terrain(c.wx) - c.r - 2;
    if (c.y > cFloor) { c.y = cFloor; if (c.vy > 0) c.vy = -Math.abs(c.vy) * 0.4; }
    var cSurf = OCEAN_BASE + c.r;
    if (c.y < cSurf) { c.y = cSurf; if (c.vy < 0) c.vy = Math.abs(c.vy) * 0.3; }

    // Collision with sub
    var dx = c.wx - sub.x, dy = c.y - sub.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var minD = c.r + SUB_RADIUS;
    if (dist < minD && dist > 0.1 && c.hit <= 0) {
      c.hit = 0.6;
      hitFlash = 0.25;
      playNoise(0.25, 0.12); shakeMag = Math.max(shakeMag, 10);
      score += 10; scorePopT = 0.5;
      var nx = dx / dist, ny = dy / dist;
      // Knock sub back, fling creature away
      sub.vx -= nx * 130;
      sub.vy -= ny * 90;
      c.vx    += nx * 100;
      c.vy    += ny * 70;
      if (sub.vx >  MAX_VX) sub.vx =  MAX_VX;
      if (sub.vx < -MAX_VX) sub.vx = -MAX_VX;
    }
  }

  // Bubbles
  for (var k = 0; k < BUBBLES.length; k++) {
    var b = BUBBLES[k];
    b.y -= b.spd * dt;
    if (b.y < OCEAN_BASE - 5) {
      b.wx = sub.x + (Math.random() * 2 - 1) * W;
      b.y  = terrain(b.wx) - 5;
    }
  }
}

// ── draw sky ──────────────────────────────────────────────────────────────────
function drawSky() {
  var g = ctx.createLinearGradient(0, 0, 0, OCEAN_BASE + 15);
  g.addColorStop(0, '#4a8fc0');
  g.addColorStop(1, '#85c9e8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, OCEAN_BASE + 15);

  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  var seeds = [-580, -250, 120, 430, 760, 1100, 1500, 1920];
  for (var i = 0; i < seeds.length; i++) {
    var cx = ((seeds[i] - camX * 0.3) % 2700 + 2700) % 2700 - 200;
    if (cx < -200 || cx > W + 200) continue;
    var cy = 16 + (i % 3) * 11;
    ctx.beginPath();
    ctx.arc(cx,      cy + 8, 16, 0, Math.PI * 2);
    ctx.arc(cx + 22, cy + 4, 19, 0, Math.PI * 2);
    ctx.arc(cx + 46, cy + 8, 15, 0, Math.PI * 2);
    ctx.arc(cx + 14, cy,     13, 0, Math.PI * 2);
    ctx.arc(cx + 32, cy - 2, 12, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── draw ocean water ──────────────────────────────────────────────────────────
function drawOcean() {
  var g = ctx.createLinearGradient(0, OCEAN_BASE, 0, FLOOR_BASE);
  g.addColorStop(0,    '#1a7490');
  g.addColorStop(0.25, '#0f5070');
  g.addColorStop(0.7,  '#093a52');
  g.addColorStop(1,    '#051c28');
  ctx.fillStyle = g;

  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, wave(camX));
  for (var sx = 2; sx <= W + 2; sx += 3) {
    ctx.lineTo(sx, wave(sx + camX));
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  // Shimmer line at surface
  ctx.strokeStyle = 'rgba(160,220,255,0.40)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, wave(camX));
  for (var sx2 = 3; sx2 <= W; sx2 += 3) {
    ctx.lineTo(sx2, wave(sx2 + camX));
  }
  ctx.stroke();
}

// ── draw terrain + decorations ────────────────────────────────────────────────
function drawTerrain() {
  // Rocky floor polygon
  ctx.fillStyle = '#3c2a18';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, terrain(camX));
  for (var sx = 3; sx <= W + 3; sx += 3) {
    ctx.lineTo(sx, terrain(sx + camX));
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  // Surface edge highlight
  ctx.strokeStyle = 'rgba(100,70,40,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, terrain(camX));
  for (var sx3 = 3; sx3 <= W; sx3 += 3) {
    ctx.lineTo(sx3, terrain(sx3 + camX));
  }
  ctx.stroke();

  // Coral
  for (var i = 0; i < CORALS.length; i++) {
    var co = CORALS[i];
    var coSx = co.wx - camX;
    if (coSx < -50 || coSx > W + 50) continue;
    drawCoral(coSx, terrain(co.wx), co.h, co.col, co.type);
  }

  // Shipwrecks
  for (var j = 0; j < WRECKS.length; j++) {
    var wr = WRECKS[j];
    var wrSx = wr.wx - camX;
    if (wrSx < -220 || wrSx > W + 220) continue;
    drawWreck(wrSx, terrain(wr.wx));
  }
}

function drawCoral(x, ty, h, col, type) {
  ctx.strokeStyle = col;
  ctx.lineCap = 'round';

  if (type === 0) {
    // Branching
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, ty); ctx.lineTo(x, ty - h);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, ty - h * 0.5); ctx.lineTo(x - h * 0.4, ty - h * 0.88);
    ctx.moveTo(x, ty - h * 0.6); ctx.lineTo(x + h * 0.35, ty - h * 0.94);
    ctx.moveTo(x, ty - h * 0.3); ctx.lineTo(x - h * 0.22, ty - h * 0.55);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, ty - h, 3, 0, Math.PI * 2);
    ctx.arc(x - h * 0.4, ty - h * 0.88, 3, 0, Math.PI * 2);
    ctx.arc(x + h * 0.35, ty - h * 0.94, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === 1) {
    // Fan
    ctx.lineWidth = 2;
    for (var i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x, ty);
      ctx.lineTo(x + i * h * 0.16, ty - h * (0.68 + Math.abs(i) * 0.06));
      ctx.stroke();
    }
  } else {
    // Tube cluster
    ctx.lineWidth = 4;
    ctx.lineCap = 'butt';
    var offs = [-8, -3, 3, 8];
    for (var k = 0; k < 4; k++) {
      var th = h * (0.72 + k * 0.07);
      ctx.strokeStyle = col;
      ctx.beginPath();
      ctx.moveTo(x + offs[k], ty);
      ctx.lineTo(x + offs[k], ty - th);
      ctx.stroke();
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(x + offs[k], ty - th, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.lineCap = 'butt';
}

function drawReefs() {
  for (var ri = 0; ri < REEFS.length; ri++) {
    var reef = REEFS[ri];
    var rsx = reef.wx - camX;
    if (rsx < -200 || rsx > W + 200) continue;
    for (var ci = 0; ci < reef.corals.length; ci++) {
      var co = reef.corals[ci];
      var cx = rsx + co.ox;
      if (cx < -80 || cx > W + 80) continue;
      var ty = terrain(reef.wx + co.ox);
      ctx.save();
      ctx.globalAlpha = 0.92;
      drawCoral(cx, ty, co.h, co.col, co.type);
      ctx.restore();
    }
    // Subtle glow haze over the reef
    var rg = ctx.createRadialGradient(rsx, terrain(reef.wx) - 30, 10, rsx, terrain(reef.wx) - 30, 160);
    rg.addColorStop(0, 'rgba(200,150,255,0.10)');
    rg.addColorStop(1, 'rgba(200,150,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(rsx - 160, terrain(reef.wx) - 120, 320, 130);
  }
}

function drawWreck(sx, ty) {
  ctx.save();
  ctx.translate(sx, ty);
  ctx.rotate(0.18);

  // Hull
  ctx.fillStyle = '#2a1a0e';
  rRect(-55, -22, 110, 30, 5);
  ctx.fill();
  ctx.strokeStyle = '#5a4030';
  ctx.lineWidth = 3;
  rRect(-55, -22, 110, 30, 5);
  ctx.stroke();

  // Broken mast
  ctx.strokeStyle = '#4a3222';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-20, -22); ctx.lineTo(-24, -65);
  ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-42, -50); ctx.lineTo(-6, -50);
  ctx.stroke();
  // Rigging
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#3a2515';
  ctx.beginPath();
  ctx.moveTo(-24, -65); ctx.lineTo(-42, -50);
  ctx.moveTo(-24, -65); ctx.lineTo(-6, -50);
  ctx.stroke();

  // Portholes
  ctx.fillStyle = '#1a0e05';
  ctx.strokeStyle = '#6a5040';
  ctx.lineWidth = 2;
  for (var p = 0; p < 3; p++) {
    ctx.beginPath();
    ctx.arc(-30 + p * 28, -8, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  // Algae growth
  ctx.strokeStyle = 'rgba(40,130,60,0.55)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo( 20, -22); ctx.lineTo( 17, -38);
  ctx.moveTo( 36, -22); ctx.lineTo( 39, -36);
  ctx.moveTo(-40, -22); ctx.lineTo(-43, -34);
  ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

// ── draw creatures ────────────────────────────────────────────────────────────
function drawCreatures() {
  for (var i = 0; i < CREATURES.length; i++) {
    var c = CREATURES[i];
    var sx = c.wx - camX;
    if (sx < -90 || sx > W + 90) continue;
    if (c.type === 'fish') drawFish(sx, c.y, c);
    else                   drawSquid(sx, c.y, c);
  }
}

function drawFish(sx, sy, c) {
  var facing = c.vx > 0 ? 1 : -1;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(facing, 1);
  if (c.hit > 0) ctx.globalAlpha = 0.45 + 0.55 * Math.abs(Math.sin(c.hit * 35));

  var r = c.r;
  ctx.fillStyle = c.col;
  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.44, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.beginPath();
  ctx.moveTo(-r, 0);
  ctx.lineTo(-r - r * 0.62, -r * 0.44);
  ctx.lineTo(-r - r * 0.62,  r * 0.44);
  ctx.closePath();
  ctx.fill();
  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(-r * 0.2, -r * 0.44);
  ctx.lineTo(0, -r * 0.82);
  ctx.lineTo( r * 0.3, -r * 0.44);
  ctx.closePath();
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(r * 0.5, -r * 0.08, r * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(r * 0.55, -r * 0.08, r * 0.09, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSquid(sx, sy, c) {
  var t = c.tentTimer;
  ctx.save();
  ctx.translate(sx, sy);
  if (c.hit > 0) ctx.globalAlpha = 0.45 + 0.55 * Math.abs(Math.sin(c.hit * 35));

  var r = c.r;
  ctx.fillStyle = c.col;
  // Mantle
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.58, r, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head bulge
  ctx.beginPath();
  ctx.ellipse(0, r * 0.88, r * 0.44, r * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tentacles
  ctx.strokeStyle = c.col;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (var i = 0; i < 8; i++) {
    var ang = (i / 8) * Math.PI * 2 + t * 0.4;
    var wv = Math.sin(ang * 3 + t * 3) * 0.28;
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang) * r * 0.28, r * 1.05);
    ctx.quadraticCurveTo(
      Math.cos(ang) * r * 0.5 + wv * r, r * 1.38,
      Math.cos(ang) * r * 0.18, r * 1.68 + (i % 2 === 0 ? r * 0.2 : 0)
    );
    ctx.stroke();
  }
  ctx.lineCap = 'butt';
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-r * 0.2, r * 0.68, r * 0.19, 0, Math.PI * 2);
  ctx.arc( r * 0.2, r * 0.68, r * 0.19, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#220022';
  ctx.beginPath();
  ctx.arc(-r * 0.2, r * 0.68, r * 0.10, 0, Math.PI * 2);
  ctx.arc( r * 0.2, r * 0.68, r * 0.10, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── draw fuel stations ────────────────────────────────────────────────────────
function drawStations() {
  var minSn = Math.floor(camX / STATION_GAP) - 1;
  var maxSn = Math.ceil((camX + W) / STATION_GAP) + 1;
  for (var sn = minSn; sn <= maxSn; sn++) {
    var stWx = sn * STATION_GAP + STATION_OFF;
    var sx = stWx - camX;
    if (sx < -200 || sx > W + 200) continue;
    var ty = terrain(stWx);
    var isNear = nearStation && Math.abs(sub.x - stWx) < 180;
    drawFuelStation(sx, ty, isNear);
  }
}

function drawFuelStation(sx, ty, active) {
  ctx.save();
  ctx.translate(sx, ty);

  // Platform deck
  ctx.fillStyle = '#5a4a2e';
  rRect(-46, -10, 92, 10, 2);
  ctx.fill();
  ctx.fillStyle = '#7a6a4e';
  rRect(-44, -8, 88, 4, 1);
  ctx.fill();

  // Fuel tank (right side of platform)
  ctx.fillStyle = '#556677';
  ctx.beginPath();
  ctx.arc(28, -26, 10, Math.PI, 0); // dome top
  ctx.fill();
  ctx.fillStyle = '#667788';
  ctx.fillRect(18, -26, 20, 24);
  ctx.fillStyle = '#445566';
  ctx.fillRect(18, -2, 20, 2);
  // Gauge on tank
  ctx.fillStyle = active ? '#44ff88' : '#449944';
  ctx.beginPath();
  ctx.arc(28, -18, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.stroke();
  // FUEL label
  ctx.fillStyle = '#aaccbb';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FUEL', 28, -10);

  // Fuel hose (toward lobster)
  ctx.strokeStyle = active ? '#44cc66' : '#446644';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(18, -14);
  ctx.quadraticCurveTo(8, -8, 0, -10);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Lobster (left side of platform)
  drawLobster(-24, -10, active);

  // "REFUEL" banner when in range
  if (active) {
    ctx.save();
    ctx.globalAlpha = 0.75 + 0.25 * Math.sin(wt * 6);
    ctx.fillStyle = '#44ff88';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('REFUEL', 0, -62);
    // small arrow pointing down
    ctx.fillStyle = '#44ff88';
    tri(0, -56, 5, 3);
    ctx.restore();
  }

  ctx.restore();
}

function drawLobster(x, y, active) {
  ctx.save();
  ctx.translate(x, y); // y=0 is platform top; lobster stands upward (negative y)

  var t   = wt;
  var wav = active ? Math.sin(t * 5) * 0.45 : 0.1; // right-claw wave angle

  // Walking legs (drawn first, behind body)
  ctx.strokeStyle = '#992010';
  ctx.lineWidth = 1.5;
  var legs = [[-8,-14,-16,-8],[-8,-20,-17,-14],[-7,-26,-16,-20],
               [8,-14, 16,-8],[ 8,-20, 17,-14],[ 7,-26, 16,-20]];
  for (var l = 0; l < legs.length; l++) {
    ctx.beginPath();
    ctx.moveTo(legs[l][0], legs[l][1]); ctx.lineTo(legs[l][2], legs[l][3]);
    ctx.stroke();
  }

  // Tail fan (below body, splayed at bottom)
  ctx.fillStyle = '#bb2818';
  for (var tf = -2; tf <= 2; tf++) {
    ctx.save();
    ctx.translate(0, -2);
    ctx.rotate(tf * 0.22);
    ctx.beginPath();
    ctx.moveTo(-3, 0); ctx.lineTo(-5, 10); ctx.lineTo(5, 10); ctx.lineTo(3, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Abdomen segments
  ctx.fillStyle = '#cc2820';
  for (var sg = 0; sg < 4; sg++) {
    var sw2 = 8.5 - sg * 1.0;
    ctx.beginPath();
    ctx.ellipse(0, -4 - sg * 6, sw2, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Carapace (main shell)
  ctx.fillStyle = '#e03830';
  ctx.beginPath();
  ctx.ellipse(0, -30, 12, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Right (waving) claw
  ctx.save();
  ctx.translate(12, -28);
  ctx.rotate(-wav);
  ctx.fillStyle = '#dd3828';
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(16, -5); ctx.lineTo(19, 4);
  ctx.lineTo(12, 8); ctx.lineTo(5, 3); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#aa2010';
  ctx.beginPath(); // pincer upper
  ctx.moveTo(16, -5); ctx.lineTo(22, -10); ctx.lineTo(19, 4); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Left claw (relaxed)
  ctx.save();
  ctx.translate(-12, -28);
  ctx.rotate(0.15);
  ctx.fillStyle = '#dd3828';
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(-14, -4); ctx.lineTo(-16, 4);
  ctx.lineTo(-10, 8); ctx.lineTo(-4, 3); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#aa2010';
  ctx.beginPath();
  ctx.moveTo(-14, -4); ctx.lineTo(-20, -9); ctx.lineTo(-16, 4); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Eye stalks
  ctx.strokeStyle = '#cc2820';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-5, -42); ctx.lineTo(-8, -50);
  ctx.moveTo( 5, -42); ctx.lineTo( 8, -50);
  ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-8, -50, 3, 0, Math.PI * 2);
  ctx.arc( 8, -50, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-7, -51, 1, 0, Math.PI * 2);
  ctx.arc( 9, -51, 1, 0, Math.PI * 2);
  ctx.fill();

  // Antennae
  ctx.strokeStyle = '#aa1808';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5, -44); ctx.lineTo(-22, -64);
  ctx.moveTo( 5, -44); ctx.lineTo( 22, -64);
  ctx.stroke();

  ctx.restore();
}

// ── draw icebergs ─────────────────────────────────────────────────────────────
function drawIcebergs() {
  for (var i = 0; i < ICEBERGS.length; i++) {
    var ib = ICEBERGS[i];
    var sx = ib.wx - camX;
    if (sx < -200 || sx > W + 200) continue;
    var surfY = wave(ib.wx);
    var sz    = ib.sz;
    var tw    = 38 * sz; // tip half-width above water
    var bw    = 66 * sz; // bulk half-width below water
    var th    = 44 * sz; // tip height above water
    var bd    = 95 * sz; // bulk depth below water

    ctx.save();
    ctx.translate(sx, surfY);

    // Underwater bulk — blue-tinted white, semi-transparent
    var ug = ctx.createLinearGradient(0, 0, 0, bd);
    ug.addColorStop(0,   'rgba(180,215,240,0.82)');
    ug.addColorStop(0.5, 'rgba(140,185,220,0.60)');
    ug.addColorStop(1,   'rgba(100,150,200,0.25)');
    ctx.fillStyle = ug;
    ctx.beginPath();
    ctx.moveTo(-tw, 0);
    ctx.lineTo(-bw, bd * 0.55);
    ctx.lineTo(-bw * 0.6, bd);
    ctx.lineTo( bw * 0.6, bd);
    ctx.lineTo( bw, bd * 0.55);
    ctx.lineTo( tw, 0);
    ctx.closePath();
    ctx.fill();

    // Above-water tip — bright white
    var ag = ctx.createLinearGradient(0, -th, 0, 0);
    ag.addColorStop(0, '#f0f8ff');
    ag.addColorStop(1, '#c8e0f4');
    ctx.fillStyle = ag;
    ctx.beginPath();
    ctx.moveTo(-tw, 0);
    ctx.lineTo(-tw * 0.7, -th * 0.55);
    ctx.lineTo(-tw * 0.15, -th);
    ctx.lineTo( tw * 0.3,  -th * 0.88);
    ctx.lineTo( tw, -th * 0.3);
    ctx.lineTo( tw, 0);
    ctx.closePath();
    ctx.fill();

    // Ice facet lines
    ctx.strokeStyle = 'rgba(200,230,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-tw * 0.15, -th); ctx.lineTo(-tw * 0.3, 0);
    ctx.moveTo( tw * 0.3,  -th * 0.88); ctx.lineTo(tw * 0.15, 0);
    ctx.stroke();

    ctx.restore();
  }
}

// ── draw sinking sub pieces ───────────────────────────────────────────────────
function drawSinkPiece(wx, wy, angle, face, isBow) {
  var sx = wx - camX;
  ctx.save();
  ctx.translate(sx, wy);
  ctx.scale(face, 1);
  ctx.rotate(angle);

  var hw = SUB_HW, hh = SUB_HH;
  // Draw only the relevant half using clipping
  ctx.beginPath();
  if (isBow) ctx.rect(0, -hh - 20, hw + 20, (hh + 20) * 2);
  else        ctx.rect(-hw - 20, -hh - 20, hw + 20, (hh + 20) * 2);
  ctx.clip();

  // Hull
  ctx.fillStyle = '#d4aa22';
  rRect(-hw, -hh, hw * 2, hh * 2, hh);
  ctx.fill();
  ctx.fillStyle = '#b89010';
  ctx.fillRect(-hw + 8, -3, hw * 2 - 16, 6);

  if (isBow) {
    // Conning tower + periscope on bow
    ctx.fillStyle = '#c09518';
    rRect(-9, -hh - 15, 18, 16, 3); ctx.fill();
    ctx.strokeStyle = '#806008'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(4, -hh - 15); ctx.lineTo(4, -hh - 25); ctx.lineTo(13, -hh - 25);
    ctx.stroke();
    // Porthole
    ctx.fillStyle = '#7ad4f0';
    ctx.beginPath(); ctx.arc(hw * 0.4, 0, 6, 0, Math.PI * 2); ctx.fill();
  } else {
    // Propeller on stern
    ctx.save();
    ctx.translate(-hw, 0);
    ctx.rotate(propAng);
    ctx.fillStyle = '#8a8a8a';
    for (var p = 0; p < 3; p++) {
      ctx.save(); ctx.rotate(p * Math.PI * 2 / 3);
      rRect(-2, -11, 4, 11, 1); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawSinkingPieces() {
  if (gamePhase !== 'sinking' && gamePhase !== 'gameover') return;

  if (sinkT < SINK_TILT) {
    // Still in tilt phase — draw normal sub at current (tilting) pitch
    drawSub();
    return;
  }

  // Crack/bubble flash at split moment
  if (sinkT < SINK_TILT + 0.3) {
    ctx.save();
    ctx.globalAlpha = 1 - (sinkT - SINK_TILT) / 0.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sub.x - camX, sub.y, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawSinkPiece(sinkBow.x,   sinkBow.y,   sinkBow.angle,   sinkFace, true);
  drawSinkPiece(sinkStern.x, sinkStern.y, sinkStern.angle, sinkFace, false);

  if (gamePhase === 'gameover') {
    ctx.save();
    ctx.fillStyle = 'rgba(5,15,30,0.72)';
    rRect(W / 2 - 140, H / 2 - 52, 280, 104, 8); ctx.fill();
    ctx.fillStyle = '#c8e8ff';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('YOU STRUCK AN ICEBERG', W / 2, H / 2 - 24);
    ctx.fillStyle = '#80b8e0';
    ctx.font = '13px monospace';
    ctx.fillText('Press any key or tap to continue', W / 2, H / 2 + 12);
    ctx.restore();
  }
}

// ── kraken drawing helpers ───────────────────────────────────────────────────
function drawGear(cx, cy, r, teeth, ang, col) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang);
  ctx.fillStyle = col;
  var tw = (Math.PI * 2 / teeth) * r * 0.38, th = r * 0.30;
  for (var ti = 0; ti < teeth; ti++) {
    ctx.save(); ctx.rotate(ti * Math.PI * 2 / teeth);
    ctx.fillRect(-tw * 0.5, -(r + th), tw, th);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1820';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1a1820'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-r * 0.65, 0); ctx.lineTo(r * 0.65, 0);
  ctx.moveTo(0, -r * 0.65); ctx.lineTo(0, r * 0.65);
  ctx.stroke();
  ctx.restore();
}

function drawKraken() {
  if (krakPhase === 'debris' || krakPhase === 'victory') return;
  var ksx = KRAKEN_WX - camX;
  if (ksx < -450 || ksx > W + 450) return;
  var kty = terrain(KRAKEN_WX);
  ctx.save();
  ctx.translate(ksx, kty);

  var p1 = Math.sin(wt * 2.8) * 9, p2 = Math.sin(wt * 2.8 + Math.PI) * 9;
  var g1 = wt * 0.65, g2 = -wt * 0.88, g3 = wt * 1.35;

  // feet
  ctx.fillStyle = '#222230';
  var fxs = [-92, -54, 0, 54, 92];
  for (var fi = 0; fi < fxs.length; fi++) {
    ctx.fillRect(fxs[fi] - 6, -20, 12, 20);
